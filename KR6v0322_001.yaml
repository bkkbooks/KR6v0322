body:
  text: 震旦清信士勝觀江妙煦遺箸金剛般若波羅蜜經欲說此經先當科判大科分二甲初總釋名題次別解文義甲初又二乙初釋經題次釋人題乙初又三丙初說般若綱要般若綱要含有三義一謂般若為大乘佛法之綱要也此義諸大乘經論及古德箸述中隨處可見若博引之纍牘難盡茲且捨繁就約以明之取其易了也夫大乘教義深廣如海然一是以自度度他為本自度度他法門無量然一是以六波羅蜜為本而施戒忍進定五度若離般若非波羅蜜是所謂六波羅蜜者一是以般若波羅蜜為本然則般若為大乘佛法之綱要也彰彰明矣故大智度論曰般若波羅蜜是諸佛母諸佛以法為師法者即是般若波羅蜜大般若經曰摩訶般若波羅蜜是諸菩薩摩訶薩母能生諸佛攝持菩薩可見所謂大乘最上乘者唯一般若而已除般若外便無佛法當知大小乘一切教義皆自般若出一切教義間有與外道如儒家道家中最高之理論相近者獨有般若惟佛能證惟佛能說外道最高之理論一遇般若冰銷火滅矣故華嚴會上諸大菩薩讚曰天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者也知此則三教同源之說其荒謬何待言哉知此則學佛者苟不了徹般若雖盡知種種教義盡學種種法門皆是捨本逐末在枝葉上尋覓耳豈能到彼岸乎夫般若非他理體本具之正智是也理體者實相般若也正智者觀照般若也皆名般若者顯其理外無智智外無理理智一如也既曰學佛首當開佛知見云何為佛知見般若是也乃從來罕有學此者或望而生怖或無知妄談此所以學佛者雖多而證道者甚少也豈但孤負佛恩抑且孤負己靈何以言之如我世尊成道時詫曰奇哉奇哉大地衆生皆有如來智慧覺性但因妄想校想下舊版有執著二字原稿無不能證得若無妄想執著則無師智自然智即時現前如來智慧覺性即實相般若妄想即分別心第六識執著即我見第七識而觀照般若即轉此二識者也此二識轉藏識及前五識皆轉矣故曰若無妄想執著無師智自然智即時現前此二智即謂如來智慧覺性因非外來亦不可授人故曰無師因法爾本具必須自覺自證故曰自然亦可配根本智後得智或道種智一切智說總之凡夫所以為凡夫者由於無始無明無明猶言無智故今欲超凡入聖惟在開其正智耳佛門中人有恆言曰求開智慧此語正謂當開般若正智亦即開佛知見我世尊為一大事因緣出現於世何謂大事因緣即是為一切衆生開佛知見示佛知見俾得悟佛知見入佛知見耳乃衆生雖知求開智慧而不明其所以然教者學者一味尋枝覓葉絶不知向般若門中問津甚至相戒勿言可悲之事孰逾於此違背佛旨孰逾於此誤法誤人孰逾於此自今而往深願與諸善知識昌明正義極力弘揚也二所謂般若綱要者謂即般若而明其綱要也如上引大智度論所言佛法即是般若可見般若一門攝義無量若不明其綱要未免泛濫無歸前人有宗第一義空立說者有宗二諦立說者有宗八不立說者其說至不一也第一義即謂本性性為絶待之體故曰第一義性體空寂故曰第一義空此義是明般若綱要在於破我除執必須我法俱遣情執盡空所謂得無所離即除諸幻而後實相現前也二諦者俗諦也真諦也俗謂世俗真謂真實諦者精審確當之意謂世間之事相凡俗見以為審確是名俗諦真實之理性聖智乃知其審確是名真諦若約佛法言凡明諸法緣生之義者曰俗諦何以故以世俗未悟本性逐相而轉因曉以一切諸法但是緣生有即非有其義決定故凡明緣生即空之義者曰真諦何以故以聖智即虛妄相見真實性故洞然一切諸法非有而有當體皆空其義决定故龍樹菩薩曰為世諦故說有衆生為第一義諦故說衆生無所有世諦即俗諦第一義諦即真諦也由此可知俗諦明即空之有也真諦明即有之空也又曰諸佛依二諦為衆生說法故嘉祥大師曰佛法不出二諦二諦賅攝一切佛法也夫般若本攝一切佛法盡而曰佛依二諦說法則般若綱要不出二諦也明矣蓋般若要旨為令空有不著以合中道第一義真俗二諦正明此義者也八不者所謂不生不滅不斷不常不來不去不一不異因迷八不之淺深而成六道因悟八不之淺深而有三乘蓋一切衆生計執生滅斷常一異來去等相而著有故謂之迷三乘中人雖不執生滅諸相而又著於不生不滅等以偏於空故佛說八不之義正令洞明乎二諦二諦明而後中道顯也而第一義空之義亦是令空有俱空而後一切不著中道圓明由是觀之第一義空二諦八不說雖不同而義顯中道則同然則般若之綱要非他即是令於空有二邊遣蕩情執務令罄盡以顯圓融中道耳換言之佛說般若在令一切妄想執著之衆生開其理體本具之正智以明其無明覺其不覺俾無相無不相之實相空不空之如來藏現前同證如來智慧覺性耳此正我本師出現於世之大事因緣也是則般若法門乃最上乘令一切衆生乘之而直至佛地者耳由是言之與其別別舉義明其綱要何若曰金剛般若經實為般若部之綱要尤為要言不繁何以故本經無法不攝無義不彰上舉二諦八不第一義空諸義一一具足故如曰無我相無法相亦無非法相等第一義空之義也滅度所有一切衆生俗諦也實無衆生得滅度真諦也行於布施俗諦也於法無住真諦也乃至不應取法不應取非法即非是名等等全經所說無往非明二諦之義者至令菩薩通達無我法在於開佛知見入後所說則皆不一不異不斷不常不來不去不垢不淨等義以顯諸法空相是法平等夫諸法空相是法平等即所謂不取於相如如不動也而令學人如是演說如是受持豈非以如是等義為般若之綱要乎哉不但此也如上引大般若經大智度論之言曰般若能生諸佛攝持菩薩佛法即是般若是指示佛法要領不出般若也而本經則曰一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出其指示般若要領全在此經不尤昭昭明明乎佛說般若前後共十六會義豐文富聞西藏譯文至千卷之多中文簡括亦有六百卷內典中卷帙最大者惟般若部讀誦已難遑論演說受持故於第九會由博而約特說此經羅什大師師弟譯成華文並加入魏譯之數行計之止五千八百三十七字耳不但般若要旨盡在裏許且得此一卷一切佛法無不在握矣何以故此卷為般若之綱般若為一切佛法之綱故故必一切佛法通而後此經可通何以故因網乃得綱故然亦必此經之義趣深解而後一切佛法頭頭是道何以故綱舉則目張故當如是知也此一卷經既為三藏之綱其關繫重要可知其義蘊之玄廓條理之繁密亦由是而可知且以少文而攝多義幸得譯人筆妙方足以傳之是以經中一句一字皆關宏旨即一名稱一結集者標舉之詞亦含精義少少忽略義便難通自譯傳之後禪宗五祖六祖極力宏揚遂爾家喻戶曉流通不絶雖多未明其義而學佛者蓋無有不讀此經者也各佛教國中未見其比即此觀之足見吾國衆生深蒙佛護良堪慶慰何以故此經流傳不絶便是佛種不斷故自今而後當於云何演說云何受持特別加意乃足以少報佛恩及翻譯此經流通此經者之恩也荷擔如來當得菩提願與諸君共勉之三謂即金剛般若而明其綱要也本經之綱要無他遣除妄想執著是已蓋如來智慧覺性一切衆生人人本具個個不無但為妄想執著所障不能證得佛為一大事因緣出世者為此事也一切佛法無非破執除障之法門也而本經所說尤為直捷了當譬如金剛寶劍依此而行可以直下斷除者也妄想即是分別心執著分為兩種執五蘊色身為我名曰人我執簡言之曰我執執著一切諸法名曰法我執簡言之則曰法執我執不除生煩惱障法執不除生所知障總名惑障由惑造業則為業障因業受苦名曰苦障亦名報障我法二執細分之又有分別俱生之別起心分別因而執著者為分別我法二執故粗并未有意分別而執著之凡情隨念俱起者為俱生我法二執故細此是多生以來習氣種子蘊在八識田中故爾隨念即起最為難除當知妄想執著由於無始無明而般若則為理體正智智開則無明者明矣無明明則妄想執著自斷矣故學佛首當開示悟入佛之知見佛之知見即是般若正智也無論修何法門皆須致力於此故一切法不能離般若也修淨土念佛亦然經云心淨則土淨妄想執著不除心何由淨耶古德言愛不重不生娑婆情執我見實為愛根故求生淨土必應從此下手所謂老實念佛者老實二字必當注意世間一切染緣攀緣不息云何能老實乎由此可知般若淨土初非二事此經實一切學人出妄之宏綱淨心之樞要也茲不過略談大旨詳見下三依五重釋題中古人將釋一經先說玄義亦曰玄談玄者深也又懸也謂將經中深義提要鈎玄而先談之使聞者得知大要入文時乃有頭緒也故玄談云者猶言提要正一經之綱要所在也今故依天台例開為五重說之上來初說般若綱要竟丙次明融會各家解釋佛經之書各宗俱備且皆流傳不失者莫過此經有彌勒菩薩之頌有無著天親功德施三菩薩之論但譯筆晦澀頗不易讀且各就所見發揮往往有乍視之若與經義相反而實相成者其精妙之處非後賢所及也須向大處深處領取若死在句下拘執文字一一與經文比附反增障礙圭峯之論疏纂要即犯此病功德施論題即妙曰金剛破取著不壞假名論全經要旨盡在裏許矣吾土注此經最早者為羅什入室弟子僧肇著墨不多但略詮釋一二要旨而已然不刊之作也六朝時注釋至今仍存者有三論宗嘉祥天台宗智者兩師之疏嘉祥一生精力在於三論所有箸述無一不精而金剛經義疏則不經意之作或為門弟子隨意録存未經審訂者亦未可知因多間文筆亦蕪雜與嘉祥其他箸作殊不相類故也智者之釋全依肇注偶有一二處略加疏通耳智者以三諦發揮一切經獨於此經宗二諦說之而於是名之言皆作假名會祖師法眼令人欽服不解台家子孫何故不遵祖訓也豈未見此書耶智者疏清末始由楊仁山居士向日本請歸刻之唐時法相宗窺基亦有注釋多述法相復有釋慧淨之注精湛處不亞肇公古注中當以肇慧為最佳矣華嚴宗圭峯作論疏纂要雖是精心結撰惜拘牽論文經義反晦宋時有長水師作刊定記以釋圭峯纂要依文解義甚詳也禪宗祖師亦有說經之作如唐之六祖元之中峯明之憨山然皆寥寥短篇無甚發揮明末天台宗蕅益作金剛破空論蓋有為而作亦可備一格也此外宋明清時出家在家之釋此經者所在多有不無一二道著語精審則未能也清初有台宗溥畹之心印疏以三諦說經語多坐實殊違經旨獨科判間有可取處又有華嚴宗達天之新眼疏間有精到能發前人所未發者以信解行證判經見地尤卓他如五十三家注等駁雜不純不足觀也今番演說此經重在將經中精深微妙之旨趣一一剖而出之向來視為大乘初門者一一言其究竟歸於圓融向不經意之處則為闡發其宏旨向謂重復之語則為抉擇其淺深於前後義蘊關連鈎鎖之處皆一一道出所以然而貫通之於所有觀門行門指示修功處不敢一字忽略務令聞者得以入手多引他經互相證明以便得所會通精要處且融歸淨土以破向來歧視之病自愧學力疏淺不足以說此深經然大願所在實欲人人明了般若真實義庶不致於怕談妄談淺談云爾若上舉前賢論疏中精要之說皆一一擇取而融納之但不必襲其面貌拘其文字耳上來次明融會各家已竟丙三依五重釋題分二丁初總解科意五重者名體宗用相依者台宗智者大師說法華經經題約名體宗用相開為五重以發揮經中要旨最為簡明少一重不得多一重亦不必故今依之也此之五重次第相生夫一經必有一經特立之名名者所以標一經之概要以顯其異於他經者也故第一重為釋名名者實之賓也既標此名必有其實非虛立也故次顯體體者實體即經名之主體也因名核實矣然非修觀行仍屬空名而依體起修必明宗趣故三明宗宗者修宗謂修行之旨趣也既已真修必得其用故四論用用者功效之意佛隨衆生根機之大小利鈍說種種法以教化之故經教即有大小偏圓漸頓之殊如華嚴宗判為小始終頓圓五種教相天台判為藏通別圓四種化法頓漸祕密不定四種化儀是也一經之名體宗用四重玄義既明則其屬於何種教相亦可得而了然矣故第五重為判教相也今依五重之次第開為五科丁次依次開釋分五戊初釋名次顯體三明宗四論用五判教相戊初又二己初通名通名者金剛般若波羅蜜經之經字是也佛所說法通名為經非一經為然故經字乃一切佛法之通名梵語曰修多羅亦作素怛纜修妬路修多羅之本義為線引申為貫穿為攝持為契合既將佛說之法分類結集成書因以修多羅名之謂貫穿佛語攝持不失上契佛心下契衆機也大法東來古德遂以經字譯修多羅經字本義為經緯組織與修多羅之線義貫穿攝持等義正復相當且吾國習慣惟聖人語始得稱經極其隆重譯修多羅為經精當之至但我國經字不含契合之義與修多羅原義少嫌不足然除經字外更無他字可譯故古人不得已稱佛書曰契經既以補足原義且顯此是佛經非他教經也至若釋經為常為道此乃經字引申之義修多羅中原無此義故釋佛經不宜引用也己次別名金剛般若波羅蜜七字為本經特立之名一切經不能通用是謂別名金剛者喻也般若波羅蜜者法也是為法喻立名諸經經題安名之法取義不外七種所謂人法喻單復具是也如阿彌陀經阿彌陀佛名也取人名為經題謂之單人立名如般舟三昧經般舟三昧為一種法門是為單法立名如稻稈經稻稈喻因緣生法也是為單喻立名如妙法蓮華經妙法法也蓮華喻也有法有喻非單而復謂之法喻立名如普賢行願品有法有人是為人法立名如如來師子吼經如來為人師子吼為喻是為人喻立名如大方廣佛華嚴經大方廣法也佛人也華嚴喻也則是具足人法喻以立名也單三復三具足者一共為七也如一題之中有兩喻而無人法亦單是喻而非復有兩法兩人者例此可知故經名無量取義只此七種而已梵語嚩日囉或跋折囉義為金剛物名也蓋金中之精最堅最利能壞一切物為利一切物不能壞之為堅內典言帝釋有寶名曰金剛持之與修羅戰金剛力士所持器仗曰金剛杵金輪王有金剛輪寶因稱金輪王本為天上之寶人間雖亦有之然甚罕見古人謂之金剛鑽色如紫石英透明或曰生水底石上內典中常用以喻法喻人如曰金剛三昧金剛力士金剛身金剛網金剛手金剛心等皆取其堅固不可壞而能摧滅一切魔障之義也今以喻般若正智般若如大火聚四面不可觸觸則喪身失命如金剛然一切物不能觸其鋒也般若正智能破煩惱重障如金剛能壞一切物也什師云金剛寶方寸其光明能照數十里般若智光亦復如是徹見一切凡情妄想而破無明也金剛寶惟金剛力士能持般若亦然非具大乘根性者弗克承當故曰若樂小法者著我人衆生壽者見則於此經不能聽受讀誦為人解說也真諦三藏言金剛寶有種種色青色者能消災厄如般若波羅蜜能除三障成三身度生死流達涅槃岸度一切苦厄也黃色者得滿所求如般若之莊嚴萬行成就無邊功德也紅色者向日出火如般若以始覺合本覺出智慧火燒煩惱薪如千日輪光明遍照也白色者澄清濁水如般若能背塵合覺度五濁世達清涼池也碧色者消伏毒害如般若之除我法執消三毒苦也又有無色金剛亦名空色得之者能於虛空行住般若亦然所謂第一義空也具此三空之智則我空法空并空亦空空中無色無受想行識乃至無智亦無得而得無上菩提仍歸於無有少法可得則如如不動成金剛身矣總之金剛之堅喻實相般若隨緣不變在纏不壞也金剛之利喻觀照般若無我不破無惑不斷也金剛之明喻文字般若能開解慧無明得明也金剛為無上寶價值不可稱量喻般若為無上法寶功德不可稱量也金剛寶世間罕有喻般若法寶之希有所謂無上甚深微妙法百千萬劫難遭遇也梵語般若義為智慧非世智小慧也乃理體本具之正智所謂佛之知見理體即是覺性亦曰實相般若正智即觀照般若也理外無智智外無理理智本來一如故皆名般若因恐人誤認是尋常之智慧故經論中多舉譯音般若為言也此智一切衆生本具但為無始無明所障不得顯現且此智自證方知非言語文字所能形容何以故必須言語斷心行滅乃能自證故然而一切衆生昧之久矣不假方便障云何開障若不開此智又何能現故我世尊為此大事出現於世不得已仍用語言文字以啓導之凡說佛知佛見以開示衆生使得悟入者名曰般若法門亦云文字般若欲令衆生因文字起觀照證實相也其他所說一切法門如布施持戒等等皆從佛知佛見出使衆生依而行之以為開悟般若正智之助者故曰一切法不離般若般若為一切法之綱要換言之即是般若為一切法之主幹寓於一切法中非離一切法而別存也質言之我佛出世為憐憫衆生同具如來覺性皆得成佛而竟不自知故說佛之自證者以破衆生之愚癡對愚癡言假名曰智慧耳實則智慧非別覺而已矣實相般若者本覺也觀照般若者始覺也以一切衆生從來不覺故乃假文字般若以覺悟之耳因是之故讀經聞法要在深自警惕以佛所說者為鏡時時處處用以自照不觀不照迷何由覺是即所謂依文字起觀照也觀照功久則皇皇然警惕之心自生是即始覺也亦理體本具之正智初開也如是不退不懈觀照之功日深日醇則所謂始覺者先如初生之月漸漸光多暗少以至於月輪圓滿光輝煥然則性體顯現即是始覺合於本覺而亦無始本之分也當知所謂成佛者無他覺性圓明而已而覺性之開非仗文字般若之力其道無由故曰一切諸佛從此經出復次在梵語本文智曰若那慧曰般若照見為智解了為慧決斷為智簡擇為慧知俗諦為智照真諦為慧徹明妙有為智契悟真空為慧也佛經常說六度有時亦開為十度第七度曰方便第八度曰願第九度曰力第十度曰智以對第六度之慧也然而空是即有之空有乃即空之有故智慧二字實分而不分此經正明空有不著所以般若字應作智慧會不能拘執文義強分為二不過有時佛經中亦不分而分舉智以明俗諦舉慧以明真諦故學人亦不可不知此義耳金剛原以喻般若然惟第九會所說者乃以金剛能斷喻之豈非以此經所說之義尤為堅利而明尤能斷惑餘會說者為金此經說者乃金中之精乎故本經曰佛及佛法從此經出又曰此經義不可思議果報亦不可思議剋指此經為言則般若綱要盡在此經更足證明矣梵語波羅蜜義為彼岸到順此方文字應曰到彼岸印土古俗凡所作究竟皆云到彼岸猶此方方言所謂到家也若約佛法言之所謂離生死此岸渡煩惱中流達涅槃彼岸是也故波羅蜜亦是喻詞涅槃者不生不滅即謂本性本性者性乃本具之意也言本具者明非造作既非造作可見本來如是而非從無而有者故曰本自不生言其本來已具非新生也既本不生故今亦不滅而衆生生死不已者相也非性也何故生死不已由於其心生滅不停當知生滅不停之心所謂識相也亦非性也何故如此由於煩惱以煩惱故遂致心有起滅性變為識由此造業受輪回苦而衆生不知返本認識為性迷於生死之相所以輪回不息而與不生不滅者雖覿面而成永隔矣故以煩惱喻中流以生死喻此岸以涅槃喻彼岸也蓋本無此岸彼岸因有中流隔之遂成彼此之別也煩惱亦曰惑所謂見思惑也見思惑皆從我見而生故欲了脫生死之相須證不生滅之性而欲證本性須化除我見然我見根深必須用種種法以調伏之開根本智以斷絶之所謂理雖頓悟事須漸除猶之過渡從此岸達彼岸行之以漸不容急也故曰離曰渡曰達以顯其未可一蹴即到而說一流字又所以顯其危險無明風萬不可起起則隨流而下甚至有滅頂之凶尚能渡達彼岸乎修行人其慎諸然如上所說尚是專約凡夫說若細別之生死含有兩重煩惱亦兼見思塵沙無明而言凡夫著有執於人我遂因見思煩惱而墮分段生死二乘及一類菩薩著空執於法我遂因塵沙無明煩惱而有變易生死故欲證到無餘涅槃須空有俱空破我法二執了兩重生死渡過見思塵沙無明等煩惱中流乃達涅槃彼岸耳故大智度論云有無二見皆屬此岸二執俱空始達彼岸二執即我法二執也渡流之筏為何六波羅蜜是也用此六法可到彼岸故此六法亦名六度六度之中布施要矣般若尤要布施捨也若不知捨云何肯離此而渡然若無觀照之智又云何肯捨故般若為五度之綱要五度離此非波羅蜜也又復智慧二字分言之亦可因位名慧果位名智般若波羅蜜約因位說猶言到彼岸之觀慧若約果位說則般若即是波羅蜜何以故果位之般若即是理智一如理智一如即是不生不滅也約因位說金剛即喻此之觀慧最堅最利最明故能到彼岸約果位說金剛則喻如來法身所謂金剛不壞身也上來釋名竟戊次顯體分三己初明體義體者主體也凡說一經不能數言便了往往千言萬語頭緒紛然讀者聞者如入大海但見汪洋一片莫辨津涯不免興望洋之歎當知每一部經卷帙無論如何重大條理無論如何繁多必有其歸趣所在換言之一經必有一經主要之點千言萬語皆趨重於此點也千條萬緒皆發生於此點也此點即一經主要之點所謂體也尋出千言萬語千條萬緒中主要之一點而指明之所謂顯體也讀者聞者若明得經中主要之點則要綱在握不致望洋興歎亦不致入海算沙更不致誤入歧途矣知此可知顯體等等之關繫甚要也知此可知古人於經前先說玄談之苦心也總之此所謂體乃經體耳非謂性體己次辨異同辨異同有二義初約經體性體辨其異同夫經體非性體固已然而佛為一大事因緣出現於世所謂一大事者即是開示一切衆生同具如來智慧覺性俾得悟入一齊成佛說法四十九年專為此事由是言之一切經莫非開示本具佛性是一切經之主體皆不外乎發揮性體可知矣然則上文乃曰此中所顯乃經體非性體若不能不辨別者何耶當知一切經雖皆不外乎發明本具佛性然各經立說旨趣不同有重在除障者有重在修福者有說夙因者有說後果者機有萬千之別說法便因而有萬千之別非部部經皆直指本性徹底發揮也豈能儱侗顢頇呆指經體即是性體且即以直指本性言性體包羅萬有一名不能盡其量遂不得已而立種種名如曰真如曰如如曰實相曰法界曰法身曰性淨明體曰圓覺曰自性清淨心等等其名無量顯義亦即無量直指本性之經有舉此名者有舉彼名者有兼舉數名者因說經之旨趣而異即此可見雖同是直指本性之經顯義既各各不同經中之歸趣所在亦因而各各不同故經體與性體約徹底顯性之經言雖二而不二仍復不二而二不能混為一談也其異同必須辨明者此也次約各宗辨其異同無論何宗其說經題必須將經中要旨攝入而發揮之方為言中有物而分門別類立有一定之規格者當推天台賢首兩家然賢首之十門分別有時不甚適用不若台家所立五重之簡明切要也即以顯體言兩家亦頗異其趣蓋顯經體同而顯體之命意大不同也賢首宗多就通名之經字上顯體亦即約能詮之經教顯體也此宗大德每曰一切大乘經以諸法實相為體圭峯金剛經纂要疏曰以文字般若為體此皆約能詮之經教而言者也夫一切大乘經以諸法實相為體則一切大乘經莫非文字般若明矣若剋指般若部言則前後十六會所說皆文字般若也豈獨第九會為然豈獨此經為然故圭峯所說可通之於他經故曰是就通名之經字上顯體也而台宗之顯經體則剋指當部不能移易即是就別名之金剛般若波羅蜜七字上顯本經主要之體亦即約所詮之理事以顯體故曰台家所立簡明切要也此兩家顯體之異同也己三正顯體今既依台家規格約經題之別名以顯經義所明之主體則台宗諸大德所說不可不先知之也台宗古德之本經注疏流傳至今其人可師其注可傳者惟有兩種一隋時智者之注一明時蕅益之破空論是也智者以若見諸相非相即見如來為經體蕅益以實相常住為經體近時台宗大德諦間法師撰金剛經新疏則以第一義空為經體三師標顯各異恐或致疑然不必疑也當知三說但文字不同耳理則無殊蓋實相即是第一義空大智度論云所謂第一義空者諸法實相是如來之稱以顯性德即是顯法身德而法身非別實相是也由是可知三說雖異實同矣然新疏之第一義空其文非本經所有智注最佳矣而本經更有簡要之句可取也實相切要矣常住二字似略凑若但舉實相二字雖妙然一切大乘經皆以諸法實相為體又嫌膚泛故今不執三說而易之曰經體者生實相是也本經云信心清淨則生實相實相者無相無不相即謂真如法身亦即空不空如來藏生者現前之意云何現前由心清淨云何清淨由於無住無住者離一切諸相是也離一切諸相即是空有不著亦即一空到底本經曰離一切諸相則名諸佛何以故諸相離則實相現前故由是觀之以生實相三字顯本經之歸趣理無不攝事無不彰也本經自釋實相之義曰實相者即是非相此中非字是一切俱非非有非空非亦有亦空非非有非空凡此空有雙亦雙非之諸相俱非非亦不立是為離一切諸相衆生自性之相狀本來如是真實如是無以名之強名實相耳離者無住之謂無住者不取之謂不取於相便如如不動無以名之強名曰生耳文字般若詮此實相也觀照般若觀此實相也至於實相般若圓滿顯現則到彼岸矣而取相由於我見一切諸相離則我見除煩惱斷而煩惱斷一分實相便生一分喻本經之文字般若觀照般若以金剛者正因其能斷煩惱生實相也然則生實相三字為金剛般若波羅蜜經主要之體豈不昭然若揭哉戊三明宗分三己初明宗義所謂明宗者明修也宗主也明說明也夫明修謂之明宗何耶天台宗如此立說具有兩重深義一通二別一警策學人佛法以實行為主也此是通義二修行之法無量因根機及目的而異其法猶如世法學校因種種類別而定有主要科隨意科也本經有不思議功德為發大乘最上乘者說其修法以何為主乎此別義也不曰明修而曰明宗者取義在此明宗緊躡顯體來蓋經義之主體雖顯然非修莫證若僅知顯體而不依體起修如數他家寶自無半錢分顯之何益故我佛每說一法未說之先必誡以諦聽聞思修三慧皆具是為諦聽而每經結語必曰信受奉行即是開示讀經聞法以如說修行為主也然則本經歸趣所在所謂經義之主體吾知其為生實相矣實相必云何而後生耶我佛說法句句說性即句句說修今將如法實行於無量行門之中經旨究以何法為主耶以是之故顯體之後必繼以明宗也己次辨異同如上所言明宗之宗與各宗各派之宗又宗派之宗與宗教之宗又佛門所說之宗教與世俗所說之宗教不但世人不明即佛門中人亦多混淆今乘便將其異同之點一一辨白清楚想為諸君所願聞也今人所說宗教其義本拾西人牙慧世有其書茲亦無暇瑣及可簡言以明之曰一教之中奉有無上權威者以為之校之舊版作其原稿作之主其主能生死人一切榮枯咸在其手故崇拜之此世俗宗教之說也故一言宗教即含有迷信依賴意味世人徒見我佛門奉佛為教主復聞佛門亦有宗教之言莫明其妙遂與西人宗教混為一談隨人腳後跟轉嗤為迷信任意毀謗造無間業真可憫也且因佛門禮像詆為拜木偶意謂校謂舊版作為原稿作謂佛教尚不及他教其愚可謂極矣今亦無庸深談宗趣詳引教義片言即可判其與西人宗教大相徑庭當知佛像經卷及出家人稱為住持三寶意在令人因像而觀想乎佛因經卷而通達其理因出家人而引起超塵離垢之心耳故謂之住持蓋借住持三寶觀自性三寶證常住三寶生死榮枯皆由乎己無上權威握在自手故曰萬法唯心心外無法此佛法所以超勝於世間一切道德哲理也豈其他宗教所能夢見哉若佛門中所言宗教宗謂明心見性因佛法以明心見性為主故也教謂一切經義因一切經義為佛所示教故也故若通達乎心性謂之宗通若通達乎經義謂之教通宗也教也截然兩事豈謂奉一無上權威者為教中主人翁哉則所謂宗教其名雖同義則迥異較然明矣是故佛門中宗教之宗原非指宗派言但因禪門唯一以自悟心性為主不重經教名曰教外別傳遂謂之宗下明其與明心見性為主之宗旨相合也宗教之教亦非謂教主其能深通經義依文字起觀行證實相者則謂之教下明其能依教奉行也此乃後起之義已含有宗派意在矣然曰宗下曰教下義猶平等初無軒輊繼而凡言宗下不但專指禪宗并含有是能實行是能扼要之意凡言教下泛指禪門以外各宗派并含有但求多聞無益於人之意則一重一輕大有不能同日而語意思其義更屬後起蓋在禪宗極盛時也至於所謂各宗各有所主之意耳或主法相如慈恩宗亦名法相或唯識宗或主法性如禪宗及三論天台賢首等宗亦因依教不依教別禪宗於其他言性者之外如上所說之宗下教下亦因所主之經義不同而立宗名如曰三論宗法華宗華嚴宗淨土宗密宗主律者曰律宗是也由宗再細別之則名為派如法相宗有真諦之舊派玄奘之新派華嚴經兼明性相故宗華嚴者其教義性相並通若約法相而言賢首一家亦可稱為法相之又一派他如淨土宗亦有作觀持名之別禪宗之分臨濟溈仰曹洞法眼雲門五宗雖立宗名實乃派別之義餘可類推總之宗派之宗因其立義施教各各不同遂立各種宗名不但修行方法有異已也若明宗之宗則專約修言矣大抵宗教之宗其義最廣宗派之義已為漸狹至曰明宗義尤狹矣此其異也而宗字之義為主張為主旨則無不同若夫西人所云宗教乃是有無上權威者為一教之宗主之義與吾所謂宗教義乃迥異此皆不可不辨者也世俗中人不明此義尚不足責乃佛門中人亦因異同未曾辨明不知將佛門中宗教之正義詳切聲說但曰佛法非宗教以與世俗爭夫佛法明明有宗有教何云非宗教古人箸述中屢見不一見如此立說豈能令人心折若將正義說明使知吾所謂宗教非彼所謂宗教則涇渭分明彼亦無從施其毀謗矣又台宗以外各家亦嘗明宗矣然其所明非台宗之所明其異同亦不可不一辨也如賢首宗智儼二祖注魏譯金剛經曰文字觀照實相三般若為一經之宗則所謂宗者既非專約修功亦非剋指金剛經只可謂之泛論般若諸經之主旨耳圭峯之疏以實相般若觀照般若不一不二為宗視前說略優然亦只是總論而非切指本經且為性修合說非專約修言也三論宗嘉祥義疏云因果為宗蓋以無住之修為因成就得無所得為果也此說則剋指本經不能移之他部切要多矣然已涉入台家第四重之論用何以故功用屬果故由此可知諸家明宗則同而所明之宗則異也且由此愈見台家之五重簡明切要非諸家所能及焉己三正明宗台家大德明宗之說如何智注標宗為以實相之慧修無相之檀般若為理體本具之正智故曰實相之慧檀者布施取經中菩薩於法應無所住行於布施之義也蕅益破空論以觀照契理為宗契理者契合理體也即智注實相之慧義也諦法師新疏則以發菩提心為宗三說之中自以智注為最精餘兩說未免寬泛茲依本經現成語句應離一切相發阿耨多羅三藐三菩提心離一切諸相則名諸佛以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提之義約為兩語曰離一切相修一切善為本經依體起修之妙宗也命意與智注同而語句現成且明顯易了故易之何謂與智注意同耶本經舉一布施以攝六度萬行行於布施正所謂修一切善也而離一切相正是實相之慧蓋法與非法兩皆不取為離一切相正與無相無不相之實相相應是則離一切相非實相之慧而何當知本經唯一修宗在無住二字但標無住以明經宗全經之觀門行門盡在其中矣然恐領會不易不如以離一切相修一切善兩語明之則無住之旨洞然明白何以言之無住者兩邊不住也亦即一空到底也經云不應取法不應取非法非法非非法以及即非是名諸句又云無我相無法相亦無非法相無論約二邊說約重空說皆所謂離一切相也即無住之真詮也而於法應無所住之下緊接行於布施即是修一切善之意亦即空亦無住之意也全經所說觀門行門一是以離一切相修一切善為本正所謂妙有不有真空不空遮照同時宛合中道第一義也大智度論云般若要旨在離一切法即一切法離一切法者離一切相也即一切法者修一切善也得本經離一切相修一切善兩語般若要旨因而洞明有下手處故本經為般若之綱要也且離一切相方為發無上菩提而得無上菩提亦不外乎離一切相何以故無我人衆壽正謂離一切相故而離一切相當從修一切善做出此正無實從無虛出無為從有為出之意也故離一切相修一切善兩語將金剛般若波羅蜜從此岸渡中流達彼岸之行程括盡無遺矣故曰為依體起修之妙宗也總之明宗必與顯體相應經體既為生實相而離一切相本為實相之慧故離一切相修一切善實相便從此而生故曰離一切諸相則名諸佛故曰以無我人衆壽修一切善法則得阿耨菩提蓋名為諸佛者因其得阿耨菩提也阿耨菩提者實相般若也離一切相修一切善者觀照般若也因觀照而證實相則舉此兩句經文以明修宗若網得綱有條不紊矣戊四辨用用者功用也力用也即成效之謂修必得其宗者以不如是便無成效之可期也然則修宗既明其成效為何如耶且成效原非一端當辨別其孰為最大何謂最大其成效與經體相應者是夫有是體必有是用用若不與體合是其修功猶有未到亦不能謂之成效矣故不曰顯用明用而必曰辨用者以此不但此也用由宗出修宗屬因功用屬果因如是而後果如是也而曰辨者辨其效果是否與經體合即以辨其修因是否與經體合也當知明修謂之明宗者即明修因之宗旨必不離乎經體換言之主要之修法在以經體為宗是則修行之方法即須與經體合也明矣而因果從來一如故約學人言當辨其所得效果是否與經體合即可知其修因是否與經體合而約經義言當於經中辨其孰為與經體相應之功用方是與修宗一如之成效耳總之體宗用必須一貫而體宗用之名是約所而言即是約經義而言蓋顯體者顯經義之歸趣所在是即一經主要之體也明宗者說明經中所言依體而起之主要修法也辨用者辨別經中所言因修而得之最大功用也若約能修之人而言明宗是明因位之修辨用是辨果地之證而顯體是顯因果之目的蓋明宗者明其在因地時必應如是修去乃為向目的而行辨用者辨其所謂證果者必得如是功用乃為將目的達到也當如是知也他宗於辨用一層或略而不談或換一種說法如賢首十門中有一門曰教起因緣慈恩宗亦說教起所為是皆論一經之功用者也然所論未免過繁以天台宗言智者注本經以破執二字為一經之大用破空論則曰經用者斷疑是而新疏曰經用在於無住生心又過簡略不盡經義所言功用之量當知體宗用三所以必須顯之明之辨之者重在令聞法者得有方針且資警策耳固不但應以片言括盡經旨使能了然於一經之綱要所在尤須明白易曉使其觸目驚心有下手處太繁太略皆不相宜也今欲詳辨本經之大用當先明所以成衆生及不能脫苦之病根所在佛言一切衆生皆有如來智慧覺性但以妄想執著所障不能證得此數語說得極其徹底意謂衆生皆可成佛何以故皆有如來之智慧覺性故然不能成佛何耶本具之如來智慧覺性有物障之之故此明成衆生之所以也夫一切衆生皆有此性而不自知即知之而所障若未除淨亦復不能證得此明不能脫苦之所以也障物為何妄想執著是此明成衆生受苦惱之病根也寥寥數語一齊說盡矣妄想者分別心是執著者我法二執是即所謂我見也粗則執著色身是為人我見則不能脫分段生死之苦細則執著一切法是為法我見則不能脫變易生死之苦不但此也因我見之執起分別之妄於是順我者貪之逆我者瞋之而不知本無所謂我也故謂之癡亦曰無明亦名不覺遂造種種罪業為其牽繫其苦愈甚愈不得脫妄想執著亦因而愈深愈重本具之如來智慧覺性更因而愈迷愈隔矣然則我見何自起耶以不達一真法界故法界者四聖六凡十法界也十法界之相雖差別無量而十法界之性則同一真如不達者不知也故起信論云以不達一法界故不覺念起而有無明因其不達故謂之不覺無明也念起即謂妄想執著也不達一真法界猶言不知同具如來智慧覺性也蓋不知性體本同遂起人我分別之念業力由此而作苦報由此而招矣然則欲脫苦報當消罪業欲消罪業當除我見明矣我佛為一大事出世者為此說法四十九年者說此本經為一切法之綱要喻之為金剛能斷者其大用亦即在此經名曰般若波羅蜜者謂此經能開衆生到彼岸之智慧俾得同到彼岸也此智為一切衆生理體所本具即是衆生皆有之如來智慧覺性故謂之到彼岸智慧故此智開便能到彼岸何以故此智若開便是不覺者覺無明者明便是通達一真法界便是從根本上破其我見則無惑而不斷故以金剛喻之也然則此智云何開耶當知發大悲心便是開此智何以故知一切衆生皆具如來智慧覺性但因有障未證是知衆生之性體皆同也故見衆生苦即是自己受苦見衆生樂即是自己得樂有一衆生未證如來則性體猶有虧也故發心必拔其苦必豫其樂必度之成佛是之謂大悲心所謂同體大悲也能發此心名為始覺雖曰始覺便同正覺故發同體大悲心謂之發阿耨多羅三藐三菩提心其義為無上正等覺也故離一切相方為發此心離一切相者明其會歸於同一真如之性也何以言之見有衆生可成佛而必度之則是不取非法亦非不衆生有無上菩提可得離無相也即復知衆生本具如來智慧覺性故雖度實無所度雖成而實無所成則是不取法而非衆生得無上菩提而無所得離有相也有無之相俱離謂之會歸真如之性者以其契合無相無不相之實相故則初發心時分別心已融粗細之我見潛銷矣故喻此經義為金剛也試觀此經一啓口便令發無上菩提心滅度所有衆生入無餘涅槃而實無衆生得滅度以後所說皆是發揮此義并忘其為菩提心且直指心源令向一念不生處契入如後半部開章便遣著於發菩提心乃至曰即非我見是名我見則我見之蹤影全無矣故本經之極大功用首在破我一切衆生以不覺知十法界同共一真如法身故執有我他起分別見遂生三毒造無量罪受業繫苦墮落輪回愈迷愈苦愈苦愈迷縱或夙有善根遇善知識教令發心皈依三寶而以夙世罪業往往內外障緣叠起環生欲修不得修亦難成故修行人懺悔業障極關緊要華嚴會上諸大菩薩尚以此門列入行願何况凡夫然罪業有可懺悔者亦有不通懺悔者若極重之罪已成定業者懺悔尤難經曰端坐念實相是名真懺悔重罪若霜露慧日能消除此明欲消重罪惟念實相庶乎其可非他法所能懺悔也若但視此經為令觀空猶淺說也偏見也當知經文乃令空有不著雙照二邊是謂念實相何以故實相者無相無不相故若但觀空是止觀無相而不觀無不相豈念實相哉經以念實相之慧喻之如日正以日之行空而不住空也故行願品云亦如日月不住空若但觀於空是住空矣豈以日為喻之意哉當知實相之慧從大悲生以大悲故廣修六度萬行得無量福德故經文之慧攝有福在方與念實相相應福慧雙修觀空而不住空乃如光明赫赫之日能除暗冥能生萬物以此觀行乃能消重罪若霜露耳當如是知如是知者是為正知本經功用亦復如是經體為生實相所謂實相般若也修宗為離一切相修一切善所謂觀照般若即是念實相也蓋離一切相觀空也修慧也修一切善不住空也修福也觀念實相福慧雙修是真懺悔故能消除重罪定業則內外障緣一齊銷盡何修而不成乎如本經曰是人先世罪業應墮惡道以今世人輕賤故先世罪業則為銷滅當得阿耨多羅三藐三菩提曰惡道是重罪也曰應墮是定業也幸有善根今世未墮得聞此經深解義趣能知修宗福慧并進故能重罪輕受夙業銷滅何以故約對治言福能滅罪故約第一義言慧能拔業故當得菩提明其所修必成也以是之故本經復有極大功用曰滅罪業是二乘人能觀空自覺破人我見而法我猶在以智淺故破之不盡其成效極果止能成就阿羅漢辟支佛大乘中人雖能空有不住不但自覺且行六度以覺他然而無明未能破淨即是微細之法我猶未化除也以未得金剛智故故但分證法身而未究竟本經所謂成就第一希有以僅成正等正覺未達無上也若能於本經深解義趣信心不逆盡能受持為人解說即為荷擔如來阿耨多羅三藐三菩提當知是人成就最上第一希有之法乃至生福滅罪當得無上菩提故本經更有極大功用能究竟成就阿耨多羅三藐三菩提也合以上所辨列之三端約成八字曰破我滅罪成就如來為本經之大用庶幾與經中是經有不可思議不可稱量無邊功德之文相應耳經曰狂心不歇歇即菩提古德亦云但盡凡情別無聖解狂心凡情即是妄想執著之我見也當知如來智慧覺性衆生本具不過為我見所障耳此障若除覺性則本來圓成智慧則自在圓明如來亦即出無明殼藏而圓滿顯現矣故曰狂心不歇歇即菩提但盡凡情別無聖解所以修行法門無量而唯一宗旨除障而已本經大用剋實言之亦只是除障而已而一言及障法爾具三所謂成就亦可開三一曰惑障又名煩惱障即見思惑也我邊邪二取貪瞋癡慢疑其數有十一是以我見為本故破我則惑障除而成般若德二曰業障本經曰先世罪業則為銷滅故滅罪則業障除而成解脫德三曰報障報謂苦報身也成就如來則報障除而成法身德故本經之大用即是除三障成三德今舉破我滅罪成就如來為言者以其易曉而除三障成三德之義攝在其中故也前言體宗用三其義一貫云何一貫耶茲再綜合言之夫約所詮之經義以顯歸趣之主體為生實相者為發大乘最上乘者示以修因證果之目的也若修宗之離一切相修一切善約經義言離一切相者所謂無相修一切善者所謂無不相也然而善法即非善法是名善法故究竟說之修一切善即攝無相無不相義而離一切相則是相不相皆無之義正與生實相之經體相應蓋生實相之究竟義亦為相不相皆無而生即無生也約能修人言則是二邊不著一空到底向生實相之究竟目的進修也至辨用之破我滅罪成就如來約經義言破我為離一切相所得之功用以妄盡情空故滅罪為修一切善所得之功用以福慧增長故亦可破我滅罪為離相修善合得之功用以觀照般若之修功信心清淨則生實相故蓋二邊不著心與絶待清淨相應則破一分無明證一分法身故我見罪業由無明生無明破則惑業二障漸銷乃能證法身也初證法身為實相生也若夫成就如來則由觀照功純實相般若圓滿現前豈第如月之初生已哉約能修人言即是因圓果滿已達目的而到涅槃彼岸矣上來辨用并補發顯體明宗未盡之義及將體宗用分別能所綜合一貫而說其義已竟戊五判教相分二己初總論次正判己初又二庚初解釋名義此中判字蓋有兩義分判也辨別之義又評判也論定之義判教相者謂辨別經中旨趣加以論定應屬何類也教者教化即指經言佛為教化衆生而說法結集所說之法而成書稱之曰經故謂經為教也佛之出世施教在令衆生除無明我見之障證本具之如來智慧覺性簡言之一切佛法不外明心見性而已而心性要在自證以其本非言說所可及也故曰說法者無法可說然衆生既不自知今欲教之又不得不說而障有淺深說之又不能不應其機故曰對機則說以說不對機則不能了解說復何益耶機有二義根機也時機也根機指根性言謂衆生根性各各不同也何故不同障有淺深厚薄故也時機指時節言某時說阿含某時說方等先小後大先淺後深循循善誘引人入勝如所謂三時五時是也故名四十九年所說法為一代時教一代謂佛之一生也時教謂因時施教也既是對機而說因時施教因之經教遂有半滿權實漸頓偏圓之異故大涅槃經中喻一代時教之相狀或如乳或如酪或如生酥熟酥以及醍醐也是之謂教相譬如乳酪等等名相雖異而補身益人之妙用則一經教亦然雖不無半滿偏圓等等名相之異而其宗旨在於明心見性則一也此以相為言之深意明其不可拘執乎不一之相仍應會歸於不異之性也然既有種種不一之相固不應拘執亦何可顢頇故古德於一切經教之教相不憚勤勞辨別而論定之雖見淺見深各因見地而異其說而意在方便學人俾得於一代時教之綱領條目淺深次第洞然心目可以循序而進耳其嘉惠後學之苦心良足佩焉是之謂判教相以上解釋判教相之名義竟庚次泛論教相大法東來以後至於晉末判別一代時教者有十八家之多然皆不傳古德箸述中間有引其說者一鱗半爪未覩其全就所引者窺之大抵粗論大綱而已自唐以來共所依循較為完備者天台賢首兩家所判是也天台判一代時教為藏通別圓四種學者名之曰四教賢首則判為小始終頓圓五種學者名之曰五教賢宗之小即台宗之藏謂小乘教也其不稱小者蓋以小乘於經律論三藏雖義不及大乘之圓滿而三藏具足若稱為小恐人疑其三藏缺而不全故不曰小而曰藏焉大涅槃經佛稱小乘為半字教大乘為滿字教者以小乘只明人空大乘則人法雙空故以半滿別之台宗之通教賢宗名之曰始教自此以往皆指大乘而言謂之通者以其經義下可通於小乘上可通於別圓也總之所明之義三乘可以共行因名曰通猶言普通也凡但言人法俱空之理者皆是觀空為大乘初門故名之曰始教也所謂別教者別即特別之義始教但觀空與二乘同故曰三乘共行因名曰通今則不止觀空且觀假有非二乘所共行矣因謂之別賢首則名為終教明行菩薩道者始雖觀空而終不住於空也總之大乘行門始終不離乎生死涅槃兩皆不住而已又復先修從假入空次修從空出假各別修行非如圓教之一修一切修是與通教圓教皆有別也所謂下別於通上別於圓故謂之別教也圓教者台宗所謂即空即假即中三諦圓融賢宗所謂理事無礙事事無礙一即一切一切即一是也總之凡經義中賅攝所謂小始終頓所謂藏通別之義者即為圓教賢宗於終教圓教之間加一頓教凡經義明一念不生當體即佛不涉次第者屬之台宗於此層非漏略也當知台宗判教分化法化儀兩種化法者教化之法門所謂藏通別圓是也此指教化時所說之義趣言化儀者教化之儀式所謂頓漸祕密不定是也此指教化時所現之事相言約佛邊言之一時說盡頓也分次而說漸也放光表法祕密也非決定說不定也約聞法邊言之聞即徹證頓也不如是者漸也隨類領解不定也各不相知祕密也又復說頓義時亦有漸義說漸義時亦具頓義此人聞之以為頓他人乃以為漸本是頓義僅得漸益雖說通教其中乃攝有別圓乃至說藏教時亦然推之其他莫不如是皆所謂祕密不定也總之台宗以為藏通別圓四教中無不有頓有漸故不另立一門蓋以化法化儀加以通五時別五時參伍錯綜以判一代時教以是之故判教之細密圓融莫過台宗然於一代時教之義理事相仍有收攝不盡處也當知此事惟佛與佛乃能究竟耳各宗祖師未到佛地雖各有見地豈能便與佛同後人惟當擇善而從可耳以上泛論教相竟即初總論已竟以下正判本經教相己次正判台宗判本經為通別兼圓賢宗則判屬始教亦通於圓皆不免拘牽名言與經中義趣未盡吻合也今欲判定本經教相若何不得不先明本經之義趣佛說此經蓋以開衆生本具之如來智慧覺性而復其本來面目者也正是紹隆佛種傳授心印之無上甚深法寶即此一點已足證明其為至圓極頓之教法矣至圓極頓故所謂通別所謂始終之義無不攝盡安得見其有通始等義遂拘牽文字顛倒其說謂其兼圓通圓乎本經主旨唯在無住無住即是不著不著所以破我見也何以故我見即是妄想執著故以如來智慧覺性為我見所障今欲顯性必除其障故唯一主旨在於無住以破我也夫智障不並立將欲開顯智慧覺性固在破除我見之障然開破一貫能破便是能開能開便是能破然則此智云何為開耶前已言之發同體之大悲是已悲智雙具即所謂阿耨多羅三藐三菩提心也此心是同體悲故廣修布施六度以滅度所有衆生同證如來智慧覺性而不著空證如來智慧覺性即是入無餘涅槃也此心是理體智故雖度衆生入無餘涅槃而實無衆生得滅度者而不著有不著有無相也不著空無不相也無相無不相正如來智慧覺性之真實相也故本經啓口即明此義且明明示之曰不應取法不應取非法此約空有二邊不著言也一有所著則我見存一無所著則我見破矣蓋滅度無量無數無邊衆生而實無衆生得滅度是無我人等相也實無滅度則雖廣行六度法而無法想是無法相也雖實無滅度而度之不休是亦無非法相也無我人等相者無人我見也法與非法皆無無法我見也換言之無我人等相所謂我空無法相所謂法空亦無非法相所謂空空亦曰重空此約一空到底言也由是觀之本經之空是并空亦空所謂一空到底一空到底即是雙遮二邊雙照二邊所謂空有不著圓之至矣豈可以但觀於空之始教相提並論乎而觀開經所言是三空之義一時並具亦即一修一切修又豈先修從假入空次修從空出假隔別不融之別教義乎且一空到底二邊不著所謂離一切相也必離一切相方為發菩提心而離一切相則名諸佛矣蓋空有一切相既離則心清淨心清淨則實相生實相生即是無明我見破而真如法身現故曰則名諸佛故曰若見諸相非相即見如來不但圓極亦頓極矣夫離一切相為發無上菩提心者以其遮照同時宛合中道也乃至菩提心亦不著是則中亦不立矣乃至曰一切法皆是佛法所謂一切法者亦復即非而是名此正台宗所說一空一切空一假一切假一中一切中至極圓融之義也而曰如來者即諸法如義又曰是法平等無有高下此又賢宗所明理事無礙事事無礙一即一切一切即一至極圓融之義也全經所說皆是此至圓極頓之義乃判曰兼乎圓通於圓一若經義有不盡圓者何耶總之全經之義莫非闡發圓頓之無住但前半多約境遣著境者一切相也六塵六根六識乃至空有雙亦雙非皆攝在內故前半之義可簡言以括之曰一切皆非於相不取因不取故皆非也皆非而不取則無明我見破而觀照般若之正智煥然大明矣後半則約心遣著心者菩提心三際心有所發有所得一切分別執著等心皆攝在內故後半之義可簡言以括之曰一切皆是於相不生因不生故皆是也皆是而不生則無明我見破淨而實相般若之理體朗然全現矣故指示云何演說中結以兩語曰不取於相如如不動也看似因不取而後不動實則必能觀不動乃可不取此義曾於前半部中發之如曰若心取相則為著我人衆生壽者是也蓋心動則取取則著相故欲不著必當不取而欲不取心當不動可見前後義本一致不過約文相不無淺深次第以方便見淺見深之聞法者耳前言本經為紹隆佛種傳授心印之無上法寶即此一點已足證明其為至圓極頓之教此非無稽之言也本經蓋屢言之矣如曰一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出又曰是經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說若有人能受持讀誦廣為人說如來悉知是人悉見是人皆成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提又曰先世罪業則為銷滅當得阿耨多羅三藐三菩提又曰當知是人成就最上第一希有之法又曰是經義不可思議果報亦不可思議夫曰諸佛從此經出曰荷擔如來當得菩提非紹隆佛種乎曰如來為發大乘最上乘者說非傳授心印乎曰經義果報功德成就皆不可思議非無上法寶乎非至圓極頓之教何足語此且明明曰諸佛阿耨多羅三藐三菩提法皆從此經出則是一切圓頓經教皆為此經攝此經能攝一切經教一切經教不能攝此經教然則至圓極頓孰有能駕此經而上之者佛語當信不可誣也今故謹遵佛旨判本經為境心俱冥遮照同時慧徹三空功圓萬行至圓極頓之大教一切藏通別圓小始終頓圓種種教義一齊攝盡其相正如無上醍醐為乳酪生熟酥之所不及也乙次釋人題姚秦三藏法師鳩摩羅什譯晉時內有各王爭政外有五胡亂華於是羣雄割據全國擾亂陵夷至於東晉之末北方久已淪為異域從無寧日前後有十六國姚秦即十六國中之一也逮劉裕滅晉稱宋而齊梁陳繼之名曰南朝北則為元魏周齊名曰北朝然後一統於隋而歸於唐斯民方得少少蘇息也姚秦建都長安國號曰秦為別於前秦苻氏故稱後秦亦稱姚秦國主姓姚故也當前秦苻堅建元九年亦云十三年有異星見於西域分野太史奏曰當有大德智人入輔中國堅曰朕聞龜茲有羅什襄陽有道安得非此二人耶於是先禮致道安法師復遣驍騎將軍呂光率兵七萬伐龜茲意在得什也龜茲兵敗光得什返至西涼聞苻堅為姚萇所弒光乃自據涼土稱三河王并留止什姚萇既弒苻堅稱帝屢請什師呂光不允萇卒其子姚興嗣位復請亦不允光卒後傳至呂隆姚興伐之遂迎什師至長安奉為國師使沙門僧䂮僧睿僧肇等八百餘人集於什師門下大興譯事時在姚秦弘始三年也吾國法運由此而盛在佛教中關繫之巨莫過於此當在西涼時呂光但以什多智計重之初不弘道姚萇亦因聞其計謀之名而請之耳姚興則信奉三寶者也凡能弘揚佛法者稱為法師經律論三藏皆通則稱三藏法師名尤隆重鳩摩羅什梵語具云鳩摩羅什婆什婆亦作耆婆父名鳩摩羅炎天竺人也家世國相將嗣相位辭避出家東度葱嶺龜茲國王聞其棄榮郊迎之請為國師強以其妹名耆婆者妻之生什兼取父母之名名鳩摩羅耆婆天竺俗尚如此其母後又生一子名弗沙提婆乃慕道苦行遂出家時什年七歲亦俱出家鳩摩羅什義為童壽謂童年有耆老之德也日誦千偈凡三萬二千言每偈三十八言自通其義隨母至罽賓禮盤頭達多為師攻難外道能折服之國王日給上供所住寺僧乃差大僧五人沙彌十人為營掃灑有若弟子其見尊崇如此年十二復隨母還龜茲遊沙勒小乘教義無不通達沙勒王請升座說法暇則博覽外道經論四韋五明陰陽星算莫不畢盡妙達吉凶言若符契為性率達不厲小檢修行者頗疑之然什自得於心未嘗介意時有須耶利蘇摩專宏大乘什亦宗而奉之遂專務方等誦中百二論及十二門等龜茲王迎請還國說經年二十受戒從卑摩羅叉學十誦律時母辭龜茲王往天竺已登三果臨去謂什曰方等深教應大闡震旦傳之東土唯爾之力但自身無利奈何什曰大士之道利衆忘軀必使大化流傳洗悟矇俗雖身當爐鑊苦而無恨遂留龜茲後於寺側故宮中初得放光經讀之魔來蔽文唯見空牒什心愈固魔去字顯遂廣誦大乘經論洞其祕奧龜茲王為造金師子座以大秦錦褥鋪之令什升而說法盤頭達多不遠而至時什正欲尋之告以大乘也因與達多辨論大小乘義往復苦至經一月餘方乃信服反禮為師曰我是和尚小乘師和尚是我大乘師什每至諸國講說諸王皆長跪座側令什踐而登座其見重如此什既道流西域名被東國所以前秦苻堅必欲得之也然呂光本不信佛雖得什師種種虐遇師皆忍受繼因言無不驗光始異之姚興少崇三寶既迎至長安因請於逍遙園譯經并令名僧睿肇等咨受什旨自漢明歷魏晉所出經論往往文滯義格什覽之多不與梵本相應遂與僧䂮僧遷道恆道標僧睿僧肇等先出大品姚興自亦持經讎校其新文異舊者義皆圓通衆心愜伏莫不欣讚興復自作通三世論以示因果之理王公以下並讚厥風屢請什於長安大寺講說新經什師能漢言也所譯經論凡三百餘卷名僧道生慧解入微特入關向什師請決廬山高僧慧遠亦每以經中疑義通書咨什什每為睿言西方重文宮商體韵以入絃為善凡覲國王必有讚德見佛之儀以歌歎為貴經中偈頌皆其式也改梵為漢失其藻蔚雖得大意殊隔文體有似嚼飯與人非徒失味乃令嘔噦姚興慮法種無嗣以伎女十人逼令受之自爾不住僧坊別立廨舍每至講說常先自說譬如臭泥中生蓮華但采蓮華勿取臭泥或有見師與女人處者莫測究竟師取針一握謂之曰若能吞得此針否若其未能何堪學我由此可知什師為宏大法不得已暫示隨緣實則處污泥而不染何可以迹相疑之耶以弘始十一年八月二十日卒臨入滅時謂衆曰自以暗昧謬充翻譯若所傳無謬當使焚身之後舌根不壞茶毗之果然所譯經論共九十八部三百九十餘卷也後有天竺人來云羅什所諳十不出一耳本經即其所譯也本經後於元魏陳隋復重譯之唐時又有兩譯本前後共六譯然古今流通唯尚秦譯至什師事實古人著述中往往言之頗多異詞與高僧傳所載不無齟齬茲略述之不及詳考也吾人觀於什師譯經之事有兩事當注重者一譯經有兩大派一即羅什一派融會全經之義以漢文體裁達之故其所譯往往字句章節不與梵文盡合而無幽不顯無微不彰東方人讀之尤為應機較易領解蓋依義不依文也校也舊版無原稿有即今人所謂意譯也一為玄奘一派拘守梵文格式不順漢文方法東方人讀之殊為格格義亦難通此殆今所謂直譯者歟夫弘揚佛法重在宣通其義耳非為研究梵文則所譯之佛經應以何派為善可不煩言而解矣二羅什以前因譯本不善不但深微之義未達即就淺近者言亦多未能圓滿其說故士大夫信佛者少自什師新譯之經論出遠公在廬山復力為宣布於是文人哲士始得漸通佛理佛法之光明乃始如日初升至唐而如日中天矣故大法東來而後直至什師方為大顯不然其時雖先有道安後有慧遠兩高僧亦未必能蔚為後來之盛何以故依據之經論未足備數未足明義故什師既是菩薩再來及門弟子如睿肇等又皆文理湛深於吾國舊學老莊六經無不通曉師弟皆非凡人故其所譯遂爾無理不達而能深入人心也自宋而後佛法由盛而衰至於今日而極而國亂人苦無異晉時彼時有什師師弟之宏揚佛法由此而大興人心由此而改善國政亦由此而漸獲太平然則欲世事太平先當人心良善而欲人心良善先當佛法宏興也明矣一觀今日之情勢為何如耶不但世事紊亂已也佛法中亦復紊亂至極無他未明佛法之真實義故耳是故欲大興佛法先當了解佛法之真實義而欲了解真實義先當弘宣紹隆佛種之金剛般若是在吾輩之羣起而荷擔之矣什師譯經先從大品般若始則欲荷擔無上菩提法當從金剛般若始不尤彰明較著也哉敬以此願普皆回向案前玄談係補講之文初講時未說玄談先說要旨雖似重出然為江老居士親筆因附於後抑為好略者所樂聞也金剛般若未說玄談因聞者茫然故然要旨不可不說括以八字曰理顯三空觀融二諦先從苦說起所謂三苦八苦苦由業來業由惑生所謂見思惑也因詳說之而惑之本則為我見我見除則諸惑不生不生則無業繫之苦所謂了生死是也金剛堅利喻般若能斷惑故本經宗旨唯在破我我執之粗者為四大五陰細者則取法或取非法凡有所取便是我執未盡故須重重空之即無我相無法相亦無非法相是也此之謂三空法字義廣事事物物皆在其中四大五陰亦事物之一也故約粗細分言之則為人我相法我相而約有相言則同屬於法故人我法我可合而為一此一切有相之事物世俗眼光莫不認為真實故名之曰俗諦諦者真真實實之意殊不知凡所有相皆是虛妄言其雖有而虛有而不有作此觀者名為假觀非法相者約一切法之性言相假而性真以相由緣生性乃不變故知是真故名之曰真諦作此觀者名曰空觀以性本無相故名空也然若取此空相乃是偏空非大乘之第一義空亦名勝義空何則譬如虛空雖本無相而萬相森羅且必萬相森羅乃成其虛空須知性是體相是用有體必有用故有性必現相但相不可著著則逐相而昧性逐用而昧體矣然亦不容斷滅相斷滅相則雖證體而有何用且亦不成為體以決無無相之體故也故大乘之義必作如是觀乃名空觀空而不空如是則二諦之觀融矣融則為中道觀之第一義諦矣非二諦外別有第一義諦亦非假空二觀外別有中道觀經中作如是說者名為遮詮蓋以遮遣為說也若法華經等說三諦者則是表詮乃以表顯性德之二邊不著二邊雙照為說者遮詮則是說著有不是著空亦不是為說兩邊俱遣則兩邊融矣般若正以遣執為宗故只說二諦須知凡夫病在處處著故妄想多必當先用遣蕩功夫而後性德乃能彰顯故世尊先說般若後說法華也此義極當注意又大乘佛法徹上徹下切不可高推聖境以為此是出世事與世法毫無干涉則辜負佛恩當知三空二諦不明即做人亦做不好因暢說其理以上分作三數座說之
