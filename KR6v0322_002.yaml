body:
  text: 震旦清信士勝觀江妙煦遺箸甲次別解文義分三乙初序分次正宗分三流通分義因文顯且觀照般若實相般若皆因文字般若而起則經文中一字一句其不能不考訂明確也審矣蓋本經讀誦廣遍因之由明迄今流通於世者異本甚多往往傳寫訛奪或意為增減各是其是幾令人無所適從煦生也晚幸值晉隋及唐如僧肇智者慧淨諸大德經疏歸自海外而唐人寫本如柳誠懸諸人所書閟在敦煌石室者亦發現於世煦得藉以互訂參稽考其真而正其謬此實希有之遭而亦後學者之責也既別成校勘記一卷附刊經後若夫字句異同雖一字之出入而關係經義甚大者今皆一一隨文指出明其義趣孰正孰訛較然可覩焉讀者詳之經文大分三科一名序分二名正宗分三名流通分一切諸經莫不如是如是分判起於東晉道安法師即淨土宗初祖廬山遠公之師也此說初起聞者疑之嗣就正於東來梵德乃知西土於一切經亦復如是分科遂翕然悅服成為定則矣如本經自如是我聞至敷座而坐是為序分時長老須菩提至是名法相為正宗分須菩提若有人以滿無量阿僧祇世界七寶持用布施至信受奉行則流通分也乙初序分分二丙初證信序如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱此證信序又名通序諸經通有故亦名經後序佛初說經本無此序至結集時始加入故亦名遺教序佛將涅槃阿難尊者欽奉遺命一切經首當置如是我聞一時佛在某處與某大衆若干人俱等語故命置如是云云者證明是佛所說以起信故故曰證信序也大智度論謂此科之文為六成就蓋凡結集一經必具六緣乃克成就云何六緣一者如是信成就也二者我聞聞成就也三者一時時成就也四者佛主成就也五者在某處處成就也六者與比丘衆若干人俱衆成就也六緣既具則說法之主說法之時說法之處聞法之衆及結集人負責證明自所親聞凡足以成就衆信者一一皆備故曰六成就也初曰如是者不異為如無非曰是凡人相信則曰如是不信必曰不如是今結集者一啓口而鄭重言之曰如是所以明其言言如佛所說辭義無謬也校也舊版無據原稿補則足以信今而傳後矣故曰信成就也華嚴經曰信為道元校元舊版作源經及原稿作元功德母長養一切諸善法信乃入道初門故列在最初次曰我聞者我阿難自稱特稱我者負責之詞且以明其自耳親聞而非傳述上承如是下復詳列同聞之衆又以明其亦非私聞也則如是如是信而有徵故曰聞成就也世尊成道之日阿難降生至出家時佛已說法二十年因請佛將草年前說均為補說阿難復得法性覺自在三昧能於定中徹了一切法故結集法藏必推阿難亦是佛所親許如法華經曰我與阿難於空王佛所同時發心我好精進遂致作佛阿難常樂多聞故持我法藏是也結集時阿難登座身光如佛衆疑世尊重起說法或疑他方佛來或疑阿難成佛阿難啓口便曰如是我聞云云三疑頓斷世尊蓋懸知必有此疑故令一切經首皆置如是等句耳結集之事經律論中有種種說或曰小乘三藏皆阿難集或曰優波離集律阿難但集經論或曰論是大迦葉自集又謂論為富樓那誦出此名五百結集亦名第一結集時為世尊入滅之年地在王舍城外畢波羅窟阿闍世王為外護大迦葉尊者為上首或曰五百衆或曰千衆或曰八萬四千衆又稱為上座部結集以大迦葉為一切僧中上座故也結集起於其年安居初之十五日或曰安居三月結訖或曰四月乃訖或曰其年十二月王死大迦葉亦入狼跡山大衆便散當是之時又有不能預會之學無學衆數百千人欲報佛恩去窟西北二十里別集經律論及雜集藏禁咒藏為五藏因其凡聖咸萃謂之大衆部結集此皆佛弟子非佛滅度百年後之大衆部也婆修婆師羅漢為上首亦阿闍世王為大檀越種種供養此見法藏經西域記等書其後更有三次結集一則佛入滅百年許耶斯那一作耶舍陀一作須那拘長老為上首集七百聖衆長老離婆多與薩婆迦問答斷論專為律藏嚴淨非法是名第二結集一在佛入滅二百三十五年阿育王時目犍連帝須為上首集衆六萬妙選千人帝須造論以破外道邪說是為第三結集最後則在四五百年許迦膩色迦王時集五百羅漢五百菩薩迦㫋延子為上首馬鳴菩薩造論經十二年成毗婆沙論百萬頌以釋經譯出者其一部分或曰世友菩薩為上首造三藏論各十萬頌是為第四結集也或校或下舊版有曰字原稿無佛在世時已有結集如目乾連造法蘊足論是然此不過一部分撰述若召衆集會作大規模之結集實起於大迦葉阿難諸聖衆也大乘結集約有兩說一謂佛滅七日大迦葉告五百羅漢鳴椎遍集十方世界諸阿羅漢得八萬八千衆於娑羅雙樹間而使阿難升座分集菩薩聲聞戒律三藏其菩薩藏有八胎化藏為第一中陰藏第二摩訶衍方等第三戒律藏第四十住菩薩藏第五雜藏第六金剛藏第七佛藏第八云見菩薩處胎經一謂文殊彌勒諸大菩薩將阿難於鐵圍山結集大乘三藏見大智度論至於密部亦有兩說或謂盡阿難集或謂金剛手菩薩為正阿難為伴後說蓋據六波羅蜜經經中佛將諸法攝為五分告慈氏菩薩曰我滅度後令阿難陀受持所說素呾纜藏此云經藏其塢波離即優波離受持所說毗奈耶藏此云律藏迦多衍那受持所說阿毗達磨此云對法即是論藏曼殊室利受持所說大乘般若波羅蜜多其金剛手菩薩受持所說甚深微妙諸法總持門是也表法表法者銷歸自性也聽經聞法重在將經文銷融一一歸到自己本性上體會方得受用此段文本是境緣事相尚可銷歸自性則向後經文可以例知推之若對於一切境緣皆能如是領會則受用無窮矣注意注意如者如如不動謂當人本具之性體是者當下即是一切凡夫雖此性當下即是而生滅剎那不停并不如如者何也我執為之障故耳故必破其小我之執而會歸於大我大我者所謂一法界即心佛衆生三無差別常樂我淨之我也此中我字當如是會聞者返聞聞自性也將欲會歸必當返聞不能向外馳求背覺合塵也一時者所謂十世古今不離當念亦即三際心不可得當如是領會也上文我字是令領會一法界則空間之障礙除此一時字是令領會無三際則時間之障礙亦除本來性體如是如是當如是返聞也凡夫忘其本來久矣今欲返照須得方便六根中惟耳根最為圓通所謂十方擊鼓十方齊聞於性之本無障礙較易領會故令從耳根入以耳根具足千二百功德也千二百不過表其圓滿無礙因十方之綱只是四方四隅及上下皆由東南西北開出故為餘六之綱此約橫說三世則約豎說橫豎交參為十二表其無盡曰千二百也與三世相乘則為十二百倍之則為千二百佛者自性天真佛也雙遮雙照中道圓融自性本如是是為自性之舍衛國戰勝五陰之魔而紹隆佛種是為自性之祇陀太子莊嚴福慧功德之林是之謂樹捨父逃逝之子今返家園承受父業衣裏明珠不勞而獲是即自性之給孤獨園也大者大悲大願比丘者遠塵離垢衆者理事和合千二百者圓滿耳根返聞之功德也五十五人即十信十住十行十向四加行十地等覺五十五位也蓋謂如如不動之本性當下即是果能橫豎無障如是返聞則自性天真佛便如是而在而與大悲大願遠塵離垢理事和合圓滿返聞功德之五十五位菩薩摩訶薩為伴侶矣則靈山法會儼然未散且謂在靈山親聞妙法也可即謂靈山在此寸心也亦無不可何以故自性天真佛與釋迦牟尼佛已心心相印故光光相照故則已見證信序之境相為非相而見如來故諸善知識此之如是非對經本則如是不對經本便不如是亦非在此講經聽經之座則如是離座便不如是更非在法會如是出法會外便不如是當於一切時一切事一切境皆見諸相非相則動靜一如無往而不是矣珍重珍重丙次發起序爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐佛為出家制三衣一名安陀會此名五條翦布為方塊縫而聯之如田故名福田衣五條者方形大九條則方形漸小亦名著體衣作務及坐臥著之一名鬱多羅僧此名七條講經說法則加於五條之上著之故又名上衣五條又名下品七條又名中品九條又名上品若居稠人廣衆或入大都會以及王宮則著九條者梵名僧伽黎亦名大衣今將入城乞食故特著大衣也三衣總名加沙加沙者雜也非但以色有青黃赤黑紫為雜也此依梵網說他書或但說青黑赤或但說赤或曰赤衣上加青黑等點以不用正赤色或兼青或兼黃或兼黑或兼紫故不但赤非正赤即青黃黑紫亦非正青正黃正黑正紫是之謂雜如此說法係博采衆說而融會之知其乃是如此古無如是明白說者故赤而偏青則成黑泥之色故謂之披緇赤而兼黃則謂之木蘭色也紫色亦是赤兼黑而成皆非正色故又謂之不正色壞色染色所以如此者取其與在家人別亦示不住於色之意增一阿含云染作加沙衣味為加沙味故加沙訓雜最妥如此之色則暗淡無光彩亦是不炫耀之意著衣持鉢乞食等等皆戒律制定世尊如此即是本身作則教人持戒也鉢等皆如常說乞食有多義略言之降伏我慢故不貪口味故這家布施甜他家或布施鹹故名加沙味專心修道故以上就出家邊說令見者生慚愧心故出家本為度衆生欲度衆生須先斷惑斷惑必須苦行使一般人見之而生慚愧曰以度衆生故而自苦如此我輩乃如是之貪口腹圖安逸乎庶幾道心增長俗念減少則乞食之有益於衆生也大矣豈但令人布施種福田而已故乞食便是出家人修極大之福古德因慮信心不多必遭毀謗不得已置田自種已違佛制已極痛心安可如今人所言更要比丘兼營他業則又奚必出家為破壞佛法大大不可欲佛法大興非行乞食制不可如曰東方不可行今日不能行則暹羅至今猶遵佛制而行安見今日東方不可行哉但須信心者多然後能行耳敷座而坐將以入定也照規坐前尚有經行今不言者示用功要緊不可片刻偷安之意說此大經而發起於日用尋常之事殊為奇特故善現啓口便歎希有然奇特實無異尋常故善現繼之而曰善護念善付囑也可見此文關係全經理極幽微而親切若草草看過豈不辜負今開十重略明其義前四重約法以明後六重約教化以明一示現著衣乞食奔走塵勞儼同凡夫者佛不住佛相也即是顯示佛之無我相全經宗旨在於破我今示現無我不說一字亦即示佛之無法相也雖不說一字而實示以無我法又所以示佛之亦無非法相也三空之理徹底全彰矣此之謂善付囑二如上所明是大智也修菩薩行必應悲智具足故詳談時啓口便令應度所有一切衆生而今之示同凡夫者四攝中之同事攝也乃我世尊大慈大悲不捨衆生而本身作則為諸菩薩摩訶薩作榜樣耳此之謂善護念綜而觀之以大智而行大悲空而不空也因大悲而顯大智有而不有也空而不空謂之妙有有而不有乃是真空豈非即空即假即假即空二諦觀融宛然中道之第一義諦乎是則於尋常日用間已將理顯三空觀融二諦之全經要旨合盤托出矣此之謂希有也三佛說他經往往放光動地以為發起示一切諸法皆自般若正智而出即法法莫非般若也前說般若中亦曾放光動地者示般若正智之能拔住地無明也今第九會說金剛般若又不如是者所以示并般若法相亦不著也故本經曰佛說般若波羅蜜則非般若波羅蜜須知并般若而不著乃為般若波羅蜜耳此不取於相之極致也四未說本經前數十年中日日如此示現既說本經後直至涅槃數十年中亦復日日如此示現可見示現云者他人見之云然耳佛無是念我為大衆作此示現也蓋無一剎那間不在二諦圓融大空三昧中他人所見之示現云云皆從大空三昧中自在流出耳佛則行所無事初無容心也此是如如不動之極致全經千言萬語歸結處則曰受持讀誦為人演說云何為人演說不取於相如如不動可知此八字為全經之扼要處亦即為學人受持演說之扼要處今於日用尋常即是顯示金剛般若之扼要可不謂之希有善護念善付囑乎上來約法以明發起序之義竟五一切衆生同具佛性即是人人本具有法身如來然其法身如來藏而不顯所以藏而不顯不謂之如來但謂之如來藏者以其奔走衣食背覺合塵久已忘卻本來故也今以法身如來示同凡夫奔走塵勞者無他欲令一切塵勞中衆生各各回光返照其本具之如來藏耳六博地凡夫障深業重今欲返照非善為啓迪勤加熏習不可今說此經而發起於乞食等事者指示衆生受持此經當視同家常茶飯一日不可離也如是久久熏習庶幾信心增長於無明厚殼中露出光明來七然而最上乘經甚深微妙今得見聞受持而欲領解如來真實之義非具有相當資格亦莫得其門而入本經云後五百歲有持戒修福者於此章句能生信心以此為實信者入道之門也以此為實者解其真實義也可見解其實義乃為實信上文問生實信今答曰能生信心以此為實是明明告以能生信心由於以此為實亦即實解乃是實信實信者別於悠悠忽忽之信也而實信則由於持戒修福然則欲入此門持戒修福顧不重歟何以持戒修福能生信心以此為實其中關係理甚精微俟當文詳之今著衣持鉢乞食等事皆佛制定之戒律依此而行便是持戒而乞食則令一切見者聞者生慚愧心增長道念不但令行布施種福田已也乃是修福金剛般若發起於持戒修福者正指示衆生以起信入門之前方便也八乞食等等持戒也敷座而坐將以入定也由戒生定由定生慧故序以為說金剛般若之發起者又指示衆生以無漏三學一定之程序以明持戒修福能生實信而入門矣然欲般若正智現前又非修定不可也九修行之要要在理事雙融靜中養得端倪更當於對境隨緣時勤勤勘驗古人謂之歷事煅心此是修行最要一著二邊不著之理必須於吃飯穿衣時領會必須於尋常日用中做到庶幾乎達於動靜一如則無往而不是矣此又般若發起於乞食等事之微意也十尤有妙者此發起序即是的指塵勞中人以下手方便也既為夙業所牽落在臭皮囊中奔走衣食其孰能免為之逐末而忘本固不可若因擺脫塵勞不得而生煩惱又奚其可道在善巧利用其環境則何處不是道場哉每晨著衣出外各勤其乞食之職務務畢即歸應酬等不相干事可省即省此還至本處四字急應著眼歸後即將飲饌洗濯等等應行料理收拾之事完畢即當靜坐攝念觀心此敷座而坐四字尤應著眼也今人終日忙碌應酬既多歸後又不攝靜縱令念佛誦經功課不缺而此心從未少用靜攝之功所以儘管念誦儘管妄念紛飛有何益處又於不著相及校及舊版在後非法下並於此下九字加以括弧均誤茲據原稿改正不著相乃是法與非法二邊不著等道理從不留心體會所以修行多年依然見境即遷隨緣便轉腳跟一點立不牢自己即毫無受用甚至大破戒律無所不為自以為不著法相殊不知早取著了非法相矣自己墮落又牽引無數善男信女一齊墮落此皆由於從未攝念觀心從未於不住相及二邊不著之要義體會了解以致如此豈不可憐故此中還至本處敷座而坐八字正是吾輩奔走塵勞中衆生的頂門針座右銘以此為發起正的示般若不是空談得的須要依文字起觀照刻刻不放鬆事事勤勘驗方許有少分薦得上來約教化以明發起序之義竟總此十義以為發起不但無上大法之理事全彰并修行者預備之方入手之法亦盡在裏許真希有也若不一一領會如法而修豈但辜負護念付囑的希有世尊哉并辜負此希有之發起序矣爾時正當說聽具足機緣成熟之時也世尊別有十號總稱世尊因具十號之德為世尊崇故稱世尊此依大論十號者一如來諸法一如為如不來而來為來此約性體表德二應供應人天之供養此約大悲大願表德三正遍知知一切法即假即空校上四字舊版作即空即假即中茲據原稿改正莫非中道一空一切空一假一切假一中一切中無偏無倚寂照同時為正三諦理智圓融無礙智周校周舊版作圓誤沙界鑒校鑒舊版作量誤徹微塵為遍此約寂照同時校上四字舊版作理智茲從原稿表德四明行足有二說大涅槃經說明者得無量善果指阿耨菩提行足者能行之足指戒慧此中即攝定謂得無上菩提由乘戒慧之足此約修因剋果表德大論說明即宿命天眼漏盡三明行指身口意三業唯佛三明之行具足約此義言是校上五字舊版作此茲從原稿此約神通表德五善逝猶言好去謂入無餘涅槃所謂生滅滅已寂滅現前也此約斷證表德六世間解一切有情非有情事相無不解了此約後得智表德七無上士在一切衆生中佛為無上此蓋即位表德八調御丈夫或以柔軟語或以苦切語善能調御丈夫使入善道無問男女僧俗如欲遠塵離垢非具有大丈夫氣概果決堅定之心志不可如是之人唯佛能調伏而駕御之此約教主表德九天人師為人天之表率譬如日光遍照無不蒙益此約普利表德十佛自覺覺他覺滿名佛陀耶此約究竟覺果表德其他經論或合應供正遍知為一曰應正遍知或合善逝世間解為一或合無上士調御丈夫為一或合佛世尊為一種種不同蓋因經言佛具十號故以合為十數為準唯大論從第一如來至第十佛分為十數而以世尊為十號之總稱似乎最為得宜食時三世諸佛定規過中一髮即不得食今謂食時將到宜先往乞也藏律中言食時其說不一今且述其一說丑寅卯為諸天食時是名初分或謂寅卯辰為初分圭峯纂要依此說辰巳午為人間食時是名中分未申酉為畜生食時是名晡分戌亥子為神鬼食時是名夜分蓋謂各道衆生多在此時或宜於此時就食非謂一定不移唯佛法制定過午不食用意深廣如律中說乞食之時大約在辰時左右以太早太遲不能得故防無所施致惱他無所獲復惱自也著衣佛制三衣一安陀會義為中著衣襯體所著也行道謂修行時或作務可用校此句舊版作謂修行行道或作務時可用茲從原稿即是五條名下品衣二鬱多羅僧譯義曰上衣亦名中品衣即七條也亦可入聚落或說法若遇大衆集會宜著大衣三僧伽黎義為衆聚時衣即大衣也又名上品衣亦名福田衣即是九條乃至二十五條若入王宮王城聚落凡大衆集會威儀嚴肅時處或授戒說法乞食等應著此衣自五條至九條皆謂割截布成方塊縫而綴之條數少則方塊大條數多則方塊小小則密密如田之界畫分明故惟九條稱福田衣十條以上則因身量有魁偉者衣量亦隨而寬博故條數增多耳天竺寒地三衣許重著東土因寒冷及習慣故多就普通衣上加而被之故無重著之風惟喇嘛中有之三衣統稱加沙加沙梵語依色立名謂色之不正壞濁者故引伸之雜味亦名加沙昧不正者意明雜色雜則色壞而濁矣所以黑須如泥青當似銅青舊銅色也赤則或赤多黑少曰木蘭色川中有此樹日本名香染色丁子香所染也即天竺所謂乾陀色或赤黑相參如紫寄歸傳曰或用地黃屑或荊蘗黃等研赤土赤石汁和而染之總之不許用青黃赤黑紫之光鮮正色須兼雜色令帶暗濁四分律云一一色中隨意壞是也若縵條衣乃沙彌沙彌尼之衣謂漫漶無條相也大僧無三衣者可通用優婆塞等亦許於禮佛等時暫爾借著不得常披佛法東來之初出家人未知割截之製但著縵條而已經歷百八十七年之後乃始知之持鉢梵語鉢多羅此翻應量器謂食應其量勿過大以制貪亦曰體色量皆與法應體限鐵瓦等製不許木製以外道所用故易垢膩故色取朴素量如上說省曰應器乃謂賢聖應供之器也釋迦成道四天王取龍宮供養之過去維衛佛紺琉璃石鉢化而為四各持一以奉獻世尊復合四而為一持以乞食也入舍衛大城園在城東南五六里故曰入城城周六十餘里內城居家九億地廣人稠故稱大乞食佛制不許出家人用四種方法謀食養命一者種植樹藝名下口食觀察星象以言休咎曰仰口食交通四方豪勢曰方口食卜算吉凶等曰維口食統名不淨食邪命食唯許乞食名正命食乃出家之正道也何謂正道折伏我慢故不貪口腹故專意行道故令一切人破慳增福故至佛自乞食準纓絡經含有多義如使一切人不生憍慢令一切障礙衆生皆得見佛獲益垂示出家人不應蓄積故於其城中次第乞已次第者逐家依次而乞不加揀擇乞已者或儘鉢滿或止七家非謂次第乞遍一城也連下句言之乞已即還不少瞻顧也還至本處由城還園飯食訖飯者吃也如論語中飯疏食之飯訖者畢也寶雲經言乞得之食分作四分一分擬與同梵行者一分擬施貧病乞人一分施水陸衆生留一分自食十二頭陀經不言與同梵行者各有用意宜合而行之不言者以皆應自乞今言者以或有他緣不暇乞者故今於梵行貧病二種皆言擬與擬施明不一定有則與之若水陸衆生則一定應施故不言擬耳收衣鉢不收則未免罣念不能安心修道洗足已為護生故跣足行乞印土常著革履易傷生命恐著塵染故須洗之連下句言事畢即修觀以道為重也敷座而坐敷座者敷展也座坐具也行住坐臥四威儀中行易掉舉住易疲勞臥易昏沉修行者唯坐為勝故出家人多有不倒單者結跏趺坐為佛門常式故略不言跏趺有四益一身心攝斂速發輕安二能經時久不令速倦三不共外道彼無此法四形相端重起他敬信以上自著衣至而坐皆我佛慈悲曲為大衆以身作則耳世尊初不必如此也何以言之如纓絡女經說化佛身如全段金剛無生熟二藏涅槃經云如來之身非雜食身何須乞食而示乞食者除上已舉使一切人不生憍慢三義外無非為修行人垂範既不須食又云飯食訖不知究竟食否此有二義一若竟不食施者福不得滿佛慈令他滿願亦常隨衆而食二有說食欲至口有威德天在側隱形接至他方施作佛事此蓋佛既示食令施者福滿而又以神力移作佛事是食與非食二義無礙矣又阿含經說佛行離地四指蓮花承足原不必洗而今一一示現如是等事相豈非曲為大衆作模範乎上來所說頭一段不過是依文銷義第二段說的作人模範云云亦為普通之義最要緊的是要明了本經為何序此等事相作為發起呢當知此中大有精義這正是親切指點要人向行止動靜中體會試思如來為度衆生故非生現生示同凡夫何日不穿衣吃飯即何日不是以身作則為甚麼各經之首多序放光動地今欲宣說一切法的總持出生諸佛之金剛般若大法卻偏偏序此一段日用尋常的事做發起奇不奇妙不妙奇妙不在奇妙處奇妙是在粗淺處要知道極平常的事與極高深的理是有密切關係的阿古今諸家或看出是戒定為發起或舉如如不動的景象為發起或謂日用事不可等閒看過或曰著衣吃飯即是放光動地為發起各有所見各具其妙茲酌採諸說更從針對經文的要旨方面引證揭明使人較易體貼義蘊既深一時言之難盡姑概括為十重大略說之一般若是長養慧命紹隆佛種的要法猶之衣食是世人護持色身承先傳後的要事今舉此著衣乞食等等為發起正令發大心的人明了這般若法食是不可須臾離的所以經云受持讀誦廣為人說則為荷擔阿耨菩提又云當知是人成就最上第一希有之法又云是經所在之處即為有佛若尊重弟子從這幾句經文的反面一看便可懍然是同衣食一樣關係甚大不可暫離的了故以之為發起二經云後五百歲有持戒修福者於此章句能生信心可見持戒修福是般若入道之門乞食是戒律制定的今示著衣持鉢次第行乞既是引導衆生持戒亦是普令衆生修福經頌所謂法身本非食應化亦如然為長人天福慈悲作福田是也世尊日日乞食便是日日發起衆生的堪入般若的信根今於欲說金剛般若之先即序以為發起何等親切三圭峯大師說戒能資定定能發慧故以戒定發起須知慧無戒定乃狂慧非正慧乞食是戒敷座而坐所以入定既示戒定事相然後說甚深般若豈非顯示三學的一定程序令人知所先後乎又經中但說慧特於發起中補足戒定佛菩薩為度衆生懇切周到如是如是四一切學人能向衣食起居塵勞邊鍛煉便是降伏妄心最要之方蓋貪求衣食不憚塵勞固是著相即厭其塵勞而生煩惱亦是著相必須對境隨緣既不迷亦不煩乃是安心之法故經云一切法皆是佛法又經中多就布施等度上說降住亦是此意試思吾輩凡夫那一個不要衣食擺既擺不脫貪又貪不得又既發大心學佛布施度生等事皆是必須學的要不在一切皆如上用功則一日到夜不是著有便是著空何時方能討一個自在就是一句佛又何能念得好宏法利生等事亦必學不好今在穿衣吃飯上發起二邊不著一切皆如的甚深般若令人領會得即在此等事相上用功既不可執有昧空而取法相更不可離有說空而取非法相真大慈大悲也五如來的隨順凡夫著衣乞食者是明不著果位之相也正是經中所云如來者即諸法如義是也須知果如因亦如所以應離一切相發阿耨菩提心而降伏之道盡在其中矣以果德之不著相發起因行之不應著相真所謂因賅果海果徹因源妙極妙極六金光明最勝王經有言五蘊即是法身五蘊乃緣生之幻有法身是寂照之真空這就是叫人要即幻有見真空非斷滅相本經種種遣相而歸重在於法不說斷滅相亦是此意當知所謂第一義空者正須不取著復不斷滅方稱第一義此是學般若的緊要之點而如來以法身示現凡夫衣食等幻相正是要凡夫就各人幻相上體認本具之法身但勿逐妄何須妄外求真倘或執真可是真中起妄經中如應無所住而生其心應生無所住心凡夫非凡夫衆生非衆生等等莫非說明不取不斷不即不離之義然則本經之發起可謂切要極矣七如來示現乞食而乞已即還本處吾輩凡夫只知忙於謀食終日終年向外馳求從不知返照本性又如來示現食已即收拾一切攝靜入觀吾輩凡夫則飽食以嬉躁動不息幾曾靜得片刻更何能修觀耶須知般若慧力從內照生而內照必先靜攝今用此等句發起正指示吾人一切世緣來則應之事過便當收拾擲過一旁即復返觀靜照背塵合覺方堪發起般若本慧也注意注意八一部金剛經要旨惟在云何降云何住然而談何容易達天法師云一有所住覺心便亡才欲施降妄心愈熾是須無降而降無住而住所謂無降降無住住云何下手耶今觀世尊穿衣吃飯行街過巷洗足敷座瑣瑣屑屑並非一時如是度生四十九年便四十九年如是以金剛身無須飯食無須洗足且無須學定然而為衆生故日日行之行所無事真是平等如如這一段本地風光便是降心住心的大榜樣也吾輩必當如是修學凡遇境緣來時皆須如教而行行所無事行所無事便是無降而降無住而住如此庶可契入般若深旨乎九上來所說無降而降無住而住恐猶未了請復說之世尊迥不猶人何以示現凡夫行徑而了不異人當知因其了不異人所以迥不猶人耳吾輩當從此點上體會且向自身上體會何以故雖是凡夫而本具有如如佛性故何以故不取於相故吾輩學般若當從不取於相用功不取者謂不離一切相而不著若偏以無相當不著是又取非法相而為斷滅矣故經云若見諸相非相即見如來諸相非相者雖有諸相而不著之謂又云不取於相如如不動惟其不取所以得見一切法相非法相不取便是無降而降無住而住也經首以不取相為發起其旨深矣十綜合以上所說可見發起一序全顯第一義空你看如來示同凡夫者為利他耳無我相也般若妙法任運由瑣屑事相上自在流出無法相也無須乎食而行乞食乃至示現洗足敷座等以不言之教護念付囑一切發大心者亦無非法相也於此薦得真空理智宛然心目發起之精孰逾於此諸君須知所以就發起序上說而又說不敢憚煩者無他欲使諸善知識知得云何起信并明了三空理智隨事可見好向穿衣吃飯時行止動靜時隨時如是觀照當下可得受用耳然後方知一部金經真是除苦厄的良方入佛智的捷徑也尊重尊重乙次正宗分分二丙初當機讚請次如來讚許丙初又二丁初禮讚次請法丁初又二戊初具儀時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言補時即指世尊乞食還園之時此時字最宜著眼下文希有之歎即跟上文著衣持鉢一段文而來結經者安一時字含有無窮感慨在裏許世尊著衣持鉢乞食日日如此大衆見如不見此次機緣成熟乃為須菩提一眼覷破般若大法世尊不常說即說亦必待機緣成熟方可此真希有難逢所謂千載一時也長老齒德俱尊之稱唐譯曰具壽惟顯年老魏譯曰慧命唯顯德長羅什順此方文義譯為長老兼含二義須菩提亦翻空生亦翻善現善吉彼之俗家富有財寶當彼生時家中庫藏金銀悉空故名空生既生七日庫中財寶復現故名善現又相師占云此子善吉不須顧慮故名善吉初生時庫藏空是表顯空理其後財寶復現表顯空非偏空也西域記云須菩提本是東方青龍陀佛影現釋迦之會示跡阿羅漢輔助釋迦牟尼行化在佛門中解空第一空而不空方是真空方是第一義空諸弟子不若須菩提之領悟最深故般若會上必以須菩提為當機代大衆請問也須菩提為大衆啓請含有四要義一普通大衆日日見世尊著衣持鉢與尋常乞食比丘相同茫然不知用意何在故必待示跡聲聞之須菩提為之啓請二此已至第九會世尊在尋常穿衣吃飯時善護念善付囑般若大法將第一義空最深之理和盤托出大衆當然不能明瞭非須菩提亦不能為之啓請三佛門長老不止須菩提一人然解空不如須菩提故當機請法非須菩提莫屬四會中尚有菩薩摩訶薩何不啓請而讓須菩提單獨請問蓋佛說般若正為阿羅漢兼為菩薩若菩薩啓請則阿羅漢或將疑此為菩薩之法與我們無涉今讓須菩提啓請則可防此疑須菩提啓請完全為大衆起見下文開口即說善男子善女人故在大衆中一語含有種種意義在內即者便也有迫不及待之意世尊敷座而坐大衆亦然故須菩提即從座起從跡上講如此若從本上說須菩提早已成佛世尊說般若已經八會何以必待第九次說金剛般若時方從座起而請可見凡事必需時節因緣四者俱全方能湊合世尊說般若是時說金剛般若是節有種種因有種種緣至此因緣具足須菩提乃當機請問此大法也袈裟在左肩故右肩可偏袒佛制袈裟平時不偏袒必恭敬時方偏袒凡人作事必用右手行則右足先上前此表示有事弟子服勞之意此經重在荷擔菩提弟子正宜肩此責任也禮拜時雙膝著地如懺悔則跪右膝古人名曰胡跪著地者腳踏實地表法即實際理地即實相令人證得本性合掌者兩掌相合不執外物吾人兩手東扯西拉全是塵垢今則合之即是背塵合覺偏袒至合掌是身業清淨外貌端肅謂之恭中心虔恪謂之敬是意業清淨而白佛言白是表白將自己意思表白出來此是語業清淨以上皆結經者之辭戊次稱讚希有世尊如來善護念諸菩薩善付囑諸菩薩補通常說希有歸納起來有四義一時希有如來出世曠劫難逢故二處希有三千大千世界中唯有一佛故三德希有福慧殊勝無比並故四事希有慈悲方便用最巧故以上四者是通途之說今謂希有乃正指般若波羅蜜而言世尊是總號稱呼時用之稱佛則表果德稱如來則表性德須菩提於佛之穿衣吃飯等見得諸相非相即見如來故開口即稱如來他老人家以法身如來示現凡夫此正在那裏表示不住一切相以法身如來何故示同凡夫即是不捨衆生即是護念不捨衆生是大悲而以法身如來示現即大智此大悲從大智而生是有而不有有而不有方是妙有方是不礙真空之妙有以不礙真空之妙有來護念豈不是善現跡同於凡夫正表示法身如來不住一切相金剛般若之精義完全托出此乃以不言之教來付囑不言之教是大智此大智從大悲而生是空而不空空而不空方是真空方是不礙妙有之真空以不礙妙有之真空來付囑善莫善於此矣不論護念付囑無非空有雙彰全經發揮真空妙有之精理處處可見明乎此則脈絡貫通矣希有之歎固是曠劫難逢之意然亦含有難得領會之義在內此以下文我從昔來所得慧眼未曾得聞如是之經及我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有諸語觀之皆可證明信解之不易也須菩提意謂我從昔至今方看出如來之護念付囑大衆雖不能領會世尊總是如此示現更為希有護念付囑所以俱言善者護念屬於心付囑屬於口若待起心護念則起心時方護念不起心時即不護念若待發言付囑則發言時方有付囑不發言時即無付囑均不能稱為善今以如來入城還園如如不動密示住心以身作則正是加護憶念又以食訖宴坐一念不生密示降心令衆取法正是託付諄囑動靜之間以身教不以言教隨時隨處無不為菩薩模範此真所謂善須菩提開口歎為希有良有以也丁次請法世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心補通行本作云何應住今依唐人寫經本作應云何住上文諸菩薩即指此善男子善女人而言因其發無上心即有成佛資格即可稱菩薩善者善根發無上心者非有大善根不可凡人皆有善根若無善根則不能入人道中亦不能聞此大法然若不發心則虛有此善根豈不孤負佛經中往往呵斥女人又常說女人障重不能成佛必先轉男身方可有疑及佛法平等若女必先轉男身是不平等此則未明佛理先批評佛法是大不可要之女子的確障重一有生育障礙二往往誤認愛為慈悲慈悲是平等的初無親疏厚薄愛是生死河誤用即墮入輪回佛眼中初無男女相所以說女子障重是要其特別注意不要受此障礙祇要發大心一樣成佛此處須菩提所以雙問發者生也起也謂發起上求佛道下化衆生之心期證無上果也發字貫上下文義通能所上文善男善女為能發下文阿耨等為所發梵語阿耨多羅此云無上三藐此云正等三菩提此云正覺合云無上正等正覺正覺者揀異凡外之不正以凡夫有我不能自覺外道有覺屬於偏邪非正覺故正等者揀異二乘之不等阿羅漢皆得正覺然畏生死如牢獄急於自度缺少慈悲心不能修善度生無平等心故三藐正指菩薩言正等者自覺覺他自他均等也無上揀異菩薩之有上菩薩覺雖正等然尚不如佛之覺行圓滿無上正指佛而言此善男子善女人所發者即佛之無上覺心心是靈明覺照之體在用上分真妄染淨今依菩提而發顯見是真是淨非妄染也大論云從因至果有五種菩提一發心菩提即十信位二伏心菩提即三賢位三明心菩提即初地至七地四出到菩提即八地至十地五無上菩提即如來果位今約能發心即當第一約所發心即當第五能所合論貫通初後也是知無上屬果正等正覺屬因所發之心通乎因果也應是應該此字貫下二句住是止於一處降伏是剋制攝持其心之心字指妄染而言問有三意凡為菩薩須發菩提心故先問發心初發是心不能如佛之隨緣安住故次問住心意在求佛指示方法能令此心相應而住又以妄心數起不能似佛之自然降伏故次問降伏意在求佛指示方法能令妄心自然而降發心先也然必須發大心方能修大行得大果華嚴經云忘失菩提心修諸善果魔所攝持故善男女初發心時即應以成佛自期發阿耨多羅三藐三菩提心無上者正是所求故欲求無上必須修福度生故次云正等欲度衆生應先自度故次云正覺逆言之即自覺覺他覺行圓滿也論云初發究竟二不別如是二心先心難發心菩提至無上菩提是一心非二心然初發心難故須菩提先舉發心為問住降後也有人先曾發心後時忘失此是不知真心如何安住致妄心不能降伏也故善財童子每遇善友皆啓請云我已先發阿耨多羅三藐三菩提心而未知云何學菩薩行修菩薩道是知發大心者必修大行住降正修行之切實下手處也故次問住降然此二問實在相資以覺心住則妄心不降而降妄心降則覺心不住而住也丙次如來讚許又二丁初讚印佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩補結經者此處安佛字有深意佛是究竟覺之果上文發心人正是修因欲知山下路須問過來人此安佛字即如是因如是果反之即如是果如是因善哉善哉是讚如汝所說是印第一善哉讚其善契如來本心數十年示現塵勞默默護念付囑絶未有言說今須菩提獨能見到故讚之第二善哉是讚其代衆啓請佛之苦心即要善男女發心去學然無人能請今須菩提獨能請問以完如來本願故又讚之人家不能問汝獨能問故第一善哉是讚他之大智問法不為自己而為大衆故第二善哉是讚他之大悲汝真能見到我之不住佛相而護念付囑故云如汝所說蓋如此護念付囑大衆不了唯須菩提獨能指出故印可其說也如來二句原是須菩提讚佛之語今佛極力承當謂如來之護念付囑如汝所說一點不錯是欲令衆生於如來著衣持鉢去來動靜中領取護念付囑之意丁次許說又二戊初總示次詳談戊初又二己初誡聽標宗汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心補須菩提豈有不諦聽之理佛之誡是為大衆及現在我們衆生諦者真實正確也一不可以貢高二不可以卑下倘犯此二病即不能諦聽即聽亦不能正確有人稍研求經論即自以為通曉佛學此犯貢高之病有人高推聖境以為如此大法我們如何能解此犯卑下之病貢高是慢卑下亦是卑慢如此聽經即不能真實正確是以學佛者務須免除以上二病虛心領受故云諦聽既能諦聽豈可不說故云當為汝說意謂倘若不諦聽我即不當為汝說此語是警策我們在聽經時從前知見必須一切拋開不可放在心裏善男子善女人以下三句正是標出修行宗旨舊說如是二字即指下文滅度一切衆生一段文而言如此則前後脈絡不貫況下文本有應如是降伏其心一句耶又說如是二字指發起序中世尊著衣持鉢至敷座而坐一段文而言似亦未確今謂如是二字剋指上文善護念善付囑二句而來有現前指點當下即是之義著衣持鉢一段文是遠脈善護念二句是近脈既知近脈則遠脈自通以法身如來示現凡夫塵勞之相是無我相無法相亦無非法相故善男女亦應如我之不住相而住凡夫不住於相即住於非法相一住便差妄心生滅不得降伏故善男女應在如來之穿衣吃飯上理會兩邊不著之理如是降伏之可憐苦惱衆生無論貧富一生皆為衣食忙碌無論操何職業皆是乞食朝上起來趕赴都市中做事即是入城乞食按時上工下工即是次第乞已乞食固然要緊但應事畢即還至本處凡夫之病即是為衣食故不得不向外馳求結果忘卻了主人翁不復還至本處所以工作完畢要快快回頭把心靜一靜回光返照不要做不相干的事此即是學佛之敷座而坐我們能將經文語句回到自己身上自有受用果能於尋常日用之間時時返照即是降伏即是兩邊不著即是與性體相稱而起修即念佛亦念得好己次契旨請詳唯然世尊願樂欲聞補唯應諾之詞聲入心通於如是住降之理已徹底明瞭如來之護念付囑別人未能見到須菩提獨能見到代大衆啓請住降果蒙佛讚許結經者於唯下安一然字寫出須菩提慶快生平自喜領會無差之情景然為大衆未能了解故又請問願者願望樂者好樂欲者希求若唯心願而不好樂聞或不切又能好樂而不希求聞或不深此三字一層進一層表示大衆之渴仰亦可為末法苦惱衆生表示渴仰聞字與經初如是我聞之聞字相應倘無須菩提之願樂欲聞阿難如何得聞耶聞有三種一曰聞言耳根發識但聞於言二曰聞義意識於言採取其義三曰聞意神凝心一尋義取意今聞如是住降之言必將得意忘義遺言而消歸自性可知人人本具如如不動之自性然有無明為障致妄心生滅不停故學者宜在聞字上用功返聞聞自性時時照時時聞則知心佛衆生三無差別故此聞字若作返聞功夫即能消歸自性戊二詳談分二己初約境明無住以彰般若正智次約心明無住以顯般若理體己初又二庚初的示無住以生信次推闡無住以開解庚初又三辛初明示次生信三校勝辛初又二壬初明發離相心即是降伏次明不住於相即是正住壬初又三癸初標示佛告須菩提諸菩薩摩訶薩應如是降伏其心佛告句為結經人所安凡安此句皆示人此中所言甚關緊要不可忽略讀過也諸菩薩句即指發大心之善男女言凡言菩薩摩訶薩有兩義一為菩薩中之大菩薩如稱觀世音菩薩摩訶薩是約一人而稱一為泛指多人而稱乃謂菩薩或大菩薩也發心者不止一人故曰諸諸者一切之意此中既說多人乃泛指之辭也須知此經本是最上乘則發心學此者皆為大菩薩然而根性不同雖同發大心有發得圓滿究竟者則可成大菩薩發不圓滿究竟只可成菩薩矣佛之說此亦希望人人皆要發得圓滿究竟耳何謂圓滿究竟如發上成佛道下化衆生之心則菩薩也若知發心上成下化而又知雖上成而實無所成雖下化而實無所化乃是無所成而上成無所化而下化則性德究竟體用圓滿而為大菩薩矣世間此類事甚多雖所學是無上大法而成就則甚小甚小皆由於不知如法而修發心太小故也如念佛法門本是至圓至頓之無上妙法乃僅僅只知自了則最上乘之法不但不足為大乘竟成為小乘矣所以只能往生下品多劫不能花開見佛以與佛之悲願相違不知稱性起修故也甚且并下品亦不夠只能生到疑城又須長時修行方能離疑城而生安養豈不上負佛恩下負己靈何故如此皆由不明無上大法之所以然故所以學佛第一要開智慧開智慧者就最初一步言便是明理如不明了真實義理發心不能達乎無上明理不是專在文字上剖解必須修觀云何修觀既須多讀大乘經典更須屏除外緣收攝身心若不先將此心攝在一處何能依文字起觀照故曰戒生定定生慧也戒以屏除外緣定字有淺深初下手時必應勉強攝心一處令心凝靜而不馳散乃能起觀逮至觀慧生則大定即在其中不待勉強故止觀云者止從觀來觀成自止何以故觀成則妄想悉除便是止故非以遏捺暗證為止也總之定慧二字互相生起不能呆板看成兩橛故曰如車兩輪又曰即止之觀即觀之止也止觀是學佛緊要功夫如上所說又是止觀中要緊道理不可不知初發心人何以便稱菩薩摩訶薩以其能發大心便有成菩薩摩訶薩之資格故即以此稱之一也佛之稱之者是令當人直下承當不要自失勝利此其二也世尊平等平等其視衆生本來同佛然則稱發無上心者為菩薩摩訶薩又何足異此其三也如是指下正明之文降伏其心是令妄想不起亦是使不覺者覺上文先問云何住佛之總示亦先說應如是住何故詳談時先說降伏乎此中要義當分三層明之一切衆生從來不覺今雖發無上覺心亦不過發覺初心耳其不覺之妄習分毫未除安有真心可住若以為初發覺時便見真心即此一念依然是妄想也故初發心人其下手祇有降伏古人云但求息妄莫更覓真即是此意須知吾人之心雖完全不覺而實完全為本覺之所變現所謂真妄和合名之曰識是也只要妄心分分除真心即分分顯逮至妄盡情空則以其始覺合於本覺矣初不必言住不住也此所以不言住而先言降伏者其理一也不但初發心時應從降伏下手已也自始至終亦只有降伏之功乃至成佛亦無所住須知妄想無明無明即是妄想以破為鵠修行至信位但能伏猶未破也由十信進入初住始破一分無明證一分法身即是始見一分真心十成只得一成云何可住名為住者明其不退轉於阿耨多羅三藐三菩提耳從此步步增進而經十住而十行十向四加行而後登地至於八地始稱無學無明向盡矣而十方諸佛猶復殷殷勸進應滿本願廣度衆生勿得住入涅槃由是而歷九地十地至於等覺尚有最後一分無明可見至等覺始破九分仍當以金剛智破之乃成究竟覺而仍然不住生死不住涅槃也可知位至成佛還是住而不住不住而住如我世尊之示同凡夫非住而不住之榜樣乎然則始終皆無所住只有降伏也明矣其理二也善現前雖先問住而其目光實注重於降伏蓋以欲住不得故繼以降伏為問耳否則但問應云何住足矣奚必更贅一詞而總示之既言應如是住復言如是降伏者意亦如斯此則語有先後意實一貫除降伏外別無進修方法其理三也癸二正明所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者四大五蘊衆緣和合而現生相故名衆生此衆生之一名之本義引申之則為數多類繁名為衆生今人但知引申之義而遺其本義不知本義極妙乃令觀照本不生及當體即空之理也何以言之以衆緣之和合名之曰生耳性體初何嘗生故曰本不生本既無生今亦無滅矣既是緣合現生所以緣散即滅豈非當體即空乎此約相言也若約性言性本不因此而生雖生滅之相紛然與體何涉故曰當體即空也盡其所有之衆生則數多故云一切其類繁故又云之類其類云何若卵生至若非有想非無想是也佛經中言衆生類別有以六道分者欲人明輪回之理也有以十二類生分者如楞嚴卷八說欲人明十習因六交報之理也有以三界分者欲人明其高下依止及不出色欲二事範圍之理也今亦是以三界分類而不言欲界色界無色界者以無色界尚有特殊生理須特別顯出方為徹底亦欲使人明衆生之所以不能出三界不但著色著欲之為障尚有根本障礙必應徹底了然為之對治乃能入無餘涅槃乃能滅度耳先言欲界欲界有二一上界六欲天是也四天王天忉利天夜摩天兜率天化樂天他化自在天以福德勝人故生天以尚有淫欲故居欲界以欲念較薄故但化生而無卵胎濕三生二下界人畜鬼獄是也修羅分攝天化生人胎生從天墜者畜溼生最下劣生大海心旦游空暮歸水鬼卵生以護法力乘通入空見楞嚴卷九獄化生鬼胎化二生人畜四生具此等皆因淫欲而正性命者罪重情多則愈下墜而墮地獄以次漸輕則居人道色界天以上色界十八天分初禪二禪三禪各三天四禪九天也色界亦有無想天以既有色故不攝入無色界皆是化生故僅舉卵胎濕化已攝三界盡然因色界以上之特殊生理不顯故又舉若有色若無色為言也以無欲故因定力而化生色界此其異於欲界者也以并能不著色身相故因定力而化生無色界此其異於色界者也但舉有色無色亦攝三界盡欲界以下無不各有色身也然欲天之下不止化身故必先舉卵胎溼化言之於下界之生理乃備又無色界中因定力之淺深又有特殊之生理不能不表而出之故復言若有想若無想若非有想非無想也無色界四天曰空無邊處曰識無邊處即此中之若有想色相已空故曰空無邊處無色界但無業果色以其斷欲不著色身之相故然有定果色其色微妙為色界以下所不能見故曰無色界耳粗色界濁欲界之色身既空則不執吝識在色身之內故曰識無邊處識即八識總八識而言非專指第八阿黎耶真妄和合名之為識因識故有想想謂第七之恆審思量而執我及第六之分別遍計也有想二字統攝色欲色欲界衆生莫不有識因六七識故執色身為我因執色身故起種種貪欲之想然色界以下不但有識而兼有色有欲故必先舉卵胎溼化有色言之以明其異於無色界也若無想以上則為無色界之特殊生理故必表而出之明其不但以無業果色異於色欲二界已也此即無色界之無所有處天謂第六識分別妄想無所有以常在定中故及第七之執我亦無所有以定中無思量且不執有色身識無邊處故其定力更深於前矣若非有想非無想即無色界之非想非非想天至此定力愈深第八阿賴耶若隱若現而未能轉識成智謂之有想非謂之無想亦非也殊不知前云無所有非真能無所有不過六七識暫伏彼自以為已無有耳何以故六七識轉第八識及前五識隨轉何至尚若隱若現乎且彼誤矣八識原為真心之所變現何能無所有更何必無所有但轉之可矣六識轉則為妙觀察智七識轉則為平等性智第八識即隨轉而為大圓鏡智前五識亦隨轉而為成所作智如是而後體用全彰又何可無耶總由不知佛理全用暗證不得善巧所以非想非非想縱經八萬劫長壽仍然墮落也外道皆不知性儒家亦然天命之謂性性不由天命也或曰天命者謂其法爾有之此違孔子意矣易曰立天之道曰陰與陽又曰一陰一陽之謂道繼之者善成之者性此天命為性之由來也何謂法爾有之孟子曰食色性也性中奚有食色乃無量劫來習氣種子使然耳此正誤認識為性也至宋儒周程張朱乃剽竊禪門門面話尚不足言皮毛大談性理既非佛又非孔誤法誤人莫此為甚凡先入彼等言者佛理既絶不能明孔子之真亦為之障而不顯須知孔子六合之外存而不論故專就自天降命為言雖不徹底然能令人敬天命畏天威以立人道之極故孔子實為世間大聖人可佩可敬孟荀皆未能深契漢儒專重訓詁昧於大義此猶有功羣經及其訓詁非賴漢儒考訂搜集之力後人何從明之又奚從見之宋人則別創一格自以為直接心傳而不知孔學實因此而晦其罪大矣革命之廢孔實誤認宋學為孔學耳奚止毀謗佛法之罪已哉可歎卵胎溼化先言卵生者卵具胎溼化故先言之居母胎胎中以血為養為溼本無今有為化也胎不兼卵而具溼化故次言之溼兼化而不具卵胎又次之溼生者溼地受陰陽之氣而化生以其必在溼地故曰溼生化生無而倏有不具卵胎溼故又次之此約受生之繁簡而言又卵胎溼化居先者以其兼欲色識也若有色不具欲而兼識故次之若無色不具色欲而有識又次之有色無色此約色相之粗妙而言也校也舊版無原稿有若有想正明其雖無色而尚有識想現起故又次之若無想明其六七識已伏并想不具故又居次若非有想非無想明其不但不具六七識第八識亦半伏焉故以為殿此約情識之起伏而言蓋前前必具後後後後不具前前卵胎溼化雖不盡以前後判優劣而統欲色識三者言之則又前前劣於後後後後優於前前也佛之詳細分類不憚煩瑣者并非閒文意在使知一切衆生其類雖繁不出識色欲三事其所以成為衆生者在此今發無上覺心欲令一切衆生成無上覺非斷淫欲不取色相轉識成智不可妄盡情空業識既轉則生滅心滅生死海出而證入不生滅之圓明性海矣此之謂入無餘涅槃此之謂滅度大乘涅槃有二一有餘已斷枝末無明即見思惑尚餘根本無明未斷即業識即是最初之不覺自動亦名生相無明又名住地無明故名有餘二無餘業識皆空即轉識成智之謂無明更無餘剩矣此與小乘之有餘無餘異彼謂所學已辦尚餘苦報身未盡者為有餘依涅槃所謂出煩惱障有苦依身是也盡此報身則名無餘依涅槃所謂灰身滅智是也無餘涅槃為究竟覺果之稱以等覺尚有最後一分無明未盡故也即微細業識所謂生相無明是也涅槃梵語具云般涅槃不生不滅之意謂性體也亦譯滅度亦譯無為觀此可知內典是借用向有之名其義與儒道兩家迥異矣即彼兩家亦大不同老子之無為謂因勢利導不圖赫赫之功不取赫赫之名以其絶不現有為之迹故名無為亦謂之清靜自曹參誤認清靜無為為不事事遂滋為儒者所詬曹參之時本宜休養生息雖誤會而有益晉之清談則誤國大矣甚矣真義不明之為禍烈也孔子之無為則是形容堯舜知賢善任端拱垂裳而治及蕩蕩民無能名之意入者證入也即令衆生證入究竟覺果之意滅者所謂生滅滅已寂滅現前度者度其分段變易兩重生死也此處不舉梵音而舉其義為言者一以明所謂入無餘涅槃者無他滅識色欲之生滅心便度生死海而達涅槃彼岸矣二則便於立言如下文滅度無量無數無邊衆生如換滅度為涅槃則不易明了矣此譯筆之善巧也無餘涅槃法相家譯為無住處涅槃明其既不住生死亦不住涅槃此譯與什譯各有取義皆妙至謂修行人逝世為涅槃為入滅者乃借以明其不住相而入寂世人多誤會涅槃入滅為死之專名宋儒更誤認寂滅為一事不為差之遠矣法相家言三分半衆生不得成佛即定性羅漢定性菩薩一闡提無信根是為三分加以不定性為半分云何今皆得令成佛耶須知經云佛種從緣起又云涅槃經凡是有心定當作佛又云圓覺經有性無性齊成佛道云何不得蓋佛性雖衆生本具而佛種要待緣生法相言不得成是言無種則必不成非言定性一闡提無佛性也故種性二字必不容混學性宗者往往執性而昧種如執性廢修學相宗者又往往執種而昧性皆不明經旨之過也如是指上句令入無餘涅槃無量者謂種類不限量無論根性勝劣皆度之無數者謂多寡不計數然或只度一世界一世界一劫十劫亦可謂無量無數矣而今不然乃無有邊無邊者橫遍十方豎窮三際也故無邊是總無量無數是別因其滅度無邊乃得為無量無數也實無衆生得滅度者觀照無生無得之理乃真實無非假想無也古德以五義作觀甚妙一緣生一切衆生莫非四大五蘊之假合當體即空安有衆生二同體我與衆生相雖別而性實同所謂一法界是也然則見有衆生便是自心取自心非幻成幻法三本寂所謂衆生者乃是緣合假現生相其性則本無生本無生則本無滅安有所謂得涅槃乎四無念如上三義觀之可知見有衆生見有衆生得涅槃全是妄念分別若無有念則衆生無得亦無五平等如上所說可見一切衆生本來是佛平等平等故曰平等真法界佛不度衆生也若見有衆生得滅度者便違平等法界矣總之性真實相虛妄欲成無上覺當證真實性則於一切境界當不著相而歸於性歸之於性乃為真實故約性而言則衆生得涅槃之為真實無非假想無也明矣或曰上文云應如是降伏其心如是二字正指此科然讀之實不解所謂降伏者降伏何物乎但發離相之廣大心便足以降伏乎曰此義甚精當為分析言之所謂降伏者降伏妄心也妄心者分別心是而分別起於執我故我見為分別之根今故向根本上遣除我見除則分別妄想自化矣又本科之文著重在最後一句前文皆為引起此句來因欲說實無衆生得度故先說度無邊衆生入無餘涅槃欲說令入無餘涅槃故先說衆生之類不外識色欲然則知所以成衆生則知所以度衆生知無邊衆生無非識色欲幻成之虛相則知滅其識色欲生滅之相令入不生滅乃實無衆生實無衆生得度何則衆生但為識色欲所障耳其本性原是不生不滅且與我同體何所謂衆生何所謂得耶如是觀照純熟則執我之見不覺自化何以故知我亦衆生故知當體即空故知起念則有若無於念一切皆無故知本來平等故此大乘法所以善巧乃不降伏之降伏也此中尤有要義當更為言之一妄想根深今初發覺道力微薄豈能敵之且真心妄心原是同體起心動念則全真成妄心開念息則全妄即真又何必除以此兩種原因所謂除妄假名曰除耳實無可除所謂降伏乃善巧轉移使之歸化并非敵對而除之之謂也今令發離相心者正是善巧方便大而化之耳二何故發大心便能化須知凡夫心量狹隘所以執我愈執則愈隘若發廣度無邊之心久久觀純不知不覺執情消泯矣三凡夫只知有我若令就自身上以觀無我必不能入今令從對面向寬闊處觀無衆生則心量既擴一對照間而我之亦為緣生為本寂便洞然易曉此皆大而化之之善巧法門也四見思惑之根本為我見今以轉移默化之法斷之於不自覺真至堅至利之金剛也五執我是末那識有我便有人衆生壽者等分別分別是第六識今一切不著是轉六七識也六七識轉前五第八皆隨轉而成智矣此之謂般若波羅蜜六度所有衆生成佛以遮空實無衆生滅度以遮有是為雙遮雖廣度而實無雖實無而廣度是為雙照觀遮照同時以為因則得寂照同時之果也七發廣度心大悲也觀實無理大智也悲智具足又不住生死不住涅槃之因也八約上所說大悲邊言即是修福約大智邊言即是修慧福慧雙修又是成兩足尊之因可知一切大乘法盡在裏許且皆是直趨寶所之法故本經曰一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出也九未能度己先欲度他菩薩發心所謂大悲也今觀此科之義始知度他即是度己則大悲中便有大智真善巧也十此科是令發願從來學人每苦大願發不起可依上來一至九所說者觀之悲智具足之大願當油然生矣又上科所言降伏亦含有別義蓋令發大願者當立志堅強勿生怯弱即此便是降伏其心矣此標示正明兩科中是的示吾人修功處極其親切極其緊要約言之要義有八一空生先問住次問降答乃先降次住而答住中復云應無所住可見吾人用功只要除妄何以故真心不現全由妄障妄不除盡而曰安住如如之真即此一念依然是妄想也況佛究竟證得亦不住於涅槃修因時何可言住耶楞嚴云因明照生所所立照性亡又曰知見立知是無明本是知有住便有所有所便有立有所有立便是大圓鏡中自著塵染光明何能遍照故曰無明本照性亡也所以禪宗祖師云但求息妄莫更覓真古德亦云但盡凡情別無聖解此謂盡凡情正是聖解經亦有言狂心不歇歇即菩提皆是說明用功只要降伏妄心之理由此可悟掃除差別知見乃徹首徹尾功夫豈但下手方法而已二降伏須得方便若無方便妄心愈熾今寓降伏於發廣大之心換言之發廣大心便是降伏然則降伏者乃大而化之之謂耳無所謂降而自然降方便極矣三降伏者降伏妄心也須知妄心從分別生分別之本在於著我故今以廣大心降伏我人等四相且度盡無量無數無邊衆生如此大慈大悲則貪瞋二毒除矣又雖度生實無所度無常見也亦即不著有雖無所度而度之不息無斷見也亦是不著空不常不斷具此妙慧癡毒亦除矣蓋一切凡夫我見重三毒深者病根實由心量狹隘須以廣大心治其病根從根本上解決諸病自然易除四一切衆生無始至今從來不覺所云不覺者謂不覺知人我分別皆由取相離相會性本是同體豈有差別以不知而著相故愈著愈迷迷即是癡由是因我而立我所貪瞋競起造業無窮更不了所謂我所者莫非緣生之幻有無論法有與非法空但有所取便是不了法非法相皆由性起且以性融之相本非相有何我所有何我人因其不了以致業繫之苦無由解脫今以廣大心度生不取便是令離一切法非法相即離空有二邊會歸同體之性若會於性豈復更有我人等差別之相不是度他便是度己麼善巧孰逾於此五凡夫易為境轉者境即我所無他著境故耳即發心修行亦不無所緣之境譬如度生即是大心行人所緣境也既不能無所緣境無境即著空亦即無從起修又不能取著於境取境即著有今故首以度而實無所度令不著二邊會歸中道合乎性體的示入手之方何等親切六此中雖言降未言住而住意實已默寓於中發大心者首宜度生豈非明示安心之法乎而度無所度亦即示以應住而無所住此彌勒偈頌所以言利益深心住也質言之即是令住般若正智所謂觀照般若觀照空假不離空假同時之中道第一義諦也因衆生本有取著之病故不明言令不住相人自領耳七通常見地每謂般若係談深理甚至畏其偏空修淨土者更不敢道而學般若又往往執理廢事豫人口實今觀首言降伏可見妄習之障不除般若正智云何能開且首言度生之事可見歷事煅心正般若入手處安可事外談理又空有二邊皆不可著豈偏空乎此等處務須加意審之八此中降分別心即是轉第六識而降我相即是轉第七識須知衆生無始不覺自性清淨心校心下原稿有本與二字不顯而現為識識之作用最大者惟第六第七故當從此下手此時全個是識那有真心可住此所以但言降伏不言住也所謂觀照般若之正智亦仍是識須知識之為物原是自性所變現用以分別執我便成為識名之曰妄若用以降伏分別我執即是引歸正道故名之曰正智是為以子之矛攻子之盾亦俗語所謂解鈴還仗繫鈴人也宗下所謂離心意識參等同一味因其未離所以教離須知能離之念亦是識蓋不從此下手直無辦法而宗下不明言是識者與此中不言住是一樣用意所謂等同一味也宗下或因此俯視其他法門謂宗下下手便已離卻心意識這不是吃了靈藥而不知藥之所以靈麼念佛法門亦然一言及念便是心識殊不知一心正念正所以降伏紛紛的妄念或曰以其未能離念終不及宗下直指的高上殊不知淨念與妄念大不同妄念愈念則念愈起淨念則可以念念而至於無念譬如用泥打水水愈渾濁用礬打水水即清淨若言直指向上視彼宗下的直指向上還要來得安穩來得善巧直所謂就地跌倒就地爬起還不直捷了當麼所以淨土法門下手便是轉識成智便是降伏便是觀照般若的正智便是即念離念二邊不著并且念佛人要發大心普願法界衆生同生極樂就是以此正念冥熏法界廣度含靈這不是與此中所說一樣的麼若能融會得這點道理還有不加緊念佛的麼還怕念佛不得力麼要緊要緊癸三徵釋何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩徵舉也舉上文所言之義而釋明之曰徵釋即自問自答之意人衆壽皆自我開出有我相便有對待之人相人不止一為衆生相執我之見繼續不斷即壽者相四相不外一個我相也今開而說之者明執我者便有分別心使知六識生於末那有末那便有六識不相離也如此執我分別乃凡夫通病豈是菩薩故曰即非所以警誡發大心者至深切矣我相因我見生我見以我相顯一表一裏從來不離破我相即是破我見也相有粗細粗則著境細則著心後周亦言我相是約心言即約識言蓋八識為真如心變現之相故唯識宗亦名相宗此科本釋上科令發大願之故何不曰何以故大而化之故斷惑故轉識故乃至度己先當度他度他即是度己故如此豈不令上科之義更顯而必從反面言之何耶蓋斷惑轉識等等皆法也皆不可取取則又成我相又成分別故不用表詮而用遮詮一齊遣蕩此世尊之微意亦般若之正宗也補四相即是一個我相有我即有對待之人相對待者不止一人即衆生相我相在妄心中念念繼續不忘即壽者相菩薩苟見有衆生得度自我度之即有我相從而四相俱起有四相即有分別心有分別心是凡夫不是菩薩修行者第一應撇開我字發心為一切衆生此即降伏我相我皆令入無餘涅槃而滅度之衆生剛強令他修行已不易何況了生死然皆不問無論人與非人皆度之成佛亦本來是佛此即降伏人相滅度無量無數無邊衆生心中不起如何能度盡之念此即降伏壽者相實無衆生得滅度者此即降伏衆生相何以要如是降伏蓋發無上心者要行菩薩行普賢行倘有四相如何得稱菩薩佛要修行人從文字起觀照不用觀照功夫凡情不能轉故學人須從此下手今就此段經文詳述觀照之方法古人於觀照多未詳說觀是觀察最初譯為思是心中思惟禪宗不可用心意識參是明明教人不用思然又說不可墮入無思甲裏復是要用思所以如此者以凡夫知見多必須單刀直入先將枝葉斬除也宗下看話頭要起疑情如不思疑情從何起觀是思惟然單是思惟不可故又用照照即宗下之看如就文字起觀照一離文字歸到心上然後能照住照住時說有思惟却無思惟說無思惟又非無思惟此時心中自然開出智慧如何是開即是妄想停而住於本覺也般若有文字般若觀照般若實相般若文字指經文言實相指人人本具之性言佛說般若即希望學人證此本具之性如何能證即應就文字起觀照若不觀照則文字自文字不能消歸自性不得受用吾人讀誦金剛經原期消歸自性佛說是經亦為此然則觀照之道理觀照之方法不可不知不但般若要觀照一切佛法說到修持上千萬法門亦不外觀照學佛之三條件曰戒定慧無戒則身口意三業不得清淨故戒是修學基礎是獨立的定慧二字互相生起就果上言是定慧就因上言是止觀止者止息妄念觀者即觀照真心因止能生定因觀能生慧此是分配言之其實止觀功夫祇有一個觀字此兩者係一件事止者初下手時要攝心一處即古人所說之定其實初下手者夠不上說定然定卻由此而生久久則由定生慧何則蓋觀一種法門成就以後智慧即發生妄想即脫落故有慧方能成就此定又初下手攝心一處必十分作意方能攝得可見此中有觀故說來說去祇有一觀字所以般若不說止而說觀照也觀照有多種方法無方法則不能起觀照方法雖各宗不同而其指歸則一如天台宗之空假中三觀華嚴宗之四無礙觀及法界觀法相宗之五重唯識觀密宗之道場觀阿字觀禪宗之看話頭淨土宗之觀無量壽佛皆是或云念佛不是觀此語不然須知即念即觀若妄想紛歧散心念佛不得受用必須口念佛號心想彌陀如在目前如此念佛則妄想無從起即是觀故用功莫要於修觀修觀是收攝意根意根攝住身口二業亦攝在一處故淨宗之心想佛口念佛手持珠密宗之心作觀口念咒手結印可見無論如何用功皆非作觀不可教下之空假中三觀四無礙觀似乎觀法不同然其理則一不可不知否則於各宗經典不能融會而有抵觸矣作觀方法自唐以後除禪宗外各宗講此者漸少如台宗在講教時於空假中之理發揮頗詳而用功時則不一定用此法惟禪宗則自古以來說向上一著且不許用心意識參因此有創為其餘法門尚用思惟禪宗不用思之說並引經言不可以生滅心為本修因以證實之不知不許用心意識參云者乃不許用凡情去卜度也一用意識即是凡情以凡夫心情推測佛說決無是處所以不許古來又有說觀即照照是照住而古人對此又有批評以為如是照住即是暗證既不許用凡情卜度照又是暗證而觀之本義又是思惟因此學者乃無所適從然則修觀究應如何下手耶鄙人在這裏參過多年從南嶽大師大乘止觀悟得其理古人說不用心意識參即是不以生滅心為本修因佛意實不如是是說學佛者最初發心不可以生滅心為本修之因如本經善男子善女人發阿耨多羅三藐三菩提心是也至實際用功則須用思惟如本經所有一切衆生之類我皆令入無餘涅槃而滅度之即是思惟最初發無上菩提是稱性起修是謂不以生滅心為本修因至修行必用觀照即是思惟禪宗說不可用心意識參是祖師苦心其實仍要思惟不思惟則不能起疑情至不以凡情卜度又是一事何以知唐以後餘宗多不知作觀此可以善導大師十六觀經疏中之說證之彼云現在人根鈍修觀不得成故祇提倡念佛此是指觀經之觀法廣大凡夫心量不能相應不可因善導大師有此語遂屏觀法而不道也唐朝中葉以後密宗極盛一時不久消滅華嚴宗亦然天台宗亦中衰經四明慈雲二位大師之提倡各經疏又自日本取回得以中興然二師之實際用功亦用淨土不是止觀宋以後淨土宗尚有幾位大師而作觀方法亦多不講故惟禪宗尚有觀門也後世修行人未嘗不多而得力者少此於作觀方法之不講頗有關係又修行者往往初修時甚得力後則改變此亦因不知作觀枯燥無味乃至於此又有讀誦大乘經典能明瞭其理結果反生邪見亦是不知作觀之故又有讀誦經典甚多而道理是道理於身心無干而貪瞋癡之煩惱毫不能除亦是不知作觀之故觀即思惟照有二義一是照住一是照見照見者指功夫修成時言如心經之照見五蘊皆空是也大抵照見由照住而來照住由思惟而來不思惟即不能照住不照住則不能照見思惟之久心寄一處即照住此時許多妄念暫時停止不來打差若打差即不能停也人人現前一念真心本具祇因妄念打差所以不覺妄想一停本有光明自然發露此即智慧觀照須觀吾人之心性所謂消歸自性然凡夫却觀照不到完全是黑漆桶完全是妄心將如何而可惟有依照佛說去觀即先就佛經之文字用功佛說觀照方法即不許吾人用凡情卜度如此段經文若以凡情卜度而不用觀即不能明瞭世人讀經專在文字上求之以為已明其義實萬萬不可如應如是降伏其心句凡情度之當然有許多解釋此要不得應除去之再想又有別種境界又要除去之想而又想皆要不得愈想愈進久久如呆妙處即在此呆字古人云須大死一番死者即死此妄心如此用功或半年或一年忽然開悟出於意外要請求善知識證其合否如無善知識則以佛經證明倘佛經上無此說仍是凡情卜度如此則心中妄想打斷不少雖不即是消歸自性而已消歸不少故須多讀誦大乘經典本經處處說讀誦受持受持即觀照也又觀所有一切衆生至實無衆生得滅度者上文說降伏此段何以不提降伏是何意義此是令吾人將心量擴至無量無邊之大因衆生之大病根即是心量狹小因狹小即執我故佛令將此心放大潛移默化所謂大而化之倘在尋常日用之間時時如此觀照將佛說心量放大移到自己分上即是除我見去煩惱之妙法又觀此段文字其歸結在實無衆生得滅度者一句此是令吾人除我見而並不直指我見偏在對面衆生分上作觀因凡夫執我一刻不放鬆若就我作觀則不能得力故從衆生方面觀觀因緣聚合當體即空又衆生同體如此觀照則不知不覺我執自然化去此乃消歸自性之善巧方法又觀若卵生以至非有想非無想可見一切衆生無不有欲色識此三者不轉移則永遠輪回三界之中因知欲不可不斷色相不可執著情識必須轉移如此觀照則不知不覺欲色識三者可去又觀皆入無餘涅槃而滅度之衆生既若是之多而如卵生之愚蠢定性之難化有想無想之貢高如何能悉數滅度然佛是無緣大慈祇要與我接近總是要度如此觀照則自己忝為人類上則尚未修到非想非非想天下則比卵生濕生高明應當學佛成佛無上心自然能起妄心自然能轉又觀實無衆生得滅度者一句在無量無數無邊衆生句下可見得有一衆生未度即我願無盡如此觀佛語理不離事事不離理是為理事雙融我皆令入無餘涅槃而滅度之遣著空實無衆生得滅度者遣著有兩邊皆遣是雙遮兩邊又同做是雙照是為遮照同時此等修觀即能證寂照同時之果一切衆生皆滅度之是大悲實無衆生得滅度者是大智是為悲智雙融能得不住生死不住涅槃之佛果我皆令入無餘涅槃而滅度之是修福實無衆生得滅度者是修慧是為福慧雙修能證二足尊之果金剛二字即斷惑惑不外見思見思即我相此經斷我相正有極大作用化除我見即轉第七識為平等性智皆入無餘涅槃而滅度之不起分別即轉第六識為妙觀察智實無衆生得滅度者即轉第八識為大圓鏡智所以下文有一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出之語豈不是成佛即在此一段經文耶一切大乘經典說發大乘心之人未能自度先要度人此是大悲然度人即是自度此種道理如觀照得了然則佛法看似廣大無邊實則親切有味看似高深本是平實將此段經文放在心中時時觀照寄心一處妄想即漸漸消除即此數句成佛已有餘矣又觀此段經文不說降伏即是降伏是要吾人發起此願堅強其志則我執我見一切掃除降伏即在內自然受用每日將此段文放在心中受用無窮所以須觀照壬次明不住於相即是正住分四癸初正明無住次釋顯其故三結示正住四更明所以癸初又三子初標示復次須菩提菩薩於法應無所住行於布施補復又也次次第也法字包羅萬象一切事事物物不論眼見耳聞即不能見不能聞而為心所想及者亦稱為法凡世間法出世間法均包括在內故稱一切法應無所住正答應云何住住者執著也衆生處處執著不是著東就是著西世尊此答正是當頭一棒布施六度之一也亦名六波羅蜜大般若經將六波羅蜜一一舉出此經單說布施就文字言是避繁就簡布施可賅一切法佛法要行不要住此二句猶云應當無所住而行一切法也凡經中安復次二字必本文與上文有密切關係此有二義一是補足前義二是申明前義上文答降伏此答住看似另一義實是一件事蓋前言降伏即含住而無住之義此云無住而住亦含降伏之意互相發明又前發大願此起大行願與行不能相離有願必有行有行必有願且不分先後要見之於行方不是虛願故有密切關係此就補足前文言也又前發大心滅度無量無數無邊衆生而未言度生方法此正言度生方法是進一層之申明也應無所住既不著有行於布施復不著空即不落二邊之中道六度之義應當略知六度者布施持戒忍辱精進禪定般若也此六度不外戒定慧對治貪瞋癡布施有財施法施無畏施三種以飲食衣服醫藥等日用物施人者必須用金錢曰財施為人講經說法或印贈經典乃至世間典籍祇要於人有益用以布施者曰法施無畏施即救苦救難衆生在災難中必有驚恐吾去救他令之無畏祇要能救即捨身命亦不顧曰無畏施三即一一即三如救人苦難使之無畏不外用財施法施是可見施財時法施無畏施亦在內又為人說法是法財授人經典使之增長福慧即無畏施再開之有內施外施乃至究竟施如華嚴經中所說名目至多合之則一修布施是破慳貪心貪必慳慳必貪此能造種種業長在生死苦海之中故必破之戒是戒律持字與守字不同拳拳服膺一刻不放鬆為持戒有在家出家之別在家有三皈五戒菩薩戒密宗之三昧耶戒出家有三皈沙彌戒比丘戒菩薩戒五戒雖祇殺盜淫妄酒五條而為一切戒之根本即出家戒亦依據此五條惟分析特為詳細耳出家之菩薩戒是十重四十八輕佛為出家者制定亦許在家人受此戒不過須自己審量能受得了方可否則佛有為優婆塞優婆夷所制之菩薩戒比出家者稍簡是六重二十八輕故在家者以受此戒為宜持戒為學佛之基礎最為重要如造屋然非先固基礎不可否則必崩壞故本經言持戒修福者於此章句能生信心以此為實可見一切佛法皆建築在戒律上戒條雖多不外二門一止持一作持止持在消極方面用功作持在積極方面用功止持即諸惡莫作作持即衆善奉行此二語世俗用濫實出佛經學者先在止一方面持再進而在作一方面持如不殺固好然但是止持再進而勸人亦戒殺即是作持不但戒殺并要放生更是作持有人說我能戒殺戒盜此豈易易如戒殺必對蚊蟲蒼蠅亦不害其生命方可假如某事不曾對人說明而以為是我所為即犯盜戒又如在公共機關因私事而濫用公家一信封一信箋亦犯盜戒淫戒佛制在家人但戒邪淫亦是方便法門實則必須斷淫因此是生死根本也妄語戒加惡口兩舌綺語開而為四惡言罵詈為惡口播弄是非為兩舌描寫男女情感為綺語文人最易犯佛最初制根本大戒原祗殺盜淫妄四者後以酒能亂性復加此戒前四為性戒後一為遮戒故酒戒有時可開如因病須用酒時佛亦許用持戒須明開遮之理開則不遮遮則不開有時許開開即不犯故須將開遮辨清否則持戒不能圓滿佛定戒律比世間法更嚴密如祗受初步戒者以上戒律即不許閲看看則為盜法以出家人言沙彌不許看比丘戒比丘亦不許看菩薩戒蓋持法有不同故不受則不許看出家戒律在家人不許看者蓋以出家戒繁重已極如比丘有二百五十戒比丘尼有三百八十四戒何故在家人不許看此佛之苦心恐在家人因此造惡業也蓋衆生總犯一種大病責人則詳責己則恕比丘戒實為難持動輒犯戒恐居士閲之自己並不受而責備出家人反更甚也又佛制戒律不似世間法之僅有條文如說某戒條必先將應持之理及事實詳說在前方定此條當時佛門有許多程度已高之弟子尚不免犯戒恐學者以為彼尚犯吾曹可恕故不許看也持戒則貪瞋癡均為破除如分別言之戒殺治瞋為多戒盜治貪為多戒淫治貪癡為多戒妄語亦治貪癡為多戒酒則治貪瞋癡是也最初持戒重在事實若受菩薩戒後則心中一動念即為犯戒忍辱亦譯安忍忍辱是安忍之一忍不作忍耐解乃順受之意故安忍者安心順受也他人侮辱我最不能忍辱而能忍則無事不能忍故舉忍辱以概其餘也又忍不但對辱而言佛經中尚有法忍無生法忍如佛說法吾人能遵照實行絲毫不參差為法忍又如生本無生之理吾人能明瞭能實行絲毫不參差為無生法忍忍辱是破除瞋心精進謂前進有精細精密二義雖前進而並不盲從是精細按步前進而不躐等是精密精進是破除懈怠禪定是梵漢雙舉梵語禪那漢語曰定所以雙舉令人知是佛門之定非外道之定也猶之懺悔懺是梵語懺摩悔是漢語所以雙舉明佛家之懺悔有禮拜等種種方法與普通之悔過不同也寄心一處久後得定得定即稱三昧禪定是對治散亂昏沉掉舉等般若是譯音表明性體上發生之正智與世智辨聰不同世智辨聰八難之一也恐與世間智慧混亂故不譯智慧而用般若般若是對治愚癡說六度實則是戒定慧餘三度乃補助此三學也雖說六度而主腦是般若故般若不發生餘五度亦不能稱波羅蜜是以佛說五度是足般若是目布施乃至禪定世法亦有之佛法之精微廣大能普度衆生出一切苦了二重生死乃至不住生死不住涅槃皆非般若正智不為功故般若不明瞭不能入佛門經中於六度祇舉一布施者因六度可攝萬行布施又可攝餘五度也布施除財施外如法施可攝精進禪定般若蓋佛法最重定慧因上為止觀果上為定慧說法之人必有止觀有精進功夫方能為人說如無畏施可攝持戒忍辱持戒者諸惡莫作衆善奉行決不犯人安忍順受人不畏之即無畏施也古德解此段經文均言布施可攝六度萬行故佛祗說布施賅攝一切法然說布施即一切法亦可譬如法施使人知持戒忍辱精進禪定般若即是餘五度無畏施使人了生死可以無畏而了生死亦必行餘五度不特此也任舉一度亦可遍各度如持戒必須實行布施等餘五度忍辱精進禪定亦然皆可攝一切法又五度若離開般若皆不能見諸實行可見般若乃至深至高而為各度之本然佛何以不舉般若獨舉布施者大智度論云一切法不生由般若生是知實行一切法之功夫能不著相即是般若故非舉布施不可布施是實行可見修佛法者不但明理而止必須實行方可惟其實行故祇有布施能攝一切法不修行一切法如何能度衆生修行一切法而著相者亦不能度衆生也未能自度先要度他此學大乘者之恆言然必先問自己果有此資格否如果不能切實用功專作度生之事即不免向外馳求故大論云若菩薩發心即去度生無有是處然則如何而可曰應先發大心而修行一切法究竟從何處修起則先行布施布施不但居六度之首亦四攝法之首所謂布施愛語利行同事也佛之穿衣吃飯處處與衆生同之不外四攝衆生性剛強不易聽從故必先就其需要者布施之又以可愛之語使之樂聞又不論世間法彼要行者亦利行之如求子得子求財得財之類且又與之共同作事然後衆生能為我所攝受故此節正緊接上文度生而指示下手之方法也且布施即一切佛法佛法自始至終不外一捨字布施即捨也推之持戒捨貪瞋癡忍辱捨瞋精進捨懈怠昏沉掉舉禪定捨散亂昏沉般若捨二邊及我執法執六度無非是捨是知布施乃一即一切修行佛法徹頭徹尾一貫到底者也經文於度生下祇言布施真是扼要小乘亦有行捨功夫言其即行即捨此文行字下加一於字即是側重布施前說布施不外一捨是橫說實則下學上達從豎說亦不外一捨字如聽經者捨世間娛樂而來學佛天人捨欲界即升色界捨色界即升無色界捨我執即證羅漢捨法執即為菩薩并捨亦捨即成佛故從豎說布施亦是徹底功夫佛說法是圓音面面俱到行於布施在表面看是不取非法然布施是捨即不取法故舉一布施即二邊不著本經無論何句皆然或疑既不取法又不取非法學者動輒得咎如何下手其實不難須知吾人去行布施即可二邊不著行時先不住空是行於法佛說云寧可著有如須彌山不可著無如芥子許故先須堵住空門專意修法在法上著力即無斷滅相祇要一面行去一面不放在心裏即兩邊不著矣然有所為而布施即是住即是著不過有漏功德不但非功德更有因此墮落者捨字用今之新名詞即是犧牲在世為人倘為社會犧牲必能公而忘私國而忘家可知布施一法包括一切故佛法不但出世間者宜學即在世間做人亦不可不知子次指釋所謂不住色布施不住聲香味觸法布施補所謂者指從前所已說也恐人懷疑究竟如何不住而修一切法耶佛告以即我從前所說不住五蘊十二處十八界乃至阿耨多羅三藐三菩提等今簡要言之舉色聲香味觸法之六塵六塵是修行上境行果之境舉此可攝一切法也眼根所見之萬象皆是色耳根所聽者為聲鼻根所聞者為香舌根所嘗者為味身根所接者為觸意根起心動念之分別有對色聲香味觸而起者亦有對非色非聲非香非味非觸而起者種類極多無以名之名之曰法六塵之名有二義一言其無量無邊如微塵之多一有染污意吾人一有沾惹即為所污不住即不執著一有執著即心不清淨如就布施言倘有所為而為爭自己面子即住於色又欲令人知之即住於聲又欲人人聞其美名即住於香欲人人口中稱道即住於味為得後來果報即住於觸若有心為之即住於法故必心中一無所住方為波羅蜜波羅蜜印度語處處用之猶此方說到家二字上文菩薩於法乃指一切法此獨舉六塵有許多妙義在內於此須用觀照一步一步作觀由外而內由粗入細一佛不說一切法而祇說六塵實令吾曹知一切法不應住二為何一切法不應住應知一住即被染污三佛舉六塵其理至深何以故說色有眼根在說聲有耳根在乃至說法有意根在根境相對舉六塵即含有六根淺者見淺僅不住境深者見深即能不住心四根是根塵是塵如何起交涉中間之媒介是六識識不生根境不交涉所謂心不在焉視而不見聽而不聞食而不知其味佛意非但境界不可住即識亦不可住令學者知住境禍根在識即分別心應於起心動念時下手不住於識也如此一步進一步即能消歸自性起心動念如何留神就布施言凡起心動念不出三種一為自身二想人報恩三想得果報布施不外財法二施無畏施包括於法往往自己先覺捨不得即有一我在須知財法不外六塵此不可住在起念時用功將自身撇開庶幾我執可破布施後希望人家報恩須知酬報者無非六塵此不可住將望報之念撇開布施希望得果果報亦不外六塵此不可住將果報之念撇開五頻頻觀照而我見仍在則如何是應進觀照三輪體空之道布施有施者能施受者所施及所施之物我今觀照施者受者當體即空何以故皆因緣所生故施受既空所施之物亦空是謂三輪體空能於此吃緊用功破除六七二識則我見自消證得自性矣有人說布施三面具足何以名輪不知此實有深意一是運行佛說布施要令度人輪有度義修行者隨時布施能將煩惱碾碎輪有碾義此說不住色聲香味觸法而行布施即令吾人明三輪體空之道財施即六塵法施即法塵皆是緣生之法既知當體即空又何必住既觀照三輪體空當然不住子三結成須菩提菩薩應如是布施不住於相補如是二字即指上文所謂不住色布施不住聲香味觸法布施而言不住於相並非斷滅不住即捨然捨能否究竟絲毫無住亦非易言故華嚴分捨為多種最後說究竟捨須心中些微不著不落二邊方為究竟此云不住於相即含二邊言既不住法相亦不住非法相也何以知此相字可賅非相可即上文證明之應無所住是不住法相行於布施是不住非法相所謂不住色聲香味觸法布施是不住有菩薩應如是布施是不住空須知不住非斷滅不住即行住即不能行行即不能住修菩薩道者六塵固不可住然若斷滅即不能度衆生衆生正住六塵境界故應從此處度之上文應無所住行於布施下文即言應如是布施不住於相佛意謂菩薩應當如我所說二邊不著於中道行可見無所住並非不行不住相不是空談要在實行中間不著有不著空方合全經破相此處點出佛意若謂非教汝不住於法乃不住法相也修行固然要離塵境然不住六塵談何容易故修行本旨是不住而下手時却不能滅境譬如念佛觀想佛像色境也天樂水鳥聲境也蓮花香潔香境也飯食經行味境也但受諸樂觸境也憶念彌陀法境也故不住二字須認清決非斷滅斷滅即空亦即非法布施攝一切法相亦攝非法相故不住云者不住法不住非法也世人捨命亦是捨不過住相耳如盡忠報國殺身成仁至多不過成神倘捨命時另有利己心瞋恨心或至墮落青年男女為愛情而捨命亦易遭墮落或挾瞋恨而捨身且至墮地獄地獄有鐵床銅柱種種慘酷之報正為慈悲衆生而設也凡此皆是住相若存斷滅想而捨命如消極一流覺世間無可留戀自捐生命此即住於非法相沈滯於空不如不捨斷滅沈空或亦至墮落故捨不應住法亦不應住非法菩薩為衆生而捨命亦有之然若住於度生之相亦不能成佛故本經下文有恆河沙等身命布施不如受持四句偈之比較恆河沙等身命布施非菩薩不能凡夫無此許多身命然尚不如受持四句偈為他人說得福多者因受持誦說能成佛也修行不得受用不外二病一不得扼要二道理不明如能扼要明理自能受用不可離修行而說性否則空談不能離性而修行否則盲進本經處處說性處處含實行發大願行大行方能入佛門前科降伏即發大願此科行於布施即行大行必無所住行於布施方是大行有願無行願是虛願有願及行願是重要行更重要無大願則大行不能起即行亦是盲行如何方為大願如何方為大行必大悲大智方可所有一切衆生之類皆令入無餘涅槃而滅度之大悲也如是滅度無量無數無邊衆生實無衆生得滅度者知衆生同體無所謂佛無所謂衆生大智也悲智具足方能發大願行大行菩薩於法應無所住凡夫之病即處處執著能不執著即大智也行於布施即大悲也無悲則大願不能發無智則大行不能行悲智願行無不大方是菩薩摩訶薩必如此圓滿具足方是無上菩提上文於大願則先說大悲是不住空住空即不能發大願此文於大行則先說大智是不住有住有即不能行大行也凡夫對一切事總是放不下為何放不下即是有我在佛祇說布施一下手即破我再進一步在境界上破更進在起心動念上破前科說發大心處處却是不住是潛移默化化去我見凡夫為我之念最重今為衆生將我拋開無論卵生之極愚無想之極高必悉令入無餘涅槃而滅度此即化除分別心正對六七識下藥凡夫所以輪回六道不能出離亦是六七識使然今轉移之即成波羅蜜發心要廣大非廣大不能化我見修行則要細密先發廣大心方能修細密行故必先觀一切衆生是緣生且本寂且同體先知自己習氣之重而潛移之方能修行發大心為何依降伏其心而說起大行為何依應無所住而說此即是要降伏應先知病根所在知衆生所以成為衆生即在有欲色識故發心門說此類語由此用功六七識自然能化說細密修行切指應無所住可知修行當然要行不要住下此功夫正令六七識無存在餘地真心自然顯露此是不住而住故下文說應如所教住佛教人所有一切衆生皆令入無餘涅槃而滅度之此菩薩發心未自度先度他實無衆生得滅度者令人知緣生平等同體等等此度他即度自己直是自他同度然佛終不說度自己者因吾人我執重故不說也度衆生如何度要起行布施即破七識之執我破六識之分別心此明明是度自己故發心要大度己先要度他度他即是度己說到修行先除自己病根度他先度自己度己即是度他然布施一方面度己而實際是度他此佛祇說行於布施之精意也古人說應無所住而生其心一句可以貫通全經實則無論何句皆可貫通如不住於相句兼賅非相不落二邊行於中道何嘗不可貫通全經大乘佛法之巧妙可隨人於各方去領會所以稱圓融不但見淺見深因人不同即見深者亦復所見不同前文之相字從我相上說此文之相字從法與非法上說本經往往後文無異為前文作注解如應無所住行於布施即為上文度生作注解不住色聲香味觸法布施即為應無所住作注解不住於相又為不住色聲香味觸法布施作注解有人疑金剛經前後意義重復者是不善讀金剛經倘知後文與前文之關係則不但不重復且見其脈絡貫通讀此段經文又須在觀照上用功佛法處處不離觀照必時時刻刻去思惟方可須知不住於相是徹底的自初下手至成佛為止皆是不住於相倘在布施之時存一些見好之心則不知不覺住於六塵矣故非作觀不可如不存見好之心而但覺有此布施即住於法故不作觀即住亦不自覺矣又觀行於布施是令吾人成佛如不作觀照如何能成應如是布施亦是佛說一句法如行布施時心中有應如是布施亦即是住於法吾人事事依照佛說去行心中却一無其事方是不住法相心中雖無其事依舊精進去行方是不住非法相應如是布施尚在外面不住於相即向裏追求此正用功吃緊處又觀不住於相心中雖無其事然存此心又是住相故作觀時心中一層一層入細境與心也法與非法也二邊不著也二邊雙照也心雖入細仍在對待上須知對待之見未忘尚未能出世間世間一切境界無非是對待如生死老幼高下長短大小等等無非是分別心故出世法必須離開分別心在絶對上作觀轉凡夫觀念至絶對境界即是證性證性須要無念念者分別心也有分別心即落於對待落於對待即時時刻刻去分別而為意識所籠罩必觀至無念方可然心中尚存無念二字仍是住相必并無念之念亦無密密作觀庶幾性德圓明方是真不住相佛說能觀無念者即為向佛智是知觀無念非一時所能到但宜向此進修故曰向佛智念即是觀觀即是念能觀無念者轉言之即令吾曹念無念念無念必用思惟思惟則能轉分別心分別心是向外馳求思惟則向內尋求勝妙境界當起心動念時除去分別心再依佛之方法向內思惟此為念無念如念佛亦然久久相應即能無念癸次顯釋其故分三子初徵釋何以故若菩薩不住相布施其福德不可思量補徵者舉也將前義再舉之而自問自答也福德即福慧雙修福慧如車之兩輪不可稍偏有人說佛既教人不住何以又教人修福此誤也若不修福即成菩薩成佛去度衆生而衆生剛強未必能度故必先與衆生結緣本經所以處處說修福而實行則祇說布施即令人福慧雙修思是窺測量是度量言不可以心思去窺測不可以數目去度量也不住相布施不住相即不住法亦即不著有布施即不住非法亦即不著空不住相而布施布施而不住相如此二邊不著乃是佛境界故福德之大不可思量此福德乃指成佛而言上文發阿耨多羅三藐三菩提心即成佛之心與此句針鋒相對可見不住相布施即成佛之法門無上甚深微妙法即指般若極深極細故本經句句如剝蕉不易了解說者須攝相觀心聽者亦須攝相觀心方可經文處處言不住相而又處處言福德者正是不落二邊之義不住相非即福德不可思量必布施而不住相方是福德不可思量大乘佛法塵說剎說橫說豎說面面俱圓最要是破執一有執即落二邊不著有即著空不是中道聽法看經亦須面面觀之倘著一邊即不得受用佛說了義不說不了義說得徹底尚恐聽者不明說不徹底如何能令人了解聽者亦然否則般若之理不得了解故須面面說又說而不說留一點讓聽者去想若將極深道理一一說盡則聽者不復用功故古來禪宗祖師開示學人時恆留半句待人自悟否則專事抄寫講義自己不在此中努力打一個筋斗有何用處看本經上文明明說不住六塵而行布施蓋以住於境則心不清淨須一無所為方可然此處則說福德不可思量豈非上下文意義衝突耶福德非即相乎何故處處言不住又處處言福德乎須知上文教人不住六塵是教人不執著並非滅却六塵下文有於法不說斷滅相可證蓋修行即有境界不是不要境界託境方能起修布施而講福德即指示人以下手方法故教人學佛必須託境方可下手自己學佛亦必須託境方能下手本經說不住六塵而彌陀經全寫極樂世界之六塵看似相反實則相同且正可見淨土境界之高苦惱衆生起心動念不離六塵淨土法門之妙在改變衆生之心而觀想極樂世界之六塵即不住空由此而脫離五濁之六塵即不住有故佛法治心不重降伏而重轉移使衆生心轉向佛境之六塵即脫離五濁之六塵二邊不著之下手方法即在此子次喻明須菩提於意云何東方虛空可思量不不也世尊須菩提南西北方四維上下虛空可思量不不也世尊補不也世尊之不字古德注經讀為弗字字書上無此讀音蓋古者譯經於梵文無相當之字往往用近似之字而另讀一音以為區別亦譯經之苦心也如各經中凡遇解字均讀懈音所以表明不但文字宜了解並宜消歸自性不即文字不離文字方可此處不讀弗是表明不僅作否決意解含有唯唯否否之意大概下文無解釋是作否決解下文有解釋是不完全作否決解虛空無相而不拒諸相發揮此語最宜牢記平常眼光以為虛空是一切無有乃小乘之頑空耳實則虛空乃包羅萬象大乘經所說虛空正指包羅萬象而言其中有無數相在內方顯虛空之大佛所說空皆應如此去領會須知無所不容乃是第一義空所謂空而不空不可思量云者非謂其無相不可思量正謂其無所不容方是不可思量舉一東方又必舉南西北四維上下者並非閒文正顯佛說隨舉一法皆賅十方也佛說法面面俱圓不可從一面去觀如華嚴專表重重無盡之義蓋佛說法從無量無邊性海中流出故重重無盡虛空不可思量若以為祇喻福德仍是從一面觀實則喻不住相布施也然佛以虛空為比喻僅說東方亦已可了解何故又說四方上下此有五義一隨舉一法當體即空均不應住相雖虛空亦然二須知東南西北四維上下均是假名望東成西望南成北本無一定可知一切法亦均是假名無有定法可得所以不可住三既然十方皆是假名假名是相故不可住我與衆生亦是假名亦不可住然一切法皆是同體在性體上原是一個如此領會方是心佛衆生三無差別如此福德不可思量如此不住相布施即佛境界福德之大豈凡情所能窺測哉四十方皆在虛空之中實則皆在一念心中雖說十方不礙同一虛空雖同一虛空不礙十法界令人領會因果同時不礙一法界一法界不礙因果五舉十方則虛空無相而不拒諸相發揮之理自明從此觀照乃空有同時雖空有而圓融自在方可明布施不住相不住相福德不可思量之義以下一段文是江居士親筆故不嫌重復亦列入之以虛空為喻而復舉東南西北四維上下為言者并非間文實關要義切不可忽一十方皆在虛空中使知十法界同居人人一念心中也二隨舉一方皆是虛空使知隨舉一法當體即空三然則東南西北四維上下皆假名耳使知我人衆生乃至一切法莫非假名四既皆假名故虛空原是一個使知我人衆生乃至於佛種種差別約假名之相言之耳約性體言則一也故曰心佛衆生三無差別故曰一法界須知衆生以不達一法界故不覺自動而有無明也五雖有十方而不礙同一虛空雖同一虛空而不礙有十方使知十法界因果森然而不礙同一性空雖同一性空而不妨十法界因果森然此即顯發虛空無相不拒諸相發揮之理如此空有同時存泯自在方是虛空不可思量方足以喻布施而不住相不住相而又布施之福德不可思量也若但言虛空乃偏空耳豈般若之第一義空又何足云虛空不可思量耶所以言虛空必兼言東南西北四維上下者理在於斯當如是知也如是知者乃為正知子三法合須菩提菩薩無住相布施福德亦復如是不可思量補十方虛空無相而不礙諸相發揮正似布施不住相不住相而布施正似虛空不可思量菩薩能如此有而不有空而不空方是背塵合覺上文言不住相布施此處不字易無字大有深意蓋善男子善女人既發阿耨多羅三藐三菩提心有成佛資格故教以不住相布施此處教之用功必須達到真能無住無一絲一毫之未盡方可癸三結示正住須菩提菩薩但應如所教住補歸結到無住乃是正住正指應無所住又答應云何住上文皆說不住無住此忽言如所教住意謂應依我所說之教而住明是住而無住無住而住不是斷滅玩但應二字可見除依我之不住無住外別無他住且含有降伏之意降伏即降伏此住也又但應者意謂應如我所教之不住二邊之住而住方是正住住又有主義但應依我所教之二邊不住去修行本以不住為主否則非大乘佛法此發離相心及不住於相兩科相互發明前言降伏即含無所住之意此言不住即含降伏意故降伏及不住兩事即一事修行下手即是一捨字捨不得即為執有我見佛言捨即破我執此我執能捨一分即破得一分一層一層破去至於究竟捨我執方破盡等覺菩薩尚有一分法執未破必至佛果方究竟捨故佛法自始至終祇一捨字捨者正是不住空不住有即是離相心心量大到無量無邊方是阿耨多羅三藐三菩提若心量狹小又烏能捨佛不說住成佛尚不住佛相故禪宗祖師完全用金剛經方法對學人說半句而不說破令學者去思惟左又不是右又不是將妄念打得落花流水忽焉脫落正是妙住癸四更明所以分二子初問答釋明二闡義印許子初又二丑初問須菩提於意云何可以身相見如來不補古德說菩薩但應如所教住止一部金剛經大義已盡以下是一重一重斷疑斷疑固是然意義猶未完足今之分科用更明所以四字煞費斟酌蓋所以然不明方有疑若知所以然則疑自斷矣身相二字舊解皆指三十二相之應化身言如此則下文三十二相豈非重復金剛經一字一句皆有深意決無重復者此身相二字應就衆生之本身言如來二字指衆生本有之法身言上文處處言不住相不住者即令人會相歸性也衆生之心稱如來藏是言衆生本具法性不過藏在人我法我之中佛教以不住相即令衆生自見所藏之如來如此解釋比較親切佛意若謂汝等衆生能就身相見汝之本性耶此科是將上來所說之理再說明其所以然上文所說種種道理最緊要者即反覆陳明不住於相而均歸結於可以身相見如來一句上文菩薩不住相布施其福德不可思量佛已說明其故然尚未說其所以然蓋不住於相要點即在證性也一切凡夫從無始以來祇認得一個相故向外馳求背覺合塵將本來面目忘了上文言不住法相不住非法相法者指一切事事物物吾人之臭皮囊是一切事物中所最執著者無始以來即執此為身相將假作真殊不知是無常生滅即見解稍高者知此身如幻然尚執著喜怒哀樂之已發者為情未發而無動者為性彼以為心之官則思思則有所稟受推其原不可得以為受之於天故云天命之謂性世間皆如此見解此與佛法完全不同彼所說無動作者正是佛法所說之相佛所說之不動則無論七八識之恆審思量表面上儘是動作起滅而性則不動即喜怒哀樂亦是動作起滅如誤以未發者為性即必為所束縛世間上自聖人下至愚夫完全是此種執著總不外乎生滅故須認得此不生不滅之主人翁方可不為相轉而相為我所轉不隨生滅無常中走即可以了生死佛令人不住相吃緊用功在此佛法千言萬語所說亦不外此本經開始即說不住相即令吾人認清此點執相即著有不執相即著空是一切凡夫之通病小乘與凡夫相反了知身相是幻即喜怒哀樂之未發亦是相證得偏空而了生死出三界然又得一病病在著空此空仍是相大乘起信論說空者空其妄念必連起心動念之喜怒哀樂未發者亦空之即住於無相以為偏空便了生死不知著空又住於非法相故佛斥其不合須知有體必有用有性必有相向來說凡夫之執著不外隨相追求祇須知相之虛妄即可如又執著空即墮於斷滅性與相是不一性是性相是相體是體用是用故不可滅相滅相則如物之有底而無面性與相又是不異相即性之表現性即相之根本有根本而不表現是有體無用故佛不住涅槃何以故一切衆生正執著此相若佛不表現此相不能度他故證性體原為起行若小乘者佛所以斥為焦芽敗種墮無為坑也此科文正發揮此理俾知佛令人不住法相又不住非法相之所以然佛教人修行原為度衆生倘墮無為坑如何能度故般若要在二邊不住必不住有不住空方能稱性又性是無相無不相無相故不可著有不可以住法無不相故不可以著空不可住非法正惟性是無相無不相故凡夫執有一邊見不到性小乘執無一邊亦見不到性千經萬論無非說明此理大德注疏亦無非發揮此理故此處身相不應就佛身說必就衆生本身體相上說上至佛下至一切衆生皆是此相佛證得法身故稱如來一切衆生喜怒哀樂起心動念本是不覺然能成佛者亦即此衆生心故此心即是如來不過為無明所蔽名之曰如來藏耳佛問此語是試探須菩提及大衆乃至未來衆生究竟我上文所說不住相如何可以相上見性耶倘答以可以見如來則住於法相是凡夫倘答不可以見如來則住於非法相是小乘丑次答又二寅初雙明不也世尊不可以身相得見如來補自來讀金剛經不可以身相得見如來作一句讀妙煦持誦此經四十餘年在十餘年前偶然悟到應作兩句讀然尚不敢決後讀南嶽大師講法華經唯佛與佛乃能究盡諸法實相所謂諸法如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等有三種斷句法方敢決定分作二句但此等方法唯空宗之經及羅什大師所譯之經可以用之舊解身相當然是空從法身上說應化身亦是幻相故云不可以得見如來但義有未盡照此解釋則住於非法相矣須知不也世尊之不是唯唯否否不可完全作否決解既答不可復說可以故是雙明且果全是否決下句何必加以得字須菩提意謂不可以相作性就身相見如來然相由性現亦得以身相見如來故下文又有如來所說身相之申明也作一句讀於事實上道理上文字上種種說不通倘如此答不可以身相見如來須菩提尚止悟相是相性是性仍是小乘見解落於偏空不是第一義空何以能稱解空第一況前八會皆是須菩提當機且曾代世尊宣說二邊不著之理何以至此反不明瞭耶此與事實不合也本經發起序中世尊於穿衣吃飯示現大空三昧衆人不知須菩提已悟得其理一啓口即讚嘆希有世尊如來善護念諸菩薩善付囑諸菩薩明明見得如來之示現凡夫相見得相不障性何至經世尊兩番開示之後仍祇見得一邊性相不融則前文希有二字即無來歷如來善護念二語亦了無意味此與道理不合也又照此讀法完全是否決則不也世尊一句可了何必贅以身相見如來又何必加以得字此於文字上不合也寅次釋成何以故如來所說身相即非身相補如來所說身相即非身相是二邊雙照性即相之體相即性之用相非性不融性非相不顯離相即無所謂性離性即無所謂相但看執著與不執著耳著相者相即為障礙而不得見性故答言不可苟不執著即相可以見性相如物之表面性如物之裏面倘物之表面如玻璃明徹即能見其裏面故答云以身相見如來蓋不執著即不落二邊正不必如小乘之滅色明空滅相而見性即下文不說斷滅相也般若之理全在於此須要觀照仔細用功約相說是身相約性說當體即空性本無相約相說相是相性是性相是虛妄性是真實故云不可約性說相本是當體即空性可融相真實之理即顯何必離虛妄之相得見真實之性故云得見如來能知相空即得見性如此解釋方與須菩提當機請法相合衆人見佛之穿衣吃飯示現凡夫相即著凡夫相不見如來須菩提由相見性知佛之不住相即見如來故此正是雙明之釋成子次闡義印許分二丑初明性本非相佛告須菩提凡所有相皆是虛妄補結經者安佛告須菩提示下文道理重要此句即是印許以下更推廣言之方才一問一答祇說身相實則凡所有相皆是虛妄汝說不可甚是蓋性本非相也此妄字是廣義虛妄猶言虛假既知是虛假應回光返照不可向外馳求於相從速歸性性本真實豈能以虛假見真實耶知此則凡夫之病可免不至墮入輪回丑次明即相見性若見諸相非相則見如來補諸相即一切相即凡所有相祇須徹底明瞭一切相皆是虛妄即不逐妄即知有真故見諸相非相則相不能障性即見如來何必滅相即相可以見性也汝答得見如來極是見字亦有功夫要真能見諸相非相方可若祇是說理即不能見如來則字歷來流通本作即此依唐人寫經作則則與即本可通用但作便字解可通作就字解則不能通凡所有相既是虛妄皆不當住故上說法相說非法相即包一切相佛說不住相即是令人見如來若執應化身即不能見法身故不住相即令人見性又不住相是不執著不執著即不為相所轉并且相反為我所轉故祇須了知是虛妄不必斷滅且亦不可斷滅蓋相本由性現也佛令人對世間法不可執著亦不可厭惡凡夫執相是住法相而生煩惱修行人厭惡世法又住非法相而生煩惱須知性本無相無不相不能斷滅吾人用功須先觀照久久方能照住最後能照見依佛說二邊不著去修行行來行去至功夫純熟深之又深方是般若波羅蜜方真見諸相非相即心經所謂照見五蘊皆空度一切苦厄也心經之色即此經之相受想行識即喜怒哀樂起心動念照到皆空方是諸相非相皆空即是三空非小乘之但空故又云色不異空空不異色如此說色與空尚是兩橛故又云色即是空空即是色此即空有同時此與凡所有相四句相通凡所有相皆是虛妄與空即是色通一切假名當體即空也若見諸相非相則見如來與色即是空通色即空可見空不在色外何必滅色明空故云則見如來見如來即見性也不執著相即能度一切苦厄苦厄無量舉其大者凡夫之分段生死小乘之變易生死是也凡夫身有長短命有壽夭流轉生死謂之分段生死小乘證得性無相既得體本可現相彼畏苦不肯入世度生心中起微細生滅佛名為變易生死若見如來即能度此等苦厄度苦厄由於見如來見如來由照見故用功最要是作觀此科經文若消歸自性則遇一切相時第一步功夫即觀凡所有相皆是虛妄至於色聲香味觸法則觀諸相非相或以在塵勞不易作觀為疑請就上海言之吾人終日所聞者車聲人聲種種喧擾聲須知此等聲皆起滅不停此等熙來攘往之衆生皆忙於衣食不由自主然此實非車聲人聲種種喧擾聲乃無常苦空無我之聲當體即空然明明是聲而如此作觀則不著有不著空乃是般若波羅蜜多之聲故經文無論何句皆可作觀行住坐臥不離這個則受用無窮如此依文字起觀照先須我去讀經是經轉我至於作觀則是我轉經經轉我則以經轉移凡情我轉經更為重要功夫此科經文是說明上文之所以然即降伏其心應無所住等之總結故依此文觀照與觀照上文無異凡所有相皆是虛妄若見諸相非相則見如來見如來即見性見性即不住相之所以然見性見得一分即初地菩薩即不退轉於阿耨多羅三藐三菩提心見得究竟即成佛即上文福德不可思量之所以然成佛見性法身顯現遍滿虛空即上文用虛空作比喻之所以然須知本經說來說去皆說無住前文不住於相即釋應無所住因此一開口先說降伏其心所有一切衆生皆令入無餘涅槃而滅度之即教吾人不住滅度無量衆生成佛指示吾人發心之法門實無衆生得滅度者又將此法掃却此即指示吾人不住法相後說菩薩應無所住亦教人不住法相行於布施教人不住非法相雖復說但應如所教住意思仍是教人住於無住即古德所說但求妄息莫更覓真真即真心又即真如應者如如平等也何以如如平等性體本如此有此性體即能現相故證得者不可存此真心若一覓真即是六七識即成為妄古德謂之執異執異即判真妄為二不是平等故說應如我所教住以降伏妄心凡夫均是妄心必妄心分分除真心方分分現但求妄息莫更覓真即此意也凡所有相皆是虛妄一住即妄故前文開口即言降伏不言住何以又說若見諸相非相則見如來此是說不住之益倘能見諸相非相即見得真性此即上文不說住而說降伏但應如所教住之總結於此可知金剛經行文如天馬行空而說理則細針密縷處處開處處結讀此科文如奇峯突起看似與上文不接實為上文之總結正如重山疊水層層包裹處處有來龍去脈處處有結穴也就文字說一面說一面掃正是不住法相不住非法相真足當文字般若讀此經講此經時在前文須將後文攝入在後文應回顧前文如凡所有相皆是虛妄即與下文若以色見我以音聲求我四句偈相照應若見諸相非相則見如來與下文於法不說斷滅相亦息息相通案此下一段文是江老居士親筆更明所以一科有四要義一上來但以虛空喻福德不可思量釋明應不住相行施之故此中更明若不住相則能見如來性體此福德之所以如虛空不可思量也二上來說不住相防不了者疑為滅相此中更明是不取著并非斷校斷舊版無據原稿補滅其相所謂若見諸相非相即見如來此是不住相之所以也三上來說因行應不住相防疑不但一切衆生皆有苦果之四大五蘊身相即世尊極果亦現丈六八尺三十二身相云何不住古人但舉如來果德之身相言今謂亦可通於一切衆生於義較圓因下文明言凡所有相故又向後更有可以三十二相見如來否之問乃是專指果德故今明其皆不可住約果德說住則不能見如來約苦果說住則不能見本具之如來藏矣此是但應如所教住亦即應不住相之所以也四小乘性相不融既以音聲色相為佛其自修又取墮著無為今明供佛校供佛舊版無原稿有須不著色相而見如來自修亦不應偏空但不著相則色即是空相即是性性相圓融無礙自在此正世尊說般若法令得回小向大之所以也辛次生信分四壬初揀示根機次明其福德三結顯中道四問釋證成壬初又二癸初問須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不補本經凡安須菩提白佛言者是鄭重其事以所言皆最要緊之道理也頗多也如是指上文明示一科而言言說即上文所說之法章句非一章一句之謂羅什大師隨順此方成語漢人治經之解說多稱章句此二字指上文所說之道理而言實信非悠悠泛泛之信即能了解如是言說章句之真實義也須菩提此問重在實信即開示吾人對如此言說章句必生真實信方可上來世尊所說甚深甚深一切衆生聞者當然生信然能生實信者多耶否耶恐怕不多蓋道理如此之深生實信者非上根利智不辦然此等根器是不多見究竟須上根利智耶抑不必上根利智耶癸次答又二子初揀能信之機佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實補結經者安佛告須菩提示所言重要之意莫作是說一語世尊直堵塞須菩提之口令其不可作是說不但現在大衆能生實信即如來滅度以後至後五百年有能持戒修福者即於此章句能生信心其能生信心即以此章句為真實義也惟持戒修福之兩種人於此章句能生信心其他即不能以此之此亦指言說章句為實者言能明瞭此經道理從此用功所以能生信心全恃以此為實古來許多大文人看過三藏不止一遍問其修行則毫無即坐不以此為實之病以此為實正答須菩提生實信不之問須菩提之問一是令人須生實信一是慮甚深之理非大根器不能實信用意亦是佛何以堵塞其口此含有三要義從下文可以看出一是不可輕視衆生後五百歲尚有其人何況現在二不可阻人善念使生退屈心觀下文於無量千萬佛所種諸善根可知三不必上根利智祇須持戒修福之兩種人便能生信一二兩義即從第三義生出蓋持戒修福之兩種人智慧均不見高也持戒修福皆求福報者彼對甚深法門原有退縮之意故佛戒以莫作是說以上尚是淺言之其中更含有深意莫作是說一語正對宏揚大乘佛法之人而言不但對當時并對後來宏揚大乘佛法之人而言不但戒須菩提不可作是說現在吾人亦不可作是說佛之本意是要竭力宏揚般若法門本經是須菩提啓請前八會彼尚代佛宣說可見須菩提是宏揚般若之人下文屢說有能受持讀誦為他人說佛之希望宏揚般若於此可見倘作是說豈宏揚之本意耶然宏揚般若正是不易如我國自宋以來古德見般若法門難修多不願講以為衆生業深障重種種著相不易領會又恐人聞此法門反墮偏空甚至成惡取空不如不講世尊早見及此故以莫作是說為戒講般若所以反墮偏空等病乃是講者不善宏揚非聞者之過須知般若正是佛種本經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出苟不講則般若道理永不能明豈非斷佛種耶故不得不竭力宏揚下文所以有荷擔如來三藐三菩提之語也近代大德多不講般若而講三諦圓融實不易了解佛言三諦在法華會上正在宣說般若之後故佛預戒莫作是說要須菩提宏揚此法門意謂汝不宏揚如何能令人了解生實信汝但慮及衆生不易生信而忘卻宏揚般若之大事其奚可哉不但此也汝不宏揚即阻人善念故宜竭力宏揚然宏揚如不慎重卻又不可佛講般若已是晚年初成道時先說華嚴蓋賢劫之中釋迦牟尼已是第四佛去佛久遠不能不將佛境界完全說出然即回頭講阿含是令人躬行實踐逮人根漸熟即講方等將大乘之理說明令人回小向大繼此方講般若可見此法門須慎重既要宏揚又要慎重故必揀擇持戒修福之根基佛意謂汝恐人不易生實信又慮生實信者不多祇須依我所說宏揚從實踐上用功則聽者不致貽誤但看宏揚者之方法如何何慮聞者不生實信耶莫作是說一句最要緊盡未來際之宏揚佛法者皆當如此如來滅後滅即滅度滅度有二義根本義即指不生滅之心所謂生滅滅已寂滅現前名之曰涅槃後來借用凡一切佛菩薩圓寂亦名入滅滅後者指佛之一切生滅相既滅之後也當是應化身滅如來是法身何故說滅此有精奧之道理佛要吾人了解特說如來滅者有三要義一報身應化身皆是相滅者是報身應身之滅如世尊之穿衣吃飯示現凡夫相之滅是應化身滅也報身亦從法身顯現既有顯現亦即有滅此不說應身報身滅者即明示如來不復再現應身報身要吾人警覺須知如來所顯之應身報身尚是生滅所謂凡所有相皆是虛妄何況吾人之臭皮囊乎又吾人身相生不知其所以生滅不知其所以滅完全為業力所牽自己不能作主佛則不然雖應身報身是生滅然如來自己作主要生即生要滅即滅吾人皆有如來藏應從速回到本來面目二證得本性名如來然法身無相如何可見可見者即相即菩薩所見不過法身所現起之報身凡夫所見是法身所現起之應化身然倘能見應身報身之非相者則見如來故要見性即從非相而見不可入於斷滅故警告吾人見如來已不容易須勇猛精進以證得之吾人要見如來當從性上求說到性則我與如來自他不二能在自己性體上理會一些即是見如來之機三如來之報身應身還是入滅還是相但不是永遠滅還要示現須知報身應身仍是法身之影子吾人知法身不滅即報身應身又有示現之機會古來有見丈六金身者有勇猛精進如羅漢之見千尺佛身者有見如須彌山之大身者即菩薩所見之報身又如智者大師注法華經畢親見靈山會上儼然未散皆此證也故第一義說如來不再示現報身應身令吾人警覺第二義令人知要見如來須在自身上用功第三義說如來不滅祗要用功尚能見到後五百歲句自來有三種解釋一以後對如來滅後之後講即指如來滅後之五百年二以如來滅後第一五百年為前第二五百年為中第三五百年為後三說如來滅後第五個五百年蓋正法像法各一千年末法一萬年此正指末世之初五百年如來滅後正法千年初五百年解脫堅固次五百年禪定堅固所謂解脫即證得般若波羅蜜度一切苦厄堅固者衆生根器堅固也次五百年根器稍差然能住於禪定此解脫與禪定正是定慧故稱正法像法千年之初五百年雖亦有解脫禪定者然已甚少專事講理不重實行故云多聞堅固須知看經重在作觀徒事多聞如數他家寶自家無半點分又名說食不飽世尊對阿難說多劫以前與我同修至今仍為佛之侍者其病即在專務多聞次五百年雖多聞者亦少衆生祇知修寺造塔故云塔寺堅固此一千年佛法形式尚是已失佛之本意不過相像而已故稱像法至末法之初五百年佛法更衰衆生祇知鬬爭即新名詞所說之奮鬬印度佛法之早滅其原因在像法時已多鬬爭我國亦然在唐朝中葉禪宗淨宗相宗均起門戶之爭故云鬬爭堅固本經後五百歲正指此時現在則又在末法之更後五百年矣故佛說此時若有人能看經是真不可多得者也以此為實正是能持戒修福者此有四義一般若是正智慧慧由定生定由戒生故欲起般若正智須從戒用功否則末由生定生智凡夫能持戒方能離外染如不持戒則心不清淨不能攝心一處不能作觀如何能生般若倘不由持戒而欲生智則墮入惡取空亦不可知故福慧雙修如車兩輪缺一不可修行者能如此方能成兩足尊且兩者須平等不可輕重有人說祇要智慧殊不知重慧輕福即缺少大悲萬萬不可故諸佛教人發大悲心本經開口即說布施足見修慧不能不修福若不修福則與衆生無緣不但無緣即修行者之相好亦不能具足宏揚佛法者相好亦關重要故佛經中處處說佛菩薩之相好羅漢之相即不如佛此有道理前說證得體後要現相均為衆生衆生見相好者易於親近也般若法門是令人成佛持戒修福是成佛根基二須知持戒之人必少欲知足貪欲較少此類人修般若方不出毛病蓋修般若須離相貪欲多者決不能離也修福者必深信因果世人要得名利依照世法去求此類人則照佛法去求故深信因果者決不致偏於斷滅相不住於相則持戒者最宜不入斷滅相則修福者最宜如貪欲多者一聞般若毛病甚多有曲解不住相以為為惡不妨放言高論無所不為反自以為深得般若之理甚至殺生淫亂而皆以為不住相故佛不取此類人必揀少欲知足之人三前文說發心行般若應行布施布施即捨此兩種人即能捨者持戒能捨於世間之欲修福則捨自己之財産精神以為財法無畏施之於人此正合般若道理四修此法門宜先將非法相一門堵塞持戒修福正是堵塞非法相祇要再在法相上久久觀照於法相不取著即可成就故佛揀此兩種人可見持戒修福無異於正指學般若法門之人又即是對吾人言若要學般若須諸惡莫作衆善奉行不作惡是戒行善是福切實履行將基礎築固方可此兩種人是謹小慎微能放捨一切否則不能入般若能生信心者以信為入道之門也必如此實行方能入門否則單是講說不能入門有人說持戒修福是修般若之根本先堵住偏空此固然矣然尚有疑經中明明說以此為實此兩種人畢竟智識不足何能明了本經之真實要義耶此有緊要道理在何以故蒙佛加被故此類人是佛所揀定之根機若能依佛說持戒修福而行必蒙佛加被即能以此為實學佛者定須行住坐臥時時刻刻求三寶加被無論修何門功夫均如此即講經時亦須將平時知見拋開求三寶加被若離此觀念即是未起信心即如念佛於念時非將平時知見一切拋棄心中一無所有專意求彌陀加被不可然又有人說如此則學愚夫愚婦即可何以佛又說須讀誦大乘經典耶此有二義一明瞭經典則功夫加勝將道理蘊於八識田中一旦相應則三明六通能一時發生二果真能信應學愚夫愚婦之信心堅定無奈世間中等人多不肯自居於愚故定須令之明理古德著書開端多有求三寶加被之語大菩薩作論論前亦有承佛威神力故此是真實不虛非依賴性亦非迷信倘無此等觀念則有一我見存在將自己性靈障住著書作論如何能徹底故非將我見完全拋開不可世間法如孔子動輒歸之於天亦得此意漢以後學者即不之知子次示夙根之厚當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根補上科持戒修福至以此為實此科正為之作注解是人即指持戒修福者指明是人不說人等可見持戒修福雖說兩事實是一事二者均不可缺一佛至二佛時間已極長遠不知多少劫數何況三四五佛可見是人善根種得極遠而世尊又說尚不止此已於千萬佛所種諸善根且千萬之上再加無量二字則時間乃是不可說不可說之長遠是人不但修一善并修諸善諸善指六度萬行而言可見是人於般若已修得極其長遠矣種根正對持戒修福言是人種根已極深是諸善合成之根真所謂難能可貴世尊於過去無量之事均悉知之此說是真實不虛就吾人凡夫眼光觀之是人持戒修福已合道妙何以故上文世尊對須菩提一開口即說所有一切衆生之類皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者是發大心先應度生即不落空次實無衆生得度不住於相次說大行應無所住先說不住相次說行於布施倘住而不行即是落空此二段文世尊叮嚀告誡必不落空方可發心修行是人下手即持戒修福豈非與世尊所說先不落空暗合乎又發起序中世尊欲說般若先示現凡夫著衣持鉢等即持戒又令衆生生慚愧心即修福是人持戒修福豈非又與世尊本意暗合乎可見非久遠以來種善根者不能如此暗合道妙也觀世尊語氣似乎是極力讚歎是人其實是鼓勵吾人使聞此言說章句者即當實行故對須菩提有莫作是說之誡詞以為若如須菩提之說後之人必以般若為難修寖至高推聖境其實不難即在持戒修福下手此是世尊之大慈大悲須菩提豈不知發心修行須不落空不過代衆生請問耳亦是大慈大悲也吾儕苦惱衆生如今得聞此言說章句亦是希有亦是無量千萬佛所種諸善根者倘不如此則於甚深微妙之般若不可得聞即聞亦等於不聞吾儕已在又後之五百歲中鬬爭更為堅固竟能來此地讀誦受持必是不願競爭少欲知足有持戒之資格者如此吾儕即不宜妄自菲薄已持戒者更宜用功再求堅固未持戒者應照佛說去持則諸佛必大歡喜以此種得善根於此發芽吾儕有此資格又有世尊加被可不自勉乎以此為實既明真實義又能修行六度之中無論何度皆歸於修福布施不必定要破産但量力捨少數財與人有益即是財施為人說法或送人經典即法施並非難事又勸人學佛必勸之持戒修福見不持戒者更要勸又見已持戒尚未知般若者更要勸之使明般若此福德之大不可思量何以故以是紹隆佛種故又要勸人從速修習淨土求生西方須知般若與淨土關係至深前說學般若者須先不住相不住相方能就文字般若起觀照觀照功深而現實相般若此即是性修行下手先觀照最後要現實相此甚不容易在娑婆世界中種種惡誘如何能即現實相故大菩薩修行發願修三阿僧祇劫不知經過多少輪回是人善根固厚然至千萬佛無量劫之長時間尚祗是能生信心可見業障深重故必發願求生西方方可又如上文發大心所有一切衆生之類皆令入無餘涅槃而滅度之此等度生上至非非想天下至地獄吾人即發此大心如何能去度此實令吾人先觀照緣生平等之理若欲滿願非先證性不可欲證性不可不先求生西方生西不是為自了原為度衆生方與彌陀本願相合為滿大願可證性故故普賢行願品說虛空無盡世界無盡衆生無盡我願無盡此非與本經廣度衆生之願完全相同耶可見般若法門與淨土法門是一非二必有此大願彌陀方來接引往生不為自了有往生法門方能成就般若法門是人持戒修福亦極不容易已親近過許多佛但種善根可見成就般若法門應親近彌陀實相般若方能現前永明禪師云但得見彌陀何愁不開悟故學般若者須速修念佛法門修淨土者亦須速修般若法門如不明瞭此第一義徒念佛者恐祇生下品故提倡淨土法門者不可僅說念佛為止須知修淨土正為滿大願僅僅念佛下生不能滿也永明禪師之無禪有淨土萬修萬人去但得見彌陀何愁不開悟此偈祇可勸愚人不可勸利根人世人忽略得見句祇注意萬修萬人去句以為不必依照十六觀經之修觀此是錯誤觀經明第一義正是般若若祇生下品不能見佛也壬次明其福德分二癸初正明其福聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德補聞是章句是指定持戒修福之人此聞字與上文得聞如是言說章句之聞字相應聞得如是言說章句以此為實方能生信淨信二字正指實信何謂淨即後文之信心清淨則生實相是人切實用功觀照久久如此修行一點不著淨信即生亦即實相此淨字非對染而言是絶對之淨空有二邊皆不著故是實相乃至者超略之詞生淨信有淨念相繼者有多念者最少限度是一念生淨信不能多念亦不能念念相繼此乃至二字包括許多功夫不同之人故下文稱是諸衆生然無論功夫淺深如來悉知悉見一念即起心動念生者即龍樹所說一切法不生而般若生可見非十分用功不能得生且一念相應即淨念相繼之根淨念相繼即從一念相應而來此一念清淨無人得知惟有如來能知能見蓋淨心是無相非肉眼天眼所可見也然此說尚非根本義須知此句正是生淨信之注解如來是法身是人一念相應即與如來心心相印光光相照故如來悉知是性中知正是悟徹佛性如來悉見是性光照正是初開佛眼此功夫是了不得故古人云一念相應一念是佛既是佛福德詎可思量耶此二小科正為能生信心以此為實作注解當知是人起至已於無量千萬佛所種諸善根是說明持戒修福之因聞是章句起至得如是無量福德是說明持戒修福之果世尊極力讚歎是人正是鼓勵吾人發無上心發大願起大行而得無量福德又須菩提莫作是說起至得如是無量福德正為前明示科應如是降伏其心至則見如來作注解上文是說其理此則舉出是人以證實之須知惟持戒修福之人方能如是生信如是生淨信如是得無量福德本經文義處處相應脈絡貫通如此癸次釋顯其故分二子初正釋何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相補此是正面釋生信得福之故何以能生淨信何以能得無量福德須是除卻分別心方可分別既除正信自現即龍樹所說一切法不生惟般若生是人雖未能般若完全現前然已生淨信與如來心心相印光光相照即得無量福德此正不容易由分別妄想既除乃能無復我相人相衆生相壽者相是諸衆生句包括甚廣上文一念生淨信者指程度最低者言尚有多念相應淨念相繼者故云諸衆生無復二字之復字應注意言是人我執已空不復再有無法相二句言是人無法執也四相由執我相而起佛經說四相者意義甚多今舉其與本經契合者有廣狹二義狹義即指執五蘊色身此即我相凡夫同病此執一切忘不了不但現在還計及未來死後或升天或升大梵天所謂補特加羅因此起種種妄想相宗稱為遍計所執未來與現在是對待的在對待一方面看是人相由此身起盛衰苦樂種種等是衆生相再計五蘊色身命根不斷是壽者相此皆就自己五蘊上種種計度分別者也廣義計我種種分別對待即人不止一人即衆生此計相續不斷即壽者一起執著即有能執所執能即我所即人種種分別即衆生相能執所執不斷即壽者相要知四相即從我見開出開即四相合即我相世尊何以開出而說有妙義在我見即分別執我即七識起分別即六識般若是正智如要實相般若現前非將六七識轉移不可六七識轉五識八識同轉故世尊屢說四相四相空即我執空又名人空我相是從身上起執法相是從法上起執無法相即法執空亦名法空非法即是無即是空亦無非法相是空亦空又名重空又名俱空般若顯三空之理以遣執為主人我空後又執法空還是不可故必重重遣之連空亦要空古人稱為窮空到底此與偏空大不同故名勝義空又名第一義空此釋上科已生淨信者即能到三空三空包含許多道理其廣無量其深無底普賢行願所謂甚深教海也依三空說無四相是我空無法相是法空無非法相是空空其實即是除我法二執無法相是空法執無非法相亦是除法執非法本無法然卻執不得一執亦成非法執故無法相之法執空是第一重亦無非法相之執亦空是第二重二者合來皆是法執與上文四相卻是我法二執對說是人生淨信是我法二執俱遣然我法二執由分別而起者是粗執尚有俱生我法二執從起心動念而來之細執此名隨眠又名住地無明是人但能除分別我法二執未能除俱生我法二執也又含一種要義分說是三空合說是空我法二執然又可以從空有二邊說非法相是空屬空邊我法可並說屬有邊是人生淨信又能二邊不著有邊名俗諦空邊名真諦此中又含二諦他經中佛說三諦有第一義諦般若遣執祇說二諦要知遮照同時即合中道說二諦實含三諦也遣二邊即雙遮雙遮即雙照還須遮照同時是人尚未至此程度僅能二邊不著細玩經文可知凡佛之說皆徹首徹尾徹始徹終不可忽看即上文生淨信得無量福德亦有淺有深總而言之是人但除粗執未除細執佛故愈說愈深以明是人除執尚是初步更須加功然是人至此卻不容易祇一念相應已了不得凡用功之人常有此種境界覺得心中空空洞洞乾乾淨淨有時至半月或半年皆是此種景象須知此種功夫所差尚遠不可自足否則生二病對於經義則以深為淺對於自己卻又以淺為深殊不知尚遠尚遠如本經所指是人分別我執已除貪瞋癡雖未去盡已經很薄還須再加功吾人用功即可自己審量究竟與經上所說合否說至此因想古代有一段因緣唐肅宗代宗父子平定安祿山之亂代宗極力宏揚佛法密宗不空三藏亦於是時來中國佛教盛極一時代宗有一日與宗國師談佛法魚朝恩在旁即攙問佛說一切衆生皆是佛則無明如何而起國師即云汝不配此問朝恩慍甚然代宗在座不敢作聲但怒形於色宗國師即說無明從此而起吾人於此可以試驗假如遇人來謗毀我能否不生瞋如遇色聲香味觸法等能否不起念如遇貧乏時今日飯亦無著心中能否不愁必行所無事方可否則即著我相人相衆生相壽者相矣但若空空洞洞固亦甚好然不止於此應當去行布施六度萬行均要去做若以空空洞洞了事即著非法相若自己有度生之心即著法相故知是人生淨信除卻分別心正是不易所以如來悉知悉見許其明同佛心開了佛眼得如是無量福德也此不但釋上科又回應明示一大科因前文未說明此處乃點醒之所有一切衆生之類至我皆令入涅槃而滅度之正合法相實無衆生得滅度者正合非法相若菩薩有我相人相衆生相壽者相即非菩薩即是無復我相人相衆生相壽者相菩薩應無所住行於布施即是捨即破我要吾人先空我相不住於相即不住種種相即無法相又以虛空四方上下為喻即無非法相若見諸相非相則見如來是二邊雙融蓋但見諸相即著有但見非相即著空見諸相非相即二邊雙融即無相無不相得見實相故云則見如來見如來故得如是無量福德即上文福德不可思量佛意謂是人能明了我上文所說之法持戒修福能生淨信且以此為實當然無我等四相得如是無量福德亦是鼓勵吾人欲修般若應如是下手不可落空先將非法一面堵住腳踏實地躬行實踐法相非法相皆不著是用功之要訣以下皆江居士親筆子次反顯何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者上科名正釋者是從正面釋明何以為淨信及何以得無量福德因其已見三空之理故也無我人等相人空也一名我執空無法相法空也一名法執空無非法相并空亦空也一名俱空是謂三空由見三空從此精進淨念相繼便證清淨法身故曰得無量福德此一科名曰反顯者是更從反面顯其必應三空之故以明絲毫著相便是分別心便非清淨性何以故凡所有相皆是虛妄故所以著相便是逐妄逐妄便迷卻真性真性既迷依然是起惑造業苦報輪回的凡夫何能得無量福德耶由此可知既已正釋更加反顯的用意無非欲令衆生速速覺悟依此經無住之旨一面勤行六度一面觀照無相發生淨信以期證得三空性體超凡入聖耳此是必須反顯之總義然尚有別義蓋防讀上文者起疑也云何起疑一我人等相從身見起身為苦本不應著相其理易明法則不然自度度他必有其法如布施六度豈不明明有法有法便有其法之相今云無法相法而無相是法亦在若有若無之間矣然則法相云何可無耶二若有身見勢必分別人我一有分別勢必造業受報是故不應有身見不應分別人我而法本非身其中那有人我即令於法上起分別那便是分別人我至於非法二字無異空之別名既名空那有相乎然則何故將法與非法與由身見而起之我人四相相提並論一概云無耶為欲斷此種種疑故所以須從反面加以顯明的說明也是諸衆生即指上來生淨信見三空的衆生若心取相的心字要緊須知心本無相相字不必專指色身言乃遍指一切境界相也心本無相若有一種相便取著了境界若取著境界之相豈不是已經迷了自己的心麼這正是背覺合塵樣子所以成為凡夫者因此更須知取著境相是誰取之乎并非他人我也可見心若取相便成我相而所取的相是由能取的我而有猶之人相是由我相而生故所取之境便成人相所取之相疊起叢生便成衆生相其相不斷便成壽者相由是言之無論取著何相便有能取所取叢生不斷故曰若心取相則為著我人衆生壽者也則為者猶言便是言一取便著了所以若取法相亦即著在我人衆壽四相之上何云法不同身其中無我耶一取便有能所的分別何得云法上分別不是人我分別且由此可知上科所云無法相者謂其不取著耳非畢竟無法無相也若畢竟無是斷滅相矣至若非法固是空之別名空原非相然既取之便有能取之我所取之人叢生不斷四相宛在故曰若取非法相即著我人衆生壽者嘗見一種刻本不知被誰刪去若取非法相之上的何以故三字以為本是一直說下義意明顯有此三字反令語氣曲折其義不明嘉慶間有一刻本雖不敢徑刪但注其下云某某注釋及各正本俱定為衍文云云所云某某者大都明清間人也由此可證此經字句多與古本不同者雖不無傳抄之誤亦實不免被淺見者妄加增刪真是可嘆幸而近今經本又經明眼人將此句補入然偏遠處經本尚有刪去此句者萬不可從蓋用此三字含有精意關係緊要萬不可少有人云是以何以故三字跌起上義使知若取非法尚著四相況取於法此意尚淺因若心取相則為云云已釋明其故了何必更須跌起然則其意云何蓋防不得意者雖聞若取法相即著我人衆壽然尚未明何以方為不取見地未真或致誤取非法而尚自以為是不取法也因用何以故三字警問使深思其故不可誤會即接云若取非法相即著我人衆生壽者則知倘取非法依然著相無異乎取法者將勿所謂不取法并非畢竟不取耶既非不取而取又著相可見不取者乃令不取著相會歸於性耳此意云何便是廣修六度萬行而心中若無其事湛然凝寂不為所動即此便是不取法相的真實義如此而行既不著法亦不著非法便是二邊不著合乎中道矣然則有此何以故一句下文若取非法相兩句無異為上文若取法相兩句作了注解說法之妙如是如是若刪去此三字則語氣平列便不能顯出此義矣須知有是即空而有空非離有之空故心經云色即是空空即是色所以此經處處說不取著卻處處說不斷滅不斷滅之言雖在最末後點出其實開首所說無不含有不應斷滅意在如度生無度相初不僅言實無衆生得滅度者一句也應無所住行於布施其意尤顯而若見諸相非相則見如來更是結晶語諸相非相即明不取取則只見相而不見性矣惟其不取故見相即非相而會歸於如來藏性故曰見如來也總之相原無過過在於取耳所以若捨相而取無相捨無相而取能無之無取便成相便障自性可知但能不取雖有相而無妨苟或有取雖無相而成障初何必滅相見性哉因是之故所以獨揀持戒修福為能信機蓋持戒修福已不著空以般若熏習之慧解一開於法不執自然能不著有而又不復著空易合中道視彼狂慧相去天壤故經論有言寧可著有如須彌山不可著空如芥子許此明著有者易為功著空者難施救耳此中取字正與下文捨字緊對此中是明不取法者非謂可取非法也約意言之下文則明法應捨者非謂非法不應捨也上下語意正同皆含有不可離有談空意總之二邊皆不應取即皆應捨故下文即結以是故不應取法不應取非法仍指歸中道也又用此何以故三字更有一義因上科無復我相乃至亦無非法相是一直說下以明三空已如前說此科於若取法若取非法之間用何以故隔開者便是別明空有二邊不著義以引起下文是故兩句也若心取相兩句本是總論不可取相即謂兼指身相而身相屬有邊與法相同非法相則屬空邊其間若不隔開而仍如前一直說下則此義不顯而下文是故二字便無著落而承接不上矣足見秦譯之妙壬三結顯中道分二癸初以雙離結成是故不應取法不應取非法是故之故正承上文因若取法非法相即著我人衆壽故兩邊皆不應取也亦與上無復云云相應以不取則無相無相方生淨信為如來知見得無量福德耳總之佛之言此正示以下手方法先令二邊不取漸能空相心地清淨由是而信而解而行至於究竟亦不過兩邊不著耳蓋由觀照般若證實相般若實相者無相無不相非兩邊不著乎此之謂因賅果海果徹因源癸次引筏喻顯義以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法以是之是正承上文不應取法兩句亦遠與無法相以下諸句相呼應筏喻者如來常說之法也蓋說船筏原為過渡既渡則捨筏以喻佛法為度生死生死未度不可無法既達彼岸法亦無用此以示法不可執之意蓋阿含經中為弟子等常說者也法尚應捨句即躡筏喻來亦兼指上文不應取法即以引起下文何況非法何況非法者明其非法更應捨也捨即不取然捨意更深不但不取而已前已取者今亦須捨究竟言之即不取二字亦應捨也所以引常說之筏喻者一面用今義顯常說復一面借常說顯今義也蓋謂以此法與非法皆不應取之義所以如來常為比丘說的筏喻雖只說了捨法須知是連非法一併捨的何以故法尚應捨何況非法其更應捨也何待言哉此顯無小非大是法平等即是用今義顯常說也且以顯明今義之兩邊不取語雖平列須知非法更應不取方不致於著空此是借常說顯今義也此段經文義蘊深微不止如上所說當知今義與常說有最衝突的一點必應了然者蓋常說是令法不需要了則捨而今為初發大心者說乃是令於正需要時捨法是也有此大衝突世尊防人執常說疑今義或執今義疑常說故萬不能不引來使學人因之洞明雖異而實同耳其疑云何疑云正需要時捨法法捨豈非無法無法將何以度這不與常說相反了麼乃又言不應取非法究竟有法乎無法乎未度者需要法乎不需要法乎當知今說之義乃是有無二邊俱不可著所謂中道第一義當知二邊不著便是二邊雙照二邊不著固無所謂有法而二邊雙照則亦無所謂無法且不著便是雙照可知正當無所謂有時即復無所謂無正當無所謂無時何妨無所謂有汝思之深思之究竟有法乎無法乎抑有即無無即有乎知此則知今義與常說雖異實同矣雖然佛引筏喻專為常說今義的異同釋疑乎非也其深意所在實為防人執今義疑今義其疑云何諸君看出了麼請看是故不應取法兩句雖是結束上文而與上文所說大有淺深世尊恐人不明生出障礙所以引常說筏喻來顯明耳不然是故兩句已結束了原可不必又引筏喻也至於上面所說的二邊不著云云乃至究竟有法乎無法乎一段正是借常說顯今義以免於今義之淺深起疑生障耳然則當先明其淺深何在請看第一段說的無復我相乃至亦無非法相是說的無相第二段若心取相乃至若取非法相等亦是說的不取相至第三段是故兩句乃是法與非法一併不取不止是不取相此即與前兩段大大不同的所在防人起疑生障者正在於此你看第一段說了無相因欲斷人法相不可無及非法本無相之疑故說第二段取則著相使知所謂無者乃是令人不取并非無法無相且既取便有相故非法相亦不應取復點醒不取法相是以不取非法相為界限俾得明了不是絶對不取法乃是雖取六度等法修行而心無其相然後學人才不致於或偏空或偏有才有正確的下手處須知般若妙法下手便應徹底云何徹底直須法與非法影子也不留才對蓋名曰法相非法相可知其是法之相是非法之相若取法取非法取則有相尚得曰不取相乎所以前後所說理原一致但語有淺深次第耳所以必須說第三段是故兩句應當如是徹底不取方為不取相然後因心清淨才能證入清淨法身之果問如此說來法是應捨的了且又說了一句不應取非法我也明了這亦是用來為不應取法作界限的使知法雖不取斷不可取了非法但是如此一說即依六度法修行而心無其相的辦法便不能適用了何以故此中不是說不取法相明明說不應取法故然則從何措手耶答世尊正為此故所以要說第四句顯明出一個絶妙的辦法也你看第四段中兩句要緊的話法尚應捨何況非法這兩句無異於為是故兩句作注解的這正是指示學人曰我不是叫你單不取法是叫你連非法一起不取的阿止不取法那就變成無法無法云何修行得度若法與非法一齊不取這就是妙法阿蓋引筏喻來說者因筏喻即是法也所以一方面便是叫人領會常說之捨法是連捨非法在內的使知一併捨卻便是如來常說的筏喻之法則今明明說是法與非法一齊不取豈非即是所說之法乎而一方面又是叫人領會常說的筏喻是說未度時不可無法已度則捨之使知今尚未度何可無法便不致誤會不應取法是無法況明明又說不應取非法則更足證明法與非法一齊不取正是開示我們的妙法了所以引筏喻者正為顯此問如何一齊不取正是妙法這又把人弄胡塗了如何便是妙法呢當知第一義中法與非法本不可說且無所謂生死無所謂涅槃更無所謂度即二邊不著二邊雙照皆成剩語直須剿絶情識斬斷葛藤正當剿絶斬斷時㘞的一聲直下言語道斷心行處滅則生滅滅已便遍虛空皆成不動道場遍虛空皆是淨光明網便與十方諸佛覿面了也至此雖曰無所謂度卻已飛行絶跡的如是而度了然後恍然即此無所謂度一句亦是引人得度的妙法敢問這剿絶斬斷的工夫雖欲不謂之法何可得乎而法非法皆不取非即剿絶斬斷乎兩邊逼得緊緊的起心動念非著此即著彼直使分別妄想無存身處譬如剿匪兩面包抄逼得匪無立足點自然降伏矣此是快刀斬亂麻的手段故曰剿絶情識斬斷葛藤這正是龍樹菩薩說的一切法不生而般若生般若正宗是無住而兩邊不取即是無住的鐵板注腳即此便是無上甚深微妙法即經中所謂阿耨菩提法也以此為本修因故證阿耨菩提果當可恍然正與筏喻一樣不是無法可度更不是未度捨法矣汝乃疑將云何度究竟度時有法無法豈非夢囈問佛何不說明不取便是法而使人自領耶答此亦具有深旨一不取本不是法無以名之假名為無法之法耳如布施般若等皆是假名無以名之姑名為法豈實有其物乎世出世法莫不皆然二正為衆生處處著故說兩邊不取以治其病倘以為此即妙法便又住著了此又不說明之苦心也然世尊猶恐學人起心動念不知不覺住著於此而起分別則無明猶在更須遣除所以又說第二周即後半部者正為此事也三雖不說明防人倣徨無措故引筏喻透些消息俾真修者亦得藉以自領當知凡事由自己領悟得來者有受用何則當其領悟時即其得受用時也比從外面由見聞得來的有益所以古德說法每不盡情吐露者因此蓋防塞人悟門也鄙人今番講出未免有違古訓深知罪過然不得不講者亦有區區微意因佛法久衰一般人怕聞般若一般談般若的往往走入歧途而諸君又如此熱心求法若絶對不與稍稍點醒亦復不能啓人的真實悟門且更有所恃而不恐者有後半部經很深切的對治此病不必怕其聞而住之矣且先在此處點醒說至後半部方有張本此下應勸一座不可缺席以免前後不接說至此處還有一事不能不供獻凡欲領悟經中的真實之義惟在至誠恭敬的讀讀熟了常常觀照其一段兩段或一句兩句觀照即是思惟然此思惟與平常所謂研究大異其趣平常的研究一種學問是專以凡情推測此則不然雖亦不離文字然切不可在文字上推敲即推敲亦推敲不出必須掃盡一切雜念澄心靜慮的將一個心全注在其上不在文字上推敲便是不取法卻將全神注在這經上便是不取非法這個便是修定久而久之忽於一念不生時性光發現經中真實道理自然湧現這個就是思惟修才是受持才能領悟所以說領悟時即是得有受用時讀經要這樣讀法定慧二學便一齊修了還要多多懺悔求三寶加被不然恐或障重不但不能領悟即觀照亦做不好了此下須說兩邊不取不是不行布施等度問兩邊不取即是般若法門則布施等法將可不行乎誤矣不行布施等是取非法矣須知般若是布施五度之母般若生則五度即隨之而益生其行之也愈妙以般若觀智行五度則五度皆是波羅蜜矣凡舉一法皆有四句差別或曰有或曰無即是空或曰亦有亦無或曰非有非無甚深般若四句俱遣所謂離四句絶百非是也百非不外四句因自性清淨不染纖塵故應一切俱非而此中四段正是離四句也第一段是以無遣有著有則成凡夫故須以無遣之第二段是說亦有亦無以遣偏無行六度法存有也心無其相存無也偏無防墮斷滅第三段是說非有非無以遣亦有亦無因亦有亦無不免存有二邊故以二邊皆不應取即是取有亦非取無亦非則二邊不致隔別而相融矣至第四段法尚應捨之法指六度等法言何況非法之非法指非有非無之法言蓋以一切法不生而般若生之義所謂二邊不取是貫徹到底故正度時先從亦有亦無入手以達非有非無既得滅度則不但亦有亦無法捨了當然併非有非無法一齊捨卻方成諸法一如之如來此固諸佛如來所常說也如我世尊然穿衣吃飯示同凡夫聲音相好儼然具足至此則生死涅槃二皆不住有乎無乎亦有亦無乎非有非無乎四句皆不可說矣不應取法不應取非法兩句為最要語上面諸說皆是兩邊不取也故此兩句無異為上文之結詞筏喻一段亦是顯明此兩句即是妙法所謂阿耨菩提法也應詳說之如上說法所謂無可說中方便而說的第一義悉檀也此經所說皆第一義悉檀故講者亦不得不如是而說然佛圓音一演無義不賅無論作何種說皆得上說甚高亦無妨依為人悉檀說之為人者對機是也經云此經為發大乘者說為發最上乘者說如是之機所以為之頓說如云無我人四相此說我空法為度我執又云無法相不應取法法尚應捨此說法空之法為度法執也又云亦無非法相不應取非法何況非法此說空空之法為度空執也說法甚多云何疑其無法將云何度耶須知是說無我人等相非無我人等也是說無法相無非法相非畢竟無法與非法也總之曰無曰不取曰捨但為遣執非捨其法三執既遣則三空齊朗三障圓銷方且生死涅槃兩皆不住尚何此岸之不度彼岸之不登乎更依對治悉檀說之對治者對症下藥醫其病也經云衆生病在處處著故佛對有說空對空說有無非為對衆生治其偏著之病一有偏著便與性體不應便是背覺合塵便致業障叢生受苦無盡故須對治也如此中云應捨法復云更應捨非法捨即不取亦即無相取意而言不盡依文則知所謂捨法者乃捨其著有之病耳又如既云捨非法卻并云捨法則知所謂捨非法者亦捨其著空之病耳病除則有成妙有空是真空須知云妙有者明其有而不有故妙有即是真空云真空者明其空而不空故真空即是妙有由是言之可知下手便令二邊不取者正為令得二邊雙照雙照者便是惺惺寂寂寂寂惺惺所謂寂照同時同時者即是寂而常照照而常寂便是寂照真如三昧便是佛境界到此地位豈但滅煩惱障亦滅所知障了豈但度分段生死亦度變易生死了此之謂皆令入無餘涅槃而滅度之可知此中所說皆是極圓極頓直令成佛的無上妙法無論修何行門如能領會此中義意而行成就必速且高且其法直捷了當說難亦並不難諸位善知識佛法難聞竟得聞佛恩難報終須報惟在吾人直下承當耳壬四問釋證成分三癸初舉如來果德問須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶此問釋證成一段又是釋明不應取兩句之所以然如何為兩邊不取及為何須兩邊不取而舉果地證成因地以明須因果一致也故世尊舉極果問須菩提釋明之後復舉一切賢聖證也一切賢聖望極果為因而望初發心人則為果也分三小段經中語句往往言在此而意在彼眼光四射八面玲瓏即如此中問語觀兩耶字明明言中含有無得無說然而若曰無得說則取非法了也若曰有得說又取法了也今舉此問即是試探聞法者究竟於兩邊不取之真實義能否領解耳補本經凡安於意云何四字淺言之則是試探聽法之人對以上所說能否明瞭深言之即指示我們讀誦之人莫要錯會佛意於以下所說之話要深深體會方是正知正見否則不合佛意佛問語稱如來須菩提答中卻有一切賢聖可見此不應取法不應取非法無論成賢成聖成如來皆非從此法門不可如來兩句緊跟不應取法二句而來驟看之得字似乎有得有所說似乎有說佛意明明謂如來對於他所說之法心中有所說否此法正指阿耨多羅三藐三菩提如來為何說法即為一切衆生證得無上菩提方成如來當然有得問中兩耶字表面是法內中即含有非法在蓋恐粗心者有所誤會要須菩提來解釋不但試探聽衆對於二邊不著之義能明與否且指示我們用功非從二邊不著下手不可粗心者即疑佛在菩提樹下成道豈不是得果四十九年說法豈不是法如何叫我們初發心人不應取法一經須菩提解釋世尊無得而得無說而說此疑即解進一層言不說世尊得阿耨多羅三藐三菩提亦不說佛而說如來如來是法身是性德佛性人人有之特凡夫藏在無明殼耳故說此二句是叫我們證性性上豈有所得耶豈有所說耶癸次以法不可執釋分二子初明無定法須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說補此答極圓極妙看似所答非所問世尊就能得之人能說之人一邊問長老卻就所得所說一邊答問是一邊答是一邊最為圓妙意謂你老人家問如來有所得有所說我尚未成佛那裏知道故我不過就所說之法一邊且依佛向來所說之義略解之如此一來占住身分我既未證得佛當然不能知道但就世尊教導之理去領會之當不致誤也長老此說一方面為自己設想一方面開示我們世尊說此二句極為緊要應依照長老之旨前去領會長老答中不說如來而說佛大有深意蓋謂善男子善女人等欲證無上菩提應依照已證得果位之佛去做也無有定法即法無有定簡單言之即法不可執著亦無有定法即為法不可執作注解阿耨多羅三藐三菩提尚無有一定之法可名答上文所問之有所得有所說之意已明法尚無定名何況有得更何況有所說佛對發菩提心之善男子善女人何以不說無上菩提而說應行於布施可見一切法外無有阿耨多羅三藐三菩提故無有定法說法皆是方便故亦無定法可說子次釋應雙非何以故如來所說法皆不可取不可說非法非非法補雙非者即非法非非法即雙離亦即雙遮謂皆非也長老此數語圓妙之極可作種種解釋佛經文句應作面面觀佛自言我說法窮劫不盡何況我們凡夫可不從多方面去領會耶無定法亦無定法可說即就上文阿耨多羅三藐三菩提悟得長老自謂我何以悟得無定法亦無定法可說耶因為如來所說之法即無上覺即究竟覺究竟覺即無念何以故經中說離微細念故照見心性名究竟覺可見究竟覺即無念無念如何可取心中一動方可取故能取所取皆要不得故云皆不可取世尊要指示我們修行故旁敲側擊勉強而說而般若心性離言說相了無能說所說故云皆不可說我們若執為真有阿耨多羅三藐三菩提可證是錯了故云非法然若執為沒有阿耨多羅三藐三菩提那又錯了故云非非法又如來所說法之法字乃指一切法而言蓋一切法即阿耨多羅三藐三菩提也如來所說法叫我們不可取然明明又說許多法叫我們不可取非法所以我們聽法的人法與非法皆不可取是知說法之人亦不得已而說對機而說既然法無有定可見執法不是但是明明說法可見執非法亦不是非法非非法二句正是不應取法不應取非法之注解何以不應取法因非法故何以不應取非法因非非法故非法非非法又可倒轉觀之若云如來所說非法非非法皆不可取不可說長老謂亦無有定法如來可說特提如來二字者如來是法身法身無相那有可說含應化身有相可說之意故云無有定法無有定法者既不可執定有法可說亦不可執定無法可說之謂也法身是性性是大圓覺海無量無邊一切衆生及諸菩薩等就性上說皆是一真法界故世尊之說法自大圓覺海中自在流出我們要證到大圓覺海應先離心緣相如何可取又要離言說相如何可說離言說相正是言語道斷離心緣相正是心行處滅既然心行處滅言語道斷如何可去分別故云非法非非法前說無念正要離分別心故云不應取法不應取非法世尊證得法身如來雖有所得並無所得雖有所說並無所說要雙照先得雙離世尊所問二語即含有此意若謂法身尚有所得耶法身尚有所說耶如來之所以稱如來是先離分別汝等在因地修行亦應先離分別何可存有所得有所說之見耶癸三引一切無為證所以者何一切賢聖皆以無為法而有差別補所以者何即指出為何兩邊皆要非之所以然一切賢聖皆用此雙非之法我們凡夫何可不用十住十行十回向四加行為賢初地至等覺為聖如來極聖故云一切無為即涅槃涅槃梵語具足曰般涅槃譯為寂滅或不生不滅羅什就中國舊名譯作無為唐玄奘三藏不贊成用舊名以舊名與梵語原意不盡同故彼所譯名詞皆係新造以免讀者誤會此處無為是不生不滅與老子純順自然不造作之無為不同用新譯固宜但玄奘於不至誤會者亦新造許多名詞吾人亦不贊成無為者指自性清淨之心原來具足無造作相佛經上無修無證即指此而言祇要把生滅心滅了此寂滅即現前至修行下手即上文非法非非法兩邊不取必兩邊不取將分別妄想除盡方可故成賢成聖皆用此法賢聖大有差別望於如來是因地望於凡夫即果位又後後望於前前皆是果前前望於後後皆是因故云一切賢聖由此無為取證故云皆以如來亦然如來凡有所說皆依自證無為不可謂其非法然賢聖有差別淺深地位不同是知如來凡有所說皆隨順機宜方便非真不可謂其非非法世尊所說法無淺非深無深非淺故教初下手者即從不應取法不應取非法用功到感果時功候極深亦是此法我們應在起心動念上下手先觀無念能在念一動時便知道立即返觀即能照住念即無然此非用功久者不能故初步須觀察觀察不可不深思惟深思惟則觀此許多念頭從那裏起的一觀即起無所起本來虛妄再起再觀反覆用功即能照住即能無念此一科達天法師判為生信深為確當蓋經文中能生信心以此為實及一念生淨信明明講信也如來依此法成如來一切賢聖皆依此法而成則我們非如此能生信心以此為實不可辛三校勝分四壬初布施福多分二癸初舉事設問須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不補校是比校勝是殊勝即就福德以智慧來比校有人說此經佛教人不住相又何以處處以福德比校此有四種要義一要人明瞭福慧應雙修專修慧不修福卻不可假如講經說法原為度生而衆生偏不喜聽汝之說即缺少福德之故故福德甚要緊福慧雙修即是要人悲智具足智即慧悲即福諸佛如來皆以大悲心為體因於衆生而起大悲故大乘佛法建立在衆生分上觀普賢行願品即知普賢之願是大悲所發中有一段云或復有人以深信心於此大願受持讀誦乃至書寫一四句偈速能滅除五無間業又說速得成就微妙色身具三十二大丈夫相是知衆生如能圓滿普賢功德即能滅罪得福而修普賢行願先要發大悲心故悲即是福本經所說福德皆由大悲而發並非令人求人天福報也二福德如此重要宜發大悲心然若無智慧則菩薩道不能行故大智尤為重要古人云福慧二輪可見如來必有兩輪方能行化然兩輪之力如左右手以右方為重福德固要而智慧尤要故滿三千大千世界七寶布施不如受持四句偈為他人說也三借此校勝即將前文收束佛說法雖一往之談中間必處處收束此經校勝處即章句收束處四本經校勝多次每次必加勝愈校愈勝並非後文深於前文相差如此之遠乃就衆生而言指其功行愈勝福德愈多也若者設問之詞不必真有此事此人滿三千大千世界七寶布施在經上是大梵天王宿世因中即如此布施不是一世乃多生多世布施積聚起來有此之多佛言倘若有此人則當時並無此人可知佛經上說世界上極大之山曰須彌山亦稱須彌樓譯言妙高此山入海八萬由旬出海八萬由旬一由旬合中國四十里故極高此山非土石所成乃金銀琉璃玻瓈四寶所成故曰妙圍繞此山有大海名香水海周圍又有海有山共七重曰七香海七金山此外又有大海曰鹹水海外圍有大山曰大鐵圍山山外更有四大洲四大洲之一即我們所居之南贍部洲世人以地球之四洲當佛經之四洲誤也此四大洲亦稱四天下在須彌山之半欲天六重與人道最近者為四天王天其宮殿即在須彌山半四天王統領人道鬼道稽察人間善惡即其責任其上為忉利天此天亦不在虛空即在須彌山頂道教之玉皇儒教之昊天上帝即此天自四天王以及六道均歸此天所管再上四重天即在虛空欲界以上之色界有十八重天分初禪二禪三禪四禪升此天者不僅是福德須具有定力已無淫欲但尚有色質故稱色界升初禪者不必修佛門之定即外道之定亦能升此天如道教之大羅天亦是初禪佛教之修定未出三界者亦寄於此天故統名曰禪初禪之大梵天王其權高於釋提桓因釋提管一四天下大梵王則管三千大千世界釋迦所化之娑婆世界亦如此之大每佛所管之世界均如是不過有淨穢之不同即極樂世界亦如是之大但其土是平是七寶所成與此土人心險惡所感之凹凸不平懸殊衆生所修福德大即感七寶多所修福德小即感七寶隱此金銀琉璃玻瓈𤥭璖瑪瑙赤珠皆非現在人工所造此人以滿三千大千世界七寶施給衆生亦非人力所及寧為猶言可謂世尊問語極其善巧不但試探須菩提并探我等蓋恐我們誤會上文不住相之意以為既不住相何必要福德須知此人滿三千大千世界之布施即是救度衆生故祇可不住相不可不行布施否則即不是大悲心癸次答釋所以須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多補此答意味深長須菩提明瞭世尊之意故云甚多又恐人不了解前此明明說不住相此忽云甚多斤斤較量豈非住相耶何以故下即自己釋明答曰甚多之所以然本經是名即非之文句頗多此處乃是第一次見故語意較詳特舉出性字使人了解以後凡說即非皆指性言是故說猶言是名使人了解以後凡說是名皆指相言就相上說名是名字相言是言說相凡物之大小長短高低遠近表裏有對待者皆是相相有變動是虛妄性則不動是空寂故就性上言一切不可說須菩提意謂若是福德之相可以說多即非福德之性若是福德之性空空寂寂即福德二字亦安不上那裏有多少可說以下凡遇即非是名皆如此解此處特加如來二字如來是性體之稱說福德多是就相言何故舉如來此含要義蓋性是裏相是表性是本相是末有裏方有表有本方有末意謂有如來之性方有福德可說若無性則有何福德可言是福德即非福德性表面說是福德實指示我們不可著相是故如來說福德多就是說有是性方有是相令我們會相歸性壬次信經殊勝若復有人於此經中受持乃至四句偈等為他人說其福勝彼補此科是佛語應有佛言或須菩提字樣今略之若復之復字再也讀者或致誤會以為讀誦金剛經其福即勝過大梵天王實則應注意受持二字是人能受持此經又能布施方勝過於彼受是領納是指真能領會經義而得受用者比解字更進一層持即拳拳服膺一刻不放鬆之意比受字又進一層既受持無有不讀誦者故祇用受持二字乃至者超略之詞謂或全部受持或一部分受持最少則四句故置等字偈字書本音傑古德改讀去聲與解字一例此本是印度之詩因韻文難翻故翻譯時或有韻或無韻特改稱為偈誦印度原文每四句為一章此四句偈不指定經中某處四句任何四句均可稱之以上是自利下文為他人說是利他其字即指持說之福勝彼者超過前人彼祇做到布施且是財施是福德相是人既能受持以修慧又能為法施以修福福慧雙修悲智具足乃是福德性故勝過於彼也壬三釋成經功何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出補佛在大般若經說過無論一切法皆在般若中攝盡故般若在諸經中為最要而金剛經尤般若中之最要凡大般若經中要義此經皆備可見讀此經無異讀大般若經且無異讀三藏十二部經此一部經所說即無上正等之法故云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出一切諸佛者能證人也阿耨菩提者所證法也照此看來成佛法門在此經成佛亦在此經是人能受持此成佛法門布施此成佛法門故福德窮劫說之不盡豈三千大千世界七寶之布施可以比擬此是本經第一次比較舉出大梵天王故事正是銖兩悉稱蓋彼是成大梵天王之布施此是成佛之布施佛所管領亦是三千大千世界以彼比此可為恰當然大梵天王猶是凡夫佛是聖人是教主焉能為比況大梵天王尚不能免大三災耶尚有要義本經處處教人不住相就要人證性可見此經中所說者皆是性皆從此經出者實無異說此經從性體而出也從性體出故教人不可住相凡人之病是處處著不著於此即著於彼本經處處教人見性然經中性字除即非福德性之性字外別處不見蓋要人善自體會連性字亦不可執著也一切諸佛皆從此經出又是指點我們學佛要從此經入此校勝收束的示無住以生信一科最為適當蓋信心是入道之門也壬四結歸離相須菩提所謂佛法者即非佛法補清初有人在即非佛法下加是名佛法一句是大錯不用是名單說即非乃有深意何可妄加此處不加是名句是為上文作注解若加此句文體既不合意義亦不對凡加是名一句是開下文此處所謂佛法佛即指上文一切諸佛法即指上文諸佛阿耨多羅三藐三菩提法佛意謂我上面所說一切諸佛及諸佛阿耨多羅三藐三菩提法是就名相上說佛與法即非就性上說佛與法本經明明教人不要住相即上文所說一切諸佛二句亦不可著相若一著相即非諸佛阿耨多羅三藐三菩提法如此結束於上文不住相行於布施不取法不取非法之意義皆圓滿矣以下是江居士親筆上來的示無住以生信一科開口便令廣度衆生成佛入無餘涅槃即成佛也是開示吾人應無住我人等相也復曰實無衆生得滅度者是應無住法相也更曰於一切法無住而行布施等法是應無住非法相也因以不住於相四字總結之不住於相者無住之真詮也所以應無住者降伏其妄心也妄心即是識亦即分別妄心非他分別著相之謂耳然問中先住後降答中卻先降伏後住而答住時卻曰應無所住又曰但應如所教住而所教乃是無住豈非應住於無所住乎此又的示以但須除妄莫更覓真耳蓋妄除則真自現矣且真如之性如如平等若住於真便成執異執則成妄何真之有異非平等何如之有故但應以無住降妄即此便是正住豈可別求住處妄除一分真便現一分何須別覓真耶故接而言曰凡所有相皆是虛妄此明住相之過苟住於相便是逐妄此所以首言降伏也又曰若見諸相非相則見如來此明不住相之益若能不住法非法相便見真性此所以但言降不言住而降伏即是正住也如此開示的然顯然故以上諸文俱歸一小科標名曰明示者以此明示若此者所以令人生信也故接以生信一小科此中獨揀持戒修福為能生信尤具精深義趣略言之有三一般若此云正智慧而慧從定生定由戒成今欲開其正智必應持戒不然正智不生反成狂慧走入邪路危險已極福慧二輪不可缺一二輪並運方成兩足之尊若慧多福少則缺少大悲不能攝化衆生矣故修般若正智不能離布施等度而別修故經中開首即云廣度衆生又云於法無住而行布施以離福修慧既與衆生無緣相好亦不具足欲化衆生衆生亦不聽其教化也此吾人必應知之者二持戒則少欲知足修福必深信因果今修觀照般若若貪欲多何能離相若因果不明又易偏入斷滅相經曰持戒修福者能生信心即是的示吾人應持戒修福乃能入般若之門耳信為入道之門故其警誡之意深矣切矣此更吾人必應知之者總之持戒修福已無非法相矣故依經觀照人空法空決不致走入歧途果能一念相應便契三空之理所謂無我人等相無法相亦無非法相是也所謂無者並非頑空乃不取相之謂不取二字又是不住於相之真詮而欲不取相應不取法不取非法取法便成法相即著於有矣取非法便成非法相又著於空矣空有不著便是中道第一義便是阿耨多羅三藐三菩提法譬如船筏度時仗此法度了還應捨是故雖已成佛雖如佛之說法度生亦得而不有其所得說而不有其所說不能定執為有法定執為無法故曰無有定法此四字又是不取法不取非法之真詮也以明因其無定故不應取所謂不取者不執云耳總之佛所說法本來皆不可取皆不可說須於心行處滅言語道斷時契入故取法說法取非法說非法皆非也是之謂無為校為舊版作餘原稿作為涅槃希賢希聖無不由之明得此真實義便為實信一念相應便得無量福德以一念相應是淨念相繼之根也云何福德無量復以校勝一小科明其所以然所謂諸佛及諸佛無上菩提皆從此經出是也此是說明一切佛一切佛法皆不外此經無住之理若實信此理一念清淨便可直至阿耨多羅三藐三菩提福德豈非無量乎然不可因聞此語向文字中求之須依經中所明之理返照自性自性空寂並無佛字法字果能久久觀照證入空寂之性便是成就了無上菩提便是成佛然佛雖成佛終不自以為有少法可得無少法可得者不自以為成佛也故曰所謂佛法者即非佛法徹始徹終一以貫之曰無住而已矣因賅果海果徹因源如是如是以上為第一科之要旨開示無住亦既詳且盡矣我世尊大慈大悲欲人大開圓解復將無住的義趣層層推進而闡明之以期解慧開則信根成就修功亦因而增長庶幾乎由觀行而相似而分證以達究竟耳
