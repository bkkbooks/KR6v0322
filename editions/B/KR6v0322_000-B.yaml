front:
  text: 金剛般若波羅蜜經講義本講義以再版補足之本與江居士親筆原稿覆校重刊有改正移易處以校字識其異同校勘記中稱再版曰舊版蔣敘金剛經講義為江味農居士之遺箸此箸在居士生前既因病魔時擾未克寫定歿後又因種種障礙幾至佚失是豈無上甚深之祕機未可輕易宣露抑眾生福薄未能仰契大法耶否則何以魔障重重若是之甚也余與居士締交二十餘年知其一生持誦金剛經獨具心得甲戌之夏向之啟請講述大意余就記憶所及者歸而錄之居士喟然曰竹本虛心是我師君字以竹而虛心若此可謂名副其實與其略講不如為君詳談而省心蓮社同人聞知此事要求公開遂移座社中正式宣講規定每週二次晚間升座聽者恆數十人余亦即席筆記翌日繕呈居士改正數月後居士以改正費力不若自寫遂於每講前一日撰數千字畀余抄錄余雖仍有筆記乃無暇整理矣此法會始於甲戌七月至乙亥九月圓滿積稿盈尺居士以為尚須潤色並將初分所缺者補足方可成書同人因居士在家問道者多因謀另闢靜室供養之俾專心撰述李君稺蓮聞有是舉發願獨任經費遂於滬西租屋三間右為臥室中為佛堂左為講室以處居士期以一年將此講義補撰完成然居士每歲遇黃梅時節必病病輒數月病愈則又憫念南北死難眾生啟建大悲道場虔心超度因此遷延卒未脫稿余與晤時偶問及此居士似不願人之督促者余知其意遂不復問戊寅首夏居士復示疾胃納不舒余每隔二三日往省之見其病勢較往歲為重深為憂慮是年五月寂然往生家人來治喪紛亂之中幾失此遺稿所在余急使人徧覓得之攜回檢視皆為散片前後間有錯亂同人以余有筆記多促余補撰成之但余以事繁從居士自撰講義以後所記之稿即未暇繕正當時之速寫日久視之字跡強半不能認且在居士生前余之筆記尚須俟其改正後方無錯誤今貿然取以續貂亦有未安古德遺箸缺略不全用以付印者亦多有之何況此書已成十之六七耶惟付印必須編會余日無暇晷擱置又數月幸居士之弟子周君清圓發心任此因以全稿畀之逐葉搜討隨時將經文會入而清圓亦因在佛前發誓代眾生受罪時時抱恙不免作輟錄寫及半又因意外波折幾至功虧一簣至己卯之冬始將全書錄成魔障如是終得成書亦云幸矣一日余偶遇李君稺蓮於途知其自香港來滬不久即去因述此稿已可付印李君欣然謂余云印費由渠任之倘有人隨喜渠亦不願獨佔此功德留資於省心蓮社而去適范古農居士避難來滬寓於社中商得其同意任校訂之責遂得於今年六月印成至書之內容精深微妙發前人所未發隨時指示學人切實用功處皆過來人語讀者展卷自知毋庸多贅但述此書始末經過之曲折如此是為敘民國二十九年六月蔣維喬法名顯覺寫於因是齋范敘金剛般若波羅蜜經為般若經大部六百卷之一卷文約而義精喻為金中之剛良有以也六百卷文汪洋浩瀚讀者難之此一卷文家誦戶曉般若深義庶幾弘傳矣自古以來解此經者無慮百數其具異見者無論矣其契正義者當以無著天親施功德三論及僧肇智者嘉祥三疏為最嗣後宗泐憨山蕅益續法諸師論箸各具精義要不出於古註者近是然未有如味農江老居士金剛經講義之殊勝淵博也講義發揮般若要旨既詳且盡又復旁通諸大乘經其指導學者觀照法門不第禪宗之向上淨宗之一心皆有所闡發而已其尤具法眼發前人所未發者則台宗判斯經為通別兼圓賢宗判屬始教而居士獨判為至圓極頓之教庶不背經中所謂如來為最上乘者說也他如經中文句云如來云佛云世尊云不也云佛告須菩提等為常人所忽略者居士輒能發明其勝義頃者省心蓮社印此講義余助校訂得讀其文不禁歡喜踴躍歎未曾有至於依據古本考訂異字勒為定本尤為千餘年來斯經之功臣矣曩閱黃涵之居士彌陀經白話解嘗歎曰讀此解者不獨知彌陀經義且能知一切經法今於江居士金剛經講義亦云然自斯講義流通我知讀者一展斯編不啻讀餘經十百部也經云一切諸佛及諸佛菩提法皆由此經出不尤彰明較著者哉校訂既畢因讚歎而為之敘中華民國二十九年庚辰首夏范古農和南敬敘例言一此書為江居士遺箸付印公世初板時因稿未完成取蔣居士顯覺之筆記當時曾經江居士修正者補之中華民國三十一年再版時所缺講義已由蔣居士顯覺將舊時筆記悉心校訂據以補入遂成完璧一此書分信解行證四大科即據以分卷以五重玄義為首卷餘分四卷共計五卷卷末附居士之校勘記及跋一科判附於全書之首俾讀者便於檢閱一此書編彙初板時由周居士清圓任之校訂由范古農居士任之並由蔣居士顯覺孟居士定常協同校對一書中補缺之處首行加一補字以清眉目江味農居士傳蔣維喬居士姓江氏名忠業字味農法名妙煦晚年改名杜號定翁於其所箸書中或署幻住或署勝觀隨時取意初無一定先世本居江蘇江寗南鄉凌閣村因王父樂峯公筮仕鄂省遂家焉居士幼時即隨樂峯公持誦金剛經終身未嘗少輟父訒吾公為前清循吏有政聲居士以光緒壬寅舉於鄉旋得陝西補用道然養志承歡不樂仕進訒吾公宦遊數十年歷贛至蜀居士皆隨侍贊襄事無鉅細必躬親之居士中年喪偶悟人世之無常即潛心學佛雖以父母之命續娶繼室然在家出家其志已早決矣辛亥之秋訒吾公以年老致仕居士奉父母自蜀返鄂值革命軍興家產蕩然避地東下初居武林後至上海雖流離瑣尾艱苦備嘗而養親樂道處之泰然訒吾公忠貞亮節嚴命居士不許再入仕途居士謹受教不敢忘丁巳訒吾公卒居士於哀毀中乘機勸母郭太夫人長齋念佛戊午春禮禪宗大德微軍和尚為師受菩薩戒盡力參究頗得消息時北五省旱災慘重居士受簡照南之託攜款北上參加佛教籌賑會放款十萬全活甚眾余以辛壬之間始與居士相識於滬上至是又與相見於北京是年夏道友徐文霨梅光羲等延請觀宗寺諦閑法師北上開講圓覺經自編講義分給聽眾然法師稱性而談於講義之外多所發揮余因請居士及黃士恆各述所聞每日筆記由居士總其成成後以呈諦師諦師印可為取名圓覺親聞記時京師圖書館搜藏燉煌石室寫經八千餘卷中多祕笈需專家校理余乃獻議於教育部請居士任校理之職自戊午迄己未先後二年居士於殘亂卷帙中輯成大乘稻芊經隨聽疏一卷淨名經集解關中疏二卷居士跋大乘稻芊經隨聽疏有云曩聞燉煌經卷中有稻芊經疏十餘卷為大藏所佚及來圖書館亟取而閱之蕪亂譌脫幾不可讀為之爬梳剔決排比聯綴並取重複之卷互勘異同亦有援據他書以校補者其不可考者則存疑焉積八月之力錄成一卷仍闕首尾會傅增湘購得一殘卷所缺疏文悉在其中於是千年祕著遂成完書是可知其搜輯之艱辛而時節因緣之不可思議也其敘淨名經集解關中疏有云此疏向叢殘萬卷中重事搜輯載更寒暑竟得勘訂成書首尾完具止中間闕一小段不礙大體也夫關中淨名經疏今猶有聞者僅一肇注然校以此書往往此猶加詳始知其已非原本况復什門諸作此書備載而又為之科解提挈分疏及其所未及言其所未言譬如無上妙味萃聚而調節之取精用宏飫之彌旨此亦如是一編之中妙義兼羅苟其息機靜對即異以會通觀心而契體尚何經旨之不明神智之弗啟也可見是疏之珍祕矣庚申回滬母郭太夫人示疾居士為誦大悲咒加持之并令家人虔誦佛號助之太夫人臨終起坐向西合掌念佛而逝居士從此信念愈堅嘗憾多生習氣思藉密教神咒之力以消除之復至北京適遇日本覺隨和尚專修供養大聖歡喜天法居士乃約同志數人請其設壇傳授及圓滿之日居士頓覺現高大身上窮無際覺隨謂之曰此番修法惟子得福最大既而覺隨率居士赴日本高野山研究東密卒以他事障礙未克潛修不久返國與簡照南玉階昆仲籌辦功德林佛經流通處於海上搜集南北刻經處及名山各版經籍流通全國以弘法利生居士嘗謂南嶽思大師之大乘止觀為東土撰述中稀有瓌寶智者大師之摩訶止觀即從此出學者不先通南嶽之義即習摩訶止觀難得要領然南嶽心法久湮海外宋時雖傳入中國措意者稀深為惋惜會辛酉之夏海上南園居士發起講經會居士即獻議啟請諦閑法師講大乘止觀居士每日筆記並於幽深微妙之處曲折譬喻以說明之就正諦師再三往復至癸亥始脫稿名之曰述記諦師自謙謂此書十之七八係居士所述不肯居箸作之名居士則謂諦師發其端必以箸作之名歸之彼此謙讓又以書中專名典句慮有難明復屢經修改荏苒八年始成書二十卷刊板印行諦師亦鑒居士之誠允為居名然其致居士之函則云記文不惟詞意通暢其吃緊要關旨趣淵微之處透徹了明此皆全是老維摩以精妙見地所發揮也乙丑夏白普仁尊者南來主持金光明法會海上同人公推居士襄助尊者宣揚於是由滬而杭而湘而鄂而潯而寗輾轉數千里躬親會務條理井然藉此機緣得以研究藏密己巳秋應閩中善信之請赴福州宣說佛法三月始歸庚午秋在滬開講大乘止觀述記逾年方畢省心蓮社成立被推為社長從此常在社中開講大乘經典並領導社員念佛禮懺余知居士於金剛經獨有心得於甲戌之夏請居士為余講述大意既而省心蓮社同人要求公開乃正式開講余每次為筆記記畢即呈居士修改後居士乃每次自寫講義畀余抄錄及法會圓滿積稿至四厚冊居士以為尚須潤色並將初分所缺者補足方可成書同人以居士在家問道者多不能專心撰述因謀另闢靜室供養居士謝絕一切期以一年將金剛經講義撰補完成然居士每歲遇黃梅時節必病病輒數月又以憫念南北死難眾生啟建大悲懺虔心超度因此遷延講義卒未脫稿然已得全書十之六七矣其解釋金剛經多有古德所未發者如佛說他經時恆放大光明六種震動現種種瑞相獨說金剛般若甚深經典僅云世尊食時著衣持鉢入舍衛大城乞食等語居士為之釋曰是經最大旨趣是發揮不應住相之理故開首記世尊舉動與尋常比丘相同是即成佛而不住佛相弟子亦視為尋常惟須菩提窺知其意所以歎為希有否者持鉢乞食何足令人驚歎耶通行之金剛經兩周問答皆作云何應住居士乃依據古註及燉煌寫經勘定前周作應云何住後周作云何應住兩問意義絕不相同而為之說曰前周應云何住是問菩提心應云何安住俾無馳散為初發大心修行者說也後周云何應住是問既應離一切相發心則菩提心云何獨應住耶若不住此法又何謂之發心若不應住而應降伏者豈非不發心耶然則云何降伏其心耶是為已發大心修行者說也其於金剛妙義發揮精透類如此此特略舉其一二端耳戊寅首夏天氣陰溼居士依舊示疾胃納不舒余每隔二三日必往省視見其臥牀不能起較往歲為重甚為憂慮居士則云一過黃梅病當霍然而其弟子等則在隔室佛堂為之念佛終日佛號不斷居士亦安臥默念神志極清至舊曆五月中旬疾漸增而神志愈清道友朱光琪用硃書大字勸其一心往生勿戀塵世居士審視數過合掌謝朱口稱歡喜讚歎朱既去則謂左右曰吾勤修一生豈於此一關尚不了了朱君殆過慮矣及十八之夕自云金光徧照佛來接引邀集諸道友而蔡濟平因事至十二時方至居士猶詔之曰修持以普賢行願為最要遂合掌不復語於諸道友及家族佛號聲中安然而逝壽六十有七余與居士交二十餘年初僅知其泛濫各宗歸宿淨土近年交誼益密研討益深方知居士一生得力於般若從事參究早得消息豁然大悟一心常在定中晚間無夢至今已五年餘矣故恆自言教宗般若行在彌陀其說法也稱性而談旁通曲達自在無礙余於經典及修持功夫偶有懷疑以質居士其解答總高人一著而其戒行之嚴進修之密足為一世模範居士誠佛門龍象哉
