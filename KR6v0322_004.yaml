body:
  text: 震旦清信士勝觀江妙煦遺箸詳談本分兩總科初約境明無住以彰般若正智即上來已講之前半部經次約心明無住以顯般若理體即向下將講之後半部經也後半與前半不同處茲於未講經文時先當説明其所以然入文方易領會且從多方面説明之以期徹底了然一前是為將發大心修行者説教以如何發心如何度衆如何伏惑如何斷惑後是為已發大心修行者説蓋發心而曰我能發能度能伏惑斷惑即此仍是分別仍為著我仍須遣除後半專明此義須知有所取著便被其拘繫不得解脫凡夫因有人我即執色身為我之執故為生死所繫不得出離輪回二乘因有法我雖不執有色身而執有五蘊法仍是我見未忘故名法我之執遂為涅槃所拘以致沈空滯寂菩薩大悲大智不為一切拘繫故無罣無礙而得自在此之謂不住道所以少有執情便應洗滌淨盡而一無所住也二人我執法我執簡言之則曰我執法執尋常説本經前破我執後破法執未免疏略前半啓口便云菩薩於法應無所住以及無我相無法相亦無非法相不應取法不應取非法法尚應捨何況非法等等説之再再何得云但破人我執乎當知我法二執皆有粗有細粗者名曰分別我法二執蓋對境遇緣因分別而起者也細者名曰俱生我法二執此則不待分別起念即有與念俱生者也此經前半是遣粗執如曰不應住六塵布施不應住六塵生心應無住生心應生無住心應離一切相云云皆是遣其於境緣上生分別心遂致住著之病所謂我法二執之由分別而起者是也故粗也云何遣耶離相是已後半是遣細執即是於起心動念時便不應住著若存有所念便是我執法執之情想未化便為取相著境之病根是為遣其我法二執之與心念同時俱生者故細也云何遣耶離念是已三前令離相是遣其所執也後令離念是遣其能執也前不云乎所執之幻相起於能執之妄見故乍觀之本經義趣前淺後深然而不能如是局視者因遣所執時暗中亦已兼遣能執矣何以故若不離念無從離相故故前半雖未顯言離念實已點醒不少如能作是念否我不作是念應生清淨心應生無住心若心有住則為非住皆令離念也即如應離一切相發菩提心之言利根人便可領會得所發之心亦不應住何以故明言有住則非故前云信心不逆者荷擔如來當得菩提是人必已領會得離念不然未足云荷擔當得也所以昔人有判後半是為鈍根人説者意在於此謂利根人即無須乎重説因世間利根人少故不得不説後半部令鈍根者得以深入此昔人之意也不可因此言誤會為後淺於前雖然離念功夫甚深甚細若不層層剖入不但一般人未易進步即利根已知離念者若不細細磋磨功行何能徹底如剝芭蕉然非剝而又剝豈能洞徹本空歸無所得乎當知後半部自明五眼以後愈説愈細至於證分正是令於一毫端上契入之最直捷了當功夫所謂直指向上者不明乎此圓則圓矣頓猶未也若局謂後半專為鈍根人説於經旨亦未盡合也此理不可不知四前半説離一切相方為發菩提心方為利益一切衆生之菩薩是空其住著我法之病後則云無有法發菩提無有法名菩薩以及一切法皆是佛法等語是空其住著我法二空之病也故前是二邊不著後是二邊不著亦不著前是發心應離相後則并發心之相亦離當知但使存有能離之念仍是我法宛然便已分別取相故又云非不以具足相得菩提我見即非我見法相即非法相皆所以遣蕩微細執情遣之又遣至於能所皆離并離亦離方證本來所謂證者非他但盡凡情本體自現非別有能證所證也豈但凡情不可有即聖解亦應無存一能修所修能證所證便是聖解即是所知障正障覺體故彌勒菩薩金剛經頌曰於內心修行存我為菩薩此則障於心違於不住道也圓覺經云一切菩薩及末世衆生應當遠離一切幻化虛妄境界本經前半不外此義圓覺經又云由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻本經後半部不外此義五前半部是明一切皆非如曰非法非非法有住則為非住以顯般若正智之獨真蓋此智本一塵不染而一切相莫非虛幻故應一切不住而後正智圓彰也後半部是明一切皆是如曰諸法如義一切法皆是佛法是法平等無有高下以明般若理體之一如蓋此體為萬法之宗故一切法莫非實相故應菩提亦不住而後理體圓融也由是觀之一部金剛經所詮者真如二字而已最後結之曰不取於相如如不動全經義趣盡在裏許矣又復前明一切皆非令觀不變之體也所謂正智者乃如如之智即體之智也後明一切皆是令觀隨緣之用也所謂理體者理者條理屬性用言用不離體故曰理體此與宋人之言理氣截然不同彼以渾然一本者為理以流行萬殊者為氣後儒辨其言理之非是者詳矣又復前既一切皆非故雖則非與是名並舉而意注則非所謂雖隨緣而不變也後既一切皆是故雖細遣法執而曰於法不説斷滅相所謂雖不變而隨緣也綜上五説以觀全經全經旨趣了了於心目中矣不止入文時易於領會已也己次約心明無住以顯般若理體分二庚初深觀無住以進修次究極無住以成證庚初又三辛初發心無法次舉果明因三顯勝結勸辛初又四壬初重請爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心此科看似另起實則緊躡前文而來爾時正指佛説經義果報皆不可思議甫竟之時也長老意謂既應離名絶相而善男子善女人明明各有發心之相且明明有阿耨多羅三藐三菩提之名蓋各各自知我應發心各各自知阿耨菩提是無上法豈非我法之名相宛在乎前云應離一切相發菩提心今思發心時便住相了云何此心獨應住耶若不應住而應降伏者豈非不發心乎然則云何降伏其心耶此意是説我法二執已與發菩提心時同時俱生矣降則非發心住則執我法此正向一毫端上錐札入去指示行人應向起心動念時用功長老大慈故代一切衆生重請開示根本方便耳前曰應云何住是問菩提心應云何安住俾無馳散今曰云何應住是問菩提心云何獨應住著蓋若不住於此法何謂發此心住既不可降又不得將奈之何此因聞説於法應無所住乃至有住則非因思菩提亦法也云何應住耶且前云應離一切相發菩提心一切相賅攝甚廣發菩提心之相當亦在內何既云應離一切相又云發菩提心耶若亦應離者又何以謂之發菩提心耶鈍根人聞法往往執著名言粘滯不化長老此問又是曲為現前當來一切粘滯不化者請求開示耳壬次示教佛告須菩提善男子善女人發阿耨多羅三藐三菩提者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者此正開示教導起心動念時離相之方便也觀上科問辭若無辦法觀此科答語極其輕鬆圓妙菩提下唐人寫經無心字應從之試思開口説一句發阿耨多羅三藐三菩提者即接云當生如是心正是掃除此是發菩提心之相故原本不用心字以示泯相之意即以文字論不要心字亦説得通蓋發阿耨多羅三藐三菩提即是發無上正等覺不贅心字有何不可如是二字指下三句我應應字正與生字相呼應蓋現其本有曰生顯其本無曰發一切衆生本來同體滅度一切衆生不過完其性分之所固有乃應盡之天職有何奇特若以為我當發此心便有矜張之意便著相矣故不曰當發而曰當生者以此蓋説一應字是遣其著於菩提破法執也説一當生是遣其著於發心破我執也應字統貫下三句三句之意次第深進初句言度生本應盡之責言下含有何可自矜此是菩提耶次句言應度衆生至於罄盡已者罄盡之意言下含有衆生無盡此責又何嘗能盡則何可自謂我能度耶三句更進一步謂應知雖度得罄盡而并無無字略斷實有一衆生滅度者何以故衆生之性本即涅槃故且雖涅槃而亦不住故彼若有住便非滅度故然則豈有一衆生實滅度者則又何可自謂有所度耶發無上正等覺者須先覺了度衆生是應盡之責且此責終未能盡即盡亦等於未盡當生如是之心無能度無所度無分別無所謂菩提無所謂度并無所謂發心庶與清淨覺心相應耳前答曰實無衆生得滅度者重在一得字謂雖得滅度而實無所得也此中重在滅度字尚無所謂滅度那有得不得之可説其意更深於前可知又前答雖亦是能度所度并遣其遣能度所度雖亦是遣其著於菩提心但語氣渾涵今則深切著明而説曰當生如是如是心則此是菩提此是發菩提心此是衆生滅度的影子也不許一絲存在故語雖與前答相仿意則如萬丈深潭一清到底更有當知者聞得此中所説便應依此起修前云生信一科已將全經旨趣攝盡向後是加以廣大之闡明深密之發揮吾輩學人應從深密處著手方能達於究竟所以聞前半部經者更不可不聞後半部經也本經天然分為信解修證四部分者非謂信解中無修功乃指示前來所有修功皆應依此中所説者而修之耳此我前於説信心清淨時所以極力發揮信解行證雖有次第而不可局其次第雖分四項而不可局為四也諸善知識應體會此意也壬三徵釋何以故若菩薩有我相人相衆生相壽者相則非菩薩何以故下流通本有須菩提三字古本無之可省也何以故是自徵問何故當生如是心其下云云是反言以釋其義意謂若不生如是心者便有對待分別既未脫我人等分別執著之相依然凡夫豈是菩薩下文所以者何又轉釋則非菩薩之所以然前云若取法相即著我人衆生壽者若自以為發菩提心便取著菩提法則四相宛然矣故曰則非菩薩故當生如是心也我人衆壽四相雖同於前而意甚細蓋已一切不著但著於上求下化極微細的分別耳不可濫同普通一般之四相世尊言此是開示行人若微細分別未淨我相病根仍在雖曰菩薩名不副實矣警策之意深哉壬四結成所以者何須菩提實無有法發阿耨多羅三藐三菩提者古本菩提下亦無心字此句正引起下文無法得菩提心字尤不應有所以者何承上起下結成上兩科義實無有法發阿耨多羅三藐三菩提者有兩義可作兩種讀法一法字斷句意謂發正覺者實無有法蓋無上正等覺即是究竟清淨義清淨覺中不染一塵若存毫末許此是菩提便是法塵便非淨覺則所發者名為菩提實則分別心耳故必實無有法乃名發無上正等覺者二無字斷句意謂有法發無上正等覺實無如此事理蓋衆生以無始不覺故因愛生取遂致流轉故無論何法皆不應取取之便是不覺何名發覺乎故實無可以有法為發無上正等覺者兩義既明則上文當生如是心及若有四相則非菩薩之所以然可以了然矣上來所明不外發菩提者當發而不自以為發如是無發而發乃為真發而住降在其中矣蓋云何住降全觀發心如何不必他求故不別答須知當生如是心便是無住而住之意應滅度一切衆生三句是降伏其心之意也初問只答降住重問只答發心固以示淺深次第若不發心何必問降住故發心是本降住為末故曰淺深次第然而前答降住而發心攝在其中今答發心而降住攝在其中且知得云何降便知得云何住又以示三事只一事而前從降伏上説原為不降之降今就發心上説又是無發而發此皆破我遣執之微妙方法應於此等處悉心領會方為善用功者辛次舉果明因分二壬初詳明次結示壬初又二癸初明果次明因癸初又二子初明無得而得次明法法皆如子初又三丑初舉問須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不此引往事為證也其時證無生法忍位登八地事迹因緣前已詳説之矣上望極果八地仍為因人而下望發心者則為果位此事介乎因果之間因因果果一如之理易於明了故舉以為證世尊防聞上説者疑謂發心若無法云何得果故舉果以證明之若知得果者乃是無得而得則發心者必應無發而發也明矣標科曰舉果明因含有因果兩重蓋舉佛地之果法明八地之因心即藉八地果人之心明發覺初心者之行也此事前後兩引之而命意不同不同之意有三一前問於法有所得否答曰於法實無所得其意重在得字明其雖得而不住得相與上文四果得無得相之意一貫以引起下文發心者應生清淨心不應住色聲六塵等相來也此中則重在法字蓋以無法得菩提證明上文無法發菩提之義也二前問中法字是指無生法忍此中法字即指阿耨多羅三藐三菩提其時方登八地未得究竟果法當知無生法忍名為菩提分法所謂分證菩提非究竟證得無上正等覺也故此處問意實趨重在下文之反正釋成意明彼時因證無生法忍一法不生故蒙授記則彼時心不住法可知校知舊版作如誤原稿作知因彼時心不住法故今日圓滿證得究竟果法而成如來使人了然於如是因如是果絲毫不爽則發心不應住菩提法毫無疑蘊矣若誤會此句之意為彼時已得無上正等覺而不住法相則差之遠矣觀下文云若有法如來得阿耨多羅三藐三菩提足證此句得字非指彼時彼時未成如來故總而言之得者當得也非已得也三前問於法有所得否亦是舉果明因然法字既指無生法忍故彼中只有舉八地果明發心因一義此中之法是指無上菩提故應以兩重因果釋之於義方圓有法得阿耨多羅三藐三菩提否作一句讀有法者心有其法也即住法之意問意若曰如來昔於然燈佛處心中存有無上正等覺果法以求證得之否猶言心中存有當得無上菩提之念否也經中不如是説之而曰有法得云云者與上文有法發之語相配俾遣微細法執之意一目了然耳説一如來即含有不應住法意在矣如來是性德之稱覺性圓明豈有法塵作佛時如此則昔在八地時既蒙作佛之授記其心無法塵也可知證得菩提分法時如此則初發菩提者便應如是而學亦由此而可知因因果果先後一如故曰此處之舉果明因含義兩重丑次答釋不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提不也活句謂非無法非有法也彼時正蒙授記當來作佛作佛云者許其將來得證果法之稱也故非無法然彼時實以證無生忍一法不生而蒙授記故非有法也解所説義正指上文所説無法發菩提之義謂由無法發菩提之義領會之知必無法乃得菩提何以故因果一如故長老既未作佛亦非八地菩薩云何知其境界但於佛所説義中領會得之此正指示解慧之要也不曰如來而曰佛者有深意焉蓋上曰解義是以初發心修因時之義解得證八地果者之心今舉佛言則是由今日已得作佛之果證明昔時當得作佛之因何以故佛者證得果法成究竟覺之稱也舉一佛字明其約證果言非畢竟無法也然由所解無法乃得之義推之則以今日之果望昔日之因其於然燈佛時必無絲毫有法得阿耨菩提之心念可知矣無字略斷有法得阿耨多羅三藐三菩提原是問辭今加一無字明其約修因言非畢竟有法也總以顯明心無法以求得而後可得若住法求得便不能得則不應住法發心其義昭然丑三印成分二寅初如來印許佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提兩言如是者許其非無法非有法之説不謬也實無略斷有法得阿耨菩提連讀之有法得阿耨多羅三藐三菩提原是問辭今於其中加如來二字者如來是性德之稱覺性圓明名為得阿耨多羅三藐三菩提若有法塵便非圓明何名得無上菩提故如來得阿耨多羅三藐三菩提猶言得成如來有法如來得云云猶言有法得成如來實無者謂彼時在然燈佛所實無絲毫有法得成如來之心也經文不曰得成如來而必曰如來得阿耨菩提者因正在破法執故帶無上菩提法為言以明實因心中無此果法而後得成如來耳此正印定長老所解不謬長老以果明因故舉佛言世尊則約性德以明覺性圓明那容有法故舉如來為言意在使知雖得而實無所得方為性德圓彰之如來以為下文説如來者諸法如義作前提也寅次反正釋成分二卯初反釋須菩提若有法如來得阿耨多羅三藐三菩提然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼此反正釋成中兩科正舉問時目光所注之處也上來皆是就今日佛地之果位明昔時八地之因心此中則就昔得授記之果行明今初發覺之因心也故上來所説皆是為此處作引案者蓋以成佛成如來由於昔日之授記而昔日授記實由於證法無生一切發覺初心之菩薩若知得有法則不授記無法乃與授記則受持讀誦此經必應如教於一切法無住而住方為信心不逆荷擔如來方能生福滅罪當得菩提其義豈不昭然若揭哉三菩提下古本無者字觀不與授記之説可知此若有法如來得云云是指尚未授記之時而言意謂彼時未蒙授記之先若心住於無上菩提之法希望成如來得無上菩提便不能證無生法忍則并授記亦不可得矣豈能成如來耶汝於來世三句是然燈佛授記之言今恐不明何謂授記故引以明之而不用作是言句顯其非然燈佛如是云云也卯次正釋以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼以實無斷句謂以其實無住著菩提法以求得之之心也是故者明其正因心無有法乃證無生以是之故得蒙授記耳作是言句顯此中汝於來世三句乃是然燈佛金口親宣與上科之引以釋授記之義者不同也或以釋迦姓牟尼名之義為能仁寂默因曰能仁則不住涅槃寂默則不住生死因其於法不住故以此名號授記之此釋未嘗不可但不必拘因授記重在印許當來作佛耳無關名號且佛佛皆不住法皆蒙先佛授記皆有名號而名號未必皆取不住之義何可拘拘以名號釋之以下明法法皆如一科要旨上無得而得一科是舉證果之事以明不應住菩提此法法皆如一科是説果證之理以明無菩提可住正是説明不應住之所以然者乃離相之極致也亦法性之本然也蓋以果證者相與不相之齊泯令知因行時應相與不相以俱離耳法法皆如義蘊精微今先將其要旨窮源竟委次第説明然後於分科中所明之旨趣庶幾得有頭緒較易明了當知世尊説此法法皆如之義意在令聞法者於究竟了義徹底了解耳蓋必解深而後信深解圓而後修圓其於證入也不難矣何以故解漸漸開執情我見便漸漸消故所以學佛重在解慧者因此解慧者所謂觀慧也此所以聞思修三不離乎一慧也然則此法法皆如之要旨烏得不明辨之乎所謂無上正等覺者非他即是真如本性亦名自性清淨心是也因其為萬法之宗故稱無上因其為一切衆生所同具故名正等但衆生為分別執著等妄念所障不自覺知其性為無上正等耳若知之而能遣妄除障則名正覺初能覺時名曰發覺初心覺至究竟而令無上正等之性德全彰無以名之名之曰得無上正等覺耳實則性是本具安有所謂得耶所以雖得而必歸無所得者此也而得無上正等覺者以衆生同體故慈悲本願故將親證之理體用種種言辭開種種方便巧譬曲喻普令一切衆生皆得覺此悟此修此證此無以名之名之曰無上正等覺之法耳實則為衆生本具之性安有所謂法耶明得此理便知不應存有法想存有得想矣自性既名清淨可知其本來纖塵不染譬如杲日晴空有一點雲便遮障無光矣故欲性光圓照須令淨無點塵也一切衆生本不知自性是如此清淨的佛既親證教令應如是反照應如是自覺若不一一依教奉行何名發覺乎何以故有一法在有一得在依然是分別執著的老習慣則其本性依然在障故故不但一切法不應住即菩提法亦不應住者以此衆生何故有分別執著之病耶無他由其不達一真法界只認識一切法之相故耳既然是相則相相不一以迷於相故遂不知不覺隨而分別隨而執著耳殊不知既名曰相便是時時起變化的故曰凡所有相皆是虛妄虛妄者言其是假非真非謂絶對沒有也而衆生不知是假念念在虛妄之相上分別執著故名曰妄念言其逐於妄相而起念也或雖知是假仍復念念不停使虛妄相於心紛擾故名曰妄念言其虛妄之相隨念而起也故妄念一名含此二義對治方便亦有二種一離相如本經前半所言是也必須徹底覺悟根身器界一切境相皆是空花水月迷著計較徒增煩惱并須持戒修福斷其染緣除其貪瞋如是觀行久久情執漸薄妄想亦隨而漸少何以故所謂妄想者莫非情執使然耳是以離相為離念之方便也此一法也二離念如本經後半所言是也蓋以無始來習氣之深雖知相皆虛妄而攀緣不息必須於動念處著力向心源上返觀所有持戒修福六度萬行彌復精進以歷事而煉心若打得念頭死則一切分別執著自無而相之有無更無關繫何以故能不起念一切相不離自離故是以離念為離相之究竟也此又一法也此兩種法可並行而不悖離相即是離念離念方能離相故曰不悖然離相但離前一重妄念所謂逐虛妄相而起者也離念是離後一重妄念所謂妄相隨念而起者也故須並行並行者非拘拘於先離相後離念也謂離相時兼修離念則離相方能究竟離念時兼修離相則離念更得方便當同時並行總之衆生既為一切法相所迷從不知返照自性安知自性是與衆生同體又安知內而五蘊六根外而山河大地等一切法皆是唯心所造此既不知便不知佛令一切法不應住者是遣其分別執著取相之病與一切法并不相干取相之病若除則內而五蘊外而山河等一切法便如楞嚴經所説咸是妙淨明心性淨明體何以故一切法皆只有相而無性非無性也一切法之性即是自性也何以故一真法界故然則又何可遣耶又何必遣耶此法法皆如之真實義也所以起信論云此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故須知阿耨多羅三藐三菩提即真如之異名若住於此仍是取相有所取便有所立雖汝將一切法相遣盡而獨立一菩提之相便非一切法皆如了何以故有立便有廢故本性為萬法之宗無所不包無所不具立一而廢餘便非全性豈是無上正等又豈是正覺耶此經前半盡遣一切法相以顯菩提者除其取著一切法之病耳因恐或猶取著乎菩提故後半部開章即復遣此此病既遣則性德全彰法法皆如矣無可遣者矣亦無可立者矣行人最後之目的在此開經以來所説諸義其歸趣亦在此是故法法皆如一科為全經中重要之義亦即一切大乘佛法中重要之義向後所説無非闡發此義證成此義前半部所説亦無不趨重此義攝入此義也此是世尊將自己親證者和盤托出詳為開示俾衆生由此而悟由此而入者也故法法皆如必須一切情執遣盡唯證方知非可空言若或取著之病分毫不遣而語人曰一切皆如則有法法成障焉耳豈能法法皆如哉是亦妄人也已矣妄談般若罪至墮落無間者因其疑誤衆生令人因而謗佛謗法輕視三寶故也當知法法皆如若其證到必能行出如促無量劫為一剎那延一剎那為無量劫以芥子納須彌變娑婆為淨土至此事事無礙地位方許説得此話一切學人惟當向法法皆如上觀照以盡遣其我見遍計之執情以期證入斯為可耳豈可生大我慢輕以一如之言作口頭禪哉試觀本經最後結束處亦即流通分之初於説如如不動之後即接曰何以故一切有為法如夢幻泡影如露亦如電應作如是觀正是指示如如不動應從觀一切法如夢如幻中證入作如夢等觀者遣情執也此皆經中緊要關鍵所在不容忽也何謂前半部之義攝入此中耶今略説之以啓悟門如曰若見諸相非相則見如來試思若見得相即非相豈非法法皆如乎故曰則見如來也凡言某某非某某皆是指點此義者又如信心清淨則生實相須知因無分別執著而後心淨心淨便生實相實相者無相不相之謂也則法法皆如矣故曰應生清淨心應無住生心應生無住心應離一切相發菩提行六度若心有住則為非住也又如不應取法不應取非法不取法者以一切法皆如無可立也不取非法者以一切法皆真無可遣也正所謂法法皆如也因法法皆如所以無有定法名阿耨多羅三藐三菩提亦無有定法如來可説所以法與非法皆非皆不可取不可説也一切賢聖皆以無為法而有差別者因法法皆如則法法皆真法華所以言是法住法位世間相常住故一切法清淨本然絶非造作故曰無為一切賢聖莫不修此證此但因功行之淺深故有成賢成聖之差別實則一如之法初何嘗有差別哉其他準以思之總之若領會得法法皆如而契入之則亦無所謂空無所謂有無所謂中則亦無妨空無妨有且亦無空無假而非中矣何以故我見情執之病既都遣盡則見相即見性頭頭是道無所不可故最勝王維摩詰等經云五蘊即是法身生死即是涅槃煩惱即是菩提皆顯法法皆如義也若其少有分別執著未破則觸途成滯頭頭不是道無一而可縱令一切不著而猶著一菩提亦是取相分別自障覺體則所謂中者非中更無論著有偏空矣凡發心自度度他以期明性見佛者扼要之方全在於此其方云何依此經教離相離念是已當知此經既為一切諸佛及諸佛阿耨多羅三藐三菩提法所從出故經中所説莫非根本義究竟義其他千經萬論皆是彰顯此義敷佐此義者耳今故將此重要之義委曲詳盡透底宣呈諸善知識善思惟之子次明法法皆如分四丑初約名號明如何以故如來者即諸法如義何以故句自設問辭問上文所言無菩提法方與授記作佛無菩提法方成如來得菩提其故何也如來下自設答辭若曰佛稱如來汝亦知如來之義乎其義非他正因其離一切法差別之虛相證一切法一如之真性耳當知佛不見有諸法差別之相是之謂如佛亦不見有一法獨異之相是之謂諸法如如者無差別之義亦不異之義謂法性無有差異也法性無有差異者以其空寂故也故諸法如義即法性空寂之義名為如來者以其證空寂之性耳若存有一空寂便成差異便非空寂矣豈名如來乎故曰如來者即諸法如義重讀如字然則發無上正等覺者豈可存一發覺之相於心令不空寂乎又復説個諸法是不一也更説個如則是不異不一不異法性如然佛稱大覺即是究竟覺此不一不異之法性故曰如來者即諸法如義重讀諸法及如須知因不一故所以非菩提法不應取因不異故所以菩提法亦不應取前一説專約體次一説兼約體相用由是觀之定説諸法是諸法非也何以故雖諸法而一如故重讀一如定説諸法非諸法亦非也何以故是諸法之一如故重讀諸法其中關鍵全視著不著不著有諸法不礙一如矣不著空一如不礙諸法矣著於諸法非如也著於如非諸法如也故如來所説法皆不可取不可説不可取者諸法之性唯一真如無分別故是平等之差別故不可説者真如之性不離諸法唯證方知故於差別見平等故故發覺者應離一切諸相修六度萬行離諸相者實際理地不染一塵故修萬行者佛事門中不捨一法故因其諸法一如故應不捨一法也因是一如之法故應不染一塵也如是覺如是離如是修則法相應性相應而得證相應矣總之昧平等取差別便心隨法轉即非法亦成障礙於差別見平等便法隨心轉即法法莫非真如古德所謂迎賓送客運水搬柴行住坐臥二六時中於諸法上拈來便是者是好一幅無事道人行樂圖也當知天下本無事庸人自擾之於無空有中取空有相於無善惡中思善思惡妄想紛飛豈非自擾拈來便是自在何如古德又云不悟時山是山水是水悟了時山不是山水不是水山是山水是水者只見諸法也山不是山水不是水者惟見一如也又有悟後歌云青山還是舊青山蓋謂諸法仍舊也而見諸法之一如則青山雖是舊光景煥然新矣如來者諸法如義似只釋一如字實則來字亦釋在內矣何以言之有來有去是差別事相即諸法之一也既諸法如則來亦如矣一切衆生來而不如二乘聖人如而不來權位菩薩雖如而未盡如雖來亦未能遍來唯佛如來證性一如則盡真如際是來真如無際故來亦無際真如不動故來亦不動雖名曰來實則來而無來無來而來者也當知名曰如來者為明其來無來相故曰如為明其如無如相故曰來耳此節之意是明約來去之相言諸法二字攝之矣約來無來相言如字攝之矣兼明諸法如義是以諸法遣如以如遣諸法以顯遮照同時之性德上來所説皆此義也引古德云云非間言語也參丑次約果德明如分二寅初明無法若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提若有者或有之意因上文有如來得阿耨多羅三藐三菩提之言恐不得意者聞如來即諸法如義因之懷疑曰既是如來之義為諸法一如則無菩提可得也明矣何故上言如來得阿耨菩提耶為遮此疑故設一或有之言復呼長老而告之曰或人所言蓋疑其仍為有法殊不知實無有法也但為明其覺已究竟無以名之名為佛得阿耨多羅三藐三菩提耳言下含有若約性德言實是諸法一如故此中不曰如來而曰佛正明稱為得菩提者意在顯其已證無上正等覺亦即諸法一如之果耳豈謂有菩提法可得哉何疑之有下文更以無實無虛之義明其説得而實無所得雖無所得而亦不妨名之曰得益可了然矣寅次明一如須菩提如來所得阿耨多羅三藐三菩提於是中無實無虛於是中謂所得中也意謂縱許如人所言如來得菩提殊不知如來所得者惟一無實無虛耳無實無虛即是諸法如義也此義當廣演説以便領會一此與上來所云如來所得法此法無實無虛語雖相仿意大不同上是明法真實謂如來所得之法乃是實相實相者無相無不相無相無實也無不相無虛也若究竟言之實相者相不相皆無故曰無實無虛言虛實皆無也是為真實之法以證成上文真實之説也此中是明實無有法既已無法更何論得姑如人言説之曰如來得而觀於是中并無所得何以故以實無有法故是特假名之得無實也然亦無妨説如來得何以故以所得惟如故得此乃稱如來無虛也此針對前説明義二阿耨多羅三藐三菩提即真如覺性之異名然則如來即諸法如義猶言稱為如來者因其已證真如覺性耳足證如來所得惟是一如矣故雖名曰所得而於是所得之中無實也何以故覺性空寂故亦無虛也何以故覺性圓彰故故曰於是中無實無虛總之無有有得之得是為無實非無無得之得是為無虛此正中邊論所云無能取所取有有能取所取無亦即佛性論所言由客塵空故與法界相離無上法不空與法界相隨是也客塵空故無實無上法不空故無虛須知佛之言此是明不可聞言得便疑為有法不可聞言無法便疑畢竟無證耳此約阿耨多羅三藐三菩提明義三説一無實是明其照而常寂也説一無虛是明其寂而常照也無實無虛便是雙遮雙照寂照同時是中一法不生寂故復無法不現照故一法不生實無有法也故無實無法不現諸法一如也故無虛此之謂阿耨多羅三藐三菩提如來得者得此耳此約寂照同時明義四無實無虛即起信論如實空義如實不空義如實即是真如因真如為真實之性體故曰如實明其諸法一如是為真實也論明如實空義曰所言空者從本以來一切染法不相應故謂離一切法差別之相以無虛妄心念故此言一切衆生心中雖有虛妄之念及一切能所對待污染不淨差別之相而此如實性體仍復常恆不變以從本以來一淨一染不相應故不相應者相離之謂也云何相離以從本以來如實之體本非虛妄心念故又曰當知真如自性非有相非無相乃至非一異俱相總説以有妄心念念分別皆不相應故説為空若離妄心實無可空故此言所謂空者是空其虛妄念差別相故曰非有相非無相乃至非一異俱相此意是説離相也若離盡有無一異等一切對待之四句相則離虛妄心念矣此等既離則真如自性現前矣故曰若離妄心實無可空明其所謂空者非謂無真如自性也然則虛妄心念云何能離而空之以所有念念分別之妄心與真如自性本不相應故明其自性本空故可空也然妄念染相既空則真如顯現又明其空而不空也其明如實不空義曰所言不空者已顯法體空無妄故即是真心常恆不變淨法滿足則名不空此言法體既空諸妄念而無之便校便舊版誤作復據原稿改正是常恆不變滿足無量淨功德法之真心矣故不空也法體即謂一如之真性所謂真如是也真如為一切法之體故曰法體也論又曰亦無有相可取以離念境界唯證相應故此言諸法一如之真性為一切法體者實無有法亦不應住以其是離念境界唯證方知故曰亦無有相可取意明其不空而空也綜上論義觀之如實空者無實也如實不空者無虛也空而不空無實即復無虛也不空而空無虛即復無實也此是一切法如如不動之真體故此中佛説如來所得阿耨多羅三藐三菩提於是中無實無虛正是説來詮釋上文如來即諸法如義者且細讀論文明言不空是由空來可知無虛是由無實來諸法一如是由實無有法來矣以論證經義趣昭然又可見所引之兩段論文無異融會本經大旨而説之者故欲明本經不得不讀起信論也此約起信論以明義五無實可指諸法言諸法緣生故無實也無虛可指如言真如不空故無虛也諸法之相雖是緣生而無實諸法之性則同一真如而無虛故曰於是中無實無虛者是明如來所得阿耨多羅三藐三菩提實無有法亦無所得但證諸法如義耳此約諸法如義以明義六無實無虛是空有一如性德本然如來證此故説此科而令衆生覺此修此須知此四字平等平等不可看成兩橛不可局分前後若觀一切法唯實凡夫也若觀一切法唯虛二乘也即觀一切法實中有虛虛中有實亦是權位菩薩唯佛不然觀一切法無實無虛是整個的無實即復無虛無虛即復無實是之謂諸法一如也亦即是空有同時也應如是覺應如是修云何修生無所住心是離一切相行布施六度以利益一切衆生是務令離相時即是利益時利益時即是離相時此即是生無住心此即是發無上菩提則雖曰發而實無菩提之法如此庶幾與無實無虛諸法一如之覺性相應蓋并無實無虛諸法一如等名相亦復離卻方為無法方能相應也苟非然者雖曰發菩提實已忘失菩提忘失菩提便成魔事此吾輩所應時時提撕者也當知世尊説其自證者無他為令讀經聞法者依教奉行耳此約策修明義綜合上説諸義觀之可知佛説此科之意凡以明菩提無相而已以無相故所以無法發菩提無法得菩提故曰無實以無相故所以非一法是菩提乃法法是菩提是為無虛故復説下科以結成此義焉此約起下明義丑三約諸法明如分二寅初明即一切法是故如來説一切法皆是佛法上言諸法如義何以見其諸法一如耶至此乃結成之曰以一切法皆是佛法故耳是故二字論其近脈是承無實無虛而溯其來源則承諸法如義意謂由是諸法緣生而無實同一如實而無虛之故所以如來説一切法皆是佛法蓋由諸法如義開出無實無虛即以無實無虛顯明一切皆是還以一切皆是證成諸法一如展轉相生展轉相釋展轉相成其實皆明一義云何一義應無所住是也此佛法之所以無一不圓佛説法之所以無往不妙也如來説三字最要明其是約性而説也若約相説一切法只是一切法豈是佛法總以明離相觀性則頭頭是道楞嚴所以云五蘊六入乃至十八界皆如來藏妙真如性古德所以言窗外黃花莫非般若庭前翠竹盡是真如也是之謂一切法皆是佛法總之世出世法皆是緣生知是緣生而觀其不異之性不變之體則一切皆是矣諸法一如矣否則住法發心住法修行則佛法亦非佛法何況一切法此中所言之佛法不可局為佛所説法佛者覺義一切法皆是覺法者謂法法皆菩提以明菩提非別有法也蓋離相觀性則是即一切法上而覺照一真之性故法法皆是菩提此約如義言也若推廣言之凡行世間法時慈悲為本皆為利他不存利己一一不與佛法有違亦可云世法即是佛法若其名為行佛法而有名利恭敬之心則佛法亦成世法矣此科是即一切法以明如即是明諸法與佛法一如也正所以遣菩提法相以一切法皆是故然一法相遣一切法相皆應遣故下科又遣一切法寅次明離一切相須菩提所言一切法者即非一切法是故名一切法此科是遣一切法即以證成其皆是佛法也何故言一切法皆是佛法耶以其即非一切法故即非者約性言也約性而言明其不應著相故曰即非知其即非而不著相則是佛法而非一切法矣故曰皆是佛法既皆佛法何故又標而名之曰一切法耶以其不無一切法之假名故是名者約相言也約相而言意在會歸於性故曰是名知是假名而歸於性雖名一切法而皆是佛法矣故曰一切法皆是佛法蓋領會得一切法即非便知其只是假名領會得一切法是名便知其即非真實是已不作一切法會而作佛法會矣此一切法皆是佛法之所以然也當知即非是名合而言之凡以明無實無虛空有同時之義耳世尊説此是教行人於行住坐臥二六時中對境隨緣皆應作如是觀則處處皆是道場事事增長菩提此之謂無量印法門又復此科是離一切相以明如即是明諸法與諸法一如也因一切法皆如故一切法是佛法耳上來所云諸法如義無實無虛一切皆是一切即非一切是名總以闡明覺性清淨而已清淨覺性了無色相故得菩提實無有法而色相空時即覺性顯時故得菩提亦屬非虛既非虛而又無實法正好借一切法以歷事練心盡空諸相又何必於一切法外別覓菩提何以故心經云是諸法空相不生不滅不垢不淨不增不減豈非無上菩提宛然在望乎總之自性如摩尼珠隨方現色喻諸法本自性顯現而珠中卻色相毫無喻即非一切法佛法如家常飯自應飽餐而餐者當注重消化喻菩提亦不應住是在當人惺惺常覺不即不離則隨地隨時皆可得真實受用矣佛所説法説理便攝有事説性便攝有修此法法皆如一大科皆説自覺聖智令學人依之起觀照者也必須離相離念方能契入云何可講講之便落名相矣然又不能不講故説修功處只好用旁敲側擊方法以演説之聽者須於無字句處領會向後所説莫不如此著眼著眼丑四約報身明如須菩提譬如人身長大須菩提言世尊如來説人身長大則為非大身是名大身譬如人身長大即前解分中所言譬如有人身如須彌山王也身如須彌故曰長大蓋指佛之報身言也因前已説過長老深知其義故不待辭畢即申明其義曰則為非大身是名大身也是名者明其不無長大身相則非者明其既曰長大尚落數量應離相觀之則法身無邊乃為絶對之大耳長老所以不待辭之畢者令人曉然此即前曾説過之身如須彌山王也曰如來説者正以明報身與法身一如也此科乍觀之似與上三科無涉實則上三科之義得此科而後徹底顯了蓋上來約名號約果德約諸法以明如皆是法説此約報身明如則是喻説故曰譬如恐聞法説不了然者因喻説而得了然也當知上之法説但明其理此之喻説乃是實據得事實以證明之其理益信而有徵此所以殿以此科也欲知究竟須先明法身報身之義法身有二義一所謂法身者即是清淨自性名為自性法身此即佛與衆生所同具所謂同體之性亦即一切法所莫外之真如但衆生在障未能圓顯故約衆生言又名在障真如亦名在纏法身二一切諸佛經無量劫勤修萬行福慧莊嚴令此自性智慧光明圓滿顯現此名出障法身亦名出障真如又名報得法身謂法身出障為勤修萬行所得之果報即果報身也蓋約相言則名報身故此中云是名大身謂長大是約名相言也若約性言即是出障法身法身非相不落長短大小數量故此中曰則為非大身足見報身與法身不一不異矣一約相言一約性言故不一然實是一身故不異由是之故報身亦有二義一就其離一切障淨德滿足言曰自報身即出障法身報得法身也謂修因證果自度已竟故曰自報身二若就其遍一切境光明普照言曰他報身蓋法身現報得之相原為利他故曰他報身可見自報他報亦是不一不異一約自得受用言一約令他受用言故不一然仍是一身故不異由此足見名皆假立亦足見性相從來不離矣舉此為言不外二意釋疑證義是也謂釋不得意者之疑即以證成上説諸義蓋防聞上三科所説未能融會者將起疑曰既明明是一切法何以皆是佛法既是一如何以又有諸法無實無虛究竟云何且屢言實無有法而佛之報身光明相好原為無量功德法所成非明明有法相乎既無實法可得而得此報身非實法乎殊不知一切法本是真如自性隨緣所現若不著諸法之相則見諸法時便見諸法之性譬如報身亦即出障法身顯現之相也顯相者所以利他也而不著報身之相便見法身之性兩不相礙故雖有諸法而實是一如也雖為一如而不妨有諸法也須知如來所得無實無虛者以其唯證寂照同時之清淨覺性故也譬如報身雖相好光明而不礙自性清淨且因自性清淨所以相好光明此非覺性之寂照同時無實無虛乎推之一切法原非真實皆是假名然知是假名則知其是真如之相矣知其即非則知其皆真如之性矣譬如報身亦是假名長大不過真如法身之光影耳所以即非長大當觀清淨真如之自性也蓋不觀相而觀性則報身即是法身故一切法皆是佛法總之言無法言離相者為遣住法住相之病非謂絶對無法無相言無法可得者謂得而不存得想非畢竟無得須知不應住著者因諸法是一如故無虛而無實故非畢竟無法無相無得者因即諸法而一如故無實而無虛故明得此義則一切法皆是佛法矣此義不明則佛法亦非佛法矣故報身法身不一不異之理不可不明明乎不一不異則知非有法非無法非有相非無相非有得非無得而諸法如義以及無實無虛一切皆是等義便可徹底了然何以故因其不一故成諸法而無實所以曰即非也因其不異故為一如而無虛所以曰皆是也知於不異中見不一則雖一如而不礙其為諸法知於不一中見不異則雖諸法而不礙其為一如且不一時便不異不異時便不一故曰無實無虛明其虛實皆不可説故皆曰無也又復不一故雖是而曰名不異故雖名而曰是雖不一而實不異故既曰是名又曰皆是雖不異而實不一故既曰皆是又曰是名總而言之相雖不一性則不異故一切法皆是佛法也性固不異相仍不一故即非一切法是名一切法也世尊因報身與法身不一不異最為明顯而不一不異之理可以會通上三科所説諸義此所以最後又舉報身明之俾法法皆如之義徹底圓彰也前解分中舉報身言者是證明應無所住而生其心蓋得此報身之果猶曰非身是名是佛不住此身也故菩薩修因時應無所住然而非無此勝妙大身也此身正由六度萬行福慧之所莊嚴也故修因時應無住而生六度之心此中則是以報法二身不一不異顯成法法皆如之義故所説雖同而命意不同此法法皆如一大科極顯果德顯果德為明因行也故下科接以明因焉癸次明因分二子初正遣法執次令達無我子初又二丑初約度生遣次約嚴土遣丑初又二寅初標遣須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩如是指上法法皆如一大科謂佛為菩薩準繩勿謂法法皆如是佛所證非我所及當知佛能如是證者由其因地如是修故一切發覺初心之菩薩亦應如是體會法法皆如之義而於法無住也如是二字既通指上科則如字便可作諸法一如會是字便可作一切皆是會合而觀之便是無實無虛一切諸法無實也皆是一如無虛也蓋謂菩薩修因為剋勝果果報身如亦應因地心如必須與一切諸法之無實相應而一法不執復與皆是一如之無虛相應而一法不廢且不執時即不廢不廢時即不執如是如是虛實俱無則因如是者亦必果如是矣菩薩亦如是句是度生嚴土兩科之總標皆應如是也云何度生離相行六度是云何嚴土亦離相行六度是所謂福慧莊嚴也故應廣行六度而一法不廢更應不著六度之相而一法不執不廢不執方有菩薩資格故皆應如是若作是言下反言以明若不如是便失菩薩資格矣我當滅度無量衆生此與前文所説我應滅度一切衆生正復相同前曰當生如是心明明為世尊教令如是者今乃曰則不名菩薩何耶此中義蘊深細略分三層以説明之一須知前令生如是應分盡責心者遣其自以為是菩提之心也然不著菩提矣而又自以為盡責雖換一面貌而取法仍同也住相仍同也分別執著依然故我如何其可故仍斥之曰則不名菩薩則字緊切少有此念在心菩薩資格便失卻矣必須微密觀照微密勘驗層層入細遣之又遣直令此心一念不生淨無點塵滅度無量若無其事庶幾與一如之義相應耳少有念在便已著相便已取法便是分別仍為我見也二前之開示不但令知度生為應盡之責以遣其著於菩提已也且令應知此責終未能盡所謂度一切衆生已衆生既無已時責又何嘗能盡是并遣其能度之見也更令應知度亦等於未度所謂無一衆生實滅度者是又遣其所度之見也開示之語是徹底的是圓滿的今此公將開示的話忘了兩句只牢牢抱住頭一句豈非儼然自以為能盡此責且大有所度乎我當滅度無量其一種自矜自負目空一切之態宛然在目豈是菩薩此病必應痛遣故直斥之曰則不名菩薩世尊如此説之復有深旨蓋令讀經聞法者必須徹底貫通不可挂一漏萬不可執偏概全不可斷章取義也三此人復有大病病在作是言也無論大言不慚是所不應即令言能副實而動自標榜其著於名聞心不清淨可知且言為心聲作如是言者因其作如是念也念猶未息了生死且未能而謂菩薩如此乎世尊言此是令發大悲心者應於離念上加功妄念不息真心永障有悲無智豈能度他且念云何起起於人我分別之見之猶存也故不名菩薩也寅次徵釋分二卯初釋無法何以故須菩提無有法名為菩薩流通本作實無有法名為菩薩唐人寫經及肇公慧公注本皆無實字應從之未見古本時於此句義亦囫圇看過及見古本猶以為實無有法名為菩薩與前之實無有法名阿羅漢句法相同有一實字未嘗不可乃靜會前後經義始知絶不相類始知原本之妙蓋前明四果無念皆是透過一層以見意因問辭皆曰能作是念我得果否故答辭曰須陀洹名為入流而無所入蓋謂雖名為入流然心中尚無所謂入豈有所謂流則絶無我得入流之念可知斯陀含阿那含説法一律故下皆接曰是名某某以顯所謂入流也一往來也不來也皆是假名初無此念也阿羅漢之義為無生言其證無生法忍也既是一法不生故曰實無有法蓋謂其心并法亦無豈有所謂無生然則名為無生者但假名耳豈有此念乎故曰名阿羅漢此中是明不名菩薩之故由其心有能度所度之見便是取法取法便著我人等相乃是凡夫故有法名為菩薩斷斷無之無須透過一層方能顯意故句法與前別也無有法名為菩薩句有兩種讀法一無字略斷下六字一氣讀之經意蓋謂何故不名菩薩耶因反言以釋之曰有法名為菩薩佛無此説也故下緊接曰是故佛説一切法無我人衆壽以明有法便著我人分別便違佛説便是凡夫所以無有有法名為菩薩者蓋以本科之無有法名菩薩釋成上科不名菩薩之故又以下科之法無我釋成本科無有法名菩薩之故所謂展轉釋成也二七字作一句讀如唐圭峯法師疏云無法名菩薩豈有我度衆生蓋謂尚無名為菩薩之法豈有我度衆生之相意顯上文我當度衆生之言是取著度衆生為成菩薩之法也晉時肇公注云菩薩自無何有衆生自無者尚無也意謂菩薩衆生皆是假名尚無能度之菩薩何有所度之衆生乎則不應取著度衆生也明矣觀此注意法字更看得活猶言沒有法子名為菩薩耳總之古注多明大義不斤斤於前後上下之詞氣語脈故讀古注亦當遺貌取神善於領會也卯次釋無我是故佛説一切法無我無人無衆生無壽者是故者承上起下蓋欲釋成無法名菩薩之故乃申明佛説一切法無我之理也佛説一切法無我人衆壽當知衆生之見無非分別分別便有能所對待約能見言便是我約所見言便是人能所之見差別叢生是為衆生此約橫言也能所之見繼續不斷是為壽者此約豎言也分別妄心多不勝數以能所橫豎收之罄無不盡本經所以於種種見種種相中獨舉此四為言也然分別起於著我故開之為四合之則惟一我見而已殊不知一切法本來無我無差別也此佛説句含義甚多當作兩種讀法以明之一説字斷句謂一切法無我之理為佛所説也凡一切法皆是緣會則生生即無生蓋所謂生者不過緣會之幻相耳安有實法故曰生即無生此佛常宣説者也生即無生那有我人差別乎當知凡有我人差別者病在凡夫之取著一切法中安有此事故前云若心取相則為著我人衆壽也若其不取則無能無所一相不生矣然則菩薩曰我當滅度衆生便是取著六度之法便我人對待四相宛然此凡夫耳豈名菩薩故有法名為菩薩決無此理二法字斷句謂佛説之一切法本無我人差別也此中又當開兩義説之甲凡佛所説皆是説其所證而佛所證者唯是諸法一如故佛説之一切法莫非令人泯對待分別之法相悟平等一如之法性者覺此覺性可名菩薩若存有法相便是我執便成對待便是分別何名為覺故有法名為菩薩揆之佛説初無此義也乙佛説一切法皆是令聞者無人我無法我除分別心因一真法界本無我人等分別有此分別乃成衆生佛為度衆生而説法所以一切法無非説一真法界之義令除我執者故一法不應取取即著我人衆壽菩薩者學佛者也若取著六度等法何名學佛乎何以故有法名菩薩佛無此説故此中不曰如來説而曰佛説正為顯因果一如之理佛果人也菩薩因人也果人既如是説因人當如是學也總之一切衆生性本同體本無爾我對待之分故説衆生則菩薩亦衆生説菩薩則衆生亦菩薩衆生本來是佛況菩薩乎且生本無生何所謂度度亦自度何名度生譬如頭然手必救之雖至愚者亦無不救之理然而決無能救所救之分別者知能救即是所救所救即是能救故菩薩與一切衆生亦復如是故佛説一切法無我人衆壽令聞者當觀同體之性也若作是言我當滅度無量衆生豈非我見人見衆生見乎此見一日不除非壽者見乎分別如此執著如此是於性本同體諸法一如之義完全隔膜顯違佛説尚自居為菩薩乎乃曰當度無量恐三五衆生亦不能度也何以故既已我為我衆生為衆生則遇受其度者勢必自矜自喜不受度者勢必輕視憎嫌遇他之行六度者又必爭競猜忌展轉情執自縛自纏汝自己方且向煩惱惡見稠林中走入尚曰度衆生乎尚得名菩薩乎所以有法名菩薩斷斷無此事理凡發正覺者必應將佛説一切法無我人衆壽即是諸法一如的道理切實體會雖廣修六度而一法不執庶幾心空妄念而無實功不唐捐而無虛耳此無我一科既以結上文亦以起下文蓋下科即非莊嚴是名莊嚴亦是説法性無差別義者與此科所説之義相貫通也丑次約嚴土遣分二寅初標遣須菩提若菩薩作是言我當莊嚴佛土是不名菩薩菩薩修行六度無非上求下化上來已約度生明下化故此科復約嚴土明上求上求者所謂上求覺道也然上求覺道亦為下化衆生蓋菩薩發心唯一在利益衆生而已此中所説之病亦與度生中相同病在作言我當是也凡上科所説種種過咎皆通於此毋庸更贅總之作言便動念矣我當便執見矣起念著見如是全是凡情何名菩薩故曰是不名菩薩寅次徵釋何以故如來説莊嚴佛土者即非莊嚴是名莊嚴何以故者問不名菩薩之故也即非是名仍如前説所謂不著相會歸性是也即此兩言其不名菩薩之故已甚了然蓋由其著相昧性所以不名菩薩耳莊嚴佛土前曾説過然此中所明之義與前不同不同在如來説三字如來説者明其約性而説則諸法一如不應少存分別執著之情見也前之舉此為言是為顯應無住而生心之義使知於不執時卻不廢今之舉此為言是為明應生心而無住之義前云當生如是心今此度生嚴土兩科則教以雖當生如是心而亦不應住也使知於不廢時即不執蓋前是令發菩薩心者離相以修福慧今是令行菩薩道者於修福慧時不存此是福慧之見也前後淺深大有區別須知佛即是心所謂是心是佛土即是地佛土猶言心地所謂莊嚴者因衆生自無始來此清淨心被一切染法橫生障礙本來空寂者全然紛擾本來光明者全然昏暗故令發廣大願以擴其量修六度行以除其私離相離念將所有分別執著等等凡情俗見痛加掃除細為洗刷譬如地上障礙之物穢染之污一掃而空之以復其空寂光明之舊觀無以名之名之曰莊嚴耳實則無所謂莊嚴也今作言曰我當莊嚴橫此一見於心地中便不空寂便障光明尚得謂之莊嚴乎於性體上全無領會違如來説故曰是不名菩薩也必須深解即非是名之旨離相會性一如不動雖熾然莊嚴而忘其為莊嚴庶幾與空寂之性相應既空且寂光明自顯莊嚴佛土如是如是菩薩其知之廣度衆生上言滅度無量是廣度義大悲也清淨心地莊嚴佛土徹底言之便是清淨心地大智也大悲大智所謂無上菩提也合此度生嚴土兩科所説之義是明發菩提者不可存一此是大悲大智之念也若少存此念便是法執便非菩提矣兩曰不名菩薩正是結成開章時所云實無有法發阿耨多羅三藐三菩提者之義也章法極其嚴密義意極其圓滿子次令達無我分二丑初標示通達須菩提若菩薩通達無我法者如來説名真是菩薩此科之文從來多作結上會然細尋語脈前云佛説一切法無我是顯法性無差別義所以結度生不應取法也上云即非莊嚴是名莊嚴亦是顯法性無差別義所以結嚴土不應取法也法性既無差別故一法皆不應住則并實無有法發菩提之義亦一併結成矣無須重結又復細味後文則知先舉佛説一切法無我者是為此科令通達無我法作一引案逮説至後第四大科證分中則云知一切法無我得成於忍是為此科作結今將開示佛之知見令其通達故先安此科曰若菩薩通達無我法云云以為標示章法井井一氣貫通故判此科為標示之辭則前後融洽若但視為結上則氣脈不聯精神不聚矣無我法即是法無我但不無區別者證得諸法之一如則謂之法無我通達一如之諸法則謂之無我法即如上文佛説一切法無我者因佛已證無我理具無我智能於一切法中無我故曰法無我後歸結處曰知一切法無我得成於忍是明其不但於一切法能知無我且安忍於無我矣故亦曰法無我此處是令通達本來無我之一切法故曰無我法也當知法執之病病在為我見所障耳一切法中何嘗有我今令通達是令除障我見之障除則證本來無我之法性故通達無我法之言猶言去分別之妄心見本無分別之真性耳總之一切法皆無我則一切皆無我法故自著衣持鉢入城乞食乃至還至本處敷座而坐皆所以表示無我之法也何以故世尊本無需乎衣食為衆生故一年三百六十日乃至四十九年在塵勞中打混非廓然無我忘其為佛而能如此乎此正諸法一如一切法皆是佛法的氣象亦正是如來所得阿耨多羅三藐三菩提而於是中無實無虛的真憑實據也此長老須菩提所以在大衆中從座而起頂禮讚歎曰希有世尊如來善護念善付囑諸菩薩也以如來而日日在塵勞打混不離衆生故曰善護念且即以隨緣度日忘其為我之法日日如是行不言之教故曰善付囑惜乎只長老一人善能通達其餘大衆皆瞢然罔覺耳於是長老不得已詳請開示而自諸菩薩應降伏其心説起逐層逐層説至上科皆是令破我執則所説者即無一不是無我之法即皆應通達也然則今云通達無我法即指上來所説者乎抑別有無我法乎須知非別有法非別無法何以故一切法皆無我故不得獨云上來者是此外皆非也若其善能通達即不必待世尊開口於隨緣度日穿衣吃飯時早已徹底通達矣惟其不能故有上説諸法而我世尊大慈大悲憫念一切衆生恐其雖聞諸法猶復未能通達今將更説根本方便令得通達故於此處承上佛説一切法無我之義特為標示之曰若菩薩通達無我法者如來説名真是菩薩令大衆振作精神諦聽下文不致視同常談忽略放過耳云何根本方便即下文開佛知見是也凡學佛人雖知我見之害然以病根太深除之不得明明學無我法而仍故步自封處處著我然則奈何唯有將佛之知見極力灌輸以化其舊日之凡情俗見庶幾前後所説之無我法皆得通達耳由是言之謂開佛知見尤為無我之妙法可也可見開佛知見中所明之義在全經中尤占重要位置其義必須先為徹底通達矣雖然法即非法若聞開佛知見而有一知見存便又成法執又是我見豈佛知佛見哉此理當深長思也通達者四通八達無有障礙之意通達即所謂開也衆生於一切法動生障礙不能通達者因偏執故偏執即我見也今令開佛圓見圓則不執矣開佛正知正則不偏矣故欲開通無我之智慧達到無我之理體必先通達其知見俾得見無不圓知無不正非根本方便乎總以明進修之方首當開解去其偏執而已如來説名真是菩薩者謂若通達無我法則通達諸法一如矣故曰如來説故曰真是然性體空寂那有菩薩名相故曰説名使知所謂真是菩薩亦言説之假名耳亦不可執執則又不空寂而非一如矣無我法亦可分為無我無法然無論人我法我總一我執而法我細於人我法我無人我自無故不必局分二事説之丑次開佛知見分二寅初明圓見次明正知寅初又二卯初明不執一須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼此見不局指眼見猶言見地耳知見皆從理智出原非異體理謂理體即本性也理智者性具之智明其非外來也但約有所表現言曰見約了了於內言曰知故不可強分為二亦不可定説為一又知見互相資知之者深其見地自不淺然若不破其舊見亦不能啓其新知故文中先説見次説知茲先説五眼之名相再明佛説五眼之旨趣肉眼者即此血肉之軀所具之眼蓋勝義淨根依肉體而有所照見名曰肉眼此眼所見有限惟能見障內對障外言之色勝義淨根者清淨見性之別名也所見有限者為煩惱所障故也天眼有由業力得者如欲天以福業得之有由定力得者色天無色天皆是定力定力者謂作觀想想障外境障外對肉眼所見之障內言觀想成故見障外事即肉眼不能見之事名為天眼不必定生天也即在人間得此定力便能有之此指專修此定而言若生欲天者之天眼則是由修福業而得生色天以上之天眼或由修他種定而得則皆為報得也凡夫齊此二眼若慧眼以上非修出世法不能有慧眼者以根本智照見真空之理亦名真諦智即是慧故名慧眼根本智異名甚多如實智真智正體智如理智等等以其能生起後得智故名根本智二乘聖賢所見齊此得此則天眼亦得而過於天眼能見天眼所不能見然亦有所限不及佛之慧眼也法眼者以後得智照見差別之事即是俗諦亦有種種異名如權智俗智遍智如量智等等以得根本智後方能得之故名後得智得此智者不但證真空理通一切佛法并通世俗一切法及通一切衆生因因果果起心動念等差別事相故名法眼然猶不及佛之法眼也菩薩所見齊此前三種眼菩薩皆有自不待言惟無佛眼耳佛眼者智無不極照無不圓惟佛有之故名佛眼古德有頌云天眼通非礙肉眼礙非通法眼能觀俗慧眼了真空佛眼如千日照異體還同照異體還同者謂但約照見之殊勝名為佛眼實則其體非於前四之外別有也故前四約佛邊言雖名肉眼而見無數世界不同凡夫之有所限只見障內也以天眼言凡夫天眼只見肉眼所不能見二乘天眼惟見一三千大千世界菩薩天眼雖勝二乘而不及佛惟佛之天眼能見恆河沙數佛土以慧眼言二乘慧眼惟能照見我空地上菩薩慧眼亦是分證法空佛之慧眼則圓照三空洞徹真性以法眼言菩薩法眼所知障未盡地地之中各有分限惟佛法眼所知障盡無法不知故無生不度也由是可知約佛邊言不過名為四眼表其隨感斯應耳其實惟一佛眼而已故古德曰前四在佛總名佛眼也佛眼智無不極照無不圓者以俗諦言遍河沙世界雨滴點數悉知悉見其他可想矣故自無始來窮未來際遍虛空盡法界一切衆生乃至一極微細衆生死此生彼根性族類以及起心動念前因後果千差萬別極微細之事相無不悉知無不悉見以真諦言聲聞定多慧少故但照我空不見佛性菩薩慧多定少雖見佛性而猶未盡明蓋證佛性以慧為因以定為緣因親緣疏故定多不及慧多然定慧既未均等故菩薩但分證法空分見佛性唯佛與佛定慧均等了了見性如觀掌中菴摩勒果也以上釋名相竟佛説五眼其旨云何蓋借五眼以明佛見圓融也此科文相最奇突然而起陡然而止平敘五眼此外不著一字意義甚難領會必合上科並讀之乃知是令通達佛見下文知字是令開佛知所以須判上科為總標也舉一佛眼便攝四眼今乃一一遍舉四眼而問皆答云有者正明不執一見也若四眼皆答無惟佛眼答有是獨執一佛眼豈佛之圓見乎豈法無我乎長老深解義趣通達無我法故不如是答也約佛邊言肉眼天眼慧眼法眼一一殊勝合此四眼即是佛眼乃復舉佛眼而問亦答云有者正明非四眼外別有佛眼非佛眼外別有四眼非一一眼外別有一一眼然隨感斯應亦何妨有一一眼蓋遍舉五眼者意顯不一而一一而不一見見皆圓無所謂一見非一見也然則謂之見而不見可謂之不見而見亦無不可亦即謂之不有而有有而不有也皆無不可此不執一之極致也故答辭皆先曰如是後曰有蓋明既見一如則有見皆是矣何以故見見如故問答皆言如來有者總以明見性圓明有如圓鏡胡來胡現漢來漢現初無容心正所謂不有而有有而不有也譬如分一池為五池池各現月月隨池而成五月無容心也一而不一也若通五池為一池則現一月月隨池而成一月亦無容心也不一而一也佛眼五眼如是如是此正顯一切法無我之義菩薩應開如是見通達如是無我法也云何通達惟在不執己見更不執一見而已云何能不執首當大開圓解令其見地徹底則執情自薄即復力除習氣離相離念證得諸法一如方為究竟耳於意云何是探其見地如何一一答如是如來有足證長老已於一如之理通達無礙經中凡言於意云何皆是探詢見地之辭也凡言若作是念能作是念否莫作是念汝勿謂作是念等等皆是破其執見令開圓見也卯次明不執異須菩提於意云何恆河中所有沙佛説是沙不如是世尊如來説是沙恆河上流通本有如字為古本所無應從古本因有一如字多認為是説譬喻不過藉以引起下文耳而不知其是説實話殊不知佛説此科合諸上科乃以明大乘佛法緊要之義正是佛之圓見所謂開佛見者開此以誤認故遂致一齊抹煞一字之差出入懸遠真可嘆也如是世尊兩句是長老答辭河沙微細有如微塵前云諸微塵如來説非微塵是名微塵則恆河沙如來亦必説非沙是名為沙矣何以故此經遣相尚云般若非般若何況乎沙今乃不然如來説是沙者若不著相則見相即見性矣又何必説不是沙乎此一義也又復下半部正明一切皆是以遣微細之執即俱生我法二執故雖沙之瑣瑣亦不説非而但説是此又一義也然而佛説此科所謂合諸上五眼一科以明大乘要義者尚不在此須知此科之義乃顯佛眼因洞見一切法差別事相不壞俗諦故世俗既説是沙如來亦隨俗而説沙以明如來之不執異見也長老與佛心心相印故答曰如是既證諸法一如則何説而不是乎故曰如來説是沙也如來説是沙者蓋明是沙之言乃如來説即是依如義而説豈同凡夫説耶何以故凡夫説是沙則執以為實如來説是沙乃是即非是非是而是此其所以不執異見而説是沙耳經中凡説如是皆含有此義可靜心會之此不執一不執異兩科含義淵微須逐層披剝之以此見不開執情難遣急當參究令其通達萬不容忽者也當知不一不異之義便是法法皆如此正佛之所證所得前於説法法皆如時亦已廣談既為佛之親證即是佛之圓見然而佛如是證得由其在因地時已能開此圓見故也開此圓見乃能雖見而不立見乃能於一切法不執而無我乃能如是如是究竟證得之耳所以一切菩薩修因時亦應如是開之何以故一異不執是破除我見之慧劍故當知我見難除不外兩種理由一見理不明二自以為是初因見理不明而自是繼因自是而見愈不明二者蓋互相資助互相增長然其病根則惟一見理不明而已自是則由不明而生者也其互相助長蓋後起之狀故欲破我首當明理開佛圓見者徹明其理之謂也先説五眼以明不執一見者為見理不明者説法也繼説河沙以明不執異見者為自以為是者説法也見理不明者非謂其一無見也但主一見為高遂為此一所蔽則高者不高矣有如五眼自以佛眼最高而不知正以四眼一一殊勝故稱佛眼此如來所以不執一見而圓具五眼也執一者其知之自以為是者非謂其絶不是也但欲獨伸己是而不與衆見苟同則是者非是矣有如河沙言性固非言相何嘗不是相者即性之相奚必廢相以明性此如來所以不執異見而説是沙也執異者其知之總之於見有所執者則有所立於是或一或異不偏於此即偏於彼蓋著我之所致也今教以一異俱不可執見將從何安立則我亦與俱化矣非除我之慧劍乎不一不異之義為般若之綱宗佛法之要領可以貫通一切法故此經令通達無我法者先通達乎此也此句開之則為八不十不十二不十四不如大智度論云不生不滅不斷不常不一不異不去不來因緣生法滅諸戲論因緣生法猶言諸法緣生亦猶言因果蓋因緣生法者因緣所生之法也法即因生之果也故因緣生法簡言之即是因果此言一切法皆是因果故一切法皆是不生不滅不斷不常不一不異不去不來此所謂八不也若不明八不之義便不明因果則所言皆成戲論正顯八不因果之義為正論正見也緣生之法正是生滅何云不生不滅不知緣聚則生緣散則滅約法相言耳見法相之生滅足證法性本不生滅矣不去不來亦約法性言也因因果果永永不息故不斷因而成果果又為因故不常一切法各有因果故不一一切法不外因果故不異也八不義若專約因果發揮可成專書茲不過略説之耳智論又云觀一切法不生不滅不增不減不垢不淨不來不去不一不異不常不斷非有非無此言十四不也若將非有非無句作為解釋不生不滅等六句之義者則為十二不中論亦説八不曰不生亦不滅不常亦不斷不一亦不異不來亦不出能説是因緣善滅諸戲論不出即不去之意此二論皆龍樹菩薩作以明般若者嘉祥大師大乘玄論云八不者是諸佛之中心諸聖之行處豎貫衆經橫通諸論其中論疏則云是正觀之旨歸方等之心骨定佛法之偏正示得失之根原迷之則八萬法藏冥若夜遊悟之則十二部經如對白日誠以如是句義正是開人佛知佛見以除其從來執著之妄想妄計者凡佛所説皆明此義所謂第一義也勝義也中道也此義若未通達則佛法之宗旨不明何以圓修圓證故曰諸佛中心諸聖行處迷之則若夜遊悟之則見白日也然龍樹實本諸本業瓔珞等經但次第少不同耳經曰二諦義者不一亦不二不常亦不斷不來亦不去不生亦不滅不二者不異也二諦者真諦謂法性俗諦謂法相也經以八不明二諦論以八不明緣生因此義貫一切法故也大涅槃經則説十不曰十二因緣不出不滅不常不斷非一非二不來不去非因非果不出不滅即不生不滅非一非二即不一不異非因非果非謂無因果也首句云十二因緣謂十二因緣生法不外此十不之義因緣生法正明因果也蓋謂約因果説説名為因乃是前因之果説名為果亦是後果之因此明因果無窮不可執謂因定是因果定是果故曰非因非果又約性相合言之約因果法性説則冥同一味不能説誰因誰果而約因果法相説則事相分明因是因果是果因必有果果必有因然正分明時即冥同一味何以故相不離性故正冥同一味時卻了了分明何以故性不離相故是之謂非因非果蓋合首句以明義也此本經所以説即非復説是名也所以不應取法不應取非法空有皆不應著此中論所以云因緣所生法我説即是空亦名為假名亦名為中道蓋謂欲知一切法不出因果者當明即空即假之義若不明空即是假則墮斷見萬事皆歸斷滅便成撥無因果若不明假即是空又墮常見萬事皆若固定亦成撥無因果須知雖説空説假其實空假不一不異明得此義便為中道非空假外別有中道空即法性真諦也假即法相俗諦也此中五眼一科即是明真諦法性法性本來如如而皆是何必執一河沙一科便是明俗諦法相法相本來隨緣而無定何必執異乎八不十不十二不等但是開合不同耳若詳開之可至無量句若約之又約則不一不異便攝一切故此中開佛圓見但約不一不異明義也今再略言八不之義所以貫通一切經論之理當知佛所説法不外真俗二諦俗諦法相雖變化無常而為世俗所共見故謂之俗真諦法性則常恆不變而為諸法之本體故謂之真佛説二諦皆用八不之義以説明之名為諦者明其事理確實不虛也一切衆生所以輪回生死苦趣無邊者無他由迷俗諦八不之義故也一切聲聞乃至權位菩薩所以有變易生死無明未盡者無他由迷真諦八不之義故也總之但因於此八不義諦迷有淺深悟有高下故有六道之紛紜三乘之差別佛為一大事因緣出現於世即為令衆生了二種生死故説種種法以開示之令得悟入耳而種種法不出真俗二諦八不之義故此義貫通一切經論也不字有二義一破義破其著一切相也二泯義泯相顯性也然破有二義不但破著有并破著空泯亦有二義不但泯相顯性亦復泯性顯相而令圓融也今試舉不生不滅句説其綱要且以不一不異句貫通之先約俗諦言世俗中人莫不執謂實生實滅佛告之曰皆非實也但由因緣聚合假現生相因緣散時假現滅相而已汝性何嘗生滅乃但執相而昧性汝所以有輪回生死之苦也此約俗諦顯中道中道顯則非俗諦而真諦矣所以治著有之病也再約真諦言二乘聖賢權位菩薩又執不生不滅佛告之曰不生不滅者對治凡夫著生滅相耳安可去一執又生一執須知性相不二空有同時有即是空故俗諦之生滅為假生假滅空即是有故真諦之不生不滅亦是假不生假不滅也汝既見性正好現相隨緣度生且性本不離相乃但執性而厭相汝所以有變易生死之苦也此約真諦顯中道中道顯則為最上乘一佛乘矣所以治著空之病也以不一不異貫通之者俗諦執生滅則生與滅不一也不執而不生不滅則生與滅不異也真諦執不生不滅則不生不滅與生滅不一也不執而性相不二空有同時則生滅與不生不滅不異也蓋既空有同時矣則不生不滅時無妨現生滅雖現生滅卻是不生不滅此之謂不住生死不住涅槃則一異俱不可説并不一不異之名而俱泯矣由是觀之可知一切皆不可執亦毋庸執也故八不諸句為化除執見之妙義而不一不異之義則可以貫通諸句也此諸句義皆是顯法法皆如者法法皆如是中道圓融第一義故八不諸句亦是中道圓融第一義但法味不同耳何以言之法法皆如是圓顯所謂表詮天台華嚴兩宗依此義而建立者也八不諸句義為般若之綱宗則是以遣為顯所謂遮詮三論宗依此義而建立者也禪宗亦是宗般若之遣蕩者但不講教義耳須知必先遣蕩方顯圓融即如本經必於離相離念之後方説法法皆如佛旨可見矣何以故執見未遣豈能圓融且著於圓融亦非圓融也起信論所以明不空須自空出也建立圓宗而説圓義者并非不説遣蕩之義但説遣蕩亦帶圓味宗遣蕩者如三論宗等亦非不説圓融之義但説圓融亦帶遣蕩味故其説如快刀利斧無堅不摧讀之如冷水澆背發人深省也慨自般若教義不明於世即智度論三論宗諸書從來鮮過問者故隋唐以來惟禪門出人最多其故可深長思矣須知學人若不剋從遣蕩用功徒記誦得無數圓義何能破其情執情執不去又何能達乎圓融本經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出正的的指示般若為入佛之要門成聖之階梯也此事關繫法門之盛衰關繫學人之成敗極其重大故不覺一再痛切言之三論宗既宗般若故學般若者三論諸書不可不一究心即不能遍讀必須讀其一二種以嘗法味庶幾般若大旨易於領會如大智度論大乘玄論中論疏等最足破人固執開人悟門者也但義既幽深文復淵奧惟在熟讀靜領以參究之雖然若謂參究上舉諸書便於般若義趣無不洞了則又非也當知八不諸義不過般若之綱宗耳般若中曲折深微之致非剋從離相離念處真參實究何能洞明此理又不可不知也蓋大綱不異而細微則不一也不但此也即以前八會後七會所説般若持與本經校亦復如是綱宗大旨彼此不異微妙義味彼此不一所以一部經有一部經的宗旨有一部經的説法豈能一通全通當知佛説是佛境界所謂諸法實相惟佛與佛方能究竟諸大菩薩尚未究竟何況凡夫所以華嚴會上善財所參五十三位善知識皆曰我惟知此法門餘則不知乃是實話并非謙詞所以古德如智者嘉祥賢首諸位平生只宏揚數種經論蓋學力只能如此此正古德高處真處後學所當學步者也不但三論八不諸句義只能明般若之綱要細微旨趣仍在學人自領即令今有一人將本經義趣箸書立説一一宣陳然得此一書不過多一助力而已亦仍在學人自領也何以故此人即令已成菩薩而佛之境界終不能究竟即令頓悟同佛竟能徹底宣揚而讀其書者障若未去仍復未能徹底領會仍須向離相離念處真參實究而後乃能契入耳即如此不執一不執異兩科所明之義聞得之後必須以此法印向一切法上微密印證更須以此法印向自心上印證向未起心動念處印證如此庶有通達之可期若但聞説此兩科之義而得明了只能謂之明了不能謂之通達此理尤不可不知通達者四通八達毫無障礙之謂故若於自心上於一切法上行之少有障礙便非通達矣下明正知正是説一榜樣令學人遵照以不一不異之見地向心行處及諸法上了知其所以然以求通達而無我者也寅次明正知分二卯初明心行叵得次明諸法緣生心行者心之行動謂起心動念也諸法謂外境也約內心外境以明正知意在使知無境唯識心外無法之義也心外無法故法法不外一真如但衆生外為境相所迷內為心念所擾不能證得此般若所以令離相離念也叵得者不可得也性體空寂本無有念故曰不可得諸法莫非緣會假現生相本來無生是之謂當體即空是故約心行及諸法言不一也而約叵得及緣生言不異也不一不異諸法如義也當如是知也如是而知名曰正知者以其是依無上正等正覺之所證知者而知故也知此則知應離念離相之所以然矣離相離念正所以無我也卯初明心行叵得分三辰初喻衆明知次釋明非心三結成叵得辰初又二巳初引喻須菩提於意云何如一恆河中所有沙有如是等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊有如是等流通本等上有沙字古本無之可省也將明正知而承上圓見中河沙之説以為引端者意顯向下所明之義非執一異之凡情俗見者所能了知必先開其圓見不執一異乃能開此正知也且以顯向下所説當以不一不異之義通之也將説衆生妄心以及諸法而必假設譬喻以沙喻河復以喻河中之沙為言者意顯妄心及一切法層出不窮牽引愈多不可勝數也且以顯妄心法相如幻如化莫非假有也皆是親切指點之語若視為無關緊要有如贅辭則孤負經文矣啓口説一於意云何者將欲開其正知故先探試其見地其意直貫至不可得非僅探問多否如者顯其是譬喻之辭也一恆河中所有之沙已無數可計矣如是等指無數沙謂設有恆河其數與一恆河中所有之沙相等猶言無數恆河也是諸恆河指上句無數恆河言無數恆河所有之沙其數豈有量哉佛世界即謂大千世界每一大千世界為一佛教化之區域故曰佛世界如是指上句無量言謂無量世界也寧為多不問可算得是多不甚多世尊句長老答辭此科但設喻為下文作引蓋以無量數之沙比喻世界之多者皆為借以顯下文衆生心多如來悉知耳巳次悉知佛告須菩提爾所國土中所有衆生若干種心如來悉知經中凡標佛告句皆鄭重之詞令讀經者鄭重向下所言也爾所者如許也指上文無量言無量國土猶言無量世界但世界是通名國土是別名今將言衆生故換言國土不言世界何以故舉國土之別名為言者顯衆生有種種差別也所謂十方剎土所有衆生種種差別是也蓋謂無論是何族類色身等差別衆生大而天人小而螻蟻其心無不悉知上科不但言世界而曰佛世界者亦含深旨當知世界之執持不壞固由衆生業力然非仗佛慈悲威神之力為之攝持以衆生業力之惡濁早不知成何不堪之狀況矣一切衆生皆蒙佛恩而不自知猶之動植飛潛之得生成全受日光之賜而不知者同也語云雷霆雨露總天恩天之有恩實由佛之施恩也試觀諸大乘經所説梵王帝釋乃至日月天子一切諸神皆在佛前發願護持衆生故知世界之執持實賴佛恩慈悲威神之力總之此經一字一句一名詞一稱謂皆含妙義不可忽略世界國土已多至無量則其中之衆生其數之多那復可説何況衆生心乎真所謂不可説不可説矣何以故既是衆生心則念念不停即以一衆生言其心之多那復有數況不可説之衆生心耶故以若干種概括之若干種者言其差別之多無數可説也上科由一恆河而説其中無數之沙由無數沙而説為無數恆河由無數恆河而説其中無量之沙復由無量沙而説為無量世界此科又由無量世界而説其中不可説之衆生然後由不可説衆生而説其不可説不可説之心所以如是層遞以説之者既以顯不一之義以跌起下文之不異且以引起如來悉知耳以至不一之事而悉知之者豈差別之知見所能悉知哉世尊蓋以如義知之耳故曰如來悉知此義與下如來説相應總以示菩薩應如是知也如來悉知其為何下科何以故下正明其義衆生之心究如何再下科所以者何下正明其義辰次釋明非心何以故如來説諸心皆為非心是名為心諸心指上科若干種心言非心句約性言暗指非真心真心即性也是名句約相言謂如是之心特假名為心耳暗指其是妄心妄心即下文遷流心遷流便有相故曰是名名者名相也此處不宜將真妄點破只可渾含説因是妄非真下科方説出所以然此處説破下科便成贅文何以故自問也問衆生若干種心如來何故悉知耶如來説下自答也答謂雖曰若干種而如來知其實可概括為一種曰皆是非心但為假名之心耳看經文表面似但説明如來能悉知并未説出何故悉知者然實則悉知之故已影在其中其故何在在如來二字蓋如來者諸法如義如者真如也真如者同體之性也已證同體之性便成大圓鏡智所以一切衆生起心動念佛心鏡中了了分明且佛心無念故知動念者皆為非心此悉知之故也上科曰如來悉知此科曰如來説正明其依如義而知依如義而説也昔唐代宗時西方來一比丘衆稱之曰大耳三藏自言有他心通代宗請南陽忠國師禪宗大德試之坐少頃師問老僧今在何處答曰在西川看競渡少頃師又問答曰在天津橋上看弄猢猻師寂然少頃再問即不知矣師呵曰他心通在甚麼處他心通者知他人心中之事也忠國師先故起念忽在西川忽在橋上以試之逮後寂然是不起念念既不起遂無從知以此事為證如來悉知更何待言須知凡夫心念雖鬼神亦知之所謂機心才動早被神知若微細念則惟菩薩羅漢能知佛則無不悉知也忠國師呵斥之語不解意者以為不信他心通非也呵斥之意不出二種當知神通不可執執之輕則賣弄生害重則著魔發狂此以理言也忠國師弟子甚衆代宗亦其弟子矜奇好異人之恆情倘大衆看重此等事既足為修行之障且恐為法門之害此以事言也此大耳三藏通必不高若其高也起微細念亦能知即不起念亦能知其未起念也何致忠國師寂然便惶然不知所云通既不高而在衆中自言得通迹近賣弄顯違佛敕佛令弟子非遇不得已不許顯神通國師斥之者意在於此當知三明六通是學佛人本分事但修行時不宜注重此事恐走入魔道無明盡時神通自得得之之後亦不宜輒與人知恐為捏怪者所藉口後患甚多也上來由沙而河而沙而世界而國土而衆生事相種種不一而歸結之於衆生心非但示心外無法已也蓋説河所以喻心念之流動説沙所以喻心念之繁密説沙為河喻心念從微而著説河之沙喻心念由總而別由河沙而説到世界國土衆生喻衆生心念既流轉不停如河復膠固不化如土既細瑣無比如沙復馳騖無極如世界有任運而起者如河沙等有施設而成者如國等有源流有本末有通如世界有別如國有別中之別如衆生所以言若干種心也如上所説凡有兩重不一不異外而山河大地內而五蘊色身其事相至不一矣而為衆生心所現物則不異也又復衆生心念多至若干種不一也而皆為非心則又不異此皆發覺者所應了知然此兩重不一不異尚不過為下文作引案耳總而言之不一不異諸句義既顯法法皆如即是顯無有定法令行人當於一切法上活看活用不生拘執故佛時而説一以顯其不異時而説異以顯其不一時而一異俱説顯其雖不一而不異雖不異而不一時而一異皆非顯其并不一不異亦不可説也無非為遣情執遣之又遣功行至於俱不可説則證諸法一如矣其説有無諸句皆是此義總以明處處不可著以治衆生處處著之病而已無論世出世法皆應依此義觀依此義行辰三結成叵得所以者何須菩提過去心不可得現在心不可得未來心不可得叵得即不可得過去心三句唐慧淨法師注中初句過去次句未來三句現在無著菩薩論亦然次序雖異大旨無關此科説明非心之所以然也過去現在未來名為三際際者邊際界限之意過去非現在非未來現在非過去未來未來非現在過去各有邊際故曰三際心念既有三際故謂之遷流遷流者言其心如水之前浪後浪相推而前遷移流動而不息也此即色受想行識之行行者行動遷流之意也蓋因其心念剎那不停故曰遷流因其遷流故有過去現在未來然而過去則已去現在又不住未來尚未來故皆不可得剋實言之只有過去未來并無現在蓋剎那剎那而過去矣那有可得不可得者明其當下即空也若夫真心則常住不動絶非遷流但因衆生無始來今未曾離念念是生滅之物故成遷流故為非心言非常住之真心也生滅心是妄非真者以真心本不生滅故也既生滅之不停那有實物故曰是名為心也上科明圓見是令不明理而自是者明了無是非是尚是説不可執之當然此明正知中則明不可執之所以然矣故曰所以者何即如此科之意蓋謂汝於一切法取執者在汝意中必自以為我能取不知即此能取之一念三際遷流當下即空念尚不可得尚何能取之有乎三言不可得真乃錐心之語直令我見無安立處楞嚴經曰一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉當知衆生從無始來認妄為真遂致生死輪轉者因一切唯心造生死輪轉之苦實由其心生滅輪轉故耳蓋一言及相必有生滅重在心不隨相而動動即行也所謂遷流也便除一切苦矣所謂了生死出輪回者心了耳心出耳故修行人第一步便當明了此理辨清孰為真孰為妄其實極易辨別淺言之分別執著者妄也不分別執著者真也深言之真心無念起念即妄由行緣識故起念為分別執著之根所謂修證者無他除妄是已妄云何除離念是已離念則分別執著自無真心自見生死自了離一分見一分離得究竟見亦究竟矣一切衆生所以認妄為真者由於不知其是不可得何故不知由於心粗不辨其是生住異滅剎那相續若知其是剎那相續則知是遷流而不可得者矣既不可得執之何為且自以為能執而實無可執徒增業力而已真愚癡可憐也此理惟佛知之説之而為修行人所急宜覺悟者故明正知中首先便言此事以其為成凡成聖之關鍵故也由是觀之本經雖離相離念并説實歸重在離念不過以離相為離念之方便耳逮至念離則見相即見性儘管隨緣現相廣度衆生毫無障礙矣何以故心念既離其於相也不離自離故此科之義一深無底上説不可得是約妄心明義殊不知佛説此科最大宗旨尚不在此宗旨云何在令學人即妄證真頓契無生也何以言之三際遷流之心所謂無明緣行也無明者不覺也一切衆生初不覺知念念遷流故隨而分別執著分別便成第六識執著便成第七識則行緣識矣此中言如來知者令學人當如是知也知者覺也且告之曰遷流之心當下即空實不可得正是令學人速覺當直下向不可得處觀照契入則湛湛寂寂當下便是常住真心正所謂狂心不歇歇即菩提矣故此科之義是明至圓極頓直指向上之法門也昔二祖問初祖安心法祖曰將心來與汝安曰覓心了不可得祖曰吾與汝安心竟正與此中所説同一法味當如是知勿負佛恩也故上科皆為非心是名為心句義亦可兼明真心蓋真心無名無相唯一空寂説為真心亦非心也但假名耳古德所以云説似一物即不中也由是觀之此科亦具兩重不一不異過去心現在心未來心是為不一皆不可得是為不異又復遷流心與常住心不一也知其不可得而當下空寂則不異矣合之上科所説共為四重當知佛之委曲説此四重者開示修觀之方便也方便云何先觀河沙等器界根身諸法之不一而銷歸於衆生同具而無異之心既而進觀心念有若干種之不一而銷歸於諸心所不異之皆非是名更觀心之所以皆非者由有三際遷流之不一也則銷歸於三際不異之不可得當知不異者如義也步步由不一觀不異則步步趨向真如矣即復深觀遷流心常住心雖曰不一不過性相之異耳則離相會性而銷歸於本無可得之大空尚復何異之有則寂寂明明明明寂寂一念不生矣一念不生而實相生矣豈非一超直入之修功哉妙極妙極今為諸君一一拈出若能依此義以修觀行一日千里尚何待言當知四重之義重重深入而步步由不一入不異即是步步除分別執著亦即步步無我逮至一念不生人我法我尚復何存乎真無我之妙法也菩薩不向此中通達更向何處通達此一大科為開佛正知是令開佛之正覺也故聞如是教便應如是開如是開便是如是覺如是覺便能如是證矣圓頓大法孰過於此下諸法緣生一大科亦復如是開之覺之而一是向心行上開覺一是向諸法上開覺雙方並進則心境皆亡我法俱空矣正所謂無我相無法相亦無非法相而離一切諸相則名諸佛矣教下名言甚多無此直捷了當宗下棒喝交馳無此彰顯明白願與諸君共勉之卯次明諸法緣生分二辰初約福報明無性次約法施明體空此一大科標題含義甚多先當一一説明入文方易領會上心行一科是約內心明義此諸法一科是約外境明義外境之事相甚多故曰諸法諸法多不勝數將從何處説起今約福報及法施明義則可以賅攝一切法矣蓋福報之義明非福報之事便可例知布施即攝六度六度即攝萬行而布施中則以法施為最若法施之義明所有六度萬行皆可例知也法施是善行善行之義明非善行之事亦可例知也至於緣生二字當分條以説之頃言含義甚多指此言也一內典中因緣二字有時分説有時合説分説者因是因緣是緣不容混也合説者説因即攝緣説緣即攝因蓋親因謂之因疏因即是緣故可合説此緣生一言乃合説者所謂因緣生法是也因緣生法者謂一切法之生不外因緣從無無端而起者也故法即因緣所生之果因緣生法無異言一切法不外因果而福德及具足身相是約果報明義法施是約因行明義既一切法不外因果故攝一切法盡二諸法緣生者謂一切法本來無生但由因緣聚會假現生相耳此意蓋明諸法是假相而非真性以性乃本具萬古常恆非由因緣聚會而生者也故標題曰無性言其但有相而無性也當知佛書所言性皆指心體之性言與俗書所謂物性性格等説絶不相侔而一切法既皆為假現之相可知一切法之當體如幻如化如空中花如水中月絶非實物矣故標題曰體空此體字指當體言猶俗語所謂本身非謂性體也是故緣生之義即顯其有相無性當體是空耳福德及具足身相顯無性義便法施顯體空義便故分配言之由是可知説緣生無異説不可得而説不可得亦無異説緣生何以故心之行動亦緣生法故所謂無明緣行是也夫衆生處處執著一言執著便有能所就能執一面言無非妄念就所執一面言便是諸法今告之曰汝以為有能執者耶心行叵得能執之意當下即空也又告之曰汝以為有所執者耶諸法緣生所執之法亦復當體是空也如此開示正是將衆生執見從根本上推翻若發覺者通達此理我見可冰銷矣何以故我見之起起於執實既認妄念為真心又以諸法為實有遂致我見不能遣除故欲遣我執最妙觀空佛稱醫王又稱空王即謂能醫衆生執實之病耳三緣生與不可得皆明即空之義如上所説固已然而大旨雖不異而含義之廣狹則不一蓋不可得之義但明即空緣生之義既明即空兼明即假妄念為成凡之由將欲了生死證聖果必須斷念故只宜説不可得不宜説緣生諸法固不應取著亦不應斷滅故只宜説緣生不宜説不可得何謂即空即假當知一切法只是緣生本來是空此所以言即非也然而既已緣生不無假有此所以言是名也故法與非法皆不應取也且以一切法雖體空而緣生乃是即假之空所以雖絶非真實而事相儼然此衆生所以難出迷途也以一切法正緣生卻體空乃是即空之假所以雖事相儼然而絶非真實此行人所以亟應覺悟也云何覺悟空有不著是已云何而能不著要在離相離念必離相離念乃能隨緣不變不變隨緣耳四前言心行及諸法兩科是開示一超直入之修功然其中亦有雖不異而不一者不可不辨蓋直向心行不可得處契入是契入空寂之性體若直向諸法緣生處契入則是契入如實空如實不空之體相用亦即契入寂照同時之性德者也然而得體方能起用不空須自空出若不離念寂且未能遑論乎照故學人於行門必須空有不著而於觀門則須一空到底此理不可不知也總之心行叵得應離念也諸法緣生應離空有二邊相也前不云乎離念為離相之究竟離相乃離念之方便故用功當以離念為主念若離時空有二邊相不必説離而自圓離矣雖然諸法緣生即空即假之義離念者亦不可不通達之以為補助當知心性本空有同時故唯心所現之諸法亦無不空有同時今觀諸法緣生即空即有即無異觀心性之即空即有也若但知離念而不知修此觀恐墮偏空而不能達到寂即照照即寂也故於説心行叵得之後復説諸法緣生此理更不可不知也是乃佛之正知當如是開之也五上説性與諸法空有同時之不異然其中亦有不一者不可不辨也蓋真心不但真空且是真有真空者離名絶相故真有者常恆不變故彼一切緣生法不然本無是物但現假相而已乃是真空假有者也剋實論之尚不足言真空只可謂之假空因諸法之空是由假有形成者耳既非實物空有俱説不上茲姑隨順古義説為真空假有因其本空故説假有因其假有故知本空為欲明其空有是相待相形而成故曰空有同時耳不似真心離名絶相之空常恆不變之有皆是絶待其同時並具初非由於相待相形而成者也故謂之真故能為一切法之體又復真心既萬古常恆故曰本不生若一切法亦名本不生者乃因假現生相形成為本來不生耳實則本無是物無所謂不生也故本不生之名雖不異而一真一假亦復不一或曰心外無法心生則種種法生此心蓋指妄心而言然則佛菩薩既無妄念而能現種種境相不知何由而成答佛菩薩實無有念種種境相亦實由心而現此則由於因地發大悲願隨緣度衆故證果後雖不起念而藉夙昔悲願熏習之力便能隨機感緣現諸境相此義散見諸經論及大乘止觀故修因時必須悲願具足深觀諸法緣生之義使熏習成種乃能於大定中隨緣示現耳上説諸義皆行人所應了知不然必疑證果後何以念猶未淨或疑無念則無所現或疑真心與諸法同一即空即有同一本不生何以為諸法之體耶茲姑乘便一言之六開經以來所説諸義得此心行叵得諸法緣生兩科乃洞明其所以然蓋説三空説一切皆非等等句義者以心行不可得故也説二邊不著説一切皆是等等句義者以諸法緣生故也故此開佛知見一大科實為全經最要部份前後所説無非開佛知見信者信此解者解此修者修此證者證此合信解行證方將開字功夫做了信是初開而解而行而證乃究竟開也辰初約福報明無性分二巳初明福德次明報身巳初又二午初明福德因緣須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多世界寶施前曾説過就已説者發明緣生之義有微旨焉蓋示上來所説一切法相皆應以緣生義通之中論云因緣生法即空即假當知不但所生法即空即假也因緣亦復即空即假因緣即空即假故雖不著相而應行布施前所以言應無所住行於布施也因緣即假即空故雖行布施而應不著相前所以言應布施不住於相也所生法即空即假故雖當體是空而緣會則生前所以屢言是名也所生法即假即空故雖緣會則生而當體是空前所以屢言即非也此科是總明緣生之義何謂總明從布施因緣説到福德福德即布施因緣所生法也故布施因也福德果也因果並説故曰總明則下報身但約果言者便可例知果必有因法施一科似但説因亦可例知因果無盡蓋必能施所施及聞法施者各有因緣且一齊聚會乃有此法施之事發生是此一法施乃無數因緣聚會所生者也而將來各各所得之果則又由此一法施之因緣所生豈非因果無盡乎布施等為佛門大事尚不離緣生不離因果則其餘一切法可知矣故約此數事言之以示例焉所謂總明者復有一義本科但泛言福德而下科則言報身證得報身可謂福德多矣本科泛言布施下科復專約法施為説皆無異為本科指實者故亦可判本科為總明判下報身法施兩科為別明前半部中長老答辭多言不也即不答不也亦從無答如是者後半部惟開佛知見中答如是最多此外只有答以三十二相觀如來一處言如是此經字字皆含深義可知凡答如是決非泛言實承前已説者表示諸法一如一切皆是之義耳前言一如皆是是明融相會性此諸法緣生所明之義亦意在融相會性也長老深解義趣故先答如是繼之曰此人以是因緣得福甚多正指示行人應領會諸法緣生道理以通達乎一切法皆是一如耳蓋緣生道理即空即假是也觀照即空即假以契入如實空如實不空則融諸法之相而會一如之性矣前云不住相布施福德不可思量今云得福甚多甚多者不可思量也經旨趨重下科此科所説不過為下科作引案耳故不住相一層此中未言而下科言之午次明緣會則生須菩提若福德有實如來不説得福德多以福德無故如來説得福德多此科是佛正意説上科正為引起此科來此科辭旨深細須分數層明之上科已明福德是緣生法矣既由緣會方生豈得有實有實便非緣生矣若非緣生福德便無得之之路以一切法從無無端而得者也故曰若福德有實如來不説得福德多以者因也無者無實也正對上文有實言謂因為福德是緣生法即空即假而無實之故一切衆生但能布施六度深植因緣則因緣聚會福德便生矣聚會者成熟之意也故曰以福德無故如來説得福德多也經中兩説字著眼意顯表面説福德骨裏是説布施也何以故若執福德有實是不知其為緣生法矣不知為緣生便不知在因上注重若不修布施之因那來福德之果乎故如來不説得福德多也殊不知正因福德當體即空而無實乃是即空即假之因緣生法故欲得果者但修其因若勤行布施則福德自至矣故如來説得福德多也如上所説經中大旨已明然猶未説徹也何以故只説了得不得的關繫多不多的關繫尚未説著故當知佛説緣生重在令人徹了一切法即空即假以通達乎無我而融相會性耳此層道理須先説清源委便易明了法法莫非因緣所生故福德是緣生布施亦是緣生然則福德之因緣為布施布施之因緣為何耶當知布施之因緣發心是也發心小則布施小福德亦小發心大則布施大福德亦大然則發心云何為大耶不住相是已心有所住則有所束無住則無拘束無範圍故大也故欲布施不住相必先於福德不住相若注意於福德是以福德為實有也有實即實有之意便住相矣既於福德住相而行布施是為福德行布施也則布施亦住於相矣蓋世尊之説此科是將前來所説不住相布施之言更加徹底發揮無異對住相布施者揭穿其病根所在蓋布施之所以住相無非為貪求福德耳文中如來説三字甚要謂依如義而説也蓋謂若於緣生之理未能徹了但知以布施因緣能得福德遂貪求福德以行布施則大誤矣殊不知佛説緣生是令體會緣生之法即空即假而於諸法不執銷歸一如之性耳若以福德為實有勢必貪求福德以行布施而住於相矣既住於相是向外馳求而違性矣則以布施因緣故不無福德而以住相因緣故其所得者無非三界內俗福縱生頂天終是苦因故依如義不説得福德多也若其徹底明了緣生道理觀一切法即空即假即假即空并無福德之念文中明明一反一正相對而説反面既以有實為言正面亦應有無實一義故以無實釋無字然經文究竟只單言無故應補出無念一義無念義更徹底宜於此處説之但為利益衆生修離相之三檀則是福慧雙修悲智具足必得不可思議不可稱量無邊功德所謂無上菩提之果矣依如義説其得福德多矣哉觀此經旨足見因果道理必應徹底明了若但知粗淺因果之説而不徹明其理因小果亦小矣當知佛説之因果絶不可與外道典籍世間俗書中所説因果等視齊觀佛經所説因果道理是徹底圓滿的是極其精微的皆是用即空即假即中三諦之理來説明的或用八不等二諦之理來説明的必須二諦三諦道理明了佛説之因果乃能徹底明了然後始知佛所説的因果道理廣大圓妙世出世法所莫能外然後始知因果可畏少起一念便落因果矣何必待之行事哉然後始知佛法為人人所必需不但學佛者應明了佛理即欲成一人格亦不能不明佛理欲真明了世間法亦不能不先明佛理然後始知離相離念關繫重大決不致漠視決不敢畏難乃能發大心修勝行證妙果也現今有心人多知昌明因果之説搜羅事實印送書籍以期救陷溺之人心挽危險之世運此是最好之事且為極要之事但往往有人不願寓目以為太淺則何不向大乘佛法中求之如二諦三諦等道理皆佛説因果之真詮也乃因果之第一義也明得少分有少分益明得多分有多分益總之佛説之因果能令人成世間善人賢人聖人乃至成菩薩成佛其廣大圓妙為何如哉巳次明報身分二午初明色身非性須菩提於意云何佛可以具足色身見不不也世尊如來不應以色身見何以故如來説具足色身即非具足色身是名具足色身流通本作不應以具足色身見此句中唐人寫經無具足字可省也具足色身及下科具足諸相古人有種種説或合色身諸相渾而言之曰丈六金身則説為應身矣或分指色身為八十種好諸相為三十二相此亦是作應身會者或謂色身是報身諸相是應化身惟清初達天法師則曰色身諸相應約報身説此説最精應從之蓋經中既於色身諸相皆曰具足具足者圓滿之義其指功行圓滿萬德莊嚴之報身言確鑿無疑因丈六金身三十二相等之應化身與功行具足莊嚴具足之義不合也身相分説含有要義蓋色身名為具足者正因其諸相具足耳故色身為所莊嚴諸相為能莊嚴分而説之意在顯其有能有所正是緣生法耳若本具之性惟一空寂既非色相那有能莊嚴所莊嚴之別不也活句謂亦可亦不可也蓋法身報身不一不異若會歸不異之性則可見若執著不一之相則不可見也故接言如來不應以色身見上言不也下言不應正相呼應意顯無所謂可不可但不應耳曰如來曰以皆含精義説一以字執相之意顯然如來者諸法如義乃不異之性色身為不一之相豈應執不一之相見不異之性言下含有若其泯相則可見性矣何以故下明不應之義也如來説者約性而説也約性而説具足色身則色身乃多劫修因所現之果報耳是緣生法也緣生非性即假即空故曰即非具足色身然而既是本性隨緣所現修因剋果之相雖當體是空而即空即假名相儼然故曰是名具足色身下科具足諸相之即非是名亦如此釋之總以明報身是緣生法即假即空即空即假若不明即假即空之義勢必執相而昧性則性相隔別而不一矣何能見性若不明即空即假之義又必執性而廢相性相亦隔別而不一矣則所見者實非無相無不相之全性亦何能謂之見性乎哉故必深解緣生道理體會具足色身等乃是即假即空即空即假而兩邊不著然後性相圓融而不異則見相便見性矣其所見者乃是無相無不相亦即如實空如實不空之全性矣如來之勝報身尚是緣生可知一切法莫非緣生故一切法皆不可執執則必墮一邊矣執者所謂取著也心有所取由其動念故也故欲一無取著惟有離念而已當知佛説諸法緣生之宗旨在令人體會即假即空即空即假道理知一切法本無可執亦不必執以離念耳所以令離念者修離念之因必獲無念之果仍不外乎緣生法也無念者所謂佛智也真如也由此足見世法出世法莫非緣生即莫非因果無智慧者以惡因招惡果以善因招善果以小因招小果以有漏因招有漏果若開佛知見則能以殊勝因招殊勝果何謂殊勝無念是已總之法法皆是緣生故法法皆是即空即假故於世出世法皆應二邊不著而欲不著之徹底惟有離念又復世出世法皆是緣生故世出世間不外因果故離念為因便證無念真如之果也凡以前以後説即非是名處皆是為明此義者皆當以上來所説者通之以前尚未明説諸法緣生之義故不能如此暢發而今則應如是通達之也當知此經體例是從散説到整先演繹而後歸納故以前所説得以後所説者證之其義愈明此所以令菩薩通達謂當以後義通達前義也講説全部經文必須依順淺深次第隨文而説故講前半部時只可含攝後半部之大義斷不能將後説之義在前説中痛説何以故前文有前文命意若只顧説大義而不顧其線索便將經義本來井井有條者説得雜亂無章反令聞者莫名其妙然説至後義時若不將前説者貫串歸納便成散沙不但前説者毫無歸著即後説者亦不見精彩聞者亦復莫名其妙也注家若犯此病則讀之惝恍迷離不得頭緒頭緒未清欲求深解難矣總之此經之難講前後不異而前後所以難講處則又不一前之難講難在要義多在後文講時往往犯手只能帷燈取影不能暢所欲言後之難講難在理深境細言語不易形容且處處應顧到離名絶相一層雖可暢所欲言卻不可説煞一字塞人悟門也會中頗有發大心欲弘揚此經之善知識此理不可不知也午次明相好非性須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足好者相之別名謂隨其形相更細別其相之種種好也故曰隨形好今曰具足諸相便攝有好在若其無好不能稱諸相具足也尋常所説三十二相八十種好是應身相好若報身相好如華嚴經相海品中所説如來頂上有三十二寶莊嚴相眉間眼鼻齒脣頸各有一莊嚴相舌有四相口有五相右肩二相左肩三相胸前一相即吉祥卍字相也胸左右共有十相左右手共十三相陰藏一相兩臀兩䏶兩脛共六相汗毛一相兩足共十三相以上共九十七種妙相名曰大人相欲知其名稱相狀可檢經文然此尚是略説若具足説則有十華藏世界海微塵數大人相蓋報身相好無量無邊也今云具足指此而言華嚴云一一身分衆寶妙相以為莊嚴由此經意可知具足色身之名正因具足諸相而稱者也故前云諸相為能莊嚴色身為所莊嚴餘義同前凡上科所説即非是名等義皆與此通勿庸贅言諸相具足即是具足諸相佛之色身相好所以稱為殊勝第一者即在具足二字故顛倒言之以見意自開經至此舉身相問答共已三次而每次所明之義不同今分三層彙而説之以便通達一層深一層也一初次問可以身相見如來不但言身相二字是一切身相皆説在內不專指佛之身相如來亦通指自性非專指佛第二次問可以三十二相見如來不是專約佛説然是説應身也此次問辭曰具足色身具足諸相是約佛之報身説矣二初次問答正承不應住相之後故但曰身相即非身相而不説是名以顯相皆虛妄故不應住之義第二次問答因正明不壞假名故即非是名並説以顯約性則非約相則是兩邊不住之義此次正明諸法緣生故亦即非是名雙舉以顯緣生之法空有同時之義也三前兩次問辭曰可以身相見如來不可以三十二相見如來不如來者性德之稱見如來猶言見性當知相不應住者為見性也性真實相虛妄逐妄便違真故欲見性者不應住相然初次約身相以明不應住者因身相與性最為密切身相尚是虛妄諸相可知矣身相尚不應住諸相之不應住可知矣然所謂不住者謂應於相上即見其非相便是不住便能見性非謂壞相而後見也身相如此諸相皆然此初次問答所明之義也第二次不壞假名是説在離名字相離言説相之後故約三十二相之名言以明離相之真實義意謂真如之性離念境界不可以名名不可以言言不可以相相故應離名言相以自證然所謂離名言相者謂應知性非名言之所及非謂無名無言無相也但於名言之假相心不取著便是離矣便見性矣如來之應化身不明明有三十二相之名言乎而此相實如來之所顯現故於相不著即見如來知得應化身三十二相之名言應如何離則知一切法相之名言應如何離矣此第二次問答所明之義也此次初問佛可以具足色身見不次問如來可以具足諸相見不或曰佛或曰如來皆具精義且初問只應言佛次問只應言如來不可移易何以故當知佛為果德之稱具足色身則為果報之身故説具足色身應説佛名以顯此身正是證果成佛者報得之身也如來為性德之稱具足諸相為性德圓明顯現之相故説具足諸相應説如來名以顯此相正是證真如性者顯成之相也故前之佛與具足色身同説者所以明因果非虛次之如來與具足諸相同説者所以明性相一如我前屢言羅什大師之譯此經一字不濫下字字皆含精義字字不可忽略觀此數科益足證明然則此身既是佛果之報身為何不應以此身見乎當知佛可以色身見佛性何可以色身見耶見佛當見佛性豈但見佛身而已耶故不曰佛不應以色身見而曰如來不應以色身見者為此佛可以色身見不之問正是探驗見地如何蓋問能知見法身佛乎抑僅知見色身佛乎具足諸相既為性德圓現為何不應以諸相見乎當知性相雖一如然言相則非性所謂圓融中有行布不可儱侗顢頇也故若泯相而觀性則既無相之觀念何嘗不可見性若執相以見性則但有相之觀念性又何可得見故不曰如來不可以具足諸相見而曰如來不應以具足諸相見者為此而如來可以具足諸相見不之問亦是探驗見地如何蓋性相雖不一而實不異雖不異而實不一能於性相深知義趣而大開圓見不執一不執異乎又復此次兩問之辭與前兩次問辭大不同故明義遂大不同蓋前兩次問辭是問可以身相或三十二相見如來不皆是約見者邊説即是約因位説此中兩番問辭是問佛如來可以具足色身諸相見不是約佛如來邊説即是約果位説也故當約果位以明義云何明耶當知佛之證果亦由緣起何況色身如來性光照而常寂那有諸相故皆曰即非也即復當知既因圓而果滿遂有具足色身雖照寂而寂照不無具足諸相故皆曰是名焉即非者顯其是即假之空也是名者顯其是即空之假也豈止二邊不著而且二邊俱融矣此之謂圓中通達無我法之菩薩應如是知也不但此也當知諸相圓滿為性德圓明之顯現豈可執謂離諸相外別有法身乎故曰是名然亦豈可執緣生之諸相便是法身故曰即非然則尚不應執如來現起之諸相以見如來則執一切緣起之法相者其不能見如來也明矣其皆不應執也亦可知矣當知具足色身乃究竟覺果之勝報豈可執謂離色身外別有佛性耶故曰是名然亦豈可執緣起之色身即為佛性故曰即非然則尚不應執莊嚴報身見清淨法身則執緣起之五蘊苦報身者其不能見自性法身也又明矣其更不應執也愈可知矣總之言是名令其不可執異也言即非令其不可執一也不執一異是為圓見見圓則知亦正知正則見亦圓若知一切法莫非緣生則見一切法不一不異矣見其不異而不妨不一故本一如也而緣生諸法見其不一而不礙不異故雖諸法也而皆是一如當如是通達也上言福德凡屬善果無論大小皆福德也此言勝報身乃福德中最大最勝者然無論大小勝劣皆是約果明義約果明義者明其莫非緣生也佛説緣生之要義茲更概括為三種言之層層深進一令知世出世法一切皆空惟因果不空何以故皆緣生法故所以因果可畏所以要修勝因剋勝果剋者剋期取證之意二既一切皆空而因果不空故一切法即空即假以即假故所以因必有果因勝果必勝以即空故所以因果雖勝亦行所無事此之謂深明因果三佛説一切法緣生者意在明其本不生也若二六時中世法亦隨緣做出世法正隨緣起卻一眼覷向一切法本不生處看之亦不自以為能看但於世出世法正隨緣時正如是看正看時正如是隨緣可許他是一個伶俐漢內而三際心歸之不可得外而一切法歸之本不生我法有藏身處麼真乃一了百了天下太平本師教我們這些抄直路的法門我們要一擔擔起力奔前程不見道是日已過命亦隨減如少水魚斯有何樂若仍舊拖泥帶水一步三搖雖日日看經聞法曉得些理路有何益處要防他所知障生比煩惱障更壞也開快步走辰次約法施明體空分三巳初明無法可説次明聞者性空三明無法可得於福德勝報之後接説法施一大科正以顯示一切法皆是緣生也蓋必有布施六度之因緣乃能發生福德勝報之事相故福德勝報是約果説即是約所生之法説此法施一科則是約因説也約因説者欲以顯示緣生無窮因果無盡之義也何以言之當知一言布施便有三方面一布施者二受布施者三所施之物也故此法施一大科即開為三科初明無法可説一科約布施者説也次明聞者性空一科約受布施者説也三明無法可得一科約所施之物説也佛所説法皆是説其所證故無法可得是約所施之法説也而就布施者言云何知行此施又云何能行此施其因緣至不一矣又就受施者言何以成衆生又何以能聞法其因緣亦復甚多再就所施言此物云何生復云何得因緣復有種種約此三方面之因緣已千差萬別説之無盡何況三方面倘不聚會於一時一處仍無此一法施之事發生也云何而得聚會耶又非緣不可矣由此可知一切事莫非因緣所生者不但此也既有此一法施之緣又將發生種種之果果復成因因又成果果因因果自此以往千差萬別永永無盡可見世出世間種種事相所謂諸法者更無他物只是不斷之因果果因於衆生心目間顯現變幻而已衆生不知深觀其趣遂為此相所迷指而名之曰此某法此某法殊不知指之為因卻是前因之果名之曰果實乃後果之因所謂因法果法其本身無一固定者也既不固定便非實在豈止剎那之間皆成陳迹而已然則苦苦分別牢牢執著某法定某法豈非癡乎不但認事相為實有者癡也若認事相為實無亦何嘗非癡何以故一切法不過因因果果次第演變眩人心目初不能剎那停住也乃執為有實自生纏縛不得自在其為癡絶固不待言然而法雖非實卻是自無始來遇緣即起因果果因剎那相續曾不斷絶乃一味執空不知隨順緣生之理托殊勝因緣獲殊勝果證遂致既不能證本非緣生之性超然於一切緣生法之外以自解纏縛之苦得自在之樂更不能利用緣生事理隨機感緣示種種法以拔衆生之苦豫衆生以樂其不能超出者勢必墮落何以故惡取空故因不執實有并因果亦不相信者謂之惡取空明其勢必造惡也縱不惡取空但偏於空者雖能超出緣生而不能利用緣生則沈空滯寂成自了漢此類但修小因證小果不知托殊勝因緣獲殊勝果證故雖能超出自證本具之性而不能利用隨緣以度衆生如二乘是也故世尊呵之曰焦芽敗種墮無為坑此兩種執空之病雖苦樂不同升沈迥別然無智慧則一佛説此科意在使人洞知緣生事理以免執有執空之病而令發菩提心修菩薩行者當通達即空即假即假即空之緣生法而廣為布施俾自他隨順此理空有不執既超以象外復得其環中便成悲智具足之菩薩矣何以故不執有則人我空不執空則法我空我法雙空便是洞徹三空之般若正智便證空有同時之般若理體成佛且不難豈第成菩薩而已乎故曰若菩薩通達無我法者如來説名真是菩薩如上所説可知布施者受施者布施物之三方面既皆因緣生法則皆當體是空故名為三輪體空喻三方面為輪者因輪之為物回轉不停又他物為輪所輾便破壞無存以喻因果果因更迭演變曾無休息且以喻財施破慳貪無畏施破苦惱法施則能開正智破三障也上來所説皆本科要旨先為説明入文較易領會巳初明無法可説分二午初對機則説次本無可説午初又二未初示説法無念須菩提汝勿謂如來作是念我當有所説法莫作是念此下數科理趣幽深言其深而且隱不易見得且正面是明如來説法之義而骨裏卻是教菩薩應如何離念所謂言在此而意在彼也茲先將正面之義分層説明再説其言中之旨上一念字約如來邊説觀文可知莫作是念之念則是約長老邊説謂汝不應作是念也此念字躡上文謂字來謂者言説也作是言由於作是念故以莫作是念誡之作是言念其過何在在作念我當四字也而作是言念便是謗佛故誡以莫作如是言念此何理耶下文何以故下正明其故當於下文詳之未次釋有念即執何以故若人言如來有所説法即為謗佛不能解我所説故何以故者問何故不應作是言念有所説法者謂心中存有所説之法即作念我當之意一説此言其罪甚大必墮無間何以故即為謗佛故此所以不應作是念作是言也何以即為謗佛耶經文似未明言其實已暗示在如來二字之中矣圓證本性方稱如來空寂性中那得有念那復有我凡作念我當如何如何惟妄想未寂我執未空之凡夫則然乃謂如來如是是視如來同凡夫矣非謗而何當知説法是報化佛并非法身如來然必證得法身方成報化身故報化身與法身雖不一而不異故法身無念無説報化身雖有説而實無念經文特舉如來為言者意在顯此以示切不可疑佛有説法之念一有此疑無異疑佛性不空寂未證法身矣亦即無異謂并未成佛矣故曰即為謗佛也又復佛之説法無非對機機者機緣對機之言正明説法亦是緣生緣生體空故法本無法如來已證體空故説即無説豈得謂有所説法耶佛何以能不起念隨緣説法前所謂修因時悲願熏習之力是也此理十卷金光明經説之最為詳明不可不知茲引而説之經曰佛無是念我今演説十二分教利益有情十二分教謂三藏詳開三藏為十二部分也此言佛説經律論三藏利益衆生初不作念我當如是也經又曰然由往昔慈善根力於彼有情隨其根性意樂勝解不起分別任運濟度示教利喜盡未來際無有窮盡此言雖不起念我當説法度衆然能隨彼衆生根性意之所樂所解者而説之且雖如是善應機緣盡未來際開示教化利益一切皆令歡喜説法無盡然亦并無分別機緣之念乃是不起分別而自然合度所謂任運是也何故能如此耶由於往昔在因地時悲願具足深觀緣生熏習成種善根也之力使然耳然修因時一面觀緣生之假有一面復應觀本具之真空本經開正知中先説心行叵得即是令觀真空次説諸法緣生乃是令觀假有若不證得真空之性雖悲願具足深觀緣生亦不能隨緣現起也故經又曰依法如如依如如智能於自他利益之事而得自在成就依法如如依如如智而説種種佛法乃至聲聞法此言證性而後二智成就依此二智一切自他兩利之事皆得自在成就不但能自在説種種法而已不必起念分別自然而成是為自在法如如者法謂法性如謂真如次如字謂一如也蓋言與法性真如而一如此根本智之異名也如如智者初如字一如也次如字謂真如智謂根本智蓋言與真如根本智一如即後得智之異名也根本智即是性體後得智乃為性用得體而後起用故他經譯為後得智對後得而明根本故亦名之曰智其實只是性體故本經譯為法如如而不曰智各有取義皆無不可蓋根本智言其照真後得智言其照俗照真則惟一空寂之性光不謂之智可也然既性光朗照謂之曰智亦何不可照俗則鑒別千差萬別之事相稱之曰智固宜然雖曰鑒別并非起念分別也故曰如如智耳經又以喻顯其理曰譬如無量無邊水鏡依於光故空影得現種種異相空者即是無相水鏡皆喻性水喻清淨鏡喻圓滿無量無邊喻性之遍虛空周法界也光喻二智智乃光明義故空喻性體空寂影喻妄念異相喻差別事相無相喻無念空者即是無相句正明空影之義且明雖現種種相其中仍然無相故謂之空總謂水鏡無塵而發光依於此光故能於空無塵中現種種相佛性亦然無念空寂則智光圓遍依此智光故空寂無念中而得種種之事自在成就可見自在成就正由無念空寂而現智光今謂如來作念我當説法便同凡夫豈是如來既不空寂又豈能説法自在正所謂以輪回見測圓覺海無有是處當知説法如谷響謂如空谷傳聲有感斯應初無容心也又如桴鼓之相應大扣大鳴小扣小鳴適如其分自然而然者也佛之説法如是如是此所以不應作此言念也然則何故作此言念乎世尊推原其故曰無他不能解我所説故耳或曰前來世尊曾以如來有所説法不為問長老明明答曰如來無所説矣何以此中規誡長老不應作如來有所説法之言念且曰不解所説不知所不解者果何説耶當知長老是當機對長老言意在規誡大衆耳觀初曰汝勿謂繼曰若人言何嘗剋指長老乎所謂不解者若約本經言蓋防聞前來無有定法如來可説及菩薩為利益一切衆生應如是布施諸説未能圓解則於如來無所説之言勢必錯會其他諸説亦必不能貫通矣將謂菩薩尚應利衆行施何況乎佛佛之出世原為説法利生者也且今正熾然説此金剛般若則如來無所説之言蓋謂説了便休不留一絲痕迹之意前不云乎無有定法如來可説可知但無定法可説耳豈一無所説説了無所説耳正説時豈能無所説有所説法雖非無念然他念皆可離説法之念若離何以度衆生耶不度衆生又何以稱佛耶此其所以公然言曰如來作是念我當有所説法而不知其為謗佛也凡夫見解往往如此殊不知正與佛法相反由此可見解之關繫大矣哉因不解故邪知邪見既懷疑念而自誤矣又作此言以破壞他人信心誤法誤人所以謗佛罪至墮無間也何以知其不解者在此觀下文所説正是對其不解處痛下針砭令其開解者故知之也午次本無可説須菩提説法者無法可説是名説法無法可説意顯本無可説也何以本無可説以本來無法故既本無法那有可説故曰無法可説也何以故一切法莫非緣生故前云無有定法如來可説正明其本來無法但由緣會假現幻相故無有定乃不知向緣生上徹底了解生出種種誤會謬矣法是緣生説亦緣生説法者亦是緣生既曰緣生非無法也非無説也非無説法者也然而緣生無性當體是空故雖儼然有説法者正當熾然而説顯然有法之時即復了不可得此之謂無所説言其説即無説也若以為有所説是不知其為緣生而執以為實矣解得緣生之義便知法本無法故説即無説即説法者亦是即空即假即假即空決不致妄作言念罪同謗佛凡夫所以妄作言念者其根本錯誤無非以為既有説法者必有所説法若無所説法便無説法者如來應世原為説法度衆非明明有説法者乎故妄曰如來有所説法是全不解三身之義誤認法身説法矣法身無説報化身方有説即復以為既然説法必有説法念若無説法念何以説法故妄言曰如來作念我當有所説法是又全不解因無念空寂方能説法之義也故文中不但曰無法可説而曰説法者無法可説兩句合言之正所以破其凡情何以故既是説法者無法可説其不能執為説法者明矣尚且無法可説那有説法之念乎然而明明有説法者明明有法可説何耶殊不知是名説法耳名者假名也當知因是假名説法所以雖名説法者無妨無法可説雖無法可説無妨名為説法者又復當知假名説法者所以無法可説正因無法可説乃有説法及説法者之假名因空無念乃成二智能説種種佛法如前所引金光明經若解得此義疑念妄言可不作矣謗佛之罪亦可免矣前云本經是名句皆當作假名會不可坐實觀上來是名為心句當可洞然而此處是名説法句更足證明蓋若坐實説之曰此之謂説法則是有所説法矣一句如是句句皆然斷不能坐實説煞也以上正面之義已竟當知此開佛知見一大科皆是説以令發覺者通達其理而除我見者故此中莫作是念之言是規誡菩薩不應起念勿謂如來作念我當云云是明説法尚不應有念何況其他且令觀照真如之性本無有念即復觀照諸法如義空有圓融也曰即為謗佛不解所説者是明苟或起念便違佛旨苟謂佛有所説之法豈非法性未淨總之不一不異之義未明雖聞佛法必難領解勢必執有疑空執空疑有誤法誤人造罪不知故學佛第一要事在於見圓知正所謂開解是也故復開示説法者無法可説是名説法之義令其領會通達若知得佛所説法法本無法則知一切法莫不如是知得法與言説及説法者皆是緣生即空即假即假即空有名無實則知一切世出世法一切言説一切學法者莫不如是既説法者無法可説則學法者當然無法可執既説法無念則學法者便當觀照諸法緣生體空會歸一如觀力漸漸深分別執著便漸漸薄我見便漸漸除念亦漸漸離矣所謂通達無我法者如是如是菩薩應如是知也此初明無法可説之旨趣也此下説明巳次明聞者性空一科加入之意此科經文本為羅什大師譯本所無乃後人據魏譯加入者最初加入為唐時窺基師然衆未景從也其一唱衆和遂成定本則自南唐道顒師石刻始或曰唐穆宗長慶二年奉敕所加者非也柳公權書寫此經在長慶四年柳為朝臣既先兩年敕加何柳書中無之宋長水刊定記云今見近本有此一段此語足為南唐始加之證宋初距南唐時近故曰近本也加入何意以無著論彌勒頌皆有此義故然謂秦譯漏脫三輪體空之義似未盡然蓋前文已有菩薩為利益一切衆生應如是布施如來説一切諸相即是非相又説一切衆生則非衆生一段秦譯或以諸相非相中攝有能施所施之相合之衆生非衆生足顯三輪體空矣故此處略去衆生一段別顯能所雙亡之義耳蓋上言説法者無法可説是明能説者空下言無法可得是明所説者空修功至極處必應能所皆空方能性光獨耀迥脫根塵此義即心經所説無智亦無得也秦譯蓋有意略去以顯進修之極功決非脫漏秦譯字字不苟何獨於此義漏之雖然有此一科義更圓滿秦譯略去不免千密一疏故此番校本一切皆依唐人寫經獨於此科依道顒石刻者意在於此茲當詳説其應加之故清初達天師作新眼疏分經文為信解行證四大科者以經文明明具有此義故也如生信科中長老鄭重請問頗有衆生生實信不佛亦鄭重答曰有持戒修福者能生信心而科尾復結之曰佛及無上菩提法皆從此經出言從此經出者指示學人當從此經入也信為入道之門故於本科之末結顯此意開解一科廣談果行以明因心長老自陳深解義趣正示人當如是深解也佛復詳為印闡而結之曰當知經義果報皆不可思議當知者當解也所以結深解之義也此進修一科先明發心無法繼令開佛知見而佛見則是不執一異佛知則是三際心不可得一切法本無生而歸結處復明言曰以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提且曰善法即非善法其指示學人應通達內心外境即有即空不執一異無我無法以為唯一之修功意更顯明蓋必修無我無法之因方證平等法界之果也故第四大科中明言於一切法無我得成於忍成忍者所謂證也其餘所説皆是平等法界諸法空相之義則皆成證之義也信解行證經文經義明明白白現現成成新眼疏獨見及此為從來注家所未有其疏名曰新眼誠不誣也故此次科判依之但加標約心明無住約境明無住兩總目提挈綱領俾前後兩半部明義不同之處一目了然當知華嚴經是以信解行證顯示圓融無礙之入道次第彼經為佛初成道時加被諸大菩薩共説如來自證境界其境界正是諸法一如一切皆是不自説者顯示法身無説也此金剛般若是為不斷佛種而説故一依華嚴信解行證入道次第説之俾聞者亦依此圓融次第而入道以示衣鉢相傳燈燈無盡之意新眼疏將此眼目標出此其所以妙也夫信解行證為入道之階固已然信字尤要成始成終唯一信心而已豈止信為入道之門已哉華嚴經曰信為道源功德母長養一切諸善根一切善根賴其長養故事事法法不能離卻信字即如本經明明曰信心清淨則生實相足見一個信字貫徹到底是故佛既開示如何而信如何而解如何而修如何而證聞者便當一一生信仰心亦如是信亦如是解亦如是修亦如是證不然便如數他家寶自無半錢分也試觀生信科中既説持戒修福能生信心以此為實以答長老之問矣復曰一念生淨信者得無量福德此正鼓舞聞能生信心之説者便當起信以持戒修福庶幾能生實信淨信耳開解文中於深解義趣後説信尤多如曰信心清淨則生實相信解受持第一希有信心不逆其福勝彼心則狂亂狐疑不信如是反覆言之者皆以顯示深解之要也亦即所以點醒學人當於開解科中所明之義生起信心亦求開如是之深解也開解即是明理理明而後信真修實乃有證入之可期否則盲信盲修枉用功夫矣所以此科説信最多第四成證文中亦有應如是知如是見如是信解之言以示如來平等法界本非凡夫意想所及斷不能用凡情測度惟當篤信方能隨順得入耳由是觀之信解證三大科中既皆特特標顯信字以為眼目進修一科不應獨缺乃秦譯獨於此科無一信字故應引魏譯此科之言信者魏譯除此科外亦別無信字補入秦譯以作點醒學人之眼目使知凡此科開示之進修法門皆當深信依之而行不但此也前文諸相非相衆生非衆生雖足顯三輪體空然此中兼言是名既顯即空復顯即假義更完備故雖有前文亦不嫌復蓋前文但言即非者所以明布施應不住相此文兼言是名者所以明法施與衆生皆緣生法即空即假應不住相而施即假即空應施而不住相故不復也又復諸法緣生之義如但有福德勝報兩科而不約布施明義是只有約果之説而無約因之説義亦少有未足且約三輪體空明義便攝有能所雙亡義在蓋能施人與所施法固為能所對待而法施之人與聞法之衆生亦為能所對待故説三輪體空與能所雙亡之義初不相妨若但明能所雙亡卻不攝三輪體空也故於此科獨不依原本而加入之者意在於此巳次明聞者性空分三午初請問爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不爾時謂説前科甫竟之時慧命即長老之異譯唐時則譯作具壽名不同而義同也皆年高德劭之稱秦譯喜用舊有名詞故譯為長老唐譯喜新造稱為具壽以表生命慧命兩皆具足之意魏譯則作慧命此名似但説一邊然謂慧指法身命兼生命説亦無不可頗有者意中恐難多有也長老意謂現在許有未來衆生去佛愈遠業深障重未必多有故曰於未來世是法渾括上説無法發心乃至無法可説言意謂發心修行必須依法今云無法且云説法者無法可説然如是種種之説莫非法也末世衆生聞之深恐狐疑故問曰聞説是法生信心不當知如上所説皆是於法不執精修無我之妙法長老問意正是指示學人應信此妙法修無我行耳午次遣執佛言須菩提彼非衆生非不衆生彼字即指聞法之衆生非衆生約性言非不衆生約相言意謂言其非衆生耶然而非不衆生也言其非不衆生耶然而非衆生也正顯即空即假即假即空一切衆生皆是緣生之義午三釋成何以故須菩提衆生衆生者如來説非衆生是名衆生此科釋明上言彼非衆生非不衆生之故也衆生衆生重言之者承上非衆生非不衆生説也如來説謂約性説名謂名相意謂頃言非衆生非不衆生者蓋約性而説本具佛性非衆生也故曰彼非衆生但約名相則是衆生耳故曰彼非不衆生此科合之上科語極圓妙義極深至茲分三重説之一長老是問衆生聞如是法能否生信而答語專就衆生説於生信一層不置一辭豈不所答非所問乎其實不然問意已圓滿答覆矣蓋不答之答也何以言之長老慮衆生於是深法未能生信者由於認衆生為衆生故不免為之耽心然而誤矣是執相而昧性矣當知就相而觀雖非不是衆生然不過緣生之假名耳緣生非性其性則上等諸佛本非衆生也然則既具佛性豈不能開佛正知則聞是法者豈無能信者耶故非衆生非不衆生一語便含有莫作是説之意在二佛説此科無異教衆生以聞法生信之方便也方便云何先觀自身是已一切衆生應觀此五蘊衆法但由因緣聚會非生幻生本來無生若知此義則於上説諸法緣生即空即假即假即空發心修行無法可執之義自能生信矣當知説法者尚無法可説則依法發心修行者那得有法可執乎三開示利益衆生行布施六度者應即相離相也蓋非不衆生者是令體會衆生緣生即假不無是名應無所住而行布施此前所以言所有一切衆生之類皆應滅度令入無餘涅槃菩薩應發此大悲也非衆生者是令體會衆生緣生即空原非衆生應布施而不住於相此前所以言滅度一切衆生已而無一衆生實滅度者菩薩應具此大智也總之緣生之義貫通一切此義信得及其他諸義便皆徹了而深信無疑矣巳三明無法可得分二午初陳悟須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶上來初約福德言其無實無實者所以明緣生性空也福德之大者莫過莊嚴報身故次約具足身相以明性空現此身相原為説法故三約説法者無法可説以明性空説法原為度生故四約衆生以明性空一層追進一層追至此科則一空到底如桶底脫何以言之佛現具足身相既原為説法度生而佛之所説原説其所得所謂如語今知莫非緣生緣生之法當體是空故具足身相有名非實説法亦有名非實衆生亦有名非實然則豈非得即非得佛即非佛一往皆有名非實也耶則一絲不挂空寂之性竟體呈露矣此本科之要旨也長老前云佛於然燈佛所無有法得阿耨多羅三藐三菩提然尚以為在八地時因其不存有菩提之法故今成佛得菩提耳今乃知所謂佛得菩提者亦復得而無所得也意深於前故自陳初悟説一耶字正顯一空徹底如夢初覺景象此約事言也若約理言長老早與如來心心相印今陳初悟者正指示學人應如是窮究到底不令有一絲法執存在然後我空性顯始覺合於本覺而成大覺耳其故作疑問之辭者又以指示學人雖如是悟當請明眼人為之證明也上句先言佛得阿耨多羅三藐三菩提是明約修因證果説非畢竟無得下句始言無所得是明若約法説非畢竟有得總明無得之得得而無得之意句中有眼不可儱侗午次印釋如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提兩言如是者印可上言非畢竟無得非畢竟有得所悟不謬也佛説之義更深乃將長老説者更推其原猶言何以無所得乎因其本無少法可得故也此意正承我字來我無少法可得正明我空也因其我空尚不見有少法那有少法可得既無少法可得又那有得法之佛言乃至者正明其空之又空一齊掃盡正當爾時一念不生湛湛寂寂性德圓明矣總之性空寂中本無少法使其見有少法正是我見尚何所得惟其不見有少法可得乃真得耳句言我於無上菩提無少法可得妙我不見有少法可得耳言下含有非竟無法故接言是名阿耨多羅三藐三菩提意顯非無無上菩提之名言也又以顯無上菩提但名言耳豈可著乎故無有少法可得也又以顯所謂法所謂得皆因緣所生緣生體空正當有如是名言之時卻本來無有少法可得也眼光四射八面玲瓏前來無法得菩提之義至此暢發無遺則無法發菩提之義更因而徹底洞了正所以開菩薩之正知俾得通達無我法耳上來心行叵得一科遣能執也諸法緣生一科遣所執也然而能所對待牽引愈多故所執之諸法中復有能所如福德勝報所生也布施六度能生也而就布施之法言法所施之物也説者能施之人也就布施之事言説法者能布施也聞法之衆生所布施也更細別之我能證者也法所證者也總之一切事莫非對待有對待便有能所有能所便有分別有分別便有執著然而少有分別便是第六識所謂我相是也少有執著便是第七識所謂我見是也故一一明其皆是緣生使知緣生體空有名非實必應步步觀空層層遣除其所以痛遣所邊之法者正所以痛遣能邊之我蓋二者本是對待相形而成彼銷此亦銷矣而先説心行叵得是直向能邊遣除然我相我見之不易遣多為外境所移故於諸法更説得詳細也由是可知用功之法矣蓋遣能當遣所遣所即遣能遣能所即是遣分別遣分別即是遣執著也分別遣盡則六識轉執著遣盡則七識轉二識既轉則我法雙空皆是一如矣皆是一如所謂平等也故下接言是法平等直顯性體焉壬次結示分三癸初直顯性體復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提此結示一科乃上説諸義之總匯上來所説若理若事若性若修千頭萬緒盡歸結在此數行中諸義若網此數行文則網之總綱也綱舉而後目張故此數行之義能洞徹於胸中則諸義皆得以貫通皆知所運用矣若或不然雖聞得多義終覺零零碎碎猶散沙也道理若未能得要修功又豈能扼要然則此科之關繫大矣其應悉心領會不待言矣復次者別舉一義以明前義也下所云云皆是説明菩提無少法之所以然者故以復次二字標示之是法平等無有高下兩句正顯無上菩提然而是法二字切不可坐實在菩提上不但是名二字不應坐實已也何以故經旨正為執著菩提者遣其執實況此處正明菩提無少法之所以然豈可將是法二字坐實在無上菩提上講若坐實講之豈非菩提有法乎雖新眼疏亦不免此病也惟肇公智者兩注最佳注云人無貴賤法無好醜蕩然平等菩提義也蓋謂凡好醜貴賤不平不等之觀念蕩然一空則平且等矣即此便是菩提之義也此説既顯明其正是菩提而又未曾説煞極為盡理妙契經旨由是可知是法者謂任是何法也猶言一切法耳無有高下正顯其平等當知一切法有高有下者由於衆生分別執著之妄見見其如此耳其實一切法性平等平等那有高下既無高下又那有無上菩提法故曰是名阿耨多羅三藐三菩提蓋無以名之假立此名耳所以菩提無有少法可得也若無上菩提有少法者既曰無上便高下之相儼然豈平等性乎佛之成佛正因其證平等法性耳故曰如來者諸法如義故見一切法皆是佛法故如來所得阿耨多羅三藐三菩提於是中無實無虛何以故諸法一如者是法平等故一切法皆是佛法者無有高下故法性既平等一如有何可得故曰無實正當無有少法可得時平等一如之法性圓滿顯現故曰無虛也當知無有高下則絶諸對待無對待則成絶對故假名曰無上無高下則平等故假名曰正等何以無高無下如是平等乎由其不同凡夫不覺橫起分別執著之故然亦并無能覺所覺之分也故假名曰正覺由是可知正因其不分別法不執著法且無法之見存乃名無上正等覺耳其無有少法也明矣法性本來如是佛惟顯此本來之性焉耳其無有少得也明矣故曰我於阿耨多羅三藐三菩提乃至無有少法可得也前半部令於一切法無住遣其分別之我執者無非為顯平等之性後半部令於菩提法亦應無住遣其俱生之我執者亦無非為顯平等之性逮説明諸法如義後復以不可得義空其能執之心且以緣生義空其所執之法能所皆空則平等性體遂顯故標科曰直顯性體可見所謂無上菩提法者非他諸法一如之平等性是若少有菩提法影子豈能見性何以故性體空寂所以平等少有分別執著便有所立尚何空寂之有少有所立便見高下尚何平等之有菩薩應通達此理盡遣分別執著而無我也所謂一切法性本無高下者眼前事物莫不如是奈衆生不知觀照何譬有一事一物於此或見之以為可喜或見之以為可厭而其事其物初非因人而異足見一切法性本無高下矣蓋喜厭之異異於其人與事物無關也所以多愁者無往非愁雖遇不必愁之境而彼仍愁鎖雙眉尋樂者無時不樂雖有無可樂之事而彼亦強開笑口環境同而人之所感萬有不同者由於所見之不同也又如以水言之人見之為水耳魚龍則見為窟宅修羅則見為刀杖餓鬼則見為膿血經言此由業力所致當知業力何以成此差別正由當初分別執著之我見各各不同遂致造業不同耳若二乘慧眼見其本空并水無之菩薩法眼不但見其本空亦見水之種種差別事相如是種種所見不同而水初無如是高下之分也佛眼則見一如一如者水性本空故隨緣而現清濁等相則雖現清濁諸相依然水性本空一切法莫不如是是之謂是法平等無有高下當知所謂平等者非將高者削之使下下者增之使高也此正分別執著之妄見更令不平矣更令不等矣愈求平等愈覺紛亂矣佛言平等是令去其分別去其執著任他高高下下而平等自若蓋其心既平其心既等則事相上雖有高下亦自高高下下各循其分不相擾亂則一切平等矣此平等之正義也故慕平等之風者當自平其心始等其心始癸次的示修功以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提上科既以是法平等無有高下直顯性體而此之性體人人本具個個不無但為妄想即是分別執著不能證得此引法華成句佛為一大事因緣出現於世者正為此一大事因緣也佛説此經亦為此一大事因緣也從開經來千言萬語橫説豎説層層披剝層層洗刷就為的是洗乾淨一個本來面目出來令大衆體認體認清楚方知非照上來所説諸義剋實真修不能證得也蓋性體雖是本具卻被分別執著穢污而非本來面目矣非將高下之心不平等之見去淨豈見本來然經上所言是書本上的非自己的夫欲舉步不能不開眼而開眼正為舉步若不舉步開眼何為故既説是法平等無有高下八個字直將性體顯示出來俾大衆開眼認明即復將修此證此之功夫的的指出令大衆舉步方能達到目的也欲全修之在性必全性以起修所以此經層層推闡必令深解義趣説至上科更為直顯性體俾衆體認者誠恐未能深解誤以生滅心為本修因耳所以古德修行必須先悟本性者為此古人證道比今人多者其最要原因實在於此依上説道理故此科所説修功皆是一一針對是法平等無有高下下手的衆生何故於一切法見有高下乎無他分別執著故耳分別即是人我對待之相執著便是我見所以見有高下而不平等所以便與性體相違所以此經啓口便令發廣大心降伏我人等相以者用也用無我無人無衆生無壽者猶言用無分別執著之心也善法即上來所言布施舉一布施即攝六度六度即攝萬行故曰一切善法言以無我修一切善法者是明任是何法平等平等須以此平等心觀一切法隨應而修不可存高下心也合此兩句即是開經時所説於法應無所住行於布施之意應無所住者應用無分別執著之心也住即是著有所執著便有分別一有分別所以執著二事相應俱起不相離也行於布施正所謂修一切善法以無我句空也不著有也修慧也修一切善句有也不著空也修福也如是二輪並運亦即二邊不著則宛合中道平等平等便與阿耨多羅三藐三菩提之平等性相應故曰則得則得者言其定得也得者證也若分析言之以無分別執著心修一切善法則合於諸法如義成法身之因也福慧雙嚴成報身之因也圓修一切得方便智成應化身之因也既是稱性圓修故能性德圓明三身顯現而成無上正等覺故曰則得也總明全性起修全修在性之義耳以無我等修一切善法之義即攝前説不應取法不應取非法以及應無所住而生其心應生無所住心諸句之義即非是名皆所以闡發此義者也則得無上菩提亦即前説之信心清淨則生實相之義不但此也最初所説發離相心即是降伏一科令發廣大願者即是令以無我無人無衆生無壽者修一切善法也重讀上句其次復説不住於相即是正住一科令行廣大行者亦即是令以無我無人無衆生無壽者修一切善法也重讀下句全部經文實以最初兩科為主要以後所説皆是就此主要或疏釋其理體或顯明其修宗或剖晰其隱微或發揚其歸趣者也大抵前半部是先令於境緣上一切法不住如請示名持以前所説是也其後則令於起心動念時一切法不住已越説越緊矣後半部開章便令起心動念時并無上菩提法亦復不住向後所説皆專對此點遣除逮説三際心不可得使知能執者乃不可得之妄念非真心也更説諸法緣生使知一切法莫非即假即空當其萬象森羅即復了不可得并佛之果報身乃至證得之菩提法一切皆是幻有一切了不可得昔禪宗二祖請初祖示安心法初祖曰將心來與汝安二祖惶然良久曰覓心了不可得初祖曰吾與汝安心竟何謂安心已竟耶誠以衆生常住真心久被了不可得者擾昏了不知全由自己分別執著以致攀緣不休遂成昏擾擾相所謂將心取自心非幻成幻法是也若知昏擾擾相本來了不可得絶對不取則當下清涼矣故曰吾與汝安心竟也此亦如是覓菩提少法不得則法法頭頭皆是菩提何必他覓故即以是法平等無有高下兩語直顯菩提焉此平等菩提何以能顯耶從上來所説能所雙空來也能所何以雙空耶從開經時所説發廣大願行廣大行來也發廣大願則不取法發度無度相之願故是不取法行廣大行則不取非法以取法取非法皆著我人衆壽故法與非法既皆不取則我人衆壽四者皆無四者皆無則法與非法了不可得矣亦即分別執著之三際心了不可得矣亦即能修所修乃至能證所證了不可得矣如是種種了不可得則常住真心所謂是法平等無有高下者便了了而得前所謂信心清淨則生實相是也此之謂以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提總之此三句經文乃開經來所説諸句歸結之義俾得握此綱要以通達從上諸説者并非於從上諸説之外別發一義也應如是融會而觀照之且由上所説觀之可見此經開口便是説事修以後種種理性皆是就事修上説的不離事修而談理性乃説法之要訣何以故即有明空便是二邊不著故此即有明空四字括盡般若理趣諸君緊記依此而行自合中道矣此處所説以無我修一切善法亦具此義蓋謂當於修一切善法時而無我也若不修一切善法而曰無我險極何以故非惡取空即偏空故當如是知癸三結無能所須菩提所言善法者如來説非善法是名善法無上菩提不可執實一切善法又何可執實若執實者與執實無上菩提何異故更須遣之一切善法莫非緣生假有即有即空故依如義説一切善法當下即非但有假名耳何可執實乎故曰如來説非善法是名善法上云以無我修一切善法是約能修邊遣此云非善名善是約所修邊遣若有所修之法即有能修之念矣有所有能宛然對待之相便是分別執著有微細之分別在則我相仍在有微細之執著在則我見仍在故當遣之罄盡當知以無我等修一切善法則得無上菩提者因其是用無分別執著之心去修所以便得菩提蓋用此平等心修則法即無法修亦不存有能修所修矣無修而修乃能無得而得也故此科所言乃是起修時同時之事即是修一切善法時便觀照非善名善使其心中見有善法則正是我見何云以無我等修一切善法耶換言之此科正釋明上文無我無人無衆生無壽者之所以然者非謂修一切善法後重又遣之也斷斷不可與上科看成兩橛當如是知觀上來所説可知此結示一科不但為本科舉果明因之結示乃為開經以來諸義之結示換言之即是開經以來所説諸義無非令以無我修一切善法以證平等之性至此乃為點明耳此經最初發大願行大行兩科是開章明義以後約略計之結示已有多次第一次即是不應取法不應取非法兩句第二次為應如是生清淨心一段第三次為應離一切相發菩提心一大段第四次為諸法如義無實無虛一切皆是等一大段今乃第五次矣而前後五次自有其淺深次第第一次兩句是結度生不住相布施不住相之義不住相者不應取法也布施度生者不應取非法也第二次是結示廣行六度應無所住者為令空有不著俾如實空如實不空之自性清淨心現前耳第三次之結示是明離相方是發菩提心不但二邊不著并不著亦不應著故曰應生無住心有住則非等第四次之結示是約果位以示證得清淨心者之境界是一法不住的法法皆如的是無我的使知上説諸義無非為令一塵不立將微細之分別執著遣除淨盡乃能證佛所證耳此第五次之結示乃是明白開示一切法性本來平等無有高下故一一法皆不可分別執著菩提法如是一切善法亦如是但用無分別執著之心修無有高下平等平等之一切善法便契法性便見寂照同時之本來面目矣前後五次淺深次第既絲毫之不紊復點滴以歸源細密之至圓融之至辛三顯勝結勸分二壬初引喻顯須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施一大千內有十萬萬須彌山王聚集七寶其多等此如是指十萬萬言也持如許之七寶用作布施其施可謂勝矣福德之大亦可知矣此科是引喻以顯下文受持廣説此經之福德更大也壬次正結勸若人以此般若波羅蜜經乃至四句偈等受持為他人説於前福德百分不及一百千萬億分乃至算數譬喻所不能及流通本作受持讀誦原本無讀誦字蓋攝在受持內矣於前福德於者比較之意也前指上文以等於十萬萬須彌山王之七寶布施者蓋謂如前布施者之福德可謂大矣然而以其福德之百分千分萬分億分乃至算數不能算之分譬喻不能譬之分皆不能及持説此經者福德之一分也經雖是文字名言然由文字起觀照便由觀照而相似而分證而究竟成無上菩提豈一切有相福德所能比乎前半部收結時明言不具説故後半部較量顯勝今始一見然較顯之命意亦復與前大異其趣須知此科説在直顯性體之後顯性體即是顯法身前曾以須彌山王喻報身今卻以七寶聚如十萬萬須彌山王者用作布施而其福德遠不及持説此經意顯持經説經能令自他同證法身視彼報身如同身外之財何足校哉當知佛現報身等原為利益衆生令他受用正如以財布施令他受用也故以此為喻以顯證法身者并報身之相亦不住也
