body:
  text: 震旦清信士勝觀江妙煦遺著庚次究極無住以成證分二辛初明平等法界顯成法無我次明諸法空相結成法不生此第四大科合全經言之故為第四科但約後半部言則是第二科皆説如來境界故曰究極謂窮究無住至此而極所謂證者證此也此第四究極一科又開為二初明平等法界者所以顯一切法性本無有我也即以結成前科菩薩通達無我法之義次明諸法空相則歸結到不生不滅上開經以來所以令離相離念以除我執者無非為遣分別執著分別執著所謂生滅心也遣生滅心者為證不生不滅之性體也是為一部甚深般若之總結穴故正宗分齊此而止即昭明之第三十一分其三十二分則屬流通分矣辛初又三壬初約度生明無聖凡次約性相明非一異三約不受福德結無我此三科皆緊躡是法平等義來意在教聞法者當於法法頭頭上薦取平等之理則可於法法頭頭上得見自性初科明無聖無凡者正顯無有高下也一真法界平等平等豈有聖凡之別此義就度生上説明最便故約度生以明之耳壬初又二癸初明度無度念次明本無聖凡癸初又二子初標示須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念此科大旨與前無法可説一科相同其不同者不過前就所説之法言今就所度之生言耳然説法原為度生度生便須説法故大旨同也前於無法可説中所引十卷金光明經諸義説明佛不作念之理由者皆通於此總之佛不起心動念而能隨機應緣以度衆生者不外二理一因夙昔大悲大願熏習成種之力故能有感斯應二因具二智成三身如大圓鏡光明遍照故能所應不謬具此兩種理由所以不同凡夫凡有所作必須作念莫作是念是普誡一切人非專對當時會衆言也蓋作是念則以凡情測聖境豈但謗佛自己仍迷在妄想窠中永無成聖之望矣故切誡之總之莫作是念之言非僅令不可以輪回見測圓覺海實令學佛人必當斷妄念耳開經即令菩薩降伏此念故曰實無衆生得滅度者後半部亦開口便説無有一衆生實滅度者今復就佛之度生言之俾一切菩薩奉為準繩也上文雖曾兩説衆生非衆生然是單約衆生説今則約聖凡并説以明平等法界義不同前也或曰法華云我始坐道場觀樹亦經行於三七日中思惟如是事我所得智慧微妙最第一衆生諸根鈍著樂癡所盲如斯之等類云何而可度由是觀之明明有聖有凡何云無聖無凡且佛於度生及所説法皆曾詳細思惟而後説之思惟即是念何此經云無念耶當知有聖凡者約相説也無聖凡者約性説也所以此經説即非又説是名也至於思惟之義當分兩層説明其理以免懷疑一凡佛所説有隨宜説者此名權説亦名不了義有究竟説者此名實説亦名了義如上所引法華中此等言句即是隨宜權説因觀知一切衆生根鈍癡盲著五欲樂與佛證得之清淨智微妙法不能相應如斯之類云何可度耶乃不得已先為由淺而深説三乘法然説三乘實為一乘所謂開權顯實是也本經此處正明平等法界皆是究竟如實之説故言句多連如來二字説之如來者諸法如義何謂如真如是也何謂真如離念境界是也豈能引權説以證實説且所謂權者亦是即實之權故雖曰思惟實則即思惟而無思惟凡讀佛經第一當明此義即如佛常自稱我矣豈可因其隨宜之稱而謂如來有我相我見又如本經説此無上甚深之法而著衣乞食示同凡夫豈可因此遂疑佛是凡夫長老處處代衆生請問亦豈可看呆謂長老真不明般若世間多有以觀世音菩薩是男身是女身懷疑者夫法身大士本無有相其所現身皆是隨機應緣所謂應以何身得度者即現何身而救度之楞嚴法華詳説此義豈可視同凡夫局定為男為女即以大士往因言多劫勤修何身不有亦豈可舉一世之身以概多劫之身乎佛經中類此之事以及兩相抵觸之言句甚多甚多皆當如是領會也二思惟者作觀之義作觀亦譯思惟修也上所引法華兩頌四句為一頌是承其上文我以佛眼觀一句而來兩頌所説蓋謂觀照衆生根機耳當知作觀之時非無念非有念少知作觀者便能了然此中境界與思索妄想絶不相同豈可誤會思惟為作念乎總而言之有生可度有法可説是約相説佛作此觀正所謂寂而常照也然而正當現如是事相時即復了不可得故又曰無法可説無生可度則是約性而説也雖觀而亦無所觀也照而常寂也故將所引法華兩頌與此中所説者合而觀之正是性相圓融寂照同時之義亦即即權之實即實之權之義當如是通達也若執一疑一便是執相疑性執性疑相執寂疑照執照疑寂此正凡夫知見正所謂鈍根癡盲與微妙第一之智慧不能相應者也故學佛必須開佛知見佛知即是知一切不可得知一切即空即假佛見即是不執一異若執一疑一正是執一執異矣故欲通達佛法微妙之理非將凡情俗見一掃而空之必不能入也子次釋成何以故實無有衆生如來度者若有衆生如來度者如來則有我人衆生壽者實無略逗此二字是徹底的謂實無作念之理也何謂實無是理其義甚多略説其四一若有度生念便有所度之生能度之我能所者對待之相也便是分別便是執著佛證平等一真法界故稱如來若有分別執著何名如來故謂如來作是念實無是理此約平等法界明義亦是約如來邊説再約衆生邊説之二何謂衆生不過五蘊集合而已是緣生法緣生體空若有度生之念豈非不了緣生執五蘊法為實有乎有法執便有我執曾是如來而有我法二執乎故謂如來作是念我當度衆生實無是理此約緣生體空以明義也三衆生之所以成衆生以有念故衆生之所以得度以無念故是故度生云者惟令離念而已若佛度生有念則自尚未度何能度生耶故謂如來作是念我當度衆生實無是理此約離念名度以明義四佛度衆生不過為衆生之增上緣耳而衆生自己發大心行大行實為主因若無主因雖有增上緣生亦無從度也是故衆生得度實衆生自度耳佛無此見是佛度衆生也故謂如來作是念我當度衆生實無是理此約因親緣疏以明義也總此四義故有衆生如來度者佛實無此念也此句是順釋其故若字下復反言以釋其故有者謂有念也若有此念便落能所能度我相也所度人相也所度不止一人衆生相也此念繼續不斷壽者相也苟有一念四相具足如來正令發心菩薩除此四相而謂如來有四相其誣謗如來可謂極矣所以切誡莫作是念也此中正破如來作是念之邪言故但約如來邊即前説四義中之初義以明無能無所無我之義意在令學人了然於平等法界實無有我耳癸次明本無聖凡須菩提如來説有我者則非有我而凡夫之人以為有我須菩提凡夫者如來説則非凡夫流通本多是名凡夫一句唐人寫經南宋藏經及古德注疏中皆無之大不應有此科是釋明無能度無所度之所以然也此中我字若但作我人之我會固無不可然義淺矣須知我字正承上文我當之我來蓋指佛言我則非我意顯平等法界佛即非佛耳正明無聖之意蓋佛之稱顯其證果耳如來之稱亦為顯其證性耳一真法界離名絶相那有此等名字且一真法界一切諸佛一切衆生同體之性之異名也因其同體故曰一如故曰平等無有高下若此中有佛字者便有高下便非平等便有名相便非空寂故依如義而説所謂有佛有聖者便非有佛有聖但凡夫之人只知取相不達一真法界以為有佛有聖耳平等法界佛尚無存豈有能度可説乎且既是平等同體不但無聖而已又豈有凡故所謂凡夫者約如義説便非凡夫也凡尚無存豈有所度可説乎無高無下平等平等此之謂性體一如足見後人妄加是名凡夫句真是畫蛇添足無聖無凡正是無有高下之所以然故曰平等性體本來如是平等所以佛説上無佛道可成下無衆生可度蓋度即無度成即無成也所以説平等真法界佛不度衆生所以佛眼觀一切衆生本來是佛此皆約性體平等義説也何故説平等義為令發心菩薩通達此義應以無能無所無法無我之心修一切善法乃能如是而證也由此可知修行人雖應發願轉凡成聖然發願已即須將凡聖之念拋開若不拋開聖凡永隔矣何以故聖之成聖凡之成凡正由一無念一有念故起念便有高下便非平等故古人開示修行有一句最好曰但驀直行去驀直者絶無瞻顧之意行人只要明了道理認準方向便一直行去轉凡不轉凡成聖不成聖以及一切生死利害等等概不挂念如此便與道相應與性相應速能成就否則反不能成也古人又有警句曰古廟香爐去謂應萬念灰冷也聖凡尚不挂念其他可知矣壬次約性相明非一異分二癸初總顯如義須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來此約性相明非一異一科為全經緊要眼目而義蘊幽深非逐層細剖不易明了觀與見不同約如來現身言曰見約學人修觀言曰觀也問意蓋謂可以觀想有相之應身即是觀想無相之法身不一有相一無相當然不可然而應身原從法身顯現無相之無本非是畢竟無所謂實相無相無不相是也則又未嘗不可雖然若執以為可未免取相而有著有之過矣故下有初遣取相明非一一科之文然若執以為不可又未免滅相而有墮空之過故下又有次遣滅相明非異一科之文也試看長老所答可以增長見地不少再聞佛之所遣更令人豁開心眼多多須知開經以來層層遣蕩屢説即非是名無非為防學人著於一邊此處明性相非一非異者正是説明不應著於一邊之所以然也於意云何探驗見地之辭也前已屢次探驗矣今更探驗者因此處不曰見而曰觀問意極細迥不同前也蓋正恐學人聞得諸法如義及是法平等者儱侗顢頇未能深入精微而自以為一如平等矣則差之毫釐謬以千里故更須探驗之而開示之也欲説答辭有二要義必當先明一般若會上佛令長老轉教菩薩見大般若經可見長老久已與佛心心相印般若義趣早已深知此經故示不知者代衆生請法故也二甚深之理本無可説今不得已於無可説中而言説之一人一時不能説兩樣話故寄於二人用問答體説之則甚深義趣較易明顯耳依上兩義故長老所説無異佛説一切經中當機人皆應作如是觀不但此經為然此是要義不可不知如是如是句若但作應諾之辭會不但淺視長老經中所含深旨亦不顯而晦矣何謂淺視長老耶且如初次佛問可以身相見如來不長老即答身相即非身相二次問可以三十二相見如來不又答即非是名第三次問佛可以具足色身見不如來可以具足諸相見不皆答以不應何此中忽又執相如此長老固是代表衆生然而既明忽昧於理不合所以如是句實非應諾之辭乃是説理如者諸法如義也是者一切皆是也前不云乎前半部中無一答如是者後半部答如是處皆表精義如明五眼中每答皆稱如是此明肉眼非定肉眼乃至佛眼非定佛眼總之五不定五一不定一不可執一也正所謂諸法一如一切皆是意顯惟如則皆是不如則皆非是故每答皆稱如是次問説是沙不亦答稱如是者此明如來説是沙乃以如義説是非同凡夫之説是也再問福德因緣亦答稱如是者此明法法皆是緣生體會得緣生性空則法法皆如法法皆是故下接云此人以是因緣得福甚多意顯惟其緣生始有多福之可得亦惟其緣生應不執著緣生相而會歸一如性則雖法法皆是緣生亦即法法皆是佛法矣此外皆未答如是至此復答稱如是者意亦同前而兩稱之者令人當重視如字必其能如而後方是耳其意蓋謂三十二相亦諸法之一諸法皆是真如豈三十二相不是真如但必應會得如義方是何以故若領會得性相一如既不滅相亦不執相則觀三十二相應身即是觀如來法身也若違如義勢必執相以觀性否則滅相以觀性則無一而是矣如是如是以三十二相觀如來應作一句讀之總以明依照如義以三十二相觀如來則是也長老之意蓋謂觀不同見心中作三十二相觀時本是無相之相如來現三十二相亦是相即非相今了其無相之相而作觀則既非取相亦非滅相正與實相無相無不相之義合亦即與諸法如義合亦即與如來合故曰如是如是以三十二相觀如來意顯既一如矣觀相即是觀性也長老答意實是甚深實是甚圓實與佛旨相應而下文如來更加破斥以遣蕩之者以長老所明如義固是但其中尚有微細之理不可不認清辨明否則勢必至於儱侗顢頇未見謂見認驢鞍喬為阿爺下巴矣此義實關緊要乃為一般學人最易含混者故佛與長老一問一答以顯明此隱微深旨俾學人不致誤認耳癸次別遣情執分二子初遣取相明非一次遣滅相明非異子初又二丑初破解示遣佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來佛意蓋謂汝言如是如是以三十二相觀如來乍聆之甚是也然而本源之地若未認清誠恐似是而非何以故三十二相豈但如來現此相哉轉輪聖王亦具有之然而輪王之相是由福業來不同如來是由法身顯今遽儱侗曰如是如是以三十二相觀如來然則輪王亦是如來矣豈非大謬當知佛言固是説所觀之相意實開示能觀之人蓋以業識未空之輪王因福業故亦有三十二相足見相皆虛妄不足為憑然若觀者業識已空豈但輪王之三十二相不能朦蔽即觀衆生五蘊色身亦能洞見法身而不見有五蘊苟或不然雖與如來覿面亦但觀相而不能觀見法身矣佛之言此正因初發心修觀者無明分毫未破方在業識之中若聞一如皆是是法平等之説不揣分量遽謂觀相即是觀性不知所觀者正是識而非性也一切學人應於此中細細勘驗云何勘驗一博地凡夫自無始不覺自動以來久已性相不一矣何故不一由於取相何故取相由於業識故必須盡空諸相剿絶情識方足語於性相一如二佛説如義是令體認一真法界除其分別執著而無我故當自審分別否執著否倘有微細分別執著便是業識何云觀相即是觀性乎總之一如平等惟有諸佛方能究竟必須既不執實且虛相亦泯直至一念不生并不生亦無方是一如而不異故所謂諸法一如者是只見一如之性不見諸法之相不但此也直須雖一如平等而亦無所謂一如平等乃為真一如真平等豈業識未空者所能妄以自負今云以三十二相觀如來明明存有能觀所觀便是分別執著業識宛然乃云如是如是殊不知早已非如毫無一是矣古今多少行人粗念稍息便謂已證三昧習氣仍在輒云任運騰騰是皆以混濫為圓融鮮有不墮落者觀此經文真是頂門上痛下一針世尊所破長老原已洞明故得機便轉而前之所答亦是懸知衆生之病所以儱侗其辭待世尊破斥之俾一切衆生皆得自勘自破不致混濫耳凡標須菩提白佛言句皆示鄭重之意此中亦然意在令學人於此番破解不可忽略看過也解所説義者聞知輪王亦同此相相不足據便解得諸法一如必須盡泯諸相而後可也長老如是解正令學人應如是解不應者意顯非絶對不可若其情識已空則有相等於無相無相何妨有相而非少有情識者所應混濫也故曰不應此語正是切誡學人者總之佛説一如平等是令一異皆不可執今以相觀性明明執一矣尚得曰一如乎轉輪聖王者以十善化世不待兵戈威伏四方為人世第一大福德人自然有七寶出現隨意自在第一曰輪寶王乘此輪巡行四方因稱轉輪聖王輪有金銀銅鐵四種得金輪者曰金輪王王四大洲銀輪王王東西南三洲銅輪王王東南二洲鐵輪王王一洲即南閻浮提也以福德力具三十二相但欠清淨分明因其是由有漏福業而成不同佛之由無漏法身而現者也丑次説偈結成爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來爾時者破解甫竟之時標此二字是令學人應與上科同時體會因偈中所説正是所破所解之所以然故也色字統指一切色相三十二相亦攝在內兩我字指如來言即謂性也音聲賅説法音聲在內正謂不可執取上來一如平等諸説向文字音聲中求也見色者眼識聞聲者耳識舉二識以概其餘也總之見聞覺知雖其體是性然衆生自無始來已變成識今若以色見以音聲求顯然業識用事執著六塵境相乃欲以是見法身以是求法身明明是妄見明明是向外馳求其知見已大大不正尚欲見法身如來乎故斥之曰是人行邪道不能見如來以真如之性非是分別執著之業識境界故也結成欲觀一如非盡空情識不可之意或曰佛經中每令人觀佛相好何也須知此是方便所謂方便含有兩義衆生處處著相故令捨染觀淨此一方便也既知觀淨即復令趨究竟如此中所説此二方便也蓋步步引人入勝是之謂方便所以十六觀經中最要者為是心是佛是心作佛數行文明得一切唯心則知雖觀相好而不執實其分別執著之情識遣矣所以念佛人雖觀見彌陀現前極樂現前亦不可著者此也何以故相由心作故自性清淨心本來無相無不相相不相更不必置念故此理不可不知也當知置念便是分別矣執著矣上來遣相已遣到極處亦即後半部無法發心以來之總歸結處蓋發心時即不可取著菩提法者因少有所取便著色相便是向外馳求便非正知正見便是法執我執便與空寂之性相違豈能見如來哉所以令菩薩通達無我法者此也否則盲修瞎練走入邪道欲煮沙以成飯永永不能達到目的因修行是以見如來為目的故也故應通達也然而遣相者但為不可取著而已若誤會是滅相則又大非故又有下一科文來以下是子次遣滅相明非異一科文今先説其要旨此一科不但在後半部中有萬鈞之重即開經以來所説不應取非法非非法以及既説即非又説是名等義直至此處方説明其所以然故在全經之中與上明非一一科同為緊要關鍵譬如千山萬壑迤邐蜿蜒行至此處乃回轉環抱團結起來遂使前來無數峯巒起伏莫不一一映帶有情有勢焉須知前半部是對初欲發心者説所以空有皆令不著以合中道凡説即非是名處其語氣大都兩邊兼顧既不可著有復不可著空所謂是名者含有名相雖假未嘗不是之意至後半部是對已經發大心修大行並能不取一切法相者説但恐其獨獨取著菩提法相則終為空寂之纍終不能證性而此執甚細最為難除故後半部所説皆向著有邊痛遣雖有時即非是名並説然其語氣多側重即非邊含有法相雖是終為假名因是假名所以即非之意必待遣得一塵不染一絲不挂然後又掉轉頭來説不應著空故曰有萬鈞之重也此正宗下所謂百尺竿頭更進一步之意又曰還要翻個筋斗翻筋斗者掉轉頭之謂也且前半部所説不應著空但説其當然若無此中於法不説斷滅相句為之點醒不但其理未明亦無歸結而全經精神亦不團聚矣所以説上科與此科為全經重要關節者因其是開經以來所説諸義之歸結處故也雖然後半部開章後既專遣執有上科雖為遣有之總歸結義蘊幽深然理本一貫尚易説明惟此科忽然轉舵眼光四射其語氣精神直貫注到前半部故一句之中賅括多義真如側看成峯橫看成嶺面面皆放光明皆成異彩不知從何説起今欲説明一面一面的道理宜先説其大旨大旨明了面面亦較易明了也當知性為一切法之體相是表面所以修行者原為證性故不應執著表面之相此一定之理也然而有裏亦須有面若但有主體而絶無其表主體亦孤立而無所用所以修行欲證性者既不應執取相亦不應斷滅相此亦一定之理也譬如造屋梁柱是主幹是體門窗戶壁乃至磚瓦灰石等等是表面是相自然最先要注重梁柱若但知取著外表之相而不知注重主幹之體如何其可然若但有主幹之梁柱絶無門窗戶壁尚得名之為屋哉造屋如此修行亦然觀此譬喻其不應執相亦不應廢相之理可以了然矣此佛説此科之最要宗旨也子次遣滅相明非異分二丑初標示切誡須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提如上所説可知此遣滅相一科義意之深廣矣然而不但深廣已也復多隱含之義頭緒又繁極不易説説既不易領會之難可知然既為重要關鍵斷不能不細心領會也即如初標示切誡中開口便奇何謂如來不以具足相故得無上菩提耶當知表面説具足相實則隱含修福德之義也因具足相由修福德來也佛經中此類句法甚多所謂互相影顯是已以文字言如曰莫作是念如來不以修福德故得無上菩提豈不直捷了當今不如是説而以具足相為言者蓋有兩重深意一為引起下文不説斷滅相以對上文之不執取相顯明二邊不著之義也且上言如來下言具足相可顯性雖無相而亦無不相之義也二説一具足相聞者可以領會句中影有修福德若説修福德聞者未必能想到是説具足相是之謂善巧説總之如此一語雙關而説者因上文説輪王亦有三十二相而是由修福來既已破斥恐人誤會證性者不必修福又因上説以色見我是行邪道恐人誤會見如來者必須滅相今如此立説則兩種誤會俱遣故曰善巧也汝若作是念是字指下文不以具足相等正恐聞上言者發生誤會而作是念也長老是當機是衆生代表只得向長老發話其實是普告一切人也得阿耨多羅三藐三菩提句影含多義當逐層説之一阿耨多羅三藐三菩提義為無上正等覺然亦攝有佛及如來之義何謂攝如來義耶如來者平等法身也無有高下體絶對待故曰無上既是平等故曰正等不覺則不能證故曰正覺也何謂攝有佛字義耶佛者覺也故曰正覺自覺覺他無二無別故曰正等覺已圓滿至究竟位故曰無上也故無上正等覺可謂性德如來果德佛之統稱此中不曰佛不曰如來而舉統稱之名為言者為顯二義甲因上句顯説具足相隱含修福德若單約修因剋果之福德言應用佛稱若單約相雖非性亦不離性之具足相言應用如來之稱今上句既具隱顯二義故宜用兼含性果二德之統稱也乙説一得阿耨多羅三藐三菩提正為引起下文之發阿耨多羅三藐三菩提來蓋欲藉果證以明因心也藉果明因者所以闡明後半部開章時所説實無有法發阿耨多羅三藐三菩提之真實義也開章時先説無法發菩提之義接明無法得菩提之義一發一得相對而説此中亦一得一發相對説之者正所以補足開章時所説之義也何謂補足蓋闡明前所謂法者即攝非法前所謂無法者是二邊不著法與非法皆無如此方是發菩提若但會得不取法一面未免落空尚得謂之發無上菩提乎是此中得發並説故與開章時並説者相映成趣之要旨也由此又足證明菩提下前説既無心字則此中下文發阿耨多羅三藐三菩提之下豈可著一心字乃不明經旨者儱侗濫加豈非大謬二説一得字更有精妙之義蓋此得字正針對上科觀字而説者也針對觀字而説得字者所以明觀則不應取相得則不應廢相之義也何以故修觀之道重在見性觀相豈能見性前半部中已説得明明白白曰若見諸相非相則見如來故欲見如來者必須能見諸相即是非相而後可今云以三十二相觀如來并未能見相即非相何能見如來耶乃謬引如義自以為是不知如義者雖不廢相亦須不取相方名為如今著於一邊何名為如耶顢頇甚矣故破斥之曰行邪道不能見以明性相之非一也此科不説觀而説得者是約修因證果説也亦即約性相相得説也何以故性相不相得不名證果故意顯若能不著於相相亦何礙於性故相得也總之性是裏相是表約表裏言性相非一也若約表必有裏裏必有表表裏合一言性相則非異也此如買屋者應觀其梁柱若但觀外相而曰觀外相即是觀梁柱豈非笑談然若只有梁柱而門窗戶壁外相一概無有則雖得此屋等於不得矣修行亦然約觀言必應不取相約得言必應不廢相也明茲譬喻則一異皆不應執之理當可徹底了然更可見佛所説法語語有分寸字字含妙理誠恐學人粗心浮氣於性相非一非異道理囫圇吞棗不能潛心細領今觀如上所説我世尊已將性相圓融中之行布為一切學人畫得了了明明清清楚楚若能深切體會自能既不取相亦不取非相又有行布又能圓融事事皆合中道法法不違自性矣三前條所説更有互相影顯之義在不可不知也何以言之上科説觀是約因邊説是明修因者不可取相也不可修有漏之福也當知修因既不可取相證果又何可取相但非廢相耳在因位時不可修有漏福者以修無漏之因乃能證無漏之果故也此科説得是約果邊説是明證果者并非廢相也亦非不由修福來也當知證果既非廢相修因又豈應廢相但不可取著耳果非不由修福來然則在因位時但不應修有漏之福耳豈令絶對不修哉因果一如故互相影顯以明之四上科與此科兩兩對照觀之復有要義上科長行中之意若云輪王亦有三十二相而非如來是明修福不修慧不能得無上菩提果之義也此科切誡莫作不修福得菩提之念是明修慧不修福亦不能得無上菩提果之義也上科四句偈中呵斥以色聲見如來為行邪道者明見性不應取相之義也此科切誡莫作不以具足相得菩提之念者明見性亦非廢相之義也由第一條至此第四條合而觀之已將理性事修以及性相非一非異又行布又圓融之因因果果説得細密之至周匝之至矣然而所含之義猶不止此五上科言觀此科言念觀念一義也兩科合言意顯相與非相福與非福兩邊不著為正觀念也若其但取一邊即非正觀正念何以故不合中道故故上科取相便以行邪道呵斥之此科取非相又以莫作是念切誡之六三十二相是應身應身生滅無常於明性相非一之義便故上科遣取相則舉三十二相言之具足相即前所謂具足諸相是報身然約相言名報身約性言即是報得法身於明性相非異之義便故此中遣滅相則舉具足相言之當知如此而説亦是互相影顯以明義者何以故三十二相不應取可知具足相亦不應取具足相不應滅可知三十二相亦不應滅分而説之者但為便於顯明非一非異之義耳七不以具足相得菩提中更含精義當知具足相之成是由福慧雙修來不但修福已也何謂雙修修福時便知不著相是知不著相便是慧也因此乃能成具足相得無上菩提此與輪王大異其趣者蓋輪王福業稱為有漏者無他修福著相故耳故只能成三十二相只能得輪王果由是可知此中雖是説不滅相其實兼有不取相義在此其所以能與性不異也此層為此科精妙之義所以舉具足相以明非異者宗旨在此何以故非異即是一如必其相與非相兩邊不取方名一如若上科所説是但知不取非相一邊何名一如哉綜合上説諸義則此科之義便可洞明無非恐人聞上來遣相之説偏於空邊誤會是絶對無相則與實相之無相無不相相違便非諸法如義便非是法平等便不得無上菩提之果而不見如來矣故切誡以莫作是念也若作是念乃邪見非正見故論道理論語氣只此莫作是念一句於義已足今復接説如來不以具足相故兩句者蓋重言以申明之使人知注重此兩句是要義不可忽略耳故莫作是念須連下兩句一氣讀之若念字斷句便覺下兩句重復矣曾見清初一刻本誤從念字斷句又嫌下兩句重復遂刪去不字而作如來以具足相故得阿耨多羅三藐三菩提此大謬也須知有一不字含有雖不應取相亦不應廢相之意在語氣便雙照二邊何等圓融活潑若刪去不字語氣便著於取相一邊沾滯呆鈍相去天淵矣大智度論云般若如大火聚四面不可觸豈可鈍置一語試看本經文字從無一字説煞以文字論亦是絶妙神來之筆非羅什大師譯筆不能妙到如此取他譯本比而觀之自知此種清初刻本幸他刻未倣效之不然今流通本中又多一毒矣丑次結顯正義須菩提汝若作是念發阿耨多羅三藐三菩提者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提者於法不説斷滅相此科經義甚為曲折細緻當潛心領會之流通本菩提下皆有心字唐人寫經皆無之大約加入心字起於五代不應加也此科正是説明上來標示切誡一科文之所以然者汝若作是念至説諸法斷滅一段是説明上文作是念之所以然何以故下一段是説明上文莫作是念之所以然上科正義至此方顯故標科曰結顯正義汝若作是念即謂作一如來不以具足相故得無上菩提之念也説諸法之法字緊承具足相來因具足相是由修福而成云何修福廣行六度諸法是也是故若説不以具足相便無異説不用修六度法豈非説成諸法斷滅乎故曰説諸法斷滅也中間又有發阿耨多羅三藐三菩提一句何謂耶當知世尊因後半部開章時曾説無法發菩提誠恐未能深解其義者聞得後來又説我於阿耨多羅三藐三菩提乃至無有少法可得上科且説若以色見我是行邪道不能見如來勢必誤會曰前所云無法發菩提之義我知之矣得菩提者既無少法且明明開示以色見為邪道色者相也可見如來得無上菩提全與具足相無關矣此作不以具足相故得菩提之念之來由也若作是念便有第二念曰具足相者是由行六度法勤修福德而來所謂百劫修相好是也今得菩提既與具足相無關且明明開示得菩提者無有少法可見發菩提者亦必不應有少法但當一心趨入空寂之性而已凡六度諸法所謂修福德修相好者全不可放在心上此所以開示無法發菩提耳行人若如此誤會與佛旨相背而馳矣走入邪道矣勢必一法不修矣何以故説成諸法斷滅故尚得謂之發無上菩提乎故切誡以莫作是念也由此可知佛説此科正是説明為何作是念之所以然者而佛於遣取相之際忽然掉轉頭來説此遣滅相一大科又正是闡明前云無法發菩提之真實義者也此科之關繫重要也明矣故頃言義甚曲折細緻當潛心領會也凡説理到精深處切須細辨不然勢必差之毫釐謬以千里走入邪道而不自知危險之至此學佛所以宜開圓解而以親近善知識為急務也何以故下正明不應作是念之所以然意若曰前言無法發菩提者是説不應存一念曰此是無上菩提以除其取著法相之病耳何嘗説斷滅法相耶故曰發阿耨多羅三藐三菩提者於法不説斷滅相夫前説無法發菩提時已説得明明白白曰發阿耨多羅三藐三菩提者但當生起度生本應盡之責雖盡亦等於未盡之心豈是説斷滅諸法乎後又言若菩薩作是言我應滅度無量衆生則不名菩薩者亦是説不可存一我能盡責之心豈是説斷滅諸法乎佛得菩提無少法可得是説雖得而不存有所得亦非斷滅諸法也證法身得菩提必須福慧雙修以福慧雙修乃能悲智具足故也何能言具足相絶對無關耶乃竟如此誤會大謬大謬當知世尊大慈因上來極力遣相惟恐顢頇者未能深解難免無此誤會故如是懇切告誡之耳如是告誡者非但為闡明無法發菩提之真實義且意在開示學人欲證平等法身諸法如義必須盡歇狂心一念不生而後可耳何以故動念便有分別執著故故曰莫作是念也由此言之此中菩提字下萬不能著一心字顯然可見矣總而言之開經來所説諸義若無此別遣情執下兩大科文便難徹底領會則亦無從演説矣當知自開經來演説種種兩邊俱遣的道理皆是攝取此處兩大科之義而説者也故此兩大科為全經中重要關鍵因其義可以貫通全經故也即如前半部啓口便説滅度無量無數無邊衆生實無衆生得滅度者是説度盡衆生而不著相非説一生不度而為斷滅相也又説於法應無所住行於布施是説行布施時不應住相并非不行布施而成斷滅相也所謂應如是降伏者是執著與斷滅兩邊皆要降伏不是降伏一邊所謂但應如所教住者即是兩邊降伏兩邊不住如是一無所住自能得所應住亦即是如所教住故曰若心有住則為非住也所以世尊示同凡夫塵勞之相者即是表示不執著具足相三十二相而又不斷滅相也是之謂一如是之謂平等所以是經有無邊功德而能信心不逆者便為荷擔如來增福滅罪當得菩提而此義甚深必須深解否則非驚怖而狐疑便顢頇而狂亂矣不但此也前云通達無我法者是不但應通達不取法相之理且應通達不滅法相之理何以故若取法相即著我人衆生壽者若取非法相亦復即著我人衆生壽者必須於一切法相既不取又不滅乃能證得平等一如之法性而無我是真能通達者矣故得此兩大科全經便融成一片義蘊畢宣所以下科即以知一切法無我得成於忍圓滿收束此明非一非異兩大科文中復有一極要之義其義云何所謂非常非斷是也明非一一科是説非常三十二相之應化身隨時顯現生滅非常也因其非常故與常住之性非一也明非異一科是説非斷具足相即是報得法身故非斷也因其非斷故與常住之性非異也雖然此猶據隨宜之義而説若依究竟了義説之法報應三身皆是非常非斷此兩大科文中明明曰如來指法身説也明明曰具足相指報身説也明明曰三十二相指應身説也夫三身並説以明不應取相不應滅相者蓋因其非常故不應取也因其非斷故不應滅也可見經旨明明是顯三身非常非斷之義豈能漏而不説乎此義亦般若要義不可不明者也何以故非常非斷之義明非一非異之義可因而更明非一非異之義若得洞明然後見圓而知正也然而其義甚不易明諸大乘經論中雖屢屢説之而説得最詳最透者莫過於十卷金光明經今當引而説之想為諸君所願聞也彼經曰依此法身不可思議摩訶三昧而得顯現依此法身得現一切大智是故二身依於三昧依於智慧而得顯現摩訶者大也三昧者定也大定對大智言大智即大慧也定慧從絶對之法身顯現故皆曰大皆曰大者明定慧之均等也明定慧均等者顯寂照之同時也定慧約修功言寂照約性具言也寂時照照時寂非言語心思所可及所謂離名絶相故曰不可思議此句統貫大智二身謂報身應身也蓋謂法身性體本來離名絶相寂照同時但無修莫證然若非性體本具定慧之修功亦無從顯現故曰依此法身得現大定大智此表面之義也骨裏是開示必須離名絶相依本寂以修定依本照以修慧定慧修功圓滿均等便能寂照同時便是證得法身逮至法身證得報應二身之相即復顯現故曰是故二身依於三昧智慧顯現觀此段經義可知必須離名絶相以修定慧方能證法身之性然亦不斷滅報應二身之相也報應二身彼經譯名微異通常所稱之報身彼則譯為應身通常所稱之應身彼則譯作化身一切經論及古德箸述中此等異名常常遇之初學每以為苦然若細觀經旨便知所指而得會通亦不必畏其難也彼經又曰如是法身三昧智慧過一切相不著於相不可分別非常非斷是名中道此明法身非常非斷也法身三昧智慧者意顯定慧圓足便是法身非此外別有法身蓋三昧智慧即指法身言不可誤會法身三昧智慧是三件事觀前來所引彼經依於法身云云可以了然矣何以故從來皆説報身應身從法身現而彼經云二身依三昧智慧得現足證三昧智慧即是法身也所以凡夫本性但稱佛性有時則稱在纏法身在障法身從無有單稱法身者正以其無有定慧或雖有而不具足既未證一真法界未能寂照同時何能稱法身哉然則既須定慧具足方名法身可見法身不外定慧具足矣過一切相下四句明義精極過者超過過一切相猶言超乎相外既曰過一切相矣又曰不著於相何耶過一切相句明其無相也性體大而無外亦復小而無內超然於一切對待之表故無相也不著於相句明其無不相也因其無不相乃有不著之可言也蓋性雖非相而一切相皆從性現雖從性現而性仍超乎其外故不著也此二句互明其義因其超然所以不著因其不著故知超然也合此兩句之義正所以顯性相之非一也何以故性雖隨緣現相而仍超然不著故此所謂不著是言其法爾不著何以見之相皆生滅無常而性之常住自若不因其隨緣現相便為此生滅相所妨也可知其本來不著矣故性與相非一也此兩句亦是説明法身與報應二身非一也不可分別句所以顯性相之非異也亦即是説法身與報應二身非異何故不可分別而非異耶彼經自明其義曰雖有分別體無分別雖有三數而非三體蓋謂報應二身只有相而無體體惟法身而已所以數雖有三而體非三相雖有別體則無別故不可分別之言是約體説者然亦是一語雙關因其時時現分別之相乃有不可分別之可説所以不可分別句一面固顯其體無有別而一面卻顯其現相無休也由是可知非一非異之界限矣蓋以性融相則非異性相對舉則非一也非常非斷緊承上三句來時時顯現體雖無別而用則有別之相故曰非常然相雖非常而法身之性仍復過一切相不著於相故曰非斷或問從來説法身常住因其常住乃名法身故説法身非斷其義易明法身雖現報應等相今云非常亦是約相而説然則何云法身非常耶此義終難了然答所謂法身常住者乃單約法身言也然證得常住法身不生不滅之體已若住於體而不現相則不能與衆生接近何以利益衆生耶故諸佛諸大菩薩為利益一切衆生故恆現報身及應化等身生滅之相而不住著法身就其有常住法身而不住言故曰法身非常也然雖不住因其常在大定之中故所現之相儘管生滅熾然而法身之常住自若所謂過一切相不著於相者實由於此故又曰法身非斷也當知法身非常正所謂不住涅槃法身非斷正所謂不住生死兩邊不住故曰是名中道法身兩邊不住者言其既不著於法身亦不住著於報應等身也此正寂照同時境界非定慧功夫修到圓滿均等不能至此境界也本經啓口便令發大願修大行除其我執者因此以我執未化必分別執著少有分別執著便不能兩邊不住又豈能定慧均等則寂照同時境界何能達乎彼經復曰化身者恆轉法輪處處隨緣方便相續不斷絶故是故説常非是本故具足大用不顯現故説為無常彼經譯應身為化身此明應身非常非斷也是故説常猶言故説非斷以應身隨緣恆現不斷故説非斷也無常猶言非常非是本者言應身非本性之體也報應等身皆本性顯現之相用故非是本用由本顯非由用顯報應二身已是用矣不能更顯用故曰具足大用不顯現此句正明報應是相相是生滅法故説為非常也彼經又曰應身者從無始來相續不斷一切諸佛不共之法能攝持故衆生無盡用亦無盡是故説常非是本故以具足用不顯現故説為無常此明報身非常非斷也彼經譯報身為應身故不共之法如十力四無畏等惟諸佛有之菩薩亦未具足故曰不共攝持有兩義此不共之法為報身之智用攝持於報身一也報身具此智用遂能攝持衆生二也故接曰衆生無盡用亦無盡綜合上所引之經義觀之非一非異蓋有三義法身體也報應等身用也故非一若以體收用則不可分別故非異此一義也而法身之非常是常而非常二身之非斷是斷而非斷故法身之非常乃二身之非斷此性相之所以非異也法身之非斷是畢竟非斷二身之非常是畢竟非常故法身之非斷乃二身之非常此性相之所以非一也何以言之法身之非常是約相續現相説經云不可分別者明其相續現相而體惟法身也相續現相故曰非常體惟法身故曰常而非常法身之非斷是約常住本體説經云過一切相不著於相正明其常住本體因其常住本體故雖現相而能超然不著也常住本體故曰非斷現相而復超然不著故曰非斷是畢竟非斷彼二身則不然二身之非常是約非是本體説經云非是本故既非本體故曰非常是畢竟非常故曰法身之非斷乃二身之非常性相之所以非一也何以故一常住本體一非是本體故二身之非斷是約現相相續説經云相續不斷故既顯現相續故曰非斷故曰法身之非常乃二身之非斷性相之所以非異也何以故同是約現相相續説故此非一非異之又一義也又復三身非常非斷之名非異也而法身非常非斷與二身非常非斷之所以然則非一此又非一非異之一義也總之説一有種種一説異有種種異且一之中有異異之中有一是故説一説異非也説不一不異亦非説一説異是也説不一不異亦是然則非可説非不可説執則皆非不執則皆是耳當如是見當如是知如是見者則為圓見如是知者乃是正知或曰由上所引經觀之可見報應二身同是生滅相同一非本何故本經約應身明非一約報身明非異耶須知應化身之相續是證法身後方便隨緣所現且輪王亦有之而法身性體則常住不變其為非一最為顯明故約應化之三十二相以明非一也若夫報身是與法身同時成就故本經曰以具足相故得無上菩提正明其成就具足相即是證得無上菩提也當著眼故字且如金光明經明報身之義曰應身者即是報身從無始來相續不斷相續不斷句報應所同此明其與法身非一也從無始來句報身所獨即明其與法身非異也當知法身可云無始報身須無明盡後乃始證得今云從無始來何耶此義甚精細剖方明蓋報身有二種名一曰自受用報身一曰他受用報身本經曰具足相金光明經曰相續不斷曰衆生無盡用亦無盡皆是約他受用邊説然必自受用之義明他受用之義方明今先言自受用自受用報身非他即指自利之內證圓智而言假名為身耳此智固由修功而現然實性體本具若非本具修亦不現譬如鑽水不能出火煮砂何能成飯然則性體無始此智亦復無始矣故自受用報身為無始也再約他受用言之自受用他受用名雖有二其實是一蓋約內證自利之圓智言曰自受用約現相利他之大用言曰他受用耳既曰圓智必有大用若無大用何名圓智一表一裏似若有二然而表裏合一乃得身名故名二而實一也且智是性具用亦何嘗不是性具故他受用報身亦為無始也綜上諸義報身與法身非異其義顯然故約報身之具足相以明非異也若剋實論之即應化身亦可云無始何以言之應化身為修種種法通達俗諦之事功行圓滿得大自在故能隨衆生意現種種身然何以通達俗諦之事乎由於通達真諦之智故也可見事攝於智矣是故報身無始應身亦復無始然則何故獨以應身明非一耶報身與法身親應則較疏之故何謂親耶他受用為所現之相用是表自受用為所具之智慧是裏然相用之現即現於智慧而智慧之具即具於理體且理智一如亦無能具所具之分能現所現之別故無論自他受用實與理體冥合為一故親親故非異也何謂疏耶應化身雖亦具於理智亦無能具所具能現所現等分別然專屬外現之相故疏疏故非一也試觀金光明經所説便可了然其明報身之義既曰無始又曰攝持不共之法舉內持為言者正明其與法身親也其明應化之義則曰處處隨緣方便舉外隨為言者正明其與法身疏也總之明得非常非斷之義則非一非異其義乃得徹底即諸法一如是法平等諸義亦皆徹底何以故三身皆非常非斷而非異故一如也然非常非斷又各有不同而非一故雖一如而不妨有諸法也且一中有異異中有一故差別是平等中現差別平等是差別中現平等亦不隔別亦不混濫行布不礙圓融圓融不礙行布此之謂圓中遮照同時存泯自在矣豈第兩邊不著已哉而扼要之修功惟在不取相不滅相而以性為中樞逮已證得空寂性體以熏習力故便亦不取不滅隨機應緣大用無盡豈但相不住性亦不住并不住亦不住矣而大圓鏡智之中樞自若也此之謂以無我人等修一切善法則得無上菩提此之謂金剛般若波羅蜜所以傳佛心印者也通達此理以念佛便得理一心必生常寂光淨土願與諸君共勉之壬三約不受福德結無我此科判中約字之意蓋謂一切皆無我今不過約不受福德一法以明其義耳如上來無聖無凡非一非異之理亦是法法皆然但約度生及性相為言者取其較易領會耳約字猶普通所説之就內典捨就用約者以就義膚淺約義精深故也蓋約有約略義明其姑舉一事為例未及一一詳説又約有約束義若網有綱提其綱則全網就範明其雖僅言此一事而綱領已得其餘可以類推又約有要約義譬如契約久要不忘以顯此所明義極為契合可以徵信而無謬失若用就字三義皆無曾有疑約字生僻不如就字普通者茲乘便一説之凡唐以前古德言句後學未可輕議也不約他事獨約不受福德言者承上文來也上文具足相影含修福德是明得無上果者不廢修福此科緊承其義而闡明之曰修福何可廢但須不受不著耳并補足之曰不可聞不廢修福而又生貪著也故得此科上科之義更周匝圓滿所謂文不接而意接也壬此科分二癸初結無我次明不著癸初又二子初明無我功勝次明由其不受子初又二丑初引事須菩提若菩薩以滿恆河沙等世界七寶布施流通本作持用布施柳書慧本無持用字以七寶布施已含有持用意在矣後半部校顯經功只一二處然亦意不在校顯不過借作別用一借以作一段落二借以顯明他義如此中既借布施福德顯成不受者之為得無我忍復借無我功勝結束前文所言菩薩應通達無我法之義耳前半部中所以説無數寶施乃至以無數命施皆未稱為菩薩而此中獨舉菩薩為言其必有深意可知連下文讀之便可恍然乃是互相影顯之文也蓋此科雖僅言寶施意則含有此人已知一切法無我故稱菩薩但猶未成忍故不及後菩薩耳於何知之試觀下文云此菩薩勝前菩薩所得功德前半部中無論寶施命施概言福德未言功德而此則云前菩薩所得功德前菩薩七寶布施以功德稱必其已知離相修慧非但知著相修福之人可比矣因言功德因稱菩薩夫有我者必不能離相故知其意含此人已知一切法無我也況前云若菩薩通達無我法者如來説名真是菩薩然則若非知法無我其不稱之為菩薩也決矣總之此三約不受福德一大科文中一字一句一名稱皆含極精之義不可忽略恆河沙等世界謂世界等於河沙猶言無數世界以者用也滿者充滿謂用充滿無數世界之七寶行施也此科不過引一布施多福之事以為下文不受作張本耳丑次較勝若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德上文寶施菩薩既影有知法無我意此中得忍菩薩亦影有寶施意觀下文不受福德所作福德等句則此菩薩之大作布施福德顯然可見矣因其大作福德而不受所以稱其得成於忍也不然得忍與否從何知之故此科與上科之文其為互相影顯決無疑義此義既明便知經旨并非不重視福德惟當不著不受而已則此中知一切法無我得成於忍兩句經旨亦實趨重於得忍曾見數家注釋因未明了影顯之義遂將成忍句看成帶筆因謂前菩薩但知修福此菩薩則知法無我故功德勝前此修福所以不及修慧也云云大失經旨矣何以故若是此意者則前來切誡莫作不以修福德得菩提之念何謂乎如於法不説斷滅相一科所云謬甚謬甚一切法不外境行果境者五蘊六根六塵等是行者六度萬行等是果者住行向地乃至無上菩提等是也無我者謂一切染淨諸法不外因果因果即是緣生緣生體空故一切法中本無有我當知所謂我者非他即衆生無明不覺於一切法中妄生分別執著之見是也而一切法性本來空寂那有此物因其本無故當除之也知一切法無我之知即是解也謂領會得一切法性本來空寂也蓋一切法無我五字是理知之一字是智得成於忍者謂一切法性本來空寂無我之理與其知之之校之舊版無原稿有智已能冥合為一矣忍者忍可契合無間之意猶言合一也理智合一明其我執已化也功行至此是之謂成云何而成由於熏修故曰得成得成者猶言熏修得有成就也非精修功到云何能成耶故此兩句上句是解下句是行合而觀之是明此菩薩解行成就也又復上句知是慧下句忍是定合之便是定慧均等因其定慧均等所以解行成就也所以所得功德勝過前菩薩也因前菩薩解行定慧其功行猶未能達於冥合為一則是其知之之智於一切法無我之理尚未做到安安而不遷地位故不及也忍字之義猶言安安不遷也自前第三大科中標示若菩薩通達無我法者如來説名真是菩薩以後至此方始歸結可知上來所説皆是無我法而令菩薩通達者但必須功夫做到得成於忍方為真實通達真是菩薩耳何以故通者明通也即指解言達者到達也即指行言故通達云者即謂解行具足解行具足故曰真是菩薩也故不可將通達二字但作明理會也須知解固居行之先然非如法實行確有經驗何能深解前云行由解出解因行成二語即通達之真詮如是通達乃得成忍耳子次明由其不受須菩提以諸菩薩不受福德故流通本須菩提上有何以故句柳書慧本無之此中本有一故字已顯釋明上文之意何需加何以故耶曾見數家注解謂此科是釋上文功德勝前之故大謬上文已自説明功德勝前因其成忍矣何須更釋當知此科是以不受之義釋明成忍之故者耳夫成忍者所謂證也此科釋之云何以謂之證耶不受是也蓋成忍之言正是開示學人功夫必須做到如此方能無我故須釋明成忍之所以然若功德勝前原是帶筆何必特加解釋況前文已經説明耶云何不受下科方明其義今亦無妨説其要旨所謂不受者無他廣行布施六度若無其事之謂此非真能忘我者莫辦是其功行已到爐火純青之候故曰得成也諸菩薩非實有所指猶言一切菩薩以者因也意謂凡是菩薩因其修福不受方於無我成忍此菩薩亦復如是不受故曰成忍耳上文言所得功德此中言不受福德正明其因不受故所作福德盡成無漏之功德也上引事文中不曰以滿無數世界之七寶布施而必以等於河沙為言者亦寓精義蓋明自不受者視之如彼無數寶施等於泥沙耳其細已甚何足道哉此其所以能不受也若視為甚多甚盛便已心為境轉矣心有其境名之曰受今曰不受正明其心空無境也思之思之此亦欲不受不著者之妙觀也癸次明不著分二子初請明其義須菩提白佛言世尊云何菩薩不受福德長老請問蓋有三意一既已修之矣而又不受則初何必修恐不得意者生出誤會此請問之意一也二不受者謂拒而不納乎福德之至也因果一定之理豈能拒而不納然則何謂不受耶此請問之意二也三上言得忍由於不受然何以能不受耶長老請問意在俾大衆徹底明了皆能達於不受之地此請問之意三也故特標以須菩提白佛言句使知此問之要應於下科開示加意體會也子次釋明不著須菩提菩薩所作福德不應貪著是故説不受福德初句言作福德使知雖不受而應作不可因不受之言誤會修福可緩當知作福德即是修六度是從大悲心出諸佛如來以大悲心為體因於衆生而起大悲因於大悲生菩提心云何可緩乎第一重問意可以釋然矣次三句言不應貪著故説不受使知所謂不受者非拒而不納乃不貪著耳不貪著者福德之有無絶不在念之謂蓋明若為求福德以修六度是名貪著則是利益自己非為利益衆生非大悲心非無上菩提矣故不應也知此第二重問意可釋然矣作福德不著空也大悲也不貪著不著有也大智也悲智具足空有不著是名中道且著者住也不應貪著即是應無所住合之上句即是應無所住行於布施正是回映經初所説且修福不著亦即最先所説度盡衆生而無所度之意皆所以降伏我執者此經宗旨在無住降我故説至成證時歸結到無住降我上精神義趣一線到底一絲不紊也然則上文何不徑曰以諸菩薩不貪著福德故豈不直捷了當何故先説不受再以不著釋之當知上科説不受是開示云何而為成忍蓋成忍即不受之謂也大智度論云一切不受是名正受正受者三昧是也亦謂之定亦謂之忍然則不受之言乃成忍之注腳要語豈能不特特標出至於此科説不著則是開示云何而能不受換言之上科先告以成證之境界乃是一切不受此科復告以成證之方法不外經初所言應無所住行於布施也云何證云何修指示得極親切極扼要故不受不著兩説皆不可少且當知行人一切皆不應著逮至不著功醇便成不受故不受亦是一切不受茲不過約福德以明義耳蓋所以受者由於著所以著者由於貪所以貪者由有我而我之所貪莫過於福故約福德言之耳知此第三重問意可釋然矣總之平等法界本來一切法無我學人先當開此正知如是知已便如是行云何行耶最初所説應無所住行於布施此中所説所作福德不應貪著是也換言之便是廣修一切法而行若無事久久功醇則心若虛空雖一切法熾然行之不厭不倦而相忘於無何有是之謂不受不受者形容其一心清淨不染纖塵也且自然如是而非強制恆常如是而非偶然則悲智具足矣定慧均等矣分別執著之我相我見化除殆盡矣至此地位無以名之名曰得成於忍然此猶菩薩境界而非佛也故繼此而明諸法空相本來不生若至於一念不生不生亦無則隨順而入如來平等法界矣聞斯要旨當靜心思惟之辛次明諸法空相結成法不生向後經文正是點滴歸源之處故其所含之義甚廣甚深甚細若但解釋本文為文所拘必説不徹底又如何聽得徹底惟有先將所含要旨發揮透徹則説至本文時便可數言而了此亦講演高深道理之一種方法也上來所説千言萬語一言以蔽之曰無住而已云何無住所謂不住於相是也何故不住相所謂若心取相則為著我人衆生壽者是也當知欲不住相必須其心不取不取正為破我而破我正為證一如平等之一真法界此一法界即是常住不動之法身稱為如來者是也總之全經所説之義不外不取於相如如不動八個字不過直至最後始將此八個字點明耳以是之故此諸法空相一大科經義乃是融會全經旨趣而究竟徹底以説之者所謂點滴歸源是也故其所説更圓更妙即如全經皆説無我至此則説無我原無夫無我尚無則是無住亦無住矣不取亦不取矣何以故一切法本不生故且亦無所謂不生何以故法即非法相即非相故夫而後究竟無我矣無我亦無矣由是可知上來所説無聖無凡非一非異等義乃是即聖凡而無聖凡正一異而非一異忘其為不受而名不受故雖無聖凡而無妨成聖成凡雖成聖成凡而依然無聖無凡一異等等莫不如是則亦無所謂兩邊無所謂著無所謂中何以故一且不存那有兩更那有邊那有中耶非畢竟無也雖紛紛萬有而有即是無也何以故本不生故是之謂如如是之謂不動是之謂不取蓋生心不取即是取矣生心不動其心早動矣生心如如尚何如如之有耶生心除我則我見我相儼然也若不知向此中薦取縱令辛苦勤修終是打之繞添葛藤也總之此一大科所説正是極力發揮不取於相如如不動至究竟處即是引導學人觀照深般若處亦即令一切衆生得大自在處經文既眼光四射面面玲瓏聞者亦當眼光四射面面玲瓏未可死在句下隨文字轉當凝其神空其心字字句句向未動念處體會若沾滯一毫攀緣相名字相便無入處頃所言當向此中薦取不辭葛藤為重言以申明之標題曰空相者含有本無相不取相兩義蓋此一大科正是説理體亦正是説修功行人應先明了理體本來無相所以應不取相且體既無相故修不取者便時時處處皆應觀照諸法本來無相之理體是之謂全性起修全修在性然則欲學般若無住之行何必局定從頭修起哉便可徑從諸法空相起修也故曰當向此中薦取也當知大乘圓教亦有漸次亦無漸次故禪宗曰直指向上向上者趨向本源之謂直指者剪去枝葉一眼覷定本源處單刀直入是也若將此語看呆以為惟看話頭法門可以如是觀照而直入念佛及修其他法門者便不能作此觀照本源功夫自失善利孰過於此凡了義經無一句不徹底無一法不是徹首徹尾所以説理處即是説修處且一直貫到證果處所謂教理行果雖分為四然若執定是四件事豈非行果外別有教理尚何教理之足云以是之故了義經中語語能證道句句可入門也以彌陀經言之如執持名號一心不亂兩語固然説有前後執持句是下手處一心句是執持之功效然若不能體會一心以起修終亦不能做到執持也然則一心不亂豈可僅作功效觀之乎以此經言句句説理説修即無一句不可以貫通全經豈獨此一科為然故隨拈一句皆可從此悟道昔禪宗六祖因聞應無所住而生其心句而得徹悟後人乃執定全經中惟此一句最妙此正所謂隨人腳後跟轉也若真是伶俐漢知得大乘佛説是法印者便可隨拈一句以印之於事事法法換言之便是事事法法都向這法印上理會之如此方是會用功人則行住坐臥不離這個易得真實受用也何況此一大科語語説的是心源佛之所證證此也若以為此是如來境界非初學所及難道學人不應返照心源乎其為大錯更何待言夫返照心源固非易事然不向源頭上觀照而尋枝覓葉如何修得好源頭上能觀入些些一切修功皆可迎刃而解矣此如學為文字者然少得經子及秦漢人氣習下手便出人頭地修行亦復如是當如是知也古德云不可高推聖境自生卑屈真吃緊語也辛此科分二壬初泯相入體次結成不生壬初又三癸初約聖號明離去來次約塵界明離一多三約我見明離亦離癸初又二子初斥凡情須菩提若有人言如來若來若去若坐若臥是人不解我所説義諸法空相句是大乘法印不來不去等句莫非法印法印者一切法皆可以此義印定之之謂今不過約如來聖號明之以示例耳須知來去等皆是對待之事相欲證絶對體者必當泯諸對待空其虛相何以故一切法性本來非相故此約性體以明諸法本來空相也若約修功言諸法空相者謂空其諸法之相也即泯相入體之意如來本性德之稱乃此人執著來字則有來必有去矣既有來去復聯想到坐臥此明倘著一相必致愈引愈多萬相紛紜永永不得清淨以示讀經聞法不可著文字相也此人完全門外聞稱如來心中遂儼若有一來去以及行住坐臥等相相不一四若字形容其心逐相而轉起滅不停恍若有睹神情如畫作此言者是以凡情測聖境全未了解如來之義故曰是人不解我所説義我字指如來謂不解如來二字所明之義也亦可指佛佛所説法無往而非令人離相證性乃至語言文字皆不可執此人全不知性著於名言是於佛説之義毫無領會故曰不解我所説義呵斥此人不解正欲一切人深解空相之義趣也子次釋正義何以故如來者無所從來亦無所去故名如來如來即是法身法身常住不動無所謂來去也法身遍一切處亦無需乎來去也其見有來去者乃應化身耳此身是緣生法謂隨衆生機感之緣而生起者也換言之即謂此示現之身皆自衆生眼中視之云然耳如來固未嘗動也此之謂緣生何以明其然耶試思佛既示現矣衆生何故有見有不見何故有時見有時不見蓋得見與否皆視衆生之心如何心淨則佛現矣遂名之曰來心濁則佛隱矣因名之曰去心淨心濁全由衆生故應化身之隱現亦全由衆生故曰隨緣生起也然而有緣亦必有因其因為何前所謂慈善根力及成就二智是所以隨感即現并不起心作念所以雖隨方示現而若無其事法身之不動自若初不住於來去之相也然雖法身不動而恆常示現應化身從不斷絶亦不住於不動之體也是之謂如如不動明其雖如如而是不動的雖不動而是如如的故雖見有來去實則不來不去雖不來不去無妨見有來去此中曰無所從來亦無所去非謂畢竟無來去也是説來亦校亦舊版作也原稿作亦無處去亦無處兩所字最要無所者無處也形容法身本遍一切處豈更有來處去處乎既是來去而無來去之處可見雖來去而實未嘗來去乃未嘗來去而現有來去耳此意即是住而無住無住而住乃離相之極致何以故來去與不來去之相俱離故曰極致也總之來去是從不來不去上見不來不去是從來去上見不但離盡有相之相并離盡無相之相矣蓋真如實相本來如是真如者無可遣名真亦無可立名如也實相者雖無相而亦無不相也所以結之曰故名如來名者假名不但來是假名如亦是假名也何以故真如而曰來即謂其不住涅槃蓋真如之體本不動而今曰來然則所謂如者名而已矣實不住於不動之真如也既來矣而曰如即謂其不住生死蓋來去之相為生滅而今曰如然則所謂來者亦名而已矣實不住於生滅之來去也總以明其無我之極隨感斯應緣會則現毫無容心而已毫無容心者一念不生之謂也念且未生心何嘗動哉此科雖是約法身以明義實則二身之義亦已兼明善通達者便當返觀自己五蘊色身雖有來去而本具之佛性實不來不去便從來去皆不上契入彼來去之相何足置念哉逮至契入性體則任其來去現相可也更何必置念哉則不執不斷遮照同時矣念佛人尤當通達此理須知彌陀來接而初未嘗來也往生西方而亦未嘗去也然雖未嘗來去亦何妨現來現去何以故不來不去者理體也有來有去者事相也理事從來不二性相必須圓融故儘管不來不去不礙有來有去儘管有來有去其實不來不去最要緊者即是來去要在不來不去上體認不來不去即在來去上做出此是念佛求生之要訣得此要訣決定往生且決定見佛孰謂修淨土無須學般若且疑般若妨礙淨土乎更有要義須徹底了解者夫相依性而現者也性由相而彰者也性相二者一表一裏從不相離者也然則佛經令人離相何耶當知所謂離者非謂斷滅但不應取耳夫性相二者既是一表一裏而不能離然則獨不應取相何耶當知此因凡夫自無始來只知認相逐相而轉於是我人彼此高下厚薄精粗美惡種種對待之相迭起繁興牽枝帶葉相引愈多遂致分別執著因之而日甚我見因之而日深貪瞋三毒等煩惱因之而繼長增高乃至造業無窮受苦無邊今欲救之須斷三毒欲斷三毒須除我見欲除我見須不分別執著而欲不分別執著則須離相故離相云者意在除其分別執著之我見耳非謂畢竟離也故曰不取非法相又曰不説斷滅相即是顯示離相之真實義使不致於誤會也總之離相者為令回光返照以證性也性既證得正須現相然欲證果後不沈空滯寂又須修因時觀空而不偏空此所以既令不取復令不滅兩邊不著耳且佛理佛説無不圓妙雖只説不取相其實已通於性何以言之一有所取便成為相而非性矣故二乘偏於性邊佛則呵斥之曰沈空滯寂未能見性蓋曰沈曰滯即形容其取著之相也沈滯之相現不沈滯之性隱矣故曰未見性也所以不取相一語貫徹二邊當如是領會也至如此中不曰有來去亦不曰無來去但曰無所從來亦無所去雙照二邊尤為圓融何以故若定説有來去則偏於相邊矣若定説無來去又偏於非相邊矣今如是雙照二邊而説正顯性相雙融之義也性相雙融便是平等一如也又如如來一名雖以稱法身其實已含有二身不然來字無所屬矣所以即此名稱已足顯明雖有三數而非三體之義前約如字明義則通於諸法邊而曰諸法如義今約來字明義則通於不來不去邊而曰無所從來亦無所去此皆世尊苦口婆心教導學人於佛説之一切法皆當如是了解便能通達乎性相一如法界平等也何以故若了解得雖不來不去而現有來去可知法身常現報化等身而不斷絶所以修因時不應斷滅相也若了解得雖現有來去而實未嘗來去可知報化等身不能離法身而別有所以修因時不應執著相也了解乎此則前來不應取法不應取非法以及即非是名等義皆可徹底了然矣而若見諸相非相則見如來之義亦由是而通達矣蓋如而來即不滅相之謂也來而如即不著相之謂也而若見諸相非相者意謂即諸相而見其非相便是不著不滅便與如來之義相應故能見如來也且如而來乃是不著時便不滅來而如乃是不滅時仍不著所以不住涅槃不住生死是同時的是一無所住的故行人應生無所住心若心有住則為非住也若能如是了解而通達之則性也相也一切分別一切執著自然化除自然無念自然無有罣礙顛倒故曰行深般若波羅蜜多時能度一切苦一切行人若領會得此科之義應觀一切對待之相既不能離絶待之性而別有而絶待之性亦未嘗離對待之相而獨存便當於日常一切對待之事相上雖無妨隨緣而行卻不可隨緣而轉此意即是緣應了者得機便了不與糾纏緣應結者亦無妨結但不攀緣果能如是二六時中勤勤觀照密密勘驗心把得定腳立得牢自不為相所縛而泯相入體矣此是學人第一著功夫便是隨順真如便是直指向上所謂泯相者泯是融義非謂斷滅即不著不斷是也所謂入體者謂契入性體相融便是契體非別有體也何以故性體本來無相無不相故是之謂諸法空相空乃第一義空即是空而不空不空而空所謂但空其相而不壞諸法果能如是則任他萬相紛乘自不為其所動以上所説皆是從此諸法空相起修之方便有深有淺其法不一而仍可一貫且所謂淺者亦無淺非深不可聞其淺而忽之也聽有緣人隨己意取行之大有受用決不相賺癸次約塵界明離一多分二子初明微塵非多次明世界非一子初又三丑初問微塵多否須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不微塵世界前雖已説然此科文中重在碎合二字因其可碎可合足證微塵世界之相皆是緣生當體即空而法性中本無此等等相讀去聲別也故雖不斷滅而不可執著耳蓋前來雖屢説即非是名皆只説了是相非性之當然今約塵界明其可碎可合則是徹底説其所以然此義既明一切説即非是名處可以類推矣以三千大千世界碎為微塵即此一語便是點醒愚癡凡夫勿執世界為實有也何以故以偌大世界而可碎足證世界是虛幻相豈實有乎若其實有豈能碎乎所謂碎者是明世界乃無數微塵集合之相除微塵外別無世界發菩提心者應作如是觀觀照世界莫非微塵不可執為實有非真捶而碎之也上曰善男子善女人即指發菩提心之人言也於意云何探驗見地之辭也若知微塵之衆多是由世界碎成則世界之為假有也明矣然若執有衆多是又誤認微塵為實有也當知世界微塵大小雖殊無實則一佛説碎界為塵原欲破人執實世界之見若塵之非實不明則界之非實終不能徹底盡明蓋世尊本意是欲人徹底了解世間所有大至世界小至微塵莫非虛妄當體即空不可執著不必貪戀故須探驗見地如何也此中碎字與下文合字此中衆多字與下文一字遙遙相對正是文中之眼正欲人於此中領會真實義也丑次明多即非多甚多世尊何以故若是微塵衆實有者佛則不説是微塵衆流通本甚多上有須菩提言句古本無之答甚多者約微塵之虛相言且表示其已能了解世界之非實有也一世界不過多微塵耳豈實有世界耶更表示其復能了解微塵亦非實有何以故下釋明此意意謂世尊先説世界碎為微塵乃探驗見地時則云微塵衆特特加一衆字衆者集合之義也然則微塵亦為集合之幻相也明矣則與世界之為集合而成之幻相何異可知其亦非實有矣故曰若是微塵衆實有者佛則不説是微塵衆也由此可見甚多之答正所以顯其為集合之幻相耳故曰答甚多者約虛相言也須知界碎為塵其數之多誰不能知何必問哉足見問意著重在衆字而此意恰為長老窺破是之謂心心相印所以為般若會上當機人所以能代教菩薩古德勘驗學人往往故設疑陳亦是此意微塵何以為集合之相耶所謂一微塵可析之為七極微塵一極微塵可析之為七鄰虛塵虛者空也鄰虛猶今語之等於零也所以微塵是集合之幻相并非實有長老何不徑舉此義説之而必在衆字上顯其非實者何故此有深意二一因佛既如是説故依之以明義依佛語以明義者所以教導讀經聞法者凡佛所説字字皆具精義應當諦聽不可忽略一字也二佛時外道每將世間事物層層分析分析至於不可分而猶執為實有正如今之化學家然分析世界各物為若干種原質初不可分者久久又復可分分析之功久而益精至如所謂原子電子然依然執為實有也二乘則不然知微塵可析為鄰虛便知一切皆空然而必待分析方信為空不及大乘之能作體空觀也今長老欲明微塵非實不引鄰虛之説而約佛説之衆字顯義者既以明凡由集合而成者便知是空不可執實佛道所以迥異乎外道且觀理便知何待分析大乘所以迥異乎二乘也所以者何下正明此義丑三釋其所以所以者何佛説微塵衆則非微塵衆是名微塵衆此科之意若曰佛既説為微塵衆可知微塵是緣生法緣生之法當體即空但是虛相而已此微塵并非實有之所以然也則非者約一如之法性明其本來是空也是名者約緣生之法相明其不無假名也言佛説者正所以顯示覺智洞照法性本空法相皆幻初何待乎分析哉總之碎者聚之之謂合合者散之之謂碎本是對待形成之幻相所以當其有時便是空時小而微塵可合可碎有即是空也如此則大而世界可知矣故下復約大者言之蓋佛先説界可碎為塵復舉塵而問其衆正欲人之即小悟大因微塵之本空便可類推而知世界皆空耳子次明世界非一分三丑初明非界名界世尊如來所説三千大千世界則非世界是名世界此科承上問意來也上問既言界非界而為塵長老復釋明塵非塵而為空則界即是空可知矣故曰則非世界是名世界其故詳見下科此中不曰佛説而曰如來説者有深意焉蓋三千大千世界名為應身教化之境者因此境為一切衆生所依法身如來為利益一切衆生乃隨順衆生之緣顯現應身以教化之耳初不住著於此境也何以故如來法身遍於法界法界等於虛空安有所謂三千大千世界乎哉故舉如來説世界非實是名也如是而説者正所以開示衆生應觀世界非實是名而不著世界不著則一切不著矣如是不著乃能令本具之法身出障也此不曰佛説而曰如來説之深意也丑次釋一即非一何以故若世界實有則是一合相如來説一合相則非一合相是名一合相流通本作若世界實有者柳書無者字慧本則作若世界有實有實實有意原無別今從柳書以校正本一一皆依柳書故也一合者合而為一之謂猶今語之整個也蓋執著相者雖聞界可碎塵或猶以為雖非實有然當其未碎時其合而為一之相固明明有也何以故世界原是總名既立總名便是一合之相故長老為遮此執所以徹底破之意謂頃言則非世界是名世界者何故耶以凡屬名相莫非虛妄故曰則非則非者謂世界但假名非實有也不但因其可碎知非實有即其未碎亦非實有何也千倍四洲名小千世界千倍小千名中千世界千倍中千名大千世界可見世界之名相原無一定範圍不但合者可碎并且合更可合安可執有一定之一合相乎故曰則非一合相是名一合相言其不過假名本來無實也意明必須實有方是一合相今一合相既無一定是約世界之名相觀之便可證其非實有何必待界碎為塵塵碎為空哉則世界之為當體即空彰彰明甚丑三示本離言説須菩提一合相者則是不可説但凡夫之人貪著其事讀上來非多一科可知合之名因其可碎而後有且知碎者仍可碎也則諸法性空之義明矣讀非一一科可知碎之名原因其合而後有且知合者仍可合也則諸法緣生之義明矣且合而觀之雖是性空而不礙緣起因是緣起故知其性空然則所謂一合相者乃是一不定一合不定合故曰一合相者則是不可説不可説者因世界可碎微塵亦可碎可見微塵不異世界若説世界真是一合豈非微塵亦真是一合然而世界非世界乃微塵也而且微塵非微塵乃本空也由是可知世界之一合相亦復本空豈非一即非一合即非合耶此約相以明不能定説非一合定説真一合故不可説也夫修行本為證性如上所明一即非一合即非合約對待之事相云然耳約清淨性言則都無此事何以故性是絶待非對待本離名字相言説相故此約性以明性非事相本離言説故不可説也凡謂凡情迷於事相謂之凡情故曰凡夫之人貪著其事其事泛指一切事相一合相亦攝在內言其者明其向外馳求背覺合塵也而言凡情者明其非正知也因其向外馳求故於事相起貪戀而生執著然則欲不貪著須淨凡情欲淨凡情須開正知也明矣當云何知當知一合相便是不可説謂當離名字言説返照一切法本不生也故此科開示入道之方極其親切不可但作空談事理會也且其義貫通上下上科之無所從來亦無所去故名如來下科之我見即非我見是名我見皆當於不可説處領會不可貪著其事也如此方為能解如來所説義方於一切法本不生之心源得以隨順契入故此科正與下結成不生一科緊相呼應也上説非多非一兩科不但破世界兼破微塵此中説凡夫貪著但約一合相為言是但説世界而不説微塵矣何耶此有二義一上説微塵非實有是約衆字顯義此即顯示不但世界為一合之假相微塵亦為一合之假相也故此中不可説之一合相乃兼約世界微塵而言非不説微塵也非但説世界也故佛不提世界微塵但舉一合相説之者意在於此當如是知也二但舉一合相説者意在破斥世間所有大而世界小而微塵莫非假合因凡夫之貪著無非誤認假合之相為真耳塵界如此色身亦然凡夫所以貪著臭皮囊執之為我者無他由於不知是五蘊假合耳若知除五蘊外無此色身便不致於貪著矣此佛但舉一合相説之之微旨也蓋破依報即兼以破正報也當如是知也此約塵界明離一多一大科中含義甚廣今校今舊版誤作令原稿作今分數節略言之一塵界既非一非多可見塵界亦非總非別蓋乍視之世界為總相微塵為別相以界是總相故遂誤認為真是一合以塵是別相故遂不知其亦是假合其實界可分碎則總即非總矣塵亦假合則別即非別矣二説非一非多即是説不增不減也蓋約體積言則界相若增塵相若減而約數目言又界相若減塵相若增可見增減並無定相則亦是假名亦是虛幻直是增減皆不可説故曰不增不減不增不減一語即謂增減不可説也他如不生不滅等句皆同此意總之明得界非界塵非塵之義便恍然於世間所有大小高低來去一多總別增減賢愚淨穢等等對待之名相莫非虛幻當體是空若明得諸法本空便會歸於性而諸法一如矣而是法平等矣此為諸法空相之要義解得此義便可事事作如是觀觀照功醇便可證無生忍而泯相入體矣不可不知三上明離去來一科是約三身以明性空緣起之義也蓋來去緣起也不來不去性空也是約正報明也佛之正報明則一切衆生之正報皆當作如是觀也此明離一多一科是約塵界以明性空緣起之義也蓋塵界非塵界性空也是名塵界緣起也是約依報明也大千世界為一佛教化之境亦即一切衆生色身依託之境色身所依之境是名非實則由此身此境生起之一切事相皆當作如是觀也何以言之正報依報為衆生所不能須臾離者尚且虛幻無實則一切盛衰苦樂稱譏毀譽種種對待之事相其更為虛幻非實可知何足貪著哉此經文約三身世界以明諸法空相之微旨也何以故約此二以明義一切事相賅攝無遺故四約身相界相言則身為能依界為所依而約聖之法身凡之佛性言則性為能起身界為所起須知此清淨性本無來去一多總別增減但隨緣現起來去等相耳因相是隨緣現起故是虛幻而性乃本具真實之體故儘管隨緣現起種種對待之事相而絶待空寂之本性中仍未嘗有彼種種相也其他一異聖凡生滅垢淨人我彼此等相莫不如是果能如是一眼覷定本不生之心源上觀照入去便是所謂直指向上則胸襟當下開豁煩惱當下消除顛倒夢想當下遠離如此用功方是直下承當可稱善用功人較之枝枝節節而為之者其功效之懸殊所謂日劫相倍豈止一日千里而已故圓覺經曰知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世衆生依此修行如是乃能永離諸幻此段經文所説正可移作本經注腳正是直指向上之修功云何修知幻即離離幻即覺是也知者解也亦即覺照也幻者如上來所説身界等等是名非實是也云何即離一眼覷定心源觀照入去則諸幻皆離矣蓋知幻便是離也如是覺照便合於覺故離幻便是覺也此為一超直入圓頓要門有何漸次一切法門無方便於此者矣何必更作方便觀如是乃能永離諸幻句可知必如是修乃為徹底乃能究竟聞者當生希有難遭之想也五此外又有一義為無著菩薩説亦宜知之其義云何則以塵界非一多一科為喻説以喻上科之義也世界之一喻報身是一微塵之多喻應化身多塵界非一非多喻二身非一非異但法喻有不齊者世界非離微塵而別有也而報身并非離應化身無別有當知凡是喻説只能喻其大體不能一一恰合如經中常以日光喻智光此不過因世間之光惟日光最大最遍最有利益故取以為譬耳其實日光依形質生且熱何能與并無所依而且清涼之智光相比乎故未可因無著之説法喻不齊而少之也塵界現有一多喻二身現有去來而約性言之本無一多之相故亦無來去之相又約性相合而言之雖本無一多不妨現有一多雖現有一多其實仍無一多以喻雖本無去來不妨現有去來雖現有去來其實未嘗去來但凡夫貪著一合之事相喻凡夫貪著去來之事相也無著論曰為破名色身故説界塵等名色身謂二身也意謂佛恐聞上義不了故更説界塵之喻以破之今為疏通演暢其義而説之者以便讀其論者可以融會耳由此可見佛説一句法包含無量義故可作種種釋故謂之圓音所以見淺見深各隨其人古今來多有學圓頓大教而竟説成別教甚且有走入人天教者其故在此所以説醍醐可變毒藥又説圓人説法無法不圓邪人遇正法正法亦成邪所以大乘經中教導學人以親近善知識為要圖以開正知見為根本也癸三約我見明離亦離分二子初問答明義須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不世尊是人不解如來所説義世尊上流通本多不也二字不應有也故唐人寫經中無之試看下文不解句説得何等堅決其上豈能加不也活句若非活句而是呆句者既與前來義不一律且不解一句義已顯足何須更用不也呆句以明其義耶當知本經無一贅句贅字也即此便知妄加不也者全不明經旨矣此科經義極深何以故全經所説皆是破我何以人言佛説我見反為不解義耶或曰此人蓋疑佛説此言必是心有此見故曰不解此説大謬無論何人斷不致懷疑佛有我見縱令果有如是妄人懷此妄疑則若人言之下當有佛作是念句而今無之足證其説之謬然則云何不解耶當知開經以來屢言我人四相不可有有之便非菩薩又讚歎無此四相者得無量福德更令菩薩通達無我法且曰知一切法無我得成於忍功德殊勝然恐凡夫因佛如是反覆申説遂執謂我見等真實是有此見橫梗於心正是我見豈非反加其縛耶即不如是而能漸漸除我亦非佛説此甚深般若之義也何以言之此經於一切法屢説即非是名以明相有性空之義者意在令人觀照本空頓得解脫也在利根者自能聞一知十悟知我見等亦復相有性空則單刀直入直下可以斷其根株乃今曰佛説我見等其偏執於有相邊未能通達我人等等之見亦為本空可知故曰不解如來所説義也佛約相言如來約性言上曰佛説我見繼曰不解如來所説義正顯此人於我見等但知相有之義未解性空之義也如是則我人等見永不能除矣古德有請師解縛者師曰誰縛汝此科經文正明斯義當知性體空寂本無有縛今橫一我人等見於心且曰佛亦如是説豈非作繭自縛乎故我世尊特與長老興無緣慈起同體悲説此一大科經文為令一切衆生直下洞徹本來無我無見之心源得以究竟解粘去縛耳然則此科經義關係之要可知矣其義云何且聽下文子次釋成其故何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見經中凡言是名皆是約相説即是約緣起義説凡言即非皆是約性説亦即約性空義説也須知佛説我見人見衆生見壽者見者意在令人領會我人等見皆為緣起之幻相耳若能知幻即離我見在甚麼處且意在令人領會我人等見本非空寂之覺性耳然則離幻即覺離我見又在甚麼處此佛説我見之真實義也今曰佛説我見而不知其他言下大有耿耿在心之狀即此便是執實本欲令其破執今反添一執我見云何能離乎即令能離而存一能離所離之念即此仍是我見根株又何能盡拔乎故曰不解如來所説義也言此人不解者正令學人應向本來清淨無我無見之心源上深深領解耳此中不曰佛説如來説特特曰世尊説者尤有精義曰佛則偏於相邊曰如來則缺於修邊此中之義正令人覺照本空之性以起修耳而世尊則為十號之總稱佛如來之義皆攝在內故特舉之以顯義意謂此中之義是十號具足者傳心祕要世尊所以為世共尊者正在於此必依此義而修庶幾得以因圓果滿而成佛修圓性顯而證如來也乎何以故我見是無明本為成凡之由破我見是智慧光乃成聖之路而此中所明之義則是破除我見之金剛慧劍可以斷絶根株非依此法我見不易除除亦不能盡也總之此中所説正是的示修功若但作玄理會孤負佛恩莫甚於此上次言即非我見是名我見不可僅作觀空之道理會乃的示破除我見的頂上修功而言及修功復有極要之義不可不先明者向來似無人剖晰及此茲當逐層詳辨一一分清則不但本科本經中之修功得其要領凡一切經中所説之性修及修功之類別皆不致於不得頭緒而執性廢修因事妨理種種弊病亦庶乎其可免矣佛説一切法不外兩義明性明修是也且一句法中説性必兼有修説修即攝有性若不知如是領會其於佛法終在門外夫性者理性也修者修功也理性當於差別中見平等修功當於平等中見差別何謂當於差別見平等耶謂當知佛之開示往往約一事以明理而其理實貫通於一切事若聞法者不知如是貫通是只見差別而不見平等豈能觀其理而會於性乎性平等故理必平等即如本經説即非是名處甚多聞者便當領會其中道理原無二致蓋凡言即非皆是約理體之性以明本空凡言是名皆是約緣生之相以明幻有凡即非是名並説皆所以明性相不一不異也如是而説意在使知欲證法性者其對於法相也應明其非一而不執著復應明其非異而不斷滅耳故此理非差別的乃平等的換言之非一法然乃法法皆然即是無論何法皆應明了此理兩邊不著銷歸平等之性體是也若約即非是名之義以論修功則大有差別不能因理性是平等的遂爾儱侗顢頇視同一律也若其如此勢必將佛所説之義但作空理會以為此不過令人一切觀空耳因其不知細心體認平等中之差別自然無從著手故不知其是的示修功也或者因不知是指示修功遂以為此乃如來境界豈我輩所敢妄談所以怕怖般若者又甚多多本經所以從來多只説得相似般若者實由於此又其甚者則一法不修我見亦不除反而自鳴得意曰吾學般若所謂狂亂正指此輩如是等病皆由其於性修之關繫及修功之類別換言之即是於平等之差別差別之平等未曾細辨分清使然此今日所以不得不細剖之詳説之也修行功夫其類別多不勝説然可概括為兩種一觀門亦名理觀一行門又名事修理觀者即依佛説可以貫通一切之理性而加以深切之體認嚴密之覺照如是乃能運用之於行門焉由是可知所謂理觀者雖是理而已見於修雖是修而尚屬於理故若視理觀為緩圖非也若視為修此已足亦非也伊古已來犯此病者不知幾許總之作理觀必應兼事修行事修必應兼理觀缺其一便不足以言修功矣事修者如布施持戒乃至看經念佛一舉手一低頭無論大小精粗凡見之於動作行為者皆是其修法須就事論事事有萬千差別修法亦因之而有萬千差別如禮拜有禮拜的法則唱念有唱念的法則豈能一律耶不但此也理觀既通於事修故修理觀時不但應依上説之理性觀其平等之理且應依所修之事類觀其差別之理若但知觀平等不知觀差別或但知觀差別不知觀平等則亦等於盲修也已當知性也修也修中之理也事也既不能看成兩橛又不可混為一談須體認其不一中之不異不異中之不一乃能性修不二理事圓融蓋須圓融中有行布行布中有圓融方為真圓融真不二則無修而不成矣此為學佛第一要件若於此等處未能體認明白則似是而非決無成就即如即非是名有約六度言者有約莊嚴佛土言者然莊嚴佛土正指修六度行説可與約六度言者視同一類又有約三十二相具足身相言者有約世界微塵言者皆境相也然雖皆境相若細別之不能視同一類也蓋三十二相具足身相等因修福慧乃成世界微塵不必修也故界塵無事修之可言但作理觀觀平等之理性空有不著可矣若三十二相等當歸入六度之類一面觀其幻有本空之理性一面更觀六度為自度度他要門身相佛土皆接引衆生所必不可無雖為幻有本空但不應執著耳萬萬不能斷滅其事其運之於行事也則須依照幻法勤修不怠所謂啓建水月道場大作夢中佛事惟心中不存一能修所修而已此約即非是名之義以行六度等之修功也若夫我見則大不然蓋六度等是應當成就之事我見等乃應當銷除之事正相反對故觀其幻有本空平等之理性雖與修六度同而就事作觀則應觀其全非性有只是假名心中固不可存一絲之我一絲之見而運之於行事也則應遠離幻有之名相深照本空之心性此約即非是名之義以除我見之修功也知此則凡無明煩惱等一切應銷除之事其修功可以類推矣當知我見根深蒂固今欲除之非依此中所説之修功必不能除茲先説其概要概要既明乃可逐層深究因此中修法其理極細故也何以言欲除我見非依此法不可耶其理前來雖已説了誠恐尚未洞明茲再換言以明之譬若有人於此能知我見之害發心除之然若心中看得我見難除便已執我見為實有則既橫梗一我見實有之見在心又橫梗一除我見之見在心縛上加縛我見云何可除何以故但使心中微微有一能除所除在依然是見依然著我故也故我世尊特特於此教以直照本來無我無見之心源則不但我見無即無我之見亦無於是乎我見之蹤影全無矣直捷痛快孰逾於此不慧何敢自謂能除我見然於此事曾有長時不斷之體驗觀照其中曲折隱微略明一二深知此中修法妙而且要耳今欲諸君能頓得益且不敢孤負此科經文謹就我所能領會者將經中所明修功曲曲宣揚俾有心人徹底了解般若法門或可由此大明於世乎此則區區之本願也然而義味淵深説既不易若非靜其心沈其氣亦必不易領會望諸君善思惟之今先約即非之義窮源竟委明其為除我見之絶妙修功夫我見者所謂無明本也當知清淨自性原無無明然而凡夫以不達一真法界故遂自無始不覺自動以至於今其心中自內達外無非黑漆漆的無明本具之性光早已隱而不現矣所謂不生不滅與生滅和合名之為識是也既然全體埋在黑漆桶中無一點點光明説不執著亦是執著令其觀空而所觀者正是識情而非性空也故即非我見一語并非但令作觀觀照性空乃是教令振作精神毅然決然極力將我見等一腳踢翻從根本上不承認自性中有此我人等見即非二字當如是體會是為第一步勝妙方便前云全體在無明中説不執著亦是執著然則説不承認仍舊為識情用事可知何以稱為勝妙方便耶當知凡夫從無始來認賊為子久矣今蒙佛誨乃得知其為非而肯不認既知且肯便是不生滅與生滅和合者大現裂痕即此便是從無明壳中有一線之智光發現便是始覺便是背塵合覺之第一步非勝妙方便而何總而言之膠固已久之物若不如此先與決裂豈能遽得脫離故文中即非二字大須用力非僅僅作如是觀已也問如是覺照和合者便大現裂痕誠然然不過僅現裂痕而已而欲無明之無尚應作何方便答即用此法無明當下便無不必更覓方便故曰知幻即離不作方便也不然何妙之有當知自性清淨雖有無明我見等妄念紛紜而其自性則常恆不變清淨自若因自性是真實體無明是虛幻相一真一妄雖無始來和合為一實則表合裏不合本不相應譬如涇渭分明各不相涉也此理惟證究竟覺之佛如來方能徹底知之故大乘經中常説此理開示凡夫以一切凡夫皆日用而不知故而圓覺經開示此理最明曰此無明者非實有體如夢中人夢時非無及至於醒了無所得夢喻衆生之迷也醒喻行人之覺也學佛人首須信此所謂信為入道之門者即謂篤信佛説之理入道乃得其門因此理凡夫初未嘗知今雖知之若非真修亦難遽了若無信心那有入處故聞得即非我見便當徑向本來清淨之心源上契入徑向者謂撇去一切不顧孤另另地直向未動念處覺照也此如向來認賊為子久已喧賓奪主今幸而知其是賊豈可復加顧盼與之糾纏更不必憂其勢大難除若其憂慮反張彼焰要知彼本無根向之勢力全由自己信任使然今知其非不加信任彼即無從施展便當服從歸化矣何必畏之哉此是除妄第一要著勿忽故圓覺經曰知幻即離也知字最妙知者即是覺照果能覺照見即冰銷譬如鼠子覬覦暗陬如被覺照彼自逃去此亦如是蓋同時不能起二念妄心之起即由正念之鬆正念振興妄念便無乃自然之理并非奇特故曰即離當知即離與知幻初非兩事也此是除妄最直捷最扼要之方法不可輕視時時如此覺照不少放逸我見從何而起耶即起力亦甚弱久久功醇則自然不起矣此即非我見之修功也有應補説者凡夫之人無始不覺妄念未曾暫停今欲知幻覺照須修前方便不然何從知其為幻而覺照之乎譬如久居鬧市晝夜喧聲不停並不覺鬧若在清間之地少有微響便爾覺得此亦如是必先堅持禁戒以絶染緣多讀大乘以明佛理令此中略得安靜俗見漸能減輕乃能知幻乃能覺照耳即非我見本經説在最後者亦是此意然而説雖在後修應居先若於除無明我見方法未得要領則開經以來所説之性修理事何能徹底照了則皆不得其要領矣此理更不可不知也是名我見等之修功尤要尤妙若但知即非而不知是名我見又何能盡淨望諸君且先將即非我見之義體認一番再聽是名我見之義聞法要在字字從心中深刻的體認體認不然聞如不聞何益之有今將宣揚是名我見之修功矣或問本經凡言是名皆明不斷滅義而我見乃應銷除者云何通耶前説即非之修功為毅然與之決裂以破其膠固之情吾已知其妙矣今曰是名亦為絶妙絶要之修功豈既與決裂又與拉攏耶答非此之謂也前云事有差別修功即因之而有差別正指是名我見句而言汝既知我見是應銷除者奈何又以應成就之理觀事修與此混亂而作戲論耶當知是名我見之義是明我見為真性變現之幻相所謂銷除并非斷滅本性乃是但除其病不除其法一也且明我見是緣生法心若攀緣我見便隨緣而起若心不生我見即無從生所謂知幻即離離幻即覺二也此二義極要極要除我見之修功莫妙於此若不依此永不能除恐猶未了當更詳談諦聽諦聽先明初義我人等見即是分別執著所謂六七識是也識非他物即是真性以不覺故隨染緣現起之染相所謂不生不滅與生滅和合者是也今觀即非之義與之決裂者乃是不與和合使彼銷化於無形耳彼若銷化所謂分別之六識即是妙觀察智執著之七識即是平等性智何可斷滅乎一切凡夫向苦不覺不知為識誤認其是真性耳故曰認賊為子須知此賊原非外來乃是家賊且為主要人物今與決裂意在令其改邪歸正耳譬如獨養之子因不務正而不承認意實望其回頭若竟永永擯棄則家亦毀矣此亦如是不可因惡無明我見投鼠不知忌器走入灰身滅智之途外道之無想二乘之沈空滯寂皆坐此病殊不知既偏於空心仍有取若心取相則為著我人衆生壽者其我見又何嘗能除乎更明次義觀初義中所説初因不覺認無明為真性然則今既知之而不承認可見即此一念正是覺矣故圓覺經曰離幻即覺亦無漸次也先觀即非之義既能知幻即離但須繼續此知遇緣而心不起則一心清淨矣此所以離幻即覺也所謂離者即不起之意初雖不無強制久久功醇便自然不起至於自然不起我見便究竟清淨當知此義是明不起便驀直不起換言之不起便得更不必加以辨別是否不起何以故辨別即是攀緣故是其心又起矣此即無明此即我見總之除妄之功貴在一刀兩斷少加顧盼便是藕斷絲連大忌大忌此義圓覺更有八句經文説得極為徹底可與本經互相發明經曰居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實此八句經自古至今各隨見地言人人殊茲為徹底説明其義不作一蒙頭蓋面之語當知八句之中初兩句為主即不起二字為主也下六句是展轉釋義以説明不起之所以然者謂必如此方為真不起也總之下六句不但是初兩句注腳且正是離幻即覺之絶妙注腳耳妄心即是妄念正指分別執著等無明言當知妄心非他本是全真隨染而現何可息滅不可誤認不起念為如稿木如死灰也離幻即覺則全妄是真矣何必息滅哉若其息滅則是玉石俱焚非不起之真實義也故曰於諸妄心亦不息滅復不可誤會不息滅為住妄想境也當知唯識無境妄想既不起矣安得有境安得有住蓋離幻即覺則一切皆空矣何必再加了知其是否住境耶若加以了知則是頭上安頭念又起矣何云不起哉故曰住妄想境不加了知更不可誤會若一無了知豈非落於無記當知既不息滅非同稿木死灰故念不起時便靈光獨耀迥脫根塵所以説離幻即覺蓋覺者真實性也何必更須辨認是否真實若其辨之是又庸人自擾尚得謂之不起乎故曰於無了知不辨真實此六句總意即是發揮彼經上文有照有覺俱名障礙之義者耳此經是名我見之義亦復如是夫我見既是緣生可見自性中本來不生不過隨緣而起之幻相耳然則我見者其名也真性者其實也今既知其原非真性之體乃是幻相而直照本來未生幻相之心源則假名何在幻相何存學人應當如是用快刀斬亂麻手段一刀兩斷則妄緣不起不起便得亦無所離亦無能離亦無所照亦無能照因彼離也照也亦皆對待緣生之假名幻相清淨自性中本來皆無故若既知其即非而離之矣又皇皇然辨其是否已離或欣欣然自謂能離是仍執以為實有而於是名非實之義猶未洞明之過也此即法執此即我見故善用功者必須一離到底斷則頓斷此是名我見之修功也觀上來所説可知此科所説修功妙極要極何以故圓覺經又有要句曰一切諸佛本起因地皆依圓照清淨覺相永斷無明方成佛道此中修功正是圓照清淨覺相故能無明我見一斷永斷豈不妙乎豈不要乎向來皆將此科只作空理看過大誤亟當如是知之更不可徒知而已如入寶山空手而回也亟當依此起修便得受用當知真性久為無明我見所障非破此障何能見性若不見性豈能超凡入聖不但此也開經便令發大願起大行意在破我也然而我見根深若絶不剋從破我上用功大願大行亦未必遽能發起觀本經以大願大行起以破我見結首尾相應正是指示成始成終超凡入聖之道盡在於此當如是領會雙方並進也此外猶有要義不可不知者蓋此約我見明離亦離一科即以顯示不垢不淨之義也初科明不生不滅次科明不增不減此科明不垢不淨合之以明諸法空相義與心經正同我見垢也離我見淨也然曰垢曰淨猶為對待之相而清淨自性之淨乃是絶待絶待者垢淨俱無是也故離我見者離亦應離若存一能離所離仍落對待相中而非絶待之性矣則我見終未盡淨也是以本科教令破我不可枝枝節節為之當徑向一念不生處契入則我見之垢既為假名而本無於是離我見之淨亦復遠離矣何以故既無垢那有淨垢淨俱離是真清淨諸法空相下三科初科是約身明義次科是約世界明義此科則約妄心明義我見者妄心也合此三科正是顯示身心世界莫非幻化一切空相性自平等之義也又復凡夫執身為我執世界為我所我及我所皆起於見也故身與世界是所執見是能執而三科之義則是顯明能執所執之相俱空並能空所空之念亦空是之謂諸法空相亦即發揮不生法相法相本無之義也故下科即以不生法相云云結束之全經千言萬語無非為破我人四相而相起於見至此則説明我見等為緣起假名本來性空此義正所以總結全經也蓋説此經原為破我今將破我發揮至究竟處便是全經諸義之總匯處也上云菩薩通達無我法又云知一切法無我得成於忍至此更窮至徹底何以故向不生處契入則我見本無豈先有我而後無之又豈有所成之忍耶菩薩應如是徹底通達乃究竟無我究竟成忍耳故下科以發無上菩提心者於一切法應如是知見信解不生法相法相本無為結菩薩即是發無上心者通達即是知見信解其義直貫至經初經初所言應如是降伏其心但應如所教住者無他為令證一切法相本來不生耳於是全經之義收束得點滴不漏圓滿無餘壬次結成不生分二癸初正明不生須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相發阿耨多羅三藐三菩提心者正與經初諸菩薩摩訶薩句相呼應即謂發大心之菩薩應如是知見信解也開經以來所説發廣大心起廣大行不取法與非法之相乃至發心不住説法不住得果不住不住亦不住無非令其知見信解如是如是蓋必如是知見信解方為通達無我法故曰應如是知見信解也後半部開章以來但説發菩提不説心字者所以遣其執著此是菩提心之見也苟執於法便落我人四相便非菩提心故應遣也至此則諸法空相矣菩提心現前矣故此處不曰發菩提而曰發菩提心矣應如是知見信解不生法相云云正所以顯示發菩提心必應如是如是乃為菩提心即以結束前來遣蕩不住發心之意在令開如是知見起如是信解不生法相云爾豈令不發菩提心哉得此一結前來所説者義蘊無不畢宣氣脈一齊貫通精神極其圓足譬若畫龍點睛飛去矣以文字論亦神妙之至一切法通指世出世境行果而言凡上來所説色聲香味觸法身相三十二相乃至世界微塵之境布施持戒等大願大行以廣度衆生莊嚴佛土乃至離相離念離我見之行生實信生實相成就第一希有最上第一希有以及得福德得功德得成忍名須陀洹乃至名菩薩名諸佛名阿耨多羅三藐三菩提之果一齊包舉在內如是二字即指上來所説種種義上説諸義不外緣生性空而最後究極無住以成證一大科中初明平等法界顯成法無我一科所以究極性空不礙緣生之義也性空不礙緣生故成平等之法界次明諸法空相結成法不生一科所以究極緣生不礙性空之義也緣生不礙性空故即諸法而空相由是觀之如是二字之意味即顯諸法一如一切皆是因其皆是一如故知見信解如是者不生法相也不然法相并不斷滅何云不生哉可見不生云者正從如是出非以畢竟不生為不生也故下文即以即非法相是名法相表示之當如是知如是見如是信解也是之謂無上覺心細意參之知見解三字字義原無大別然三字連説則意各有指大有區別未可儱侗視之佛經中此類句法頗多皆當如是辨其意味知其所指切不可不求甚解忽略過去甚至以為語言重復則大誤矣然則此三字何指耶嘉祥謂知是世諦智見是第一義諦智達天謂知是比量見是現量今謂宜依無著論論云智依止奢摩他故知依止毗鉢舍那故見此二依止三摩提故解此義是明三者皆智但以依止方便不同故立三名奢摩他此云止止者定也智從定生名知觀此是知為真諦智矣定則萬緣俱息了了證知故曰知也此與本經前以三際心不可得諸法緣生即空開佛正知之義恰合也蓋知約內證邊説也毗鉢舍那此云觀觀即是慧智從慧出名見觀此是見為俗諦智矣慧則差別事相無不洞見故曰見也此與本經前以五眼是沙不執一異開佛圓見之義正同蓋見約外照邊説也三摩提此云等持謂定慧均等也定慧均等名之曰解可見解是由定慧出亦即知見二者之總名耳此亦與前深解義趣之言義同長老本得無諍三昧定力已足但慧未均等逮聞甚深般若智慧增上故能深解長老涕淚悲泣正自愧其向來定多慧少今幸聞深經而得定慧均等所以感極而泣也既曰解又曰信者何故須知信為入道之門功德之母信者契合之意因其契合如是故能知如是見如是耳解為知見之總名故曰如是信解也因其於一如皆是之理契合無間定慧均等故能不生法相也如是知句明其定力如是見句明其慧力如是信解句明其定慧均等之力信字貫通三句不生法相句是由上三句所生之功效也何以故有定有慧契合一如可見其於言説名字心緣諸相一切皆離諸相皆離便引生根本正智即是不分別智智無分別即是一念不生一念不生名不生法相也總之知見信解是不生之前方便方便修足便證本不生其功行全在知見信解上不生是其功效本不生上著力不得著於不生便是生也下科正明此義癸次不生亦無須菩提所言法相者如來説即非法相是名法相一切法相皆是假名本來即非蓋生即無生也此明上言不生法相之所以然須知所謂不生法相者非有法相而不生亦非畢竟無法相乃是一切法相本為緣生緣生之法當體即空所謂非作故無本性無故既本性無則不生亦亡何以故生即無生故乃為真不生義若不了其有即是空而注意於不生則正是生何云不生哉故一切發心者當在一如皆是上知見信解此正降伏此即無住果能知見信解如是如是則雖法相熾然初何嘗生以本性不生故則不降伏而降伏無住而住住而無住證入無相無不相之真實性矣又復生即無生則亦滅即無滅矣可見説生滅説不生不滅猶是對待而説實則即生滅不停時本來不生不滅不但生滅不可説即不生不滅亦不可説也當悉心觀之曰如來説者如來是法身法身即實相故約如來而説即非法相是名法相以顯無相無不相之義也總之此科是明即法相而無法相即生而無生非以不生為不生也此義是明非但生之念無并不生之念亦無正是為一念不生寫照為本不生寫照為下文不取於相如如不動寫照也如如不動者生即無生之異名也又復此科亦正是結顯經初應如是住應如是降伏之義故科判曰結成非但結本科也全經義趣至是而包舉無遺首尾完成矣結成本科者如無所從來亦無所去不生法相也一合相不可説不生法相也我見即非而是名不生法相也蓋令即來去而無來去即一合而無一合即我見而無我見何以故徑向未起念之心源上覺照而契入本不生故至若經初所説度無度相乃至心若虛空云云非不生法相乎發起序中所明世尊示同凡夫四十九年行所無事非不生法相乎其他諸説皆可以此義貫通之所謂應如是知如是見如是信解也總之千言萬語無非為令即諸相而無相以證生即無生而已故曰全經義趣包舉無遺首尾完成也上來正宗分已竟乙三流通分流通分之判別古人見地各有不同智者將前結成不生一科一併判入流通蕅益宗之名前科為付囑流通名此科為校量流通云何演説下為流通方法佛説是經已之下為流通相貌嘉祥但判佛説是經已以下為流通慧淨圭峯及清初達天皆宗之窺基亦似同此但不用序正流通字別立名稱耳惟清初有溥畹者不然著有心印疏其疏於是名多坐實因其約三諦説故也獨有超勝之見不能為其他所掩者即從此科起判為流通分是也何以言其超勝耶經曰云何為人演説此句已明明揭示弘揚此經之法判為流通分恰合經旨故此次科判依之乙此科分二丙初示勸流通次正結流通丙初又二丁初示流通益次示流通法丁初又二戊初引財施須菩提若有人以滿無量阿僧祇世界七寶持用布施阿僧祇此云無數今不止無數乃是無量之無數以充滿無量無數世界之七寶布施其福德之勝可知引此財施者所以顯下文法施之福更勝也持用二字用在此處不嫌其贅者何耶以其意在引起下文之持於此經來也意明行布施同而福德不同者因其持以行施者不同故也一是持財寶一是持法寶持無量數世界財寶不及持一卷經乃至四句偈者財施只救人身命法施能救人慧命故法施救人是徹底的然非謂財施可廢也正明財寶如幻如化而凡夫貪著其事不知貪欲無窮財寶有盡若明佛法則知世間事無非夢幻得財施者庶幾除苦行財施者福亦增上耳且一切有為法中最難看破者財寶故引此為言耳凡一切舉財施較勝處意皆同此當如是領會也戊次明法施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼古本及宋藏皆是發菩薩心者流通本菩薩作菩提應從古本何以故經云未能度己先欲度他者菩薩發心所謂流通者重在法施利衆故曰發菩薩心以顯流通之意也當知菩提心含義甚廣不止法施一事此中因將指示流通之法所以特舉發菩薩心為言與下文云何為人演説句正相呼應也四句偈等等者等於半偈或一句也四句為一偈兩句為半偈經中常言半偈即可證道若下文所説不取於相如如不動半偈苟能信受奉行直趨寶所矣何況全偈何況全經持於此經之持謂持取也與下文受持義別受持句自利也演説句利他也如法受持則能悟入無生施不住相其福便已勝彼況更為人演説此經以行不住相之法施乎蓋此經開章即説度無邊衆生入無餘涅槃今為人演説此經即是以無餘涅槃法布施豈彼七寶布施所能及開章又説布施不住相則聞此不住相之説者其布施豈止以滿無量數世界之七寶布施而已總之弘揚此經便是紹隆佛種衆生獲益不可思議其福勝彼財施更何待言經旨重在流通無上法寶故下文專約演説言且明得云何演説自明得云何受持説一邊即攝兩邊矣丁次示流通法分二戊初直指本性云何為人演説不取於相如如不動云何為人演説問辭此中含有二義一是問演説之人應當如何一是問演説經義應當如何不取於相如如不動兩句正開示二者應當遵守之軌則也以説者言應於能説所説及聽説者之相皆不取著所謂以不生滅心説實相法是也此經正是實相法故説者應以不生滅心説之不生滅心即是本性所謂如如不動是也意謂演説甚深般若之人應當三輪體空且當稱性而説直指心源乃能令聞者即文字般若起觀照般若悟實相般若也言下含有既不可妄談亦不可淺説意在以演説此經言此經義趣甚深甚廣前云一切諸佛從此經出是則經中所説皆為成佛之法也其深可知又云諸佛阿耨多羅三藐三菩提法皆從此經出是則經中所説一切佛法皆莫能外也其廣可知則欲為人演説若不得扼要之方非大而無當即散而無歸聞者難獲法益矣故示以經義之扼要處即向下之二句一偈是也可見此二句一偈乃本經之要旨亦即一切佛法之要旨千經萬論中所説之性修理事此二句一偈包括盡之矣抑有進者表面是開示云何演説骨裏則是開示云何受持也何以言之蓋如是演説必先能如是受持不然豈能演説乎且為人演説正欲人如是受持也當如是領會也由是觀之不取於相如如不動兩句經文其義蘊深廣也明矣今當逐層剖而出之首先當知此兩句是全經之歸結語亦是全經之發明語何謂歸結此一部經自首至尾所説無非不取之義一望可知無待徵引亦不勝引至曰諸法如義無實無虛一切法皆是佛法是法平等等句皆如如義也無所從來亦無所去則不動義也今不過以此兩句結束全經之義耳是之謂歸結語然則何以又謂之發明語耶全經所説雖皆此義然是散見若學人未能融貫則望洋興歎不知從何而入故發明之曰全經要點不外不取於相如如不動八個字學者當從此入夫而後聞者皆能扼要以圖不致瞻前顧後泛濫無歸矣是之謂發明語其次當知此兩句皆是説修功的亦皆是説成效的蓋必能不取方能不動然亦必能觀不動乃能不取所謂互為因果者也若但認不取為修功則經義偏而不全矣今依經文次第説之所謂相者何相耶經中説相甚多甚多色聲等六塵相布施等六度相身相佛土相莊嚴相福德相衆生相度衆生相菩提相發心相上求相下化相因相果相等等歷數難盡總之凡説一法便有其相今概括之曰凡所有相一切不取當知説一相字法與非法皆攝在內矣故不取相之言即貫通乎不斷滅相何以故斷滅者空相也亦所不取也當如是領會也所謂由這一面便應見到那一面凡讀佛經第一要知此理此不取於相句若不如是領會便與下文如如不動句不應矣何以故空有兩邊少有所偏便非如如故所以者何偏則有取取則已為所動故總之無論何取取則心動取則著相而非如如之性矣圓覺經曰種種取捨皆是輪回輪回謂生滅心也苟有所取必有所捨何故取捨由於分別執著分別執著所謂生滅心也故曰種種取捨皆是輪回猶言種種取捨由有分別執著之生滅心然則若能不取當下便離生滅心矣則當下便見不生不滅之性矣故曰不取於相如如不動如如不動者不生不滅之性也不取者無住之真詮也無住者不動之真詮也何以故若心有住則為非住非住之言正明其動若心有住則為非住猶言有取便是心動故必一無所取而後一無所動如如者真如之異名也皆謂本性然立二名者真如是指本具者言如如是指證得者言耳蓋證性之時智外無理理外無智智理冥合謂之智如理如故曰如如也如如之義明其能所雙亡也因其無能證無所證迥脫根塵靈光獨耀是以寂照同時因其寂時照照時寂是以無相無不相因其相不相皆無是以不生不滅因其不生不滅是以如如不動今既不取生滅之相是以不生不滅如如之性現前也故曰不取於相如如不動圓覺經曰一切諸衆生無始幻無明皆從諸如來圓覺心建立猶如虛空華依空而有相空華若復滅虛空本不動諸如來圓覺心是説佛與衆生同具之本性在衆生分上名曰如來藏者是也蓋此句是約聖凡共説非單約佛邊説也若單約佛説則上句不可通矣猶如虛空花依空而有相喻衆生自無始來以不覺故依本來空寂之性而幻成無明之相也由此可知無明不過本性中緣起之幻相猶如空中之花耳空中本無花也則性中本無無明也明矣空花若復滅虛空本不動喻無明若滅性本不動本不動者是言當其現有無明之時此性原未嘗動當知尋常所言心動乃無明動耳由此更可了然但能不取於相如如不動之本性當下便現之理矣又可知取捨正由無明而無明本是幻相然則不取於相當下便如如不動者因無有取捨無明已遣故也是故學人當於不取即無住上痛下功夫不然雖欲不取不可得也如如二字有釋上如字為相似為相稱次如字為真如者謂不取於相方與真如本性相稱相似而心不動也此釋不妥大乘義章明言如如亦曰真如且如如之名大乘經中常常見之多指佛之境界言何可云相稱相似乎即欲分開作釋上如字可釋為契合契合真如所謂智與理冥也當知曰相似曰相稱則仍體是體智是智能所之相儼然何云不取於相耶故此釋乍視之但覺其淺耳細按之則大大不協故曰不妥也佛言離幻即覺覺字正謂如如不動之性即字正謂當下便是可見但恐不能不取耳果能不取當下現成今乃釋作不取於相與性相似顯違佛語萬不可從頃言學人當於不取二字痛下功夫然則云何方能不取耶此層斷不可忽略過去必應細究當知不取相即是離相圓覺經曰一切菩薩及末世衆生應當遠離一切幻化虛妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻細究此段經義可見離相功夫全在堅持堅持者強制之謂也此層功夫誠不可少不然無始來取相習氣何能除之然而更應細究如何方能堅持不取乎欲知如何始能堅持不取當先知衆生因何故取無他由有分別心執著我人衆生壽者四相故耳即復當知四相之相實不外一我相而我相之根實發生於我見尤應細究堅持不取固足以遣我見然只能伏不能斷也何以故無明未破故且以無明我見未斷之故亦最足以破壞其堅持然則非更於離無明我見上用功不可矣云何能離耶前引圓覺經云知幻即離不作方便是也此言知幻二字即是離無明之最妙方便不必別尋方便也然則云何能知其是幻耶楞嚴經開示最明矣經曰如來本起因地最初發心先以直心正念真如始能遠離諸幻正念即是覺照謂須徑直覺照真如本性方能知其是幻也由此可見必須先悟如如不動之本性乃能不取於相矣此前所以説不取於相如如不動兩句經文互為因果應交互用功不可但認不取句為修功如如句為成效也換言之不但應向不取上堅持還須向如如上覺照且覺照為堅持之前方便即是欲堅持不取必當先修覺照不然無明未斷豈能堅持是故圓覺經云一切菩薩及末世衆生先斷無始輪回根本輪回根本即謂無明我見也然則云何斷耶前引圓覺經不云乎一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道此與所引楞嚴經先以直心正念真如之義相同譬如惡友初因無知誤視之為心腹今知其惡欲與斷交然以關繫長久未能驟斷必須先與疏遠而後方可斷絶此亦如是自無始來誤認幻識之無明為其真心關繫密切久矣今既翻然大悟其非若不即速掉轉頭來認準清淨自性徑與接近則仍是與無明混在一起矣故圓照覺相便是直心正念真如便是與真心接近而與真心接近便是與無明疏遠如是方能望其永斷也所以要緊功夫全在圓照二字何謂圓照前念已滅後念未生正恁麼時一心湛寂了了明明是之謂照圓者非著力非不著力不沈不浮恍如朗月孤圓是也此際一念未起清淨無比遍體清涼便是本來面目初學未有定力一剎那間後念又起便又如是覺照只要覺照提得起如天平然此昂則彼自落則又清淨矣務須綿密無間使之相繼久久校久舊版作之原稿作久便能入定至於如如不動之全體談何容易遽能圓顯然如此用功便是隨順趨入也本經此兩句即是此義不但應向不取上堅持還當向如如上覺照要緊要緊今更引圓覺經證明覺照本性能除無明之義經曰於無生中妄見生滅此言自性本來不生也本來不生即是本來不動生滅即指無明意謂自性中本無無明説有無明由於妄見耳然則今知覺照清淨本性便是正見邪正不并立正見興則妄見除矣故彼經又曰如來因地修圓覺者知是空花即無輪轉亦無身心受彼生死非作故無本性無故生死即謂生滅此言自性既本不生則亦不滅故曰本性無謂亦無身心受彼生死者以本性原無生滅之故并非造作使無也所以發心便應覺照本不生之性故曰因地修圓覺因地指發心修行之時修字即指覺照圓覺指本不生之性也如是修者知彼一切生滅幻相盡是空花有即非有故也既如是知則不為所轉矣不轉明其不動也故曰知是空花即無輪轉此兩句與知幻即離之義同既已知幻即離所以亦無身心受彼生死則法性如如矣綜觀上引經文當可了然徑向本不生處覺照為除無明之妙法矣何謂本不生處即於未起念時覺照是也念且未起何所謂相更何有取果能如是綿密無間則於不取自有把握總之一面向不動處攝心覺照以成就其不取復一面於遇緣時堅持不取以圓滿其不動庶於如如性體得有入處楞嚴亦同此説如云諸修行人不能得成無上菩提乃至別成聲聞緣覺及魔眷屬皆由不知二種根本錯亂修習云何二種一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣此中所説攀緣心即是不覺妄動之心元清淨體乃至緣所遺者即如如不動之本性也彼經又云云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉此段更説得明明白白即是初發心時便應辨明真妄直向本不動處覺照乃不致遺此本明枉入諸趣自取流轉也當知如是覺照亦須攝心攝心亦非無念亦非畢竟無相無取然凡夫非此無入手處所謂以幻除幻之法門耳因此法雖亦是幻然是隨順真如與其他動念取相者因心不同故得果便大不同又復此法不過入手方便雖為隨順真如之法門而能照所照亦當逐步遣淨所謂有覺有照俱名障礙故必須離而又離得無所離乃除諸幻當如是知也總而言之如如不動即不生之義不取於相即無住之義先須覺照本不生乃能無住至於一無所住便證無生交互用功是為要門且如是用功是貫徹到底的從初入手乃至住行向地等覺妙覺皆不外此故曰離一切諸相則名諸佛一切諸佛從此經出也而上來特引楞嚴圓覺以證此義亦足見阿耨多羅三藐三菩提法皆從此經出矣更有進者本經以無住破我為唯一主旨可見全經皆是詮顯欲破無明當不取相之義後半部説諸法一如説一切皆是等即是詮顯如如不動之義也逮令通達無我法而所謂通達首令開佛知見往後更暢發緣生性空之義此科既以不取於相兩句開示學人應覺照如如不動之本性矣而下科復開示以觀法緣生恰與正宗分後半部先顯如如次説緣生之義趣同此正指示全經要旨在後半部演説者若不達後半部之義前半部便不得要領受持者若不知從後半部所説者入觀亦復不得要領也此是世尊深旨極當體會至於此科既令覺照本性下科則令觀法緣生者尤為善巧尤為扼要此正佛知佛見學人亟應如是通達蓋凡夫全體無明雖曰覺照本性而本性面目久隱無非黑漆漆的無明而已然則奈何今開示之曰當先觀諸法緣生以作方便故下科結語曰應作如是觀謂必當如是作觀也何以故觀諸法緣生即是觀諸法空相相若空時豈復有取則如如不動矣可不謂之善巧乎可不謂之扼要乎此義下科更當詳談演説演字有深意焉演者演繹也謂經義幽深説經者當闡其微發其隱廣徵博引以宣揚之務使其義曲暢旁通乃不虛此一説耳説一切經皆當依此軌則也戊次觀法緣生何以故一切有為法如夢幻泡影如露亦如電應作如是觀何以故者問不取於相之所以然也所以然有二義一因何而不取偈語前三句已足答釋二何以能不取則須全偈方足答釋而歸重於第四句今假設問答以明之問因何而不取耶答因一切有為事相皆是緣聚則生緣散則滅變化靡常執捉不住如夢幻泡影露電然似有無實故也問然則何以能不取耶答應於一切有為法作如夢幻泡影露電觀知其當體即空不生貪著乃能不取也如上所説本科大旨已明茲再詳細説之當知如如不動是真實性亦即所謂不生不滅之無為法前云一切賢聖皆以無為法而有差別今不令觀無為法如如不動之真性而令觀有為法緣生無實之幻相何也此我世尊深知凡夫之病特為巧開方便也此中有二要義一凡夫之所以為凡夫者無他背覺合塵向外馳求耳何故向外馳求無他分別幻相貪著幻相耳何故分別貪著無他誤認一切有為法為真實耳由是之故愈迷愈深不肯回頭永被輪轉矣故今入門初步先須令其深觀一切有為之法如夢如幻如泡如影如露如電莫非虛假一切皆空到底一無所得所得唯一苦味而已且其苦無窮説亦説不出所謂萬般將不去唯有業隨身是也果能常作如是觀洞明皆空之理庶幾不再受騙而能死心踏地回光返照乎此所以欲觀無為之真性應先觀有為之幻相也此第一要義必應了知者二一切凡夫性光早被無明隱覆有如一輪杲日盡被烏雲遮蓋光明全暗太陽看不見了此亦如是妄念紛動未曾暫停今欲觀之而能觀所觀莫非無明妄識何能觀見本性此與滿天黑雲看不見日光看來看去無非昏擾擾相是一個道理故圓覺經曰以輪回心生輪回見入於如來大寂滅海終不能至輪回者生滅之意寂者無聲謂真如非可以言詮也滅者無形謂真如非可以相顯也豎窮三際橫遍十方曰大體備萬德用賅萬有曰海如來大寂滅海即謂如如不動之本性也可憐凡夫全是生滅心即發心作觀亦是生滅見今欲以此生滅心生滅見觀不生滅之圓覺性海全然反背故曰不能至不能至者言其南轅北轍也然則修圓覺者欲覺照如如不動之性豈非竟無下手處乎我世尊大慈今語之曰勿憂有妙法在其法云何宜觀諸法緣生自有入處矣此意無異曰初不必強息妄念雖欲息之亦不可得也但當向有造作有對待之一切有為法上觀察其變化無常如同夢幻泡影露電一樣使此心洞明一切諸法不過緣會時現有生起之幻相耳實則生即無生從此可知表面雖萬象森羅而其底裏全然烏有時時處處如是觀察覺照便有不可思議功德何謂功德不可思議當知觀諸法緣生之理若領會得一切法當體是空便能契入諸法空相相空則性自顯何以故有相則諸法千差萬別相空則諸法一如故諸法一如即是性光顯現故性光顯現即是無明已明故雖無明未必遽斷未必遽與如如不動冥合而智理冥合實基於此何以故妄念從此日薄故對境遇緣不易為其所轉故由是言之觀諸法緣生無異觀諸法空相觀諸法空相無異觀如如不動也換言之觀生滅之有為法如夢如幻便不知不覺引入不生不滅之無為法矣功德何可思議哉此第二要義為吾人更應了知者合上説兩重要義可見作如是觀譬如用起重機四兩可以提千斤毫不吃力輕輕巧巧撥雲霧而見青天真善巧方便也不慧學佛以來前二十年雖修種種法作種種觀毫無進步一日於此四句偈忽若有悟依此修觀初亦若即若離若明若昧未成片段并無甚效繼悟應於一切境緣上極力作意以觀察之雖一極小之事或極順心或極不順心之時皆以如夢幻等道理印之即修持佛法亦以如夢幻等道理印之行住坐臥不離這個如是久久雖於不取於相如如不動功夫尚淺然實從作此觀起此心漸覺空空洞洞於一切境相漸能無動於中看經時眼光便覺亮些念佛時亦覺踏實些今請諸君試之必有受用當知博地凡夫欲回光返照舍此無下手處也珍重珍重今再將上科與此科之義綜合而演説之上文如如不動是説性體圓滿顯現論其究竟須至佛位方能圓滿初住以上不過分分現耳故謂之分證覺若信位中人則僅得其倣佛所謂相似覺也故前人有將上如字作相似釋者然如如不動句經義是自初發心乃至究竟貫徹到底的故不宜呆板作相似釋應作真如釋之乃能圓攝一切無論相似而現分證而現乃至圓滿顯現皆由不取於相來故相字不取字其義意亦復包羅深廣貫徹到底相則無論空有以及雙亦雙非皆攝在內其總相則我法二執是也於此諸相一切不著乃為不取且并不取亦復不取則離而又離得無所離即除諸幻矣於是乎如如不動之性體全彰也然而下手方法須從未動念處覺照即觀如如不動之本性是也此即楞嚴以不生不滅為本修因之義亦即所謂依本寂之性以修止而後得定依本照之性以修觀而後得慧之義也若不知從此入手便是錯亂修習盲修瞎煉譬如煮砂為飯永不能成雖初學全是無明觀之不見然必應深明此理勤勤圓照如前所説前念已滅後念未生正恁麼時一心湛寂了了明明是之謂照圓者非著力非不著力不沈不浮是也此即一線慧光知幻即離之最初方便一面復遵依此偈觀一切法皆如夢幻泡影露電緣生即空此法更為方便之方便所謂知幻也兩種最好兼修以此兩法互相助成故蓋覺照本性是在本源上用功觀一切法是在境緣上用功又復前觀修定之意居多後觀修慧之意居多定固可以生慧然非先開慧其定亦不能成故互助之中緣生觀尤要以觀緣生即可引入如如不動故也此義前已詳哉言之試思應作如是觀句大有非此不可之意何等懇切作字要緊謂應十分作意觀之也佛説此經本為凡夫發大心者説此二句一偈正是指示大心凡夫下手用功處故前後兩觀務須綿綿密密替換行之行之既久必有得處如是二字固是指上文如夢如幻等説須知如夢如幻正謂諸法之相本空亦即正謂諸法之性一如可見如是之言實含有一如皆是意味所以觀諸法緣生便可契入如如不動也然則作此觀者可以一篙到底徹見本性故曰應作如是觀猶言觀一切法如夢如幻即是觀一如皆是也故應作也開示諄諄豈容忽略讀過有為法不但世間法也佛法亦攝在內故曰一切圓覺經曰生死涅槃猶如昨夢無起無滅無來無去其所證者無得無失無取無捨其能證者無作無止無任無滅於此證中無能無所畢竟無證亦無證者一切法性平等不壞此中一切視同夢幻而無之正所謂諸法空相即不取於相之意也校也舊版無原稿有亦即指示觀一切如夢幻而空之便契入如如不動也故結之云一切法性平等不壞平等即是如如不壞即是不動也故圓覺此段文恰好引來作此經二句一偈的注腳總之無論染法淨法既有此法便有對待既成對待便是有為便有生滅故皆如夢如幻然而欲證絶待之無為法非從對待之有為法起修不可者以捨此別無入手處故也不但觀緣生是有為法即覺照本性亦是有為法何以故覺照即是觀既有能觀所觀便成對待故有對待便有相便落有為矣本經所説皆是無為法且明明曰一切賢聖皆以無為法而有差別今於開示演説受持時卻令應觀有為法此為全經經旨絶大關鍵亦即學佛者緊要關鍵當知無為者無所作為之謂也若無所作為妄何能除真何能證凡何從轉聖何得成故無為法須從有為法做出故曰應作也作字有力但第一要義應明了者是以無為法為目的借有為法作路徑若只認無為鄙棄有為是自絶也若著於有為不知無為是又自畫也前者所謂執性廢修者也後者所謂著事昧理者也第二要義應明了者修有為法而不著便是無為除此別無所謂無為法也所以本經開章所説實無衆生得滅度當自度盡衆生出於法不住當自行於布施出以後所説其旨趣莫不如是夫度衆生行布施有為法也無滅度不住法無為法也如是作去便是涉有而不住有觀空而不住空雖終日行六度萬行終日講經説法而實終日涅槃由此可知不取法當從不取非法做出即非當從是名做出不執著當從不斷滅做出無實當從無虛做出乃至無聖無凡即從有聖有凡中見不一不異即從一異中見不來不去即從來去中見此之謂諸法一如是法平等乃至不生不滅即從生滅上見此義即是雖生滅而實不生滅雖不生滅而示現生滅此之謂不住生死不住涅槃無住之旨於是乎究竟圓滿矣而其樞紐即在觀法緣生如夢如幻了其皆空所以無住也故學人最要方便應作如是觀也作如是觀便是不廢有為不礙無為自然而然遮照同時中中契入如如不動圓覺性海矣一部甚深經典歸到極平淡極切近四句偈中一切衆生無論利鈍皆可隨順而入此之謂無上甚深微妙法百千萬劫難遭遇此之謂真實義此與序分所序穿衣吃飯等事同一趣味皆是指示道不遠人即在尋常日用中須於尋常日用中看得透把得定成佛成菩薩便在裏許所有自度度他等行願乃至禮佛誦經諸事當視同尋常日用造次顛沛弗離而又行所無事庶乎其近道矣故得此四句偈不但全經在握一切佛法在握而成佛成菩薩亦在握矣所謂一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出者今乃知諸佛及法皆從於一切有為法作如是如是夢幻泡影露電等觀出耳吾輩幸蒙佛恩授此妙法唯有一依此法如是受持如是演説俾一切衆生皆作如是觀皆得證無生乃足以少報本師之恩耳上來要旨已竟至若夢幻等喻其義甚精甚細甚妙故作此觀便可證道也茲當詳細説之佛經中所説有為法之譬喻甚多夢幻等喻之外如乾闥婆城水月樹橛繩蛇空花兔角龜毛等等其大旨無非顯示萬法皆空之理警告凡夫不可認以為實以破其分別執著引令出迷耳魏譯金剛經其喻有九曰一切有為法如星翳燈幻露泡夢電雲應作如是觀秦譯則約之為六多少雖殊理則一也六喻之中夢喻為總幻泡影露電為別皆所以明其如夢也根性好者一聞夢喻便可明了緣生之法當體皆空因恐或有未了故復説幻等五喻五喻若明當可恍然萬事同歸一夢矣所謂夢者緣生法之一也古語云日有所思夜形諸夢所思即其作夢之緣也亦有并無所思而夢者如世俗所言之托兆則托兆亦其入夢之緣故為緣生之法有緣必有因作夢之因為何意識亦曰妄心是也若無此因緣亦無從遇矣故曰至人無夢蓋有道之士妄心雖或未斷必已能伏故夢少也由此可知一切皆唯心所造矣可憐凡夫夢時固是妄心即其所謂醒時亦全是妄心也故其所謂醒依然是夢何以故從來迷而未覺故若其已覺決不致但知夢中之悲歡離合得失窮通為假而又認所謂醒時之悲歡離合得失窮通為真也須知醒時之心與夢時之心既皆是妄非真所以醒時種種境遇或由計畫而成或出意料之外與其入夢之或由於日有所思或由於神靈托兆其理由全同也而轉眼皆空了無所得亦復毫無二致豈非醒時即是夢時乎故警告之曰如夢也乃迷戀其中計較分別執著不捨真癡人説夢矣故曰衆生從來不覺也今曰如夢正喚其速覺耳或曰如夢之理説世間法誠然不誣而永明壽禪師曰大作夢中佛事何以佛法亦可作如夢觀耶此有四重要義不可不知約凡夫言其義有二一佛法作如夢觀者不可執著之意也佛法重在破我若有執著我何能破故應徹底遣之佛法尚不可執何況世間法二學佛者為證性也若不證性便不能超凡入聖而性體空寂故一切修功必應歸無所得方與空寂之性相應佛法作如夢觀者令其勤修佛事而歸於了不可得庶幾能所雙亡智理冥合也約佛菩薩言其義亦有二一佛菩薩皆是已覺之人其大作佛事廣度衆生而能行所無事者視之如夢故也視涅槃如昨夢所以不住涅槃而大作佛事視生死如昨夢所以不住生死而常在定中二菩薩作佛事者自覺覺他也至於佛位覺已究竟而仍作佛事者因無盡之衆生尚在夢中以同體悲故不自以為究竟也故常行菩薩道而現身於大夢未醒之衆生中而作佛事所以永明曰大作夢中佛事耳綜上四義可知大覺者視生死涅槃本無可得故曰生死涅槃如同昨夢意謂住於生死固是作夢住於涅槃亦是作夢必一無所住乃為大覺耳所以若住於所修之法住於所説之法住於所得之法則皆是作夢矣故本經主旨在於無住故曰應無所住行布施應離相發菩提心也總而言之觀一切染淨法如夢者意在通達一切有為法本無可得也一心清淨有何可得乎若有可得即非清淨矣故應觀一切有為法如夢也我世尊説法四十九年而曰無法可説又曰我於阿耨多羅三藐三菩提無少法可得果地覺者如是在因地修行者亦必應如是可知楞嚴經云應當審觀因地發心與果地覺為同為異若於因地以生滅心為本修因而求佛乘不生不滅無有是處有可得生滅心也觀其如夢了不可得不生不滅也當知夢即是有為法若知其夢了不可得而不迷不執有為法便成無為法矣如字有味未覺者應觀其所謂醒者依然如夢乃可以解脫一切遠離顛倒已覺者應觀其所謂覺者亦復如夢又何妨現入華胥遊戲三昧耶總之六喻皆是貫徹到底的不僅為凡夫言也二乘若知度生如夢了不可得便不致沈空滯寂一類菩薩若知上求下化如夢了不可得便可成佛故作如夢之觀正是照破我法二執之寶鏡度入大寂滅海之慈航由上所説可知一切有為之法皆是依心為因託事為緣因緣會合所生之果耳除因果外一切烏有而名之為果卻又成因説之為因旋復招果是即因果之本身言之亦復毫無定形故曰當體是空譬如做夢非不事相儼然却是有即非有故曰因緣生法即假即空故説一夢喻已足了徹一切矣但以衆生久在迷途平日未嘗不知世事如夢乃一遇順逆境界當前仍復執迷放不下去且曰過去事誠然如夢若境遇當前歷歷身受不謂之實事可乎故又告之曰順逆諸境雖歷歷身受其實皆如幻耳幻者佛經所説之幻術也今世則名之曰戲意若曰汝見幻人幻術乎幻出種種飛潛動植之物豈不儼然似真又如做戲然粉墨登場時邪正賢愚悲歡得失神情活現能令人為之顏開為之淚下汝亦以為真乎可因其悲喜無端恍同身受遂執以為實事乎當知人生在世亦復如是一切遭逢莫非妄識業緣之所變現耳世間即是戲場一切衆生即是戲場中的各種腳色當其鑼鼓喧闐非常熱鬧之候有智慧者便當自警轉眼即下臺矣此刻在此做這個腳色不過為業力所牽須了卻一段緣法而已豈可當真譬如唱戲既做了戲曲中一個戲子必有夙因方現此果固然不能不用心唱做誤了所抱的目的然而斷沒有執著戲中所扮演之人物當作自己者戲子之目的為何名譽金錢是也做人亦然今世來做這個人不過暫充這齣戲中一個腳色耳戲子尚能不執所扮演者當作自己吾輩豈可誤認所暫充之腳色為自己乎當知因果難逃因果可畏既暫充了這個腳色自然不能不用心唱做以免誤了目的但切不可只認名利為目的須認準自己本有之家寶以為目的家寶者何自性三寶是也必應了了覺悟做此假戲既不可錯了因果牽纍自性更不可誤認假戲為真昧失自性所以正當笙歌嘹亮大衆注目之時便應自覺自悟此一齣幻戲非我本來面目誓當返我初服庶幾鑼鼓收聲風流雲散時不致懊惱悲傷手足無所措耳故曰應作如幻觀也世尊大慈猶慮衆生執迷不醒以為一切人事謂之如幻誠然非虛然而撫念身世終難放下蓋其意中但能領會世事如幻而猶認偌大的世界及其寶貴的色身為真實有故放不下耳因又告之曰如泡如影如泡喻世界也如影喻色身也何以故所謂泡者由於水為風鼓激蕩而成者也而世界則由一切衆生於性海中起無明風造此共業之所結成故以如泡喻之所謂影者由有日月燈光照之而現者也而色身則由性光之所變現故以如影喻之此世此身既與泡影同一緣生可見身世亦與泡影同一虛妄矣豈可迷為真實乎此義楞嚴經言之最明經曰認悟中迷晦昧為空空晦昧中結暗為色色雜妄想想相為身此段經文是説覺性圓明大而無外小而無內本無所謂虛空也世界也色身也全由衆生覺性障蔽遂致本來圓明者成為晦昧晦昧者所謂昏擾擾相也既已不悟乃反認晦昧為虛空故曰晦昧為空是則由其認悟中迷之故也認悟中迷者言其自以為悟實則依然是迷何以故以其認晦昧為虛空故虛空既是晦昧復糾結此晦暗者為色故曰空晦昧中結暗為色色者地水火風四大是也正指世界及一切有情無情之色相而言先認晦昧者為虛空復認晦暗結成者為世界更認色與妄想雜成者為其寶貴之身軀故曰色雜妄想想相為身首句認字直貫到底妄想二字亦貫通上下何以誤認由有妄想故也妄想者識之別名也受想行為識之心所故此中妄想之言即指五蘊中之受想行識四蘊想相為身之相即上文色字想即妄想一切衆生之身無非五蘊假合故曰色雜妄想想相為身謂四大之色相與受想行識之妄想雜而合之成此幻身也此段經文明白開示虛空世界色身全由衆生昏擾擾的妄想之所變現妄想本非真實剎那生滅由其變現之身世豈能真實乎人人皆知水中之泡極其脆薄最易壞滅殊不知世界亦然勿謂江山千古也雖整個世界未遽壞滅然而陵谷山丘桑田滄海時起變化足證時時在成壞中此年事稍多者所常經驗之事原非理想之談且楞嚴又云空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有有漏微塵國有漏明其必壞微塵明其其細已甚也三有謂三界也此段經文是説晦昧之虛空在大圓覺海中如海上之一泡漚即泡也而微塵國土更是依附海泡之物泡若滅時且無晦昧之虛空何況三界耶一切學人常當觀照此理所認之虛空尚是晦昧的昏擾擾相尚且渺小如泡何況世界何況此身何足算哉豈可遺棄包含虛空囊括三界之真實圓明性海而認一渺小脆薄成壞無常之浮漚乎至於影者望之似有考實則無此身亦然虛妄現有考實則無譬如鏡中人影因照則現肥瘦長短纖毫不爽此身亦然因心造業循業而現壽夭好醜因果難逃南嶽思大師曰淨心如鏡凡聖如像此明身之可見因淨心本具見性猶如像之可見因明鏡本具照性豈可因其可見遂誤認為實有且淨心之見性中本無此身不過見性發現之影耳亦猶明鏡之照性中本無此像不過照性發現之影耳以上所説猶是以幻身望於淨心明其為淨心所現之影若約幻身當體説之亦復如影何以故除五蘊外了不可得故而且五蘊中之色即是四大四大既如浮漚其餘受想行識四蘊又莫非虛妄名曰妄想故是虛妄然則即五蘊本身已了不可得矣何況五蘊假合之幻身其為似有實無可知了不可得者言其有即非有也正如影然但眩惑人眼耳其實本空也一切凡夫所最執著以為實有者識心世界及其自身也今一一破其惑曰識心如幻前言世間即是戲場一切衆生即是戲場中腳色莫非識心業緣之所變現故曰如幻世界如泡此身如影身心世界尚且虛妄非實則其餘一切有為法相可知矣然而迷途衆生雖知身心世界非實或猶因循怠忽不能勤作如夢如幻如泡如影之觀因又警策之曰如露如電露則日出而晞留不多時電則旋生旋滅剎那而過所謂生命在呼吸間當加緊用功如救頭然也合此如幻等五喻觀之即是觀於萬事如夢有即非有故曰如幻等五觀是別如夢觀是總觀此六喻雖是觀諸法空相即是觀如如之性以性相本來融通故也故觀緣生即可契入如如不動故無為法性從觀有為法相如夢幻入手便是兩邊不著合乎中道此義前已詳談今再以三性三無性説之六喻中隨拈一喻皆可明三性三無性之理茲且約總喻如夢説餘可例知三性三無性見於楞伽經及法相宗各經論此為相宗精要之義佛説法相原為明此若不知注重但向瑣細處剖晰雖將一切法相剖之極詳未免入海算沙失其所宗當知三性三無性之義學性宗者亦應通曉因此義貫通性相若知此義則於緣起性空更能徹了修持觀行更易得力蓋上來所説如夢觀尚是總觀大旨若依三性三無性之理觀之則更入深微矣何謂三性一遍計執性二依他起性三圓成實性遍計執者謂普遍計較執著也即性宗常説之分別執著攀緣無明妄心妄想等性宗亦謂之分別性此是妄想云何稱之為性耶意在明其雖是無明妄想然為真心之所變現非離真實性而別有也但相宗名為遍計執性是單約凡位説性宗名曰分別性則兼約凡聖説聖位之分別性是明其應緣示現對機説法絲毫不爽似有分別蓋約衆生邊望之云然耳非謂聖位尚起念分別也當如是知依他起性即性宗所説之緣起緣生性起此正本性隨緣現起之相用相用原不離乎性體若無性體便無相用故曰依他起性依者隨也他指緣而言也圓成實性者圓謂圓滿成謂校謂舊版作為原稿作謂本具圓成字約體説明其本來圓滿具足非造作法亦兼約相用説謂相用為體所本具淨德圓滿也實即真實此即性宗常説之法界真如如如真心實相圓覺自性清淨心等其名無量性宗亦謂之真實性也何謂三無性一相無性二生無性三勝義無性無字甚活有非字意有空之之意即不可執著是也相無性者衆生於一切事物上妄計有我有法而執著之所謂遍計執也殊不知遍計所執之我相法相完全由於誤認譬如認繩為蛇不但蛇相非實即繩相又何嘗真實故曰相無性謂虛妄之相非真實性當體會性中本無有相應不著相而無之乃是性也生無性者生謂緣生蓋一切法但依因緣聚會假現生起之相耳所謂依他起也然則既為緣生可見一切法本無實體體惟淨性恰如繩之生起亦由因緣集合而有繩非實體其體乃麻故曰生無性謂緣生之法本非真性當體會緣生法雖以性為體而於性體中無此緣生應不著緣生而無之乃是性也勝義無性者真如之性為一切法之本體名第一義亦名勝義此性真實衆生本具本來圓滿所謂圓成實也然勝義亦是名字如麻亦是假名故曰勝義無性謂勝義亦為名言而非性也當體會真實性中本無勝義名字應并勝義亦不著而無之乃真實性也性宗立名略異名相無性曰無相性謂不著相方是真性名生無性曰無生性謂不著緣生方是真性名勝義無性曰無性性謂性亦不著方為真性此義正顯相既離性而無體性亦非離相而別存於義尤圓故無性性亦名無真性謂并真實之見無存乃是真實性也又名無無性次無字空無之義謂不著空無乃是真實性也上來略釋名義竟當再約如夢之喻以明三性三無性之理佛説三性三無性所以顯性相之圓融也諸有智者必應明了三性三無性之理以貫通乎性相校性相舊版誤作相性據原稿改正則能空有不著合乎中道而本經令觀一切有為法如夢者因作如是觀便能洞徹三性三無性之理故也換言之若明三性三無性方能徹底了然一切有為法之如夢茲故將如夢之義與三性三無性之義合而演説之以期於此二義皆得徹了至於幻等五喻原是説以證明如夢之義者故雖僅約如夢而説而於義已足當知清淨心中本來離相是謂真實性猶之心若清淨便無夢相也但因真性以隨緣故現起身心此謂妄心即是識也世界等相是謂依他起性無異入眠時隨緣而現夢中境相也乃凡夫之人以不明一切有為法既是緣生虛相生本無生故遂致計較執著認虛為實是謂遍計執性正如愚癡之輩以不知夢為緣生虛相有即非有故而執夢境為真實也是故若知夢中境相皆是一心之所變現有即非有者當知無相性亦復如是夫一切法莫非心造故稱有為然則有為之法既皆心造可見心性乃真實體一切有為法不過依心托事隨緣現起之相耳所以凡所有相皆是虛妄豈可執以為實乎若其執之是迷相而昧性矣何以故性本無相故若知心本無夢但由妄想熏起而妄想本虛所以由其熏起之夢有即非有者當知無生性亦復如是夫一切有為法既是緣會假現之生相可見性體中本來無生故一切有為法既不可執以為實即其緣生之虛相心中亦不可存若其存之依然昧性何以故性非緣生故若知夢時心與醒時心并非二心但由睡眠之故名為夢心實則非夢心外別有醒心者當知無性性亦復如是夫妄心真心本來不二但由無明不覺之故名為妄心若無明明而不覺覺妄心便是真心猶之若不入睡夢時之心原為醒時心也故修行人不可於妄心外別執有一真心換言之即是不應滅色以明空滅相以見性若其如此仍復昧性何以故不著於性乃真實性故所以者何苟有取著便為我相我見而非自性清淨心矣上來所説是以如夢之義説三性三無性則三性三無性之義徹底洞明矣即復以三性三無性之義説如夢故如夢之義亦可徹底洞明也綜觀上説三性三無性之義可知要緊功夫惟在不起遍計執則依他起便是圓成實何以故於性相皆不計執雖熾然現相而心固無相也雖示入生死而性本無生也計較即是分別所謂第六識執著所謂第七識也此即無明不覺此即我見故本經唯一主旨在於無住以破我也綜觀上説如夢之義可知作如夢觀是貫徹到底的即是由粗而細由淺入深從初修至於究竟一切行門皆不外乎此觀蓋説一夢字以喻無明不覺也復説一如字則喻無明不覺似有實無性本非有精極確極不但此也如夢者似乎做夢也似乎做夢正顯一切有為法是有即非有的亦顯一切有為法是非有而有的觀其有即非有者不可著有也觀其非有而有者不可著空也故如夢之言不是但令觀有如夢乃令並觀空有一切如夢果能於一切有為法有即非有何妨於一切有為法非有而有此之謂大作夢中佛事學人初下手便作此圓頓妙觀則既不執實亦不執虛且不執無即是本經所説無我相無法相亦無非法相一空到底矣於是雖涉有而不住有雖行空而不住空故能中中契入無相無不相之實相則如如不動矣蓋不住而涉有行空正所謂即止之觀也行空涉有而不住正所謂即觀之止也故作如是觀便是止觀雙運便能定慧均等則如是而證便能達於寂而常照照而常寂寂照同時故曰一切諸佛從此經出總而言之一部金剛般若無住妙旨全在不取於相如如不動上而欲達到不取於相如如不動全在一切有為法如夢幻泡影如露亦如電應作如是觀上一切學人當從此觀隨順而入此觀正是金剛慧劍無堅不摧無無明煩惱而不破也故應如是演説如是受持永永流通此紹隆佛種之無上大法也丙次正結流通佛説是經已長者須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行佛説此經已者謂甚深經典説已究竟無義不彰也已字正與下文歡喜奉行相呼應以顯機教相扣大衆皆能聞斯行之之意且顯信奉流傳永永無盡雖名曰已而實未嘗已之意也長老為當機衆故首列之次列四衆者皆是佛門弟子也比丘義為乞士破惡怖魔等比丘尼為出家二衆尚有未受具足戒之沙彌沙彌之義為息慈息惡行慈也又為勤策校息慈舊版無原稿有沙彌尼亦攝在內優婆塞優婆夷此云清信士清信女亦云近事男近事女謂清淨三業信奉道法堪以親近三寶承事供養者也是為在家二衆在家人欲入佛門先須請比丘授三皈依若無比丘可請比丘尼此為正式入三寶門可名佛弟子亦名三寶弟子繼受五戒則名優婆塞優婆夷若未受五戒不堪此稱也再進可受菩薩戒菩薩戒有普為出家在家同説者如梵網經所説之十重四十八輕有專為在家二衆説者如優婆塞戒經所説之六重二十八輕若在家人自審能一一如出家人可與出家人同受否則不如受六重二十八輕因受戒便當奉持倘受而不持招罪不小必應細意審量而後受之受菩薩戒後則稱菩薩戒優婆塞優婆夷若尚未正式三皈只稱信士信女不稱佛弟子及優婆塞優婆夷也優婆塞優婆夷皆可講經説法而為法師惟不可為皈戒師因自己未受具足戒之故三皈依即是戒也今世有向在家善知識請求皈依者此誤也當知請求皈依乃是請求為傳三皈依戒此事只可向出家善知識請求也若向在家善知識請求講經説法為其弟子依以為師則固無不可者如其志願真誠堪以教化善知識亦不宜一味峻拒也無論聚會之所或在道路間在家二衆當敬讓出家人居前雖出家在家同為佛子然以次第言比丘譬若長子次則比丘尼沙彌沙彌尼優婆塞優婆夷不可紊也當知出家者割捨恩愛遠離塵俗已在住持三寶之列豈在家二衆混身五欲拖泥帶水者所可及故應尊重即破戒僧亦不可輕視何以故當知出家之戒繁密嚴重比丘具足戒有二百五十條比丘尼具足戒有三百七十餘條少不經意便已侵犯奉持二字談何容易即沙彌沙彌尼亦受十戒比在家人已多一倍矣豈可輕作譏評果深知其言行相違或不守清規敬而遠之可也此遵佛制所謂默擯是也默者不揚其過擯者疏遠之意即對在家二衆言行相違者亦應如是此是修行人應守之本分不可忽也總之若欲佛法昌明必須出家在家衆中皆有道高德重為衆所服者以為領袖且須政治清明政府中主要之人亦能信奉三寶互相維護而整飭之始克有濟耳依佛制出家人若違佛法即歸僧中領袖大德依佛律治之倘犯國律亦須經其領袖大德同意先令還俗然後方可依世法治之而尤在披剃時嚴選資格乃為正本清源之道也娑婆為一大千世界其中有十萬萬四天下十萬萬六欲天等況佛説法時十方無量數世界菩薩天龍來赴法會者甚多甚多故曰一切世間説一天及修羅即攝八部此中人字通指四衆以外之人也不説菩薩者其義有二一此經説在大般若法會之第九會前會已詳列菩薩矣此故略之二此經是為發大乘發最上乘者説可見在會者皆是發無上菩提心之菩薩摩訶薩故不別列也皆大歡喜者聞此大法心開意解是為歡喜且知信受奉行便是荷擔如來當得菩提成佛有望非同小可故大歡喜在會法衆無不如是故皆大歡喜也信即信心不逆之信受者解也即深解義趣之解因其有不逆之信深解之受所以奉行奉者遵奉謂遵依經中所説之義趣行字兼自利利他言謂自己既遵奉而行復廣布此經為人演説令一切衆生無不皆大歡喜如是信受如是奉行務使慧水長流法脈永通傳之塵劫而無滯普及萬類而無遺則遍法界盡未來有此經處便是佛説法處前云佛説此經已不過約一時之事相言之耳結集者之意在於一切大衆依教奉行佛種永永不絶則我世尊之説是經固永永未有已時也不但結集本經者具此宏願我輩今日説者聞者發起此法會維持此法會者亦無不皆大歡喜信受奉行同具此願也具有此願乃為真信受真奉行真歡喜此正吾輩報佛恩處不慧自愧於此深經未盡演説之量不過大海中説其一渧耳然而即此一渧已具全海之味唯願諸善知識從實信而入淨信於有為而證無為以此行願莊嚴佛土化度有情便可即身成佛豈止決定生西已哉金剛經校勘記此本一依燉煌石室唐人寫經而柳公權所書即石室藏經之一久有影印本行世可以覆按故校勘記中首列柳書次列參校諸本茲將所據各本名目及有無單行本流通一一詳載於校勘記前以便檢校柳書經後題云長慶四年四月六日銜柳公權為右街僧録準公書按柳書清宣統間上海有正書局曾彙聚石室中藏品十餘種以珂羅版影印行世顏曰石室祕寶柳書為祕寶之一也長慶乃唐穆宗年號翁書乾隆五十七年壬子翁方綱書跋云依南唐道顒法師石本按翁書係依五代時南唐石刻故列於宋藏之前現有石印贈品宋藏南宋理宗紹定時平江府磧砂延聖院刊所謂磧砂藏是也按此藏經始於宋理宗紹定四年完成在元武宗至大二年前後歷八十年而後工竣原藏西安臥龍開元兩寺後移存陝省圖書館現上海影印宋版藏經會正在影印中張書南宋理宗寶祐二年甲寅張樗寮即之書自跋云依天台教僧宗印校本清康熙四年乙巳笪重光等摹勒上石供焦山石壁庵按寶祐二年後於紹定二十餘年經中文句與磧砂藏微有異同有拓本又有民國十七年汪大燮依張書所寫石印本贈品金剛經注疏唐紀國寺釋慧淨注注前有唐常太博士河南褚亮序慧公同時人也後有日本丹陽散人跋其略云此注在支那不行於扶桑亦未覩近義空師獲其真本遂刊行而永傳之久隱之至寶一旦發光揚彩可謂得時享保二歲丁酉初秋按日本享保丁酉為我國清康熙五十六年經文不審何時會入以校柳書字句多同且少魏譯一段必在他種會本前故先列之金剛經注姚秦釋僧肇注有日本沙門敬雄序云曩由慈覺大師於支那持歸祕諸名山九百年頃祖芳禪人持以示余余歎曰此經之注肇公為先注來大東亦此注為先而發於諸注既行之殿者豈非時節因緣乎天台大師曾講此經專依肇公猶如説觀經專依淨影也梓而行之其利益復如何哉寶曆十二壬午之夏按日本寶曆壬午為我國清乾隆二十七年距今百七十二年上溯九百年約在吾唐季懿宗咸通之初經文亦不知何時會入但與南唐石刻及長水刊定記互有出入亦已加入魏譯六十二字且注其下云此六十二字肇本無之天台疏亦無科判然諸本皆有此文故且存之其必後於慧注之會本可知以上兩書均見商務印書館影印續藏經中無單行本古農按續藏中此書曾於民國九年丁惟森等依黎端甫校本刻於贛州刻經處金剛經智者疏隋天台智者説清光緒三十三年金陵刻金剛經義疏隋嘉祥吉藏撰民國六年金陵刻金剛經贊述唐大慈恩寺窺基撰民國六年金陵刻金剛經疏論纂要唐大興福寺宗密述民國十一年北平刻按以上四書皆得諸日本義疏原無經文乃金陵刻時會入者故與現流通本同其他三書會入之經文或依其舊或未全依故與流通本有同有異可以單行本與續藏對校也金剛經疏記彙編民國十九年北平刻疏即疏論纂要記則宋長水沙門子璿所撰刊定記按續藏中收有明釋大璸之疏記科會是清乾隆四十七年依照雲棲舊本重刻者可藉以考證明時經文與今本異同也校勘記應云何住柳書翁書宋藏張書明刻及慧注肇注纂要三會本皆同今流通本及清初本作云何應住與後周語同按贊述引經亦作應云何住若非有想非無想柳書乃至明刻慧注肇注智疏贊述纂要五會本及今流通本皆同清初刻本於非無想上有加一若字者並注云古本無之按古本既無何可濫加今以所見各本參校蓋自唐季以後經文乃被人陸續增易而明清間增易最多也若菩薩有我相人相衆生相壽者相即非菩薩肇注會本若下無菩薩二字餘本皆有則見如來柳書翁書宋藏張書及慧注肇注智疏三會本並同流通本則作即明清刻本皆然於此章句古今各本皆同惟肇注會本作此於章句則為著我人衆生壽者古今各本皆同惟清初刻本則作即何以故若取非法相古今各本皆同清初刻本有疑何以故三字為衍文而刪之者是故如來説福德多若復有人古今各本皆同清初有刻本於若復上加佛言須菩提五字所謂佛法者即非佛法古今各本皆同清初有本於即非句下多是名佛法句按長水刊定記云如經中即非佛法是勝義諦遮增益邊是名佛法是世俗諦遮損減邊其餘即非是名例此見疏記彙編卷三第十一頁是長水時已有刊本不知被誰加入此句矣然考圭峯疏意實無是名句疏云第一義中無有佛法從經出也見纂要卷上第二十六頁長水記於此則依疏而釋未及是名句見彙編卷四第三十二頁遍考古德注疏中皆無是名句義而實無來柳書宋藏慧本均同流通本作而實無不來蓋南唐石刻已加入不字矣按智者疏嘉祥義疏皆云以無兼不慧注則云觀內既不見有我説誰不來故云而實無來也足證本作無來是第一離欲阿羅漢我不作是念柳書至明刻慧注等五會本並同流通本我上有世尊二字清初諸本皆然我若作是念古今各本皆同惟肇本無我字於法有所得不世尊如來在然燈佛所柳書慧本同流通本有所得不下有不也二字南唐石刻以後本皆然則非莊嚴柳書宋藏張書慧本同流通本作即非南唐石刻明清諸本皆然而此福德勝前福德古今各本皆同惟慧本而作如則為有佛柳書至明刻慧注纂要兩會本並同流通本及清初諸本則作即則非般若波羅蜜柳書至明刻及慧注會本並同流通本及清初諸本則作即其下又有是名般若波羅蜜句清初有本并注其下云古本無按是名般若波羅蜜句南宋磧砂藏始見加入不但為唐人寫經所無即南唐石刻及張樗寮書皆無之也慧注等五會本經文皆無是名句又考肇注曰則非般若即慧空也境滅慧忘何相不盡弘持之旨宜在於此智者疏同智疏又曰般若則非般若此是如空嘉祥義疏曰般若非般若心行斷也下如來無所説絶言語也又曰佛説般若此是佛般若也則非般若非是二乘智慧慧注曰證真之日得真般若得真之時便捨文字故云佛説般若即非般若贊述曰則非般若波羅蜜者非一佛獨陳也纂要曰則非般若者無著云對治如言執故以上諸古注皆未釋及是名可以三十二相見如來不不也世尊何以故柳書慧本同流通本何以故上有不可以三十二相得見如來句按南唐石刻已加此句考各古注皆未釋及之義疏謂猶是釋成前文可以身相見如來不之義故與前文貫串而釋則生實相古今各本並同清初本則作即則是非相柳書至明刻慧注等五會本並同流通本清初本則作即是人則為第一希有古今各本並同清初本則作即此人無我相人相衆生相壽者相柳書至明刻慧注等五會本皆同流通本清初本作此人無我相無人相無衆生相無壽者相則名諸佛柳書至張書慧注等五會本皆同流通本明清刻本則作即非第一波羅蜜柳書至明刻慧注會本皆同流通本清初本作即非如來説非忍辱波羅蜜柳書至明刻慧注等五會本並同流通本清初本於此句之下有是名忍辱波羅蜜句清初有本注明其下云是名句古本無然不可少由此可見是彼時加入按智疏曰既無我人誰加誰忍故非忍為忍忍為非忍為般若體也纂要曰忍到彼岸已離苦相況彼岸非岸誰苦誰忍其他古注中皆無是名句義則為非住柳書至明刻慧注肇注智疏纂要四會本並同流通本清初本則作即菩薩為利益一切衆生柳書至明刻慧注等五會本並同流通本衆生下有故字蓋清初時加入者也清初有本注明其下云各本無故字則非衆生柳書宋藏明刻及慧肇二注會本並同流通本清初本則作即南唐石本張書亦然則無我見柳書至明刻慧注等五會本流通本並同此與下文則為如來以佛智慧則為荷擔則於此經則為是塔則為消滅清初本則多作即皆成就不可量不可稱無有邊不可思議功德柳書如此其他各本作皆得成就按慧注云若人依經起行即生無邊之福與三佛性相應故能圓滿界種界謂真如種謂菩提心六度行界種即三佛性也玩此注意其無得字可知得者當得也今言與三佛性相應是已成就矣已成就者謂其成就相應已具有能圓滿界種之資非謂已成佛此即長水記所云若能宣説受持此則修行二利能令佛種不斷則名荷擔菩提蓋成就之言即言其成就荷擔所以長水記又云不可量等功德與無上菩提為因也據此足證本無得字心則狂亂柳書至明刻慧注等五會本並同流通本清初本則作即發阿耨多羅三藐三菩提者柳書如此其他各本者上有心字按經旨正破存有菩提法之心故下即緊接曰當生如是我應滅度衆生乃至無一衆生實滅度之心也則菩提下不能著心字應從唐人寫經明矣下同何以故若菩薩有我相人相衆生相壽者相則非菩薩柳書明刻本慧本並同翁書乃至流通本等若上有須菩提三字又清初本則非作即非實無有法發阿耨多羅三藐三菩提者柳書如此其他諸本者上有心字若有法如來得阿耨多羅三藐三菩提柳本慧本同其他各本提下有者字然燈佛則不與我授記古今各本皆同清初本則作即則為非大身柳書宋藏張書明刻慧注等五會本並同流通本則作即翁書及清初本皆然則不名菩薩古今各本皆同清初本則作即無有法名為菩薩柳書慧本肇本並同流通本作實無南唐石刻以後皆然按長水記云但約無我無人真如清淨名為菩薩非謂別有一法足證本無實字若有之當云非謂實有一法不云別有矣恆河中所有沙柳書宋藏張書慧本並同流通本恆上有如字南唐石刻明清諸本皆然有如是等恆河柳書宋藏張書慧本並同流通本等上有沙字南唐石刻明清諸本皆然過去心不可得現在心不可得未來心不可得古今各本並同惟慧本初過去次未來三現在無著菩薩論亦然論云過云已滅故未來未有故現在第一義故如來不應以色身見柳書慧本同流通本色身上有具足二字南唐石刻以後諸本皆然即為謗佛古今各本並同南唐石刻張書即作則爾時慧命須菩提至是名衆生柳書無南唐石刻以後有按此六十二字秦譯本無之乃後人據魏譯增入者故肇注乃至纂要皆未釋及惟贊述已引魏譯加入釋之大約唐時或加或不加至五代以後本則無不加入耳總之此段之義偈論俱有取魏譯增入亦佳秦譯蓋因前文已有如來説一切衆生則非衆生故此處從略歟為無所得耶如是如是柳書慧本同流通本如是上有佛言按南唐石刻已有佛言二字矣則得阿耨多羅三藐三菩提柳書至明刻慧注等五會本並同流通本清初本則作即如來説非善法柳書宋藏張書慧本並同流通本説下有即字南唐石刻明清諸本皆然古注如慧注贊述引經皆無即字惟纂要引作即非受持為他人説柳書慧本並同流通本受持下有讀誦二字南唐石刻以後本皆然如來則有我人衆生壽者柳書至明刻慧注等五會本並同流通本清初本則作即則非有我同上則非凡夫同上又清初本及今流通本此句下復有是名凡夫句柳書至明刻慧注肇注智疏贊述四會本皆無之清初有本注明為古本所無詳考各古注皆無是名句義也轉輪聖王則是如來同上汝若作是念發阿耨多羅三藐三菩提者柳書慧本肇本並同流通本者上有心字南唐石刻以後本皆然發阿耨多羅三藐三菩提者於法不説斷滅相同上以滿恆河沙等世界七寶布施柳書慧本同流通本布施上有持用二字南唐石刻以後本皆然而明刻本有少持用二字者此菩薩勝前菩薩所得功德須菩提以諸菩薩不受福德故柳書張書慧注贊述二會本並同流通本功德下有何以故三字南唐石刻磧砂藏亦然明刻本間無何以故句是微塵衆寧為多不甚多世尊柳書宋藏明刻慧注等五會本皆同流通本甚多上有須菩提言句南唐石刻張樗寮書清初本皆有之佛則不説是微塵衆柳書至明刻慧注等五會本並同流通本清初本則作即則非微塵衆柳書宋藏張書明刻慧注等五會本並同流通本則作即南唐石刻清初本皆然則非世界同上若世界實有柳書如此慧注會本作有實流通本及南唐石刻以後各本皆作實有者則是一合相柳書翁書宋藏明刻慧注等五會本並同張樗寮書清初本流通本則作即則非一合相柳書宋藏張書明刻慧注等五會本並同南唐石刻清初本今流通本則作即則是不可説柳書至明刻慧注等五會本並同清初本今流通本則作即是人解我所説義不世尊柳書慧本同流通本不下有不也句南唐石刻以後各本皆然惟明刻無之即非我見人見衆生見壽者見古今各本皆同惟明刻即作則發菩薩心者柳書至明刻慧本並同流通本清初本菩薩作菩提按長水記云發菩薩心者揀餘人也金剛經校勘記終金剛經校正本跋金剛般若波羅蜜經自唐以來受持遍寰宇書寫刊印者既多文字訛奪亦因之而日繁勝觀弱冠受此經初惟依隨讀誦而已莫明其義亦不辨文字有異同也遜清光緒季年金陵刻智者疏成味其疏義頗有與今本文字不協者稍稍疑之因廣搜舊刻復見東瀛續藏中肇慧諸注疑愈甚及覩唐人柳誠懸寫經則與諸古疏義合然後始知今本之訛誤甚多也繼而應聘校理北平圖書館所藏燉煌石室唐人寫經其中金剛經最多大抵與柳書同乃深慨夫沿訛襲謬由來蓋遠今幸獲古人真迹及古注疏千餘年淆誤因得證明奈何不鋟布於世以匡之乎然而習非成是久矣荊人獻璞鑒真者稀宜俟機緣未堪率爾時民國八九年間也逮歲庚午有潮陽郭居士者精刊此經謂依柳書書出大有非難其擅改經文者實則其刻尚未盡依柳書甚矣習非成是有如是乎雖然古本之善終不能掩試舉一二如古本前周曰應云何住後周乃曰云何應住一字升降其義迥殊自訛為一格遂有誤認文復者矣是名句或有或無各具精義自訛為處處有之遂多以三諦説之矣不知般若正明二諦蓋於二諦遮照同時即是中也豈二諦外別有中乎台宗以三諦説一切法然智者大師本經疏義始終皆明緣生之法莫非假名故曰即非達其即非乃會真實其於是名祗作假名會是真善説三諦者若必執三諦名言而以是名配中是名莊嚴則可是名我見人見衆生見壽者見云何通耶壬申之秋應諸友夙約為説此經悉依唐人寫本而融通諸論及古注義蘊以説之大衆歡喜踴躍請以校正本印布之欲使共知確有依據孰正孰訛大明於世也於經後附校勘記引諸異本及各家疏釋不厭求詳以資覆按而述其緣起於此一事之興也無不關時況甚深般若乎依文字起觀照悟實相文字因緣所關非小或曰禪宗即般若度而不立文字何也曰子誤矣楞嚴經云知見立知即無明本知見無見斯即涅槃無漏真淨此不立之旨也豈斷滅文字相且諸家語録非文字乎語云依文解義三世佛冤離經一字便同魔説何況一字之差大有出入何可忽也癸酉春勝觀謹跋中華民國三十三年甲申四月普慧大藏經刊行會敬刊
