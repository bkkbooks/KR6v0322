body:
  text: 震旦清信士勝觀江妙煦遺箸庚次推闡無住以開解分五辛初約果廣明次約因詳顯三請示名持四成就解慧五極顯經功此推闡無住以開解一科又分五小科初為約果廣明即自第九分至第十分前三行是也約果廣明蓋承上一切賢聖皆以無為法而有差別而舉事證明也亦與不應取法取非法不可取不可說佛法即非佛法遙相呼應得而無得不取法也所謂即非佛法也無得而得不取非法也所謂佛法也得而無所得無得即是得心行滅言語斷何可取何可說哉總以明其兩邊無住之意果地如此因地可知小乘如此大乘更可知矣辛初分二壬初泛論四果次師資證成壬初又四癸初明初果離相須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹初果斷盡三界八十八使已見真空之理而知無我亦無我所矣若作我能得果之念是我見依然何云得果乎二果以上例此須菩提皆就四果名相辨釋令著果相者當下可以爽然自失此說法之善巧也不也是活句猶言不是無得亦不能作念是名之名謂假名也不可坐實坐實即是作念著於有所得矣梵語須陀洹此云入流謂已涉入涅槃末流由此循流溯源可達涅槃彼岸也然而雖稱入流實無所入不入句正釋其故蓋根塵相對名為六入謂根塵相入也如眼對色則若有色入眼眼即為色所轉是亦可曰眼入於色矣餘仿此所以相入者識為分別故今曰不入明其能空情識矣因其不入六塵無以名之名曰入流亦因其不入六塵情識能空故雖名入流而實無所入是特假名入流耳故曰是名須陀洹名者假名也名相也下是名句皆仿此意中若曰倘作我能入流之念是明明有所入矣若有所入情識依然何云得初果耶總之得果正由無念作念便非得果癸次明二果離相須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含梵語斯陀含此云一往來證初果已進斷欲界思惑上上乃至中下共六品尚餘下三品欲界思惑共九品斷五品已即斷至中中品名二果向斷至六品名得二果須一往天上一來人間斷之故稱一往來然其心中實并往來之相亦無之因其無往來相方能一往來亦因其尚無往來相豈有一次往來兩次往來之別是亦假名為一往來耳意若曰倘作一往來之念是明明著往來相矣既已著相儼然分別初果尚不能得何云得二果耶癸三明三果離相須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無來是故名阿那含梵語阿那含此云不來證二果已進斷欲界下三品思惑盡寄居色界四禪天不來人間矣故稱不來然其心中實無所謂來因其來意已無故能不來亦因其尚且無所謂來豈有所謂不來是亦假名不來耳意若曰倘作不來之念是明明來與不來猶未能淡焉忘懷也若未全忘情識尚在尚非初果所應有何云得三果耶癸四明四果離相須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者梵語阿羅漢此云無生證三果已在四禪天斷上二界七十二品思惑盡便證無生法忍不受後有生死從此了矣故稱無生然其心中實并法而亦無之因其無法則生滅心息故曰無生亦因其尚且無有無生之法豈有所謂無生是亦假名無生耳意若曰倘作無生之念是明明有法矣既有法相即著我人衆壽生心動念依然凡夫何云得四果證無生法忍耶壬次師資證成分二癸初約當機無得證次約往因無得證癸初又三子初引佛說世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢無諍者不與物競一切平等之意由不自是故能無諍無諍則不惱他意在守護他心令不生惱修此三昧豈非大慈然此三昧之所以成者則由於人我是非之相皆空涅槃云須菩提住虛空地若有衆生嫌我立者我當終日端坐不起嫌我坐者我當終日立不移處可見由其住於虛空乃能如此長老解空第一故能入此三昧耳十大弟子各有特長皆稱第一大迦葉以頭陀稱阿難以多聞稱他如舍利弗智慧目犍連神通羅睺羅密行阿那律天眼富樓那說法迦㫋延論義優波離持律以及須菩提解空皆第一也三昧者此云正受亦曰正定不受諸受名正受一切不受則不為一切所動是為正定人謂凡夫凡夫喜諍豈能無諍故曰人中最為第一欲字廣義遍指思惑斷盡三界貪等煩惱方真離欲凡成阿羅漢無不離欲離欲亦必不與物競但未得無諍三昧乃讓長老亦得第一之稱偈頌云依彼善吉者說離二種障新眼疏以見思惑當二種障義狹古注謂離欲是離煩惱障為一切阿羅漢所共有見惑思惑通為煩惱雖得無諍三昧而不存有所得即是自忘其無諍是自忘其在定矣此為離三昧障乃真得無諍真得三昧故稱第一離欲阿羅漢合上句言之謂不但於一切人最為第一即以阿羅漢之離欲言亦稱第一也此是世尊平日稱讚長老之詞故曰佛說長老既自忘在定諸弟子又不能及唯究竟覺者能知其入此三昧故惟佛能說佛者究竟覺之稱也此一科正標舉其功行事相非談離相次科方陳離相也故不曰如來說而曰佛說以如來是性德之稱約性而言則無諍及第一等等名相皆不可說矣本經中即一稱謂無不含有妙義如是如是子次陳離相我不作是念我是離欲阿羅漢流通本有世尊二字寫經及古本無之可省也此中兩句經文易解今當說者長老但云離欲阿羅漢而不云無諍三昧者亦有妙義蓋正明其自忘在定也且普通之離欲尚不存有所得其不自以為得無諍三昧可知矣子三釋所以分二丑初反顯世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者我若作是念句惟肇注本無此我字按下句有我字此原可省今本既一依寫經故仍之阿羅漢道即謂離欲阿蘭那此云寂靜亦云無事謂事相相盡於外心息於內內外俱寂無時不靜也即無諍三昧之別名行者功行樂者好也心與契合之意蓋好之至極曰樂有性命以之之意樂阿蘭那行謂心之與行契合無間即證得之意上句不言離欲而換言阿羅漢道下句不言無諍三昧而換言樂阿蘭那行者取兩名含義正同阿羅漢為無生謂一心不生也阿蘭那內外俱寂亦一心不生意則存有所得便非真得之意更為顯然易明也得此反顯則上來所云有我等相即非菩薩以及取相則為著我等相之義乃益闡明何以著我便非菩薩以其功行全失故也心念若起必有取著著則成相其相便為我人衆壽蓋其所以起念者無他未忘情於能得所得故也能得便是我相所得便為人相誰為能得我也故能屬我對能為所猶之對我為人故所為人相也能所不一為衆相執持不斷為壽相也作一得念便不能得可知作一布施等念便不能布施矣則發大心行大行者萬不可住相也明矣因布施者若存有所施最易志得意滿尚能廣行布施乎餘可例知丑次正明以須菩提實無所行而名須菩提是樂阿蘭那行正明中實無所行句作實無其所行解謂行而無其所行也無所得義亦如此不可誤會為一無所行一無所得此科承上科來應言實無所得而今曰實無所行者有深意焉蓋謂因修行此行時無其所行方名樂阿蘭那行換言之即是因無其所行然後乃能證得也使一切因地之人聞而悚然倘不能無住而離相則虛此修行矣上舉果位為言者正為因地人作對照今言小乘果位已畢故特言實無所行以點醒之不曰以我實無所行而曰以須菩提亦含深意蓋表明所謂實無所行者乃自旁觀者見得而本人并忘其為實無所行也意顯即實無所行亦不能存於心中存之便是住相何則心存便是心取若心取相則為著我人衆壽矣又玩其語氣若代世尊言者意明世尊說須菩提是樂阿蘭那行者無他正因須菩提實無所行耳而名之名亦有義使知樂阿蘭那行亦屬名相性中著不得此語綜觀上數科之義凡以明必得而無其所得乃為真得若有所得便為非得使因人知必行而無其所行乃為正行若有所行便非行矣云何無其所得無其所行不作念是也不作念正指示不取不住之方針知此然後無住始有入處此皆所欲闡明者也癸次約往因無得證佛告須菩提於意云何如來昔在然燈佛所於法有所得不世尊如來在然燈佛所於法實無所得此世尊往昔行菩薩道初登第八地時之事也望於後成正覺仍為因地而望於初發心人則為果位今引此事是為發無上菩提心者而說故將此往因一科併判入約果廣明中然燈佛事及為世尊授記本師事見本行集經及瑞應經然燈未出家時本名錠光有足為錠無足者為燈以生時一切身邊如燈光故世尊時為七地菩薩名曰儒童又曰善慧正修行第二阿僧祇劫將滿之際遇佛聞法證無生法忍而登八地遂入第三僧祇然燈為之授記云是後九十一劫名曰賢劫當得作佛號釋迦牟尼也無生法即謂真如實相忍者通達無礙不退之意所謂理智相冥忍可印持也大乘證無生法忍有種種說智論謂登地約別教言便得仁王等經得在七八九地須知圓初住上即已分證所謂破一分無明證一分法身至於八地則證圓滿故稱無學直至等覺見性猶如隔羅望月唯究竟覺乃證得究竟耳於法之法諸疏皆約授記語言說缺妥唯蕅益約無生法忍說甚是諸疏蓋泥於彌勒頌耳頌云佛於然燈語不取理實智以是真實義成彼無取說按偈頌中之語字並非尅指授記語言世尊昔因聞法而證無生故為授記則頌中語字似指然燈所說之法言頌意蓋謂聞法語而不取著於理體及實智別於權智故曰實智以是之故真實義得成由此可證彼謂世尊決無取著於然燈所說也此句是頌長老實無所得句意總之由其不著於理智故能理智相冥而證無生真實義指無生言無生法為真如實相故曰真實義也或指在然燈佛所所聞之法說亦可有所得者有其所得也有其所得便是取著便是住相問意謂彼時聞法能不住相否若約證得無生忍說則得字更易明了問昔得無生法時心中有一個所得之無生法否此中不言作念者以有其所得便是作念故省略之世尊雖是探問實已暗度金針開口便曰如來約性而言法且無形得從何有世尊以下為長老語於世尊二字可見矣宋後經本世尊上有不也大誤凡不也下有文字者皆為活句觀下文所答乃決定義何需此活句為也長老開口亦稱如來正與問語針鋒相對其為無所得已無待煩言矣長老何以知於法實無所得作此決定之詞耶以聞法住相則心中生滅未息何能便證無生故知彼時得聞說法而實無其所得也此約聞法釋若約證無生法釋者既是證得無生法豈能存有所得若有一所得之無生法在仍然是生滅心尚能謂之證無生法乎故知雖得無生法而於此法實無其所得也以上依文解義已竟而此科總義尤含妙蘊不可不知何云總義即何以又說此科是也今略分三節說之上來諸科於得果無住之義業已闡發盡致因地之人當可了然必應無住矣然猶防人以為雖因果必須一如果既如是因亦應如是然而小乘果位與大乘因行或者有不盡同歟故小乘說畢特又舉大乘果位亦是得而無得不可住相之義以明之使凡修大乘者於無住之旨毫無疑蘊也此其一說大乘果位不舉佛而舉菩薩者防疑佛乃究竟覺豈可相擬而菩薩地位則界於因果之間本經下文又引此事而申言之曰彼時若於法有所得則不授記以無所得乃得授記使知菩薩住相便不能成佛則發心修大乘者若其住相豈能成菩薩又豈是菩薩行故上科有言若有我人等相即非菩薩也如此一說因果一如之理及無住之要更得恍然此其二引菩薩果位固已然不舉別地菩薩獨舉第八地者何故因前說小乘果位以得無生者為證道為無學故今舉大乘亦引第八地得無生至無學者為言無學即證道之意蓋八地以前雖證而未圓滿故稱有學若論究竟證則在佛位大小乘所證皆同令聞者於無住之理不致絲毫有疑且本經開章便說當發心令入無餘涅槃後又曰賢聖皆以無為法涅槃也無為也皆無生無滅義也故大小乘皆舉證無生者言之正與前言相應使知既發心欲入無生心不生滅云何心能不生必當無住於相一有所住是生滅心那能證入無生耶故無住正是無生之唯一入手方法此其三也觀此三義可知本經義理之細密線索之嚴整矣結經者冠以佛告二字正指示我們此中含有奧義不可僅向文字中求也辛次約因詳顯分二壬初約因心正顯次約經功校顯壬初又三癸初先明嚴土不住須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者則非莊嚴是名莊嚴菩薩修因時六度萬行一一功行回向淨土甲年講此並詳談佛土之義佛者報身之相土者依報之相也此之謂莊嚴所謂願以此功德莊嚴佛淨土是也然則菩薩豈有不莊嚴佛土者舉此為問正欲修行者明了莊嚴之道耳不得其道則所莊嚴者皆在相上與自性無涉便成有漏功德矣此舉問之深意也須知莊嚴佛淨土淨字最要緊土云何淨由心淨耳既須心淨所以莊嚴不能著相若心取相便不清淨矣此意云何必須明了上文不應取法兩句之意方為真實莊嚴之道耳何則莊嚴而著相是取法也若誤會不著相之意而絶不莊嚴是取非法也舉此以問正是探試果能領會得兩邊不取之真實義否耳復次上來疊舉果德無住問答者原為闡明因行亦當無住至此正說到因行上矣莊嚴佛土之菩薩即發無上菩提之菩薩也明得嚴土之道便明得布施等之道矣不也活句猶言非有所莊嚴非不莊嚴何以故下正釋其義莊嚴佛土者句標舉之詞則非句明其不著有即是不應取法是名句明其不著空也即是不應取非法蓋約心性言性體空寂空寂即所謂真諦真諦者明其非虛相欲證真諦必應離相故曰則非也非有離意豈有所謂莊嚴故曰非也而約事相言可聞可見可聞可見即所謂俗諦俗諦者世間相也假有不實故曰名也明明具足莊嚴故曰是也意若曰因其名相是有故不應著空而取非法菩薩應勤修六度萬行以莊嚴之因其心性本空故不應著有而取於法菩薩雖精進莊嚴而心中若無其事也如此一心清淨則土自淨此之謂莊嚴佛土方得莊嚴之道須知修因尅果而得勝妙之報身清淨之佛土皆由心現且皆由心淨乃能現之譬如磨鏡塵盡而後像顯故唯識論云大圓鏡智能現能生身土智影總之莊嚴佛土應不取著不斷滅則非者明其不取著相也是名者明其非斷滅相也又甫言則非即接言是名者明其雖非而亦是性必現相性相從來不離若知其非而不取著時何妨莊嚴其相也欲言是名而先言則非者明其雖是而卻非因相本以性為體相從性生故於行其是而不斷滅時仍應會歸於性也此是佛與須菩提問答闡明之要旨吾人必應領解此旨依教奉行者也則非是名兩句即開念佛法要也則非者明自性清淨本無有念也是名者明妄念繁興必須執持名號以除妄念也必應念至無念而念念而無念妄盡情空一心清淨而後可是之謂一心不亂不亂即所謂清淨也如其心淨即佛土淨矣癸次顯成發無住心是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心此科經文不多卻是結束前文為自開口說起說至現在千言萬語之點睛結穴處故其中義趣甚細甚深若只依文解義等閒看過則孤負佛恩矣今欲說明云何點睛結穴先當依文釋義而寥寥兩行餘之文七穿八透妙義環生即依文釋義亦復不易也是故者所謂承上起下之詞也既是通貫前來諸說則不但上承嚴土亦不但上承約果廣明且不但上承詳談中生信一科直是緊與開經處總示數語呼應相通也且先就近脈言之上來先明四果各各得果無住次須菩提自陳得果亦無所住此皆小乘也次世尊復就自身往事以明於法實無所住經云於法實無所得即是於所得之法不住也此言大乘矣然猶界於因果之間最後更就菩薩修六度時於莊嚴佛土亦無所住則非句不住法相也是名句不住非法相也則專說大乘因地矣如此不憚苦口層遞說之愈說愈近無非欲闡明此科中之應生清淨心應無所住而生其心耳因即以是故二字承上起下以明上來所說皆是為生心無住無住生心作張本亦即為善男子善女人發阿耨菩提心者指示方針耳約果廣明原承一切賢聖皆以無為法句來而彼句又是結以前所說者所以此科與開口處善男子善女人等句呼應相通諸菩薩摩訶薩即開經處所說之菩薩摩訶薩亦即發阿耨多羅三藐三菩提心應云何住云何降伏之善男子善女人也應者決定之詞無論小乘大乘果位因地皆當無住可知發大心者決定亦當無住非此不可故曰應也此科之文既是承上起下則如是二字即並指上下文只說一邊義便缺圓且先約指下文說蓋正指應無所住而生其心句而不應兩句亦兼指在內須知不應住色兩句乃應無所住句之前提故說到應無所住而生其心句則不應兩句之義便全攝在內矣總之不應住色乃至而生其心三句皆是應生清淨心句之注腳如是則淨不如是則不淨故曰應如是生清淨心也此科之文是教導發菩提校提下舊版有心字原稿無者應當如是何以不曰發心而曰生心請問發心生心同耶異耶曰同而不同生即是發何異之有故曰同也生之取義比發字深何以言之發者但約其已經表著為人所知者言生者不但言其表著且有推究其本源之意因凡言生必有其根若無有根云何得生故發心之義謂其先無而今發起而生心之義乃謂其本具而能現前故生心比發心義深此其不同也何以得知生心之義乃是如此觀清淨心三字便可了然蓋清淨心即是本具之性所謂自性清淨心是也清者不濁淨者不染譬如真金辱在泥塗用功洗滌真金宛在性亦如是雖一向為無明煩惱塵垢所障但能依法修行清淨本性依然現前矣故此句之意是說凡發無上正等覺心之人應令清淨本性現前故曰應生清淨心言下有回頭是岸意其警人也深矣不但此也蓋指示前來千言萬語言不應住相者無非欲令見性耳清淨即無相之意凡夫著相因之障性今欲見性相何可著蓋凡夫著相故不清淨心不清淨所以障性也今欲見性故應清淨清淨其心故應離相也且說一生清淨心無異說明發菩提心之所以然何謂發菩提心曰一心清淨是已若心不清淨則所發者尚得謂之無上菩提乎何則菩提者覺也覺者覺照本性也且本性又名大圓覺海也當知本性一塵不染清淨無比既曰發覺而又著相則與覺字正相背馳所謂背覺合塵之凡夫是也故發覺心必應合覺云何合覺必應背塵背塵者不住於相之謂也由此觀之此一句中具有無數提撕警策之意初發菩提心云何便能清淨心現前須知正因其不能故令如是而修云何修下文所謂應無所住是也云何無所住下文所謂不應住色聲香味觸法是也此正的示無住之用功方法不應住色兩句義趣深廣若只略略看過僅明其一義真是孤負且義蘊既未窮究用功又豈能扼要豈能切實豈能入細既是在浮面上做則相何能離性又何能見乎故曰孤負也不但孤負佛恩直孤負自性矣一此色聲香味觸法名為六塵舉此為言者令明若著其一便是塵心正與清淨心相反此發正覺之心者所以必應背塵背塵而後合覺也不應住六塵者猶言不應合塵合塵則背覺矣其中消息間不容髮真所謂人心惟危道心惟微二色聲香味觸法所謂器世間也亦謂之境界相今云不應住此六者即不應住相之意色聲香味觸五字包括世間一切可見可聞之境界法之一字包括世間一切不可見不可聞而為心思所能及者之境界舉此六字一切境界相攝盡亦即世間一切境界皆不可著不但可見可聞者不應著即不可見不可聞者亦不可著此是教誡學人世間一切皆應不著三不應著者豈止境界而已蓋表面雖只言一六塵實則連六根六識一併說在內矣若但就表面觀即前所云但在浮面上做則不住二字功夫不能徹底亦復不能扼要雖欲不住而不可得也須知色是外境本無交涉交涉發生生之於住是誰住之曰眼也眼云何住曰眼識也乃至法是呆物若不住著毫無關係其發生關係固由於意而實由於意中慣於攀緣分別之意識由是可知經云不應住者令學人應於識上覺照不起攀緣分別耳經不但云不應住色不應住聲香味觸法而其下綴有生心二字者正指示學人欲不住相應在心上覺照即是應在起心動念時微密用功如是乃為切實四在起心動念時用功此是初學者下手處還須斷其思惑云何斷發大悲心廣修六度是也布施持戒度貪持戒忍辱度瞋亦復度慢般若則度癡禪定既度瞋而定能生慧亦復度癡而以精進之精神貫注之且六度皆自大悲心出則度度皆為利益衆生此又除我之利器也蓋因我見而起貪瞋癡慢故易起心動念今欲不為色聲香味觸法起心動念必須在大悲心六度行上加功乃為扼要也五如上所說仍未究竟必須戒定堅固生起般若正智無明破得一分識乃轉得一分待得八識皆轉乃為徹底初學必須多讀大乘經典般若尤不可須臾離依文字起觀照令其解慧漸漸增明正是釜底抽薪之法而解慧增明更可以增長戒定之力蓋戒定慧雖稱三學實是一事有互相資助生起之妙而定慧尤不能離定固生慧慧亦生定也此義不可不知六生心二字不但是令應在起心動念時用功尤有深意存焉蓋防不得意者不明用功方法校上括弧中語舊版在後不令生起下茲從原稿誤會不應住之意者一味遏捺意識不令生起如此行之其急躁者必致發狂嘔血即或不然亦是禪宗呵為坐在黑山鬼窟裏作活計者與外道之無想定何異既然道理不明不知本性活潑潑地無相無不相是謂道理不明則慧不能生惑不能除業苦當然亦不能消甚或轉為草木土石無知之物須知小乘之滅盡定並非由遏捺意識而得乃由證性想自不起且到此地位亦不應住住則墮無為坑焦芽敗種亦為世尊所呵故經文既曰不住色等又曰生心以示發菩提心者不應住於塵相非令心如死水也此意正與下文應無所住而生其心互相叫應指示學人既明且切矣七不住六塵生心更有一義蓋合上句言之是令發菩提修六度者當揀別真心妄心上句清淨心是真心此二句住塵是攀緣心即是妄心楞嚴云一切衆生從無始來種種顛倒諸修行人不能得成無上菩提乃至別成聲聞緣覺及外道等皆由不知二種根本錯亂修習一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者此中上句曰應下二句曰不應正親切指示不可錯亂修習也須知住塵之心是識因其攀緣名之曰妄而此之妄心原是真心之所變現云何變由其不達一真法界分別人我故也故發大心之人首須揀別真妄不應以住塵著相之心為真心也所以本經專重破我不應住六塵生心即謂不應著我也何以著塵即是著我譬如行六度者若意在人知便是住色乃至著法如此等等無非我見之故也說此兩句原為叫起下句應無所住亦有多義一即謂於六塵無所住二謂根塵識一切不住不論住著者為何心便染污便是塵相三無所住者一無所住之意四無所住者無其所住也所住為色聲香味觸法今云應於心中無其所住非謂無有色聲香味觸法也含有不執著亦不斷滅兩意復次所住之無由於能住之空所住指境言能住指識言故應無所住猶言應令情識盡空而生其心之而字有兩義一而者而又之意應無所住而又生其心此承前說無所住兼有不斷滅意而說即是說明上文所言不應住六塵生心者乃是應心中無其所住之色聲等相非謂斷滅相不斷滅者以心不可斷滅故上言不應住塵生心者是令應無所住而生其心耳其字可指菩提以及六度如是則所發修行六度之心方為菩提心以其背塵離相合於自性清淨心故二而者而後之意此承前說應無所住猶言應令情識俱空來則其心即指清淨謂無所住令其妄盡情空而後方能現其清淨心耳生者現前之意蓋應生清淨心句是標舉之詞不應兩句是修行方法應無所住句是功效必須如是作種種釋庶幾經義稍覺顯豁圓備然亦不過大海一滴而已上來依文解義竟以上依文釋義已竟云何是上來諸說之點睛結穴處乎且逐層逆說而上前科不云則非是名乎四字之所以然前科原未顯發故此緊承其意而闡明之然則如是二字可說是正承則非是名來矣謂發大道心者莊嚴佛土應觀照則非是名之義趣生清淨心也蓋則非句是明應無所住何則性本無相莊嚴者其心應於六塵等相一無所住故曰則非知得則非則心淨矣所謂欲淨佛土當淨其心是也是名句是明應生其心也何則但應心不住相並非斷滅其相故曰是名是名者名正言順不能廢其事也須知莊嚴之事相不能斷滅即是莊嚴之心初未嘗息心未嘗息便是生其心也總之莊嚴而心不住相則熾然莊嚴時其心卻湛湛寂寂不染纖塵雖曰生心實則生而無生一心清淨故曰應如是生清淨心心淨土淨所謂隨其心淨即佛土淨是也菩薩莊嚴佛土如是如是此是發大道心修六度萬行莊嚴佛土者之模範也上生信一科有兩要句曰不應取法不應取非法此兩句不但攝上科意盡亦復攝全部意盡前已屢言之矣而此中之應生清淨心應無所住而生其心又是不應取法兩句之點睛處蓋上科兩句是分開說至此則將兩句之意合而為一以說之矣何以言之應無所住不應取法也生其心不應取非法也今云應無所住而生其心豈不是說雖不應取法而亦不應取非法乎前言不取法應以不取非法為界正是從此處悟得者所以獨揀持戒修福者能生信心亦因其決不致於取非法相方堪修此不著相之般若耳可見吾輩必應先將非法相一面關得緊緊絶對不取然後修習不取法相方合佛旨而生般若正智以證般若理體不但此也試觀應生清淨心句清淨即是無所住應生清淨心猶言應生無所住心也而無所住是不取法生心是不取非法應生清淨心是言清淨要在生心中顯現但清淨不生心便是死水佛法所不許豈不是說不取法要在不取非法中做出乎換言之不取法空也不取非法有也無所住而生心是明空不離有生清淨心是明空在有中空不離有猶言色不異空空不異色不離不異漸合矣然而空還是空有還是有是猶一而二也若空在有中顯現則色即是空空即是色空有相即則二而一矣此之謂空有同時必能如是方為兩邊不著何以故尚無所謂兩從何著邊耶不但此也既曰無所住又曰生其心豈非無所住亦應無住乎而應生清淨心之清淨二字即所謂無所住也然則生清淨心無異言生無住心雖生而無住是明其生即無生即是不住於生心也不住生心即是不住不取非法而不住無所住亦即不住不取法豈非兩邊不取亦應不取乎故上科於兩邊不取之下即引筏喻以明兩邊皆捨也上言空有同時明其尚無有兩邊無從著然而猶妨著於一也著一即所謂但中今則空有俱空一且不存著於何有無礙自在是真清淨矣不應取法兩句之真實義至此闡發深透故曰點睛也他如無法相亦無非法相即是應無所住而生其心非法非非法即是空有俱空之清淨心亦即無為法空有俱空則心行處滅言語道斷故曰不可取不可說此皆顯而易見可無煩言矣上科又有要句曰若見諸相非相則見如來其所以然亦在此中闡明諸相非相云何能見若其心被塵染而背於覺方且迷相為真何能見得諸相非相乎必須於六塵等相一無所住而心清淨庶幾其可何以故如來是已究竟證得清淨心者不住六塵之人雖未能云證得而渣滓漸淨清光現前譬如清淨水能現清淨月故曰則見如來也蓋如來是性體之稱必須不著相而照體方能見之耳上科開首不云乎菩薩於法應無住行於布施雖曾說明不住色聲香味觸法便是布施不住於相然而必須發心布施時其心本不是住在六塵上生起的然後行時方能不住於相若其心不淨行時豈能不著相可知此中所說正是說在本源上雖上科所說未嘗不含有心字意在其後亦曾點明之曰若心取相云云實則至此乃為闡發顯明若無此段發揮則布施不住相便未易得手故曰此科是上來諸義的點睛結穴睛既點則全身俱活穴既結則萬脈朝宗然後千言萬語一一都有個著落而依教奉行事事才有個把握矣總而言之明得無所住而生心之真實義則所謂生者乃是任運而生所謂無住者無妨隨緣而住隨緣而住者無心於住雖住而實無所住也任運而生者法爾顯現曰生而實無所生也果能如是則法法都顯無住真心物物莫非般若實相正古德所謂塵塵是寶處處逢渠也所以我須菩提前於世尊著衣乞食行坐往還時薦得無住的妙諦即於大衆從座而起頂禮讚歎曰希有世尊善護念善付囑而請問發大心者應云何住云何降伏我世尊即逗其機而印許之曰應如汝所說之善護念付囑者如是而住如是而降也以下復詳哉言之譬如千巖萬壑蜿蜒迤邐直至此處而結之曰應如是生清淨心應無所住而生其心應生清淨心者所謂應如是住也應無所住而生其心者所謂如是降伏其心也得此中一個如是點醒然後開口總示中所說的兩個如是才有個著落即是上面兩個如是得這一個如是其義乃更親切更透徹謂之遙相呼應尚隔一層直是融成一味矣所以此科兩行餘文是從開經至此的一個大結穴如堪輿家然千山萬水處處提龍若找不出個正穴來難免在旁枝上著腳不得要領若尋得正穴則砂也水也青龍也白虎也處處皆為我用矣學佛亦然學佛必須依教奉行教義幽深必應得其綱要所在而此段乃前來所說諸義之綱要也應於不應住色生心不應住聲香味觸法生心上如是知如是見如是信如是解無論修行何法行住坐臥不離這個庶於無住之旨才有個入處而自性清淨心才能漸漸透露出些消息來其所修之法亦可望有個成就之期也千萬千萬又此段既是上來諸義之綱要解得此綱要以行布施等法則頭頭是道所以下科約經功校顯中其福德大於生信者不知若干倍也癸三證以報身不住須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身譬如者比喻也凡是喻說皆以證明法說上之法說雖已闡發無遺今復證以喻說者無非欲聞者更得明了耳有人暗指發大道心之人大心為因大身為果也須彌山王喻勝妙報身此身微妙雖有形相然非地上菩薩不能見正是多劫勤修六度萬行福慧雙嚴功行圓滿方能證得所謂無邊相好身也若疑勝妙果報身相不同凡相此若不取則修六度萬行何為殊不知無論果位因地相與非相皆不可取若於此理少有未明則修因時便於應無所住而生其心不能深契此佛舉問之微意也須菩提深領佛旨故開口即答甚大言甚大者明其此身不無無異先與懷疑者以定心丸使知發大願修大行必獲勝妙大身固真實不虛也何以故者謂以何原故獲此大身耶佛是果德之稱非身有兩意一約證果說所證乃清淨法身之體非此報身之相也則非身指報身言二約證果說既是法身體而此法身周含沙界其大無外遍入微塵其小無內無形相無數量故淨名云佛身無為不墮諸數意顯約體言故說非身則非身指法身言是名大身指報身言以明勝妙高大之報身意顯約相言故說甚大是名者名相也意若曰約證法身說實為無形相之非身豈有大小可說今云甚大乃就報身名相言之得果者雖不無此高大之相而實不存有所得存有所得便是住於身相若住身相何云證清淨無相法身法身未證亦無甚大之報身矣若明此理則知不應取身相然亦非無此勝報能修六度萬行而不取著則證清淨法身而一切勝相自然顯現矣不必著有不必著無然後修因時便能不取我相不住六塵而生清淨心矣壬次約經功校顯分二癸初顯福德勝次顯勝所以癸初又三子初引河沙喻須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙天竺有一大河名曰恆河恆字音少訛應云殑伽河此翻福河印度此河譬如中國之黃河長江灌溉全國於交通種植商務文化上利益甚大故曰福河又古時印度人視為聖水得見此河或入河沐浴其福無量故亦翻天堂來以其出處高也中國亦有黃河之水天上來之句佛經云贍洲北向有九黑山次有大雪山更有香醉山香南雪北有池名阿耨達此云無熱惱池之縱廣五十由旬八功德水充滿其中池有四口口出一河湍流入海各分二萬五千道大河統灌四大洲東口所出即殑伽河也入東南海南口出信度河入西南海西口出縛芻河入西北海北口出徙多河入東北海恆河之沙極細細則其數益以見多故佛經中凡言極多之數不可計算者則以恆河沙喻之又因天竺人人知有此河知河中沙數不可計算舉河沙為喻者以其為大衆所共曉也如恆河之如字譬如之意其口氣貫注下文如是沙等恆河句沙等恆河者將現在恆河中所有之沙一沙化成一新河原來之沙數無量則新恆河與之相等其數亦復如是無量故曰如是沙等恆河猶言譬如將現在恆河中所有的無量沙數化為與如是無量沙數相等的無量新恆河也是諸恆河者是者此也諸謂無量問此無量新恆河中之沙可為多否答曰甚多者明其多至不可說也但諸下數句謂但就新恆河言之已多得無數可計何況其中之沙其數更是無邊無可形容只得儱侗說一個甚多耳子次明寶施福須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊實言告汝說在此而意注下科使知下文所說持說之福更多於此是真實語不可不信古文中之爾所即今人行文所謂如許如許者指點之詞即滬諺之格許多北諺之這默些格也恆河無量河沙無邊爾所恆河沙數猶言無量無邊也須菩提深領佛旨知上來所說無非借有為法之極大福德作一比例以顯持說之無為法福德更大於此意原不在於此故但答曰甚多不加別語子三顯持經勝佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德受持及四句偈之義前已具說四句偈等極言持說極少之經尚且福德勝前則持說全經其福更勝不待言矣受持則能自度為他人說則能度他自度度他是菩薩行故福德極大也持經說法福德勝過布施其義有通有別通者無論持何經說何法莫不皆然別者專就此經說也今先明通義約自度言布施若不知離相福德大至極處亦不過生天而已故名為有漏功德即是言其尚漏落在生死輪回道中說不上自度也若能受持經義能開智慧能知輪回可畏而求脫離行布施時亦知離相則是福慧雙修能達彼岸了生死證聖果視彼但能生天仍不免入輪回相去天淵所以雖僅受持一四句偈等其福便勝於充滿無量無邊大千世界之寶施何況受持全經者耶約度他言財施不及法施具含多義茲略明之一財施施者受者未必有智法施非有智不能施亦非有智不能受二財施施者得大福受者只得眼前小益法施則施與受者皆得大福三財施但益人生命法施則益人慧命四財施伏貪法施斷惑五財施雙方不出輪回法施雙方可了生死六財施雙方之受用有盡法施雙方之受用無窮七財施施小則所益者小法施可以少施獲大益問然則但行法施不行財施可乎曰否菩薩攝受衆生財施亦不可無但宗旨在行法施不以財施為究竟耳以上為通明持說一切經法二利之益也下科正別明持說此經之益須知金剛般若直指本性若能見性便可成佛豈但自己了生脫死令衆生了生死而已直可度無量無邊衆生皆令成佛紹隆佛種莫過此經其福德之大不可思議又豈止勝前滿無量無邊大千世界寶施之福德已哉癸次顯勝所以分二子初明隨說福復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟凡言復次雖是別舉他義實以成就前義前已詳言之矣隨者不限定之意略言之有五曰隨人無論僧俗聖凡曰隨機無論利根鈍根此即淺深互說意或說第一義或說對治曰隨文無論多少廣略曰隨處無論城鄉勝劣曰隨時無論晝夜長短曰隨衆無論多人一人如遇宜說機緣即為說之此之謂隨說當知者警誡不可輕忽之意此處即指說經之處說經處如此說經人可知矣下科云當知是人云云故知言處兼言人也總之聞經者不可不存恭敬心何以故尊重法故不忘所自故而說經者卻不可存此心何以故遠離名利恭敬故不應著相故此則雙方皆應知之者又如大般若經云帝釋每於善法堂為天衆說般若波羅蜜法有時不在天衆若來亦向空座作禮供養而去此即諸天遵依佛說恭敬說經處之事實也又大品云諸天日作三時禮敬六齊日彌多經所在處四面皆令清淨世間猶言世界間者間隔之義如言一間屋是明屋之界限若其無界何名一間故說世間無異乎說世界也世是豎義三十年為一世也界是橫義各方各處各有其界也今日一切世間明其豎窮未來橫遍十方即是盡未來遍法界義言天言人意即賅攝三界所有衆生而言天言修羅意即賅攝天龍八部也故名雖舉三意包一切皆應二字正與當知相呼應云何當知以皆應也應者非如此不可故當知也供養有二一事供養略說十事即香花瓔珞末香塗香燒香幡蓋衣服伎樂合掌禮拜是也說經之處乃是道場故應如是莊嚴恭敬二法供養即是如法修行利益衆生如聞而展轉為他人說或以經贈送等攝受衆生如勸人來聽分座與人等乃至不捨菩薩業如遇阻難亦必來聽即是不捨不離菩提心如發起大願大行不違般若正智不離者不與經旨相違也等是也如佛塔廟者言皆應如供養佛塔佛廟一般的供養供養塔廟人所共知說經之處或忽視之故舉塔廟為例以明說經即是道場便與塔廟一般無二故皆應供養也何以便是道場下文更鄭重明之總以發明說法人是佛所遣所說法本是佛說故代佛宣揚即同佛在法華云能為一人說法華經乃至一句是人則為如來所遣行如來事法華然一切經皆然金剛般若更無不然上文曰當知者指此若其知是人為佛遣法是佛說自知皆應恭敬供養矣塔是梵語具云塔婆其音少訛實是窣堵波也義云高顯處亦翻方墳圓冢塔必高顯者所以表勝也佛塔多種今且明四所謂生處塔成道塔轉法輪塔般涅槃塔是也今教供養如塔即攝此四種塔之義也何以言之此經是明實相實相者佛之法身也又曰一切諸佛從此經出則此處豈非佛生處之塔乎聞法而後知修因證果而此經生福無量夙罪皆消當得無上菩提故此處便同佛成道處之塔也代佛宣揚大乘最上乘法是此處正為佛轉法輪處之塔矣般涅槃者義云無為亦為生滅滅已理事究竟之義而此經所說皆無為法令聞者滅生滅心證究竟果所謂令入無餘涅槃而滅度之謂此處即是佛般涅槃處之塔不亦可乎廟者貌也意明供佛像處梵語為支提凡是佛塔必供佛舍利舍利即佛真身凡供佛像之廟必有經法必有僧衆言一廟字即是住持三寶所聚之處今云如佛塔廟是明說經人代佛宣揚便同真佛在此說此大法紹隆佛種便是住持三寶故曰如佛塔廟皆應供養上文曰為他人說福德勝前者因此之故由此可證經雖說處意實在人然而尊重說經人若此倘說經人非法說法法說非法妄談般若誤法誤人其罪業之大亦不可言喻從經之正面即可看到反面此又說經人所當知應兢兢自審不可少忽者也故下文又曰何況盡能受持云云受者謂領納真實義也持者謂依義修持也然則不能修持便是能說不能行如數他家寶自無半錢分矣且不能修持亦必不能領納因甚深微妙真實義決非能從文字上領會得的不能領會而說勢必至於妄談般若淺說般若矣警戒說經人可不謂之深切著明乎哉子次明盡持福分二丑初正明盡持何況有人盡能受持讀誦言受持復言讀誦者明其必能領納修持方為真能讀誦不然讀誦之益小矣且既能受持還須讀誦以經中義蘊無窮時時讀誦更能熏習增長則受持之力日益進步也上言說此言受持一不同也上言隨說四句偈等此言盡能受持讀誦二不同也而言有人一若另是一人初未指定即是說經之人者言何況亦是顯明盡能受持讀誦之人更勝於隨說之人然而世尊如此分而說之者一以明其受持功大使人皆知趨重此點二以明其能說必由能受持來隨說必由盡能受持來若非盡受盡持豈能頭頭是道為大衆隨時隨處隨機隨文而說耶三以明盡能受持必應遇有宜說之機會即須為人說之非但盡能受持便是更勝也故上文與此科之文相雖別義實互相彰顯則如來之意實欲人人既能說又能受持既能受持又能說不可分而為二各行其一此意云何知之於下言成就二字上便可了然蓋世尊說此經法原望人人成就而成就必須自度度他二利圓滿方可若但知說或但知受持是於利他與自利偏在一邊尚有成就之望乎故知經文話雖分說義實一貫讀經聞法不應執著文字相必應如是領會真實義此之謂依義不依文又先言隨說一段與經初先言度盡所有一切衆生之意正同意明菩薩發願未能度己先欲度他度他即是度己也次言何況盡能受持亦與經初言復次菩薩應無住法而行六度之意正同意明度他還要自度而自度原為度他也若不領會得自他不二之義尚能謂之能受乎尚安有成就可期乎世尊說法如牟尼珠面面俱圓若不如此領會豈不辜負此文須知各經之文無不說得極其周到詳密特恐人粗枝大葉一知半解不能盡空諸見靜心體會必致取著片面昧其全體自誤誤他所謂依義者是教人必須融會貫通明其真義所在而不依文者即是不可聞得一言半語便斷章取義耳丑次正明所以分二寅初約成就正顯須菩提當知是人成就最上第一希有之法最上第一希有之法何法乎即阿耨多羅三藐三菩提法也此法為究竟覺自證之法成就此法亦即成佛之意彌陀經云釋迦牟尼能為甚難希有之事能於五濁惡世中得阿耨菩提甚難希有即第一希有也更無在佛之上者故曰最上若分言之阿耨菩提義為無上正等正覺正覺者從來不覺而今能背塵合覺非希有乎正等者等是平等之義今不但自覺而能覺他自他不二空有不著平等法界是第一義故曰第一無上者徑達寶所證究竟覺所謂無上菩提無上即最上義也古注渾簡現為確鑿言之使知其義至後人所注或以三身釋或以三般若釋則義缺親切圓滿矣成就者言有成就此法之可能也是人即通指隨說是經盡能受持及聞經而能受持能隨說之人當知二字統貫下文若就本句說謂如是之人福慧并修自他兩度便得直趨寶所大有成就不可輕視如知得是人成就不可思議便知其福德遠勝於以充滿無邊無量大千世界之七寶布施者一有漏有為一無漏無為所以致異者在此奚足怪乎寅次約熏習結成若是經典所在之處則為有佛若尊重弟子中國經字本有路徑之義典者軌則之義是經所明皆是發菩提心者不易之正軌共遵之覺路行此路依此軌自然直達寶所故此經所在之處便是寶所既成寶所故佛及一切賢聖莫不在此若尊重弟子猶言以及一切賢聖若者及也尊重弟子或曰指迦葉目連諸大弟子或曰指文殊普賢諸大菩薩總之佛所在處便有大衆圍繞而為說法譬如衆星捧月故尊重弟子是統謂一切賢聖菩薩羅漢盡攝在內不必分別專指也大般若云般若所在之處十方諸佛常在其中故欲供養佛當知供養般若般若與佛無二無別知十方諸佛皆在於此則知遍虛空盡法界之一切菩薩羅漢無不盡在於此矣總以明此經殊勝在處處貴在人人尊而已綜上來數科觀之初顯說經之處次顯受持之人至此則知所以顯處顯人實為顯此經之功經功非他即是般若正智則所以顯經又復實為勸人供養此經讀誦此經受持此經廣為人人說此經以期由文字起觀照證實相耳佛之說法眼光四射面面俱圓如此又初顯處時說皆應供養如佛塔廟是明說經即是住持三寶也今則言凡經之所在處便為有佛及一切賢聖是明常住三寶也而中間乃曰是人成就最上第一希有之法是明其成就自性三寶也合而言之便是因住持三寶證自性三寶成常住三寶亦即因常住故住持因住持故常住且云何住持云何常住全仗自性以成就之耳又上言成就殊勝以顯福德殊勝之所以然今更言熏習殊勝以顯成就殊勝之所以然何以故以經典所在既是佛菩薩等所在則持說之者便是親近諸佛菩薩等大善知識如此時時熏習自性豈有不大獲成就者乎又初言如佛塔廟云何說經之處如佛塔廟乎今則曰經所在處佛及賢聖皆在豈非顯明上文如佛塔廟之所以然乎總之既曰如佛塔廟又曰佛及賢聖皆在皆明此經是三寶命脈所關故不憚詳言至再至三使一切衆生尊重此經耳又上言成就即接言經典在處則為有佛若尊重弟子此又顯明是人之成就最上則如佛次亦如一切賢聖而為第一希有何以故發無住心者當證無為果故一切賢聖皆以無為法而有差別故持說無為實相之經豈不成就此法乎此數科經文文字無多妙義無窮發揮難盡茲不過略略言之已如上述是在人人善於領會之矣又前次校量顯經以一大千世界寶施比較顯其福德今則以無量無邊大千世界寶施比較顯其福德何以前後相差若此其義云何蓋前次顯勝是說在能生信心之後且曰一切諸佛及諸佛無上正等正覺法皆從此經出是明其如能聞是章句信心清淨便是趨向佛智故有如是福德然不過初發淨信之心未能深入所以只以一大千世界寶施顯勝今則不然乃是說在開解之後云何開解所謂生清淨心無所住而生其心是也且曰當知是人成就最上第一希有之法復曰則為有佛若尊重弟子是明其如能領解無住生心生心無住之真實義便有大大成就的可能因解得經義便得綱要以視前之但具信心未得綱要者相去天淵故以無量無邊大千世界寶施比較顯勝是明此人之福德超過前人無量無邊倍矣何以故一是初發信心粗知名字一是深解經義漸能入觀故須知此經專明實相直指本心受持之者果能直下承當依經起觀則生福滅罪徑證菩提功德何可稱量而前半部五次校顯若經功有大小者實因持誦者功行之淺深成此差別非經功有差別也辛三請示名持分二壬初請爾時須菩提白佛言世尊當何名此經我等云何奉持向下文義皆細應當諦聽因文相關涉前後須合前後統觀而互說之其義乃徹既是綜合前後而說故義意繁密恍惚聽之便難領會爾時者前言已竟之時意顯領會得綱要時便當行持不容稍懈所謂解時即是行時是也結經家特標爾時意在於斯又本經中凡標爾時須菩提白佛言句皆表更端之意俗云另行起頭以示本科所說更進於前令人注意也然語雖另起意亦躡前因上來屢顯此經福德殊勝乃至經所在處佛與賢聖同在其處殊勝如此不知其名可乎屢言受持此經即一四句偈等皆有極大福德乃至盡能受持成就無上菩提之法然則應云何持乎此皆學人所急當知者故問當何名此經我等云何奉持他經請問經名多說在全部之末今獨說在中間何故須知此經後半部之義是從前半部開出其義前半部中已有不過說之未詳耳若非長老再為請問則說了前半部便可終止以是之故此經經名雖似說在中間卻實是說於前半部之末仍與他經無別也當何名此經者當以何名名此經也亦可倒其句曰此經當何名義既殊勝其名亦必殊勝言下便有名必副實若知其名益可顧名思義之意奉者遵依持即修持行持請示持法以便大衆遵依故曰我等奉持奉持猶之乎奉行也凡言及行便具二義一自行二勸他行故古人釋持字義曰任弘任者擔任指自行而言也弘者弘揚指勸他人行而言也說到行持便牽及上來所說矣試觀上來自詳談起開口便說應降伏其心云何降伏即是發大願行大行不住六塵境界廣行六度度盡無邊衆生成佛而不取度生之相乃至法與非法皆不應取如是層層披剝愈剝愈細結歸到不住六塵生清淨心此八字即應生清淨心及不住六塵生心縮語亦即應無所住而生其心注腳凡此所說種種義門皆觀門也皆行門也即皆應奉持也然則我世尊開示大衆云何奉持亦已至詳至晰何以須菩提長老復於此處請問云何奉持耶豈上來所說諸義但令領解非令奉持乎抑奉持上來所說猶有未盡故今重請乎頃言必須前後統觀綜合說之者正在於此此等處若未徹了其奉持必不得力不但容易發生如上所說之誤會而已須知長老今之請問云何奉持者別有深意一佛所說法無不理事圓融圓融者說理即攝有事說事即含有理所謂理外無事事外無理是也故學佛之人亦必解行並進解屬理邊行屬事邊必須並進始與圓融相應但衆生根性千差萬別自有人即解即行亦自有人雖解而未能行或雖行而未能相應須知解而未行行而未應者實未真解真能領解將不待勸而自行行亦自能相應長老欲為此輩人更進一解故復請問此之謂婆心太切二請問經名即是請求開示上來種種言說章句之總題則請問云何奉持亦原是請求開示上來所說諸義有無總持之法若得總持持此總題豈不更為扼要麼此之謂聞法無厭明得此中第一層道理便知上來雖未請問云何奉持并非專令領解已攝有奉持在內今雖請問奉持亦仍攝有更求領解之意在內明得第二層道理則知前既奉持今亦何妨更請然則前後豈但不衝突不重復且更可顯發前義矣說至此處恐人復生他疑今當徹底更一言之問上來所說既一一皆應奉持今又明明請問云何奉持何以第一大科判為生信今第二大科判為開解至第三大科方判為進修耶詳說中先判為兩總科初約境明無住次約心明無住再將此兩總科判分為四即一生信二開解三進修四成證答開經以來實皆可起修然修持之究竟法則在第三大科故但豫第三大科以進修之名耳且此乃依經而判非敢臆說如第一大科中明明點出持戒修福能生信心是明信心之初起也故判為生信第二大科於請示名持之後點明深解義趣是明不但生信且開解矣故判曰開解至第三大科將完又明明點出以無我人衆壽修一切善法則得阿耨菩提且曰如來說善法非善法是名善法則并善法之相亦復不取此之謂究竟修法如此而修謂之究竟者以其合於諸法如義故也故判之曰進修須知不曰起修而曰進修具有深義蓋明其乃深進之修持兼明上來諸義并非只是生信開解不是起修耳更有一義不可不知者信解行三事不能定說無次第不能定說有次第人必具有信心而後研求佛法亦必明得佛法真實之義而後方知真實修行此固明明有前後之次第也然剋實而論若其毫無功行則障深慧淺決不能領會甚深佛法必須功行愈進解理乃隨之而愈深且若非有解有行其信心亦若有若無不能說是信根成就由是言之信解行乃是同時並進豈有前後次第之可言間遇有人無端而能信佛或初不學佛一聞甚深佛法便得明了并有佛法一毫不明而能發心精進勇猛修行者此皆夙世本有功行今遇因緣遂爾發現非偶然也即以證說證者憑證凡親眼見得親身做到之事則謂之證故必真實如法做到始名曰行真實見到佛理始名為解真實知得皈依三寶之益始名曰信然則一言信解行皆已含有證的意義但向不名之為證惟證法身始豫以證字之名耳可見是名義上之分別若論實際無往而非證也即以證法身言云何為證亦不過解行二事之功效解行做到究竟名之曰究竟證得除解行外無證可說不但此也本經云信心清淨則生實相實相即是法身換言之法身顯現亦不過信心清淨而已由是言之豈但信解行證并無前後次第實則名相上似乎有四事差別而實際上毫無差別四事化為一事此之謂平等即此四字便可悟由平等見差別由差別見平等之理再進一步言之實相顯現時惟一清淨并信心二字亦無痕迹矣則真究竟平等如如不動矣是故若明佛理隨拈一事皆能窮其究竟歸於平等即如生信文中一念生淨信一語就生信之事相言故謂之一念相應尚未淨念相繼耳若言其究竟則此一語可深至無底廣至無邊何以言之生淨信便同生清淨心亦與信心清淨同一義味一念者惟此一念此念非他乃是信心清淨生者便是顯現則生淨信便是淨心顯現如此而說是此一語便是證得如如不動之性體矣其他言句皆可如是領會所以聞得一言半偈皆可證道也此理不可不知然而講經說法有時又不能不隨順其文相而說若開首即說此深義反令聞者無可依循此理又不可不知也前說此句時不能驟明此理者因此茲已說至漸深無妨順便拈出使知佛法無淺非深深亦可淺直無淺深次第可說故不可取著其相而曰則非也然為接引衆生啓導進步又不能不假設一淺深次第以及種種莊嚴之事故不可斷滅其相而曰是名也且住今不說經文而擲筆題外將信解行證囉唆如許言語何為乎當知非說閒話乃是發明上文所說無有定法四字之義通貫一切俾大衆領會此義庶幾頭頭是道姑就信解行證發揮之以示凡事皆然不但佛法然也且自此以往義趣愈入深微若不於此義薦得少許則心中不能活潑潑地於深微義趣便不易領會當知下文般若非般若四段正明無有定法我今如是而說者正預為下文寫照耳須知因為無有定法所以不可執有不可執無經中凡言則非皆明不可執有也不可執有者是令會歸性體也何以故性本無相如太虛空故安可以名字語言求必須離相返照庶幾證入也凡曰是名者乃示不可執無也不可執無者是令雖會歸於性而亦不壞假有之名相也何以故性本無相而無不相故相即性體之用有體必有用故如太虛空體固空空如也而萬象森羅一切依正果報之相皆由其中現出若無萬象便成頑空亦不足以顯其是太虛空矣但不取著其相與太虛空何損何得曰絶對無相且亦何須滅其相耶持此義以修行則知欲見本性必應離名絶相破其我見我見不除便生分別心而起念即著相矣而此我見是無始以來病根不易破除必應依照佛所說法一面返觀內照息其攀緣妄想而一面又應遵依各種儀軌事相禮拜懺悔以及布施持戒等等求消業障開發本智俾得信心增長解行成就以期障除性顯而行時又應心不取著色聲香味觸法體會此一念心之性與諸佛衆生本是一體且體本空寂然後感應神速成就自易夫修因時既能不取相不滅相空有兩邊不著合於中道所以感應大成就亦大所以成就以後便能不動道場而身遍十方現各種莊嚴之土以普度無量無邊之衆生是之謂無相而無不相無不為而無為推而言之持此義以為人則能胸襟曠達不惹煩惱而得自在矣亦知謹言慎行不錯因果而無罣礙矣持此義以處世則知萬事皆空與我何涉任他風浪起穩坐釣魚船可也亦知人情世態紛紜往復安危苦樂隨遇而安可也持此義以當大任作大事以不著相故雖事來即應而天君泰然不為所動以相非斷滅故雖心不著相而條理秩然毫無廢事如此豈不是則非是名頭頭是道乎真所謂道不遠人人自遠之耳我佛原為度世而來故所說法無不世出世間一切攝盡惟須融會貫通如是真實之義則事事皆可奉持時時皆是修行在在皆得受用而處處皆是佛法矣所以佛法稱為法寶此經尤是無上法寶且收拾起閒言語宣揚此無上法寶壬次示分三癸初總示名持次詳明所以三結顯持福癸初又二子初示能斷之名佛告須菩提是經名為金剛般若波羅蜜此七字為全經之總題於開題時已詳釋其義矣茲略言之般若此云智慧約因曰慧約果曰智因果一如故總譯其義曰智慧波羅蜜此云到彼岸有此智慧乃能了生死入涅槃如此作釋則波羅蜜非他即般若是又此之智慧非同世智辨聰乃佛智佛慧所謂佛之知見是到彼岸之智慧如此作釋則般若非他波羅蜜是金剛是喻金剛為物最堅最利能斷一切以其堅故一切物不能壞以其利故能壞一切物也以喻般若波羅蜜如大火聚四面不可觸能斷一切煩惱也何謂煩惱見思惑是見惑為身邊邪二取最要者身見邊見身見即我見小乘專指四大五蘊假合之色身言大乘則通於法我若取法相非法相即著我人衆壽故曰法我人衆壽三皆由著我而起言我則攝其餘矣邊見者小乘專就由身見而起之斷見常見言大乘兼指一切法空有二邊執有便取法乃常見也執空便取非法乃斷見也思惑即貪瞋癡慢疑此為根本由此生起慳嫉等等此之根本煩惱皆無始病根積習深痼遂致流轉六道受苦無窮今欲脫離此苦非斷此病根不可云何而斷非仗此金剛慧劍不可也又此部是大般若經第九會所說諸會皆說般若則皆能斷今獨於此部加金剛名可見此部之義尤為精要更堅更利更為能斷耳子次示持經之法以是名字汝當奉持此八字是令顧名思義因名會體的奉持非謂持此名字恐人誤會故次復自釋其所以要知本經所明之義皆是應無所住而衆生之病在處處著著即住義因衆生此病甚深故開口便言降伏凡言不應取不應住皆降伏之意至此復云以是名字汝當奉持無異言汝等當奉能斷之義以行持且無異言汝等當奉金剛般若以降伏也見思惑中我見為本所以處處著者因此所以生種種惑造種種業受種種苦者因此所以急當斷除者亦即在此我見除則煩惱即惑障除而業障報障亦隨之而皆除矣三障消除則法報應三身圓現故如是奉持是從根本解決能得究竟勝果豈第了生脫死而已所以此經在處則處貴在人則人尊吾輩何幸得聞此無上經法其必已於無量千萬佛所種諸善根可知何勝慶幸何可妄自菲薄然而善根如此卻仍拖此臭皮囊浮沈苦海其必多生以來或輕忽視之未嘗讀誦或雖讀誦而未能受持或雖受持而未能如法也亦可知矣一思及此又何勝慚愧今幸佛光加被又聞此法又讀此經若仍如前怠忽前路茫茫又不知要輪回若干次數自討苦吃一思及此又不勝其悚懼古德云此身不向今生度更向何生度此身可怕可怕此中斷持二字尤有要義蓋斷者決斷之義持者堅持之義如上文說應不住六塵生心無如凡夫力不從心明知不應住而不知不覺心粘其上心既粘上便被其縛擺脫不了必須將不住六塵生心放在心中時時觀照起心動念倘於六塵少有觸著便當機立斷立斷者不可畏難不可苟安即勇猛之意更須堅持不懈堅持者精進之意精進者所謂精審而進密密內照不使一毫放鬆也精細而進澄心靜慮審察隱微也精誠而進至誠懇切求三寶哀憐攝受放光加被助我之力也念佛不得力全由未在此中用功吾輩修行必須於一切染緣所謂六塵者依照此經能斷奉持二義而當機立斷堅持不懈若不如此豎起脊梁立定腳跟何能降伏得多生背覺合塵的習氣我不降伏他就被他降伏我此心既被塵染便不清淨一句佛當然念不好果能當機立斷堅持不懈庶幾有一心不亂之可能而往生極樂徑登不退不難矣努力努力總而言之上來所言降伏及不住六塵生清淨心等種種觀門行門必領會此中所說能斷之義而奉持之乃更有力然則此中所明之義甚為緊要可知矣故向後之校量經功亦迥不同前也癸次詳明所以分二子初總標所以者何所以者何四字標詞此下將具釋奉持能斷之所以然故先標舉之使人注意也向來注釋家但以此句屬於佛說般若一段今謂乃是統貫下文兩科蓋下兩科皆是開示修持之法則皆是說明以是名字汝當奉持之所以然何得但以屬於一段使其餘經文皆成散沙則校顯經功更勝於前之義亦無著落矣大大不可故今特將此四字另作校作下舊版有為字茲從原稿刪一科判曰總標以明其統貫下之兩科非止屬於兩科中之一段也綜合下兩科義趣觀之可知此一句中含有三義一如何而斷二從何斷起三因何須斷今順序說之何謂如何而斷耶斷者斷我見也我見隨處發現不扼其要云何能斷且我見者妄想之別名而妄想原是真心所變本不能斷所謂斷者破之而已然則云何能破明理而已開解而已試觀經名金剛般若波羅蜜七字金剛堅利所謂能斷也然原是用以喻下五字般若波羅蜜者般若者智慧也波羅蜜者到彼岸也到彼岸之智慧猶言徹底之智慧由是可見斷我見并無別法惟在徹底明理亦即徹底開解而已耳然則所謂徹底明理者明何理耶當知衆生處處執著者無他由其不知四大五蘊以及一切法皆是緣生如幻如化而本其先入為主之見視以為一定不移遂致執著而不肯捨是之謂我見故欲破此見首當明了一切法本無有定如是久久觀照則知法既無定云何可執且既無有定執之何益若能於一切法而不執則我見自化矣此真破見惑之金剛也所謂明理者明此理也明得此理可破我見所謂徹底也故曰以是名字汝當奉持遵奉金剛般若波羅蜜以為修持即謂遵奉此之名義以作觀照也當知此部經法正是般若波羅蜜而曰則非般若波羅蜜世尊時時說法而曰無所說乃至微塵世界三十二相皆說其非不過是名而已皆所以顯示無有定法之義也此其一何謂從何斷起耶當先從與自己最密切之法上精勤觀照以破其惑也般若波羅蜜為行人所當修持者尚應知其則非而離名字相世尊言說為行人所當遵奉者尚應知其無所說而離言說相大千世界為佛教化之境三十二相為佛所現之身皆應不著則其餘可知矣此所謂高處落墨也推之凡是自己所修之法所為之事以及依報正報等等皆當奉此義以為觀照也此其二何謂因何須斷耶觀下文曰佛說曰如來說便知倘不如是觀照斷其我見便違佛旨而不能見如來矣此其三明此三義則知當如是奉持之所以然矣子次別詳分二丑初示會歸性體次示不壞假名丑初又二寅初示應離名字相持須菩提佛說般若波羅蜜則非般若波羅蜜流通本有是名般若波羅蜜一句為後人所加大誤須知此科及下科正明會歸性體故皆遣相以明性至大千世界三十二相兩科乃兼明不壞假名章義分明乃無知妄作一味濫加可歎不但唐人寫經無是名句智者嘉祥圭峯三大師注疏中皆無是名句意當從古本言則非者令離相也離相者所以會性也故標科曰會歸性體照上來語例應曰如來說今不曰如來說而曰佛說者義趣更深略言其二一佛者究竟覺果之稱人皆知證得究竟覺果而成佛由於修般若而不知實由修般若則非般若也使修般若而未離名字相則為著我人衆生壽者尚能稱究竟覺耶尚何成佛之可能故今特曰佛說者所以示證果者由此而證則修因者當如是而修也二既證性矣亦復現相則稱之為佛故佛之一稱乃性相全彰之名非同如來但屬性德之稱也故今曰佛說者乃指示般若則非般若不可打成兩橛則非般若波羅蜜當從般若波羅蜜中做出所以開示當即名字以離名字也故上文曰以是名字汝當奉持此與應生清淨心句同一意味所謂空在有中非滅有以明空也世尊因正令明性既不能不遣相而一味遣蕩又慮人誤會而偏空故不曰如來說而曰佛說以示意此與不壞假名說是名某某時不曰佛說而曰如來說者用意皆極深密蓋不壞假名而曰如來說者明其雖不壞相仍應會歸於性也今遣蕩時不曰如來說而曰佛說者明其雖應會性而亦并非壞相也然則此中已含有不壞假名意在何須濫加是名一句方顯其不壞假名耶總由未明經意所以無知妄作總之佛說般若是如其自證之理智而說令一切衆生開佛知見耳開佛知見者令知性本無相須離相修持而後可以見性也故曰般若則非般若若不明此理心中有一般若波羅蜜名字相便取法相尚得曰奉持般若波羅蜜哉何以故若取法相即著我人衆生壽者故此中但云般若波羅蜜則非般若波羅蜜不連金剛二字說者正明上文所云以是名字奉持者乃謂當奉金剛能斷之名以行金剛能斷之實而斷其取著法相耳般若無上之法尚應離名字相何況其他一切法又當知佛之說此正令不取法相以修持一切法則法法莫非般若乃為般若波羅蜜耳此上來所以言無有定法如來可說也總而言之佛說般若則非般若是令領會法法皆般若不可著般若之名字相此以是名字奉持之所以然非謂在名字上奉持又所以二字便是真實義上云汝當奉持即謂當奉真實義而行持也寅次示應離言說相持須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說此問躡上文來或問不應住般若波羅蜜法相而此法原是佛說說此法時豈無法相若無法相又云何說防有此疑故發此問有所說法否者謂心中存有所說之般若波羅蜜法相否也世尊問意已含無字何以故如來是性德之稱性體空寂豈有所說之法相耶不曰佛說而曰如來說意在明此又佛之現相正為說法若曰佛說則與無所說義抵觸故此科只能曰如來說不能言佛說也凡標須菩提白佛言句明其言甚要不可忽也答語更進一步言不但無所說之法且無所說無所說者無其所說也非謂無說無所行無所得等句意同蓋性體自證名為如來如來者即明其證得平等性體平等者理智一如能所一如也故後文曰諸法如義既證一如故其言說名為如說故後文曰如來是如語者如說者明其是由平等如如之性海中自在流出初未起心動念雖終日說熾然說剎說塵說實無言說之相尚無說相安有所說之法相耶故曰如來無所說也此番問答不但遮疑且意在令奉持者體會性體非但無名字相并無言說相亦復知得如來熾然說而無其說相則知得奉持所說之法者應熾然修而無其法相也合此兩科觀之欲證性體必當離名言之相然則名言究應云何而後可離乎若不知之是但知其當然而不知其所以然須知此兩科義趣我世尊實令奉持者離念也念不離則名言之相終不能離也何以知之起信論心真如門中有一段文可以證明論云若離心念則無一切境界之相又云離言說相離名字相離心緣相畢竟平等乃至唯是一心故名真如此文中真如即性體之別名也離言說相三句歸重於離心緣相一句此句即是離念之意蓋緣者攀緣心緣即是起心動念心念若動必有所攀緣便落於名字相矣而言說者心之聲也心必先緣於所欲言者而後達諸言詞故心念若動又落於言說相矣故三句中離心緣相句是總心緣相離然後名字言說之相皆離此與論文上句若離心念則無一切境界之相句相應離心念便無一切境界相所以離心緣相便畢竟平等唯是一心而名真如也由此論義以證經義則此中令離名言相持非即是令離心念修持乎論中又引他經云能觀無念者則為向佛智佛智即是般若波羅蜜故此金剛般若波羅蜜經當如是斷其著名字言說之攀緣妄想而奉持也此以是名字汝當奉持之所以然也起信論又云當知染法淨法皆悉相待無有自相可說是故一切法從本以來非色非心非智非識非有非無畢竟不可說相而有言說者當知如來善巧方便假以言說引導衆生其旨趣者皆為離念歸於真如以念一切法令心生滅不入實智故此節論文更好引來為此兩科經文作注腳此請示名持一大科關係緊要今當再依此節論文詳細說之以期徹了必道理洞明乃能觀照用功想為諸公所願聞也先說非色非心非智非識非有非無三句非色色字賅有表色無表色言有表色者謂有形可指之法無表色謂無形可指之法此種種法無論有表無表本無自體體唯是心故曰非色然不過唯心所現而已實非心也故又曰非心非智之智即謂性智性體平等空寂豈有諸法故曰非智然則諸法是識乎須知不過識心現起耳不能謂諸法便是識也故又曰非識非有非無者因緣聚合似有諸法發生非無也既為緣生乃是幻相非有也此三句總謂一切諸法不過彼此對待相形雖似有而實無當體即空以說明其上文當知染法淨法皆悉相待無有自相可說之意而已當知般若亦是與彼諸法相形名為般若耳以一切法緣生幻有本無自相豈有自相可說安可執著名字相故曰般若則非般若且佛證真如實智故雖熾然而說實無言說之相故曰如來無所說但為衆生故假以言說引導令其離念證性由是可知經中曰般若非般若令離名字相又曰無所說令離言說相者其宗旨非為欲令大衆離念歸於真如乎然則所謂奉持者謂當奉持金剛斷除妄念亦可知矣前云明了無有定法是清我見之源今云破除攀緣妄想是截我見之流也試觀上引論文最後數句云以念一切法令心生滅不入實智故實智即謂性體可見性本無念欲證性體非斷念不可矣又可見起念即是生滅心因有生滅之心遂招生死之果若不斷念又何能了生死乎然而一切衆生從本以來念念相續未曾離念謂之無始無明無明者不覺也因不覺故起念云何不覺所謂不達一法界故謂不了達十法界理事唯一真如同體平等此之謂不覺既不覺知平等同體遂爾動念念動而能見所見隨之以起故有人我差別之相由此而分別不斷取著計校造種種業招種種苦又復展轉熏習果還為因因更受果愈迷愈深沈淪不返矣今欲返本還源故必須從根本解決以斷其念難哉難哉因其難也故我世尊為說種種方便法門令其隨順得入如上所引能觀無念者則為入佛智亦方便之一也此是吾輩生死關頭至要至急之事亦是本經所令奉持者不敢憚煩更為說其方便須知觀無念三字固是方便而云何觀法仍須得有方便乃能起觀其作觀之方便云何起信論曾言之矣論云當知一切法不可說不可念故名為真如問曰若如是義者諸衆生等云何隨順而能得入答曰若知一切法雖說無有能說可說雖念無有能念可念是名隨順若離於念名為得入一切法不可說不可念故名為真如此是就一切法而明真如也意謂一切法無體體惟淨性淨性即真如之別名既是一切法體惟淨性所以諸法一如所以稱為一真法界蓋心雖無法而法從心生故十法界之法不離乎惟一真心曰一如曰一真所以本性名為真如者因此就諸法以明真如則一如一真之義極易明了此說法之善巧也因其諸法一如故不可說因其真心無念故不可念故曰一切法不可說不可念名為真如也問中如是義即指不可說不可念言以諸衆生莫不有說有念故問云何隨順得入隨順即方便之意問意以為有說有念之衆生而欲其無說無念若無方便何得證入答中雖說念并舉然能無念自能無說茲約念義明之則說義自了當知雖念亦無能念可念一句正指示修觀之方便也故下即接云是名隨順何以此句是觀無念之方便當知此中具有二義初約性體言當知念是業識而性體中并無是事所謂從本以來離一切法差別之相以無虛妄心念故此明雖業識紛動而性淨自若猶之虛空中萬象森羅而虛空仍自若也此是要義不可不知知此則知性之與念本來相離便不致認賊為子次約念之本身言當知念之為物當處起當處滅剎那不停病在於前念滅後念又起念念相續但未有靜功者不覺其是相續誤以為前後只是一念耳若前後只是一念者修行人便無辦法矣正因其生滅不停故曰不怕念起只怕覺遲也此明念乃隨起隨滅并無實物猶之空花幻有實無也此亦要義不可不知者知此則知念之本身當下即空便不致執虛為實二義既明便隨時隨處順此二義密密觀照當一念起時即提起精神自呵自責曰性本無念適從何來如此一照其念自息初心人未有定力一剎那間第二念又忽然起便又如是呵責覺照久久念頭可日見減少即起力亦漸弱矣問曰提起覺照此不又是起念乎答曰是起念也當知自無始念動以來積習深固逆而折之甚難甚難惟有隨其習慣不加強制卻轉換一個念頭以打斷原念令不相續此正因其生滅不停故能得手更須知觀照雖亦是念乃順體起用之念便可順此用以入體與彼昧失本性所起之念大異其趣蓋起念同而起念之作用大不相同因是知得性本無念及念亦本空為欲除其妄念故起觀照之用此用乃順性體而起故與昧性而起者大異其趣此之謂隨順此之謂方便然應知起此觀照之念亦復是幻亦是緣生無性今不過借以除他念耳若執此念為真便又成病般若波羅蜜原是用以對治取著之病故般若亦不可取著曰般若則非般若者明其不應取著也般若原含三義所謂文字般若觀照般若實相般若因文字起觀照證實相也而此三般若皆不應著約文字言若但執文字不修觀行固完全是名字相約觀照言若心中存有能觀照所觀照之念亦未離名字相乃至證得實相般若實亦無所證無所得若有證有得仍然未離名字相即非實相亦不名般若波羅蜜矣故此中般若則非般若是徹始徹終者歸源無二路方便有多門念佛一法尤為斷念方便之方便也不令他念而念佛亦是轉換一個念頭而念佛更比作觀親切蓋作觀可說是智念念佛則是淨念換一個清淨念以治向來染濁之念并令一心念之又是以純一之念治向來雜亂之念且佛者覺也念念是佛即念念是覺覺者覺其性本無念也故曰更親切也所以但能勤懇一心便能做到念而無念當知念佛目的必須歸於念而無念歸於無念便是歸於真如則不說斷而自斷不期證而自證矣其方便為何如哉故曰方便之方便也頃所言不期證而自證最初只證得一分因其時但無粗念耳其細念尚多也起信論云若離於念名為得入得入即是證入而此語一深無底當知由觀行而相似然後方到分證分證者分分證也最初只入得一分由是經歷四十一個位次而至妙覺以成佛念頭方為離盡離盡方為完全證入真如之性然實無以名之假名為得入耳何以故以雖得而實無所得雖入而實無所入故如此方是真離念方是真得入至於念佛功夫雖未能做到念而無念但能行願真切仗彌陀悲願力亦蒙接引往生便同阿鞞跋致此云不退即是初住地位如修他法至此地位須經久遠劫數今一生即令辦到其為方便之方便更何待言須知便同阿鞞跋致者明其資格本來未到但蒙佛力攝受而得不退耳吾輩幸聞此法豈可蹉跎交臂失之然行願真切必須一心在念佛求生上方能謂之真切若一面念佛一面又起塵濁之想則行願不真切矣所以念佛人於斷念一層縱令未易辦到而不應住色生心不應住聲香味觸法生心兩句務必要做到不然則願不切行不真何能蒙佛接引乎何以故塵濁氣重與清淨二字太不相應則佛亦末如之何也已矣總之妄想紛飛是衆生無始來病根萬不可強制如其強制反傷元氣因妄想非他即是本心之作用不過錯用了所以成病耳只要依照佛法將其轉換過來歸到智念或淨念上久久自歸無念便是平等性智妙觀察智矣今曰斷除當知是除其病非除其法斷之一字當知是斷其妄使歸於真若能歸真便恍然大覺了達萬法一如本是一真法界本無人我差別則萬念冰銷所以只能用轉換念頭之法者因此由是可知轉換念頭名為方便者猶是權巧之詞實在是根本挽救之法除此之外并無別法此理更不可不知即以斷妄歸真言亦須逐漸進步凡初機者猶未可驟語及此因衆生無始便迷真逐妄流而忘返譬如世間浪子久已流蕩忘歸今欲挽其回頭必須善為勸導以引誘之乃有希望不然家庭間反增煩惱此亦如是必須多多讀誦大乘經典喚醒癡迷且多多親近善知識開其蒙蔽指示修途而用功時復當由淺而深乃能漸入佳境不然心中反不安寧此又不可不知者也即如本經前面已說了千言萬語直至此處前半部將了方顯然令其離念其不可躐等驟語及此大可恍然矣然又當知自詳談以來所說種種觀門行門卻皆是由淺入深為離念作方便者以修功必須修至無念方能證性方為究竟故也今依此義再將前文總結一次逐層點醒以便融會貫通開其圓解所謂開解者開智慧是也依據各種經論開解有三個步驟第一步當令開知境虛智一切衆生因不知一切塵境原皆虛幻不實遂致處處取著我見橫生故先令了達六塵等境惟虛無實若其知之始能不為所迷不迷即是智故名曰知境虛智第二步當令開無塵智塵即謂六塵等境無者謂一切惟心心外無法必須通達乎此又得遺蕩塵境之方便漸漸乃能胸無點塵若能無塵則慧光愈明矣是謂無塵智此智既明縱有念頭亦極微薄然後乃能斷之斷念亦須有方便之智則名曰金剛智此是第三步矣金剛者能斷之義也試觀上來一開口便令發廣大心普度衆生若忘卻自己者此最初之第一方便也因一切衆生以不達一法界故不覺念起而有無明遂致人我界限分得極清著得極緊今令捨己度他發廣大心是令通達一真法界本無人我之別以化其膠固分別之積習乃是從最初所以不覺念起之根上下手故曰最初第一方便逮說出不應住色聲香味觸法布施之後即就身相說明之曰凡所有相皆是虛妄此便是令觀察根身器界莫非塵境莫非虛相以開其知境虛之智也當知衆生所以分別人我牢不可破者無非為境所縛放不下耳其所以放不下者無非誤認種種境相為真實耳今喚醒之曰皆是虛妄真是冷水澆背令人毛骨俱聳此第二方便也其下接以持戒修福能生信心以此為實是令信此實義以起修蓋以持戒修福為起修之最初方便也果能一念生淨信則是已於上來所說一一能解能行矣何以故若無解行不能一念相應故至此便得無量福德何以故既能一念相應是已得了知境虛智住相之心人我之見便能減少故因進一步告以若心取相則為著我人衆生壽者以及法與非法皆不應取取即是起念說心不應取法不應取非法已含有不能起心動念之意在復告以法本無定故不可取不可說乃至一切賢聖皆以無為法云云無為即是無生滅心生滅心即是念頭是又獎誘之曰汝既能實信希賢希聖并能一念相應須更令息生滅心才好以下更說福德之大以欣動之及至約果廣明方顯然點出念字得果時不能作念則修因時不應動念可知矣遂結之以應生清淨心何謂生清淨心應於塵境一無所住而生其心是也是則比前又進一步由知境虛智而開其無塵智矣前但知之今令無之豈非更進乎然開無塵智實為最後開金剛智之前方便也若論修功由知境虛智修到無塵智須經數劫前是觀行位今是相似位也此智為轉凡入聖之樞紐若不得無塵智便不能更進而開金剛智亦即不能登初住位若不登初住便不能由相似位入分證位而成聖也故得無塵智之福德比前勝過無量無邊倍也何以福德有如是大當知是人成就最上第一希有之法故成就者即謂成就無塵智也心中果能無有塵境縱然起念比前更少力亦更薄修功至此方能夠得上斷念故此請示名持一科遂告以斷念之法淺深次第步驟嚴整佛之教化如是如是須知自開口一句曰應如是降伏其心乃至說到不應住色等生心皆是伏惑必須能伏而後方能斷也此中明明曰以是名字奉持而名字乃是金剛般若故此中所明義趣皆是開其金剛智也金剛者能斷之義離名言者離念之義若金剛智不開念何能斷乎當知位登初住便須具有此智若無此智便不能斷無明無明者不覺也因不覺故念起故斷無明即是斷念必須斷得一分無明乃證一分法身而登初住自初住以上無非此智逐步增長使無明分分斷法身分分證位次亦分分增高經歷四十位次而至第十地後心此智更堅更利名曰金剛道而登等覺第四十一位登等覺後復用此智以斷最後一分極細無明乃登妙覺而成佛通常專以等覺之智為金剛智等覺以下仍名無塵智實則此智之名顯其能斷耳若不具此智便不能斷一分無明證一分法身而登初住故初住以上實皆具有此智不過位位增勝至於等覺此智圓滿遂致等覺之智獨彰此名耳此理不可不知由上來所說觀之必到相當程度始能斷念而念若不斷便不能證法身而轉凡成聖以及斷念之前必須先修種種前方便其義昭昭明矣本經自詳談至此已經將經義數次總結而每結各明一義所以如此者無非欲聞者融會貫通多得點受用且以明經中義蘊無窮發揮難盡上來種種宣說亦不過大海之一滴耳此離名字離言說兩科經旨茲將上來所明者概括之以便記憶即一先須了徹無有定法以清妄念之源此是智慧二更須破除攀緣心想以截妄念之流此是能斷此以是金剛般若波羅蜜名字奉持之所以然也至於作觀念佛乃能斷之方便此之方便仍為兩科經旨中所具有并非外來能觀無念者則為向佛智佛智者般若波羅蜜則非般若波羅蜜也佛說般若是令依文字起觀照奉持即是令大衆作觀照功夫而離名言即是令離念豈非明明令觀無念乎奉持有拳拳服膺之意即是應念念不忘佛說念念不違如來念念不忘佛說即是一心念佛也念念不違如來則不但念應化身佛且令念法身實相佛矣又不覺故念起令了徹無有定法便是令其覺故曰清源以不覺是起念之源也次令破除妄想是離念故曰截流以起念是從不覺而出也而不覺念起之後遂有能見所見之分而成人我差別之相今則全在對治不覺念起上用功即是在我見的根本上下手根本既拔我見自無矣此奉持以斷我見之所以然也又此兩科是明空如來藏也空有二義一性體本空二空其妄念此中曰般若則非般若曰如來無所說說性體本空也而離名字相離言說相者空其妄念也故此兩科正明空如來藏義下兩科則是明不空如來藏空明體不空則明用下兩科不壞假名所以明用也蓋根身器界皆是性德所現之用故是不空如來藏義丑次示不壞假名分二寅初示不著境相持次示不著身相持寅初又二卯初問答須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊名者名字凡一切法皆有差別之相就其差別安立名字故名字之言是就相說相是幻有則名為假名幻有者明其非有而有有即非有之意不壞者不斷滅意相是體起之用何可斷滅雖不斷滅然而相實非體故仍不應取著因體是不變相常變動體是本相是末不應捨本逐末迷相忘體故不應著也離與不著乍聆似同細審不同各不相涉曰離於顯用時而不為其所縛是曰不著上兩科曰離者是明修行人重在證體而體之與相本來渺不相涉也此下兩科曰不著者又明修行人先應證體體明必須達用故不可壞相然雖達用終應會歸於體故又不可著相也此中所說莫但作解釋標科會般若妙旨已盡在裏許矣適才是明離與不著命意不同又須知意雖不同而宗旨則同其同為何斷念是也何以故上兩科言離名字言說者是離攀緣心其義前已廣說離心緣者所以斷念也此兩科明境身亦即依正二報皆不可著者著則又起念矣雖不壞卻不著亦所以斷念也其餘要義甚多入後逐層說之上科之般若波羅蜜乃六度之一固是佛法之名然亦為性具理智之稱性體空寂名字言說本來無從安立上科既就此性具理智上立說固應遣一切相所以只說則非說無可說而不說是名即復性本非相本來與相無涉故說離也此下兩科境之與身本是依正二報幻相儼然就此立說於顯明不壞假名之義便故微塵世界三十二相皆說是名然而究是幻相虛妄不實故皆說非而不應著也此問亦躡上文來蓋著相者聞無所說將曰若無所說何以教化三千大千且言說本來無相縱可云說無所說而世界之大其相宛在豈得曰世界無世界乎為遮此疑故發此問問語甚妙不問世界而問所有微塵多否意明世界是由衆多微塵集合而現三千大千之幻相耳彼執大千世界之相為實有者亦可以恍然悟矣答亦妙長老深領佛旨故答甚多意明世界所有無非衆多微塵耳然則除多數微塵外豈別有一世界哉會得但是塵多便知大千世界有即非有矣卯次正示分二辰初不著微細相須菩提諸微塵如來說非微塵是名微塵此意比前問意更進謂不但世界并且微塵非微塵此意是明微塵亦是假名也楞嚴有云汝觀地性粗為大地細為微塵至鄰虛塵何謂微塵何謂鄰虛塵若如俱舍論正理論所說則微塵之量已為目力能見之最細者蓋七倍微塵為一金塵七倍金塵為一水塵金塵水塵者謂能在五金之空隙或水之空隙中往來也則微塵之細可想又七倍水塵為一兔毛塵謂其細等於兔毛之尖由此可悟微塵之細矣殊不知此細極之微塵仍可析之為七個極微塵則非肉眼所見惟天眼以上能察之耳至此已是色相之邊際無可再析然而若以慧眼觀察更可析之為鄰虛塵鄰虛者謂其鄰近於虛空矣此語猶今言之等於零也由是可知微塵亦是七個極微塵集合而現并非實物故曰微塵非微塵也如此說法乃是小乘之析空觀析空觀者謂須一一分析而觀之方知其是空也大乘則不然惟就性體上觀察便知無論大相小相皆是緣生幻有當下即空何待分析方知如是觀者名為體空觀本經是為發大乘發最上乘者說故曰如來說如來者性德之稱如來說者明其是依性體本空而觀所謂體空觀是也蓋約性而說微塵本非實體但不無幻相耳本非實體故曰非也不無幻相故曰是名也辰次不著廣大相如來說世界非世界是名世界知得微塵非微塵但是假名則世界非世界但是假名不待煩言而可解此說法之善巧也合此兩小科觀之是令修持般若者無論何種境界或細如微塵之事或大如世界之事皆應不壞不著細如微塵尚不應壞大於此者可知矣大如世界尚不應著細於此者可知矣寅次示不著身相持須菩提於意云何可以三十二相見如來不不也世尊何以故如來說三十二相即是非相是名三十二相此問亦是由上文生起蓋不得意者聞世界非世界而是假名者將謂佛之隨感斯應現種種身原為教化大千世界衆生若如上言是世界有即非有非有而有矣然則佛現三十二相之應化身何為乎豈應身亦為有即非有非有而有乎為遮此疑故發此問須知如來既已證性而又現三十二相之身者因衆生各各以此如來藏為體惜其迷相竟不自知故由性體顯現應身之相以教化大千世界為衆生開此寶藏皆令回光返照不著一切相而自見本性耳衆生此性原與諸佛同體所謂一真法界是也故若能自見本性便是得見如來若著於相則所見乃是應身之相非法身之體何能謂之見如來哉明得如來應云何見則知三十二相亦由緣會而生當下是空當下是空有即非有也緣會而生非有而有也有即非有故曰即是非相非有而有故曰是名三十二相也此處問語與前第一大科中可以身相見如來否語氣同而語意不盡同蓋前舉身相問是佛與衆生並攝在內今舉三十二相問則專約佛言也答語不也是活句與前答可以身相見如來否中之不也意同言不可相見亦得相見也流通本不也下有不可以三十二相得見如來句古本無之是也當知前科下文但曰身相即非身相故曰不可又曰以身相得見如來以明上之不也下之身相即非身相皆是活句意思雙關而此處下文既曰即是非相又曰是名三十二相已足表明不也是雙關之意何須更贅一句曰不可以三十二相得見如來乎應從古本舉如來說明約性而說也約性而說即是非相此明性體本非相也若知體之非相則三十二相何可見如來耶今云約性而說即是非相是名三十二相此明名者實之賓三十二相既但是名可悟其體是性也若知此理而能不著於相則因相便可會體何必滅相以見性哉知此則三十二相本由性起故不應壞而性本非相故不應著之義亦得洞明矣何謂大千世界前已廣談何謂三十二相亦不可不知其義一足安平相謂足裏裏邊也無凹悉皆平滿二千輻輪相足下之紋圓如輪狀輪中具有千輻狀其衆相圓備三手指纖長相謂手指端直纖細圓長四手足柔軟相手與足皆軟如棉五手足縵網相手足指與指如有網然交互連絡有若鵝鴨指間之形六足跟滿足相跟足踵也俗名腳後跟圓滿無凹七足趺高好相趺足背也高隆圓滿八腨音市兗切如陝又尺兗切為喘如鹿王相腨腿肚也古又謂之曰腓音飛鹿王鹿中之王謂大鹿也謂股肉勻稱圓滿不同凡夫腿肚忽然而粗九手過膝相兩手垂下其長過膝也十馬陰藏相謂男根密藏不露十一身縱廣相等相自頭至足其高與張兩手之長相齊十二毛孔生青色相一一毛孔只生青色之一毛而不雜亂十三身毛上靡相身上每一汗毛皆右旋而頭向上也十四身金色相身色如紫金光聚十五常光一丈相身放光明四面各一丈十六皮膚細滑相謂皮膚細膩光潤不受塵水不停蚊蚋十七七處平滿相兩足下兩掌兩肩此謂肩窩及項中七處皆平滿毫無缺陷也十八兩腋滿相兩腋之下充滿不凹十九身如獅子相謂威儀嚴肅也二十身端直相身形端正無偃曲草一肩圓滿相此謂兩肩之全形不聳不削圓厚豐滿與上七處平滿不同草二四十齒相具足四十齒常人至多三十六齒草三齒白齊密相四十齒皆白淨齊整堅密草四四牙白淨相四大牙最白而鮮淨草五頰車如獅子相兩頰隆滿如獅子頰草六得上味相咽喉中有津液無論食何物皆成無上妙味草七廣長舌相舌廣而長柔軟紅薄展之廣可覆面長可至髮際草八梵音深遠相梵者清淨之意音聲清淨近不覺大遠處亦聞草九眼色紺青相目睛色如紺青極清淨而光明有如金精卅睫如牛王相眼毛分疏勝妙有如牛王卅一眉間白毫相兩眉之間有毫白色清淨柔軟宛轉右旋而放光明卅二肉髻相頂上有肉隆起如髻此三十二相又名大丈夫相又名大人相亦名百福莊嚴相謂以百種福德莊嚴一相修成三十二須經百大劫故曰百劫修相好福德即是普賢行願故行願品云此善男子善得人身圓滿普賢所有功德不久當如普賢菩薩速得成就微妙色身具三十二大丈夫相當知相好皆大悲大願之所成就者也何故修此相好以一切有情無不著相若見相好乃生歡喜心生恭敬心方肯聞法方能生信故又梵王帝釋輪王亦有此相菩薩亦往往有之但以好不具足遂不如佛相好者非謂其相甚好蓋大相名相細相名好耳而大與細亦非謂大小大相者到眼便見細相者細心觀之乃知其好耳細相即所以莊嚴其大相者故佛有三十二相便有八十種好又稱為八十隨形好隨形即謂其隨三十二形相也菩薩雖亦有好但不及佛之具足八十即一無見頂二鼻不現孔三眉如初月四耳輪垂埵五身堅實如那羅延六骨如鈎鎖七身一時回旋如象王八行時足去地四寸而有印文九爪如赤銅色薄而潤澤十膝骨堅圓乃至八十手足皆現有德之相恐繁不具詳見大乘義章若三十二相之名是依大智度論而說他書或有異同以上三十二相八十種好是應化身所現若佛之報身則不止此數蓋身有八萬四千乃至無量之相與好也此大千世界三十二相兩科合而觀之妙義無窮蓋我世尊就此兩事上說非說是名最為親切有味聞法者果能於此悉心體會可於般若要旨渙然洞然也概括之可分四節以明其義即一約衆生以明二約因果以明三約空有同時并具以明四約究竟了義以明是也第一約衆生以明者換言之即是世尊所以於大千世界三十二相兩事上說非說是名之意皆是就衆生分上親切指點也何以言之世界為一切衆生依託之境若無世界云何安身立命耶又若如來倘不現三十二應身之相一切衆生從何聞法乎從何起信乎由是言之此兩事皆於衆生分上關係最為緊要可知矣故約性而言雖本皆緣生幻有之假名然謂之假名則可謂之非是則大不可故曰是名明其雖假名而甚是也故不可壞然而當知世界終為塵境倘一切衆生取著此塵相則心不清淨心不淨則土不淨豈能了生死出輪回乎更須知佛之應身是法身如來所現之相即是證了法身方能現應身何故現應身不現此相衆生無從聞法而如來現應身以說法原為欲令衆生皆證本具之法身倘衆生取著此應身之相便不能見性矣何以故以其既不能返照本性雖覿面對此三十二相之佛亦不能見如來故豈不大違佛現三十二相之本旨乎故皆曰非明其約相雖是約性卻非故不應著也如此指點何等親切第二約因果以明者換言之是明世尊就此二事立說者欲令衆生明了因果之真實義故也何以言之此塵凡之大千世界何來乎衆生同業所感也此勝妙之三十二相何來乎世尊多劫熏修所成也然則此二皆不外因果法可以了然矣因果者所謂緣會而生也緣生故是幻有幻有故是假名然雖為假名而有因必有果永永不壞者也故曰是名言是名者為令衆生懍然於因果雖性空而相有絲毫不爽不可逃也若知因果性空相有而不可逃便應修無相無不相之殊勝淨因以證無相無不相之殊勝妙果何謂無相無不相即是體會因緣所生法即空即假即假即空而二邊不著以合中道第一義諦是也須知無相無不相中道第一義諦者性之實相本來如是故如是修持便是般若波羅蜜也所以修此勝因必剋勝果故於大千世界三十二相皆說曰非皆說非者為令衆生既不壞因果之相而復會歸於性便是空有不著合乎中道也第三約空有同時并具以明者是明世尊就此立說為令藉聞此法而得了然於空有同時并具之所以然也何以言之說一非字是令不著有也說一是字是令不著空也而曰非曰是二者并說是令二邊皆不可著何故皆不可著因內而此身外而世界依正二報無非因緣和合而生當緣會而生之時儼然現依正二報名相豈可著空當緣散則滅之時此身何在此世界何在豈可著有不但此也依正二報當其緣生之際既是因緣和合謂之為生可見除因緣外別無實法故現是名時即為非有時故曰有即非有亦復當非有時即現是名時故曰非有而有合而觀之豈非空有同時并具乎既為同時并具故著空著有皆非故今是非同說即是令聞法者體會空有并具皆不可著之意而依正二報為名相顯然衆所共見之事此既空有同時并具則其餘可以恍然矣復為衆生關係最密最要之事此既空有皆不可著則其餘可以了然矣上兩科離名字言說尚是專遣有邊此兩科空有二邊俱遣乃為斷除妄念之極致第四約究竟義以明者乃是說明世尊說此兩科是令衆生徹底領悟言語道斷心行處滅之性體耳何以言之依正二報既皆緣生可知惟是因緣聚合之相故經中謂之是名是名者明其假名為生也既是假名為生可見實未嘗生故經中說之曰非說非者明其本來無生也既無所謂生則亦無所謂滅然則諸法本不生不滅而凡夫不知迷為實有生滅隨之而妄念紛起是故世尊說為可憐憫者更須知身心世界本無生滅而見有生滅相安立生滅名者無他實是癡迷可憐之凡夫妄念變現之虛相妄念強立之名言耳經云是名者如是如是此是名之究竟了義也是故若離於念身心世界之名字言說尚且無存那有生滅之名字又那有生滅可說如此則泯一切相而入真實體矣何以故真如性體從本以來平等如如非有非無非亦有無非非有無乃至非一切法非非一切法總而言之起念即非并起念之非亦非所謂離四句絶百非者是也經云則非者如是如是此則非之究竟了義也此究竟了義前面凡言則非是名處皆具此義而先皆不說至此乃說者有深意焉下文云深解義趣可知經文至此當明深義故上來暫緩所謂由淺入深引人入勝也又復此義就身心世界上說最便又復此請示名持中經義正明斷念以證性欲斷念證性非奉持究竟了義則不能也故曰經文至此當明深義知此便知此義惟宜於此處發之移前嫌早移後又嫌遲講經說法當令文義無謬蓋義有淺深文有次第若當說時不說不當說時便說是謂於文有謬縱令其義無謬亦為妄談亦有罪過此義凡有弘法之願者所不可不知也又上來說則非只是說則非說是名只是說是名而第四層之義不然說是名時攝有則非意在而說則非時亦攝有是名意在此亦究竟了義也豈止遣相談性之為究竟了義須知但遮無照但泯無存則所說者便非究竟了義遮中便有照泯中寓有存方為究竟了義蓋非遮非泯則不能見性而呆遮呆泯又豈能見性聞此究竟了義當悉心體會差之毫釐謬以千里至要至要再將此不壞假名兩科與前之會歸性體兩科合而觀之更有要義急當明之須知前就般若之名字言說令離復就大千世界三十二相令不著者無他以性體絶待一落名字語言便有能名所名能言所言既有能所儼成對待少有對待之相便非絶對之體矣佛說般若是令見性以般若波羅蜜原由真如之理體正智而出生者也故約此而令離名言以明證性必應遣相之意即復因其體之絶待故能融攝一切世間出世間法如起信論所謂如來藏具足無量性功德故此句是明相大能生一切世出世因果故此句是明用大可見相用不能離體即是因其體大所攝之相用亦大而此不壞假名兩科所言大千世界三十二相正明相大以其皆由性體顯現故所謂無量性功德故又大千世界為衆生同業所感是世法因果也三十二相為佛多劫熏修所成是出世法因果也可見此二又即兼明用大而且舉大千世界為言則攝盡世法一切因果舉佛之三十二相為言又攝盡出世法一切因果又復言世界則攝一切廣大相言微塵則攝一切微細相然則於此而明不著則一切皆不應著可知矣於此而明不壞則一切皆不應壞亦可想矣何以皆不應著以相用應融入性體故何以皆不應壞以體必具足相用故且由先說會歸性體後說不壞假名之次第觀之是明明開示學人最初宜用遣蕩功夫以除其舊染之污使此心漸得清淨乃有見性之望并名字言說之相尚須遣蕩則心中不可有絲毫之相可知何以故性本非相故然而但用此功防墮偏空故更當圓融圓融者性相圓融無礙自在也故接說不壞假名所以明圓融無礙之義也蓋欲言是名而先言非者是明幻有不離真空相非性而不融也故雖不壞相亦不可著相而後乃能圓融而無礙無礙者相不障性也又復既言非又言是名者是明真空不妨幻有性非相而不彰也故雖不著相亦不應壞相而後乃為無礙而圓融圓融者性不拒相也如是之義乃此四科最精最要之義般若波羅蜜宗旨徹底宣露矣正金剛般若波羅蜜云何奉持之所以然也若未明乎此則對於經義縱令不無道著一二終是不關痛癢則所謂解者便非真解既未真解如何奉持乎則所謂行者實乃盲行而已如此雖勤苦學佛必不能得大受用甚至走入歧途而不自知反之則一日千里受用無盡也般若為佛法中根本之義亦為究竟了義若學佛者於此根本義究竟義未明終是在枝葉上尋求既未見道又何足云修道故不能得受用也從來所謂三教同源之說無非就佛法枝葉上牽引附會若根本究竟之義便無從比擬矣當知佛法所以超勝一切者在此若學佛而不明此義終在門外故上云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出是明明開示佛法當從此門入也儒家往往剽竊佛法之義以談儒而又毀謗佛法真是罪過然所剽竊者只是一知半解不但非了義且非全義因此生謗可乎其所從剽竊之路無非禪家語録耳禪家修持雖宗般若然以不立文字故遂不根據教義發揮而其所說又一味高渾容易為人剽竊附會者在此而根本究竟了義不致被人撏扯擾亂者亦幸而有此何以故儒家克己修身循規蹈矩豈非君子然眼孔短淺心量狹隘大都少有所得便沾沾自喜知其一便非其二故自漢以來號稱尊孔除漢儒訓詁之學尚於儒書有所裨益外其他或拉扯讖緯之言或捃扯黃老之說或剽竊禪家緒餘之與儒書近似者附會而裝皇之實於儒家真義并未夢見而門戶之爭卻甚囂塵上以如是我見甚深之人雖聞佛法根本究竟了義其不能領解也亦可決矣試觀程朱皆親近禪宗大德多年而所得不過如此反而操戈相向亦足以證余言之非謬矣然則彼輩若聞究竟了義教縱令不致操戈其必亦如談儒理然牽枝引葉似是而非反令正義因之不彰而已此又不幸中之大幸也又此四科更有一要義亦不可不明者其義云何則以頭一科為主餘三科釋其所以然是也頭科云何為主般若波羅蜜則非般若波羅蜜是也當知般若是人人本具之智即是清淨心此清淨心住處無方所用時無痕迹本是把不住取不得的所謂心月孤圓光吞萬象何以故以其絶待清淨故圓覺經不云乎有照有覺俱名障礙佛說般若本令人依文字起觀照證實相但恐人存有照覺之智其下者甚至向名言中覓般若故特於說明奉持之所以時不嫌自說自翻而曰般若則非般若如此一說直使奉持者心中不留一個字腳不能沾一絲迹相真所謂快刀斬亂麻手段即此便是金剛般若迥異乎相似般若矣般若之理見不徹底經論中名為相似般若謂其似是而非也一切行人當如是奉持也上云以是名字者當以是金剛名字也故此金剛般若持以破惑惑無不盡持以照理理無不顯故能即一切法離一切相即復離一切相行一切法果能如是奉持方於世出世法究竟達其本末邊際謂之波羅蜜者因此此佛說般若則非般若之真實義也復恐學人不能通達故更說下三科以明其義俾得洞然明白耳有所說法否一科是明般若無言無說也上云般若非般若正顯其非言說所可及故以有所說法否試其見地答曰無所說正與問意針鋒相對若知得雖終日說熾然說而實無言無說是不於言說中求也如是奉持者是為般若波羅蜜也三千大千世界一科是明般若境智一如也般若非般若正顯般若非實有一法而法法皆般若之意以明諸法一如恐未能解故借微塵世界發個問端答言甚多者就相而言相也而如來說非說是假名者即相而無相也若悟得細而微塵大而世界緣生無性當體即非皆是假名則塵塵剎剎莫非般若所謂坐微塵裏轉大法輪於一毫端建寶王剎所謂盡十方世界是自己光明又曰山河及大地全露法王身皆境智一如之義也境智一如則是無能無所而絶待清淨矣如是持者乃般若波羅蜜也三十二相一科是明般若無智無得也般若非般若正顯般若正智覺性圓明無能覺無所覺而凡夫則曰若無能證之智所證之果為何現三十二相故以得見如來否發問答曰不也乃的示法身無為原非色相但如來以無智無得故所以大悲隨緣現起無邊相好或三十二相乃至隨形六道可知種種相好不過隨緣現起耳既是緣起法門所以相即非相而是假名故曰非曰是名也若會得非相是名則如來隨處可見即三十二相而見如來可也若或未然著於三十二相終不得見如來也奉持般若如是如是總而言之般若法門本如來說今示以尚無所說何況般若之法其不應執著不待言矣遣其法執者以清淨心中不可有境界相也故復示以塵非塵界非界使知法法頭頭莫非般若豈別有境界然而人之不忘乎般若境者以佛即證此故也故更示不以相見如來若知三十二相為非相而是假名者則是能見諸相非相矣若見諸相非相則見如來矣知此則般若非般若之旨可以洞明即云何奉持亦可洞明蓋總以開示當即相離相以奉持而已若照此義趣分科則第二第三第四三科應攝在第一科之下今不如是而平列者以平列分科則空有二邊不著以及遣蕩圓融諸義彰顯明白易於領會故也然以般若非般若一科為主之義經中明有亦不可漏故補說之此外尚有別義亦甚緊要不可不知者此請示名持一科已由伏惑說至斷惑然而當知惑有粗細此中是斷分別粗惑故前半部總判曰約境明無住至後半部所斷乃俱生細惑故其總判曰約心明無住也問此中已明離念豈非已是約心明乎答此有二義前後不同一此中雖已約心明然尚屬於詮理即謂尚屬於開解入後乃是詮修更於修中顯義以補此中所未及此前後不同處也二此中先離粗念即起心分別之念入後是離細念即不待分別與心俱生之念此又前後不同處也上來詳明所以已竟癸三結顯持福分二子初約命施校須菩提若有善男子善女人以恆河沙等身命布施寶施尚是外財今則乃以身命施佛經中名為內財重於外財遠矣衆生最愛者身最重者命身指四肢等言猶未損及於命已屬難能況為衆生捨命乎且不止一個身命乃如恆河沙數人之一生只有一個身命今云以恆河沙等身命布施其為生生世世常以身命布施可知其為難能也何如其福德之多也何如然若施相未忘仍屬有漏如世之殺身成仁者初未聞其有成佛事也子次明持福多若復有人於此經中乃至受持四句偈等為他人說其福甚多受持一四句偈等勝過恆河沙身命施此何理也且前兩次皆以寶施校勝此更以身命施校勝又何說也當知第一次顯勝因甫生淨信故但以一個大千世界寶施福德比較以顯其殊勝第二次顯勝因解慧增長不但知境虛并知心中本無塵境故以無量無邊大千世界寶施福德比較以顯其殊勝至此則解義更深已開金剛智矣此智既開便知斷其妄念而捨生死根株其功行視前更為入裏故不以外財校顯而以內財校顯因其持說一四句偈等若校若舊版作如原稿作若能開金剛智奉金剛般若以修持便能斷念斷念便捨生死根株而超凡入聖視彼但能多生多劫捨其身命而未能捨生死根株者相去不可以道里計故持說此經一四句偈等之福德多於以恆河沙身命布施之福德以此開金剛智可望超凡入聖彼不知持說此經金剛智便無從開而仍未能脫生死輪回苦惱之凡夫故也辛四成就解慧分二壬初當機讚勸次如來印闡壬初又三癸初標領解爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言從開經至此所有伏斷分別我法二執之理事由淺而深逐層闡發至詳至晰故此一科接明深解當機之如是自陳者無非望大衆皆得如是故既讚且勸也何以故佛與長老不辭苦口反覆闡明無住之旨者原欲聞者大開圓解蓋經旨是甚深微妙中道第一義若不通達其深微則見地未圓何能二邊不著合乎中道經云深解義趣正明其見地已圓不同向之偏空矣此其所以自陳非慧眼得聞至於涕淚悲泣也此中雖說解義其實已攝有行蓋解行從來不能分開故曰解行並進並進者以其必行到方能解到必解圓而後行圓故也當知修行不外聞思修三慧如此中之聞說是經便是聞慧何以此聞乃是聞慧至下當說而深解便是思慧修慧何以故若不思惟修觀便不能深解故故曰說解便攝有行不但此也所謂深解義趣者是何義趣乎即是深領會得上文所說當云何生信當云何奉持之所以然也然則說一解字不止攝行亦攝有信且下文云信心清淨則生實相生實相便是證性下文又云得聞是經信解受持則為第一希有乃至何以故離一切諸相則名諸佛名之為佛者明其證性也然則說一深解不止攝信攝修并證亦攝在內矣而且信心清淨則生實相之意又是說實相之生便是信心清淨觀此則前次所說信解行證雖說為四事其實乃是一而四四而一其理益可證明矣此成就解慧經文乃是開經以來之歸結處何以故上來師資種種問答苦口婆心以發明甚深義趣者目的何在無非望聞法者能開深解而已豈非上來千言萬語得此一科始有個著落乎故曰歸結處也不但此也從次科如來印闡以下凡世尊所說又無非就上來所已說之緊要處加以發揮加以證明令人對於上來所說要旨更加一層信解則受持更為得力而已故此第四科成就解慧及下第五科極顯經功乃是前半部總結之文也此皆經中之脈絡眼目故預為提出預為點醒以便臨文易於領會本經之例結經者凡標一爾時云云皆是表示更端之意此中深解義趣四字約義趣言則皆上文所有而約深解言則是上文所無至此方始自陳故曰更端也爾時二字與上請示名持中之爾時正相呼應蓋請示名持以前所明之義是開知境虛智開無塵智至請示名持時乃開金剛智此智甚深不易領悟此智若開便斷惑證真乃修功之所歸趣今云深解義趣便是自陳其得開金剛之智矣若但開得知境虛智無塵智不過是觀行位相似位不得曰深解也不但此也此中之爾時乃直與經初爾時長老須菩提在大衆中即從座起時之爾時相應何以故若無彼時之請法何來此時之深解乎若深觀之此時之深解已伏於彼時之請法何以故因長老能於大衆瞶瞶之時獨能窺破佛不住相因而請法所以聞法即解耳若在他人決不能聞說是經便得深解義趣此下文所以云不足為難也是經文中已明明點出前後關係矣不但此也彼一時開口即讚希有此一時亦開口即讚希有皆點明前後相應之眼目處又觀彼時長老即從座起願樂欲聞何等歡欣踴躍而此時之長老卻涕淚悲泣矣前後映帶大有理致蓋彼時之歡欣正此時悲泣之根也爾時二字若約當下說便是開示所以奉持之理已竟之時亦即聞而深解悲從中來之時也聞說是經之聞與經初願樂欲聞此兩聞字正相呼應聞所欲聞且復深解真乃萬千之幸此所以喜極而悲也深解與最初之諦聽相應若不諦聽斷難深解故聞說是經之聞非泛泛而聞所謂聞慧是也然此亦是就長老說因其本是第一離欲阿羅漢早能無念既具慧眼又復解空第一故於未聞是經之先便能洞了無住之旨而見如來所以諦聽之效甚偉聞便深解耳若在凡夫縱能諦聽決不能一悟徹底能開知境虛智已難能而可貴矣若聞經便爾無塵千古能有幾人至如金剛智更無論矣即如禪宗六祖大師聞應無所住而生其心而得頓悟古今無第二人然而傳授衣鉢以後尚為獵人羈絆十餘年此正佛祖加被磨煉其金剛慧劍耳若在末世尤難之難故下文云後五百歲得聞是經信解受持是人希有也此理不可不知然亦不可因難自阻佛說後五百歲持戒修福能生信心便能一念相應信為道源功德母果能聞經實信便入般若之門矣果能入門何嘗不可頓悟頓斷何以故諸佛加被故夙慧甚深故然則何謂入門實信塵境皆虛不為所縛便是般若之初門也此理尤不可不知義者義理即上來所說觀門行門若伏若斷之真實義是也趣者歸趣亦云趣向即下文所謂信心清淨則生實相是也蓋義理千端歸趣則一佛說文字般若無非令依之起觀照證實相耳若不了解義之歸趣則如入海算沙毫無歸結亦如行舟無舵將何趣向則亦無利益功效之可言矣故但解義不解趣非深解也且以歸趣言之若但解歸結所在而不解如何趣向仍是如數他家寶自無半錢分亦非深解必須既了解義之歸結所在更復了解此之所在應如何而趣向是真能深解者矣此深解義趣四字是結經者所加蓋從下文自陳中得知其能深領解也故特為標出其標出蓋有二意一使讀經者知下文自陳中所說乃開經以來種種妙義之歸趣宜悉心體會之二若不標出則涕淚悲泣從何而來且使知以解空第一之長老乃因深解此經而悲泣可見經中所說之空非尋常空有對待之空矣又使知以長老親依座下之大弟子乃因聞解此經至於悲泣可見此經真是難遭難遇豈可輕視更豈可不悉心體會又使知以長老之悲泣由於深解可見久讀此經而漠然無動於中甚至怕談般若者無他由於經中義趣未能領解故耳由是言之結經者特標此句其為警策也至矣切矣涕淚而泣正明其悲涕淚者悲泣之容也泣與哭異有淚有聲為哭有淚無聲為泣人之所以哭者忽遭意外大損如刀割心懊喪之極不覺失聲而慟此之謂哭人之所以泣者深幸未得今得喜愧交并感荷之至不覺垂涕而悲此之謂泣長老興悲不外此理即由其撫今而喜追往而愧既愧且喜因之愈感佛恩合此三種心理遂現悲泣之相矣何以見之此中云聞說合之下文佛說如是甚深經典昔日未曾得聞則今日之感謝佛為之說深喜何幸得聞可知矣而昔日雖得慧眼不聞此經其深抱慚愧之意顯然若揭須知當其慨歎往昔處正其慶幸今日處故曰長老興悲是由且喜且愧且感三種心理所發現也至如下之三勸信解文中所言是長老不但自慶更為一切衆生喜得無上法寶此其所以廣勸信解受持也然則既如此喜愧交并能不感激涕零乎凡人大夢初醒回憶從前莫非如蠶作繭自纏自縛如蛾赴火自焚自燒撫今思昔往往涕不自禁古德有云大事未明如喪考妣大事已明更如喪考妣皆此理也而白佛言者因聞說是經而得深解義趣因深解義趣至於涕淚悲泣於是自陳見地求佛印證此必然之理也將涕淚悲泣而白佛言八字連讀之便是垂涕泣而道觀經初長老為大衆請法及下之廣勸信解可見長老向世尊垂涕泣而道便是向遍法界盡未來一切衆生垂涕泣而道也即次科所說昔來慧眼未曾得聞亦是普告一切衆生者我長老大慈大悲意在警策一切衆生當速發無上菩提心奉持般若方為紹隆佛種方為不負己靈若學小法雖開慧眼得無諍三昧成第一離欲阿羅漢如我者尚不免今昔之感慎勿如我之聞道恨晚也而佛說此經萬劫難逢且義趣甚深若得聞之便當如法奉持以求深解始知佛恩難報而慶快生平耳總之長老之喜為衆生喜長老之感為衆生感其慚愧往昔悲泣陳辭皆為激發衆生須知我輩得聞此甚深經典不但佛恩難報長老之恩亦復難報何以故佛說此經是由長老為衆生而請說故癸次陳讚慶希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經希有兩見然讚語同讚意則不同前因乍悟本地風光如人忽覩難得之寶故讚希有今則深解真實義趣如人已獲望外之財昔未得聞而今得聞故是望外慶快萬分故讚希有蓋前是外覩宏規今是內窺堂奧也此希有二字不止讚佛兼及讚法并有自慶之意下文云佛說如是之經可知是讚佛說之希有也此中又含有四意一難說能說甚深般若唯佛與佛究竟證得故亦唯佛與佛能究竟說而一佛出世必經多劫故曰希有二時至方說此金剛經說在般若之第九會若無當機之長老將向誰說以說必當機機緣未熟說亦無益故故曰希有三無說而說如來無所說佛之說此原令衆生見如來且般若本非言說所可及故今雖熾然而說當知實為無說之說說而無說也故曰希有四大悲故說佛視衆生本來是佛因其昧卻本來遂成衆生是故說為可憐憫者故此無為之法雖不可說而假設種種方便說之皆令入無餘涅槃而滅度之豈非希有兼讚法者下文云佛說如是甚深經典甚深二字便是讚辭經典而曰甚深明其超過其他經典也無上甚深微妙法百千萬劫難遭遇如本經上文所云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出以及持說一四句偈等勝過恆河沙身命布施乃至經典所在之處即為有佛若尊重弟子等句其法之希有可知至若向後所云是經義不可思議以及為發最上乘者說等句莫非明其為希有之法以其均在後文此中姑不引釋云何含有自慶之意如下文言昔之慧眼不聞此語正是自慶其今得聞而深解也然則昔何道眼不開今何見地深入豈非希有之事乎何云甚深經典此經所說是佛法根本義是究竟了義是大智大悲大願大行之中道第一義是第一義空之義是令信解受持者成佛之義且一言一字含義無窮其深無底故曰甚深以第一離欲阿羅漢之慧眼而未曾聞正明其甚深也又般若波羅蜜深矣而此經乃是金剛般若波羅蜜故甚深也其他如上來所引佛及佛法皆從此經出等等言句其甚深可知矣昔來者謂自證阿羅漢果得慧眼以來也何謂慧眼眼者見地之意佛經說有五眼一肉眼凡夫見地也二天眼天人之見地也天人亦是凡夫然其所見超過人道以下故名之曰天眼三慧眼見人空理謂之慧眼阿羅漢之見地也四法眼既見人空更見法空故名法眼此菩薩見地也五佛眼謂佛之知見也則超勝一切矣今略說其概待說至下文明五眼時再詳昔來但空人我而此經是空法我故向於此理未曾契入故曰昔來慧眼未曾得聞此中含義甚多甚要茲當分晰說之一上言眼下言聞眼與聞毫無交涉便可證明所謂眼者乃謂見地不能作眼耳之眼會亦不能作眼見之見會二眼之與聞既無交涉則所謂聞者亦不能呆作耳聞會乃是返聞聞自性之聞所謂聞慧是也三既是聞慧則說聞便是說解然則昔未曾聞者非謂一徑不聞乃謂雖聞而未得解等於未曾聞耳四愧其昔未得聞正是幸其今已得聞今何以聞由其深解故上云佛說如是甚深經典何以故若非深解便不知此經有如是之甚深故此結經者所以標之曰深解義趣也五長老嗟昔未聞大有聞道恨晚之概此適才所以悲泣也然則今者何以聞而深解以其觀見如來於法無住其不取著向學之法可知又復為衆請此大法其發大智大行大悲大願之心可知是其見地迥異乎前故於此甚深之經遂能契入耳六此經說在大般若經之第九會何云昔未曾聞又前八會中長老且轉教菩薩亦不得云昔未開解須知長老今如此說者無非勸導衆生急起讀誦此經信解受持耳七昔之八會雖已得聞其轉教菩薩雖已開解而金剛般若卻是至此乃說故曰甚深故曰昔未曾聞八由是言之上文所言深解乃是甚深之解因般若已是深經前會已教菩薩是已早開深解矣而此會之經則為甚深之經故今日之解乃是甚深之解故不禁撫今思昔而知必能如是了解方為徹底此其所以聞道恨晚也此其所以涕淚悲泣此其所以廣勸信解也九長老如是自陳者復有微意其意云何開示大衆如是甚深經典切不可執著文字切不可向外馳求當攝耳會心返照自性乃得開其見地了解經中甚深之義趣耳十不但此也更有深意存焉既是人空眼不能見法空理可見人之學道淺深次第絲毫勉強不得而長老道眼必至第九會始開又可見時節因緣亦絲毫勉強不得不但此也世尊出世原為令衆生證般若智到涅槃岸乃遲之久而說般若又遲之久而說金剛般若可見發大悲心者亦復性急不得以機教必須相扣故而有一慧眼之見便不得聞更可見看經聞法必應將其往昔成見一掃而空始有契入之望以一有成見便障道眼故癸二勸信解分二子初約現前勸次約當來勸子初又二丑初明成就世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德長老大慈自得法樂普願現前當來一切衆生同得法樂故盛陳成就之希有令大衆聞之發心信解雖文中未明言勸而勸意殷殷矣此正大悲大願之阿耨多羅三藐三菩提心也若復有人蓋深望有如是之人也得聞是經含有不易得何幸而得不可錯過此一得之意清淨即是無相如前以不住六塵生心為生清淨心正明住塵便是著相少著相便非清淨矣而既曰不住又曰生心又明所謂無相者非對有說無乃絶對之無即是有無等四句皆無方是無相真詮若徹底言之并此絶對之無亦無乃為究竟清淨所以位登初住只證得一分清淨心由是而功行增進愈進愈細歷四十階級至於等覺尚有一分極微細無明換言之便是清淨心尚有微缺故曰等覺見性猶如隔羅望月更須以金剛智除之乃成究竟覺則清淨心完全顯現矣何云信心清淨謂由信此文字般若起觀照般若而得一心清淨也故此信心清淨一句雖只說一信字而解行證并攝在內若非觀慧執情何遣若非遣之又遣至於絶對之無信心何能清淨所謂觀慧者即是奉持金剛般若離名字言說不著一切微細廣大境界并希望勝果亦復不著但驀直如法行去一念不起果能斷得一分虛妄相想即是生滅心亦即是念清淨心便現一分現得一分便是證得一分法身而登初住轉凡成聖矣從此加功至究竟覺而後生滅滅已寂滅現前則自性清淨心圓滿顯現名曰妙覺亦名成佛亦名入無餘涅槃又可見所謂信為入道之門一語其門字是廣義非專指大門而言堂門室門賅括無遺又可見解行證三皆信字之別名換言之便是所謂解行證非他不過信心逐漸增長而光明至於究竟堅固而圓滿耳何以故曰解曰行曰證必信心具足而後乃能解足行足證足故若其信心少缺尚何能解能行能證之可說故曰信為道源功德母也故前云信解行證當圓融觀之不能呆板看作四橛也故本經中開解進修成證三科皆兼說及信也此理不可不知實相是性體之別名下文是實相者即是非相是故如來說名實相三句即是自釋此義何以性體名為實相至下當說今暫從略性是本具無生不生今言生者現前之義此與前文生清淨心意同向因在纏而不顯現今奉持金剛般若迷雲漸散光明漸露有如皓月初生蓋無以名之假名曰生大智度論所謂無生生是也無生生者無生而生也論又云諸法不生而般若生蓋謂若解得諸法不生便是無生觀智現前是為無生而生此義甚深猶恐未能了解茲更釋之曰無生觀智即是般若般若實相皆是法名既是諸法不生而般若生而般若亦諸法之一何得曰生不過明其無生觀智現前耳蓋法本無生假名曰生故曰是為無生而生也般若生之義明則實相生之義可了然矣更當知般若實相固是法名而此法非他即指本性是故本經實相生一語便是性光顯現而大論中般若生一語便是無生觀智現前也性本無生故無生觀智一語猶言性智性智者性光也言觀智者何義明其智由觀現耳猶之本經之言信心清淨信心清淨者明其心清淨由於信成就耳經言則生者則者便也信心清淨便生實相猶言信心清淨便是實相現前因其信成就便心清淨而清淨心也實相也皆是本性故信心清淨便是實相現前也此正顯其生即無生之義當知說為清淨正因諸法不生然則少有所生便非清淨心可知而又名之曰生者以其是無生而生生即無生故耳既然信心清淨便是實相現前可知實相現前亦復便是信心清淨而已然則所謂證得者可知亦是假名實無所證無所得也不但此也所謂信心清淨者亦他人云然是人心中初不自以為信成就初不自以為心清淨何以故少有一絲影子在便是法相便是取著便非諸法不生尚得謂之信成就心清淨乎然則經文何必定要說一生字何不徑曰信心清淨則實相現前豈不直捷當知說一生字又復含有要義一說之為生者是明信心清淨乃迥脫根塵性光明耀非同死水也此與前言生清淨心同一意味蓋表其所謂清淨者是寂照同時非止有寂而無照也而說一信字又是表其功行前所謂解行證三事并攝在內是也二說之為生者是明其剛得現前之意也因實相須分分現非驟能圓滿若徑曰實相現前太儱侗矣故說一生字使人領會得如月之初從東方現起耳三說之為生者又明其初得轉凡入聖也因為實相剛剛現前便是現得一分而現一分實相便是證一分法身而位登初住即分證位之第一步此是初成菩薩之位故說一生字表明其初入聖位所以下文緊接曰當知是人成就第一希有功德前釋最上第一希有不云乎最上即是無上第一即是正等菩薩自度度他自他平等又復悲智雙運福慧雙修定慧等持此皆菩薩修功也皆平等義也正等者言其既正覺復平等也佛座下菩薩位在第一小乘位在第二故第一是指正等之菩薩希有者正覺也凡夫迷而不覺外道覺亦不正故正覺是指小乘羅漢明其能以正法自覺也能以正法自覺故曰希有希有者對凡夫外道言也若菩薩不但自覺兼能覺他故曰正等具足稱之則云正等正覺亦即第一希有佛則自覺覺他覺行圓滿故稱無上正等正覺亦即最上第一希有今此中曰成就第一希有功德不曰最上者是明其已成菩薩即初住位菩薩也以其實相剛生故由此中文義觀之益足證明前來最上第一希有應作無上正等覺釋不能作他釋也又此中第一雖亦可作是成初生第一位菩薩釋然而不妥者以與上來最上第一希有不一貫不如仍作正等釋之言功德者功者修功德者性德蓋明其既已成聖則照覺增明約破自他惑言則功用平等是為成就第一希有之功約自覺覺他言則性德初彰是為成就第一希有之德福德與功德同乎異乎答不能定說同亦不能定說異也何以故福德專約福言功德賅福慧言福德約感來之果報言功德約顯出之體用言福德多就有為言功德每就無為言此所以不能定說同也然若修功德而著相則功德成為福德若修福德而不著相則福德即是功德此所以不能定說異也上來校顯處皆說福德此處則言功德何也答凡校顯處皆言福德不言功德者此有三義一持說此經本是功德而非福德然因其是引著相布施之福德來比較故順文便亦姑名之為福德二兼以顯明修無住行者雖不應著相亦不應壞相故皆言福德以示修慧應兼修福之義三持說此經所以勝彼著相布施者無他即因其通達不著相之理故也所以皆言福德以明若不著相則福德即是功德之義也又須知七寶施身命施之人本是發大心者即本是修功德者不然決不能如是布施然但說為福德者無他正因其不持說此經不能通達應不著相之理耳是其中又含有若其著相則功德成為福德之意在也至於此處原非引著相福德校顯乃是發明信心清淨便成就第一希有須知因其能不著相乃能清淨而得如是成就也故不能言福德只能言功德上科是自陳其已能深解若非深解何知經典之甚深此義前已詳談然但明深解尚是總冒此科以下至則名諸佛方陳明其所深解之義趣若專就此科說則信心清淨句是深解義亦兼深解趣意則生實相當知是人成就第一希有功德正明深解趣也當知者謂當知實相之生便是成就又當知信心清淨便生實相也當知二字雖說在中間而意貫兩頭言當知者正因其自得深解故勸人亦當如是深解也何謂信心清淨為深解義耶因前生信文中世尊言持戒修福能生信心以此為實接云聞是章句乃至一念生淨信而開解文中復云應生清淨心故長老今云信心清淨正與前文針對長老以為世尊開口便令發心度衆度無邊衆生而實無衆生得滅度者乃至有我人相便非菩薩此義便是令不取相其下又令不住六塵布施不住六塵生心無非令不取相而已何以不能取相為生清淨心也所謂一念生淨信者信何以淨心清淨也可見生淨信便是生清淨心又可見心之清淨全由於信試觀一念生淨信一語意在明其已得一念相應何謂相應謂其一念而與自性清淨心相應也相應之義便是證而不修何證不解又何修而解行證一概不提但云一念生淨信可見一個信字已貫徹到底即是令人體會果能實信為因必得淨信之果也簡言之信心增長至於圓滿便心清淨矣由是觀之長老信心清淨一語無異為上來世尊所說諸義之結晶若非深解其義便道不出前文又云一念生淨信者如來悉知悉見是諸衆生得無量福德而於應生清淨心之下復云當知是人成就最上第一希有之法故長老今云則生實相當知是人成就第一希有功德亦正與前文針對長老以為世尊所以云應不取相應生清淨心者以必須遠離根塵識之虛相乃能生起清淨心之實相也所謂得無量福德者以其成就最上第一希有之法故也最上第一希有唯佛堪稱其下綴一法字上又曰當知皆是防人誤會而告之曰當知是生清淨心之人雖未成佛卻已成就成佛之法矣其法云何即所謂離根塵識虛相生清淨心實相是也當知是人由實信故而能離虛顯實一念相應其功德已成就第一希有之菩薩至此地位是已超凡入聖始有成佛之可能蓋必先成菩薩而後方可成佛此處之當知正與前文之當知相應故必成就第一希有功德乃為成就最上第一希有之法也此非長老深解義之歸趣乎且知信心清淨便生實相而得成就又非長老深解義之趣向乎由上來長老所解之義趣觀之吾人亦可悟得既然證性便是信心清淨則吾人必須開解者無他在令信心增明而已而必須進修者亦無他在令信心增長而已蓋以信為主幹解行證則為信之助力也復由此可悟信為主幹故曰信為入道之門故曰信為道源功德母故學佛必當首具信心而此經全部是以生信開解進修成證明其義趣故吾人聞得此經對經中所明之如何為生信如何為得解如何為修無上菩提如何為成忍首當一一信入之然後方為實信乃能開解精修而得證也經中處處兼說信字即是點眼處吾人當如是領會也更有一義不可不知者信為主幹者意在令初發心菩薩得以入門也然而當知一即一切一切即一華嚴明此義故約信解行證言之若以信為主則一切皆趨於信若以解為主則一切又皆趨於解矣其他類推故聞法當深會其用意之所在若執著名言死在句下為學佛之大忌亦非圓融無礙之佛法矣即如信字固要緊解字亦要緊簡明言之即是信解行證四事無一不關緊要而四字中尤以信解為最緊要以此二事最密切故也何謂最緊要學人若能實信深解則自能精修而得否則那有修證之可言故曰最緊要也何謂最密切解因信有信從解生故也信字居首此經亦先說生信次說開解且信字貫徹到底如上所說則解因信有自不待言而曰信從解生者即如前云能生信心以此為實此中便含有信從解出之意云何生信以此為實故也若非了解得經中真實義何能以此為實又此中長老自陳其深解之義趣時開口乃云信心清淨則生實相亦是顯明若非深解便不知信心關係有如是之巨也則信從解生愈得了然矣其他本經中語可引而證明者尚多茲不具述前云成就第一希有功德是初住位云何知其是初住耶答此有二點一是從上文生字看出二有大智度論為證也當知實相現前便是證無生忍大論卷五十曰於無生滅諸法實相中信受通達無礙不退名無生忍按論中所言通達無礙自在一語即是證義然則證無生忍是因其通達實相則實相現前便是證無生忍也可知而實相現前之位次便是證無生忍之位次亦可知矣證無生忍位次經論有種種說前已談過今無妨重言之如大論七十三云得無生法忍菩薩是名阿鞞拔致阿鞞拔致者不退之義即初住是是說初住得無生忍也而華嚴經則謂八地證無生忍仁王護國等經則在七八九地以上諸說雖別其義皆通蓋初住便得分證至八地以上得無功用道即是無學而後圓滿耳故言初住證者是謂分證言八地等證者明其圓證也須知即約圓證言若細分之亦有次第八地九地十地所證譬如十三夜月雖圓而未盡圓等覺所證圓矣尚不無微缺至於佛地始如月望之月究竟圓滿而初住之分證不過證得一分則如上弦之月清光甫生而已故本經曰生實相者正明其清光甫生位登初住也又須知龍樹菩薩大智度論說初住便得無生忍者乃謂圓初住非別初住圓者言其見地圓融別者言其見地無論於理於事雖極精深而成隔別隔別即不圓融之意更須知見地圓融者位雖甫登初住其見地卻等於別初地故大乘義章卷十二曰龍樹說初地以上得無生忍也龍樹本說初住乃曰龍樹是說初地者此語正顯龍樹所說之初住是圓初住而等於別初地耳天台祖師觀經疏亦曰無生忍是初地初住地住並說者因其所謂初地是指別教所謂初住是說圓教故也即此一語可見別初地圓初住見地相等又可見見地不圓者必至登地乃圓又可見所謂證一分法身者亦大有出入何以故別初住之人亦必證得一分法身方能位登初住然則雖與圓初住同曰證得一分法身而此一分之大小則懸殊矣何以故以圓初住見地等於別初地故當知自初住至初地有三十個階級豈非圓初住證得之一分比別初住所證之一分大三十倍乎所以圓初住人修至初地其中間三十個階級雖皆須一一經過而經過甚速不比別教人之難然則別教人即見地未圓者當其由十信修至初住時其必難於圓人亦可想矣上來所說種種道理皆不可不知者知此愈知大開圓解之要矣按大乘義章觀經疏同以別初地圓初住證無生忍夫證無生者證法身之謂也圓初住祇證一分則別初地亦為證一分也可知如是而言豈非別初住并無所證乎然不證一分不得名為初住其義云何通耶當知別初地圓初住之一分極其光明別初住雖亦證得一分而猶恍惚譬如上弦之月雖現而被雲遮何以故以其素來見理見事皆隔別而不融遂致性雖見而仍隔證如未證故至初地見圓始彰證得一分之名耳當如是知其義乃圓以是義故別初住雖曰分證不過差勝於相似耳當知名為相似者因其所見非真月乃月影名為分證者因其所見非月影是真月故勝然而真月猶隱於濃雲之中故差以其所見雖真而仍模糊其不同於月影也幾希此所以勝而曰差也然雖相去幾希一則所見縱極光輝而為水月是向對面間接窺之故名相似一則所見縱極模糊而為真月是從性天直接觀之故差而仍勝也當如是知其義始徹丑次明實相世尊是實相者則是非相是故如來說名實相此科是釋明實相為何及何以名為實相之義是實相者猶言此所謂實相則是非相言不可誤會是說相既名實相又曰非相正明其所說乃性耳如來者性德之稱如來說謂約性而說名者假名既是非相何名實相故又釋明之曰正以其是非相之故乃約性而說假名為實相耳意謂性不同相之虛妄所以名之曰實相也經文含義無窮只好逐層而說茲先如上說其一義以便了其大旨若但作如是說則不徹底矣何以言之性本非相何故假名為實相耶此義須分四層說之一實字有二義一是質實義二是真實義質實者質礙結實也譬杯中盛滿一物甚為堅結則有質有礙何以故再不能容受他物故此之謂質實然而性體虛靈正與質實相反虛則非實靈則非礙故故知實相之實非質實義乃真實義真實者明其非虛妄也虛妄亦有二義一者虛是空義妄是邪義二者虛是假義妄是幻義初義則為沒有為不好次義不但非不好并非沒有乃是假有幻相之義前云凡所有相皆是虛妄所謂虛妄者乃次義而非初義此義正與真實義對待然則相是虛妄性是真實明明是對待之物而且性又明明非相何以又名之曰相耶須知佛經中一言一名無不善巧何謂善巧能使人藉此名言可以從此面而達彼面不致取著一面也須知正以性本非相之故而又能現起一切相空而不空此性之所以為真實也經文是故如來說名實相句正顯此義是故承上非相言如來指性言非相是性名曰實相者蓋約性而說名為實以明性非虛妄而是真實之義也復約性而說名為相以明性雖非相而能現相之義也且由此經文觀之即此實相之名并能令人領會得性體絶待之義蓋性相對待之說從表面觀之云然耳若察其實際而深觀之離如來性體并無相之可說可知性體之為絶待矣經文如來說名實相猶言由如來而說名實相也正顯非性不能說實非性不能現相之義也此假名性為實相之所以然一也二此科之義正與前云若見諸相非相則見如來之義互相發明蓋前文意明若只見得相一面則偏於有若只見得非相一面則又偏於空皆不能見如來性何以故性是空有同時并具故起信論明如來藏具足空不空義豈非空有同時乎故必應能見相即非相方見如來也須知應見相而非相亦應見非相而相相而非相色即是空也非相而相空即是色也前文既明色即是空義此中復明空即是色義令人統前後而合觀之則於空有同時并具之義更可瞭然經文初云是實相者則是非相明其相即非相也復云是故如來說名實相是故承上非相而接云說名實相明其非相而相也相即非相非相而相正是如來藏真實義故曰如來說故先云是實相者則是非相重讀實字後云說名實相也重讀實字此假名性為實相之所以然二也前文見相即非相便含有非相而相義在但未顯說故此中藉明何為實相之義而顯明道破以補足之先說相即非相後說非相而相正明承相即非相而為之補足之義又須知相即非相非相而相二義本互攝而并具故於說相即非相之下用是故二字承接說之既以明補足前文之義兼明二義本相聯貫之意也三佛經中常云性體空寂因防人誤會性體之空為空無性體之寂為枯寂故復名性體為實相也實者真實有之非空無也相者熾然顯現非枯寂也此中正明此義非相二字言其空寂也何以故是相皆非豈非空寂殊不知正因是相皆非之故乃約如來性體說名曰實相說名為實顯其妙湛總持常恆不變雖空而非無也說名為相顯其胡來胡現漢來漢現雖寂而常照也此又性名實相之所以然三也四古德說實相之義為無相無不相此說甚妙極為簡明無相無不相應以二義說之始為圓滿一性體本不是相故曰無相然雖不是相而一切相皆緣性而起故又曰無不相二雖能現起一切相而與一切相仍然無涉故曰無相此明其即相離相也性固不是相然不自起一念曰不是相也故曰無不相此明其即不相而離不相也次義深於前義總以明性體離念而已無念則無所謂相不相故念離則相不相一切皆離矣然則以性體無相故雖名之曰相與彼仍無涉也以性體無不相故則名之曰相於彼又何妨哉況相有二義一謂外相即境相之意一謂相狀乃摹擬之辭名性為相當然不能呆作境相會故實相一語猶言真實相狀耳無相無不相正性體之真實相狀也故名之曰實相如此釋無相無不相義固圓滿而如此釋實相亦頗善巧而此無相無不相一語古德原從此科經文中領悟得來故無相無不相既具如上所說之二義此科經文亦復具此二義約初義言以性體本不是相故經文曰是實相者則是非相然雖不是相而一切相皆緣性起故經文曰是故如來說名實相也約次義言以相不相一切皆離故經文曰是實相者則是非相非有離意也實相便是非相豈非相不相俱離乎相不相俱離如來藏之真實相狀如是如是故經文申明之曰以是相不相俱離故約如來性體說得名之為真實相狀也此性名實相之第四義也校上三四兩義舊版在下此科復有要義一段之前與原稿同今案原稿於佛說本性一段前自注云是日講時將三四兩義提前先講畢接講此段茲依江居士講時次第將三四兩義移前俾與上一二兩義相銜接佛說本性加以各種名稱乃至一切法亦無不用種種語式安種種名詞者此義甚要而亦從來無人說及今為諸君略說之當知佛之說法原為破衆生之執因偏私故執因執而愈偏私衆生所以造業受苦輪回不已生死不休者全由於此而世間所以多煩惱多鬬爭乃至殺人盈城殺人盈野亦莫不由此世尊出而救世度苦故首須破此須知衆生所以偏私成執者無他由其智慧短淺凡事只見一面遂以為法皆固定彼之所見必不可易而不知其是偏也而不知其是執也故佛為之頂門一針曰無有定法以破其偏執之病根而凡說一法必用種種語式安種種名詞者正表其法無有定也此法字是廣義通攝世法出世法而言若但以為出世法如此違佛旨矣更當知人之要學佛學佛之要修觀者無他以觀照圓融之佛理便能轉其向來所有之觀念以化其偏執之病耳故學佛而不修觀其益至小何以故必修觀乃能明其理故因觀深而後見理深因觀圓而後見理圓亦復見理深則觀愈深見理圓則觀愈圓如是展轉修習智慧即展轉增明已於不知不覺間執情漸化而妄念潛消矣故所謂遣執者其妙用在此非硬遣也所謂斷念者其妙用亦在此非強斷也然則所謂在此者果何所在當知佛之說法從不說煞一句從不說煞一字且每說一法必用種種語式必安種種名詞者無他為令聞法者必須作面面觀乃明其中之義趣也此即妙用之所在何以故借此便已除其向來只看一面偏執之惡習故而此經所說尤圓尤妙真乃金剛慧劍何以故果能由面面觀而達於深觀圓觀便無惑而不破故且既須作面面觀方明義趣自不能不多讀大乘以廣其聞見更不能不靜意覺照以領其精微而定慧在其中矣果能如是不但修各種功行皆得自在受用對一切世法皆得進退裕如而轉凡入聖已建基於此矣何以故定慧日增妄念日少故此是聞法的緊要關鍵入佛的最妙訣竅急當著眼鄙人敬本此旨每說一義亦必作種種說反覆周密不厭其詳者無非希望聞者開豁心胸多得作觀方便而已蓋本來面目固非言說所可及且衆生久已忘卻若不於無可言說中多設方便以說之云何修觀耶上來是明面面觀深觀圓觀之益大如其反之其病亦極大即如信解二字每見有人一味主張但辦信心老實念佛足矣一切經典不許讀誦大乘法寶更置之高閣苟有研求教義喜赴法會者輒呵之曰不老實須知老實念佛須有程度念佛的義趣一毫未明何能老實如此主張太過豈止鈍置學人且復違背佛旨以十六觀經明言求生淨土應讀誦大乘明第一義其次亦須聞第一義心不驚動也所以凡依其方法而學者非不能振作半途而廢便走入歧路而不自知此不知信從解生之過也又見有人手不釋卷博學多聞一部全藏翻閲不止一遍卻從不曾燒一炷香頂一次禮對於三寶不知恭敬修行一層固談不到即其口中滾滾筆下滔滔亦復似是而非誤法誤人此又不知解因信出之過也此前次所以不憚煩言耳上來所說世尊說法從不說煞一字云云須知佛非有意如此乃是智慧圓滿融通其出辭吐語自然如此不但佛然菩薩亦然大德祖師皆莫不然故吾人對於一切經論古德一切言句即極不要緊處亦不可忽略看過不可忽略者謂當一一作面面觀深深領會也更須知佛菩薩見地豈吾輩凡夫所能望見縱能深解亦不過見到千萬分之一縱令善說亦不過說得千萬分之一雖窮劫說之亦說不盡也即如上科當知之義前次已說了三四層然其中尚含多義今無妨再說數種以示說不能盡一當知是經不可不聞也何以故是人之生實信成功德由於得聞是經故且是經不可不聞換言之即是般若不可不學二當知信心最要也何以故實相之生由於信心清淨故由是可知前來所說持戒修福於此章句能生信心以此為實之語應三致意質言之欲學般若當生實信欲生實信先當持戒修福也三當知轉凡成聖不退菩提非離相見性不可也成就句是明其位登初住超凡入聖名為住者是明其至此地位菩提心方能不退即是信成就也而心清淨是明離相生實相是明見性此所以先說當知般若不可不學何以故不學般若不能離相見性故所以又次說當知先當持戒修福何以故不持戒修福便非實信故不實信便不能信心清淨故此皆學人所急應遵行不如是行便不能成就故曰當知當知者明其不可不知也又推而言之由陳讚慶一科之義而觀若其大心不發此經不聞至高只能開慧眼成四果羅漢由明成就一科之義以觀若其得聞此經信心清淨至低便能生實相成初住菩薩此亦學人所當知者由是言之可見經義實在無窮實在說之不盡可見聞法必應作面面觀即如我以種種義說明實相若聞者但作此是說明本性何以名為實相領會者則非鄙人反覆詳說之意也且若但解得性名實相之故者亦與聞者無大益也何以言之實相是大家主人翁的本來面目如此真面本來唯證方知然則云何得證無他唯有在返照上用功而已不但聞時便當返照更當於清夜平旦時對境隨緣時依此次所說諸義深深觀照或單舉一義或融會諸義皆可清夜平旦者是向自心中觀照也對境隨緣者是向一切法上觀照也果能如是則受用無邊矣當知佛於本性安立各種名稱者便於人之因名會體也而各種名稱中實相一名於二邊不著空有同時較易領會此又長老獨舉此名為言之一意也鄙人復就此名開種種義而說之者意在便於聞者返照用功時多得領會之方便非但為解釋名義也由是可知開種種義說之之關係矣校此下舊版及原稿均有前次已聲明分四層說明然前但說其二今當繼續說之凡二十二字其下接解實相三四兩義茲依江居士講時次第將三四兩義提前與一二兩義相聯屬仍附識備考此科復有要義因長老說此固是釋明實相為何以及何以名為實相等道理實兼以指示用功方法也何以知之此中既明相不相俱離則與下文所說離一切諸相則名諸佛正相呼應離字大有功夫無功夫何能離何能名為佛耶故知此中說有修功在內也當知說一非字便是絶百非亦即是四句皆離所謂有亦離無亦離亦有亦無亦離非有非無亦離是也由是可知古德釋實相為無相無不相此一無字亦是絶待之無非對有說無也蓋相與不相本是對待之辭有對待便有變動有變動便是有生滅有生滅便非堅固而性體確是萬古常恆究竟堅固堅固則無生滅無生滅則無變動無變動則無對待無對待便是絶待絶待者相不相雖皆不離乎心性而心性則超然於相不相之外是也質言之相有也不相無也超乎其外豈非超乎有無之外則無相無不相一語是說絶對無而非對有說無之理可以恍然矣然則云何能絶對無之乎有無四句皆離是也故經文曰是實相者則是非相說一非字便是指示修功也是令學人欲見實相者當靜心於一切皆非上領會若領會得實相便是非相便領會得倘使心中少有相不相的影子便非實相矣故是實相者則是非相一語異常鋒利不得少觸觸著便喪失慧命質言之是令學人須於一毫端上契入也今欲諸君有下手處再依此理說一方便方便云何即是須於未起心動念時精密觀照苟一念起而偏於有即呵之曰非也或偏於無亦呵之曰非也乃至念亦有無念非有無皆以非字呵而遣之此是最妙觀門當知念頭不起則已起則於四句中必有所著今一切非之便是離念之快刀利斧也豈非最妙觀門至若出世法之六度萬行一一如法精進修行而曾無芥蒂於其胸中一一精進不壞也無不相也而心中若無其事不著也無相也而一切世間法事來即應事過便休雖應而能休雖休而能應所謂提得起放得下無論世出世法少有所偏皆以非字遣之如是久久體會四句皆離之義趣行去便能做到應時便是休時休時便能應時自然二邊不著合乎中道而相不相有無四句皆離矣此又是最妙行門也經中明明曰是故如來說名實相便是開示學人既非之而又說者但明其不必壞耳須知雖說而是假名如來性體仍宜離名字言說以自證也而離名字言說便是離念離念方便又莫過於向未起心動念時觀照一念苟起便一切非而驅除之豈非的示修功當知自上科信心清淨則生實相以下正長老之深解義趣也故聞經者當如是深解也世尊於本性安種種名長老又獨舉實相一名而言皆為令學人便於體認本性故實相義宜多發揮大論說實相有四句偈最精最詳最宜知之以便時常覺照實相即是性的本來面目正因昧卻本性故成衆生今欲轉凡成聖不真切體認得乎偈云一切實一切非實及一切實亦非實一切非實非不實是名諸法之實相即此可見菩薩說法善巧不就相字說而就實字說一也不就性說而就諸法說二也須知說為相者乃是假名不過使人明了本性之狀況耳故不就相說便是點醒不宜將相字看呆若其看呆便已著相矣其就實字說者又有深意以人之著相由於誤認為實耳若知一切法實亦非實非實而實便知一切法相即非相非相而相矣如此說法豈非善巧其就諸法說者須以三義明之一使人得知心外無法也佛說一切法但是幻相而無實體體唯淨心故曰萬法唯心又曰心外無法故可就諸法以明實相因諸法之實相即是性故就法而說無異就性而說也二使人易於體會也衆生既久忘本來而一切法則為衆生共知共見不如就諸法說俾得因諸法而悟心性三使人明了一真法界也起信論云因不知一法界故不覺念起而有無明遂成衆生一法界者一真法界也十法界萬象森羅而真如則是一也即一切同體之意若知得一切法之真實狀況莫不空有同時則上自十方諸佛下至一切衆生以及山河大地情與無情莫不皆以淨心為體可了然矣以淨心之實相本是空有同時故是之謂一真法界亦曰諸法一如須知一切法皆由心現心性既空有同時故一切法無不空有同時耳此善巧之二也龍樹以馬鳴為師故起信論已約諸法以明真如真是衣鉢相傳一切實者一切法儼然在望也此語是破執無一切非實者一切法當體即空也此語乃破執有又防人聞而執為亦有亦無非有非無故又說下二三兩句及者連及之意謂不可但看第一句須連第二三句而體會之其意若曰頃所言一切法實與非實者非隔別而不融也當知乃是實即非實非實即非不實耳實即非實所謂有即非有也色即是空也非實即非不實所謂非有而有也空即是色也如是則四句俱遣諸法之真實狀況如是亦即性體之真實狀況如是而結之曰是名諸法之實相者又明法性本不可說說為實相亦是假名而不可著耳常有人聞四句俱遣及空有同時不免懷疑以為亦有亦無非有非無與空有同時義味無別何以故謂之空有同時者豈非明其說有亦可說無亦可乎又豈非明其但說有便非但說無便非乎然則何以說亦有亦無或說非有非無皆謂其偏執而遣之耶此人如是說來誤矣大誤矣以其不但未明亦有無非有無之語意并未明空有同時之語意故也當知亦有無非有無兩句是承其上文有句無句而來故謂之四句說亦有亦無者之用意以為第一人單說有第二人單說無各偏一邊誠然有病我則不如是我說一切法乃是亦是有亦是無既二邊之俱是則偏於一邊之病除矣殊不知說有便不能說無說無便不能說有而曰亦有亦無自語相違況看成有亦是無亦是語既模稜兩可義復隔別不融故應遣也說非有非無者之用意以為第三人所說誠哉有病我則異乎是我說一切法乃非是有非是無既二邊之俱遣則第三人執著二邊之病除矣殊不知非有便是無何又云非無非無便是有何又曰非有豈非戲論且仍是看成有是有無是無其隔別不融亦與第三人病同故應遣也又復第三人見地既說有無雙是則仍是偏在有邊而第四人見地是說有無雙非則依然偏於空邊豈不應遣乎雙亦似是雙照雙非似是雙遮然實際仍大不同以雙照雙遮之言明其得中而雙亦雙非之說只知二邊故也若空有同時之義是明空時即是有時有時即是空時空有圓融既然非二便是無邊邊尚且無更何從著與亦有亦無非有非無義味天淵何云無別尤有進者衆生若知得空有同時可見空有俱不可說若知得空有尚不可說則何所用其分別哉此佛說空有同時之微意也蓋既以除衆生分別情見且令離名言而自證耳故無論說有說無說亦有無說非有無一切俱遣以上是約對治義說若約究竟義徹底說之言遣則一切遣言不遣則一切不遣須知凡言遣者因執故遣若無所執則無所遣故空有同時亦不可執執亦應遣何以明其然耶試觀心經先言色即是空空即是色以明空有同時使人悟此得入般若正智也而其下又曰無智亦無得此即開示空有同時亦不應執之意本經亦明明言之如曰般若非般若是也即如此科亦然先言則生實相成就功德矣而此科又曰實相則是非相說名實相亦因防人執著實相故說非說是假名以遣之耳實相即是空有同時也當知空有同時何以不可執因少有所執便偏著於有邊而非空有同時矣故應遣也若聞吾此言而於空有同時之義趣絶不體會觀照則又偏著於空邊而非空有同時矣亦應遣也當如是領會至要至要總之情見若空說空有同時也可即說四句又何嘗不可若其未也說四句固不可即說空有同時亦未見其可也著眼著眼如上所說實相之第二義中有曰此科是與前文若見諸相非相則見如來互相發明由是言之長老之深解義趣亦可見矣然而長老之所深解者猶不止此須知性之別名甚多今不舉他名而獨舉實相一名以言之者又是發明上來說法與非法皆不應取說非法非非法說則非是名等等之義趣也上來世尊如此說者皆是令不著於空有二邊以圓融之以著於二邊便非性而是相故若取法相即是著我若取非法相亦即是著我故今長老乃於空有同時之實相亦說則非是名此正針對上來世尊所說為之發明二義以便令領會者二義云何一性本空有圓融同時者圓融之義若著於二邊便與本性不相應故二空有圓融尚不應著以少有所著便非空有圓融故何況二邊其不應著更何待言此獨舉實相為言之深意亦即長老之所以深解義趣也又如上所說此科非字有離字意是說修功是與下科離一切諸相則名諸佛相應當知此約現前當來勸兩科之文實無處而不相應以兩科所說本是互相發明者此義至下當說子次約當來勸分二丑初慶今勸後次釋顯其故丑初又二寅初自慶世尊我今得聞如是經典信解受持不足為難我今得聞如是經典信解受持此一語正是說明昔來所得慧眼未曾得聞之所以然何則若知今之得聞而信解受持便知昔之未曾得聞者非他以心中有一所得之慧眼便於此深經自生障礙矣縱令得聞亦必不能信解受持則聞如不聞矣故曰所得慧眼未曾得聞也此言正是說明其障礙全在慧眼慧眼何能生障則全由於有一所得在耳何以故有一所得便是法執便是智慧淺短則於此三空勝義豈能相契且有一所得便是自覺已足便是悲願不宏則於此捨己度他且度無度相之妙行更難相契此其所以昔來未曾得聞也今則窺見世尊一切無住而道眼開為衆請求說此深經而大心發故得聞而信解受持也解者了解受者領納亦即領會故解之與受其義相近既言解復言受者受持二字乃是合說蓋受持合說以明當解行並進也又持字復有執持不失之義故信解受持一語是明其不但能信能解且能解行並進而不退也不足為難是說不十分難非謂絶對不難不十分難此其所以自慶也若絶對不難不得云昔來慧眼未曾得聞亦不致涕淚悲泣讚嘆希有矣何以不足為難耶蓋有三義一身值佛時也耳提面命獲益自易況以如來光明攝受見聞隨喜便得莫大之福便生莫大之慧初不必開示也而生逢盛會福慧夙根一定深厚如是因緣具足所以佛每說法現座證果者不可數計而生在佛前佛後者為八難之一長老躬為大弟子故曰不足為難此自慶之一也二已證聖果也如大品云般若甚深誰為能信答曰正見成就人漏盡阿羅漢能信今長老既證阿羅漢果所以不足為難此自慶之二也三能解空義也般若一部皆明第一義空而長老於十大弟子中解空第一是其根性最利易於契入故前八會皆是長老為當機今說甚深經典亦是長老發起故曰不足為難此自慶之三也綜觀下文亦具上說諸義何以故長老自言不足為難正以顯末世之十分為難以其生不逢佛也而自己慶幸處亦即加意獎勵後進處意謂我今幸遇世尊既證阿羅漢又解空義故得信解受持耳以彼末世衆生既不遇佛甚難得聞甚難信解受持者而竟得聞竟能信解受持彼真難能可貴其根性必遠勝我菩薩種性遠勝羅漢我今何足為奇故曰不足為難也數行之中詞意反覆勤懇其鼓舞後進之心拳拳極矣寅次廣勸若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有來世泛言佛後後五百歲則指佛入寂後第五個五百歲即末法之初今則將滿三千年已在第六個五百歲之末矣經中凡言後五百歲亦不限定在第五總以明其是末法時代而已楞嚴經言此時衆生鬬諍堅固入道甚難鬬諍者己是人非爭強鬬勝也堅固者一味鬬諍牢不可破也試觀中國自宋以來宋初至今將千年彼時正入末法之初講求道德學問者門戶之爭遠過漢唐於是有宋學排斥漢學之風有儒家謗毀佛教之習逮後所謂道學者流又自起鬬諍如程朱與陸王兩派是也總不外乎獨樹己幟打倒他人有因必有果卒之反被他人打倒遂有新學將舊學一齊推翻之事連孔子亦受其纍殊不知孔子之真實義自漢以來學者并未夢見即以佛門而論入宋以後亦染此風各宗各派鬬諍甚烈莫不己宗獨是別宗盡非愈趨愈下至於近今竟有欲推翻起信論者矣實可痛心佛門尚且如此道德學問中人尚且如此其他更何待言所以奮鬬二字成為格言殊不知古人曰努力曰奮勉曰自強即佛教中亦曰勇猛曰精進此等言句皆就己身說有利無病今曰奮鬬雖亦是自強而含有排除其他意在此蓋鬬諍習氣愈深所致世道所以愈苦也鬬諍云何起起於執著執著由分別分別由我見而佛法專治此病今世尊與長老皆特特就末法時代鼓勵可知今日欲補救人心挽回世運惟有宏揚佛法以其正是對症良方故也然而正以對病之故恰與人情相反以鬬諍堅固之人其障深業重內因不具可知加以去聖時遙善知識少則外緣亦復不足因緣兩缺於此深經不但受持難信解難即得聞亦已甚難非竟無聞法之機會也其如不願聞何然則倘有無此三難者非久植善根定為佛遣可知故曰則為第一希有明其若非菩薩示現即是具有菩薩種性之人也則為者便是之意意中含有成就在或曰菩薩示現無論已其具菩薩種性者何便成就當知經中先言得聞又言信解受持是明其三慧具足也豈不能成就耶聞是聞慧信解是思慧受持是修慧蓋居末世而得聞深經實非易事必其夙有般若種子所謂不於一佛二佛三四五佛而種善根者具有如是勝因方能得遇勝緣也故得聞便能生信開解間或亦有雖得聞而別遇障緣信心遽難發足解亦未能大開者只要遵依佛敕持戒修福必能信解受持蓋持戒是斷絶染緣此自利之基也修福是發展性德性中本具無量淨功德故亦利他之功也如是背塵合覺絶染緣為背塵展性德為合覺自他兩利必蒙諸佛攝受自於此經能生信心以此為實以此為實者謂解真實義也既信且解自亦如法受持矣如是三慧齊修何患其不成就乎又觀是人便是第一希有之言意中含有不可自暴自棄在此長老諄諄勸勉之意也此句與上文當知是人成就第一希有功德及下文則名諸佛句正相呼應丑次釋顯其故分三寅初正顯不著有何以故此人無我相人相衆生相壽者相上言是人便是第一希有何以便得如是此下三科正釋明其所以然也流通本每相皆加一無字唐人寫經即以無我相一直貫下故下三無字可省也何以故者假設問曰何故謂此人便是第一希有耶答曰以此人我人衆壽四相皆無故既已皆無是不著有也觀文相表面似但說其空人我相亦似但明其不著有然觀下文之轉顯則此人不但空人我且并空法我不但不著有且不著空然標科但曰不著有者順文相故以不著空意非得下科之轉顯不知也當知此經專明實相實相者絶對無外本非一切相所謂我法俱遣空有不著是也我法俱遣者謂人我法我等四相一切遣盡空有不著者我法等相不著是不著有也亦名我空法空非法相亦不著是不著空也亦名空空并我法二空言謂之三空末世衆生必其具有般若根性我法等執較薄方能於濁惡世中得聞此法方能超出常流信解受持也既能信解受持則我法空有之執自遣此其所以便是第一希有菩薩之故也故上言則為二字中含有成就意在者因此寅次轉顯不著空所以者何我相即是非相人相衆生相壽者相即是非相所以者何自問上文無字之所以然也我相下自答自釋意謂適所言無非對有說無也乃絶對之無所謂四句皆無亦即一空到底何以言之因此人非是見得我人衆壽實有而能無之也尤非滅卻我人衆壽而後無之也乃能見到我本緣生幻有當其現幻相時即是非有故曰我相即是非相此句明其非於我相外別取空也其人相衆生相壽者相即是非相理亦如是大論云衆生所著若有一毫末可有則不可離以所著處無如毛髮許有故可離也此意是說一切皆是幻相本無毫末許是真實有者正明其有即是空也所以可離譬如翳眼見空花花處即是空處何必滅花而別取空翳淨則花自無此亦如是約性而言若解得一真法界則本無差別本來常恆那有我人衆壽諸相約相而言若解得五蘊本空則知當其現我相時便是空時故我相即是非相也而人相及一切衆生之相亦莫非五蘊假合本來皆空故人相衆生相亦即是非相所謂壽者相者因其相續未斷故成此相其實既曰相續可見是念念遷流剎那生滅非壽者相即是非相乎此人信解受持而能如是便具三空之慧矣亦復四句俱離矣何則若未能洞徹我人衆壽本是幻相非有現有者雖能不著乃是勉強抑制亦即對有之無見地既未真不但用功費力而根株猶在斷靠不住且縱能抑制不懈亦是法執如楞嚴所云縱令內守幽閒亦是法塵分別影事是也其病在一守字有所守便有所執矣何故如是見未徹底故今此人既徹見我人等相即是非相是能洞明一切相有即非有也有即非有故見如不見雖萬象紛紜而胸次泰然則不待抑制而彼自無何所用其守哉無所守則無所執是無法相也且不但法空而已我相即是非相可見其非於相外而別取空是亦無非法相也豈非并空亦空乎人空法空空空是為慧徹三空故此科標題曰不著空也此人真是大根器以其能一空到底不是枝枝節節用功的前又謂之四句俱離者何謂也如上科不著有此科不著空是明離有離無也而曰我人四相即是非相既曰即是可見此人并非將有無看成亦有亦無非有非無隔別不融乃是見到有即是無則其智慧已徹空有同時豈非四句俱離乎自性清淨心本離四句無相不相絶待圓融此人今既超乎四句不空而空空而不空圓融無礙便是契入實相性體矣故曰則為第一希有之菩薩也下科正結顯此義寅三結顯名諸佛何以故離一切諸相則名諸佛何以故者問我人四相即是非相何故稱為第一希有耶離一切諸相兩句釋明其故也諸相即是我人衆壽相不止一故曰諸也而又曰一切者因不但由身見而起我人等四相已也前云若取法相若取非法相即著我人衆生壽者可見凡有所取便成四相故曰一切也若約四句說之或執有或執無或執亦有無或執非有無執則便有能執所執能所便是對待對待便成彼我之相執既不一便成衆生相執情不斷便成壽者相故曰一切諸相也實相之性本是相不相俱離故若能離一切諸相便證法身故曰則名諸佛諸佛有二義一十方三世諸佛也二初住以上極果以前名分證覺亦名分證佛以能分證法身故初住至究竟覺共四十二位故名諸佛約初義言意謂十方三世諸佛皆因離一切諸相而得佛名此人已絶四句徹三空是離一切諸相矣雖未遽至究竟佛位而成菩薩無疑故但曰第一希有不曰最上第一希有約次義言自分證位初住菩薩以上以至究竟覺皆須離一切諸相以證法身此人能離一切諸相是已證得法身矣雖未知其所證深淺至少亦是初住菩薩而為分證佛亦即是信心清淨則生實相成就第一希有功德故曰則為第一希有也此中所說我相即是非相云云便是空有不二性相圓融亦即是上來世尊所說諸義之總匯何以故以離一切諸相則名諸佛正與生信文中所云若見諸相非相則見如來遙遙相應故足證此人能離一切諸相已見得如來性體豈非第一希有長老所陳見地確與世尊心心相印此之謂深解義趣故下文世尊即印定之前云此約當來勸三科與上約現前勸兩科其義互相發明者試觀前文但說一信字此中則云信解受持正以發明前雖但說信已攝有解與受持意在因信是道源功德之母故說一信字便貫到底也此中言無一切相又是發明前文信心清淨之所以然也而相即非相二邊不著空有圓融正是實相之真詮此中言則為第一希有則名諸佛亦即前文成就第一希有功德之意也此中言離上則言非正相呼應以相不相俱非故應離也前云生實相又云如來說名實相此中則云則名諸佛意亦一貫蓋現一分如來實相為分證佛圓滿顯現為究竟佛而前後皆曰名者又明所謂實相也諸佛也皆是假名即皆不可執故應一切非一切離耳由是觀之前後只是一義故說前文時應攝後義說之說後文時亦應攝前義說之而一約現前言一約當來言互相彰顯此又說法之善巧處如斯體例經中常常遇之壬次如來印闡分三癸初印可佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有印者印可長老之說闡者就長老所說更為闡明上來未盡之義也凡標佛告須菩提句鄭重之意因下文多補前義所未發故結經者特標此句令注意也如是如是重言之者印其言之極當若分配說即謂上來讚慶廣勸兩皆不謬長老前云若復有人句原未指明何時但以對次科之勸當來而言故判為約現前勸今世尊亦但云若復有人亦未剋指何時然於下文結成時卻歸到當來可知此語乃是通指現前乃至未來而言也驚者乍然愕怪怖者惶惑不安畏者怯退自阻天親論曰驚謂懼此經典非正道行故怖謂不能斷疑故畏謂由於驚怖不肯修學故智者疏曰初聞經不驚次思義不怖後修行不畏合論疏觀之則不驚即是信以初聞經時不懼其為非正道而驚是能信也不怖即是解以次而思義毫無疑惑而生怖是能解也不畏即是受持以不畏而自阻則肯修學是能受持也而變其詞者蓋有深意誠以著有之凡夫聞說相皆虛妄法執之二乘聞說法不應取一類偏空之輩聞說非法亦不應取必致驚怖怕談般若信解尚無遑論受持則何能同登覺路不阻化城乎故一一道破其不能信解受持之故令一切聞者當知法本無定佛不欺人何必驚怖疑畏庶幾得有信解受持之望耳故下文第一波羅蜜云云正明法無定相五語云云正明佛不欺人可見今說不驚不怖不畏者正為說下文張本而說下文之用意又正為斷衆生之驚怖疑畏前後語意緊相呼應也希有而曰甚亦即第一希有之意觀若復以下語氣亦是印可長老所說者上言如是如是已經印定而復說此數語者無他意在說出衆生不能信解受持者之病根以勸勉之耳癸次闡義分二子初闡明觀行離相義次闡明說法真實義子初又二丑初約般若明何以故須菩提如來說第一波羅蜜非第一波羅蜜是名第一波羅蜜何以故句統貫下文忍辱一科第一波羅蜜第一二字指般若言如來說者表其是約性而說也約性而說故曰第一非第一因性體空寂那有此第一波羅蜜之相故曰非也曰非者明其性本非相故不應著相也即復約性而說故曰是名第一波羅蜜因性體雖無相而亦無不相一切相皆緣性起此第一波羅蜜亦是緣性而起者不無第一之名相也故曰是名曰是名者明其相不離性仍應會歸於性也如此說法是此科經文之本義謂之本義者因本經中凡曰非曰是名皆是發明此義此乃根本義為學人所不可不明者也然而此科之義深極要極若但說此本義便非佛旨因此科以下皆是闡義謂之闡義者即是於本義之外更有所推闡而發明之義在也其義云何試思開口即曰何以故此三字是承上文不驚不怖不畏當知是人甚為希有而來可知第一波羅蜜三句正是說明不驚乃至希有之故者若只說本義而不將此中所以然之理發揮明白則何以故三字及上文不驚云云皆無著落上曰當知此正學人所當知萬不可不深解其故者不但此也上文不說信解受持而變其詞曰不驚不怖不畏者以末世衆生有怕談般若不能信解受持之病故也此中不說般若波羅蜜而變其詞曰第一波羅蜜者乃藉以闡發般若之精理俾一切衆生得以明了庶可恍然般若是不必怕不能怕的然後方算得是學無上菩提法之人方有轉凡成聖之希望故也何以故前不云乎一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出即是明白開示般若萬不可不信解受持且當從此入門若不入此經之門便是自與阿耨多羅三藐三菩提法隔絶亦復自與一切諸佛隔絶矣何以故諸佛及無上法既皆從此經出則欲學無上法欲轉凡成聖者若不從此經入豈非自絶其路乎豈是怕得的所以若但說本義但說前一層之義而不將如是之深義徹底發揮則世尊變詞而說之深旨便爾埋沒矣上文曰當知此尤學人所當知萬不能不深解其故者也如上種種道理皆包含在此三句經文之內其義之異常精深可想矣而其義之關係重要亦可知矣欲說明之必須巧設方便使之言少而義明須知般若義趣千古隱晦今欲除其怕病便不能不揭穿其致怕之由有時不能不涉及古人亦不能為賢者諱矣蓋不將隱晦之義趣徹底說明則驚疑怖畏之病根仍在便仍不能信解不肯受持豈不孤負佛恩乎深望諸君靜心諦聽若不將此中義趣徹底明了亦未免孤負佛恩也道理既如是精深雖今欲言少義明然幾句話亦萬說不明一口氣亦萬聽不明我今先就第一二字發揮一個大概讓聽衆心中先有一個底子然後再步步深入此亦方便之意也般若波羅蜜稱為第一波羅蜜者因般若為諸度之母故也般若為母則諸度為子子不能離母故修諸度行者若缺般若行約因則不能破惑約果則難證法身當知諸度皆稱波羅蜜者正因其有般若在內若無般若不能稱波羅蜜也何以故不能破惑便不能證法身而到彼岸故所以般若有第一波羅蜜之名者因此由是觀之既是諸度不能離般若則般若亦非離諸度而別有存在可知故第二句曰非第一波羅蜜此一非字是明不可執般若為別有其相也然而雖不別有非無第一之名故第三句又曰是名第一波羅蜜此是名二字是明諸度離般若不為波羅蜜則般若不無領袖之假名也以上是說明般若名為第一之所以然并說明約第一說非說是名之所以然此義須記牢乃破人驚疑怖畏之根據也此下便當說之上文長老以我人四相即是非相明是人之空有圓融以釋成其所以為第一希有世尊既已印許之矣然世尊每說一法非為一事非為一人遂因是人之希有而鑒及一切衆生所以有我相者無他取法故也故於印許之後復約六度等法闡明其義以開示一切有分別法執之衆生先說般若者正以衆生怕般若故也衆生何以怕以有分別法執不達般若之真實義故也所以為之闡明者因此蓋衆生驟聞般若是第一義空以為高而難行故驚又不明第一義空之所以然故怖覺得與其學般若不如學他種圓經圓法之妥故畏總由佛理未能貫通誤生分別法執耳此真自失善利深可憐憫故世尊說明是人甚為希有之故曰我何以謂是人甚為希有耶以此般若法門衆生驚疑怖畏而是人獨否故也夫此法誠高何怪其驚畏然而此法甚要又何可自阻我今將諸波羅蜜中稱為第一之般若更為大衆闡明其真實義俾得了然我說般若者為令衆生到彼岸耳不到彼岸便沈苦海而非般若又不能到彼岸可見此法極為重要斷不可疑畏自阻必須信解受持矣何謂彼岸諸法實相是也當知實相者無相也故般若雖稱第一而非第一何以故第一本無相故因其本無定相故說為非也說為非者是令衆生明了佛所說法無有一法能離般若則般若非可於諸度外而獨矜第一也又當知實相者亦無不相也故般若雖非第一而是名第一何以故第一不無假名故因其不無假有之名相故曰是名也說是名者是令衆生明了既法法不離般若是法法可名第一則般若之稱第一乃是假名也我今將般若精義如是闡明則一切衆生當可由此悟得凡我說非固是令人空相而又說是名以顯其不無假有之名相然則所謂空相者是令空其著相之病并非壞其相也大可恍然矣不壞其相是并偏執之空亦空之矣此之謂第一義空若能通達此義則知因相是假名故不可著非謂無相因法無有定故不可執非謂無法然則此法雖空豈同豁達頑空此法雖高亦非無下手處尚復何驚何怖何畏之有今則是人既能信解受持便是不驚不怖不畏便是通達第一義空正所謂於第一義心不驚動者非甚為希有乎以上所說不但說明上文不驚乃至希有之所以然并將一切衆生不必驚畏不可驚畏之道理亦一併徹底說明之矣庶幾此科義趣圓滿顯出然而尚有要義不能不說其義云何即前所云千古隱晦者是也當知怕般若之病深矣久矣若不一一揭穿其故何能除千古來先入為主之病尤當詳說般若義趣極其圓融與所謂中道第一義無二無別毫無可怕之處庶幾不致自失善利此雖推廣而言然仍是本科經旨意在破其分別法執以除怕談般若之病根耳經言二乘怖空即謂怖般若之第一義空也可見佛時已然不但後世矣然佛時只是二乘生怖大乘尚無此病逮後玄奘西渡得遇彼土相宗諸師乃將性宗之空與相宗之有對舉第一義空是絶對空何能與有對舉此點既誤故謂相宗方是了義所謂三時判教是也是彼時印土大乘中人已未能深解義趣誤認般若為偏空矣至於我國隋唐時之判教者亦從不列般若於圓教未嘗不知是第一義空然終以為專說空不如中道第一義之圓融古人如此而判者意在推崇其所宗不無故示抑揚然而抑揚太過未免取著文字相後人因是古人所判更加執著更加望而生畏故從來無人肯學般若肯談般若者真可悲也真可惜也禪宗雖宗般若然只宗其遣蕩意味以用功而不談教義所以般若義趣千古不彰陳隋時雖有三論宗然是宗論而非宗經三論所明固是般若而三論家既專在論的文字上研求遂於經中義趣不免隔膜何以故未曾直接觀照故質言之仍是不免取著三論之文字相耳所以三論家發揮論義甚精而經旨卻弗曾搔著癢處者因此當知般若既為諸度之母本經且明明云諸佛及無上正等覺法皆從此經出然則若於般若義趣未明雖讀其他圓融經論既未在根本義上用功其見地何能徹底見若未徹又何能圓今世尊就第一波羅蜜之名而闡其義使知般若義趣是空而不空不空而空極其圓融以免衆生驚怖疑畏坐失法寶難到彼岸無異預知後人怕怖之病根所在而懸示之者真大慈大悲也上來鄙人每說則非是名多約二邊不著說亦即是約圓融中道說此次則兼約第一義空說亦即是約遣蕩說如此說之實具苦心苦心云何使知中道之與遣蕩語雖不同義實無別也何以言之名為第一義空者因其一空到底故也一空到底者有亦空空亦空也換言之便是有亦遣空亦遣遣有所謂不著有也遣空非所謂不著空乎然則遣蕩之第一義空與二邊不著之圓融中道請問又有何別由是言之判教者之說不可執為定論也可以了然明白矣而怕談般若者亦大可以翻然悔悟矣且由是言之凡判某經為純圓某經為非純圓諸說亦未可執為定相何以故既法法皆般若則法法皆圓所謂圓人說法無法不圓何必苦苦分別前言遣蕩之與圓融中道無二無別凡誤認為有別者無他由其看呆中道故也我今更約中道發揮其義俾得徹底明了則分別之執庶幾無自而生乎一切法既皆假名則中道亦是假名以假名故則亦無有定相則亦不可著著則亦落四相尚得謂之圓融中道乎哉當知中之一言是因二邊相形而有者也若離二邊中無覓處所以中無定相相既無定豈可看呆看呆便成法執矣更當知中之所以無定相者因二邊亦是假名亦是相形而有亦本無定相故也二邊既不可著那得有中可著耶故真解中義者無往非中即空假而皆中也譬如就空言之空則不著有矣并空亦空便是不著空所以一空到底便歸中道如上所明是也以是之故般若與華嚴法華其義趣所以無別不但此也一假到底亦復如是譬如知一切法不無假名是不著空矣即復能知其名是假豈非不著有乎則亦宛然中道矣所以密宗淨土皆從有門入道而皆是圓頓大法者因此即以相宗言亦本是大乘圓義他不具論觀其發明遍計依他圓成三性之理何等圓妙無奈學之者不向此等處觀照用功專在瑣瑣名相上剖析愈剖析愈分別遂愈執著於是大者小圓者偏矣可謂不善學者矣不知用以去凡情反因而增長凡情豈佛說法相之本旨哉其修學密淨之人若不明自他不二心土不二之義趣則令大者變小圓者變偏也亦然由此可知佛所說法本來法法皆圓其有見以為非圓者實由衆生偏見非關於法故學佛者首須大開圓解觀照無往非中之理以修一切法則法法皆圓矣皆中道第一義矣皆第一波羅蜜矣即皆得證實相到彼岸矣此之謂圓中學人所萬不可不知者頃言大開圓解四字極當注意凡我所說無往非中云云不過可為聞者之一助耳必當時時以此圓義於自心上於一切法上微密觀照精進用功以去其偏執之凡情然後自己之圓解庶幾可開若非然者則所謂圓解仍是他人的而非自己的雖知無往非中而對於一切法必仍然觸途成滯不能無往非中矣此層極關緊要千萬勿忽不但此一義然所說諸義莫不皆然總之聞思修缺一不可又當知本經之說則非說是名是明性之與相非一非異雖圓融而行布雖行布而圓融也行布者如是如是之意即是一而二圓融則二而一矣上來說遣蕩即中道明其與法華義趣同今則明其與華嚴義趣同也何以故凡言則非是約性說約性而說則不應著相故非之應不著相而非之者是明性相非一也凡言是名是約相說約相而說則不應壞相故是之應不壞相而是之者是明性相非異也何以故性是體相是用迥然各別故非一所謂行布是也然而用從體生離體無用由此可知相乃性之作用耳明得此理而不著則見相便是見性故非異所謂圓融是也然則性相既然非一非異則是一而二二而一矣一而二故既應不壞又應不著因其雖非異而已非一故須於圓融中見行布又須於行布中得圓融也二而一故雖熾然現相而依然會歸於性因其雖非一而實非異當令圓融而不礙行布行布而不礙圓融也我今如是發揮則與華嚴義趣亦宛然無別宗華嚴者可以不必怕矣如前來所說遣蕩與中道無二若明其義則宗法華者亦可以不必怕矣本經中如云若見諸相非相則見如來應生清淨心應無所住而生其心以及實相二字并此中我相即是非相等等皆可以此義說之即如開經時說種種衆生說無餘涅槃亦圓融之行布也而又說實無衆生得滅度者則行布而圓融矣茲不過姑約則非是名以發揮之使宗華嚴者不必歧視耳如執定只有則非是名可明此義則又非也總之得其要而會其通則無說而不可即此可悟法無定相矣更有極要之義必須一說者既是遣蕩法門與圓融法門無二無別何以前云必須從此經入耶當知此二法門理雖無別而用功則大有利鈍所以當從此經入者以一切凡夫無不偏執病深必得極力遣蕩而後乃能圓融也否則偏執之凡情未去分毫便觀圓融經論何能領會那得受用至多不過學得一二教相作為清談之助而已試觀自唐以來禪宗以外諸大德其道德見地最令後人欽服者考其得力所在幾無一非經過禪門煅煉者正以禪門用功是宗般若空之又空極力遣蕩學人之偏執故也故吾常謂自唐以後中國佛法端賴禪宗者因此由是可知遣蕩功夫之要矣亦即般若三空之義趣不可不明矣但遣蕩時應深觀圓觀經中圓融義諦不然便不知何者為偏何者為執何者應遣甚或自以為是遣其實反增偏執此禪門所以雖不談教義而必須有嚴明師友時時為之痛下鉗錘也所謂痛下鉗錘者即是遣之又遣所謂百尺竿頭還須更進一步是也今既未逢嚴明師友只有自觀自照精密體會經中之明二邊不取性相圓融或說一空到底乃至愈說愈深如後半部之諸法一如一切皆是無聖無凡本來無生等等學人當審量自己程度之所堪由淺而深或拈一句或合數句以之觀照自心倘自己習氣以及起心動念於經中意旨少有未合便是偏著便即自棒自喝遣而去之此用功最妙之方實不慧經驗之談敢為諸君告其他圓融經教如喜研究無妨並觀然宜以般若為主何以故華嚴法華等是表詮表詮者用彰顯圓融之語以明性體是也故其辭句義味一一皆趨圓融即說遣蕩之法亦寓在圓融之中故必已有遣蕩功夫之人即是執見已薄之人方能徹底領會不然便只知其是說圓融而不知其是說遣蕩所以從此入手者往往學之多年而偏執之病依然雖或依據教相說得圓融而於本分上并無交涉況執情未化其所說者不過表面文章有時看似精深而細按之不清不醒或以為但是某經如此其他則否仍未見其真能圓融也而般若則是遮詮遮詮者用遣蕩偏執之語以明性體是也故其辭句義味一一皆趨遣蕩雖說圓融之理亦寓在遣蕩之內所以怕談般若者因此所以不將般若列入圓教者亦因此由其但看文字之一面故也即此一點便可證明未在般若中用功雖學其他圓經其見地仍是隔別而未能圓融矣以上所說般若與他種圓經立言之不同及學之者利鈍所關之微細處今為扶持正法計為人人得受用計故不辭反覆詳晰為諸君縷縷言之由是可知般若之妙矣必當先學矣何以故執情遣蕩得一分性相便圓融得一分遣蕩至極處亦即圓融至極處矣慧徹三空便是圓融中道妙哉妙哉足見般若不但是學佛的坦途且是學佛的徑路若不從此門入豈非不識途徑此所以學佛者多得自在者少也凡此所說是一個字一滴血皆從千辛萬苦中得來者也皆是摳出心肝以示人者也而此闡義諸經文是一個字一顆珠透圓透圓務當真切領會不可忽略頃言中國自唐以後佛法端賴禪宗不可誤會是勸人不念佛去參禪也蓋我之讚嘆禪宗處乃讚嘆般若處是勸人學般若非勸人參禪要知參禪當審時機機是機時是時非一事也所謂機者根機也故先當問自己能受棒喝否根器利鈍關係尚小非具有敢死隊精神毋庸談此又機者機緣也故又當問遇有良師否參禪不能離師師不但要明且要辣更要有殺活手段三者不備便非良師若其根機機緣兩皆具足參禪甚好苟缺其一而言參禪未見其益或反有害此亦我之實驗談也所謂時者如南北朝時北魏南梁無不大宏佛法講席極盛然不無取著文字相故達摩東來乃不立文字直指本心正對時病今則大都未明佛理正當廣勸讀經藥其空疏不立文字今猶非宜也故不如發起大悲大願修福持戒一心念佛親近釋迦彌陀兩位大善知識一面依我前說以此經義理觀照自心遣其凡情一面懇切持名求與衆生同生淨土滿菩提願現世修行無逾此法此是不慧近二十年勉力奉行者敬以供養諸善知識又我自開講以來所說修行方法多矣不可執著誰是最好宜擇其所善者行之或一一試行行之覺有效益者便是對機之最好者此亦用功之竅要也并為諸君告上來所說怕談般若之重大原因是由其既未明了經義又有先入為主之言遂致愈加怖畏愈不修學然此外尚有一重大原因亦不可不知者則以妄談般若者之多故也妄談之病古即有之於今尤烈此輩雖曾學佛而夙業甚重佛法又不明忽若發狂大破其戒不敬三寶縱意行惡實行其貪瞋癡自以為戒定慧且曰此般若之不著相也於是怕者引為口實更相戒不敢道般若一字幾有談虎色變之勢矣嗟乎因噎廢食何計之左耶須知既有妄談之怪狀更應發心修學發心宣揚然後般若之真義方得大明真實義明妄談之怪狀何自而生不知出此一味深閉固拒其病狀雖與妄談者異而病根則同蓋皆誤認為偏空者也以因果論妄談之罪誠重然除魔眷外人皆能知而遠之而怕談者人且奉以為準繩并不知其錯謬坐令超勝一切法而為佛法命脈所關之般若無人過問其誤法誤人之惡因恐其所招之惡果未必能輕幾許也我世尊洞知一切衆生之病故前言持戒修福者能生信心以此為實是對妄談者痛下針砭也而今此數科則又為怕談者痛下針砭觀前面所言是屏妄談者於門外也何以故信為入道之門既是持戒修福方為入門則妄談者破戒造罪其揮諸門外也決矣觀此數科所言又是警告怕談者決不能轉凡成聖也何以故不驚不怖不畏方許其為希有則怕談者之仍為凡愚也明矣而前云以此為實此中又為闡義則是明明開示欲除免妄談怕談之病唯有信解受持務求明了經中之真實義耳又怕者有恆言曰我豈不知般若之應學哉誠以末世衆生障深業重未易幾及不如不談免增罪過此又誤矣世尊不明明曰如來滅後後五百歲有持戒修福者能生信心以此為實乃至得無量福德乎故謂末世希有則可竟以為絶無其人且相戒塞路不但輕視衆生且顯違佛旨矣世尊戒長老莫作是說無異戒怕者莫作是說也以及此數科中佛與長老皆特特向後世鼓舞勸導是皆懸知怕者之過慮而開示之者真親切有味也又此中舉第一波羅蜜之名為言及說非與是名更有一義不可不明蓋以般若一名容易誤會是專就般若一度而言而第一之名本是顯其貫徹餘五度而立者就此明義則不可執著易得明了也且曰第一非第一則諸度總一般若非離諸度而別有般若之義更明其曰是名者既諸度莫非般若則第一之稱豈般若所得專有既非專有故雖是而為假名此明其不可執有也而因般若之第一遂令度度皆成第一故雖為假名而甚是此明其不可執無也總以明般若與諸度不能相離而已故此科既約般若闡義下科復約他度闡義也說法之善巧也如是如是明義之周密也如是如是此科經文中要義今再撮其最要者歸納為數句以便記憶曰此科最要之義是治怕般若者之病也其病有二一是怕空二是怕高今闡明般若非離餘五度而別有而餘度皆是行門可見般若雖明空義而空義不能離實行則般若之絶非偏空明矣復何必怕哉又闡明餘度離般若不為波羅蜜質言之即不能到彼岸可見般若誠高然而非學不可則般若之關係重要明矣又豈可怕哉警策之至謹記勿忘丑次約餘度明分二寅初正明須菩提忍辱波羅蜜如來說非忍辱波羅蜜餘度者除般若外其餘之布施持戒忍辱精進禪定五度也法法皆應離相則法法不能離般若今於餘五度中獨舉忍辱為言者以忍辱最難離相其不能離般若更易領會故特舉此度闡明其義以概其他故標科不標忍辱而標餘度正以佛之說此意在令衆生舉一隅而以三隅反也如是標判乃遵佛所說依義不依文也上約般若明是從正面闡明離相之真實義蓋人但知般若是談空離相著相者因而生怖今闡明并般若之相亦當離則是并空亦離也且般若即在餘五度之內不能獨存而餘五度皆是實行之法則所謂離相者乃是法相非法相一齊離也若明此義則儘可放膽修學般若矣何必怕哉此約忍辱明是從反面闡明不可不離相之真實義觀下文所說若行忍辱法而不離忍辱相便生瞋恨瞋恨正與忍辱相反是闡明行忍辱法者若不學般若便不知離忍辱法相不離法相則瞋恨生瞋恨一生則忍辱之功行破矣便成非法相矣從此可悟所以必令離法相者正是令離非法相耳妙極妙極若明此義則定要用心修學般若矣不能怕矣如此闡發般若之精義徹底呈露則般若斷斷不可不學更可恍然矣此闡義數科經文將般若之理及應學般若之理闡發得精極圓極透極亦復細極務宜靜心領會領會得一分便得一分受用且此數科正上來所說諸義之結晶此處之義若能洞明則上來諸義便一一雪亮於胸中矣上科之後接說此科更有一意意在以忍辱之不能離般若證成上科般若非離餘度別有之義也蓋餘度既皆須有般若可見般若是與餘度共行之法非別行之法也總之般若為諸度母是諸度乃般若子若無子則無母可名若無母亦無子可名母子實互相助成故般若與餘度必須互相助成豈可離乎般若空也餘度有也今說般若與餘五度不能離者是令學人體會空有本同時也故不能離也空有同時所以當二邊不著會歸中道也尤有進者以母子論固應互相助成然而子實從母而生無母便無子故互助之中仍應以母為主六度亦然餘五度無般若不為波羅蜜故餘五波羅蜜實從第一波羅蜜而生故於互助之中亦仍以般若為主也以般若為主者以空為主也以空為主所以雖不應壞有仍不應著有也所以雖會歸中道而中亦不著也此佛菩薩所以以大空三昧為究竟以無智無得為得阿耨多羅三藐三菩提也蓋必能如此然後可以隨形六道現百千億化身雖一切法熾然而生而一心湛然本無所生此之謂大自在此之謂大受用能度一切苦厄者端賴乎此此是般若究竟義下半部正明此義今乘便略露消息者以示般若是佛法中的徹始徹終之義非學此不能入門且非學此不能究竟奈何怕之耶且由此可知若專談二邊不著圓融中道尚非佛法之究竟義也何以故非空之又空必有所著不著邊必著中尚何圓融之有況大空三昧中并圓融二字亦不可得也當知必不可得乃得圓融也何以故不著圓融乃得圓融絲毫有相便不圓而不融矣然則般若之義究竟如此豈止入道之初門奈何判為大乘始教乎而般若貫通諸度諸度離之非波羅蜜可見有一法離乎此者便不能圓滿則是般若之義圓滿之極超過一切法門亦可知矣奈何不許其純圓而判為別兼圓乎上言六度互助尤有要義不可不知蓋般若者理也智也所謂觀門也諸度者事也境也所謂行門也於說第一波羅蜜後更說餘度者所以明理事從來不離觀行要當並進而境智尤須雙冥之義也故據文似乎別起考義實為一貫本經文相大都如是所謂文不接而義接若視為各不相涉則大謬矣流通本有是名忍辱波羅蜜一句此是明清間人所加見乾嘉時孫氏刻本其注語云古無此句然據理應有殊不知此處但說非者正為下文闡明忍辱若不離相忍辱法門便破壞無存作張本以顯必不能離般若之義若忽加一是名句橫梗其間下文何以故句如何接得上故著此一句上下文氣便一齊鬆懈反將經中旨趣一齊隱晦自云據理應有不解所據何理也真無知妄作也當知佛所說法豈可濫自增減膽何其大即令流傳有誤亦必須確有考證且所考證者更要義意實是完美精當方可據以校正豈可明知為古本所無而任意加之乎凡欲刻印經書作功德者不可不知此理若此人所作不但無功德其罪過甚大因自憑私臆擅改佛說誤法誤人故也此事可為千古炯戒故不憚剴切言之梵語羼提其義則為安忍亦曰忍辱安忍是總名忍辱是別名忍者忍可謂一心正受也安者安住謂其心不動也辱者毀辱即虐待之意今先說總名之義則別義自見人必能忍而後其心安住不動若為所動便不成忍故一言及忍便含有安住不動之意在學道人在在處處時時刻刻皆應心安不動故無論行何事遇何境修何法皆應一心正受約出世法言凡修一種法而能正受安住即名為忍如修諸法本不生觀而得妄念不起是其心已正受此法而安住不動矣故名之曰無生法忍亦名證無生或悟無生證字是形容其忍可悟字是形容其心安理得也約世間法言亦然如曰富貴不能淫威武不能屈貧賤不能移此即古人所謂堅忍威武不屈非謂頑強對抗乃是身可殺志不可奪之意志不可奪便是心安不動此即所謂忍辱也此與富貴不淫貧賤不移皆是表其心安於正不為所動也故曰堅忍由是觀之可知安忍是統括一切之名所謂無論行何事遇何境修何法皆當正受安住是也而忍辱則安忍中之一事耳故曰安忍是總忍辱是別要知凡舉忍辱為言是意在以偏概全以別明總何以故世間最難忍者莫過無端受辱此尚須忍其他可知故經論中或用總名或用別名殊不一律大約玄奘義淨兩法師所譯皆曰安忍他人譯者多用忍辱每校每舊版無原稿有有人疑是兩法或議其優劣實則總別雖若不同而用以顯明正受安住之義則無不同正不必於此等處分別優劣茲乘便詳釋兩名之義以便貫通經文不曰忍辱而曰忍辱波羅蜜便是顯示忍辱時能行般若何以故若無般若不稱波羅蜜故而能行般若便是能照性而離相故曰如來說非忍辱波羅蜜也何故應離相下文正釋其義寅次引證分二卯初引本劫事何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨何以故者自己設問忍辱應離相之故也引事實者欲以證明忍辱必應離相也歌利王事即在本劫本劫名為賢劫以有千佛出世一切賢聖甚多故得此名劫字有兩義一謂極長時間二謂劫難今是初義所謂本劫者指大劫言每一大劫分為四中劫名成住壞空世界之有成住壞空猶衆生之有生老病死也每一中劫又分為二十小劫每一小劫中衆生壽命極短之時大多數只有十歲此時衆生惡極生活苦極養生之物幾皆不生所生者皆害命之物是皆惡業所感也故此衆生之數亦復少極經言彼時南贍部洲人數共不過一萬而已苦極思善漸漸回頭壽命亦漸漸增長然增長甚不易以其回頭向善並非猛晉乃是漸漸趨向為善之途耳大約經過百年始增一歲由是逐漸增長至普通壽命有二十歲時已經過千年之久矣衆生見為善之能得善報也於是為善者日多養生之物亦漸繁殖人數亦漸漸加多每百年增一歲每百年增一歲增至普通壽命有八萬四千歲時增至極處矣亦快樂至極處矣樂極又復生悲因善心漸減故於是每百年減一歲每百年減一歲減至十歲減至極處矣又復回頭向善而增則入第二小劫矣而其一增一減仍復如是校如是舊版無原稿有循環劫劫皆如是照每百年增一歲從十歲增至八萬四千歲又每百年減一歲減至十歲依此推算每一小劫之時間為一千六百七十九萬八千年八十小劫為一大劫則一大劫之時間為十三萬四千二百八十四萬年然驟視之雖曰十三萬萬餘年其實成劫時世界尚未完成壞劫時世界已漸漸壞其時世上縱有衆生其苦可知至空劫時尚無此世界安有衆生經言世界逢壞劫時佛以神力移此世衆生於他方世界中也僅僅一個住劫是完整之世界然又除去減劫之一半其壽命增長衆生安樂之時間不過住劫中之增劫一萬六千七百九十八萬餘年耳縱令高壽八萬四千歲終不免生老病死之苦細思此世有何可戀故今乘便將此世狀態詳細一說大衆速速覺悟為妙我世尊降生在住劫中之第九減劫其時壽命普通為百歲至七八十歲屈指至今將三千年矣故今時壽命七十為最高四十五十最普通此報紙上所常見者也照經上所說每百年減一歲計之與事實實不相遠足徵佛語非虛間有過百歲者稀少已極此必有特別善因方能致此乃是例外往後將更減矣生活將更苦矣故生當此際者惟有勸導大衆同歸佛法果能有大多數人持戒修福世界立見太平能種善因必得善果雖在減劫未嘗不可獲睹例外之盛佛言一切唯心造又言一切法莫非幻相故壽命之或多或少世事之或治或亂雖有定數實則定而不定事在人為而已更當普勸發大悲心一心念佛求生淨土得一個究竟則世出世間皆有一個辦法矣報佛恩在此救一切苦在此滿菩提願亦在此願與諸君共勉之昔者往昔明其為夙世之事也其時世尊正現菩薩身行菩薩道為者被也歌利梵語經中或曰迦羅富或曰迦陵伽或曰羯利皆是此人譯義則為惡王猶中國之稱昏君也歌利時為南天竺富單那城之王為人暴虐好行慘毒之事故得此惡名彼時菩薩為衆生故在山坐禪一日王率采女野外遊覽倦而少憩諸女采花因至坐禪之所菩薩為欲斷彼貪欲而為說法王忽仗劍尋至怒責曰何將幻術誘我諸女菩薩曰我持淨戒久無染心王曰汝得阿羅漢果耶曰不得曰汝得不還果耶曰不得曰汝今年少既未得果則具有貪欲云何觀我女人答曰雖未斷貪欲結然心實無貪曰仙人服氣食果者見色尚貪況汝盛年答曰見色不貪不由服氣食果皆由繫念無常不淨曰輕他誹謗云何得名持戒答曰有妬為謗無妬非謗王曰云何名戒曰忍名為戒由此可知非一心安住於戒不名持戒矣王即以劍斷其手足耳鼻曰忍否答曰假使大王分我殘質猶如微塵我終能忍不起瞋念羣臣爭諫王怒不息時四天王雨金剛砂王見恐怖長跪懺謝菩薩發願若我實無瞋念令我此身平復如故作是誓已身即還復更發願言我於來世先度大王是故我今成佛先度憍陳如蓋此王乃憍陳如之前身也此事見大涅槃經毗婆沙論而詳略不同今會而引之本經所云割截身體正指劍斷耳鼻手足言也前言若取法相即著我人衆生壽者則今言無我相云云即是顯其不著忍辱法相也不曰無忍辱相而曰無我人等相者因無我人等相方能不著忍辱相以明分別我人是取相之病根也無我人等分別便是心安不動乃能任其割截忍此奇辱故曰我於爾時無我相無人相無衆生相無壽者相爾時猶言彼時即昔被割截之時也當知忍此奇辱他人見之云然耳菩薩爾時若無事然無所謂辱不辱忍不忍此之謂忍辱非忍辱見到忍辱非忍辱正是般若正智故能內不見能忍而無我相外不見所辱而無人相菩薩坐禪本期證道以度衆生今則任人割截是并此事而忘懷置生死於度外矣故曰無衆生相無壽者相此因菩薩具有般若正智則通達一真法界一真法界中那有人我生佛生死等一切對待之相故爾四相皆無四相皆無則萬念俱寂何所謂辱何所謂忍乎夫而後方能忍此奇辱也知此則知一切行門非仗般若不能成就矣知此則知一切修行人非仗般若不能無罣礙不能得自在不能到彼岸矣故曰一切諸佛及無上正等覺法皆從此經出也故曰隨說之處一切天人皆應供養經所在處即為有佛若尊重弟子也故凡聞而信解受持為他人說乃至一四句偈等皆得成就希有得無量福德也世間之人縱令未能人人如是成就但能人我分別之見少少輕減則鬬爭亦必減少世界當下太平安居樂業矣所以般若是佛教的真精神是無上法寶一切衆生皆應頂戴恭敬讀誦受持不可須臾離者第二何以故是問何故應離四相節節猶言段段支者支離解者解剖皆分析之意段段分析即指手足耳鼻一一被其割截而言應生瞋恨反顯其不能忍試思爾時無故受此奇辱若非毫無人我等分別萬念俱空焉有不生瞋恨之理或曰彼時發願平復便能平復如故必有神通故能忍受苦痛耳豈凡夫所能為此說大謬不然乃是邪見不可不辨當知縱得神通能受苦痛假使瞋心一起亦必不能忍受矣何以故神通與瞋心無涉故雖具足貪瞋癡如邪魔者亦能得通故所以佛法不重神通者因此佛菩薩雖亦有時顯現神通乃用以表法或藉以感化頑強障蔽之衆生不得已而偶一行之修行時並不注重乎此且本經引此故事意在明無上菩提以大慈大悲為根本則必須離人我等分別之相使其心一念不生安住不動然後乃得恩怨平等成就大慈悲定此定成已然後乃得雖遇極大之逆境惡緣不生瞋恨瞋恨毫無然後乃得普度衆生滿菩提願也何以故衆生剛強難度故故菩薩之修忍行意在於此豈但有神通力者所能夢見不然如下文所云一日三時以恆沙身命布施此人具有絶大神通可知矣此人不懼苦難亦極難能矣然而不如聞此經典信心不逆者何耶正明其若不信解受持般若法門分別心必不能遣淨分別心未淨便是未達一真法界證空寂之性體則決不能成就無緣大慈同體大悲縱能捨無量無邊數身命仍為有漏仍防遇緣而退何以故未達一真而空寂便是無明未斷則其信根尚未成就故然則有神通力者縱能忍辱其與菩薩之所以能忍辱者根本上完全不同豈可相提並論故此下更引多生之事以證忍辱之非易非久久修學般若得大空三昧正恐忽遇極大逆境惡緣瞋心少動盡棄前功所以持說此經其福過彼捨恆沙身命者其理在此總以明不修般若法門不能離一切相契第一義空終不能成就大慈大悲之菩薩耳如是知者乃為正知如是見者乃為正見至於發願平復便得平復如故則有三義一層深進一層一佛加被故所以有願必滿者因此二大慈悲故所以蒙佛加被者因此試觀割截之後乃發願來世成佛先度大王可見所以無一絲瞋恨者由其已得大慈悲定耳定云何得無分別心故也三心清淨故所以無分別心得慈悲定者因此蓋修學般若觀照一真法界無相不相功行深醇一心清淨心清淨故法界清淨此時悲願之力偉大無邊有願即成謂之諸佛加被也可謂之唯心所現也可何以故已證心佛衆生三無差別故如曰神通此正佛門大神通所謂漏盡通是也豈彼有漏之通所可同日語哉前段即第一句何以故下云云是明離相乃能成就所修之法即是離法相正所以成法相後段第二句何以故下云云是明不離相適足破壞所修之法即是不離法相反令其成非法相前段是正明後段是反顯合反正之義觀之豈非離法相正是離非法相乎簡單言之便是離相乃不墮空不離相反而墮空闡明此義正是向怕者當頭一棒因怕者無非懷疑離相必墮空耳今乃知適得其反如此破斥鋒利無比而般若離相之義闡發至此亦毫無遺蘊矣然非世尊如是善巧以發明之誰能洞曉此義若未洞曉則於離相義終未徹底將終不免有發生疑問時則彼聞經便能不驚不怖不畏之人其必深解此義矣真甚為希有也由是觀之上文雖但說非忍辱波羅蜜即含有是名忍辱波羅蜜之意在內可見佛之說法說在此面意透彼面面面俱圓也又可悟得凡則非是名雙舉之處語雖平列意實側重則非邊此義換言以明之更可了然前不云乎則非是約性說是名是約相說然而性是本相是末有本方有末因空乃現有故知當側重則非邊也故離法相正是離非法相也此即前言佛法以般若為主者以空為主之意何以故性體本空寂故此佛菩薩所以以大空三昧為究竟也所以無智無得而得阿耨多羅三藐三菩提雖得阿耨多羅三藐三菩提而仍無智亦無得也何以故少有所得是仍未得故佛言應生瞋恨不但為闡明上來所說之義已也尚有要義不可不明當知瞋恨為修行人之大忌世尊為欲警戒發菩提心者無論在何時遇何境修何法皆斷斷不可生瞋姑就忍辱以說明之耳其就忍辱說者因忍辱極易生瞋以及瞋心一生忍行便破此等事理人所易曉之故就易曉者說以為例俾得會通一切此佛之微意也不可誤會但是忍辱不可生瞋其他便無妨也何謂瞋恨為修行之大忌耶因瞋恨正與菩提衝突故也菩提者覺也平等也慈悲也而瞋恨之生由於事之不如己意便是著我尚何平等之有世事莫非夢幻如意不如意何必認真此而不知尚何覺悟之有其違反慈悲更不待言故瞋心一起菩提種子便完全銷滅修行人忘失菩提輕則懈怠廢弛重則道心全退縱令未退然以瞋心行之決不能成正果佛言忘失菩提心而修諸善魔所攝持普賢菩薩說菩薩過失莫甚於瞋心者以前所積功德雖多如森林瞋火若生一齊燒盡皆見華嚴經可不懼哉可不懼哉當知貪瞋癡三毒癡為毒根癡即無明也因無明故起貪瞋而貪瞋二毒瞋毒之為禍尤巨何以故其性暴烈不發則已發則雖盡反以前所為亦不暇顧及故修行人當痛戒之佛說此經為開衆生正智治癡也開經便說布施治貪也而瞋猶未言故特於此補發之前曰行布施應無住法今曰生瞋恨由有四相皆所以顯明非開般若正智藥其著相之癡貪瞋無由可除也應生者勢所必至之意一著相勢必生瞋一生瞋勢必所修盡破然則修行人非學般若令其在在處處時時刻刻心如虛空不可矣此佛說此科之本旨也豈第忍辱應然哉當知世間萬事莫非對待如因果人我男女陰陽生死治亂乃至染淨盛衰苦樂等等無一事出對待外者因對待故極易生起分別計較俗眼既認一切對待者為實事分別計較遂致牢不可破此所以有貪瞋也若能於對待中看出消長盈虛的道理為之消息而通變之以治理一切世事不能不服其為世間聖人然雖能利用對待終不能跳出對待的圈兒之外佛法則不然既一切莫非對待便於此中看破其莫非彼此相形而有既皆相形之事則是一切虛幻不實有即非有矣然而不無虛幻顯現非有而有也故既超乎其表而不為所拘仍復隨順其中而不廢其事超乎其表是為不著不如是不能證絶對之性體此大智也隨順其中是為不壞不如是不能救輪回之衆生此大悲也一切大乘經典皆說如是道理而般若說之尤詳金剛般若說之尤精學佛人能見及此者曰開道眼道眼若開急當養其道心云何養耶當令心如虛空超然塵表如虛空者不住相是也經言施不住相福如虛空其意正令離相俾心如虛空耳必須生空法空而後心空生空者非謂無我人衆生也但不著其相法空者非謂無法應行之法仍一一如法而行但行若無事行施而忘其為施行忍而忘其為忍乃至行六波羅蜜忘其為六波羅蜜曰如無事曰忘謂不著能行所行之相也是即我法雙空并空亦空初學固不易幾及然不可畏難須時時體會此義令其心空空洞洞是為要著超然塵表者不與塵世上一切對待之事理廝混心中常存一擺脫之意勿令間斷是為要著當知能不廝混乃能漸漸心空也復於此際提起一句萬德洪名一心而念亦不分別誰是念誰是佛但令念即是佛佛外無念此心本已令如虛空則此即佛之念亦復彌滿虛空而上與十方如來下與法界衆生息息相通矣如此謂之有念可謂之無念可謂之佛即念念即佛也可謂佛與衆生在此心也可謂此心與佛以及衆生無異無相也可更多多讀誦金剛般若波羅蜜以熏習而長養之令其道眼日益開道心日益固是為般若淨土同修之法此法與一真法界相應與實相相應與空有不著性相圓融相應與第一義空相應與心淨土淨之義亦復相應諸君試之當有受用處蓋此是隨順對待之因果法而修絶待殊勝之因可證絶待殊勝之果也經中上來說無我人四相處甚多然皆是約正面說即是約得益說其約反面受害說者止有開經時所說若有我相人相衆生相壽者相即非菩薩然是言其當然今曰應生瞋恨則說其所以然矣何以故若生瞋恨便非菩提心亦即非覺是依然迷途凡夫也故曰即非菩薩由此可知欲出迷途生淨土者亦安可不於我法雙空加之意哉因無論著我相或著法相少有分別計較便是住塵生心心有塵染那得清淨淨心未能淨土不生也慎勿曰淨土法門不必高談般若也佛之言說固是圓妙應作面面觀而佛所說之法亦無不圓妙亦應作面面觀也蓋佛所說之法無不一法含攝多法所以多法復能歸趣一法此華嚴所以明一即一切一切即一之義也故本經曰無有定法故不可執如前言布施統攝六度須知忍辱亦統攝六度也如曰忍名為戒是忍度即戒度矣聽其割截與結來世度之之緣是以忍辱為布施也瞋恨不生而忍可便是禪定何以故忍可不動豈非定乎定故不起瞋也而下文曰五百世忍辱則精進也無我人等相之為般若更不待言故舉忍度攝餘度盡推之諸度度度皆然故本經雖未明言精進禪定實已攝在布施忍辱中矣當知戒進定三度離捨忍兩度便難成就何以故戒之能持由於忍可於戒捨去染緣定之成就亦由捨昏散而正受不動且若不能捨不能忍尚何精進之可言故施忍兩度實一切行門之主要此本經所以但舉布施忍辱為言也又布施所謂捨也若著相則必不肯捨猶之著相者必不能忍其非學般若不可甚為明顯故本經但約此兩度以明離相也此兩度既為行門之主要若此兩度能離相其餘行門自然能不著矣先言布施後言忍辱亦具深意蓋捨有遣執之功破我之能最與般若密切前云持戒修福者能生信心以此為實亦是令學般若者首當學捨蓋持戒便是捨一切染緣捨向來惡習修福便應施捨先令學此捨行以遣執破我乃能增長般若種子此其所以於此章句能生信心以此為實也此布施所以應先言也而持戒戒學也能生信心以此為實慧學也以文相論是已具戒慧二學矣而定猶未言定功惟忍方成故於正明成就希有時就忍度以示意使知欲成菩薩戒定慧三學必當完全具足然而必能離相方能成忍此所以忍說在後也由此可知所謂六度者約事相分說雖有六種而義則互相助成關係密切用功時必須一貫何以言之戒為修行之基者以其作用能捨舊染之污也捨即布施義也持戒之義便是心能於戒忍可安住故曰忍名為戒而忍可安住便是心定不動必其一心忍可於所觀之法而後慧生故曰定生慧然亦必具有遣執破我之慧乃得成就安住不動之定也蓋般若為諸度母一切行門皆由觀慧而生故定亦不能外是理也定慧蓋互相生起者耳若於般若布施持戒忍辱禪定一一不懈不退是為精進何以能不懈不退即是於法一心正受安住不動也亦即是於法隨得隨捨絶不著相自滿也可見法法互生互攝苟缺其一六皆不成行人不可不明此理一切行門中捨忍二度固為主要而捨尤為主要中之主要何以知其然耶試觀本經說忍只一二處此處及最後言得成於忍句而說布施最多其義云何以捨能遣執破我則最能消業除障最能彰顯般若正智故也由此可知佛法如海中捨是先鋒如最初須持戒修福以學捨是亦為後徑如最後并無上菩提亦不住是且修忍亦非捨不成任其割截非捨而何不但此也法與非法不取便是一切皆捨捨之罄盡則如如而不動矣得成於忍矣當如是知也卯次引多生事須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相過去通指歌利王以前之時佛經中所云仙人是通指一切修行人而言并非專指外道故佛亦譯稱金仙前云凡舉忍辱為言意在以別明總故除指明有毀辱事實者皆當作安忍義會如此科所說忍辱非必定謂五百世皆如歌利王之事也且世尊行菩薩道時布施身命不可數計豈止五百世茲不過略言之耳如為一句半偈之法捨命亡軀或燒身以供佛或剜身以燃燈以及割股救鴿捐身飼虎等等無非上為佛法下為衆生今云五百世作忍辱仙人意在顯明多生多世布施生命皆行所無事其心安忍而不動也爾所者如許之意指五百世言如許世能安忍者由於如許世修般若離相法門故曰於爾所世無我相云云引多生事意在證明上來遇歌利王事之能安忍由於久修般若使發菩提心行菩薩道者得所遵依也總而言之觀門之般若行門之捨忍為學道要門何以故衆生之為衆生因有貪瞋癡三毒而般若治癡也捨則治貪忍則治瞋惟三毒之病根甚深非多多修捨貪何能破非久久修忍瞋豈能除然而若非精修般若具足三空之智以去其著相分別之愚癡則捨忍亦終不能成而戒進定三度亦有名而無實矣故金剛般若獨舉捨忍以明離相使知著相便是三毒故當離相捨忍以拔除之若三毒拔則戒定慧三學全而法報應三身亦可顯矣然則般若布施忍辱三波羅蜜其六度萬行之主腦哉行人當知所先務也上來第一波羅蜜一科是說離法相即并離非法相此闡明雖空而實不空之義也忍辱一科是說離法相正是離非法相此闡明因空以成不空亦即不空而空之義也由此可悟經中凡言非者正以成其是凡言是者適以形其非故曰無有定法所以於法應無所住當知一切世間法出世間法莫不如是空而不空不空而空也所以一一宛然而有時實一一當下即空而一一當下即空時正一一宛然而有此之謂空有同時故一一法皆不可執為實無亦不可執為實有故曰凡所有相皆是虛妄何以故莫非虛妄非實有也不無虛妄非實無也所以法與非法皆不可說皆不可取其有所取著者非他由其心中有人我等對待分別之相耳故曰若心取相即為著我人衆生壽者而心有分別便是無明便違平等一真法界故發菩提心者應無所住焉然則上兩科闡明空而不空不空而空之義無異為以前所說諸義作一匯總之說明已將無住真詮發揮透徹矣故此下即乘勢作一總結而申明之曰以前所有言說所有法門莫非真實不誑不異何以故因真如實相本是空而不空不空而空故其顯現之一切法亦莫不如是而如來所說之法即是根據此理而說故曰真實故曰不誑不異也故修行者之於一切法皆應如是體會觀照而一無所住方能不違本性而得心清淨生實相焉倘不能如是體會觀照則無明不破故曰如人入暗倘能如是體會觀照必破無明故曰日光遍照以示一切衆生於此金剛般若不可不信解受持也茲將次科之所以生起及次科之要義先說一概略則臨文較易領會矣子次闡明說法真實義分三丑初總結前文次正明真實三重以喻明丑初又二寅初結成無住發心次結成無住布施寅初又三卯初標結是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心觀上來概略中所說可知總科標題中之說法是兩件事說者言說也法者法門也是故者承上起下之辭離一切相即上文長老所說離一切諸相所有我人有無以及法與非法等等對待之相無不皆離故曰一切應者決定之辭明其非離盡不可也前長老言離一切相則名諸佛是明離相乃得大有成就是約證果說也此長老所以深解義之所趣也世尊印許之後接說第一波羅蜜及忍辱兩科是明應離一切相以修六度是約修因說此科即承其義而結歸到應離一切相而發心則更進一步矣蓋修六度是成就之因而發心又是起修之因也是說到本源上矣無論果位修功因心而離相則始終一貫故長老既深解其歸趣世尊更闡明其由起使知既離諸相方名諸佛是故應離相以進修應離相以發心則般若為貫徹始終之法門離相是轉凡成聖之途徑當可洞明矣本科之結前義不止如上所云但結前來數科已也當知應離一切相發菩提心兩句直是為經初所言發菩提心應如是住如是降伏其心諸義點睛何以故應離一切相發心所以應降伏其住相之心也不但此也且將經初答語中所有一切衆生之類云云之義一併結成何以故度無邊衆生令入無餘涅槃者發阿耨多羅三藐三菩提心也實無衆生得滅度者應離一切相也意若曰前答所云令度無度相者因必應離一切相然後所發者方為菩提心耳何以故未能離相決不能度盡衆生亦決不能令入無餘涅槃則所發者便成虛願此前所以又云若有我人等相即非菩薩也故此中不曰發菩提心應離一切相而曰應離一切相發菩提心意甚警策前不云乎菩提者覺也平等也慈悲也若其著相則其心便非覺非平等非無緣慈非同體悲雖曰發心其所發者尚得謂之菩提心乎故決定應離一切相然後乃為發菩提心也下文不應住色聲香味觸法生心應生無所住心三句是釋成此中應離一切相之義對彼而言則此中所云亦是標舉之詞故科目曰標結標者明其起下結者明其承上也卯次釋成不應住色生心不應住聲香味觸法生心應生無所住心此科是釋成上文應離一切相然不作別說即引前約因正顯中發無住心之文略變其辭而說之者此佛之說法所以玲瓏剔透面面俱圓也蓋如此而說不但可以釋明上科之義兼可闡明發無住心一科之義以免聞前說者諦理不融即藉以回映前文作一結束善巧極矣生者生起之意發菩提心者心固不應馳散亦不應沈沒若其沉沒則六度萬行從何起修故特特說一生字以示意此科之意若曰頃言應離一切相發菩提心應離何等相耶相應云何離耶無他既是發起平等慈悲之覺心則心生起時便當擺脫色聲等等對待之塵境而不應住著則一切相皆離矣但應生起於所有對待的塵境一無所住之心然後所發者乃是阿耨多羅三藐三菩提心也前文云應無所住而生其心是分而說之以顯空有二邊不著之義今文云應生無所住心則合而說之矣略變其詞義則更精更透迥不同前蓋慮聞前說者若將無住生心打成兩橛必致或執無住而墮空或執生心而滯有矣即不如是但令於無住生心未能圓融則空有二邊不能雙冥縱能二邊不著合乎中道而中邊之相儼然存在如此則雖不著邊卻仍執中既有所執便是分別仍落四相矣故今為之融成一片曰前云應無住而生心者初非二事乃是應生無所住心耳此意是明生心時即是無住時無住時即是生心時如此則有即是空空即是有空有同時并具矣若能空有同時則既無所謂空有便無所謂邊亦無所謂中而實在在處處無一非中所謂圓中是也至於圓中則我法雙空四句俱遣乃無相之極致方為發離一切相之無上菩提心初發心人豈能如此正因其不能如此故曰應謂應如是知應如是學也前約因正顯中發無住心一科本是開經以後所說諸義之結穴今此一科既是結成前文無住發心之義更加以下科結成前文無住布施之義則其為開經以來諸義之總結穴可知矣故標科曰總結前文前發無住心文中諸菩薩摩訶薩即指發菩提心者清淨即謂離一切相當知清淨心即是本性所謂本來面目是也乃是十法界所共具者故又名一真法界但六凡衆生之清淨心久為分別人我等等對待之相所障故不能顯現若相離得一分則清淨心便顯現一分前所云信心清淨則生實相是也實相亦本性之別名也分分離時名為分證覺最初離得一分時便是分證覺之第一位名為初住菩薩是為轉凡成聖之第一步亦名正定聚正定者住義也聚者類義也言其已入聖果之類永不退轉阿耨多羅三藐三菩提故名正定聚也至此地位方稱信根成就因其信根成就故得不退因其初成不退之聖果故名初住由是歷盡四十一位斷最後一分無明則一切相方能離盡清淨心乃圓滿現前是名究竟覺亦名妙覺亦稱曰佛可見由凡夫至究竟覺其功行唯一離相而已云何能離依文字般若起觀照般若而已世尊惟恐學人於上來所說文字般若未能深解則從何觀照故說至此處更為融通前義以便觀照用功耳諸君當知吾輩既受持此經必應將佛所說義趣徹底領會令心中了了洞明然後修一切法時遇一切境時乃能運用以歷事而練心也尤應於行住坐臥時穿衣吃飯時迎賓送客時時時處處常將所領會的義趣存養心中優游涵詠勿令間斷務將經義與此心融成一片即此便是熏習便是觀照不必定要打坐觀照也如此用功便能使無明漸減漸薄便有增長菩提之功遣執破我之能且必須如此存養有素然後運用時才湊泊得上此即前所謂養道心也如此培養其道眼亦更得增明矣此是最親切有味的修行方法毫不費力費事而能得大受用千萬勿忽前文今文若聯接說之其義更明今再將前後文聯成一貫為諸君說說以便徹底領會曰發阿耨多羅三藐三菩提者應令本具之自性清淨心現前云何得現即是此心不應現起六塵境界應不住塵境顯現其心庶幾漸得清淨由此可知所云清淨非謂沈空滯寂令心不起但應離一切相耳離何等相即是不應於有分別對待的六塵境相上住著生心且不但應離境界相并應離無住生心分為二事之相而生無所住心何謂生無所住心唐永嘉元覺禪師有一頌正好移作注解頌曰恰恰用心時恰恰無心用無心恰恰用常用恰恰無第一句生心也有也照也第二句無所住也空也遮也合而觀之便是生無所住心亦即是空有相即遮照同時第三句即無住而生心也所謂即遮而照即空而有第四句即生心而無住也所謂即照而遮即有而空合三四兩句觀之則是遮照空有無住生心俱不可說而又恰恰是生無所住心此即存冥自在之意當知生無住心即是生清淨心生清淨心即是生實相也奉持金剛般若應如是信解受持應如是為他人說俾自他如是如是離一切相便如是如是顯現共具之清淨心如此方為發阿耨多羅三藐三菩提心也前發無住心一科說在莊嚴佛土之後今結成無住發心一科則說在六度之後此又點醒修六度正所以莊嚴佛土故此中闡明應離一切相發心修六度亦正所以結顯前義應離相以莊嚴佛土也菩薩所以莊嚴佛土者意在上求下化故上求下化皆應離一切相佛經中有曰上無佛道可成下無衆生可度此意即是成佛而不見成相度生而不見度相也總之生無所住心是離一切相之真詮所謂圓離是也圓離者一空到底之謂亦即是離四句絶百非亦即是理無礙事無礙理事無礙事事無礙亦即是雙遮雙照雙冥雙存遮照同時存冥自在當如是領會也又將無所住攝入生心中說意極警策蓋指示學人倘於無所住外生心則心即有住亦生則成非微乎危乎下科反顯正明此義卯三反顯若心有住則為非住若心有住正明若於無所住外生心則生心便有所住矣住者取著之意若於無所住外生心便是其心有取取則著相故曰則為非住謂住則為非也何以故住便有相與上言應離一切相違反故非也將此兩句經文一氣讀之義甚明顯蓋若心有住則為非住猶言心若有所住便是非所應住故曰住則為非也此義正與開經時所云菩薩但應如所教住一正一反遙相呼應心若有住便非如所教住故曰則為非住也前言應如教住是緊躡其上文所云應無所住來可見如所教住之言不過因問者有應云何住之問姑且隨順說住耳其意實為無住之住換言之即是應住於無所住由此足證應一無所住若心有住住則為非矣或曰汝義不然經義是說若心於一切法有所住則為非住般若蓋明一切法皆不應住但應住般若耳大般若經不云乎不住一切法即是住般若若將兩處經文印證可見此處是明應住般若若住般若非不住一切法不可故曰若心有住則為非住故知汝義不然也或人之語大錯大錯由其未明經義故也今恐或者有見大般若經所說而生誤會者不得不引而徹底說明其義當知本經上來特說第一波羅蜜及忍辱兩科正明般若不離一切法一切法不離般若即此便可證明則為非住一語斷不能作非住般若會何以故既是般若與一切法不能相離則大般若經中所云不住一切法即攝有不住般若在內而又曰即是住般若者應向不住即是四字上領會蓋謂一切不住即是住耳總以明般若應以不住為住之義此與本經所說但應如所教住語意正同況大般若經此兩句外尚有兩句曰不信一切法是名信般若當知一切法皆是佛說豈可不信若合四句而讀之便可悟知亦是顯明一切法不能離般若一切行人不能離般若之義者若看成不需一切法但執一般若則佛法掃地盡矣有是理乎至於本經上來明明說般若非般若又曰第一非第一豈得曰應住般若乎哉總之凡讀佛經欲明佛理必應深解圓解否則便恐誤法誤人而般若法門尤應加意因其理既甚深微其語又甚圓活斷斷不可以淺見窺不可以偏見測也又有疑非住之言是說則為非住菩提者亦大謬誤佛與長老為明菩提心亦不應住特特說後半部經講至後半部便明其旨茲不贅總而言之住即是取亦即是著既一切不應取著故一切皆不應住而有住便非耳或又曰經云不應住色聲香味觸法生心則離相似但約有邊說不知說一法字便攝非法前不云乎法尚應捨何況非法故說及法即攝非法也且明言應離一切相若不將有無四句攝盡不得曰一切也凡此等處若不深觀圓觀便是淺說般若無論妄說淺說其罪甚大故今乘便為剖析而詳說之此結成無住發心無住布施兩科既是總結前文故其中含義多而且要若不逐層發揮透徹義趣便不融貫云何作觀況住塵生心正是凡夫積習極不易除而不應住塵生心又正是對病發藥極關緊要則應云何乃能不住萬不能不多說方便使有下手處若非然者雖般若道理說得極是亦為空談聽得極明亦是白聽故此等處說者聽者皆應極端注重不應怕煩不容少忽者也長老所問發阿耨多羅三藐三菩提心應云何住云何降伏其心是分開各問蓋發心也住也降伏也明明三事然語雖分三意亦一貫何以故長老問住意在心得安住之方恐不能安住故又問云何降而問云何住降又正是問應云何發心也故世尊答意亦為融答試觀初答降中語意便可悟知所謂降者無別即是降其住相故曰若有四相即非菩薩於收結處特作此語正是點醒此意也次答云何住時則曰但應如所教住而所教卻是應無所住深觀其意又可悟知因衆生處處住著故令無住令無住者正所以降伏之也是已將住與降伏融成一片矣其下所說無非發明應無所住之義說至此處復引前之已說者略變其詞而深透說之曰應生無所住心且曰若心有住則為非住由此更可悟知無住二字乃金剛般若之主旨一部經千言萬語可一言以蔽之曰無住而已世尊何故要如是融答讀經者何故要如是得其答中之主旨以不如是則用功不能扼要不扼其要云何著手耶復次此中所說離一切相便是無住之意所說應離便是降伏之意而曰應離一切相發菩提心是又將住降與發心融成一片矣意若曰上來所說諸義不可但以為發菩提心後應降伏其住相當知發心時便應離一切相而無所住方為發菩提心耳得此一結則上來諸說更加警策聞法者明得此義則知發心時便不容含糊因心既真自不致招迂曲之果所謂初發心時便成正覺者如是如是當如是信解受持也不應住色生心不應住聲香味觸法生心兩句世尊重疊言之者實具深意因塵世衆生之環境不離此六住塵生心乃無始來之積習而欲了生脫死又必須背塵合覺故特重疊一再言之令塵境中衆生須將不應住三字深深體會時時觀照勤勤遠離庶幾漸能做到不住耳色聲香味觸暫置先言法字將云何離乎無論世間法各有應盡之責苟不盡責又落因果云何可離況佛法亦法也正要依法修行更何能離固知所謂離所謂不住乃不著之謂非謂不行其法然而既須盡心以行將如何行去始為不著耶所以非有方便不可也今約行解兩面再說方便行之方便云何以世間法言凡所當為者自應盡心竭力不錯因果然首當加意者無論如何艱難困苦決不可起勞怨之心無論如何成績優長決不可存居功之想不幸失敗亦決不可因之煩惱憂愁慨歎忿恨必須此層做到方能達到前次所云事來便應事過即忘得與不著相應耳以出世法言要在無論修得如何久如何好如何完備而決不自是決不自滿如此乃能達到行所無事也然而衆生所以處處著者由有我相我相則生於我見是故欲根本解決非破我見不可而欲破我見非明佛理不可何以故我見起於愚癡而無我之理破我之法惟有佛典說之最精最詳故非佛法不能開其正智消其障蔽化愚癡而除我見也故欲行為上真能不著必應了解佛理矣然而了解殊不易也試以我見言之云何有我見耶我見之害云何云何能除我見云何方為無我已覺頭緒紛繁況與此相關之事理甚多甚多若知一而漏餘必執偏以概全偏執即是著也故欲了解佛經中一事一理必當先去此等偏執要知必能融會衆義乃能通達一義此所以應作面面觀也必面面觀乃能漸入深觀圓觀而得深解圓解也然則解之方便云何首當多讀多誦最好遍讀一切經論然泛泛看過毫無益處亦非盡人所能茲姑舉必不可少中之極少數言之如圓覺楞嚴楞伽地藏等經皆應多讀華嚴法華若不能盡讀或讀一種若不能全讀或讀數品皆可華嚴經中之普賢行願品尤當奉為日課至如本經之不可一日離更不待言論則大乘起信論大乘止觀兩種亦當列入日課輪流讀熟而淨土三經一論亦不可不讀者也凡曰讀者當至誠恭敬讀悠游涵詠讀其中緊要之句須時時存養於心中令與自心冥合為一此最妙之觀門也斷斷不可視同俗書徒向文字中剖辨愈剖辨則執愈重障愈深矣何以故因其無非本其多生以來之我見凡情推測卜度耳如此不但增長偏執更恐生出大邪見來況佛菩薩所說之理本超凡情之表今以凡情揣度如何能明因不明故甚至生大毀謗墮無間獄不止退失信心已也所以向文字中探討是學佛之大忌故圓覺經云以輪回見測圓覺海無有是處至若古德注疏若欲研究則應廣覽因其各各有長有短必須會通其義切忌偏執亦與讀經同不可專向文字中剖辨尋求惟有如上所說至誠恭敬讀悠游涵詠讀存養觀照斯為最要尤須以行持助之首當持戒修福加以精勤懺悔禮敬三寶請求加被消我夙障開我正見且發大悲大願廣度衆生則感應自速更當懇切念佛持咒仰仗加持之力除其障蔽如是解行並進久久不懈則障漸漸輕心漸漸空慧漸漸開觀照之功隨之而漸深漸圓我法二執亦隨之而漸化漸除法與非法亦得漸漸不著所謂水到渠成有不期其然而然者矣固不止佛理洞明已也此以法言也至若色之與聲有目則有見莫非色也有耳則有聞莫非聲也香味觸例此可知雖避至無人之境而山間之明月目遇之而成色江上之清風耳遇之而成聲云何遠離乎須知心不清淨即令閉聰塞明其意境中正不知有多少色聲香味觸幻象顯現必須如上所云解行並進久久熏習令其道眼明道心淨而能反見反聞則色聲等境方不於心中現起然後對境遇緣乃得見如不見聞如不聞耳更當知佛之說此二句原是為發菩提心修菩薩行者說因其既發大悲大願紹隆佛種欲度一一衆生盡成佛道則生生世世不能捨衆生若不離一切相便畏生死流轉而大道心退矣且既不捨衆生便不能捨塵境而一言及境便有順有逆若未能生無住心離一切相一遇逆境能不退乎如舍利弗於六十劫發大心修大行因人乞眼已剜一眼復索一眼遂致退大修小是其明證倘遇順境或為人王為天人為帝釋亦須離相乃能道心堅固不致為樂境所轉況菩薩一面下化一面仍當上求如我世尊多劫以來一句投火半偈亡軀之事不知經過幾許皆是由能離相之功也以是之故必應不住六塵生心而後乃離一切相相離而後性顯性顯而後乃能不動道場現身塵剎滿其上求下化之菩提本願此世尊所以言之又言也由是而談發大心修大行者不亦難乎雖然有勝方便在難而不難也方便云何念佛求生西方是也當知念佛求生法門正為發大道心者說兼為餘衆耳世人不知乃小看之大誤大誤起信論曰衆生初學是法指大心大行言欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道如修多羅說若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退以上是不知離相者之方便即是為餘衆而說者若觀彼佛真如法身觀法身正謂離相觀性常勤修習此修習二字兼指離相及念佛二事言畢竟得生住正定故住正定即是信根成就觀此論文足證念佛求生法門正為發大心者說矣蓋欲免其怯退故開此殊勝方便之法門耳親近彌陀而住正定則不但信根成就且已分證法身便能分身百界此約初住言初住以上千界萬界十倍十倍增加也廣度衆生無論境緣順逆遇之如無其事矣有此勝方便何必膽怯而不發大心乎其已發大心者又何可不修此法乎論中所言往生之相有二一既念彼佛復以所修各種善根回向求生者即得往生終無有退此即未能離相見性但以蒙佛攝護之力故得不退二既念彼佛且能觀佛真如法身者畢竟得生而住正定此是能離相觀性故得生便住正定住正定者言其已登初住也所謂上品往生到即花開見佛悟無生忍者是也是故吾輩若離相與念佛同修仰蒙本師及接引導師十方諸佛護念之力則一推一挽順風揚帆有不速登彼岸者哉然則前次所說般若淨土同修之法幸勿忽也起信論所說觀佛真如法身不可局看經言心佛衆生三無差別既是離相而觀性觀法身者觀性之意也亦離相之意也則觀佛法身即是自觀本性當如是知細觀此結成無住發心一科不但回映經初答降伏中之義并亦回映答住中之義即應如是降伏其心及應無所住行於布施兩大科語意甚明毋庸繁述前答降伏中之義是令發離相大願答住中之義是令修離相大行合之正是教令應如是發心可見前文表面似但答降答住實連發心之問并答在內矣此義得此中應離一切相發菩提心一語為之點醒乃更明顯又此結成無住發心一科雖將開經以來所說者一併結成卻止是結成觀門故下科又將行門中統攝六度之布施特別說之不但結成前文無住布施之義且以示觀行二門並重不能相離也而先說觀次說行者又以示一切行持應以觀慧為前導也理既精嚴說復善巧當靜意領會之前云前之發無住心一科為開經後所說諸義之結穴今此結成無住發心一科又為總結穴何謂結穴總結穴其義雖已說明然猶有未說到者茲再補說之因是要義不可不知不然亦可不說矣前發無住心一科中應生清淨心一語為開經後種種離相義之結穴也何以故離相原為證性令清淨心現前故不現前便不能轉凡成聖故故曰應生清淨心也應無所住而生其心一語為開經後所說空有不著義之結穴也何以故空有二邊不著必須止觀並運故蓋無所住則心空而寂此之謂止生其心則心朗而照此之謂觀即宗下所謂惺惺寂寂寂寂惺惺如此則定慧平等方與如實空如實不空之本性相應換言之定慧平等乃能空有不著乃能證得寂照同時之妙果佛菩薩證此妙果所以遍界分身而未嘗來往不作心意而妙應無方也此種大用實由修因時止觀并運空有不著來故發菩提心者應無所住而生其心也兩應字要緊謂必須如此乃得與本性相應與妙果相應兩不應字亦要緊住塵生心則合塵而背覺矣性德果德皆不相應矣此科中兩應字兩不應字亦當作如是觀迤邐說來說至此處又為前義之總結穴者以其說到本源故也此義前曾說過然但說得修六度是證果之因發心是起修之因此不過本源之一義耳當知所謂本源非止一義故須補說上請示名持一科已說到斷念此科則是教以最親切最初步之斷念方法故曰說到本源上第一波羅蜜一科明法法皆般若即是明法法皆應離相忍辱波羅蜜一科是明離相乃能成忍然但說理此科則又教以最親切最初步之離相方法故曰說到本源蓋斷念是見性之源而離相又是斷念之源也總之此科及下科皆的示以用功要門豈止道理精微圓妙而已若但作道理會豈不辜負經旨明得此科之修行方法下科便能應用故今就此科言之曰發心曰生心發生二字要緊謂起心動念時也心字更要緊菩提心無所住心真心也住塵生心妄心也一應一不應是的示學人當於心源上領會於起心動念時觀照勿令錯亂修習也故曰最親切最初步蓋如此開示是令運用般若正智以除妄念俾昏擾擾相之心漸得安住之入手功夫故曰最初步且如此用功甚為切實易得進步何以故知得成凡之由成聖之路從緊要關鍵上下手故故曰最親切也何謂成凡之由耶當知一切衆生由於無始未達一法界故名曰不覺亦名根本無明以無明不覺故遂爾動念念起便於心中顯現能所對待之相於是人我等等分別計較從此繁興愈著愈迷愈迷愈著此起惑造業受報之由亦即成凡之由也知此則知成聖別無他路唯有離相息念以除其人我等分別計執而已何以故就地跌倒須就地爬起故發菩提心便是發覺初心菩提者覺義故無始不覺由於迷真著相今若不知離相何云發覺知此則應離一切相發菩提心之義洞明矣可見此義亦高深亦切近約高深言須至妙覺相始離盡然而因賅果海果徹因源故初發心時便應如是而知如是而學約切近言著相則背覺合塵是成凡之由離相則背塵合覺乃成聖之路故一切學人於起心動念時便應在離相上切實用功斷不容忽然而離一切相包羅廣大從何入手不應住色生心兩句即指示入手方法也方法云何要在不令心中有色聲香味觸法幻相顯現現即遣之不令住著須將不應二字微密提撕一念起時當提起正念曰從無始來由住塵生心故貪瞋競起有我無人墮落惡道不知次數即生善道旋復墮落輪回之苦無量無邊向苦不自知耳今幸聞法亦既知之何仍於心現起不畏苦耶自尚如此何能利他耶是大不應一也又作念曰迷相則成衆生離相則名諸佛一升一降一聖一凡只在一轉移間其間間不容髮今學佛矣於此間不容髮之際全在當機立斷斷斷不容此等幻相於心停住稍縱即逝矣何名學佛耶是大不應二也復作念曰自性清淨心中本無一切相今從何來令心不淨是大不應三也當知有所便有能心中所現之幻相非他即生於能現之妄念耳是故上來責所現之不應加以遣除無異責其起念之不應加以遣除也然則提起正念便是斬斷妄念如快刀之斬亂麻何以故同時不能有二念正念提起時妄念自除故可知說此兩句為離相之方便者正為離念之方便親切極矣知得如是提起正念便是發覺初心故曰初步也上作之三念一層深一層一是以沈淪之苦作警告二是以力求上進為鞭策三是反照心源令趨本寂隨提一念或兼提可相機行之起心動念時如是綿密用功庶幾對境遇緣時較有把握耳然欲起心動念時正念提得起必須平時即未動念之時亦不放鬆故復說應生無所住心此句是令平時心於塵境一無所著也此須用前次所說般若淨土同修之法以為方便常令其心等虛空遍法界超然於一切有對待的塵境之外即復提起一句佛號令佛與念水乳交融與虛空法界成一大光明海但如是驀直念去心少昏散便振作而融攝之常令其心等虛空遍法界超出塵外者性體本如是故虛空無相不相故常作此觀令此心空空洞洞則念佛時便易得力水乳交融者即前所謂不分別誰是念誰是佛但令念即是佛佛外無念是也與虛空法界成一大光明海者我與彌陀本與十方諸佛法界衆生同一性海無彼此無差別故今如此一念念佛便念念上與諸佛菩薩光光相照同生歡喜下與一切衆生息息相通同蒙攝受則是念念上求念念下化故同成一大光明海也又復我心佛心既同一性海則亦不分別極樂世界在虛空法界外在虛空法界內亦不分別極樂世界在心內在心外故同成一大光明海也但驀直念去者不分別有好相無好相得速效不得速效但如是所向無前至誠念之而已更須勤提應字以振作之不令懈怠常作念曰所發何心耶衆生待救方殷諸佛相期甚切若少懈怠則所發心便成妄語努力努力以為策勵此是應門若起他念則依前不應門中所說三種正念自呵自責並將若心有住則為非住二語懇切提撕綿綿密密不令間斷須知起念即妄念佛之念亦妄非真何以故真如之性本無念故但因凡夫染念不停不得已故借念佛之淨念治其住塵之染念蓋念佛之念雖非真如之本體卻是趨向真如之妙用何以故真如是清淨心佛念是清淨念同是清淨得相應故所以念佛之念念念不已能至無念故曰勝方便此義前雖略說以是要義故復徹底說之極樂世界亦是幻相然而不可不求願往生者淨幻非同染幻也何以故清淨土本由清淨心顯現故所謂心淨則土淨也當知淨土淨心本來不二但約攝受衆生言無以名之強名曰土耳求生淨土尚有多義不可不明今略說其最要者一在凡夫位應捨染趨淨故凡夫分別心未除若無趨捨不能振作此正前所謂隨順世間因果對待之理令種絶待勝因以剋絶待勝果乃佛法之妙用也至生淨土後則供養他方諸佛普度遍界衆生何嘗住著淨土之相可知修因時令捨染以趨淨者不過借為出生死海滿菩提願之過程耳二親近彌陀成就信根故由凡夫修至正定聚須經無數劫若不親近於佛誠恐退心此求生淨土之重要原因也三行菩薩道應現起莊嚴妙相之清淨土以救癡迷著相之苦衆生故尚應現起何礙求生且今之求生正為速證無生乃得現起無邊淨土也四二邊皆不可著故一切染幻尚應空有不著何況淨幻蓋知心淨則土淨不著有也求彌陀之接引不著空也何以故非仗他佛之力自佛不易現前故五得體應起用故二乘以有體無用被呵故大乘修行應體用具足當知求生淨土之義質言之即是求證淨心之體現起淨土之用耳蓋一切衆生見其往生瑞相自然發起信心所以求生淨土自利中便有利他之用不但親近彌陀之後能有現起無邊淨土之妙用已也六性體空寂無相無不相故念佛須念至一心不亂至此則念而無念尚何心土染淨之可說無相也而正當此際阿彌陀佛與諸聖衆便現在其前無不相也由此可悟念佛義趣與般若毫無異致七知一心作而無礙故性相本來圓融染幻尚無礙淨幻豈復有礙凡曰有礙者以其不知一切心造取著外相故若其知之則不著不壞性相圓融一切無礙矣以上皆求生淨土極要之義知此則知淨土與般若求生與離相語別而義實無別蓋般若從空門入道者乃是即有之空淨土從有門入道者乃是即空之有合而觀之正是空而不空不空而空故兩門合修正與如實空如實不空之本性相應亦正是無相無不相之實相舍此不圖豈非自誤觀上來所明離相離念之義可知欲求不住六塵其道無他要在冥相忘懷而已至於前云將經中要句要義存養咏味此是用以觀照遣執所謂以幻除幻之法與冥相忘懷初無有礙當知不應住無所住是但除其病不除其法也即色聲香味觸供佛度衆乃至養此色身皆不能廢而不用若能不著何礙之有當如是領會也上來所說提起正念極有關係恐或忽略今再說明其理當知提起正念正是生心而提正念即所以息住相之妄念正是生無所住心也名為正念者以其是根據各大乘經所說之理而來故提此正念便是觀慧具此正觀之慧光不但能息妄念并令心不沈沒不似用他法而無觀慧縱令妄念暫息而心中漆黑者所可比擬也或曰念即是觀故念佛念咒皆能了生死見本性若如適才所說豈念佛念咒皆不如提正念乎曰君言似是而非由於知一漏萬以偏概全於佛理未能融會貫通故也當知密宗重在三密相應意密便是作觀若但念咒不知作觀祇能得小小益處求了生死見本性則未能也念佛亦然上品生者必須於第一義心不驚動以其有觀慧也否則只能仗彌陀攝受之力令得不退免入輪回此惟淨土法門有此特異方便為一切法門所無若欲見本性必須花開見佛而後可而欲花開必須明第一義智慧發生而後可此所以中下品生者生淨土後仍須勤修動經塵劫由此可悟觀慧之要矣念即是觀固然不錯然必念中有觀方可曰念即是觀也即以觀言復有理觀境觀之不同理觀者依佛說道理而作觀也如上所提正念是也既是依據佛理則觀之便能開其正智故曰觀慧也境觀者依境作觀也此又有二一聖境二塵境觀聖境者淨土如觀極樂觀佛身相好及十六觀經中所說密宗如道場觀法界觀及觀本尊皆是此等聖境本由淨心現起便與淨心不二故觀之能令妄想息真心現也至密宗之觀阿字此是觀本不生義乃觀理非觀境矣若觀一切塵境必須依佛所說觀其無常不淨遣而去之乃是正觀亦為觀慧否則名為邪觀質言之即不應觀也此等道理不可不知也以觀理觀境之義相通故修密宗淨土若不能依其本宗作觀便應常提正念以補助之更當多讀大乘開其觀慧如前次所說是也此理尤不可不知也至於平時修行若但修般若誠恐見理少有未圓落於偏空而不知尤慮其心怯弱或致退失於不覺若但修念佛不但生品不高且恐未能一心何以故不知離相必住六塵心有塵擾豈能一心故莫若離相與求生合而修之念佛生心也離相無所住也此心雖空空洞洞卻提起一句佛號正是生無所住心也妙莫妙於此矣穩莫穩於此矣前言離相與求生語別義無別無別之義可片言而明之曰離相是并離非法相求生原為證無生豈有別乎但般若是開空門以除著有之病故但曰離相淨土是開有門以除偏空之病故但曰求生此語言上所以不無差別耳離相求生同修矣而前說之行解方便仍當同時并進若解之一面得其方便則可以增智慧養道心若行之一面得其方便則喜怒哀樂或不致牽動主人翁亦不致矜張急躁自是自滿不然正念必提不起千萬勿忽以上所說一一做到修行之能事盡矣乎遠哉遠哉以靜中雖有把握動中或不免慌張故平時修起心動念時修之外更須於對遇境緣時用功以歷事而練心焉且上來所說祇是修慧而未修福當知慧是前導福為後盾大白牛車須具福慧二輪乃能運到彼岸也若不修福既未與衆生結緣雖成菩薩衆生不能攝受也況福不具足便是慈悲不具足菩提心以大慈大悲自覺覺他平等不二為本若不廣修六度萬行菩提心既已缺缺般若正智亦未必能開何以故但修慧不修福仍是我相未除既不平等又不慈悲諸佛未必護念勢必障礙叢生欲修不得故此所以又說下科應不住以行布施也寅次結成無住布施分二卯初結不應是故佛說菩薩心不應住色布施是故二字承上文來其語氣緊躡若心有住則為非住既是有住則非所以心不應住亦即結成經初不應住色聲等布施之義也但引不應住色一句者色者色相舉一色字便賅攝一切境界事相不必列舉矣意若曰由是有住便非之故所以我前有菩薩於法應無所住行於布施不應住色等布施之說也蓋指示聞法者須將若心有住則為非住之義以證經初所說則其義自明但舉不應住色布施一句復有深意蓋色即是相舉此為言正與上文應離一切相發菩提心相呼應使知所謂離相者是應離其心中執著色聲香味觸法之相并非應離布施六度之法也經初說不應住色布施其上原無心字今特加一心字者又是與上文數心字相呼應使得了然所謂發菩提心者即是發六度心耳且使了然所以不應住六塵生心者正為行布施六度耳然則心不住塵并非沈空滯寂可知所以前來既說不住又說生心且曰應無所住而生其心也更可了然既是心不住塵正為廣行六度則當其行六度時亦應心不住塵可知所以今文又曰應生無所住心也得此一句前說諸義彌復參伍錯綜七穿八透世尊如是而說無非欲使聞法者得以融會貫通深解義趣以便觀照得益耳總之菩薩心不應住色布施是緊承有住則非來而有住則非一語原是反顯應離相而發心故說此科亦是為闡明離相發心之義者蓋除布施六度外既無菩提心之可發若心於色塵等相一有所住其心便已為境所轉則布施等功行必不能圓滿尚得謂之發菩提心乎故應不住六塵離一切相乃得廣行六度利益一切衆生圓滿其所發之菩提心耳下科菩薩為利益云云正對此點暢發其義也佛說二字亦有深意佛者果德之稱菩薩行滿名為成佛欲知山下路須問過來人今曰佛說使知心不應住色布施乃經驗之談非同理想發大心者應如是信解受持也菩薩即指發菩提心者經初菩薩摩訶薩是其前例說至此處更有要義不可不明其義云何長老問應云何住世尊乃答以應無所住其命意果何在耶至於無住為本經主要之旨所謂無住則離相離相則證性此等道理上來已詳哉言之今曰命意何在蓋就針對問意處說耳長老之問意在得一安住其心之方也而世尊啓口便曰應無所住直是所答非所問豈竟無其方耶抑亦不應問耶非也非所答非所問也乃不答之妙答耳何以故一切無住正是安心之妙方故何以明其然耶法與非法一切不住即是離一切相一切相離即是不為境轉不為境轉則其心安住而不動矣非不答而答之妙答乎然雖不顯言以答而前則曰但應如所教住今則曰若心有住則為非住一正一反已將命意所在逗漏不少我前釋如所教住之義曾曰是為不住而住亦即住於無所住此兩語正明其於相不住之時即是其心安住之時故曰不住而住住於無所住非茫無邊際語也前釋則為非住之義又曰即是非如所教住蓋因其不能如所教之無住而住於六塵則其心便非安住不動故曰則為非住也既為非住是其無住之觀已破矣則所修之布施等行亦必不能廣大無邊故此科緊承其義而正言以明之曰是故佛說菩薩心不應住色布施也異常警策異常醒透總以明上來於發心於作觀於修行皆教以應無所住離一切相者以不如是則心合於塵而不安住其所發之心所作之觀所修之行皆成虛語矣此佛答應無所住之真實義也今乘此處文便徹底說之上來未說者遵佛密意故當知必一切無住而後得所安住必始終無住而後法身常住且并法身亦不應住故曰不住涅槃小乘因住涅槃名曰有餘涅槃故必并涅槃而不住乃是入無餘涅槃也由是可知若聞得所安住而生住想則終不得安住矣此佛之所以不顯答也不然前文何不曰但應如所教而得安住豈不明甚然而只將住字微微一點不肯說煞者無他以衆生處處著故聞住必生住想故所以說經者於此等處亦應遵佛密意不可輕道然此義又不可終祕故世尊於答住時雖不顯言卻於他處為之點出前後共有三處其中兩處語意最明如上來云離相乃能忍辱及經末云不取於相如如不動忍也不動也皆安住義必離相而後可豈非於相不住心得安住之義乎故今亦徹底一說使知問答實是針鋒相對當靜心領會佛說之深旨一切無住始終無住也禪宗二祖問安心法初祖曰將心來與汝安曰覓心了不可得初祖曰吾與汝安心竟此與本經問答之意正同當知應無所住者因其了不可得也會得了不可得則安心竟矣無著菩薩金剛經論中曾點醒此意如說降伏其心一科之義為利益深心住亦曰發心住說應無所住行於布施一科之義為波羅蜜相應行住是也此正菩薩深解義趣故敢作如是說論中不曰住發深心住相應行而將住字置於其下其意甚精正明因修無住而後所發之深心所修之相應行得所安住耳茲亦乘便引而說之如讀此論者誤會為住著發深心相應行則大違經旨矣亦絶非論意也由是可知大般若經所說不住一切法即是住般若亦是顯明一切法不住即是般若正智安住不動之義不然不得曰一切不住即是住也下文不信一切法是名信般若之義更深信者不游移之謂不游移者安住之謂此明并安住亦不住是名安住也此等處差之毫釐謬以千里不可僅泥眼前文字當統觀全旨靜心領會乃得前云必須融貫衆義方能通達一義是也卯次結成應分二辰初總標須菩提菩薩為利益一切衆生應如是布施上科說不應住色布施恐不得意者誤會但不應住有故復說此下數科使知是空有兩不住也流通本一切衆生下多一故字古本皆無之如是二字指下文為字讀去聲此字要緊蓋名為菩薩者因其發菩提心發菩提心所為何事乎為利益一切衆生耳既為利益一切而發心便應如下文所說者以行布施何以故若不布施與衆何益若不如下文所說又豈是布施波羅蜜則少少衆生且不能利益況一切衆生尚得曰為利益一切衆生發菩提心乎此經初所以說若有我人四相即非菩薩也由此足證一切衆生之下實無故字蓋名為菩薩正以其能為利益一切衆生而發心若加一故字則菩薩是一事為利益一切衆生又是一事語意一齊鬆懈矣為利益一切衆生應如是布施含有二義一是應如下文所說之離相行其布施因離相布施方能攝受無量無邊衆生利益一切也此與經初所云滅度無量無數無邊衆生意同然經初是令發利益一切衆生之大願以離我人等相此中是令離能施所施等相以成就所發利益一切衆生之本願前後兩義互相助成缺一不可二是應以如下所說之法布施一切衆生令皆得福慧雙修展轉利益皆知離一切諸相成菩薩成佛如是布施是為真實利益此發心者之本懷亦佛說之本意也何以故一切布施中法施為最故此與經初所云所有一切衆生之類皆令入無餘涅槃意同然經初但令發度衆成佛之願此中是令實行度衆成佛之法施兼以補發經初應無所住行於布施中未及之義總之此總結前文中兩大科皆是就前說之義加以闡明令更圓滿故標曰結成也布施者捨己利他之行也佛法中不但布施是利他一切行門其唯一宗旨皆為利他故舉一布施攝一切行門盡當知本經主要之旨在於無住無住主要之旨在於遣執破我而捨己利他又遣執破我之快刀利斧也故於觀慧則發揮無住於行持則獨舉布施以示觀行二門要在相應相成必應如是奉持方是發菩提心方能證菩提果菩薩發心原為自度度他自他兩利而經初但令度所有一切衆生而不言自度此處亦但說菩薩為利益一切衆生而不言自利者大有深意此意前曾說過然無妨重言以申明之當知衆生之所以成衆生由於執我著相故發心修行祇應存度他之心利衆之願以破其無始來執我著相之病此正轉凡成聖之要門也故不言自度自利而自度自利已在其中換言之度他正所以自度利衆正所以自利佛法妙用正在於此一切佛理皆應如是領會如但教以一切不住而其心安忍如如不動便因是而成就但令看破五蘊色身除貪瞋癡而色身卻因是而康健安樂但令修出世法而世間法亦因是而日臻治理蓋多數人能知發菩提心行菩薩道上者可以轉凡成聖中者亦成大仁大智下者亦是善人君子矣則書籍所稱五帝三皇之盛不是過也乃不信者皆以為厭世信者亦認為與世法無涉辜負佛恩莫此為甚是皆未明佛理之過也故發大心欲宏揚佛法者首宜將此義盡力宣說徹底闡明俾大衆漸得明了多入佛門則化全世界為大同國化盡法界為極樂邦亦不難也願與諸君共勉之總而言之佛法皆是說這面就有那面做那面就是成就這面不但雙管齊下直是面面俱圓所以說世間好語佛說盡也所以華嚴會上諸大菩薩讚歎曰天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者也辰次別明如來說一切諸相即是非相又說一切衆生則非衆生諸相非諸相衆生非衆生此與前說我相即是非相等等語義正同今之說此是令行菩薩道者應知一切諸相一切衆生當其有時便是空時所謂有即是空空即是有應如是空有二邊俱離乃能利益一切衆生也如來說者約性而說也性本空有同時而一切諸相一切衆生皆不離此同體之性皆是同體之性所現故莫不有即是空空即是有也有即是空空即是有之義前已屢說然此是般若主要之義若非徹底明了一切佛法便不得明了所有觀門行門種種修持便不能得力故今更詳析說之當知一切法莫非因緣聚會時假現有相所以緣聚則生緣散便滅且不必待其滅而後知也正當聚會現有之時亦復時起變化無常無定可悟其并非堅固結實實是幻現之假相此之謂有即是空而凡夫不明此理者誤認為實遂致取著有相隨之流轉此輪回之因也佛眼則見透此點而知一切法有即是空故令不可著有也即復知得一切法所以有種種不同之相者是隨業力而異因其造業隨時變動故境相亦隨而變化無常然而造如何因定現如何果所有境相之好醜苦樂莫不隨其業力之善惡大小而異業力復雜現相亦復雜業力純淨現相亦純淨絲毫不爽此之謂空即是有而凡夫不明此理者撥無因果遂致取著空相無所不為此墮落之因也即不如是而如小乘之偏空則又有體無用佛眼則見透此點而知一切法空即是有故令不可偏空也不但此也即復知得業從何起起於心之有念也念必有根根於同具之性也念與業時時變異惟此同具之靈性則自無始來盡未來際不變不異實為一切法之主體然而有體必有用有用必有相此相之所以雖為幻有而又從來不斷也因其幻而不斷所以既不應著有又不應著空也且既知相由業轉業作於心則知一念之因雖微其關係卻是極大所以令學人應於起心動念時觀照用功也又知心念之起由於未達一真法界故取相分別然而性體本無有念若非返照心源豈得斷念以證體所以令學人當背塵以合覺反妄以歸真也以上甚深微妙道理非佛開示誰人能知若不信佛如法受持又誰能明了因此一切衆生自古至今多在迷中造業受苦故為利益一切衆生發菩提心者應知相即非相生即非生既不著有亦不著空如是空有雙離以行六度萬行乃能利益一切衆生也何以故住相布施易退道心故著有是住相著空亦是住相故故應空有雙離也更應以此相即非相生即非生道理普告一切衆生令皆知修二邊雙離之因證寂照同時之果是為究竟之利益菩薩應如是布施也本科開口曰如來說者正是指示發大心者如是空有雙離以行布施布施此空有雙離之妙法則自他皆得離相見性斷念證體同歸性海其利益之大不可思議何以故是如來說故其法與如來性德相應故一切諸相一切衆生有種種義向來各書多因文便拈一二義以說之若不知其種種義則只明其當然而不明其所以然便恐因所見之書不同致生抵觸今當薈萃衆義分析而詳說之則聞此一席之話無異十年讀書想為諸君所願聞也此種種義有常見者有不常見者有推而廣之者概括為四條如下一相者相狀謂有生之類之相狀也相字不但指外形之狀況言兼指內心之狀況言有生之類如經初所言若卵生若胎生若溼生若化生若有色若無色若有想若無想若非有想非無想是也無色一類但無業果色耳仍有定果所現之微妙色身為有色界以下目力所不能見故曰無色而佛眼菩薩法眼羅漢慧眼皆能見之世尊示入涅槃時無色界天人淚下如雨若無色身云何淚下如是種種有生之類其色心相狀差別亦至不一矣故曰諸相再細別之每一類中相狀又有種種差別如外形之肥瘦好醜內心之善惡智愚推之如行願品所言種種壽量種種欲樂種種意行種種威儀則千差萬別何可算計故曰一切也然而如是一切諸相在俗眼觀之宛然現有之時而道眼觀之則知其莫非色受想行識五蘊假合變現出種種有生之相耳除五蘊變現外實無種種差別之相可得經中所以言當下即空又曰生即無生也故曰一切諸相即是非相重讀下句下同第二條亦同此明生空之義也此是約有生之相狀生即無生言故曰生空衆生者衆謂五蘊三數成衆蘊既有五故名曰衆由五蘊衆法假合而後有生故名衆生而四生胎卵溼化六道天人修羅地獄鬼畜之衆生莫非由此五蘊法假合而生故曰一切衆生普通所說衆生之義皆是指千差萬別衆多生類而言此乃一切衆生之義非衆生二字命名之本義也何謂五蘊假合當知不但有生之類是由五蘊法和合假現生相本來無實已也即五蘊衆法之本身亦由其他衆法和合假現成此幻相亦本非實故曰五蘊假合何以言之如色蘊乃地水火風四大之所變現者也則色蘊之為假合可知若細勘之四大又何一非假至於受想行識四蘊受者領納想者憶念行者遷流識者分別含藏皆妄心也何名妄心因其是由無始來種種計較種種取著積無數之業力執持不斷因而現起受想行識之種種動作耳自性清淨心中那有此物則此四蘊之為假合亦可知矣然則不但五蘊之衆本來非衆即假合成五蘊之其他衆法亦復衆而非衆則生本無生豈不洞然經中所以言當體即空也故曰一切衆生則非衆生此明法空之義也此約五蘊衆法當體即空言故曰法空由此可見五蘊二字含義之精妙矣蘊者聚集義蔭覆義正明色受想行識五者為其他衆法之所聚集而有生之類又為此五之所聚集正所謂緣聚而生也而一切衆生迷於一切諸相者因從無始來久久為其蔭覆障蔽遂致執著認以為實造業受苦無量無邊今既知之便當破此障蔽跳出牢籠云何破依此金剛般若離相遣執是已蓋明生空所以破我執離我相明法空所以破法執離法相也而一言及法便攝非法何以故若執非法亦是法執故以執者之意中是以非法為法故故一言離法相須將離非法相之意并攝在內如是說者乃為佛說如是知者乃為正知如是則并空亦空矣生空法空空空是為三空具此三空之正智名為金剛般若也所以發大心者不但要明生空法空之義以離我法二相方能破此障蔽跳出牢籠并須兼明空空之義以離非法相方能利益一切衆生所以菩薩心若通達諸相非諸相則相雖有而心卻空既不受諸相之牢籠正無妨顯現一切諸相度迷相之一切衆生而不生退怯更通達衆生非衆生則知衆生性本空寂同佛故誓願普度一切入無餘涅槃而無衆生難度之想且度盡衆生亦無衆生得度之想何以故衆本無衆生本無生故如此方是為利益一切衆生發心之菩薩二以第一條所說衆生非衆生之義證明諸相非諸相之義蓋若知得五蘊法之本身是由其他衆法之變現可見五蘊乃是假法然則由五蘊變現之一切諸相豈非假法中之假法其為有即非有也明矣故曰一切諸相即是非相則此兩句亦是明法空義也若知得一切衆生之五蘊色身皆是四大之所聚合業力之所執持清淨心中皆無此物由此可悟約五蘊變現言固相相不同而約自性清淨心言則無異無相然則豈可昧同體之真性執幻生之衆相分別我人衆生耶故曰一切衆生則非衆生則此兩句乃是明生空之義也合之第一條所說則相即非相是正明生空兼明法空之義生即非生是正明法空兼明生空之義也三相者我相人相衆生相壽者相也四相不一故曰諸相無論取著身相法相非法相皆為著我人衆壽故曰一切也而身相是五蘊假合五蘊即已無實若法與非法更是假名然而不無假名無實之諸相也故曰一切諸相即是非相重讀上句下同此明生空法空空空所謂三空之義也此義當約行布施者說故經初曰菩薩於法應無所住行於布施又曰應如是布施不住於相反覆說之以示二邊俱不住也一切衆生仍如一二兩釋然雖衆本無衆生本無生生空法空但既為五蘊法假合現起不無衆生之幻相也故曰一切衆生則非衆生此亦明三空之義此義當約受布施者說因一切幻相衆生方為五蘊假法之所障蔽不知是假非實故此中令為利益一切衆生發心之菩薩應如是以有即是空空即是有之般若法門廣行布施也四諸相謂布施之人所施之物一切者人是五蘊和合物則品類繁多也一切衆生如前釋謂受施者也無論施者施物受者莫非因緣聚合現此幻有故皆曰非是之謂三輪體空輪為運轉不息之物以喻施者施物受者展轉利益不休息也體空有二義一謂此三皆是幻有當體即空二謂此三相體幻有而性體空寂若明當體即空之義則能不著於相若明性體空寂之義則當會歸於性發大心者能如是以布施其利益廣矣大矣總上四釋皆以明有即是空空即是有之義也上文云應如是布施者蓋了得非相非生則不滯有了得相即非相生即非生則不墮空不滯有故雖布施而不住不墮空故雖不住而恆施既二邊之不著復二輪之並運是為布施波羅蜜是故菩薩應如是修即相離相之三檀利益一切無生幻生之衆生也此科不但釋成上來不應住色等布施之義是空有兩不住兼以回映前文所說諸義加以闡發而總結之蓋前文有云凡所有相皆是虛妄者以一切諸相即是非相故前云若見諸相非相則見如來又云離一切諸相則名諸佛故今云應如是即相離相以行布施以如是而行則自度度他同見如來而名諸佛故故曰利益一切衆生當知此語是并施者亦說在內何以故施者自己亦衆生之一故且前文所云不住相布施及實無衆生得滅度者云云亦因是而其義愈明何以故前言不住相布施其下即接明福德前言無生得度其語是明其當然至此乃一一闡發其所以然矣蓋相即非相可見本無可住故不應住生即非生可見衆生入無餘涅槃只是復其本性故無得度者耳總之得此結成兩科之文前說諸義一齊圓成矣故此總結之兩科經文應當銘諸肺腑朝斯夕斯勤勤詠味有大受用在行布施等功行時應如前結成無住發心科所說應門中道理常作正念以為警策若於六塵少有偏著應如前所說不應門中道理常提正念以自呵責若少偏空應依此中所說提起正念曰利益衆生是我本願奈何懈怠只圖自了即此正是著我我見是起惑之根此根不除又何能自了耶更應常作凡所有相空有同時想衆生是眷屬眷屬是衆生想常作衆生同體想衆生本來是佛想觀行雖開二門實則相應相成試觀前觀門中說應說不應應離一切相發心不應住色生心等此行門中亦說應說不應觀文可見不具引前說有住則非此亦說空有不著相即非相生即非生之說是令體會此義以行布施而得二邊不著也其語意處處緊相呼應何故如是若有觀慧而不實行則等於空談若但實行而無觀慧則等於盲修二門既相助而後成所以觀行必須相應也由是可知觀行不但不可缺一亦復不可偏重且由是可知觀行兩門中所說道理必應一一打通貫串而融會之如是而觀時便如是而行如是而行時便如是而觀少有偏住則為非住何以故不相應故是為要著當如是知丑次正明真實分二寅初明說真實須菩提如來是真語者實語者如語者不誑語者不異語者此次正明真實一科是明上來初總結前文一科中所說無住發心無住布施諸義皆由親證而知真實不妄以勸信也真者所說一如即不異之意實者所說非虛即不誑之意若配法言之真謂真如實謂實相是明上來所有言說一一皆從真如實相中流出故曰真語者實語者既語語與真如實相相應故為不誑語者不異語者也既曰真語又曰實語并非重復具有精義當知真如之名表性體之空寂也乃專約性體而立之名蓋真者非虛妄之意明其非相也如者無差別之意明其無我也故上來說有我人等相即非菩薩說凡所有相皆是虛妄說無我相無法相亦無非法相說若心取相無論取法取非法皆為著我人衆壽說應離一切相說離相名佛如是等等一空徹底之語是之謂真語者意在令人依如是語以修觀行則離相忘我乃得契證無相無我空寂平等之真如也實相之名表性德之如實空如實不空也乃兼約體相用而立之名蓋實者非實非不實之意明相雖非體然是體之用用不離體也相者無相無不相之意明體雖非相然體必起用用不無相也故上來說無衆生得度而又度一切衆生說於法應無所住行於布施說不應取法不應取非法說則非又說是名說應無所住而生其心說應生無所住心如是等等空有二邊雙遮雙照雙冥雙存之語是之謂實語者意在令人依如是語以修觀行則合乎圓中而得契證有體有用寂照同時之實相也既曰不誑語又曰不異語亦各具深義蓋衆生迷真逐妄久矣聞此真語實語一定驚怖其言以為河漢望而生畏故諄切以告之曰不誑語者所謂佛不誑衆生也又恐聞者未能深解以為何以忽言非忽言是其他自相違反之語甚多甚多或有先聞不了義者必又懷疑何以此經所說又復不同故更叮嚀而告之曰不異語者所謂雖說種種乘皆為一佛乘也何謂如語是明所有言語皆是如其所親證者而說之也故五語中如語為主使知真語實語皆是親證如此絶非影響之談何誑之有言有千差理歸一致何異之有殷殷勸信苦口婆心至矣盡矣若不配法說之猶言凡我所說既真且實因其皆是如我自證者說之故語語決不相誑語語皆與自證者不異也首舉如來為言者正明語語是從性海而出語語皆與性德相應之意次第安五者字正是指示語語確鑿一切衆生不必驚不必怖不必畏但如是信解受持為他人說決定皆能如我之所親證者而證得之故下科復約證得之法言之以示其真實而勸信焉寅次明法真實須菩提如來所得法此法無實無虛此科著語不多而義蘊淵涵當知此是如來所證不但凡夫莫測高深即菩薩亦未能洞曉直是無可開口處然則云何說耶惟有如長老所云解佛所說之義耳然而義蘊淵涵淵則其深無底涵則包羅萬象欲說明之亦極不易必須一一分疏而細剖之逐層逐層說來或可徹底聽者亦應逐層逐層一一分疏而細剖之務令析入毫芒不得少有含糊然後修觀行時方不致含糊而能親切方有功效之可期不然便是儱侗真如顢頇佛性也且不但應析入毫芒尤應融會貫通然必先能析入毫芒乃能融會貫通當知析入毫芒時雖是在析義理其實已在觀心性矣如上所說是聞思修的竅要諸君勿忽如來所得法此一語便須善於領會不然一定懷疑今假設問答以明之問曰如來者性德之稱既是約性而說則湛湛寂寂無所謂法更無所謂得且前明世尊在然燈佛所彼時方為八地菩薩尚且於法實無所得今曰如來所得法何耶答曰君言誠有理然以此理疑此語則大誤矣誤在但看一句而不深味下文也當知下文此法二字正指所得之法其法卻是無實無虛無實無虛者形容性德之詞也然則所得之法正指性言豈謂別有一法哉由是可知如來所得法一語猶言稱為如來者以其證得無實無虛之性耳豈謂別有所得哉況所謂無實者正明其雖得而實無所得所謂無虛者正明其以無所得故而得證性則雖說得說法亦復何礙何以故法是指性而言得乃證性之謂非謂成如來後尚復有得有法故無礙也若誤會為如來有所得法便非無實矣且少有所得便是法執豈能成如來則亦非無虛矣可見佛語本自圓融要在統觀全旨靜心領會當如是知也此中已將無實無虛之義說了兩種一是形容性德之詞性何以無實無虛下當說之一是形容得性德之詞所謂有得則不得云云是也當細細領會之不但如來所證為無實無虛試觀前明四果中所說皆是有所得便不得若無所得而後乃得則皆是無實無虛也明矣故前云一切賢聖皆以無為法而有差別正明其同為無實無虛無實無虛即不生不滅下當說之但有半滿之不同耳半者不圓滿也小乘半菩薩滿菩薩半佛滿也總之如來是性德之稱無實無虛乃性德之容此科語意蓋謂如來所證之性無可名言姑為汝等形容之曰無實無虛而已性德何以無實無虛耶當知無實者所謂生滅滅已故凡情空所謂無智亦無得故聖解亦空無虛者所謂寂滅現前故體現所謂能除一切苦故用現質而言之無實無虛猶言寂照同時寂則無實矣照則非虛矣不但如來如是即約凡夫妄心言亦復無實無虛也覓心了不可得豈非無實乎介爾一念具十法界豈非無虛乎由是可知凡聖同體矣但因凡夫執實而不知無實故不能成聖小乘又執虛而不悟無虛故不能成菩薩一類菩薩能無實無虛矣復不能虛實俱無故不能成如來然而畢竟以同體故故能回頭是岸佛云狂心不歇歇即菩提吾輩其孟晉哉一切衆生其速醒哉無實無虛與不生不滅義同本自無生故曰無實今亦無滅故曰無虛亦與有即是空空即是有義同何謂無實有即是空故何謂無虛空即是有故亦與空有同時義同以其有即是空空即是有故曰空有同時故曰義同也若徹底言之空有同時者空有俱不可說也無實無虛者虛實俱遣也虛實俱遣正心經所謂以無所得故菩薩依之而得究竟涅槃諸佛依之而得阿耨多羅三藐三菩提之意故曰如來所得法此法無實無虛也此語是明如來證得之性此性虛實俱不可說何以故虛實猶言空有空有不可說者寂照同時也寂照同時正是無上正等正覺此之謂如來以上先將無實無虛平列說之者以明有體有用也今又徹底說之者以明體為用本得體乃能起用也兩層道理皆應徹底明了以有體必有用故此本經所以既令不著又令不壞學人必應如是兩邊俱不著也以得體乃起用故此本經所以令空而又空學人必應如是離一切相一空到底也當知開經以來所說諸義皆無實無虛義也何以故凡所言說皆是如語故茲略引數語以明之他可類推如曰諸相非相相皆虛妄不可取不可說法與非法俱非等等凡屬則非一類之義皆依無實義而說者也如曰是名諸佛則見如來諸佛及法從此經出等等凡屬是名一類之義皆依無虛義而說者也總之知得無實則知性本空寂故須遣蕩情執知得無虛則知因果如如故應如所教住何以故如來既如是而證菩薩必當如是而修故故得此一科上說諸義更添精采不但此也上科五語亦因此科而愈足證明上云如語謂如其所證者而語也所證果若何耶今曰無實無虛無實無虛者無相無不相之義也故說實語亦相不相俱無之義也故說真語真語校語下舊版有實語二字原稿無皆如其所證其為不誑語不異語也明甚無實無虛語雖平列然世尊言此意實著重兩無字教人應徹底作觀虛實俱遣也蓋如來所得固為無實無虛而無實無虛實由虛實俱遣得來若存有無實無虛便是法執豈能無實無虛哉故必應遣之又遣方能證得空寂之性體也然則學人云何著手當知世尊言此是教人當以無實成就無虛是為虛實俱遣之著手方便也何以言之無實者不執之意執則固結不解矣固結者實義也無論境之為實為虛苟有所執虛亦成實若一切不執則虛實俱遣矣此意觀之上下文可以洞然上文云信心清淨則生實相此是無實無虛之好注腳心清淨無實也生實相無虛也而實相之生由於心之清淨則無虛當由無實以成就之也明矣故前云離一切諸相則名諸佛又云應離一切相發心應空有不住行布施也故下文云住法布施如人入暗不住布施日光明照乃至最後一偈令作夢幻等觀也故本經全部主旨在於應無所住也然則世尊言此之意是令以無實之觀成就無虛之果豈不昭然若揭也哉無實觀者即最後所云觀一切法如夢如幻是也常作此觀執情自遣矣此是破一切凡情之總觀要觀萬不可須臾離者當知如夢等觀說在最後者是用以總結全經則全經處處皆應作此觀也明矣則又何能拘泥次第之說而不於此處說明之乎何故在此處說明因此處文便不能錯過故也且此處必應將此總要之觀說出更有三要義今再次第說之一此正明真實之文正承上無住發心無住布施之義而來而緊接其下者又極言住法之過不住之功可見此處正是上下文之過脈若不將此不執之義點明便不成其為過脈矣何以故與上下文所明無住之義不聯貫故二況此處所說既是明其自證則更不能不將修法點明何以故世尊所以明自證如是之果者意在令學人修如是之因故然則若但說平列之義而不將此義說出學人云何著手耶三所以說自證之意不但如上所云蓋意在令聞法者得以明了全經所說皆是自證如此證得確鑿絶非理想故不必驚疑怖畏故不可不信解受持故持說一四句偈等便有無量功德勝過以恆沙身命布施者此世尊說自證之最大宗旨也然則若但有平列之義而無徹底之義者換言之即是以無實成就無虛的示學人用功方法之義則聞者亦但知得自證之境界而仍不知自證之方法則又何足以徹底除人疑情乎綜上說種種義觀之則世尊說此意在令人既知其自證之境界並知其自證之方法也明矣然則聞法者烏可不如是領解說法者烏可不如是闡發乎然而此義非深心體會必致忽略前云義味淵涵不易說不易解者正指此而言也或曰如是作觀不慮偏空乎答之曰此似是而非之言也當知修觀必應徹底若不徹底執何能遣相何能離且上下文皆以布施對舉則是觀行並進尚何偏空之有況世尊於上下過脈中忽發此義者正以闡明上下文應離相應空有不住之所以然使知必應離相無住以行布施者為此云何能離云何能無住其方法如此乃是上下文之緊要關鍵所在則說此正是成就其廣行布施利益一切之本願並非僅僅令作此觀何慮偏空耶觀上來所說除融貫本經及其他各經種種義外可知佛說此無實無虛一語最要之義有三一是形容性德二是形容云何得性德三是形容云何修性德理事性修因果罄無不盡故此一語也不但將本經所說道理賅括無遺并將所有小乘大乘佛法一齊賅括無遺何以故一切賢聖皆以無為法而有差別故無實無虛正所謂無為法也不但此也一切凡夫心相一切世間法相一切因果法相亦莫不賅括無遺因此種種相皆是有即空空即有則皆是無實無虛也此正法華經所謂如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等也此之謂諸法實相故此一語真乃大乘法印法印者一一法皆可以此義印證之而不能出其範圍之外故曰其深無底包羅萬象也丑三重以喻明分二寅初喻住法之過須菩提若菩薩心住於法而行布施如人入暗則無所見此科是明執實則布施之功德全虛也正是無實無虛反面由此下二科語意觀之更足證明無實無虛一語不止說以明證得之境界實兼說以明證得之修功矣法字即經初於法應無住之法謂一切法也一切法不外境行果境者境界即五蘊六根六塵等行者修行即六度等果者果位即住行向地乃至無上菩提亦兼果報如福德相好神通妙用等然就六度等行言之便攝境果蓋行六度而自以為能行此住於行也若行六度而有名譽等想便是住境若行六度而心存一有所得便是住果無論心住何種皆為住法此處法字不必攝非法言因經文既是就行布施立說是已不取非法矣當知六度萬行等法因緣聚合乃能生起既是緣生之法可見當體即空非實也然行此六度等法而得自他兩利非虛也是故菩薩既不應捨六度之事不為而落虛亦不應有六度之相當情而執實執實則心住於法矣前云若心有住則為非住故有入暗之過暗則一無所見言其仍在無明殼中也豈但性光不能顯現而已永嘉云住相布施生天福招得來生不如意蓋不知觀空必隨境轉生天之後決定墮落故曰此科正明執實則功德全虛也入暗喻背覺既有法執故背覺也覺者明義背覺則無明矣故曰入暗無所見喻不見性前云若見諸相非相則見如來今不知緣生即空之理執以為實而取法相豈能見性故曰無所見不言有目無目者暗喻此人道眼未開無明未破有目亦等於無目故不言也蓋此人以見地不明故雖學大乘行布施既是盲修入暗必生重障無所見故以入暗無所見譬之當知學佛者若道眼不開勢必處處雜以世情俗見豈但六度行不好且必增長我慢競起貪瞋反將佛法擾亂行得不倫不類啓人疑謗直是於佛法道理一無所見豈止不能見性而已執法為實之過如此吾輩當痛戒之寅次喻不住之功若菩薩心不住法而行布施如人有目日光明照見種種色此科是明知法無實故不住著則布施功德便能無虛正是說來闡發當以無實成就無虛之義者使知如欲得我所得當如此人也如此闡義明透極矣如此開示親切極矣如此勸信懇到極矣有目喻道眼日光喻佛智並指此經以經中所說皆是佛之大智光明義故見喻見性種種色喻性具之恆沙淨德蓋謂住法布施則因執生障何能悟見本性若能心不住法無實而又勤行布施無虛是其人道眼明徹有目空有雙離虛實俱遣真為能依文字般若起觀照般若者則游於佛日光輝之中日光明照當得徹見如實空無實如實不空無虛具足體相用三大之性見種種色如佛所得也其功德何可思議即以生起下文成就無量無邊功德一科來此是約無實無虛平列之義說之若約虛實俱遣徹底義說者心不住法則心空矣無實也心空無實則我人有無等等對待之相胥離矣所謂虛實俱遣也若能如是便如日光明照見種種色無虛也其為以無實成就無虛豈不開示分明也哉目日亦可喻行人之正智有目者正智開也正智既開能破無明故曰日光明照無明分分破便分分現起過恆河沙數性淨功德故曰見種種色住法布施尚且如人入暗然則住著根塵等境而不行布施者當入何等境界乎不堪設想矣茲將不行布施六度者開為三類言之上說者為一類若心住於得好果報而又不肯布施癡人哉此又一類也其有於根塵一無所住而亦不行布施所謂獨善其身者以世法論逍遙物外亦殊不惡然以佛法衡之則是住於非法矣依然法執亦是入暗而無所見者耳此又一類也若心住布施而不行布施世無其人蓋未有不行布施而反取著布施之理也若不住行果而不行布施則其心住根塵可知便與第一類同科如是等輩見地若何前途若何得此兩科文所明之義皆可推知故世尊不說之也上來總結前文中兩科既將開經來要義加以闡發融成一片因接說明真實兩科證其所有言說所有法門莫非真實以其皆是如其證得之法而說者也乃又接說此喻明兩科更將證得之無實無虛闡明其境界指示其修功前後章句極其融貫發揮義理反覆詳盡不但總結中應離相發心乃至有住則非應不住色布施等等要義倍加鮮明并為經初菩薩於法應無所住行於布施等文作一回映之返光令更圓滿蓋經初但明不住行施之福此中兼明住法行施之過故更圓滿也且總結後復得此兩科作一餘波即以文字論如龍掉尾全身俱活真文字般若也所有經義既已收束嚴密故向下即結歸持經功德以示勸焉癸三結成須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德此如來印闡中之第三科也初印可一科是印可長老信解受持第一希有之說次闡義一科是為驚怖般若望而生畏不能信解受持者闡明般若之空乃是空有皆空因而融會前來已說之要義發揮應無所住之所以然并明如是之說如是之法皆是如來親證如此莫非真實不誑不異故不明無住之旨雖修六度而無明難破如人入暗若明無住之旨以行六度則必破無明如日明照反覆詳盡無義不彰矣故此第三科即歸結到受持此經之功德兼以回映離相名佛之義無量無邊功德與則名諸佛義同前半部義趣至此可謂結束得周匝圓滿之至故標曰結成結成者結束圓滿之意亦結果成就之意當來通指佛後不言現在而舉後世為言者意在展轉宏揚此經不令斷絶利益無盡且以回映前來後五百歲之言以鬬爭堅固之時而能受持讀誦此經其夙根深厚可知所以蒙佛護念皆得成就能字正顯其出類拔萃甚為希有以人鮮能之之時而竟能故如佛之所得者而皆得焉受者領納義趣即是解也持者修持謂如法而行又執持謂服膺不失既能如法而行則必利益一切衆生以行布施故此中雖未明言廣為人說而其意已攝在內受屬思慧持屬修慧讀誦則屬聞慧對文為讀憶念為誦先言受持者其意有三一受持是程度深者故首列之讀誦是程度淺者故列於次蓋約兩種人言然欲受持必先之以讀誦果能讀誦便有受持之可能故皆得成就二既能受持仍復讀誦此約一人言也聞思修三慧具足精進不懈如此豈有不成就者三說此推闡無住一大科意在聞者得以開解故此成就解慧科文結歸到解上受者解也而下極顯經功為一大科之總結者亦復先言受持皆是明其已開圓解則信為圓信持亦圓持所以為佛智知見而得成就者主要在此則為如來以佛智慧悉知是人悉見是人為者被也讀去聲此句約事相言有二義一智慧是光明義知見是護念義謂是人深契佛旨蒙佛加被也二謂是人功德惟佛證知除佛智慧餘無能悉知悉見者總而言之人能受持讀誦此經若約理而言其無明則受真如之熏為如來其知見則受佛智之熏以佛智慧悉知悉見故約事而言皆得蒙佛如來加被皆得成就無量無邊功德而曰知之悉見之悉者顯其決定成就也皆得成就無量無邊功德正是回映前文當知是人甚為希有當知是人成就最上第一希有之法等義曰皆得者無論僧俗男女凡能受持讀誦此經無不如是成就即不明義但能讀誦者亦必得之故曰皆得何以故果具有真實信心至誠讀誦先雖不解後必開解故所以者何般若種子已種蒙佛攝受決定開我智慧故利益衆生為功長養菩提為德功德二字指自度度他紹隆佛種言也故曰無量無邊何以故無量者約豎言歷萬劫而常恆故無邊者約橫言周法界而無際故此是諸佛諸大菩薩法身常住妙應無方境界今曰皆得成就如是功德明其皆得成菩薩乃至成佛也總以勸人必須受持讀誦此經便得悟自心性無實無虛遠離二邊既全性以起修自全修而證性耳辛五極顯經功分四壬初約生福顯次約滅罪顯三約供佛顯四結成經功壬初又二癸初立喻須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施此第五極顯經功一大科乃推闡無住以開解之最後一科不但為推闡開解之總結亦前半部之總結而語脈則緊承上文生起因上文言受持讀誦此經皆得成就無量無邊功德何故能如是成就耶故極顯經功以證明之雖然此一大科既是總結前半部而前已三次較顯矣乃復說此以極力顯之者實因此經之義不可思議上雖較顯三次猶為言不盡意故今乘上文文便復徹底以發揮之不過由上文引起非專為上文也當知顯經功即是顯般若正智此智乃是佛智所謂無上正等正覺為我世尊歷劫以來為衆生故勤苦修證所得即上文所說無實無虛之法是也今將此法和盤托出而成此經者為未見性者示以真確之圖案故為指引衆生到彼岸之方針故為以親身經驗告人俾有遵循故蓋憐憫一切衆生自無始來冥然不覺長攖苦惱或因障重而不聞佛法或雖聞而未得法要則前障未除後障又起所謂因病求藥因藥又成病則坐在黑山鬼窟裏如人入暗而無所見有何了期故精約前八會所說般若之義而更說此經真乃句句傳心言言扼要能令衆生開其始覺以合本覺而成大覺果能信解受持便如人有目日光明照見種種色且明告之曰諸佛及無上正等覺法皆從此經出則此經是佛佛傳家法寶可知我世尊因亟欲傳授家寶亟欲一切衆生皆知此經利益之大不可思議正所謂開自性三寶成常住三寶能住持三寶者就極低限度言之亦足以啓發善心挽回世運所以又復極力顯揚此經功德俾聞者生難遭想生歡喜心努力讀誦信解受持皆得成就最上第一希有此極顯經功之最大宗旨也顯經功中先顯能生殊勝之福若不設一比喻云何殊勝便顯不出故假立一極大布施之福以為後文顯勝之前提故曰立喻初日分中日分後日分是將一日分為三分猶今人言上午中午下午之類恆河之沙極細極多不可數計劫者梵語劫波謂極長時間今不止一劫乃是百千萬億劫復不止百千萬億乃是無量之百千萬億劫華嚴經云阿僧祇阿僧祇為一阿僧祇轉阿僧祇轉阿僧祇轉為一無量阿僧祇已是極長極多不可計算之數又將此不可計算之數倍倍增加而為無量豈有數可說哉則無量百千萬億劫猶言無數劫而已每日以一身命布施已非凡夫所能為況一日三時每時亦不止一身命乃是如恆河沙不可數計之身命況不止一日一年一劫乃是無數劫中一日三時以不可數計之身命布施歷時長極矣布施重極矣行願亦堅極矣此菩薩之行門也其福德之大亦豈可以數計而不及聞此經而生信者何故此理下詳癸次顯勝分三子初約福總示次舉要別明三結顯經勝子初又二丑初聞信即勝若復有人聞此經典信心不逆其福勝彼不逆者不違也聞得此經深信非依此行不可便發起一一如法行之之大心是為信心不逆即是發決定起行之信心此中雖但言信含有深解在若非深解決不能發此不逆之信心也初發此心固不如下之已經起行然起行實本於發決定心故發心時其福便得超勝長劫布施無數身命之菩薩此中福字正指下文荷擔如來當得菩提果報不可思議言故非他福所可比擬丑次持說更勝何況書寫受持讀誦為人解說發心即勝者正因其決定起行也則已經起行後其福更勝自不待言何況者顯其更勝也書寫者為廣布也古無刻本專賴書寫始得流傳故但就書寫言之如今日發心宏揚此經無論木刻石印鉛版其功德與書寫者同非定要書寫也先之以書寫者明其如法發心先欲度衆而先以此經度衆又明其發心即為紹隆佛種受持讀誦雖若自度實亦度他因受持即是解行並進而所行不外離相三檀離相三檀正為利益一切衆生故也讀誦亦所以熏習勝解增長勝行非為別事為人解說是行法施以利衆此經甚深發心為衆解剖無謬樂說無礙令聞者得明義趣啓發其信解受持之心也此句說在後者不能受持讀誦無從為人解說故合而言之是說此人既能傳布此經以利衆復能依法實行以利衆更能廣行法施以利衆足證其真是信心不逆故初發此心時便勝彼多劫布施無數身命之菩薩其所以勝之理下文世尊自言之即教義緣起荷擔三者俱勝故也其義在下今亦無妨說其概要以便貫通此經是極圓極頓法門故曰教義勝是為圓頓根機說令佛種不斷故曰緣起勝荷擔勝者試觀此人信心不逆便是機教相扣非般若種子深厚者莫辦是其慧勝書寫受持乃至解說正是不斷佛種是其悲其願其行皆勝悲智行願一一具足故能荷擔如來是為荷擔勝也而彼長劫布施身命菩薩雖難行能行行願堅固然若不具般若正智便只能成五通菩薩終不能理智雙冥得漏盡通而證究竟覺果一不及也既不具般若正智自他皆不能達無餘涅槃之彼岸則無論如何苦行皆非紹隆佛種之行則利益衆生終有盡時二不及也總之般若是佛智便是佛種故為三寶命脈所關況此金剛般若文少義多闡發義趣一一徹底若於此經不能信心不逆則見地既不徹底其悲其願其行又何能究竟圓滿且既不能信心不逆自不能受持解說廣為宏揚則佛法究竟義不明佛種便有斷絶之虞此中關繫極其重大則信心不逆之人豈彼但知長劫苦行者所能及哉世尊說此非謂不應苦行也是明但知苦行不具正智則不能成究竟覺不能紹隆佛種而信心不逆宏揚此經者既能不斷佛種而又空有不著則如彼苦行亦能行之裕如此能者彼不能彼能者此亦能則孰為優勝不待煩言矣由此觀之可悟觀行二門雖然並重而以觀慧為主此般若所以為諸度母也更可悟雖觀慧為主而觀慧要在實行中見經中處處以布施與無住並說即明此義此般若所以不能離諸度而別有也故一切佛一切大菩薩雖以大空三昧為究竟然是於熾然現有時便是大空三昧非一切不行而坐在大空中也果爾亦不得名為大空三昧矣何以故大空者并空亦空故是絶待空非對待空故此義緊要正是般若精髓務須徹底領會徹底明了上來四次較顯經功次次增勝當知非謂經義前後有如此懸遠之差別實顯信解有淺深之不同耳此義前曾說過然關繫甚要恐有未聞者況又加入今次之較顯茲當併前三次徹底明之如初次於生信文中以一大千世界寶施顯勝者是就能生信心以此為實乃至一念生淨信者說以明其既知趨向佛智便是承佛家業種殊勝因必剋殊勝果將來便不止作一梵天王也第二次於開解文初以無量大千世界寶施顯勝者是說在應生清淨心後是為成就最上第一希有之法者而說以明人能信解及此自他兩利是已成就無上菩提之法則大有希望矣故其功德過前無量倍此處成就非謂成就無上菩提乃是成就其法謂已了解之修行之矣不可誤會第三次於開解文中以恆沙身命施顯勝者是說在闡明如何奉持之後以明若能如是信解持說則其功行更為鞭辟入裏何以故不但知伏惑且知斷惑可望證得法身故故不以外財之七寶布施顯而以內財之身命布施顯今第四次以無數劫長時無數命施顯勝者是說在深解義趣及自證之法後以明其既能信心不逆便不必經長時之苦行便能如我所證得者而證得之何以故上來猶未能一一如法今則信心不逆是一一如法矣何以能一一如法由其已開解慧知非如此不可故能堅決其心實行不違是已背塵合覺矣正所謂初發心時便成正覺之人也見華嚴經便具有成就無上正等正覺資格下文所以曰荷擔如來當得菩提故雖尚是凡夫其功德已超過長劫苦行之菩薩也當知世尊所以如是由淺而深四次較顯者意在使人明了有若何信解受持程度便有若何功德所謂功不唐捐而宗旨則注重在信心不逆何以故若不發決定心一一依教奉行則不能荷擔如來不滿世尊說經之本懷故故一切學人不但前半部約境明無住應信心不逆即後半部約心明無住亦應信心不逆方合世尊說此極顯經功及說此信心不逆之宗旨故前云不過因上文生起乘文便以發揮之耳豈專為前半部而說哉當如是知也試觀此一大科是於上來諸義已作結束之後特別宣說其末曰是經義不可思議果報亦不可思議此二語既以收前半部亦以起後半部可見前後義趣原是一貫而中間所顯教義緣起荷擔三勝以及生福滅罪等功德豈得曰僅前半部有之與後半部無涉乎斷無是理則凡此一大科中所說其為統貫全經也明矣後半部之末云於一切法應如是知如是見如是信解不生法相正與信心不逆相呼應或問曰信心不逆與起信論中信成就發心是一是二答曰論位則不一發心則不二當知論中是說十信位中修習信心成就發決定心即入初住初住乃聖位也今不過初發決定依經起行之信心耳信根豈便成就既未成就尚是凡夫一聖一凡相去懸遠故曰論位則不一然而信成就者所發決定心攝有三心一者直心正念真如法故二者深心樂集一切諸善行故三者大悲心欲拔一切衆生苦故今信心不逆之人是信得信心清淨則生實相信得應生清淨心豈非正念真如之直心乎又復信得利益一切衆生應空有雙離行布施六度豈非樂集一切諸善行之深心拔衆生苦之大悲心乎六度萬行是樂集諸善行利益一切是拔苦也故曰發心則不二何故凡夫發心便同聖位無他蒙我本師授以傳家法寶故耳可見此經真是大白牛車若乘此車直趨寶所無疑以上因恐有見起信論而發誤會者故特引而明之更有不可不知者此經觀行極圓極頓果能深解義趣信心不逆其為圓頓根器無疑而圓頓人乃是一位攝一切位謂不能局定位次以論之也因其已開佛知佛見豈但初發信心能與初住菩薩所發心同且可一超直入立地成佛惟在當人始終不逆荷擔起來決定當得無上菩提也信心不逆中既具直心深心大悲心當知此三心即是三聚淨戒蓋離相發心以正念真如自無諸過故直心便是攝律儀戒離相修布施六度以樂集一切善行則深心便是攝善法戒為利益一切衆生行布施以拔一切苦則大悲心便是攝衆生戒由此可悟經初言持戒修福者於此章句能生信心以此為實之所以然矣蓋持攝律儀戒可以發起直心持攝善法戒可以發起深心持攝衆生戒可以發起大悲心而修福又所以助發深心悲心者也然則欲於此經信心不逆決定當從持戒修福做起彌復了然矣復次三心既具便能成就三德三身蓋正念真如之直心能斷惑而證真故是斷德成法身也樂集諸善行之深心因具正智故能樂集既集善行必獲勝報故是智德成報身也拔一切苦之大悲心廣結衆緣不捨衆生故是恩德成化身也信心不逆成就如是種種功德其福之殊勝為何如耶故下文曰荷擔如來當得菩提是經義不可思議果報亦不可思議也子次舉要別明分三丑初約教義明須菩提以要言之是經有不可思議不可稱量無邊功德信心不逆依教奉行者其福勝彼長劫苦行菩薩理由安在其要點可概括為三端依次說明故曰以要言之此句統貫下文緣起荷擔兩科不可思議指法身言法身即是體也性體空寂離名字相離言說相離心緣相故必須離相自證所謂言語道斷不可議心行處滅不可思故曰不可思議是經之中凡明離相離念一切俱遣之義者為此不可稱量指報身化身言報化即是相用也證得法身則報化顯現而報身高如須彌山王有無量相好一一相好有無量光明非言語所可形容不可稱化身則隨形六道變現莫測非凡情所能揣度不可量故曰不可稱量是經之中凡明布施六度利益衆生之義者為此體相用三大性本備具故既不應著相亦不應壞相乃能有體有用是經之中凡明二邊不著空有圓融福慧雙修悲智合一之義者為此此是將不可思議不可稱量兩句合而觀之以明義也此兩句既明理性故接說無邊以明事修無邊者離四句之意不但有無二邊離并亦有亦無非有非無之二邊亦離是之謂無邊邊見盡無中道自圓此全經所以以無住二字為唯一之主旨也功謂一超直入德謂體用圓彰蓋是經教義乃是理事雙融性修不二能以一超直入之修功成就體用圓彰之性德者故曰是經有不可思議不可稱量無邊功德以上是將無邊功德約自修說然此四字亦兼利他說自他兩利為菩薩道故蓋法身周含法界法界無邊況法身乎報身則相好光明無量無邊化身則隨緣示現妙應無方無方亦無邊意也三身無邊故能遍滿無邊法界以度衆生謂是經教義有令人成就體用無邊之三身以利益無邊衆生功也同證無上菩提德也又復展轉利益展轉證得其功德亦復無邊而信心不逆者既依教以奉行當得如是功德此其福勝彼之理由一也教義勝是約經說若約人說當云熏習勝丑次約緣起明如來為發大乘者說為發最上乘者說緣者機緣起者生起謂教義之生起起於機緣明法必對機也發謂發心大乘者菩薩乘最上乘者佛乘也大乘教義有圓有別有頓有漸佛乘教義惟一圓頓發大乘謂發行菩薩道之心發最上乘謂發紹隆佛種之心明此經是為此等人說也若約教義言是經前半之義非盡圓頓後半之義專明圓頓又復前半非盡圓頓者非謂有圓頓有不圓頓也乃是一語之中往往備此二義故我前云淺者見淺深者見深隨人領解此世尊說法善巧循循善誘之苦心也故為發大乘者說為發最上乘者說兩語中含有二義一明所說者有此兩種教義一明為發此兩種心者說也曰如來者明其從大圓覺海中自在流出也明其句句傳心也如來既為如是發心者說則信心不逆依教奉行之人其發如是心可知其開佛知見可知其為紹隆佛種也亦可知此其福勝彼之理由二也緣起勝是約說者邊說若約不逆邊說者則為發心勝根器勝也丑三約荷擔明分二寅初正顯若有人能受持讀誦廣為人說如來悉知是人悉見是人皆成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提流通本成就上有一得字唐人寫經無之唐宋人注疏中亦無得字之義足證為明以後人所加加者之意必以為初發心人豈便成就不過當來可得成就耳疑其脫落遂加入之殊不知此中所說成就功德是指荷擔如來言非謂便成如來也經意正以荷擔如來為其福勝彼之最大理由若其荷擔尚未成就則是勝彼無理由矣何以故初發心修行之凡夫其福勝彼長劫苦行之菩薩者因其發紹隆佛種之心修紹隆佛種之行故也荷擔如來正明其能紹隆佛種也此而未成何謂勝彼耶且上明教義勝緣起勝者為荷擔勝作前提也蓋因其教義緣起俱勝所以信心不逆依教奉行便為荷擔如來耳倘若荷擔功德尚待將來是其未受殊勝教義之熏習不合殊勝緣起之資格可知則上言聞此經典信心不逆云云便成虛語若其實是信心不逆而又未成荷擔功德教義緣起尚何殊勝之有則上言是經有不可思議等功德如來為發大乘最上乘者說又成虛語一字出入關繫之大如此前云凡讀佛書切忌向文字上研究因研究文字無非以淺見窺以凡情測勢必誤法誤人故也今觀此處妄加一字出入有如是之大則不但有誤法誤人之過竟犯謗佛謗法之嫌矣可懼哉察其所由無他教義不明專向文字推敲故耳何以言之在妄加者意中必係誤會不可量等功德即為上文不可思議等功德故以為初發心修行人豈能成就遂加一得字以辨別之殊不知此處文字雖與上文相似然既顛倒說之道理便大大不同功德亦隨之而大大不同豈可混而為一乎今竟儱侗顢頇至於如此者無他教義不明故耳教義云何得明多讀大乘以廣其心勤修觀行以銷其障常求加被以開其慧以如是增上緣熏習之力久久自明若執文字相求之則如人入暗永無所見矣此是明佛理之要門故不憚言之又重言之不可量云云義蘊精奧茲當詳細剖解之然欲說明此中之義仍不得不將上文之義摘要重述一遍兩兩對勘較易明了其重述處道理互有詳略聽者須將前後詳略互見之義融會而貫通之上文是經有不可思議不可稱量無邊功德句含有兩義一不可思議是說法身亦即是體不可稱量是說報化身亦即相用合此兩句言之為備具體相用三大之性德亦名理體若將性德細分之則惟法身之體名為性之體報化身之相用則名為性之用因其是性具之用故可渾而名之曰性德曰理體也此等名義每有未能徹了者茲乘便一言之無邊是說修功謂離四句也合之上兩句為性修對舉功德二字功謂一超直入之修功德謂體用圓彰之性德總以明是經教義有理事雙融性修不二一超直入體用圓彰之功德也二不可思議不可稱量義同上但前約備具三大之性言以與無邊之修對今則分而明之不可思議可約性體言不可稱量可約性用言無邊泛指一切利益衆生為功長養菩提為德則無邊功德四字是專約利他言若對上性用說此即所謂用之用也總以明是經教義有證體起用遍滿無邊法界利益衆生同證菩提無量無邊之功德也此處則先說不可稱量繼說無邊後說不可思議與上文完全倒換一不同也且不曰不可稱量乃分開而倒說之曰不可量不可稱二不同也又不但曰無邊復添一有字而曰無有邊三不同也不可思議則仍舊如是等處其義精絶當知體相用三大從來不離其惟一湛寂絶名離相而為相用之本者則名之為體與相用迥然不同處甚易明了若相用二者卻是分而不分蓋報化二身皆由性具之用大所現正因其能現報化身故名用大也而性具之無量淨功德所謂相大者即附於報化身而形諸外故曰分而不分此上文所以合而說之曰不可稱量此理細讀起信論便可了然然而相用雖分而不分亦復不分而分故報化二種身不但所現之相所起之用各各不同而修因時所發之心亦各不同因行是同但因心不同下當言之須細辨明正因其發心不同故所現之相所起之用各各不同也蓋報化之相用雖皆由於修離相之六度萬行福慧具足而後成就此明其因行同然而報身是由發廣大無盡之願知得六度萬行緣生即空而能增長福慧達到彼岸誓必一一修圓所獲之果也化身亦由發廣大無盡之願知得一切有情生本無生而猶執迷不悟未出苦輪誓必一一度盡所獲之果也此明因心不同也以不同故所以此處又分而說之正因其分而說之便可悟知此處是約修因說與上來合而說之以明修因剋果者其事理便大大不同矣由上說之義觀之可知欲成遍界分身普度含識不可量之化身必當發利益一切衆生以拔一切苦之大悲心矣故本經啓口便說所有一切衆生之類我皆令入無餘涅槃而滅度之又曰菩薩為利益一切衆生應如是布施也今曰成就不可量明信心不逆即是已發非凡情所可測度之大悲心也發如是心將來必證如是果矣菩提心以慈悲為本故先說不可量也又由上說之義觀之可知欲成福慧莊嚴相好無邊不可稱之報身必當發廣修六度萬行樂集一切善法行之深心矣故本經啓口便說菩薩於法應無所住行於布施乃至處處以布施與離相對舉說之也今曰成就不可稱明信心不逆即是已發非言語所可形容之深心也試觀五百歲忍辱及歌利王事此等難行苦行豈言語所可形容忍度如此餘度可知故非先發大悲心以為之基深心決難發起而不發深心又何以成就大悲心乎所以經中先言不可量即接言不可稱也首舉不可量不可稱為言尤含要義蓋般若是明空之法門此金剛般若唯一主旨亦在應無所住無住即是離相離相即是觀空然而開經卻先令廣度衆生勤行布施者正明空觀不離實行般若不離諸度別有之義此之謂第一義空今此人發心亦復如是大悲心深心與直心同發正是實行經中所說故曰信心不逆當知初發心時尚未斷念正在生滅門中故雖直心深心大悲心三心並發然只有向生滅門中精進勤修不著相不壞相普利一切之六度則既與備具體相用三大之性德相應復為成就報化二身之正因不致偏空有體無用且無始來妄想非歷事練心亦決不能除此皆學佛之緊要關鍵千經萬論皆是發揮此理而般若言之尤精務當領會務當照行者然而一面向生滅門中實行六度六度等皆是緣生法故是生滅門攝一面急當微密觀空以趨向真如門不如是則執不能遣相不能離不但不能斷念以證法身之體報化二種身之相用便無從現起必證體方能起用且住相以行布施六度如人入暗一遇障緣必致退心如上忍辱一科所明故緊接曰無有邊於無邊中加一有字精要之至上文云無邊者明其四句皆離也當知妄想未歇時起念便著著便有邊所謂有邊無邊亦有亦無邊非有非無邊一念起時於四句中必著一句故欲得不著必須無念今曰無有邊者是明其尚未能絶對無但能以無字對治其有邊耳蓋言是人正在無住離相上用功以求證得言語道斷心行處滅不可思議之法身性體故接曰不可思議性體無變無異故此語亦復仍舊以表示其不變不異將無有邊不可思議合讀正是發離一切相以正念真如之直心也三心齊發是為信心不逆既於此經信心不逆依教奉行便有利益衆生之功長養菩提之德何以故因其能行一超直入之修功求證體用圓彰之性德故無論僧俗男女但能信心不逆莫不如是成就故曰皆成就不可量不可稱無有邊不可思議功德成此三心齊發之功德方足以紹隆佛種故接曰則為荷擔如來阿耨多羅三藐三菩提則為者便是之意若是當來得成今尚未成者何云便是耶合上說種種義觀之足證妄加一得字顯違經旨矣荷擔者直下承當全力負責之意既曰如來又曰無上正等覺者如來為性德圓明之人無上菩提為覺王獨證之法許其荷擔此二蓋許其為承繼佛位之人堪任覺王之法也受持讀誦廣為人說其義同前其上曰人能即謂信心不逆之人也如是人等等字與上皆字相應如來悉知悉見此中無為字亦無以佛智慧字則如來悉知悉見之意猶言常寂光中印許之矣上來教義緣起荷擔三要生福滅罪功勝供佛無不由之雖說在生福文中意實統貫下文當如是領會之寅次反顯何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解說此科文字乍觀之似無甚緊要實則字字緊要其中含義精深頭緒繁重蓋得此一科上說諸義乃更圓滿可見其關繫緊要矣華嚴經云剖一微塵出大千經卷茲當一一剖而出之何以故句不但承上科直與立喻一科以下一氣相承此其所以頭緒繁重也小法謂小乘法兼指不了義法正是無上深經反面樂小法又是聞此經典信心不逆之反面故曰反顯謂藉反面之義顯正面之義也樂者好樂契合之意即不逆之所以然因其好樂契合所以不逆也著我之見即是我執既有我執種種分別隨之而起故曰著我見人見衆生見壽者見此極斥小乘語也從來皆謂小乘我執已空但餘法執未除耳今直斥之曰著我見殊令小乘人頽然自喪悟樂小之全非矣此真實語並非苛論蓋小乘已空我見之粗者即執五蘊假合之色身為我之見此其所以不受後有也然因其執有我空之法即指五蘊法故謂之法執當知我空既未忘懷謂之法執可謂之我見未淨亦無不可此前所以云若取法相即著我人衆壽也又復執有我空即墮偏空偏空即是取非法是執非法以為法也仍為法執此前所以又云若取非法相即著我人衆壽也故今直以著我見斥之痛快言之心若有取誰使之取耶非他人我也故無論取法取非法皆為著我此前所以云若心取相則為著我人衆生壽者也不過較之凡夫我執有粗細之別何嘗淨絶根株哉世尊言此乃是婆心苦口警策樂小法者急當回小向大之意此外別含深意有二一前來皆云我相至此忽云我見見之與相同耶異耶答同中有異無論著見著相著則成病是之為同然因有能取之妄見乃有所取之幻相故著見是著相病根是之謂異由是觀之但知遣相功行猶淺必須遣見功行乃深何以故妄見未除病根仍在幻相即不能淨除故此經前半部多言離相相即是境故總科標名曰約境明無住後半部專明離念念即見也念起於心故總科標名曰約心明無住此是本經前後淺深次第今於前半將畢時乘便點出見字以顯前後次第緊相銜接并以指示學人修功當循序而進由淺入深此為世尊說著我見云云之深意一也二剋實論之凡事物對待者皆有連帶關繫所以前半部雖但曰離相骨裏已在離念何以故著相由於著見若不離念無從離相故不過但知離相不及直向離念上下手者其功夫更為直捷了當耳前來已屢屢將此意暗示但未明說如曰應生清淨心信心清淨則生實相若心有住則為非住以及疊問四果能作念否并請示名持中所說皆是指示離念的道理其他類此之說不具引然則何故不明說耶因一切衆生聞般若之明空已經驚怖生畏若此經一啓口便說斷念遣見其驚畏更當何如不如但云離相步步引人入勝至後半部乃始露骨專明此義使鈍根人不致膽怯無入手處所以前半部語句義味渾涵可深可淺隨人領解淺者雖只見其淺但在離相上用功不能徹底然藉此亦可打落妄想不少未始無益而深者仍可見其深不礙一超直入今則前半部將完矣不能不將真意揭出使見淺者向後不致畏難見深者亦知所見非謬并以指示學人此經前後所明祇是一意不過前半亦淺亦深後半有深無淺此又說著我見云云之深意二也由此可見說法之善巧攝受之慈悲矣既樂小法於此深經機教不相應如世尊將說法華五千比丘羣起退席不能聽也執見既深聽亦何能領受聽且不能遑論讀誦受既不能從何解說故曰則於此經不能聽受讀誦為人解說以上就本科明義已竟所謂反顯者顯何義耶顯經功耳前云是經有不可思議不可稱量無邊功德又說緣起勝荷擔勝兩科皆所以顯經功也可謂無義不彰矣何須更顯雖然恐聞上來所有言說或有未能融貫以致卑劣自安懷疑自阻則經功雖勝彼將向隅矣佛視衆生如同一子亟欲一切衆生皆能讀誦皆能信心不逆依教奉行皆能荷擔如來無上菩提故又自作問答用反面之言詞顯正面之義趣雖是彰顯上說之種種義其實皆為顯是經之功德蓋上之正顯是直接顯之今之反顯則間接顯之也何以故句自問之詞若樂小法者云云自釋之詞也問意有三一問何故但言能持能說之功德而不及信心不逆者耶此蓋聞最初顯勝中所說未能徹了故發此問以為能持能說其為信心不逆可知但前云信心不逆其福勝彼何況受持廣說觀此語意是不待持說已有勝福矣今明成就功德獨不及之不知其福究竟若何故以樂小法云云釋之若知得好樂小法則於此經不能聽受解說可知既是好樂此經其必能持能說也明矣當知前云信心不逆其福勝彼是因其發決定持說之心故發心便能勝彼若不能持說豈得曰信心不逆前曰何況者明其發持說心便有勝福何況已持已說豈不有勝福耶非謂發心與持說其福不同也然則上科雖只言能持能說之福已將發心之福并攝在內矣此釋著重樂小法句如此顯義是教人應當發心依經實行則發此心時便是荷擔如來無上菩提以經中所說乃成佛之心要故視彼樂小法者其成就之大小豈可以同日語哉二問此經甚深難解難行何故聞此經典便能信心不逆受持解說耶此蓋聞上來為發大乘者說為發最上乘者說不免退怯故發此問以為如此根器希有難逢世尊雖欲傳授心要其如難得其選何故以聽受讀誦云云釋之若知得不能聽受讀誦由於契入小法則知欲求契入大法惟有聽受讀誦蓋大開圓解誠為不易莫若常聽深解者之解說可以事半功倍雖或一時未能深入然聽受得一句半偈般若種子已種矣得此聽受熏習之力加以讀誦熏習之力一旦般若種子發生將於不知不覺間三心齊發雖極鈍根可變為上根利智經云佛種從緣起仗此勝緣何慮之有此釋著重聽受讀誦四字如此顯義是為欲入此門者開示方便得此方便則荷擔如來之資格雖難而亦不甚難也此釋兼有鼓舞能說者之意在強聒人聽固為輕法有願聽者便應盡力為人解說也三問真如無相以一切法不可說不可念故名為真如今雖三心齊發正念真如然猶未能無念無相何故遽許為荷擔如來耶此蓋聞長劫命施之菩薩福猶不及不無懷疑故發此問以為長劫命施雖以無般若正智故其福不及然而已是菩薩信心不逆雖以受持此經故其福勝彼然而猶是凡夫信根既未成就保無退心時乎故以著我見云云釋之若知得人我見分別心未能除淨是因其好樂小法則知能於無上大法好樂不逆者其人我見分別心終能淨盡決定無疑所以者何熏習勝故既已趨向真如現雖未能斷念得無上菩提當來必得故何疑之有故下文云當得阿耨菩提此釋著重著我見句如此顯義是的示學人欲除我見等虛妄相想非於此一切無住之金剛般若信解受持必不可能以一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出故古佛既皆如是今佛亦決定如是也總而言之世尊因防未深解義趣者於上來所說不能貫通必生障礙故說此科從反面顯出種種道理使上說諸義更加圓滿本經之殊勝更加鮮明俾得共入此門同肩此任皆得阿耨多羅三藐三菩提此特說此科之宗旨也不然上說三要已將勝彼之所以然徹底說了何必再說乎試觀樂小法著我見聽受諸語來得突兀之至便可悟知如是諸語其必與上說者深有關係若視此科仍為顯明其福勝彼而說則此諸語便不能字字精警皆有著落世尊又何必如是說之哉子三結顯經勝須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處在在處處猶言無論何處然不曰無論何處而曰在在處處者有應宏揚遍一切處無處不在之意一切世間世約豎言三十年為一世間約橫言界限之意故世間猶言世界世界而曰一切遍法界盡未來之意也天人修羅為三善道言三善道意攝三惡道言天修羅意攝八部謂遍法界盡未來一切天龍八部四生六道所應擁護供養所以表其擁護也所應供養視前言皆應供養意深皆應者是明一一衆生應當供養所應者是明供養為一切衆生之責一不如此是所不應則為是塔亦視前如佛塔廟意深前說猶為經是經塔是塔但應視同一律今則明其經即是塔此與前言經典所在之處即為有佛若尊重弟子義同蓋塔中必安舍利或佛菩薩賢聖僧像故經所在處則為是塔者意明此經為三寶命脈所關也復次舍利者佛骨也即是報身佛菩薩賢聖尊像為令衆生瞻禮啓信功同化身而經是法身故經所在處則為是塔者又以明此經能成三德現三身也如是種種皆是經之殊勝功德故標科曰結顯經勝因有如此殊勝功德故一切衆生皆應極力宏揚令在在處處皆有此經故經所在處為一切世間天人阿修羅所應供養又塔必在高顯之處安塔之意在於表彰使衆聞衆見以起信心今云當知此處則為是塔是教以當知表彰此經宏揚此經也所應供養句是總則為是塔是釋明應供養之故恭敬作禮云云是別明所供養之法其法云何皆應三業清淨是也恭敬二字是主亦是總恭敬者虔誠也即一心皈命之意蓋三業以意業為主若但澡身淨口而妄想紛紜不能一心尚何清淨之有故首當攝心歸一不向外馳是謂恭敬必恭敬乃能清淨也恭敬是主者恭敬即表意業虔誠故是三業之主也作禮如合掌頂禮等此表身業虔誠圍繞經行亦作禮之一式圍繞時或稱念聖號經名或唱梵唄讚揚功德此表口業虔誠亦可作禮圍繞皆以表身業花香云散者古時天竺每以花朵或香末雙手捧擲空中以表敬意我國則多插花於瓶焚香於爐亦是一樣表敬散花香時必申讚頌如今時上香必唱香讚禮懺時手捧花香口唱願此香花雲云云此表口業虔誠也身口意三業皆應虔誠以表恭敬故恭敬是總凡是供養必用花香者此有深意花所以表莊嚴故佛經亦取以為名如華嚴經香所以表清潔如曰戒定真香又以表熏習表通達如曰法界蒙熏總之花為果之因故散之以表種福慧雙修之因證福慧莊嚴之果也香為佛之使故散之以表三業清淨感應道交也經所住處如是殊勝則信心不逆依教奉行之人其福德之殊勝可知經應供養則受持讀誦廣為人說者其為龍天擁護可知行願品云誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應禮敬一切衆生悉應供養誦普賢品如此誦金剛般若經亦然當知此二經一表智一表悲日以此二種為恆課正是福慧雙修悲智合一功德無量無邊前曾以此相勸者為此反之若於此經或毀謗或輕視或淺說妄說其罪業之大亦可知觀在在處處若有此經云云則學佛人應在在處處書寫受持讀誦為人解說也亦可知不然不能在在處處有此經矣而如今之世尤應廣為宏揚令在在處處皆有此經則在在處處皆有三寶加被天龍擁護即在在處處皆獲安寧矣今雖未易做到然有一妙法其法云何發起大心日日為在在處處讀誦求消災障豈但在在處處可獲安寧且在在處處衆生亦必不知不覺發起信心此等感應真實不虛何以故一真法界故一切衆生同體故冥熏之力極大故此經功德殊勝為十方三寶所護持一切天龍所恭敬故且人能如是行之便是捨己利他便是已開道眼便是觀照一真法界便是行利益一切衆生之離相布施便是信心不逆依教奉行便成就不可量不可稱無有邊不可思議功德便為荷擔如來我佛世尊便為授記當得阿耨多羅三藐三菩提也其效力之大小遲速全視當人觀行之力如何今日坐而言者明日便可起而行諸善知識勿忽此言壬次約滅罪顯分二癸初標輕賤之因復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道復次之言是明復舉之義雖與前義有別然是由前義次第生起或雖非前義生起而與前義互相發明必須次第說之者則用復次二字以表示之若但為別義與前并無上說之關係不用此二字也此中復舉之義與前義關係之處有三一約三要言二約生福言三約供養恭敬言也一約三要言者前云以要言之其下列舉教義緣起荷擔三項以說明其福勝彼之所以然然三要中實以教義為唯一之主要何以故因教義殊勝而後緣起荷擔乃成殊勝故然則教義既殊勝如此其功德豈止如上所說之生福已哉並能滅先世重罪得無上菩提故復說此科顯之二約生福言者上明所生之福為成就不可量不可稱無有邊不可思議功德即是荷擔無上菩提然而荷擔菩提猶是造端證得菩提方為究竟當知成就荷擔功德便能勝彼菩薩者以其將由荷擔而證得故也是經有不可思議不可稱量無邊功德正以其能令信解受持者證得無上菩提故也且欲證得菩提必先消其夙障而是經教義為最能消除三障者所以能令證得無上菩提者在此總之消除三障福德方為圓滿證得菩提福德方為究竟惟此經有此功德故須復說此科以顯之三約供養恭敬言者上來約因詳顯之末云隨說是經之處一切天人阿修羅皆應供養經也人也并說在內上科但云有經之處一切天人阿修羅所應供養雖意中攝有人在而未明顯故復說此科以反顯之知得為人輕賤出於偶然則知應當恭敬事屬常然矣何以知輕賤出於偶然耶經曰若為若者倘若也或者有之之意非出於偶然乎或問既為人輕賤天龍八部必亦輕賤之矣答此義不然當知是人能於此經信心不逆依教奉行前云如來悉知悉見其蒙諸佛護念可知則護法之天龍八部亦必如常擁護是人可知經中但曰為人輕賤不及其他其旨深哉為者被也輕者不重之意賤者不尊之意不被人尊重正是皆應恭敬反面云何輕賤淺言之如訕謗屈辱等廣言之凡遇困難拂逆之事皆是是人先世罪業應墮惡道明其被人輕賤之故也先世既造重罪之業其結怨於人可知或雖未與人結怨其為人所不齒可知如是因如是果此其所以被人輕賤也先世有兩義一指前生前生者通指今生以前而言非但謂前一生也一指未持說此經以前三十年為一世諺亦云前後行為如同隔世是也下科之今世亦然一即今生一謂持說此經之後惡道者地獄餓鬼畜生三惡道也所作之罪應墮惡道其重可知蓋指五逆十惡毀謗大乘等言應墮者明其後世必墮蓋罪報已定所謂定業是也此中要義有三一凡人造業無論善惡皆是熟者先牽謂何果先熟即先被其牽引受報故此科所說前生造惡今生未墮待諸後生者因其前生造有善業其果先熟或多生善果之餘福未盡而惡果受報之時猶未到所以今生尚未墮落者因此然而有因必有果若非別造殊勝之因速證殊勝之果者定業之報其何能免所謂善惡到頭終有報只爭來早與來遲是也應墮惡道句正明此義古德云萬般將不去惟有業隨身此言萬事皆空惟有因果在由是觀之人生在世有何趣味真如木偶人做戲被業力在黑幕中牽引播弄若非擺脫羈絆則上場下場頭出頭沒做盡悲歡離合供旁觀者指點自己曾無受用曾無了期不知所為何來也又觀本科所說可知凡論因果必通三世觀之乃不致誤蓋人之造業純善純惡者少大都善惡復雜因既不一果遂不能遽熟所以必應通觀三世方能知其究竟耳二造業業障也墮惡道報障也而是人先世不知罪業之不可造惑障也惑業報亦謂之煩惱業苦名惑為煩惱者惑於我見故生煩惱名報為苦者約凡夫說也明凡夫之報雖大富大貴乃至生天到頭免不了一個苦字也此惑業苦皆名為障者凡夫不知此三皆是虛妄相想自無始來至於今日執迷不悟遂被此三障其見道障其修道障其證道故謂之障也所以學佛唯一宗旨在於除障所有小乘大乘最上乘一切佛法一言以蔽之曰除三障而已此科先明三障以為下科除障張本三此科是明業力不可思議也受持讀誦此經為一切世間天人阿修羅所應供養者今以夙業故反而被人輕賤業障之力大矣哉當知業起於心心何以造業惑也惑也者所謂無明也無明者無智慧也一切小乘大乘法雖皆能除障而惟最上乘之金剛般若波羅蜜經尤為除障之寶劍何以故金剛者能斷之意即謂斷惑般若者佛智之稱以佛智照無明則無有不明故喻以金剛波羅蜜者到彼岸之謂蓋起惑為造業招苦之根惑滅則業苦隨之而滅三障既消便三德圓成三身圓顯是之謂得阿耨多羅三藐三菩提則達於彼岸矣故觀此經經名便可知其是斷惑除障達於究竟之經所以經功不可思議下科正明此義癸次明滅罪得福以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提此科正明經功不可思議也以今世人輕賤故先世罪業則為消滅兩句昔人有釋為轉重業令輕受者見圭峯纂要及長水刊定記此釋不宜局看若局看之便與佛旨多所抵觸何謂與佛說抵觸耶試觀上科於為人輕賤之下即接曰是人先世罪業應墮惡道正明其被人輕賤是由夙業所致亦即應墮惡道之見端也其非別用一法轉而令之如是也彰彰明甚此中消滅之言不可誤會為善惡二業兩相抵消佛經常說因果一如之理所謂如是因如是果又曰假使百千劫所作業不亡足見善惡二業各各並存不能抵消矣即如本經前云能信此經已於無量千萬佛所種諸善根若可抵消者先世罪業早已抵消矣何致今世依然應墮惡道將前後經文合而觀之其為各有因果各各並存不能抵消顯然易明而轉令輕受之言含有抵消之意故曰多所抵觸然則奈何惟有極力消滅惡種之一法耳何謂抵消譬如帳目以收付兩數相抵相消只算其餘存之數善惡因果不能如是抵消只算餘存之或善或惡以論報也何以故帳目中雖各式銀錢無所不有然有公定之標準可以依之將不一者折合為一故可抵消若善惡之業輕重大小至不一律既無標準以為衡量折合之根據從何抵消乎故經百千劫其業不亡也何為消滅譬如田中夙種有稻有稗今惟培植稻種令得成穀稗子發芽則連根拔去是之謂消滅人亦如是八識田中無始來善惡種子皆有惟當熏其善種令成善果則惡種子無從發生縱令夙世惡種已經發展但能於惡果尚未成熟期間勇猛精進使善果先熟則惡果便不能遽成若久久增長善根則枝葉扶疏使惡果久無成熟之機會將爛壞而無存矣此約世間善行及出世間法不了義教而言若依最上乘了義之教修殊勝因剋殊勝果便可將夙世所有惡種連根帶葉及其將成未成之果斬斷剷除豈止善果先熟不令惡果得成已哉此中所說消滅正是此義經文三句一氣銜接展轉釋成不能將滅罪當得看作兩事則為之為讀如字則為消滅者就此消滅之意經意蓋謂是人先世所作應墮惡道之罪業雖猶未墮然已行將果熟故已有被人輕賤之見端若非受持讀誦此經必墮無疑危乎殆哉幸是人夙有深厚之般若種子能依是經修殊勝因離相見性一超直入故其殊勝之果亦將成熟則本應墮落者但以今世被人輕賤之故先世罪業就此消滅因其正念真如有當得無上菩提之資格洞見罪性本空故也可見經中當得句正是釋成罪業消滅之所以然者須知不滅罪業固不能證果然經中是說當得不是現已證得說當得者明其因有決定證得無上菩提之可能則雖甚重之罪業已有應墮之見端者便可就此消滅耳當得之當當來之意亦定當之意現雖未得當來定得決定之詞也應墮亦當來定墮之謂然因是無上極果故不待先熟但有決定成熟之望惡果便連根除卻矣以其所修是無我相無法相亦無非法相功夫能造之心既空所造之業自滅所謂罪從心起將心懺心若空時罪亦亡是也此正極顯經功處由於未能領會得經旨所在遂致誤會是以人輕賤之故罪業被其消滅故有轉重業令輕受之誤解也總之以今世重讀人輕賤故先世重讀罪業則為重讀消滅兩句是明後世決不墮落之意其中故字正是點醒此意者豈可誤會成若非受人輕賤罪業便不消滅耶上科說為人輕賤是明定業不能幸免說罪業說應墮是明業報二障而業報由惑來故說業報即攝有惑障在內此科所說是明除三障蓋受持此經能觀三空之理且有當得極果之可能是其觀行甚深可知則惑障可從此而消根本枯則枝葉便萎故雖不能幸免之定業已有應墮之見端者其業力亦就此消滅業障消則報障亦隨之以消應墮者遂不墮矣逮至三障除淨則三德圓明故曰當得菩提皆所以顯經功不可思議也當得者隔若干世不定全視其三德何時修圓便何時得然雖時不能定以三障能除故終有得之之時必得無疑是之謂當得此二字既蒙世尊親許即是授記如後文曰然燈佛與我授記汝於來世當得作佛是也彼曰作佛此曰無上正等覺名不同而意同無上正等覺是約果法言佛者是約果位言證此果法而登果位稱之曰佛如來者是約果德言證此果法而性德圓彰名曰如來也可知曰佛曰如來便攝有無上正等覺之義而曰阿耨多羅三藐三菩提亦即攝有佛及如來義以非佛如來不能稱無上正等覺故故三名皆是究竟覺果之稱但或以顯究竟法或以顯究竟位或以顯究竟德故立三名耳世尊說法善巧圓妙一語之中包羅萬象其出辭吐句譬如風水相遭毫不經意而勾連映帶乃成極錯綜極燦爛之妙文焉即如此科如但曰受持讀誦此經先世罪業應墮惡道者則為消滅當得阿耨多羅三藐三菩提以顯經功於意已足乃帶出為人輕賤以今世人輕賤故云云其中所含之義遂說之不盡茲再略舉其五一令知因果可畏惡業之不可造幸仗金剛般若之力得免墮落而猶難全免也二令聞上來恭敬之說者不可著相著相則遇不如意事必致退心三令遇拂逆之事者亦不應著相應作滅罪觀也四一切衆生夙業何限令知雖極重夙業果報將熟已有見端者此經之力亦能消滅之也五令知因果轉變極其繁復應觀其究竟不可僅看目前淺見懷疑也上生福科中明示三要以鼓勵學人此滅罪科中亦暗示三要以誥誡學人一要者今世受人輕賤是先世重罪所致凡遇此事者應生畏懼心應生順受心二要者受輕賤者若受持讀誦此經夙業可消應於金剛般若生皈命心應對輕賤我者生善知識心三要者人輕賤即應墮之見端一切學人應生勤求懺悔之心而云當得菩提猶未得也應生勇猛精進之心五略三要皆此科要旨佛名經曰行善之者觸事轗軻況當茲亂世乎以此要旨時用提撕庶不致為境緣所擾耳頃言勤求懺悔當知受持讀誦此經正是懺悔妙門何以言之法華云若欲懺悔者端坐念實相念即是觀重罪若霜露慧日能消除此經之體即實相也經云信心清淨則生實相心清淨即是離相離念離相離念正是觀實相亦正是除惑消業轉報之無上妙法此即懺儀中之理懺門也經中又令行離相之布施六度以利益衆生行願品云菩薩若能隨順衆生則為隨順供養諸佛若於衆生尊重承事則為尊重承事如來若令衆生生歡喜者則令一切如來歡喜故行六度即懺儀中之事懺門蓋古德之造懺儀於理懺外復令供養禮敬別修事懺者正為熏起廣行六度之心豈第叩幾個頭便算了事哉觀本科所說因受持此經而得消滅夙業其為懺悔妙門也明甚蓋受持者解行並進之謂解即是觀即攝理懺行即攝事懺也且由此可知受持亦即觀行之別名尋常視受持為讀誦大誤果爾既曰受持何又曰讀誦乎當知讀誦原為熏起受持若但讀誦而不受持只能種遠因不能收大效只能增福不能開慧只能消輕業不能滅重罪更不能得無上菩提矣當如是知總而言之是經有不可思議不可稱量無邊功德說至此科方為顯盡而信心不逆其福勝彼之所以然亦至此科方為說徹本科標名不曰滅罪授記而曰滅罪得福者正為點明勝彼之福至此方得之意也此極顯經功一大科千言萬語其唯一宗旨可以數言統括而說明之曰學佛者若不從此經入縱令苦行無數劫只能成菩薩不能成佛是也此正發揮前生信科中結語所云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出之義趣以勸一切衆生生信焉耳由此可見本經章句極其嚴整義理極其融貫前於說生信科時曾云生信一科已將全經義趣括盡向後不過將生信中所說道理逐層逐層加以廣大之推闡深密之發揮耳觀於此一大科所明之義當可了然壬三約供佛顯分二癸初明供佛須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者阿僧祇此云無央數即無數之意劫字已是指極長之時間而言今曰阿僧祇劫則是經過無數的極長之時也不但此也又曰無量無量者華嚴云阿僧祇阿僧祇為一阿僧祇轉阿僧祇轉阿僧祇轉為一無量是將僧祇之數積至僧祇倍名為僧祇轉又將此僧祇轉之數積至僧祇轉倍始為無量復以無量之數計算阿僧祇劫簡言之可云無量之無數的長劫所謂微塵點劫是也言其所經劫數之多如點點微塵非算數所能計非譬喻所能言惟佛能知耳此等劫數俱在然燈佛前也準之教義常談由信位修至初住須經一萬劫或謂須經三阿僧祇劫而由初住修至佛位亦須三阿僧祇劫又有一說由信位修至佛位統為三阿僧祇劫者其說種種不一今以此科所說劫數參互考之我世尊是在第二僧祇劫之末遇然燈佛證無生忍遂由七地而登八地即入第三僧祇劫據此則於遇然燈佛時逆推至初住時按之教義只有一個第一阿僧祇劫也即連第二僧祇并計遇然燈時是在第二僧祇之末故可并計亦只兩個僧祇劫於無量僧祇中除去兩個僧祇其所餘者仍無量也然則由信位修至初住乃是無量阿僧祇劫豈止三阿僧祇劫更豈止一萬劫哉若依由信位至佛位統為三阿僧祇劫之說計之則於此經所說劫數不符尤甚每見有人因之發生無數疑問今故不得不引而說其不同之理當知經中有如是種種不同之說者實有深義其義云何所謂對機方便如法華云我說然燈佛皆以方便云云是也世俗每將方便二字看成是隨便如言論行為不合於定軌者則曰方便此非佛經所說方便義也佛經中凡是於理無礙於事恰合本來不可拘執者則用方便二字表示之故凡方便之言方便之事皆是對機而然劫數多少不一其說亦是此意蓋由信位而初住而成佛經歷時間或延或促全視其人根器之利鈍功行之勤惰而致不同豈可拘執因是之故遂有種種不同之說也若明此理則凡佛經中類此之言皆可以此理通之不可泥不必疑也然燈亦名錠光過去古佛也值者遇也那由他此云一萬萬將一萬萬加八百四千萬億倍亦是極言其所遇之佛非算數所能計非譬喻所能言惟佛能知耳劫數既有如彼之長當然遇佛有如是之多供養者簡言之即飲食衣服臥具湯藥四事供養廣言之如華嚴所說之事供養法供養事供養就上言之四事更加推廣法供養謂依法修行承事者左右事奉悉皆正指無空過言無空過者謂無有一佛不如是供養承事也以上備言歷時之久供佛之勤者為顯不及受持此經之張本也癸次顯持經若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及後者後五百歲正當末法又通指後五百歲之後以及其末而言故曰後末世於我之於比較之意謂彼之持經功德比我供佛功德我則不堪與之相比蓋供佛功德百分不及彼之一分千分萬分億分乃至算數不能算之分譬喻不能譬之分皆不及其一分也言百分又歷言千萬億分算數譬喻分者以持經者根器之利鈍功行之深淺有種種不同故比較不及之程度遂有如是之高下不同也此第五次較顯經功是說在罪業消滅當得菩提之後意若曰受持讀誦此經便得除障便得授記豈我昔日未授記前經歷無數之劫值遇無數之佛但知供養承事之所能及哉蓋供養承事只是恭敬服勞而荷擔如來則為紹隆佛種悲智行願之大小相差懸遠故曰乃至算數譬喻所不能及也此中說比較處不能以歷時長短授記遲速為言因持經者已於無量千萬佛所種諸善根其歷時之長遇佛之多正復相似也亦不能泛以聞法為言以彼此值遇多佛承事供養種諸善根豈有不聞法之理故供養承事所以不及者的指受持此經以經中義趣是開佛知見示佛知見果能受持便是悟佛知見入佛知見所以無數七寶施身命施多劫供佛不能及者理在於此何以故一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出故故供養二字應兼以法供養為釋方顯此經為一切法所不能比不能專以四事供養說之以自身之事較顯并點明然燈佛前者正明此經為佛佛相授之傳心法要而為自身多劫勤苦修證所得語語皆親嘗甘苦之言以勸大衆信入此門同得授記共證菩提耳前四次皆言其福勝彼是以劣顯勝故言福德不言功德以顯勝者既具般若正智則所修福德皆成無邊功德所以勝彼此次言供佛功德不及持經是以勝明劣故言功德不言福德以明劣者因缺般若正智雖不無功德亦祇成有漏福德所以不及經中雖但說受持讀誦賅有廣為人說在獨以後末世為言者其意有四一後末世衆生鬬爭堅固業重福輕障深慧淺然而尚有受持讀誦之者則非後末世時大有其人可知故說一後末世便攝盡餘時此說法之善巧也二以如是之時而有如是之人故特舉後末世言之以示不可輕視衆生此攝受之平等也三此經最能消除業障故獨言後末世以示此時衆生不可不奉持此經此救度之慈悲也四此經為三寶命脈所關故舉後末世為言者為勸現前當來一切衆生應力為宏傳盡未來際不令斷絶此咐囑之深長也壬四結成經功分二癸初明難具說須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信此結成經功一科為前半部之總結不但總結開解一科已也且不但結成前半部并以生起後半部其中初難具說一小科是結成前五次較顯功德次不思議一小科是結成前半部之真實義趣即以生起後半部兩小科中皆含有垂誡學人顯示經旨兩種深意章句極整嚴諦理極圓足茲逐層說之何以知其為垂誡學人耶試觀上云是人成就最上第一希有之法乃至生福滅罪荷擔如來當得菩提是所得功德亦已說盡何故此中乃言未具說乎又上來言是經有不可思議等功德又是人之成就荷擔如來當得菩提即是果報不可思議也是兩種不可思議早已明說令衆知之矣何故此中復云當知其意不同前可知蓋此結成經功之文并非說以勸信乃是垂誡之意狂亂狐疑當知皆垂誡學人語也何謂狂亂狂者狂妄指妄談般若者言也談何故妄未解真實義耳真義不明自必法說非法非法說法惑亂衆心不但自心惑亂已也故曰心則狂亂何謂狐疑將信將不信之意也此指怕談般若者言亦由未解真實義以致驚怖疑畏不能生起決定信心故曰狐疑不信世尊懸鑒後末世衆生有此二病故下科叮嚀誥誡之曰當知云云也我若具說者意謂難以具說此含兩義一是說明分五次校顯而不一次具說之故意謂我若不由淺而深分次顯之而於一次具說經功者既不易說明必致聞者或狂或疑反增過咎因利根人往往見事太易聞具說之功德便狂妄自負未證謂證未得謂得惑亂衆心其鈍根者又往往著相畏難既聞一切無住又聞具說功德不敢以為是又不敢以為非狐疑莫決不生信心世尊之為此言是誡聞顯經功者應於由淺而深之所以然處徹底領會則不致顢頇真如而心生狂妄亦不致莫明經旨而心起狐疑二是說明既已五次說明更不具說之故意謂我前來廣說受持此經者所得功德意在示勸而已以後不再多說恐聞者不明其意或者著相而求是狂亂其心也或者求不遽得反狐疑不信也世尊之為此言是誡行人當知此事本非言說所及惟證方知必須一切不著真修實行久久方能相應不可狂也功到便能自知不必疑也以是之故後半部較顯經功只略略表意不似前之注重矣因前半部正令生信開解若不極力顯之云何能信云何能解後半部正令向離名絶相上修證即菩提心菩提法菩提果尚不應著何況功德若再廣說便與修證有礙然亦不絶對不說者又以示但不應著耳並非斷滅也或有者深望其不多有也癸次明不思議須菩提當知是經義不可思議果報亦不可思議當知兩句正是規誡狂疑者之詞也何故狂何故疑由其不知是經義趣及持說此經所得之果報皆不可思議故耳故誡之曰當知果報即暗指所得功德所得功德非他即上文所謂荷擔如來及當得菩提是也何謂經義不可思議當知是經義趣專明離一切諸相離相方能證性所謂離名絶相惟證方知故曰經義不可思議何謂果報不可思議當知受持此經原為證性欲證無相無不相相不相俱無之性必須離一切諸相分分離便分分證果報非他即是自證究竟性德圓彰故曰果報亦不可思議總以明經義果報皆不可以心思不可以擬議皆應離名字言說心緣諸相微密契入若能知此則妄執未遣何可貢高狂亂之心可歇矣虛相遣盡淨德自顯狐疑之心可釋矣前於滅罪科中曾云極顯經功正是發揮前生信科中所說一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出之義趣以勸信此結成科為極顯經功之總結者又正是發揮皆從此經出之下文所謂佛法者即非佛法之義趣以開解也世尊之意若曰前所謂法即非法者何耶當知是經義不可思議故也前所謂佛即非佛者何耶當知果報亦不可思議故也蓋即非者簡言之即離相之謂詳言之性體空寂一絲一忽之相不能著著則即非空寂之性體矣故曰即非也我前來分五次以顯經功不欲具說者為令聞者深心領解功德以離相之淺深而異不致口談空心著有而狂妄自亂亦不致一聞離相便怕偏空而狐疑不信總之是經義趣是專遣情執以證空寂之性所謂果報即是證得不可緣念之性直須言語道斷心行處滅方許少分相應心行處滅不可思也言語道斷不可議也此之謂是經義不可思議果報亦不可思議此之謂佛法即非佛法若不知向這言語道斷心行處滅不可思議中觀照契入便與經義乖違那得果報可證有狂與疑而已矣受持讀誦此經者當如是知也知即是解以此為開解一大科之總結束正是顯示所謂開解者當如是深解也亦正是顯示此開解一大科中義趣皆是逐漸啓導學人令得如是深解者真畫龍點睛語也總以明修行以開解為本依解起行乃剋勝果不然非狂則疑其開示也切矣其垂誡也深矣而末世衆生讀誦此經犯此二病者正復不少由其於五次較顯經功之所以然多忽略視之故并此結成科中所說之道理亦未能深切明了耳顢頇儱侗豈不深負佛恩也乎極顯經功一科既是發揮一切諸佛乃至即非佛法云云之義趣則此處結成一科不但將開解科中義趣結足并將生信科中義趣亦一併結足矣蓋非如此以後義顯前義前半部義趣不能發揮透徹一切諸佛云云是生信一大科之總結極顯經功一科是開解一大科之總結今以後之總結顯前之總結則前半部之義趣倍加彰顯而綱領在握矣亦無以生起後半部來後半之文正是專明言語斷心行滅不可思議之修證功夫者也故前後經文得此當知兩句為之勾鎖章法義理便聯成一貫豈可局謂前淺後深此兩句是統指全經而言且與後半緊相銜接豈可局判前後為兩周說若各不相涉者耶至視後半所說語多重復則於經旨太無領會不足論矣不可思議一語具有三意一即上來所云言語斷心行滅經義所明者明此果報所得者得此此本義也二回映是經有不可思議等功德句並加釋明藉以收束極顯經功一科也前但云經有如是功德今明之曰言經有者因其教義如是也前判為教義勝者根據此處之言也何以知教義有如是功德以依教奉行者能得如是果報故也不可思議是法身是體見前釋得體乃能起用證得法身報化自顯故但言不可思議已足不必說不可稱量云云矣況兼以明言語斷心行滅之本義更不能雜以他語三以顯是經功德及持經者功德無上無等非凡情所能窺非言語所能道也故雖但說不可思議便暗攝有不可稱量無邊之義在內善巧極矣
